body:
  text: 羣書會元截江網卷八官制新增歷代事實伏羲氏以龍紀故為龍師而龍名共工水師而水名神農火師而火名黃帝雲師而雲名顓頊以來不能逺紀乃紀於近為民師而命以民事唐堯之世命羲和欽若昊天敬授人時內有揆嶽之官外有牧伯之任舜有天下以禹作司空棄作后稷契作司徒臯陶作士垂作共工伯益作虞夔典樂龍納言蓋亦為六官以主天地四時夏后之制亦置六卿其官名次皆承虞制殷有六太之官以典司六典有五官以典司五衆六府典司六職六工典制六材王畿之外亦有方伯州長之任通典蓋至于周立太師太傅太保以為三公使之論道經邦燮理隂陽又立少師少傅少保曰三孤二公𢎞化寅亮天地周官成王改殷官而制周禮作天地四時之名謂六卿天官冡宰掌邦治地官司徒掌邦教春官宗伯掌邦禮夏官司馬掌邦政秋官司冦掌邦事各有徒屬其别三百六十是也自周衰而百職亂戰國並爭各有變易秦兼天下罷侯置守而以太尉主五兵丞相總百揆又置御史大夫以二於相並通典漢以大司馬前後將軍侍中常侍散騎諸吏為中朝之官丞相而下至六百石為外朝之官初循秦制少有變革及景帝時始罷御史大夫以下官武帝即位置大司馬大將軍位在丞相上增驃騎伏波將軍都護校尉部刺史等官又置賞官名曰武功爵級十七萬諸置武功爵至千夫者得除為吏於是吏道雜而多端官職耗蠧矣逮至哀平新莽用事欲竊復古之名乃以大司馬大司徒大司空為三公又立師傅保為上公光武中興務從節約并官省職費減億計廢丞相御史而以三司綜理庶務洎于叔世事歸臺閣論道之官備員而已魏與吳蜀多依漢制晉氏繼之大抵略同爰及宋齊亦無改作官司有三臺五省之號有三嵗為滿之期通典元魏置六謁以凖六卿又倣上古龍鳥之號謂諸曹之使為鳬鳴取其飛之迅疾也謂候官伺察者為白鷺取其延頸常望也晉安帝紀西魏之末宇文泰用事命蘇綽依周禮以定六官其餘皆倣周制逮篡魏而為後周厥號無改隋廢周官還依漢魏凡官以四考而代煬帝大業三年始行新令有三臺五省五監十二衛十六府之制本紀唐人因之略有增損高祖定令以大尉司徒司空為三公次尚書門下中書祕書殿中內侍為六省次御史臺次太常至太府為九寺次將作監次國子學次天䇿上將府次左右衛至左右領為十四衛東宫置三師三少詹事及兩坊三寺十率府王公置府佐國官公主置邑司並為京職事官州縣鎮戍為外職事官自開府儀同三司至將仕郎一十八階為文散官大將軍至陪戎副三十一階為武𣪚官上柱國至武騎尉十二等為勳官通鑑龍朔二年又改京司及百官之名咸亨元年復舊武后再易庶官或從宜創號或參用古典天授二年凡舉人無賢不肖咸加擢用大置試官以處之試官之名蓋起於此神龍初官復舊號元宗開元二十五年刋定職次著為格令蓋尚書省以統會衆務舉持繩目門下省以侍從獻替規駁非宜中書省以獻納制册敷揚宣勞祕書以監録圗事殿中書以供修膳服內侍省以承旨奉行御史臺以肅清僚庶九寺五監以分理羣司六軍十六衛以嚴其禁禦一詹事府二春坊三寺十率俾又儲官牧守督護分臨畿服設官以經之置使以緯之自六品以上率由選曹居官者以五嵗為限於是百官具舉庶政咸理通典牌子黃帝六相堯有十六相為之輔相不必官名少昊司徒前漢嘗加大後漢又加大司馬項羽加大漢以後曰大後周又加大司空前漢加大改御史大夫為之後周又加大司冦周有大司冦卿後周又加大唐羲和羲仲羲叔和仲和叔州牧虞太師太保納言隋及大唐嘗改侍中為之后稷秩宗士共工虞夏九卿商太宰晉宋齊梁陳改太師為之太宗太史太祝太士太卜司士司土司水司水司革司器司貨太子太師太子太保太子太傅方伯周太傅少傅少師少保冡宰後周加大宗伯後周加大內史大唐亦嘗以中書為內史太僕正大將軍自戰國時楚置前後左右將軍周末置秦太尉左右丞相丞相相國侍中本丞相史隋改為納言又改為侍內大唐嘗為納言或為左相或為黃門監黃門侍郎散騎常侍少府吏在殿中主發書謂之尚書四人漢置五人其一人為僕射四人分曹後漢為五曹至晉有大曹尚書令僕射尚書丞御史大夫奉常郎中令宗正治粟內史主爵中尉廷尉典客典屬國少府將作少府中尉中書謁者令僕射詹事中庶子庶子太子家令率更令僕率內史郡守太中二大夫漢領尚書事至漢後為録尚書事三公曹尚書主客公卿後漢改為吏曹主選舉又為選部魏為吏部宋嘗置兩員大唐嘗改為司制太常伯又嘗為天官中書侍郎御史中丞光祿大夫中散大夫遊擊衛車騎驍騎伏波上騎材官輕車樓船橫海護軍渡遼二師蒲類強弩戈船奮威建威積射二十一將軍後漢賊曹尚書尚書侍郎三十六人魏有尚書郎晉又十有郎中隋初置三六侍郎後置員外郎一人後又六曹各置侍郎唐改曹郎為郎中祕書監四中郎將都督儀同三司魏五兵尚書度支尚書祠部曹尚書殿中監中衛中領軍鎮軍大冠軍遊騎四平鎮北虎威撫軍凌江寧朔等將軍行臺晉三公尚書掌刑獄起居尚書國子祭酒中軍龍驤寧逺宋殿中將軍齊都官尚書梁太府卿雲麾中武壯武明威定逺宇宙等大將軍始以太常等名卿分為四時凡十二卿後魏柱國天柱二大將軍諸少卿後周軍器隋左右武候府大將軍大總管通守佐太守折衝府正議通議朝議朝請朝散等大夫左右驍衛府大唐除府字大唐太子賔客漢之四皓非官左右千牛衛左右屯營後改為羽林軍嘗改為衛左右威衛嘗改左右豹韜衛左右龍武將軍平章事知政事參知機務同中書門下三品平章軍國重事節度使採訪使宣威武散懷化歸德等將軍並通典官數唐六十員虞六十員鄭玄云虞官六十唐官未聞見舜問道夏百二十員鄭玄曰百二十殷二百四十員鄭玄曰百四十周六万三千六百七十五員漢自丞相至佐史凡十三萬二百八十五員後漢七千五百六十七員晉六千八百三十六員宋六千一百七十二員齊二千一百三員後魏七千七百六十四員北齊二千三百二十二員並內官後周二千九百八十九員並內官隋一萬二千五百七十六員大唐二萬八千八百五員並通典官品周官九命漢自中二千至百石凡十六等後漢自中二千石至百石凡十三等魏因漢制更置九品晉宋齊並因之梁更置十八班班多為貴又置施外國將軍二十四班凡一百九號陳並因之後魏置九品品各置從凡十八品自四品以下每品分為上下階凡三十階北齊並因之後周制九命每命分為二以正為上凡十八命隋置九品品各有從自四品以下每品分為上下凡三十階自太師始焉謂之流內流內自此始焉煬帝除上下附惟留正從各九品又置視正二品至九品品各有從自行臺尚書令始焉謂之視流內自此始唐自流內以上並因隋制又置視正五品視從七品謂之視流內又置勳品九品自謂衛録事及五省令史始焉謂之流外流外自此始勳品自齊梁即有之本朝亦為九品品各有從偶句雲龍鳥火各異其名天地四時各立其號堯分四子羲首欽天舜命九官禹先宅揆百揆時敘庶政惟和三公論道兆民是阜周召毛原布列卿相韓彭英盧分據侯王舜官所當慕不可因王莽廢九官之名周制所當倣不可因後周廢六典之制夏有六卿之置而百揆四嶽則仍乎舊殷有六太之官而方伯州長各設其名既有三公又有九卿秦制也而漢因之既有省臺又有寺監隋制也而唐因之太宗定制七百三十員以待天下之賢憲宗省吏一千四百員而減州縣之費刀筆之吏不當並用漢人謂不可為公卿工商雜流不容濫進唐人令無得與士伍材能不擇漢相雖一言而可致賞拔任情晉掾以三語而遽除皇朝事實太祖設官分職襲五代之制雖稍有增損而大體俱舊制也其唐制省部寺監之官備員而已無所職掌别領內外任使而省部寺監則設主判官員額惟其侍中中書令同中書門下平章事為宰相此尚書循唐制也至乾德二年始置參知政事為宰相副二宰相所居者謂之中書門下因政所出也而兵政𨽻樞密承五代之制有使有副尚書省置判尚書都省一員但掌百官赴省集議及大祀受誓戒之事六部各有判率以學士待制館閣官領之翰林學士沿唐制以六員為額內年德俱重者一員為承旨兼門下封駁事即中書舍人之職也詳見兩制門御史臺雖有大夫員數而不除以中丞為臺長詳見臺官門諫官以别官兼領者即為知諫院同知諫院亦有正諫議大夫司諫正言者九寺即卿之任祕書省即昭文館集賢院謂之三館與祕閣同𨽻本省有直館直院直閣校理館閣校勘謂之館職詳見館閣門國子監有判監資淺者為同知或同管即祭酒司業之任而博士轉而為直謂將作少府軍器三監之職並屬三司而都水無常職員遇興役即差官職掌官外有學士待詔等員惟觀文殿大學士仁宗朝以賈昌朝辭使相特建此職仍詔非曾任宰相者不除觀文殿學士資政殿大學士端明殿學士翰林侍講侍讀學士龍圗天章寶文閣學士直學士樞密直學士三閣侍制皆為侍從清望之選並無職掌多帶職以領在內省府寺監在外藩方任使自資政以上多以授一時舊臣國家舊官制如此文臣則兼帶勳階即自武騎尉至上柱國十二轉是也武臣則兼帶勳階憲御檢校官四色憲銜自監察御史至御史大夫號為憲御檢校元豐官制元豐之初始命置局詳定官制大槩皆本唐六典為法稍損益之在內設尚者置左右僕射門下省置令已上為宰相而兩令侍中不除人尚書左右丞門有中書各有侍郎樞密院有知樞密院事同知樞密院上為執政官左右司郎官各一員通糾六部號都司專佐宰相理省事謂之宰屬尚書六部見六部門翰林學士定以二員為額久次為丞相御火臺官各如舊制而除知事雜及裏行之名門下後省置左散騎常侍而不除人給事中一員起居郎一員而左諫議大夫左司諫左正言屬焉中書後省置右散騎常侍而不除人中書舍人六員起居舍人一員而右諫議大夫右司諫右正言屬焉號兩省官祕書監少監丞郎校書郎正字而著作佐郎屬焉號館職罷直館院校理等員闕惟存修撰直祕閣號貼職而别領在外任使九寺見九卿門四監將作少府軍器監丞簿都水置使者丞簿南外西外丞以上為寺監官國子監有祭酒司業丞簿太學有博士正録已上為學官是謂職事官罷三司使副及諸主判官而其職分𨽻諸省部寺監羣牧司使名不除而不命官其職皆屬太僕寺以太師太保太傅為三師太尉司徒司空為三公皆論道之官無専領之職為宰相兼官以開府儀同三司易節度使詔中書門下平章事號為使相以唐文散階換省部寺監官歸釐本務號階官寄祿官而食其俸以領內外任使以特進易左右僕射金紫光祿大夫易吏部尚書銀青光祿大夫易五曹尚書光祿大夫易左右丞正議大夫易列曹侍郎通議大夫易給舍大中大夫易左右諫議大夫中大夫易祕書監殿中監中散大夫易大卿監朝議大夫易少卿監朝請朝散朝奉郎易員外郎承議郎易太常國子博士奉議郎易太常祕書殿中丞通直郎易太子中允中舍左右贊善大夫宣德郎易寺丞宣議郎易監丞承事郎易大理評事承奉郎易太常寺太祝奉禮郎承務郎易寺監主簿自承務至特進為寄祿官其大學士至侍制其名皆存以為二府罷政省部長二給舍臺諫補外之職集賢殿修撰直龍圗閣號貼職庶僚領在外煩劇任使者帶之削去憲銜檢校官留勳十二自通直郎以上帶入銜此為元豐新制官名即循唐舊典職掌亦倣周禮六官之法也並黃琮官制徽宗政和間重條官制髙宗建炎元年詔省臺寺監以煩簡相兼學官館職之類減半宰執及見任官觀待闕未有差遣京朝以上俸錢併減二分之一紹興間重修官制武官階職本朝武臣以節度使留後觀察使防禦團練使刺史為正任以殿前馬步軍副都指揮使三衙都虞候天武捧日龍武神衛四廂都指揮使為管軍以內客省引進四方館東西上閣門使副為橫行以通事舍人閣門祗候為閣館以橫行使及諸司使帶防禦團練使刺史為遙郡以諸司使副內殿承制崇班為入使臣供奉官侍禁殿直供奉職為小使臣權行守試唐有檢校試攝判知之官皆詔除非正命通典本朝凡除尚書侍郎郎官以寄祿官之髙下為凖五品以上為行下一品為守下一品為試品同者否他職事官倣此崇寧中吏部授選人差遣亦用資屬髙下分行守試三等焉官制本朝官數景德官一萬餘員皇祐官二萬餘員慕職州縣官三千三百餘員總二萬四千餘員南豐集國初以來供奉官左右班殿直為三班立都知行首以領之又有殿有承旨班院端拱以後分東西供奉又置左右侍禁及承旨初三班吏員止於三百至天禧間乃總四千三百至于熙寧間乃總一萬一千六百九十宗室又八百七十同上本朝更置太祖乾德元年常參官知縣自奚嶼等始也開寶二年李昉盧多遜分直學士院直學士院自昉及多遜始也開寶八年王祐擢權知貢舉扈蒙梁周翰雷德驤並權同知貢舉命權同知貢舉始此開寶元年以張洎直舍人院直舍人院自洎始通鑑長編太平興國二年初置文思院興國四年簽書樞密院事自石熙載始初置皇子侍讀以可法為之興國七年以奚陟王明同判三司同判三司自陟明始雍熙三年始用士人為司理判官端拱元年置都轉運使自樊知古始淳化二年翰林學士賈黃中蘇易簡幹當差遣院李沆同判吏部流內銓學士領外司自此始也淳化三年置理檢院以錢若水領之復唐制也淳化五年竇神興充莊宅使兼黃門左班都知內官領諸司使始此先是王繼恩有平賊功議立宣政使名序在昭宣使上以授之至道元年始命諸王教授同上咸平元年改御帶曰帶御器械以授張旻等三人咸平二年置翰林侍讀學士以楊徽之夏侯嶠吕文仲為之翰林侍讀學士以邴昺為之咸平三年始置群牧司於是內外廄之事自騏驥院而下悉聽命於羣牧司也咸平四年審官院初引對京官于崇政殿京朝官磨勘引對自此始景德二年資政殿置大學士自此始景德四年復致諸路提點刑獄官又置龍圖閣學士杜鎬充職同上明道元年諫官置諫院自此始明道二年復置諸路提點刑獄官仍參用武臣景德元年始置崇政殿説書賈昌楊安國等為之髙若納為殿中侍御史裏行殿中裏行始此寶元元年市舶置使自任中師始也皇祐元年觀文殿置大學士自此始任詔自今非嘗為宰相母得除嘉祐五年置江南東西等十一路轉運判官長編熙寧五年權發遣總管自燕達始熙寧八年詔減將作監冗官十六員後復增主簿一員長編文武九品國朝官制自文臣開府儀同三司為從一品至登仕為從九品武臣自驃騎大將軍為從一品至陪戎校尉為從九品會要元豐九品元豐官制諸太師太傅太保司徒司空侍中書令王為正一品開府儀同三司至郡王國公為從一品金紫光祿大夫至開國郡公上柱國為正二品銀青光祿大夫至開國縣公柱國為從二品光祿大夫至上護軍為正三品正議大夫至開國侯護軍為從三品通議大夫至開國伯上輕車都尉為正四品太中大夫至輕車都尉為從四品中大夫至開國子上騎都尉為正五品中散大夫至開國男騎都尉為從五品朝議大夫至驍騎尉為正六品朝請郎至雲騎尉為正七品承議郎至武騎尉為從七品奉議郎至尚書省都事為正八品宣德郎至書令史為從八品承事郎至長史司馬為正九品承務郎至文學參軍為從九品偶句州縣之官差減其員開寶三年之詔也寺監之官裁減其半建炎元年之詔也王化基言五事而冗官之省則居其四太宗宋公祁論三冗而限員之定則處其一仁宗富公弼上奏帝王辨大臣大臣辨百職神宗魯周詢進言天子擇宰相宰相擇百官仁宗魏德仁教坊使太祖不允其上佐之求類苑陳舜封伶官子太宗不畀其清望之任類苑漢超守關南者十七年此久任之法也太祖李允在河北者二十年亦久任之意也太宗神宗本唐六典而正其臺省寺監之名官制徽宗以古三公而易其侍中僕射之號官制元豐三年之詔罷去省寺官空名之額神宗大觀二年之詔釐正寄祿官左右之字徽宗熙寧中張公商英則有重正官制之語神宗紹聖間蔣公之竒則有修飾官名之奏哲宗名臣奏議仲淹請委輔臣仁宗慶厯六年范仲淹奏周制三公外兼六官之職漢以三公分部六卿唐以宰相分判六曹今中書古天官冡宰也樞密院古夏官司馬也四官散於羣有司無三公兼領之重而二府惟擢差除循資給議賞罰檢用條例而已上不専三公論道之任下不専六卿佐王之職非治法也臣請倣前代以三司司農審官流內銓三班院國子監太常刑部審刑大理羣牧殿前馬步軍司各委輔臣兼判其事司馬光請擇人司馬光上仁宗云竊見國家所以御羣臣之道纍日月以進秩循資格而授任茍日月積久則不擇其人之賢愚而置高位資格相值則不問其人之能否而居重職所以然者其失在於采名而不采實誅文不誅意陛下誠能博選在位之士不問其始所以進及資序所當為使有德行者掌教化有文學者待顧問有政術者為守長有勇略者為將帥明於禮者典禮明於法者主法下至醫卜百工皆度材而授任則官無曠職矣宋祁請定員額國家郡縣素有定官譬以十人為額則常以什二加之即廷代罪謫足以充之今則不然一官未缺十人兢逐紆朱滿路襲紫成林州縣之地不廣於前而官五倍於舊吏不可以茍法進官不可以濫除請詔三班審官院諸司流內銓明立定員以為定法其門廕之外真舉之色實置選限稍務擇人候有闕官計員補吏則二冗去矣仁宗朝王甫請加判知臣聞名不正則言不順蓋名以出信初無內外小大之間臣竊見司官府長二舊多謂之判知判國子監判太常寺之類是也元豐中官制既修一切釐正惟太宗正司官尊有稱判其次曰知曰同知而已今登聞鼓撿二院官宜如諸道進奏院官稱監可也而乃曰判此百執之間其名不可以不正者也徽宗朝諸儒至論資格拘閡之弊今賢材之伏於下者資格閡之也職業之廢於官者資格牽之也士之寡廉鮮恥者爭於資格也民之困於虐政暴吏資格之人衆也萬事之所以玩弊百吏之所以廢弛法制之所以頽爛決潰而不之救者皆資格之失也雖然不無小利也小便也利之者蠢愚而廢滯者也便之者耄老而昏庸者也提選部者亦以是法為易守不復銓敘人物而端覆功實一吏在前勘簿呼名而授之矣坐廟堂者亦以是法為易行可為太息也孫洙流品常使有别前輩謂祖宗舊官制其所以甄别流品者至於嚴密一官凡數等宰執侍從之遷為一等卿列館職之遷為一等出身人之遷為一等蔭補人之遷為一等其所以别流品而重名位非故為是紛紛哉誠以流品有别則安其分而無僥幸妄進之心元豐更制以唐六典為宗臺省寺監職掌之官名實正矣而寄祿之制混為一統無復差别當時不能推原祖宗制官之意立為品章學士士大夫頗慊然以新制為未盡詔書屢下最後又曰敢有弗欽將抵厥罪蓋指羣議之未洽而不能抑其議也林賢良主意建官體制分合論一代建官之制當知一代經國之體蓋分職授任各有攸司尊卑不得以相踰彼此不得以相紊循名責實而無曠瘝之失服休服采而致賢勞之用此建官之制然也然而聫事合治體統相維因有降其號而損其實者亦有殊其號而一其權者或冝分而合以防二三之漸或冝合而分以杜専制之原毋乃經國之體然歟唐虞稽古建官惟百夏商倍之至周而有三百六十之屬矣三公惟人官不必備六卿分職各率其屬所以為國體計者何審也自秦不師古而官制紊矣漢仍秦舊以迄於隋卒無有能明周公之意者太宗造唐制度紀綱粲然具舉蓋將有志於成周之治可以官制而不先定乎道揆法守輕重論建官之制則道揆之權重而法守之權輕推建官之意則法守之權重而道揆之權輕不論其制無以知道揆之任事無不可行不權其意則無以知法守之司事無不可言蓋總道揆之樞者宰相也持法守之綱者臺諌也官職之建以為宰相事無不統社稷賴以表倡茍不重其權則以之鈞軸萬務陶冶四海其勢必有所阻礙而不行則何以奏格天洗日之功哉故立制之初舉一國之權而悉付之宰相蓋以行天下之事也雖然宰相行天下之事者也臺諫言天下之事者也宰相曰可臺諫曰不可不用也宰相曰行臺諫曰不行不施也以制參之臺諫之重固出於羣臣統屬之中以意推之宰相之尊反𨽻於臺諫舉劾之內是道揆固當輕而法守尤當重也偶句古者為官擇人有古者建官之制後世為人擇官有古者任官之權制度必詳名號必辨固當考古人建官之良法內外相維小大相統尤當得古人建官之美意警段宰相總衆權天下之大不可獨治故有百官百官之衆不可獨總故論一相國有相臣家有宗老其分一也謂名不可以不正也故命之曰相名既正矣而實不可以不相符也故與之以權既與之以權矣謂是職不可以不専故有一而無二謂是政之不可以不一故有要而不煩謂聨事合治而脈絡不可以不相關也故其事通融而無間謂篤近舉逺而體統不可以不相維也故其勢聨屬而無外謂端本自內始也故正君之責任焉謂正已而後百官正也故馭吏之法存焉又請國柄在已而嫌於逼也故其權而不敢専夫然後其源清則其流無不澄其表直則其影無不正自是以降尊者處乎上卑者居乎下大者治其綱小者理其目而第第相承係一相也後世非古制一代之典必有一代之制盡其責如古亦難矣惟因其名而得其意則斯為一代之良法也後世之相不同漢魏晉隋唐多相更改或大司徒大司馬太尉大司空中書令侍中尚書令僕射號為宰相品位既崇不欲輕授人常以他官居宰相職而假以他名參掌者無定員夫相者總領六官紀綱百揆平章軍國之重事茍無其人則天下多事矣故五教則命契百榖則命稷而天象之大則又分命四人而重其職官之所以詳者不得不詳也至周之時則教化行而民知禮義矣田野闢而民得粒食矣倘成王於此復詳其官焉是贅員也是虛位也而聖人何假於詳哉厯代建官名實三代而上建官皆實用三代而下建官皆虛名古者設官置吏皆為民設唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯夏商事繁官倍其數至周增而至三百六十三公論道經邦三孤二公𢎞化至六卿分職各帥其屬以倡九牧阜成兆民其建官皆實用也自秦罷侯置守大尉掌五兵丞相總百揆御史大夫二丞相至漢則以大司馬前後將軍侍中中常侍散騎為中朝之官自丞相以下至六百石為外朝之官光武併省官職廢丞相御史而以三司總理庶政其後事歸臺閣丞相為備員魏吳蜀晉大抵異同宋齊有三臺五省之號梁世置戎抶之官擬雲鳥之義後周追復六典隋文還依舊制至煬帝有三臺五省五監十二衛十二府之名唐太宗有內外官制為七百三十員已有員外之置其特置同正員檢校兼守判知之類皆非本制軍功冗濫自後愈甚漢人事權未正漢以少府領天子之私藏宦者黃門共掌之漢制卿一人中二十石掌中服御諸物衣服寶貨珍膳之屬承秦之制凡山澤陂池之稅名曰禁錢屬少府世祖改屬司農漢官曰員吏三十四人也故稱少府田租芻藁以給經用山澤魚鹽而稅少府以給私用後漢以榖入司農錢入少府楊雄針實實少府奉養是供嗜不可不察欲不可不圗未嘗失之於約嘗失之於奢府臣司共而黃門令六百石禁門曰黃闥以中人主之宦者主省中諸宦屬少府武帝時咸陽僅言山海屬少府陛下不私以屬大司農佐贓毋將隆曰供養勞賜一出少府召信臣為少府奏請上林離逺宫館希幸御勿復膳供張奏省樂府黃門倡優諸戲及宫館兵弩什器減太半太官不時非法食物悉奏罷省費數十萬元帝時少府錢十八萬萬初元元年詔江海陂湖園池屬少府者以假貧民凡列侯至飲酎少府省金其內外相周之意非不善也然國用之制皆主少府其無節用財之權故召信臣悉奏罷省之其御史大夫位上卿秩千石在殿中蘭臺掌祕書外督刺史內領侍御史十五員受公卿奏事舉劾漢成帝更名大司空續置司空掌水土凡營城邑浚溝洫修堤防之事則議其利建其功且御史大夫內承朝廷之風化外佐丞相統理天下任大責重建安十三年罷司空復置御史大夫果前是乎果後是乎夫以一官綜理衆務恐不能悉分職司存而乃建置徒詳規畫徒泛名號職守紛紛無統亦何取於關雎麟趾之意也祖宗創革不同國初庶官只存空名元豐新制以階易唐人之階二十九國初之階十有五而元之階三十四蓋參錯二制損益之也左右之制置於元祐紹聖罷之惟存其五五者之名則定於大觀選人之制起於國初崇寧七階已定其四而三者之名更於政和此其建制之大凡也蓋國初懲藩鎮之弊詞官文臣出領外寄即曹卿監皆為虛名特以是窮祿秩班位序而權制不由終鮮慿陵之釁唐失天下之大體悉以一方軍國刑政委之藩鎮積漸既久至有不可易茍因其釁而欲易之彼則執符事推之其肯歸職與從命哉我朝鑒唐之失酌古之宜必有道矣祖宗因唐之制三省與唐為一而本朝召事不以大小並中書取旨門下復審尚書施行交相維而互相制不使其専此其意以為何如六曹與唐為一耳而分曹置局各有所掌互以其屬相承絲牽繩聨見其脈絡相通而不見其冗此其意為何如諫官所輔翊君臺臣所以糾劾百僚大抵皆出人主之親擢而廟堂之尊亦為之斂迹異時扶植公議根起弱勢社稷長逺終必賴之此其意為何如夫以漢仍秦之官制而用之以漢之意則為漢之精神本朝因唐之官制而用以我朝之意則為我朝之精神偶句髙宗論選用羣材有曰朝廷當為官擇人孝宗因進呈闕次有曰古者不為人擇官學士制誥以蘇公軾之才猶遲之閣門通事以李用和之子終斬之時政今日當重一相宰相一職古者號為三公蓋經邦論道之重非庶官百職之比自三公之外殆不可以妄居也而今也一宰相之職分為三省中書之造命門下之駁議尚書之奉行既各分其屬矣而密宥一府又分宰之兵權而専主之自是而下樞密掌兵矣而又有兵部焉工部掌役矣而又有軍器將作二監焉刑部曰掌刑棘寺又曰掌刑户部曰治財司農又曰治財禮部曰議禮太常又曰式禮紛紛藉藉之間無所統一得無冗散者乎嗟夫官制一也成周既倍於唐虞為今日又倍於成周其變愈盛猶江河之勢日趨於下蓋有不足怪者而其所當正者則宰相不可分也有能合東西二府而總司於一相然後罷九寺三監而總歸於吏部則庶幾綱舉目張而虞周之制復見於今日矣今日當事爵秩愚願今日不輕視人才重視爵秩常謹於授任之時而後賢者可至而不肖者可劾能者可勸而不能者可逺也誠知人才而不敢輕視也則必出除授之命者盡至公之心於謀謨之際而後可以助人主不敢輕人才之意則必中書行繳駁之任有任怨之心而無循情之舉而後可以逹人主不敢輕人才之意則必膺霜臺諫省之任者有徇公之心而無廢國法之事而後可以廣人主不敢輕人才之意彼得居是任者茍得為榮而蒙負乘之羞其或不能皆知義禮也則其榮辱輕重固不足論而所以講明吾國用人之意者不可不急圖也愚願聖天子無輕視人才之心則爵祿不期重而自重也結尾建官不如省官雖然建官固不可以不定冗官尤不可以不去蓋官無定制則格法為之不明官有冗員則廪祿為之虛費然則去冗官者今日第一義也昔荀勉建議於晉武之朝其言九寺可併於尚書蘭省宜付於省府王彪之進言亦以職事之修在於省官朝風之澄在於併職二君子之論官制蓋有可以為後世法矣官省則員有定制職併則祿無妄用雖隆古之法不過是也今日欲復古制請自削冗員始徇名不如務實雖然天下之事有名有實必也不徇其名専務其實而後可以定官制彼其實則殊其名則同雖名與古同祇虛文耳此漢唐之命官也彼其名則不足而其實則有餘雖名與古殊猶良制也此成周之命官也不然元魏王圭常準古六卿以見六謁如斯之意胡為而不古西魏雖公卿之號爵位之級同於古人而實則異於古人彼其以為名者所謂側而視之此愚所以展轉於成周之思而秦漢以下則何足以言官制哉故曰欲觀古道當審今日羣書會元截江網卷八
