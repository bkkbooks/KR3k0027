body:
  text: 羣書㑹元截江網卷三十二象山事實源流先生姓陸諱九淵字子靜撫州金溪人生有異禀端重不伐䆒心典籍見於躬行三四歲時侍宣教公忽問天地何所窮際公笑而不答遂深思至忘寢食讀書不茍簡勤於考索伊川近世大儒學者尊敬講習不替先生獨曰丱角時聞人誦伊川語自覺若傷我者亦嘗謂人曰伊川之言奚與孔孟之言不類初讀論語即疑有子之言支離讀書至宇宙二字忽大省曰宇宙內事即已分內事已分內事乃宇宙內事又嘗曰東海有聖人出焉此心同也此理同也西海南海北海有聖人出焉此心同也此理同也千百世之上有聖人出焉此心同也此理同也千百世之下有聖人出焉此心同也此理同也又曰今天下學者惟有兩途一途朴實一途議論自少時聞靖康事慨然有復仇之義訪求智勇之士與之商確益知武事利病形勢要害人物短長貴溪有山先生登而樂之結茆其上山形如象遂名曰象山號象山翁知荆門軍故事上元設齊醮為民祈福先生㑹吏民講洪範斂福錫民一章以代醮事楊簡發本心之問先生舉是日扇訟是非以答簡忽省此心之清明忽省此心之無始末忽省此心之無所不通先生之心非口說所能贊述所可言者日月之明先生之明也四時變化先生之變化也天地之廣大先生之廣大也鬼神不可測先生之不可測也欲盡言之雖窮萬古不可得而盡也雖然先生之心與萬古人之心一貫無二致學者不可自棄楊簡撰行狀諡文安偶句聞誦伊川語知與孔孟之言不類初讀論語書即知有子之言支離太極之外斷然謂不復有無極西海聖人大省其同理而同心讀宇宙而自省此頓悟之妙也舉扇訟而答人此開示之機也著書立言學問之要在得其本心心之本真未有不善有不善者非其初然也袁燮文集序念慮之正不正在頃刻之間念慮之不正者頃刻而知之即可以正念慮之正者頃刻而失之即為不正此事皆在其心書曰惟聖罔念作狂惟狂克念作聖然心念之過有可以形迹指者有不可以形迹指者常人不能知此等處又未足論世固有兩賢相值而不相知者亦是此處如老泉之於王臨川東坡之於伊川先生是也堯舜文王孔子四聖聖人之盛者也二典之形容堯舜詩書之形容文王論語中庸之形容孔子辭各不同誠使四聖人者並時而生同堂而學同朝而用其氣禀德性所造所養亦豈能盡同至其同者則禹益湯武亦同也夫子之門惟顔曽得其傳以顔子之賢夫子猶曰未見其止孟子曰具體而微曽子則又不敢望顔子然顔曽之道固與聖人同也非特顔曽與聖人同雖其他門弟子亦固有與聖人同者不獨當時之門弟子雖後世之賢亦固有與聖人同者非獨士大夫之間有與聖人同者雖田畝之人良心之不泯發見於事親從兄應事接物之際亦固有與聖人同者指其同者而言之則不容强異然道之廣大悉備悠久不息而人之得於道者有多寡久暫之殊而長短之代勝得失之互居此小大廣狹淺深髙卑優劣之所從分而流輩等級之所由辨也茍無所蔽必無所窮茍有所蔽必有所窮學必無所蔽而後可主於道則欲消而藝可進主於藝則欲熾而道亡藝亦不進以道制欲則樂而不厭以欲亡道則惑而不樂有有志有無志有同志有異志觀雞與彘可以辨志縶猿檻虎可以論志人心至靈此理至明人皆有是心心皆具是理道行道明則恥尚得所不行不明則恥尚失所恥得所者本心也耻失所者非本心也聖賢所貴乎耻者得所耻者也耻存則心存耻忘則心忘求處情求處厚求下賢欲行浮於名恥名浮于行邪正純雜係念慮清濁强弱係血氣後世知有事而不知有政知責詳於法而不知責詳於人並文集諸儒至論朱晦庵曰陸子靜說良知良能廣充四端之類不可謂之不是然求本而遺末其弊至於合理㑹底事却理㑹不得遇事無所據依語録問象山師承曰他天資也髙不知誰師然不問師傳人學多是就氣質上做便解偏了同上志公和尚頌云不起纎毫修學心無相光中常自在此陸子靜除意見之學也除意見三字誤天下學者自堯舜相傳至歷代聖賢書冊上並無此三字熹謂除去不好底意見則可若好底意見須是存留同上某向與子靜說話子靜以為意見某曰邪意見不可有正意見不可無問陸象山道當下便是先生云看聖賢教人曽有此等語無聖人教人皆從平實地上做去如所謂克己復禮天下歸仁直須是先克去己私方得豈曽說箇當下便是底語陸子靜之學他自是胸中奈許多禪何看是甚文字不過假借以說其胸中所見爾子靜說話常是兩頭明中間暗或問暗是如何曰是他那不說破處他所以不說破處便是禪陸氏之學只是禪後生不登其門便學得不遜無禮出來極可畏時舉問釋氏有豁然頓悟之說不知使得否先生曰某也曽是叢林中有言頓悟者然後來看這人也只尋常如陸子靜門人初見他時常云有所悟後來有所為却更顛倒錯亂陸子靜不讀書不求義理只靜坐澄心却似告子外義陸子靜楊敬仲有為已工夫若肯䆒理當甚有可觀惜其不改也若陸氏之學某道他斷然是異端斷然是曲學斷然非吾聖人之學並語録孔煒諡議曰公與季兄復齊講貫理學號江西二陸其學務窮本源不為章句訓詁惟孟軻氏書是崇是信蓋謂此心之良天所與我信能知此則宇宙無非至理聖賢與我同類大端既立趨向既定此心之靈此理之明將渙然釋怡然順元臣碩輔或薦進其心悟理融出於自得或稱美其治郡善政司驗躬行丁端祖覆議曰象山陸氏者自非用時聞人誦伊川語嘗曰伊川之言奚為與孔孟之言不類初讀論語即疑有子之言支離長而講學論及太極斷然以太極之上不復更有無極並諡議吳杰曰二諡議一以為學得孟氏一以為學非伊洛真得先生之心至論也主意議論門庭講明道學各伸己見前輩有不同之議論主張道統共闡聖傳前輩無不同之門庭知其有不同之議論則復齊尊程氏之學象山辨伊川之言不可混而為一矣知其無不同之門庭則二程濓溪之同歸二陸伊川之異趣不可分而為二矣何則先覺大儒後學南針遺言緒論千古北面謂宜鑽堅仰髙同一步武傳芳接響同一音調或研精覃思於場屋擯棄之餘或立論辨疑於羣儒宗仰之日其趨向吻合者固有夫子韋編三絶之氣象瑕瑜不掩者又得孟氏武成三䇿之意脉要知彼固非私倣像以寄藩籬此亦非肆詆訶以角矛楯皆相反相成以為講明斯道計耳乃若壇宇自任本非名媒標幟一立已為爭府當知繼聖脉絡無二淵源為道津梁無一途轍若或指某學為某之門户認某說為某之流𣲖占甲之袒則排乙為異端操乙之戈則攻甲為曲學遂使實學廢而虛談心傳易而口實助勝崇私豈知其皆為主張斯道訃哉嗟夫議論雷同隨聲逐影後學不可以此觀前輩也門庭日異見的援弓前輩亦不以此望後學也知其議論之不能不異又知其門庭之本無不同則執事所詢二陸先生之學有可得而言矣自信自得鵝湖泓迤學者川航先生之於伊洛也有自信之真象峯崒嵂鄊人山斗先正之於伊洛也有自得之妙是二者其實耳大矣哉自信之功乎覺無先後世有古今嗽餘潤而沉㴠挹遺風而企慕陳編可按不以私意而立幟格言可味不以時論而倒戈寧紬繹其辭而不使之棄於土梗寧推尊其說而不使之玷於簡書夫是之謂自信至矣哉自得之趣乎靈扃中啓獨見內融超往哲之髙蹤轢前賢之逸駕筌蹄可忘不狥於形迹之末脉絡可貫不拘於慕倣之間人見其矛盾也而理之所到者終於同歸人見其枘鑿也而義之所趨者終於一致夫是之謂自得是以自信者非茍同也慕道之心為甚篤仰道之意為甚堅故凡見諸話言者寧佩服之無忽略之寧主張之毋訾毁之豈若關中諸儒托為師說以尊師道而適以纍伊川也哉自得者非茍異也覺道之機為甚敏得道之見為甚髙故凡寓諸講貫者寧體認之無剽切之寧審訂之無輕徇之豈若郭忠孝輩黨事一起不相往來而甘於叛伊川者哉知乎此則二陸之學可以辨明矣㑹道以心視聽言動由乎禮人曰顔子之學然也而不知其學得之於屢空之時髙明廣大加之意人曰曽子之學然也而不知其學得之於一唯之際蓋身以道而立道以心而悟此心清明則其道亦從而昭晣此心蒙蔽則其道亦從而晦冥心之所在即道之所在也宋德當天奎星炳耀大江之西金溪之上有異人出焉象山先生之學其諸學者之北辰歟先生之道其諸學者之太嶽歟日用飲食此道也立身行巳此道也上而啓沃君心此道也下而切摩同志亦此道也儒為正學釋特異端儒釋之分不可不嚴義根公理利出私情則義利之别不容不判遏俗學之橫流援天下於既溺人曰其道為隱而不知其為著也人曰其道為邈而不知其為近也先生發之如指迷途先生正之如藥久病夫豈無自而然哉良以先生一心表裏清明神采照映動靜一體應用無方太極之妙融於中扄無極之妙洞照胸次自非方寸內融見理昭徹其焉能立吾道之幟左吾道之袒使當時後世尊其道慕其學哉故曰身以道而立道以心而悟者此也警段論二陸不相侔二陸先生英偉竒特一則伏讀故編而得其㫖一則聽誦遺言而訝其非則是復齊慕程氏之有可尊而象山置伊川為不足法矣吁不然也前輩吐談各有指趣童心淺識豈易測窺復齊當道學廢棄之時而獨程氏之說可謂不移於俗象山當洛學盛行之際而力辨伊川之言是正欲扶其偏蓋復齊之處鄊校也厭晉魏風流之習起浩然歸來之思其於不傳絶學先覺緒言誠所敬慕彼一尊尚之餘一委心之頃必有所見固非茍以程氏學為緣飾為標致也象山之立教也恐人以文義蔽道真以意見蝕天理其於持敬之說釋經之㫖容有不合彼不類孔孟之說自覺傷我之說殆有所指必非盡以伊川語為不類為傷我也愚謂程陸之議論不當玩之以口耳而當悟之以心可也與二程不相異二程先生玉色金聲渾然天成規矩凖繩允矣君子二程先生為時師表簡易工夫塤篪相應精微基址棣萼相輝濓溪得二程金溪得二陸來從伊洛流及江西人孰不以為在此切謂復齊之學出於自信者也象山之學出於自得者也何以言之復齊嘗與人書曰進學節序惟聖賢能知之其餘則信聖賢之言此其為意蓋謂道散乎書而符印貴乎默合也故遺書所傳人多捨之而我則含咀其英華一時所擯人多從之而我則宗盟其議論先生之為此者非異衆而獨立也非矯時以干譽也特謂吾之自信不過若是蓋有不能奪其好耳象山嘗與人書曰前輩多戒門人無妄録其語言為其不能通解必失其實此其為意蓋謂道隱於心而機括貴乎自通也故觀其言者人多行之而我則慮其異洙泗之風誦其語者人多信之而我則懼其為簧鼓之說先生之為此者非浪肆於雌黃也非輕為於品藻也亦謂吾之自得自有到處蓋有不能已於言耳大扺先儒之道固不可以異户也然疑而必辨亦不害其為致知先儒之論固不可以左袒也然和而不同亦不害其為審問誠敬入門非伊川乎力行之方以敬為要在復齊既同之矣而存誠持敬須為辨析則象山亦無異轍也即事明理非伊川乎遇事觸物有所發明在復齊既同之矣而實理實事力為議論則象山亦無異㫖也前輩嘗謂復齊漸進象山頴悟其得之矣復齊象山非禪象山先生推尋統緒揭以示人其宗㫖不出乎本心而其用工之地則以簡易為要法故其言曰雖田野之人良心不泯亦有與聖人同者又曰得其本心養而無害則誰得而禦之此其宗㫖也論近世學者之病以為意見不實自作艱難論太極數書曰具有疑於架屋下之屋安床上之床則其要法又可見矣復齊先生相與講明可無異㫖鵝湖之詩塤篪之應象山曰斯人千古不流心而復齊則曰百聖相傳只此心於此可見二先生之宗㫖矣象山曰簡易工夫終久大而復齊則曰著意精微轉陸沉於此又可知二先生之要法矣或者致疑於先生之說則有疑其近禪者有疑其守空者不知本心之說出於孟子簡易之㫖傳於易系是豈先生自為說哉象山非禪象山之所謂頓悟者亦非曰即心是法超然徑詣如禪宗者流也誠有見夫德性之不尊則禮儀威儀皆為外物大者之不立則勉强聞見皆為虛文良心內存衆妄漸滅一真有覺萬境春融由萌蘖之生而至於枝葉扶踈非二本也由源泉混混而至於放乎四海非二物也故曰此心本靈此理本明幡然而改沛然而莫禦又即其所謂一日克己復禮天下歸仁者而標的之此頓悟之說所以表暴其自得之學也結尾學見於用雖然有實學有實用二陸先生之實學既敬陳之矣而其學之見於用者試略為執事誦之新學校之規繩繩乎紀綱主鄊社之兵井井乎條理復齊之學非迂濶之術也聞靖康之事而起復仇之心畀荆門之壘而驗躬行之化象山之學非髙虛之論也惜也所用不足以䆒其所藴耳今之君子習熟先儒之議論而惜之於用則踈出入先儒之門庭而施之於時則戾遂使道學能使人重而不能使人愛功利能使人淡而不能使人忘是誰之過歟噫瞻彼臨汝維水決決山川炳靈風景如昨其必有聞二先生之風而卓然為之興起者學宜用力流風未逺遺響其存試一旦以身體之以心㑹之則久大工夫孰為簡易浮沉事業孰為支離有基方築室果孰為之基無址不成岑又孰為之址東探禹穴而窺王淵此舞雩詠歸之氣象也今尚可想見乎獨酌蟾光長吟野色此弄月吟風之㫖趣也今尚可想見乎果能有得於斯則羮墻皆堯衣裳皆孔况二先生之雅言粹行固非寥邈者也不然則碌碌以科舉之塵洋洋以赴利祿之波德之不修學之不講而居陸氏之鄊誦陸氏之言其有靦顔面多矣承學方將以自警不識執事其謂何學有見毁雖若名者忌之府譽者毁之端也馳騁乎道德之輿遊息乎禮義之府先生操履非不正也而或者且有斷是異端之機披閲乎百家之編吟求乎六藝之文先生講論非不勤也而或者且有不求義理之誚嗟天寒暑之公民亦曰咨天地之大人猶有憾以夫子之聖而叔孫毁之以孟子之賢而臧倉排之於先生乎何損羣書㑹元截江網卷三十二
