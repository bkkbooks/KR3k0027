body:
  text: 羣書會元截江網卷九會財厯代事實周司會掌國之官府郊野縣都之百物凡在書契版圖者之貳以逆郡吏之治而聴其會計以參互攷日成以月要攷月成以嵗會攷嵗成職内凡受財者受其貳令而書之及會以逆職嵗職嵗凡上之賜予以叙與職幣受之及會以式法賛逆會職幣詔上之小用賜予嵗終則會凡邦之會事以式法賛之並禮天官孔子嘗為委吏曰會計當而已矣孟子漢宣帝詔曰上計簿具文而已務為欺謾以避其課本紀唐故事天下財賦歸左蔵太尉以時上其數尚書比部覆其出入第五琦悉皆歸大盈庫主以中官自是天下之財悉為人君私蔵有司不得程其多少唐志憲宗即位二年宰相李吉甫撰元和國計簿鳯翔淄青等十五道七十一州不申戸口其賦稅倚辦止於浙江東西宣歙淮南江西岳鄂福建湖南八道四十九州一百四十四萬戸比天寶税户四分減三天下兵仰給縣官八十三萬餘人比天寶三分増一大率一戸資一兵其水旱所傷非時調發不在此數通鑑計臣司會注會計官之長禮天官漢張蒼為計相一月更以列侯主計以列侯居相府領主郡國上計者本傳魏太始置度支尚書唐度支員外郎掌天下租賦物産豐約之宜水陸道途之利嵗計所出而支調之百官志後唐明宗長興元年以張延亮行兵部尚書充三司使班在宣徽使之下三司有使自延亮始五代史充三司使韓絳上治平會計六卷神宗熈寧二年富弼曰内中取索及兩宅請俸以至土木興作等費不一並宜置局會計漸節不給之用上改容聴納熈寧七年詔三司置會計司以宰相韓絳提舉哲宗元祐元年戸部乞諸路轉運司會計自熈寧以前嵗入幾何嵗用幾何要以省不給之用從之三年蘇轍言編成元祐會計録大扺一嵗天下所利錢穀金銀幣帛等物未足以支一嵗之出藏庫見錢費用已盡願明勅本部量加裁損六年三省言諸路戸口財用雖戸部每年考會總數即未有比較進呈之法今令諸州每年申轉運司以二月上戸部本部上尚書省類聚進呈並長編髙宗紹興五年臣寮言請選委詳練財賦之官効景徳元祐撰集會計録九年上曰所積錢物盖欲備不時之須卿等可令戸部會計每嵗經常之費量入為出而善藏其餘自非饑饉師旅勿得妄有支動孝宗乾道二年御筆云自後每月初五日國用方開具前月支過已上請給數目外路軍馬可降式様付諸路總領開具非泛支用自此遂為定式並聖政十一年上諭宰執每月財賦冊今後更令進入欲知増減會要計臣太宗開寶二年詔曰比設三司用權邦計得其人則公私共濟曠其職則利害難分淳化四年三司使魏羽請依唐制分天下州縣為十道兩京為左右計置三司使兩員又以董儼為三司羽主其左儼主其右五年詔罷十道左右計後置三部使以總計使陳恕為鹽鉄使王延徳為度支使張鑒為戸部使陳恕峭直守公上題殿柱曰真鹽使陳恕真宗咸平元年三司上經費之數六年陳恕在三司前後十數年究其利病條例多所改創徙他官薦冦凖可用凖至檢所改創事類為萬冊曉諭榜貼悉以新板别書請恕書之故三司多循恕舊自凖始也長編上謂王旦曰三司官不欲數易財糓案籍往往不見本末寶訓仁宗景祐元年程琳在三司尤謹出入禁中有所取輒覆奏罷之慶歴六年王堯臣主計凡三年前使姚仲孫借内庫錢數百萬不能償堯臣悉償之而軍國之計猶沛然有餘嘉祐元年始張方平主計京師有三年粮至是粮減半因畫漕運十四䇿宰相富弼讀奏上前晝漏盡十刻上太息稱善弼曰此國計大本非常奏也悉如所啟施行英宗治平二年韓絳權三司凡宫中所用財費悉以合同憑由取之絳請有例者悉附有司於是三司始得會計神宗熈寜七年詔三司置會計司髙宗紹興五年沈昭遠乞乆任計臣上曰祖宗時三司使如陳恕最為乆任今内外計臣倘能稱職但就加爵秩以寵褒之不須數易乾道二年命宰相兼制國用使五年罷國用使八年正宰相名更不入銜雜記偶句提舉會計則有韓絳編類會計則有蘇軾所出多於所入則會計於皇祐欲量入以為出則會計於紹興景徳會計錄進於丁謂而志在獻諛皇祐會計錄上於田况而志在輕賦令戸部會計出入而善藏其餘者髙宗也令戸部樽節出入而使無滲漏者寧宗也比設三司用權邦計開寶之詔也聖意在於得人嵗計所須報總計司淳化之詔也聖意欲其置籍經傳格言冡宰制國用必於嵗之杪五穀皆入然後制國用用地小大視年之豐耗量入以為出王制三年耕必有一年之食九年耕必有三年之食以三十年之通制國用名臣奏議量入為出慶厯二年張方平奏乞選才敏之士就三司據國用嵗計之數量入以為出平貨物之輕重通天下之有無所冀助國計舒民力當今之切務也長編斟酌大計立定制仁宗時范鎮請考祖宗逮天聖中吏員及賦入之數著為定制又請中書樞密院考正祖宗自建隆至寶元官吏之禄廪四夷之嵗賜兵馬之屯成而斟酌之又言乞敕大臣考兵數官數與夫賦入之數立為經制又言欲令中書與樞密院三司通知兵民兼與樞密三司量其出入以制國用又言宜勅大臣及三司具天聖中賦入與官兵若干及見在賦入與官兵之數約取中道立為經制以七分給兵三分備非常編年請置緫計使嘉祐三年司馬光言食貨者天下之急務今宰相不以為憂意者以為非已之職也臣願陛下復置緫計數之官使宰相領之凡天下金帛錢穀𨽻於三司於内藏庫奉宸章之類緫計使皆統領之小事則官長専逹大事則謀於緫計使而行之嵗終則上其出入之數於緫計使量入以為出若入寡而出多則緫計使察其所以然之理求其費用之可省者以奏而省之必使嵗餘三分之一以為儲蓄備禦不虞凡三司使副使判官轉運使及掌内藏庫奉宸庫之官皆委緫計使察其能否考其功状而奏而誅賞之若緫計使乆試無効則乞陛下罷退其人更置之若舜舉八愷使主后土奏庶艱食􅅷遷有無周禮冡宰以九職九賦九式九貢之法治財用唐制以宰相領鹽鐵度支戸部國初亦以宰相都提舉三司水陸發轉運使等是則錢榖自古迄今皆宰相之事也計臣當乆任司馬光上言財用所以匱乏者由朝廷不専擇曉錢榖之人也國初三司使或以諸衛将軍諸司使為之判官則朝士曉錢榖者皆得為之不必用文辭之士也夫官乆於其業而後成功乆為其事而後稱職是以古者世官相承以為氏姓先朝陳恕在三司十餘年至今稱能治財賦者以恕為首豈恕之才智獨異於人哉盖得乆從事於其職故也近嵗三司使副使判官大率多用文辭之士為之於是有以簿書為煩而不省以錢榖為鄙而不問者矣又居官出入遷陟有如郵舍如此而望太倉有紅腐之粟水衡有貫朽之錢臣未知其期也凡百官莫不欲乆其任而食貨為甚何則二十七年耕然後有九年之食今居官者不滿二嵗安得有二十七年之効乎乞集會計錄紹興五年臣僚言比年以來財賦浸虛用度滋廣正宜括嵗入之厚薄因計嵗出入之多寡分其品目别其名色搃貫旁通載之圖籍名曰會計録量入為出庶幾國用有制偶句司馬公之言國用當以冡宰統其權范公鎮之論生財請以中書制其用量出入以制國用則建言於至和范鎮攷出入以廣儲蓄則奏疏於紹興二十六年諸儒至論周司會之權重鄭郎卿曰周制天下之財皆入令於太宰而緫於太府其五府則専掌王之器物王之服食好賜其内府則受貨賄兵器以待邦之大用其外府則掌邦布之入出以共百物以待邦之小用至於司會則惟緫其會司書則惟主其書職内則惟量其入職嵗則惟稽其出職幣則惟振斂財幣之餘與夫司裘掌皮纎悉有會是自太宰以下其出納移用之權盡搃於太府而司會至掌皮則不過糾察稽考之而已然太府則下大夫為之長而司會反以中大夫為之則其職之專其權之重而不為太府之所壓制者可知矣自今以司會而下考之所謂職内職嵗司事職幣司裘掌皮亦均之為理財也宜属於太府而皆司會主之司會之權不重乎太府頒其貨於受藏之府頒其賄于受用之府凡掌財用財者無不於太府受財會而詔之及冡宰廢置乃司會主之司會之權不亦重乎司會司書皆一體也司會掌六典八法八則之貳司書亦掌六典八法八則之貳夫六典以治邦國八法以治官府八則以治都鄙乃宰相之職業而太宰之所以佐王者也貳之以小宰固其勢之當然彼司會司書亦得以貳之司會之權不亦重乎夫惟司會之權重則糾察釣考之勢得以行於諸府之中事不至於欺偽用不至於乾没數不至於虧耗國計不匱而法則各得其所矣漢唐會計無法鄭郎卿曰漢興之初亦嘗少得此意故以蕭何為相國而以張倉為計相計相之權即司會之遺也命名由相則其權位為甚重掌計而不掌財則其稽攷為甚公使漢人能守此制夫誰曰非古然其遷計相也止於一月其更計相而為主計也又止於四嵗由是以後主計之名與職俱罷矣司農少府各自受天下之財入而三公之属又有倉曹以主倉榖有金曹以主鹽鐵貨幣又自分司農之財而有之而會計之官獨無聞焉厥後光武歸禁錢於司農歸水利於少府歸鹽鐵於郡國意善而治不精故章和以後改司農之平凖而名以中凖取少府之所掌而列以為監又盡用官人以領之則士大夫之間無有預知財計者矣李唐雖有度支而𨽻於三司國朝雖有磨勘司而亦𨽻於三司使未免有奉承黨比之風而無檢括防閑之意嗚乎烏得成周之司會以窒其滲漏之弊歟西漢財多滲漏鄭郎卿曰西漢之財物充羡吾不知何者為充羡也况又有鹵莽蔽匿之弊乾沒滲漏之弊乎盖嘗觀之中尉脱卒動數萬人樂安隠田幾四百頃闗東流民無名者四十萬少府陂澤多為貴戚冐墾版籍甚不明而口筭田租所入甚無數也近税武闗以給守卒遠田車師以給過使公車索米於長安掖庭出批錢以養宗室郎官出私錢以市財用劑劵甚不明而廪祿所給甚無定所也會稽計簿三年不上内史假貸租多不入東郡官錢收散至千餘萬乘傳而行郡國矯賦至六百萬課最不嚴而州縣所供甚鹵莽而無定期也乘輿賜謁取給大農大農錢盡續以少府平陵工作取諸水衡科用經費甚而不常而緩急所移用甚紊亂而無定制也以至無額雜賦羡租之積尤為泛然無絃如免罪之錢儲於北軍無名之錢儲於郡内卒吏之錢儲於州郡廪犧之錢寄於馮翊軍市之租委於邊吏則其渙散尚有未易究者職掌之官吏出入之司存尤不聞有奉公㢘平者糴邊穀百萬而虚數至六十萬觓就民牛車而增價至三千萬甚者或私僦賔客而入多逋負則其轉輸侵籍尚有未易悉數者盖自漢初廢計相之官公卿不知錢榖之數是以人主肆其侈於上人臣肆其欺於下而民獨被害於其間以至若此其極也財用古未有比葉適曰嘗試以祖宗之時所入之財比於漢唐之盛時一再倍矣熈寜元豐以後隨處之封椿役錢之寛剰青苖之倍息比治平以前數倍矣而蔡京變鈔法以後比熈寧又再倍矣王黼之免夫至六千餘萬緡其大半不可稽考然要之渡江至於今日其所入財賦比宣和又再倍矣是自有天地而財用之多未有推今日之比也然其所以益困益乏皇皇營聚不可一朝居者其故安在財計古今未有葉適曰今天下之財其餘緡錢者茶鹽㩁貨已二千四百萬矣經緫制已千五百萬矣上供和買折帛已千餘萬矣又若計四川之錢引已三千三百餘萬矣古無有也不特古無有也宣和以前無有也今畧計戸部之經費為千五百餘萬此祖宗盛時一倍之用也至於以六千餘萬供四屯駐之兵此開闢以來所未有也漢之上計具文錢文子曰漢上計之法各記其戸口墾田錢榖出入盗賊多少每嵗各上其簿丞尉詣郡校課其功嵗盡遣丞吏上計於京師而以其副上丞相御史漢之責丞相以課吏不為不嚴矣然膠東偽増流民戸口至八萬餘而王成反蒙顯賞臨淮郡界誤至减田四百頃而康衡自領計簿不能止是未免於具文也製度論主意有攬權分權之殊會計之權無所撓則國用雖窮而復通會計之權有所分則國用欲豐而反匱盖事力之未裕固今日之隠憂也利權之未一尤今日之大患也何者國家大臣所賴以經制國用剸裁邦計者也誠使權綱獨緫會計有方則操縱之適其宜把握之得其道則宫闈無横費朝廷無泛恩官府無濫予軍旅無冗支歛散出納之有其式匪頒賜予之有其常則雖處國家多事之時初未見其有匱乏之憂也茍或權柄少分會計無䇿則要索於宫闈者有求而必予干請於朝廷者有禱而必從官府之費愈増軍旅之實不覈泛泛然聽國計之自為盈虚消息縱使多方調度百計經營而終於國貧財蠧果何時而可紓乎有計財生財之異有計財之謀有生財之道計之者非難生之者不易也徒知銖較寸量以嚴夫會計之權不知去奸剔蠧以盡夫經理之道吾恐財非天雨鬼輸安能無故而自足哉出納之吝謂之有司會計之當斯為委吏財固貴乎能繼也然參之定數筆之成書昔豐今耗披編而具見彼歛此散按圖而可知森而條目整而鞭筭其計之者豈不易太平六典理財居半箕範八政食貨居先財貴乎能生也大而軍國小而郡縣弊端蠭起左支右傾罅隙蝟興東窒西漏利未致而害隨政未修而蠧起其生之者豈不難歟警段會財而耗財嗚乎財云財云會計云乎哉今會之内庫則修内司之支撥憑内司之宣取昔胡為而儉之今胡為而奢會之右帑則宗廟朝廷之奉百司庶府之供昔胡為而約今胡為而豐會之外路則茶鹽泉舶之支吾籓方列郡之供給昔胡為而殺今胡為而隆取之盡錙銖用之如泥沙竭彼膏血饜此溪壑果何説哉偶句會天下之財易理天下之財難搃財計之數者存乎書掌財計之書者存乎人昔豐今耗披編而具見彼歛此散按圖而可知一札渙頒會計是急非虚文也一司鼎剏會計為名非美觀也上以恤民為心則會計乃節用之端上以取民為心則會計乃増賦之地事證成周得會計之道以周官之法攷之其司則司會司書其府則大府内府外府其職則職内職嵗職幣無一不於冡宰掌之凡邦用之出入受財之會計無一而不會焉今以周公之制推之則内而王宫外而邦國吾見其會於受藏受用之時矣貳令之受式法之受吾見其會於賦入賦出之初矣膳羞服御之微麻縷絲枲之細吾見其會於日成月成之限矣彼會於一嵗之抄者會其成也此會於平時之素者會其常也得非立均節財用之規模者乎周漢有得失之分善理財者莫如周不善理財者莫如漢周人理財之責委諸司會而寔歸之太宰之緫統會計之籍掌於司書而寔由於太宰之考核嵗終受會大計羣吏體統正也版圖名數周知出入計簿明也玩好匪頒均節有式防後用也參互月要廢置自我嚴奸欺也若是則財安得而不豐漢自計相之職廢而丞相不知錢榖出入之數計簿具文而三公至勤詔書督責之嚴於是膠東戸口偽増萬餘莫得以察其欺内史假貸租多不入莫得以絶其奸乘輿賜謁多給大農大農錢盡或續少府則移易之弊莫禁糴邊粟者或張虚數僦民車者或至増價則贓貪之利莫戢若是則財安得而不匱唐朝之本末唐自太宗立法舉天下之財盡入於左藏太府又有比部以撿覆之殿院以臨莅之度入以量出之則搃核之計詳矣然自兩税之目興而中年之用度已數倍於始自無名之歛起而元和之計簿已無救於汚吏甚至故事相仍兵革繼起財賦衰耗頗為豪将所取而進奉羡餘移用頻借尚安以計為也我朝之源流錢榖之數屢趣不進君子曰陳晉公正人也會計之録一語輒二君子曰丁晉公佞人也嗟乎此善論也而猶有遺論也貫朽粟腐侈心之階公私單竭儉徳之媒時方承平府庫充羡為陳恕可也為丁謂不可也財匱矣而君不之知民病矣而君不之聞於此時而曰吾學陳恕不學丁謂君子其以我為隠乎祥符之會計録上於林特天書成矣熈寧之旁通簿置於安石新法行矣之二子者可與丁謂並言也皇祐之錄不上於田况則所出多於所入其誰知之元祐之録不作於蘇轍則一嵗之入不足計一嵗之出其誰言之二子者獨可與丁謂並論乎昔者切聞之淳化天子方帳式之来上也慨然曰費用若此民力乆何以堪紹興大臣方計簿之未集也作色曰此年周度滋廣宜括嵗入之厚薄計嵗出之多寡噫天下之時困竭乆矣人主不可不知其故也今之君子為陳恕乎為丁謂乎是未可知也時政非泛之費不可會知今日吏牘之来上者可會而王之宫室可得會乎版曹之編類者可會而上之賜予可得會乎千百千萬之數可會而江河之漏泥沙之用可得會乎盖令都省之大不可會者二内而宫壺不可會外而閫餉不可會紫宮紺宇金璧璀璨徒聞昭應之充使不得會之於平時則會之於一時者具文耳熏腐貂璫賞賜濃郁不聞内降之封還不能會之於未用則會之於已用者虚籍耳貴近之費不容會今宫禁之出内未必與聞於宰相北司之用度未必闗白於南司聞鄧通之錢徧天下矣而宫正之月終會稍食則未之聞也聞宋娥之封千萬計矣而内宰之會内宫之財用則未之聞也聞有無名之錫賚無藝之排當廣殿凉館土木爭用羽宮梵室金璧相輝者矣而賜予之叙於職嵗工事之節於九式則未之聞也節財生財用財之多莫甚於今日取財之極亦莫甚於今日漏巵之受無已張弓之弛無期上下煎熬幾年於此且曩者亦嘗繼會計錄矣今又剏財用矣愚不知為此者将以生財歟将以節財歟如欲節財也不知會計鈎考之臣所省者果何事所除者果何名乎如欲生財也則民生已竭不可重歛地力已耗不可苛求收拾竒略推排𤨏屑所得錙銖怨已立山矣履畝征商之事故轍未遠也又可復蹈之乎理財裕財今日會計有録國用有司必命大臣以掌之必使㢘吏以任之用以理財可也假以聚歛不可也将以裕國寛民力可也求以填溪壑飽嚢槖不可也庶幾一國之血脉流通一國之精神强壮雖不待韓琦之言而宫掖之費自省雖不必李諮之言而末作之費不浮雖不俟路公省兵之機温公罷賜銀絹之奏而生財自有道矣用廣用狹今日之財用其入也有多寡則吾用之亦隨其多寡其生也有損益則吾理之亦因其損益有如成周之隆平國初之全盛此易所謂大有之世也故其用財也當以用廣之規模今日之鎡基東南之事力此損所謂二簋可用之時也故其用財也當以用狹之規模其用廣者非過奢也因其所入之豐而為之區畫耳其用狹者非苦節也因其所産之薄而為之調度耳結尾得人以足國用雖然出納之吝謂之有司得人會計又今日第一議也祖宗外置轉運司以漕一路之賦内置三司使以緫天下之財利權不分其盈虚登耗可得而攷也自王安石用事罷三司而為戸部舉三司之務散在六曹及諸道監利權不合耗散四出而不可攷矣合版曹名額不知其幾更一費則剏一司剏一司則増一弊職愈多而權愈散官愈冗而財愈耗矣邇者會計有錄國用有司必命大臣以掌之意其委任既専調度必至然差官置局名色雖多足國裕民未聞有道愚願今日以祖宗用人者用人以祖宗致利者致利将見公私之積暴若丘山貫朽粟陳特餘事耳否則不信仁賢則國空虚孟子之言驗矣愚敢以是而謝師問會財以善君心雖然究財用之弊固所以善君政會財用之數亦所以善君心何者有無必知仁儉之心所由起也虚實必見節納之念所由生也慶歴之入多於所出觀其數者知其無妄用之失元祐之出多於所入觀其數者知其有輕用之弊陳公恕不上錢穀之數於充羡之時惟恐起其君侈汰之習李惟清上度支帳於民困之日必啟其君簡省之念皆所以善君心也君心既善然後隨事而處之可也財用以裕邦計雖然財固當會也用尤當節也何者九重之玉食可也而貴近之家醤酒藿肉何如哉宫庭之帷帳可也而閭閻之屋綉牆縁履何如哉尺籍伍符所以蓄積鋭也胡為侏儒驕脆者亦耗衣糧鐘鳴鼎食所以待勲徳也胡為曠官尸位者亦縻廪食朝廷行節約之徳而士大夫有和玉隨珠之富公帑無羡餘之藏而私室有嚢帛櫃金之積是皆上之所當嚴其簡汰之方下之所當行其節約之意者也韓公琦欲省宫掖之費張公方平欲示臣下以儉司馬公以為國用不足在於用度太奢曾公鞏以為用之無節則天下雖富而易貧數公者一代偉人也其於理財若有過人之見反覆論下不過於節用之一説今日其思之羣書會元截江網卷九
