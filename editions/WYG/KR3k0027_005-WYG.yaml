body:
  text: 羣書㑹元截江􅃠卷五儲積附常平倉豐儲倉義倉倉社倉廣惠歴代事實堯有九年之水湯有七年之旱國亡捐瘠者蓄積多而備先具也前晁錯傳公劉乃積乃倉乃褁餱粮詩公劉武王發鉅橋之粟書武臣成王遺人掌邦之委積以待施惠鄉里之委積以恤民之艱阨闗市之委積以養老孤郊里之委積以待賔客野鄙之委積以待羇旅縣都之委積以待凶荒倉人掌粟之藏以待邦用若不足則止餘法用有餘則藏之以待凶而頒之禮宣王王命召伯徹申伯土疆以峙其粻詩管仲曰市有新成田者二家君請式壁而聘之行令半年萬民為囷以藏粟者過半通典髙祖築甬道屬河以取敖倉粟本紀天下既定民無盖藏文帝躬修節儉思安百姓賈誼説上曰古之人曰一夫不耕或受之饑生之有時而用之亡度則物力必屈今背本而趍末食者甚衆是天下之大殘也淫侈之俗日日以長是天下之大賊也生之者甚少而靡之者甚多天下財産何得不蹙漢之為漢㡬四十年矣公私之積猶可哀痛失時不雨民且狼顧嵗惡不入請賣爵子即不幸有方二三千里之旱國胡以相恤夫積貯者天下之大命也茍粟多而財有餘以攻則取以守則固以戰則勝今敺民而歸之農末技游食之民轉而縁南畆則蓄積足而人樂得其所矣上感誼言始開籍田躬耕以勸百姓晁錯説上令民入粟于邊以受爵免罪復言邊食足支五嵗令民入粟郡縣可時赦勿收民租至武帝初都鄙庾廩盡滿太倉之粟陳陳相因充溢露積於外腐敗而不可食末年乃徇征伐之事以趙過為搜粟都尉前漢志顯宗永平五年常滿倉立粟市於城東粟斛直錢三十晉志隋開皇三年朝廷以京師倉廩尚虚議為水旱之備於是詔於蒲陜寺水次十三州置募運米丁又於衞州置黎陽倉洛州置河陽倉陜州置常平倉華州置廣通倉轉相灌注漕闗東及汾晉之粟以給京師隋志唐馬周上疏自古以來國之興亡不由積蓄多少在百姓苦樂也隋貯洛口倉而李宻因之積布帛東都而王世充因之而都府庫以為國家之用積貯者要當人有餘力豈人勞而強斂之以資冦邪本傳太宗亦云務蓄積而不恤人甚非國家計陸䞇奏議元宗時牛仙客為相廣闗輔之糴京師益羨自是元宗不復幸東都唐志天寶中諸道輸京師者百餘萬斛文宗時劉蕡對䇿願斥游惰之人以篤其耕植省不急之費以贍其黎元則廩蓄不乏矣同上常平齊管仲相桓公通輕重之權曰嵗有㐫穰故糓有貴賤令有緩急故物有輕重民有餘則輕之故人君斂之以輕民不足則重之故人君散之以重魏李悝曰糴甚貴傷民甚賤傷農善為國者使民毋傷而農益勸是故善平糴者必謹觀嵗有上中下熟上熟其收自四餘四百石中熟自三餘三百石下熟自倍餘百石小饑則收百石中饑七十石大饑三十石故大熟則上糴三而舎一中熟則糴二下熟則糴一使民適足賈平則止小饑則發小熟之所斂中饑則發中熟之所斂大饑則發大熟之所斂而糶之故雖遇饑饉水旱糴不貴而民不散行之魏國日以富強漢宣帝時耿壽昌曰令邊郡皆築倉以穀賤時増其價而糴以利農糓貴時减價而糶名曰常平倉民便之元帝時諸儒多言常平可罷毋與民爭利遂廢並前志明帝欲復置公卿多以為便劉般以為外有優民之名内實侵刻不便帝乃止晉武帝立常平倉豐則糴儉則糶以利百姓晉志隋漕闗東汾晉之粟以給京師伊洛相幽徐齊并秦蒲州又置常平倉以備凶荒粟藏九年米藏五年隋志肅宗時第五琦請天下常平皆置庫以蓄本錢元宗天寶中嵗以錢賦諸道和糴賤則少府加倍而糴貴則賤價而糶德宗時趙贊言陛下於京城置常平官雖頻年少雨米不騰貴宜閲商錢税竹木以充本錢屬軍用迫蹙亦隨而耗竭不能備常平之積通典及本紀義倉自北齊河清中有墾租義租墾租送臺義租送郡以備水旱隋開皇五年長孫平奏令諸州百姓及軍人勸課當社共立義倉收穫之日隨其所得勸課出粟及麥熟當社造倉窖貯之若時或不熟當社有饑饉者即以此糓賑給自是諸州儲峙委積隋志唐太宗時凶荒則有社倉賑給不足則徙民就食諸州戴胄廷議自王公以下計墾田秋熟所在為義倉嵗凶以給民太宗善之乃詔畆税二升粟麥秔稻隨土地所宜寛鄉斂以所種狹鄉據青苗簿而督之田耗十四者免其半耗十七者皆免之商賈無田者以其戸為九等出粟自五石至于五斗為差嵗不登則以賑饑民或貸為種子至秋而償唐志則天以後貨義倉支用神龍以後義倉費用向盡通典德宗時陸䞇奏宜計諸道户口均之穀麥熟則平糴亦以義倉為名時稔則優價而廣糴穀貴而止歉則借貸循環斂散疏入不報唐志偶句倉積於豳糧峙於申黎陽置衞常平置陜壽昌常平之法行於漢戴胄義倉之法舉於唐堯湯備水旱而蓄積之具修成周待凶荒而委積之惠舉餘三年九年之食則捐瘠何足憂謹上熟中熟之收則饑饉不足慮令民出粟以賑饑饉隋人義倉之實惠也計田出粟以備凶年唐人義倉之實惠也門闗道路之委積是上之所有散而儲於下也鉅橋鹿臺之財粟是下之所有聚而儲於上也皇朝事實太宗淳化中甞曰古人所謂有九年之蓄者蓋三代以前禁軍無多今六軍盡在都下江淮嵗漕不下數千萬若比分屯之秋何啻九年之蓄矣五朝寶訓上甞謂廷臣曰國家以民為本百姓以食為命則知儲蓄最為急務當諭諸路轉運常為計度省察倉儲毋使損敗真宗祥符三年上閲元和國計簿三司使丁謂曰唐江淮嵗運米四十萬今乃五百餘萬倉庫盈溢上曰國儲有備亦自計臣宣力也曰上五年并州上芻粟之數可給四五年上曰河東仍嵗豐穰儲峙尤廣自今諸路稔嵗宜以時積穀為凶年之備長編髙宗建炎四年中書奏秋成可期宜及時儲蓄詔廣東福建以所部年額為上供本錢聖政孝宗乾道八年上曰今嵗再得一稔想見粒米狼戾更積得二年經常米便有三年之蓄長編常平倉太宗淳化三年京畿大穰京城四門置場増價以糴令有司虚近倉以貯命曰常平遂為永制長編真宗景德三年始置常平倉言事者以為水旱灾沴有備無患江淮兩浙計户口多少量留上供錢每嵗夏秋準市估加錢收糴貴則減價出糶於是置常平倉案大率萬户嵗餘萬石或三年不經糶則充糧廩别以新粟補之仁宗嘉祐七年詔天下常平倉多所移用而不足以支凶年其令内藏庫與三司共支緡錢一百萬下諸路助茶神宗熙寧三年詔諸路常平廣惠倉給散青苗錢本並取民情願並同上髙宗建炎元年臣寮言伏見神宗講常平之政置提舉官錢穀充斥不可勝數邇來罷提舉官而常平之財所存一二欲望復常平官講補助之政廣儲蓄之具從之二年臣寮言常平和糴之法州縣視為文具以新易陳此成法也間有積嵗食腐而未甞問不許借貸此成法也問有悉充它用而實無儲願委官徧行省按從之並會要紹興元年詔以米價踴貴細民闕食令諸路州軍以常平倉粟量度出糶聖政九年鄭鬲奏和糴上曰常平法不許他用惟待賑荒恤饑取於民者還以與民也小厯二十一年上曰國家設常平倉宜令有司以陳易新不得妄有侵移孝宗乾道六年上曰若一州得二十萬石常平米雖有水旱不足憂矣淳熙二年詔諸路常平司每嵗於秋成之際取見所部郡縣豐歉及見管米斛於九月初旬條具聞奏並聖政常平苗役之政自熙寧始建炎初罷之二年置諸路主管官追還糴米然自軍興後常平窠名往往掇以贍軍無復如曩時之封樁矣雜記寧宗開禧元年正月辛未申嚴生子棄殺之禁仍令諸路主管常平官月給錢米收養之義倉太宗乾德元年令州縣置義倉所收二税每石輸一斗以備凶荒長編四年以重疊供給遂成勞費詔罷之㑹要咸平二年成肅請復置義倉張齊賢對曰義倉本為豐年與民聚蓄然給納之際民以為患上曰民之利病故在官吏能否通典仁宗慶厯元年詔天下立義倉自乾德初置義倉未久而罷明道二年詔議復之不果景祐中集賢校理王琪上疏引隋唐故事請復置上納之已而衆論紛然以為不便遂詔第令三等户輸粟尋復罷長編五年韓琦言近詔罷義倉若便撥入官倉恐未副朝廷示民以信之意乞撥與常平倉别作樁管或遇水旱灾傷即賑濟貧民從之會要神宗熙寧二年甞欲復之王介甫主青苗因言人有餘粟藏之家何害乃止熙寧末復之仍聽就縣倉輸然義倉當留鄉今入縣倉悉為官吏移用後又令上三等户輸郡倉轉充軍倉失立法之意雜記哲宗元祐八年黄慶基言義倉者良法也元豐間先帝復行其法以為隋唐取民太重慮民不堪其求於是納苗米一石者輸義倉米五升可謂至薄矣望自今嵗復行詔令户部詳度紹聖元年詔復置義倉專充賑濟並㑹要髙宗紹興十三年浙西米貴義倉米各一萬五千石减價出糶務要惠及細民十八年上曰義倉所以備凶荒水旱比年州縣或侵支盜用或賑濟無術僻逺窮困之民不得均被其惠可令户部措置二十年上曰祖宗置義倉最為良法令監司檢視實數補還侵失淳熙八年上曰義倉米本是民間寄納在官以備水旱既遇荒嵗自合還以與民並㑹要八年二月詔今雖米價低平其間鰥寡孤獨無錢收糴可令抄籍姓名將義倉米賑濟務要實惠及民十一年詔諸路提舉行下所部隨鄉豐歉收納入倉不得侵隠他用候嵗終具舊管及新收數目申尚書省並聖政豐儲倉紹興二十六年夏始置先是王公明為司農寺丞請令諸路以見管錢糴米赴行在鍾侍郎世明因奏令諸州嵗發常平陳米十五萬斛赴省倉贍軍言者以其壞常平法奏絀之韓仲通在版曹乃請别儲粟百萬斛於行都以備水旱號豐儲其後又儲二百萬斛於鎮江建康然頗有借兊者雜記廣惠倉仁宗嘉祐二年置天下廣惠倉初韓琦請罷税諸路户絶田募人承佃以夏秋所輸之課給在城老幼貧乏不能自存者既建倉乃詔提刑領之嵗終具所支上三司長編四年詔廣惠倉𨽻司農寺逐州選官專監每嵗十月便差官檢視老病之人籍定姓名日給米一升同上寧宗時四川制置廣惠倉乃丘宗卿所創嵗㓙頗賴其用朝野雜記社倉神宗熙寧二年上論社倉法行之未得其方王安石曰隋文帝時風俗法度豈能勝今日則社倉輸給安能無擾但當時糓賤百姓不為苦爾且人有餘藏藏之於家有何所害而固欲使之輸官非良法也至是御史錢顗言齊州義倉取數太多乃詔罷之通畧乾道四年建人大饑某請於官始作社倉於崇安縣使貧者嵗以中夏受粟於倉冬則加息二分以償嵗少不收則弛其息之半大侵則盡弛之期以數年子什其母則惠足以廣而息可遂捐以予民矣行之累年人以為便淳熙辛丑某以事入奏因得條上其説孝宗皇帝幸不以為不可即詔頒其法於四方德意甚厚而吏惰不恭不能奉承以布于下是以至今㡬二十年而江浙近郡田野之民猶有不與知者其能慕而從之者僅可一二數也晦菴建昌南城社倉記偶句提舉置於熙寧而常平壞提舉復於紹興而常平修常平之法行於淳祐之元年常平之倉置於景德之三年乾德元年始令州縣置義倉元豐元年復詔畿縣立義倉依實發米賑民髙宗紹興之詔也務要實惠及民孝宗淳熙之詔也太祖以京畿大穰而令置塲増價以糴義倉哲宗以河北麥熟而令比價添錢收糴常平經傳格言國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通制國用雖有凶旱水溢民無菜色記王制三載考績餘三年食進業曰登再登曰平餘六年食三登曰太平二十七嵗遺九年食前制足國之道節用裕民而善藏其餘垣􅐎倉廩者財之末也荀子夫人待君子而後化理國待蓄積乃無憂患君子非自農桑以衣食者也蓄積非横賦斂以取優饒者也仲長統云偶句粟多財餘晁錯謂之大命理兵足食陸䞇謂之大經名臣奏議常平無救恤之實仁宗朝范仲淹言常平倉司農寺管轄官小權輕提刑多不舉職盡被州縣借出錢本使用致不及時聚糴每有灾沴無所振發徒有安撫之名且無救恤之實請選輔臣一員兼領司農寺常平不當變青苗神宗時范鎮言常平始於漢之盛時賤則貴而斂之恐傷農也貴則賤而散之恐傷民也猶為近古雖唐虞之政無以易也而青苗者唐衰亂之世所為青苗在田賤估其直收斂未畢而必其償是盜跖之法也今以盜跖之法而變唐虞不易之政此人情所以不安常平所及者廣神宗朝蘇軾言常平之為法也可謂至矣所守者約而所及者廣借使萬家之邑上有千斛而糓貴之際千斛在市物價自平一市之價既平一邦之食自足無專㪷乞丐之弊無里正催驅之勞今若變為青苗家貸一斛則千户之外誰救其饑乞置社倉仁宗朝賈黯言水灾之灾雖堯湯所不能免今不思所以備灾之術而嵗幸年穀之熟則是求出於堯湯之所不可必者也臣甞讀隋史見所謂立民社義倉者取之以時而藏之於民下足以備凶灾而上實無所利焉願倣隋制詔天下州軍遇年豐穀熟立法勸課廣蓄積以備灾義倉支移之弊孝宗朝楊炎上言義倉之法唯充賑急不許他用諸路州縣嵗收苗米六百餘萬石其合收義倉米斛數目不少年來雖間有灾傷去處支給不多訪聞諸路州軍往往將遞年所收米數更不依條逐項樁管皆是擅行侵用從來未曽稽察乞下諸路委逐州主管常平官取索五年的實收支數目仍開説逐年有無灾傷檢放稽察施行乞天下置義倉神宗朝熙寧九年錢顗乞於天下州縣逐鄉村各令依舊置社倉當豐年秋成之時只於上三等有田人户量出斛斗以備賑濟若遇荒旱即盡數俵借於下等貧民聽將來嵗稔日官為索還依前入社倉收貯候及三年或無水旱即具數存留所積有二年備諸儒至論均田務農為儲粟之法程明道曰古者民必有九年之食無三年之食者以為國非其國臣觀天下耕之者少食之者衆地力不盡人功不勤雖富室強宗鮮有餘積况其貧弱者乎或一州一縣有年嵗之凶即盜賊縱横饑死滿路如不幸有縱方二千里之灾或連年之歉則未知朝廷何道以處之則其患有不可勝言矣豈可曰昔何久不至是因以幸為可恃也哉固宜漸從古制均田務農公私交為儲粟之法為之備此亦無古今之異者也十事劄子保民以食為本伊川曰保民之道以食為本今自京師以至于天下計平時之用率無三年之蓄民間空匱則又甚焉以萬室之邑觀之有厚蓄者百無一二困衣食者十居六七統而較之天下虚竭可知矣豐年樂嵗饑寒見於道路一穀不稔便致流離卒有方數千里連數年之水旱不知何以待之義倉寄留之法李太伯曰古制之宜於時莫若義倉之為愈也唐太宗曰既為百姓先作儲貯官為舉掌以備凶年非朕所須然太宗用心固善矣斂散之法則未盡得宜出此而入彼有喪而無得奚以異於厚斂乎今莫若以農末之民各分户等每於秋成以次入粟謂之寄留至於凶年則下户之乏食者準數給還其上户則以轉給窮民書其轉給之數積以嵗年數登若干者拜以爵級以寵異之則富人樂輸窮人受賜矣古無發粟之令陳季雅曰古者國有九年之蓄率土臣庶通為之計非獨富公庾也故荒政十有二不聞有發粟之令是嵗藏富於民上之人不操其權如戰國時李悝作盡地力之教以為平糴之法此意已與古異蓋當時富藏在官而斂散在上漢自賈誼晁錯勸文帝教民務本皆未知此意民既務本農有餘粟一以歸之於公上内郡之民僅足而無餘名為富足實與貧困無異武帝即位初年河内人傷水旱汲黯以便宜發粟歸伏矯制罪則當時倉廩在郡縣者有司不得擅發明矣宣帝時耿壽昌行常平倉於邊郡亦非郡縣之所專漢時内郡邊郡不曽使民自為蓄積雖小有備具皆出於朝廷留寄於郡縣是以無可觀者舒散賙救之説陳亮曰井法既廢而斂散之權兼并用以乘時而射利賙救之法兼并用以謀息而取嬴魏之平糴唐之常平所以制斂散之權於公上也隋之社倉唐義倉所以公賙救之法於天下也及其衰也常平可以牟出入之利義倉可以應緩急之須取兼并之法而自用之則亦無恠乎人心之不和而水旱之隨至也本朝神宗皇帝立為定制專置一司以掌之分𨽻户部右曹不使參之經用郡縣則屬之丞貳移用擅發皆有常禁故常平義倉之積盈天下其後從事於西北而用度之不給固已不免時發而用之渡江以來諸司郡縣又皆不免貸用而常平之法㡬於廢矣廣濟廣惠罷置余亮曰仁宗之世韓琦請以没官之田募人耕佃為廣惠倉散與孤寡幼獨慶厯嘉祐間既有常平倉又有廣濟倉廣惠倉仁宗德澤洋溢三倉力也王安石用事常平廣濟量以支給餘皆盡糶轉而為錢變而為青苗取二分之息廣惠之田轉易皆盡雖濟一時為禍不細元祐間三倉雖復未㡬而章子厚繼之而三倉遂壞義倉在郡之弊胡致堂曰賑濟莫要乎近其人隋義倉取之於民不厚而置倉於當社饑民之得食也其庶矣乎儲備如此猶曰闗中大旱民猶不免食粟糠豆屑帝躬帥之如洛陽就食況素無備乎百姓知擠于溝壑而已矣後世義倉之名固在而置倉于州郡一有凶饑無狀有司固不以上聞也良有司敢以上聞矣比及報可委屬吏出而施之文移反覆給散艱阻往往監官胥吏相與侵没主意有餘不足之異古之蓄積也常有餘後之蓄積也常不足豈天之生物不如古之多人之謀事不如古之智蓋古之費給也為有限後之費給也為無窮以有限之生植充無窮之費給無恠乎有餘不足之不同也古者兵即農也農即兵也無事則襏襫耒耜盡力南畆而為耕耨之農有事則弓矢戈矛效力行陣而為戰守之備居有積倉固未甞仰給於公家行有裹囊亦未甞仰給於公家故蓄積不期於有餘而自然有餘也後世為兵者不農為農者不兵一人為兵一家仰食於縣官一人征行一家又有以廩給男子疾耕不足以供其餽餉女子疾織不足以供其衣褐平居無事一嵗僅可以支一嵗一旦有急一嵗豈足以支一嵗哉故蓄積不期於不足而自然不足也斂散不可失初意因民之有餘而斂之以時初意也其後徒見以能斂而疾民矣因民之不足而散之以時初意也其後則未見以能散而裕民矣夫斂者官為藏其所有待其無而賙之散者官為察其所無推其有以濟之此君民一體之義也蓋立法創制必貴於通設官分職必貴乎嚴通者所以待民故常平義倉之政立焉嚴者所以待吏故常平義倉之政行焉不然名美而實亡規模困於積弊之餘上勤而下壅調度廢於循習之後徒知斂而藏者在有司不知散而用者在天下徒知聚於斗升之誅求而不知行於勺合之賙恤愚見其弊未見其利也官吏當有憂民之心郡縣有憂民之吏則常平義倉之法雖弊而猶可復行官吏無憂民之心則常平義倉之法雖詳而徒為文具蓋近民之官莫州縣若也心乎憂民則無利不興無害不除均為足食之計豐年而為饑年之蓄無事而為有事之防靡所不用其力焉豈特常平義倉而已哉故曰法雖弊而猶可復行者此也志不在民則米不待實麥不待成已嚴追胥之令知剥民而不知裕民知聚利而不知散利何往而非弊焉义豈特常平義倉而已哉故曰法雖詳而徒為文具者此也貪吏不可不去朝廷有仁民之心而天下無仁民之政者何也愚一言以弊之曰貪吏之罪也甚矣貪吏巧於籠天下利以為已有也夫天時之豐凶難必而國家之積貯當先其來尚矣且堯湯備具之事逺矣後世如欲祖周官之法以為積貯計亦必去貪吏而後可也周官斂貨之滯以待不時而買者漢踵其意如穀賤則糴穀貴則糶是也吁使當時皆貪吏而無一壽昌耶則心不在民而増價减價之策無有矣周官以委積及民必以其時唐彷其意如畆收二升賑貸饑民是也吁使當時皆貪吏而無一戴胄耶則念不及民從使取給之策無有矣警段循名資吏之弊常平者所以均穀價也今粒米狼戾而闕額不補囷窖塵朽而虚籍徒存賤未甞糴貴未甞糶而常平之置法祗有其名耳義倉所以為民儲也今則州縣苛求殆成官物民户帶鈔不敢名言豐固嘗輸歉何甞給而義倉之設法適以資吏耳甚至茶鹽酒酤一孔之利無不在官尺攘寸取殆類邦危之陋風津梁門闗國中之地莫不有禁手舉足蹈無非罔民之䧟穽也民以食為先洪範八政食貨為先子貢問政夫子告以足食為首是則民食之在天下固不可一日闕而天地之消息盈虚尤不能保嵗無上下之異古者三年耕必冀其有一年之蓄而周官遺人之職所以必拳拳於委積是計者凡以先事而憂雖堯湯亦為之備先具也或者徒見論治之君子且有三十年通制國用而無以紓憂於旦夕之言則其為食者天施地生之物固非可以人力計而救艱食之民有不可待其儲蓄而後濟者然不知管仲之富國李悝之平糴耿壽昌之常平君子猶有取焉亦曷甞曰置儲蓄於不論乎當有足民之實常平義倉今所以裕民而謂之食者在是然美名徒存實惠何有乘軺車者非不嚴移貸之令非不命搬運之官一遇水旱旋為影射昭昭然號於人曰官以常平賑糶也不知槩量出入虧折萬狀吏胥旁午巧為侵刻而民不受常平之賜矣每鄉置局科抑都保汲汲然告於人曰官以義倉賑濟也不知深山窮谷所予㡬何下户貧民反貽欺取而民不受義倉之賜矣使至仁測怛真有以風動官寮真有以感率鄉井則食之裕民縱未足以擬神禹武王之盛而常平義倉猶髣髴漢隋之舊也何至坐視赤子之捐瘠哉偶句古者藏富於民後世藏富於國不恃無凶荒之虞惟恃有蓄積之素無事而為有事之備豐嵗而為歉嵗之憂有九年之食則天灾不足慮無三年之蓄則君子以為憂自成囷藏粟於齊而常平之意形至築倉糴穀於漢而常平之名立事證其説有三唐虞盛際洪水湯湯害不細矣惟曰益奏庶鮮食不聞其國有捐瘠也惟曰稷奏庶艱食不聞其民有饑殍也意其平時必有為之平者及考典謨一書初未甞有實倉廩充府庫之説不識果何以禦天災耶果何以救民饑耶得非國無横斂民有餘粟儲峙盖藏充滿於畎畆之間故凶旱水溢不至為溝壑之轉然則所謂蓄積多而備先具者亦曰藏富於民至於湯旱七年而民無菜色荀卿惟稱其知本末源流不歸之於實倉廩府庫參之唐虞亦一揆也是之謂因民以利民周官委積之掌曰鄉里曰門闗曰野鄙曰縣都悉皆有之王制冢宰制國用三年耕必有一年之食九年耕必有三年之食以三十年之通水旱而民不病雖其斟酌之權歸於官而相賙相䘏在民亦未甞無所蓄焉降及後世以其穀賤傷農榖貴傷民也於是常平之法創於漢之耿壽昌以其豐年則粒米狼戾凶嵗則糟糠不厭也於是義倉之法創於隋之長孫平其始者立法亦縁周官委積之意王制國用之説耳其後雖或廢或置變更不一然推而行之實為有利古人謂上為百姓先作儲貯官為舉掌以備凶年非横生賦斂而利人實深固英君誼辟往往修舉焉是之謂以官而利民世變陵遲愈降愈下前人之創法已不待古而後人之守法復不加前將如之何哉常平良法也廢於漢元而明帝復欲立之善矣而外有利民之名内實侵刻百姓已見於劉般之言義倉良法也廢於武德而貞觀侵立之善矣公私窘迫貸用向盡遽見於再傳之後隋唐義倉之法隋之義倉民弊之者一其他則官弊之唐以來皆官弊也民無與焉隋開皇五年百姓軍人共立義倉收獲之日貯粟及麥社司執帳隨時檢校當社饑歉即行賑給自是諸州儲峙在在相望此豈非善意乎因仍既久以義倉貯在人間而百姓輕於費捐遂至乏絶所謂民弊者此特一節耳其後靈夏日𤓰等義倉則納于州渭河綏銀等義倉則置於縣至大業而雜費之是其弊在官不在民也唐之義倉法非不善王公衆庶畆税二升取之之均也髙宗武后十數年間不許雜用禁之又嚴也永徽新格出粟各有其差開元之式商賈不收其税及其盛也天寶八年通天下諸州米數獨義倉六千三百一十七萬七千石有奇比之常年㡬十五倍兹其所儲亦富矣然以義倉與常平同籍於官義乎公私窘迫皆貸義倉義乎神龍之後費用殆盡義乎或以為天子外庾或以資後世軍興是則民以義而儲官以非義而用抑其過在官不在民矣祖宗義倉始末義倉之置自乾德而始亦自乾德而止夫倉以義名賑民良法也我太祖以仁義開國凡仁民之政蓋終其身行之至于千萬世不易顧於此法亟行而亟罷何也太抵常平義倉均之為荒政良法然常平出於官義倉出於民出於官者官自斂之官自出之其弊也雖不足以利民亦不至於病民出於民者民實出之官實斂之其弊也不惟民無利而官且從而病之矣我太祖之亟行亟罷非為一時慮也為異日慮也是法也王琪甞言於景祐矣而言之不果行賈黯嘗言於皇祐矣而言不果行錢顗又於熙寧言之言不行於熙寧而行於元豐黄慶基又於元祐言之言不行於元祐而行於紹聖迨今大觀増定數額至于今用之祖宗常平之法國家常平之法行於淳化之二年常平之置置於景德之三年四路常平雖罷於康定而又行於慶歴或八塲或十四塲减價以糴或出内藏錢或取絶户錢添助以糴或令三司撥還借支或詔三司毋得擅支其在縣則監以知縣其在州則監以通判又鎮之以司農緫之以轉運主之以輔臣有月帳有季帳有三司條貫出納之平司存之謹其惠大矣祖宗常平興廢提舉置於熙寧而常平壞提舉復於紹興而常平修常平之修廢其不係於提舉之廢置乎曰蓋熙寧之提舉為青苗設也建炎之提舉為常平設也使熙寧果為常平而置也則歛散以時必無稽滯出納有人必無移用而何有荒政不修之慮也夫惟以盜跖之法變唐虞之政苗青在田賤估其直此為何意屠牛伐桑輸錢於官此為何法恤民之制轉為厲民或者得以有辭矣中興之制則異於是三司錢榖提舉主之無䧟失也常平斂散提舉主之無愆滯也若是而置提舉又何議耶偶句義倉立於太祖之建隆常平建於太宗之淳化太祖詔貯義倉之米以備凶歉真宗詔留部内之米以備水旱乾德立别輸之制而義倉始立熙寧行預支之令而義倉始明韓琦請以官田為廣惠而倉法以立王安石變常平為青苗而倉法以壞時政常平義倉之弊常平義倉之法自昔行之久矣我朝祖宗尤切加意義倉建於太祖之建隆常平立於太宗之淳化中雖暫廢旋即復舊逮髙宗中興其於常平也則職以通曉世務習知民事之人其於義倉也則禁其州縣侵支販濟無術之弊利固宏矣然而法久則弊愈生弊積則法愈壞因仍至今㡬不可救常平有名而無其具義倉有人而無其所平者變為不平之地義者流為不義之資一逢水旱餓殍填委吁尚忍言哉今日貪吏之弊本朝以仁得天下以仁守天下如積貯一事尤為介念然其法往往成於仁人之心而壞於貪吏之手祖宗盛時或留上供以收糴非見於景德乎或支内帑以助糴非見於嘉祐乎其後或輸一斗或輸五升豐年寄之官凶嵗給之民蓋誠如執事所謂循環無窮而民賴其利也此無他祖宗為民父母一念所到惟恐赤子失所仰耳愚所謂積貯之法往往成於仁人之心者此也數十年來氣象頓異夫糴本所以為豐年積貯計也今問諸糴本則貪吏為之羽化矣民輸所以為凶年賑給計也今問諸民輸則貪吏為之乾没矣借使義租送郡之法尚在亦秪以助此輩席卷耳借使拘收穀麥之䇿尚行亦秪以飽此輩溪壑耳執事謂有糴無糶有斂無散斯言盡之矣此無他貪吏厭忽民命何啻棄梗侵移公廩何啻穿窬於是朝廷有仁心州縣無仁政愚所謂積貯之法往往壞於貪吏之手者此也今日科抑折納今日常平之糴本朝廷之給降也不知嵗糴之數果有定額乎義倉之敷科苗米之帶納也不知科敷之數果有常入乎夫秋成畢矣嵗事稔矣因狼戾之餘而官為出本以收之斂滯貨之淹而官為薄征以積之意者於有餘之中而為不足之備也豈料和糴一轉而為科抑乎帶納一轉而為強市乎夫科抑者非其所樂矣亦以官之與民非真有以交相付也特強市之爾使遇適然之變尚能發廩以賑之猶可也而民有饑道有饉問之有司則持空簿以相授而已抑納者非其所便矣亦以官之與民非真有以交相通也特重斂之爾使值偶然之虞尚能傾囷以裕之猶可也而旱有魃水有沴問之有司則指空槖以相視而已今日奸吏病民今也監司以前賦責之守令守令懼其責也而責之民文移急於星火推剥及於肌膚蚕未浴繭已科夏稅禾未登塲已催秋苗稍不如期則暴吏登門雞犬為之一空故今為之民者百畆所收輸縣官者十一輸富室者十二三而輸暴吏者又十五六鋤擾未收而倉無餘粒機軸方停而身無全絲豐年樂嵗且不足以為仰事俯育之計不幸一遇水旱而必欲持公家有限之儲活嗷嗷之民正恐難繼而況平日奸吏又百蠧於其間其所積者豈不耗哉故互用有禁非不嚴也而借貸之侵移者自若登載有籍非不詳也而數目之虚偽者莫攷申嚴戒敕前後不知其㡬矣而積弊愈甚不可得而剗革有如執事之所云者此誠今日之實患也今日無及民之實惠且向者常平之法曰賤而入貴而出所以使物價之平而民無困乏也今聞其為公而入未聞其為民而出也聞其擁虚數以資吏奸未聞其有實惠以為民利也向者義倉之立曰畆税二升或二税之外則輸米所以公斂散之權也今聞其病民而已末聞其濟民也聞其侵支移用敢於冒禁而取矣未聞其賑恤施惠敢於冒禁而發也積弊至此豈非名之徒存也哉偶句既耗於官吏之科撥又耗於胥吏之並縁移用不禁文書徒存腐敗不蠲虚籍徒存太倉之粟未必多於漢洛口之倉未必富於隋互用之禁非不嚴而借兊侵移者自若登載之籍非不詳而數目虚偽者莫考結尾吏蠧不可不懲愚謂為今之計將欲循名責實使有司奉行者不狃於具文取贏散滯而斯民養生者不至於匱闕夫豈無道是則斂散之道固不可弛而吏之蠧者亦不可以不懲也監司之精察必責以勸守令之賑濟必責以均截上供之錢以與之為糴本必申明乎景祐之詔留嵗漕之米使豫為之偹必舉行乎祥符之令使官吏奉行各體實惠不為虚文則必有出米以活饑民有如陳堯佐之以身率人者矣發有餘之財以拯貧者有如范文正之條叙荒政者矣受糧以活流民之十五萬有如富鄭公之勸貯官廩者矣上有實政下有實惠又何法之弊哉班固甞曰吏良而令行是則必有任其責者當藏富於天下人皆曰斂民可以富國愚則曰與民所以富國夫百物生於民者也生於民而積於民則百姓足而君足矣斂於民而積於國國則富矣民竭而物窮吾恐一旦有所求於民而不能繼也是故謂將以取之必有以與之人君之儲蓄何以異於是哉若然則鬻爵度僧不必為矣頭㑹箕斂不必施矣將見君有餘財民有餘力粟之倉腐錢之貫朽民猶君也君猶民也嘻此不儲蓄之儲蓄也此亦萬世長久通行之大計也為國計者所當詳議而熟籌之執事其然之乎察官吏之弊雖然今日百費繁興廩庾赤立經常之賦固不可弛官吏之擾可不禁乎使州縣之吏不敢繭絲寧為尹鐸毋願為矯制擅發之汲黯催科政拙寧為陽城毋願為發廩賑饑之韓韶則常平義倉之儲法存而意亦存矣不然今日出一令曰吾憂民之食也明日出一令曰吾慮民之饑也是徒拜其名而未拜其實民何頼焉羣書㑹元截江網卷五
