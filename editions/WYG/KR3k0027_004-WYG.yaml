body:
  text: 羣書㑹元截江網卷四法祖附更變歴代事實若稽古帝舜曰重華協于帝書舜盡循堯道何更為哉禹繼舜舜繼堯三聖相授而守一道董仲舒䇿虞夏襲堯之爵行堯之道法度彰禮樂著垂拱而視天民之阜無為也揚子啟賢能敬承繼禹之道孟湯纉禹舊服書太甲率乃祖攸行盤庚紹復先王之大業底綏四方髙宗俾率先王迪我髙后以康兆民監于先王成憲其永無愆並書周文王遵后稷公劉之業則古公王季之德史記子曰無憂者其惟文王乎以王季為父以武王為子父作之子述之武王纉太王王季文王之緒一戎衣而有天下武王周公其逹孝矣乎夫孝者善繼人之志善述人之事也中庸繼代也武王能廣文王之聲卒其代功也文王有聲遹駿有聲遹求厥寧遹觀厥成詩大雅繩其祖武下武下武繼文王也武王有聖德復授天命能昭先人之功焉詩成王儀式刑文王之典日靖四方我將能酌先祖之道以養天下也詩駿惠我文王曾孫篤之維天之命不愆不忘率由舊章假樂儀刑文王萬邦作孚文王述文武之道以養其心匡衡傳率乃祖文王之彛訓無作聰明亂舊章蔡仲康王君臨萬邦燮和天下用答揚文武之光訓顧命穆王對揚文武之光命追配于前人君牙嗣守文武成康遺緒亦惟先正之臣克左右亂四方君牙宣王即位二相輔之修政法文武成康之遺風諸侯復宗周史記漢文帝循髙祖之法加以恭儉天下幾平由是言之循法則治不循法則亂梅傳福文帝躬履儉約為天下守財景帝遵而不改故家給人足崔湜孝景遵業五六十載之間至於移風易俗黎民醇厚漢言文景美矣本賛武帝不改文景之恭儉以濟斯民雖詩書所稱何以加焉本紀臣願陛下近述孝文帝之時東方朔對宣帝甘泉修武帝故事郊祀志魏相好觀漢故事便宜章奏以為古今異制方今務在奉行故事而已數修漢興以来國家便宜故事奏請施行故事詔書凡二十二事相傳章帝宣二祖之重光襲四宗之緝熈班固引唐憲宗常稱太宗𤣥宗之盛朕不佞欲庶幾二祖道德風烈何行而至此歟李絳傳文宗曰我思貞觀開元時以觀今日則氣拂吾膺李石傳常讀太宗正要慨然慕之本賛宣宗書貞觀正要於屏風每正色扶手而讀之通鑑偶句堯舜之盛必有典謨文武之政布在方䇿夏之紀綱一亂於太康之手君子有失道之譏周之文章一傷於厲王之世君子有思古之念髙宗欲監先王成憲傅說則曰非知之艱行之惟艱憲宗欲幾二祖風烈李絳則曰言之不行為無益也宣帝知有漢家之制度矣而不能盖其刑名繩下之愆武帝知有孝文之時事矣而不能革其黷武窮兵之禍武帝紛更制度而文景之恭儉卒棄蔑而不顧德宗創立兩稅而太宗之租調亦變亂而無餘宣帝徒知制度之自有不知王道之不可雜也文帝徒知正要之可讀不知小人之所當斥也東方朔論治漢庭必近述孝文時事令狐綯進金鏡書亦惟以太宗為法皇朝事實太宗赦文先皇帝創業今二十年事為之制曲為之防紀律已定物有其常謹當遵承不敢踰越真宗赦文曰先朝庶政盡有成規務在遵行不敢失墜王欽若述登位以来放天下逋欠錢物千餘萬係囚三千餘人請付史舘上曰先帝方欲行之朕成先志爾劉承規求節度使上諭王旦旦曰陛下所守者祖宗典故典故所無不可聽也若聽承規所請後必有邀求樞宻使者矣此必不可上乃止王旦言宋興三世祖宗之法具在故其為相務行故事仁宗命尹洙余靖孫甫歐陽修同編修祖宗故事先是樞宻副使富弼言太祖始革五代之弊創立法度太宗克紹前烈紀綱益明真宗承兩朝太平之基謹守成憲臣今欲選官置屬將三朝典故分明類聚編成一書俾為模範四年於邇英閣出御書十三軸凡三十五事一曰遵祖訓二曰奉真考業三曰祖宗艱難不敢有墜四曰真宗愛民孝思感噫嘉祐六年胡宿為左諫議大夫樞宻副使方建明利害多更張庶事以革宿弊宿獨厭之曰變法古人所難不務守祖宗成法而徒紛紛無益於治並長編英宗即位韓琦尋考中書祖宗御批得百餘番皆經國長筭大䇿如取太原下江南伐犬戎之類付中書編成十餘軸一日袖進上一見之不覺避御座是時同列謂公有不言之教言行錄神宗熈寧二年樞宻院言欲檢尋本院諸文書凡關祖宗以来法製所宜施於逺者並刪取大㫖著為畫一及聖政釐革條章以次紀錄其事目曰兵制馬政邊防夷狄屬國城守器械捕盜選材責效各以事類相從賜名經武要畧上諭王安石曰聞有三不足之說否王安石曰不聞上曰陳薦言外人云今朝廷以為天變不足懼人言不足恤祖宗之法不足守安石曰仁宗在位四十二年凡數次修整其法一定子孫當世世守之則祖宗何故屢自變改今議者以為祖宗之法皆可守然祖宗用人皆不以次今陛下試如此則彼異論者必更紛紛文彦博又言祖宗法制具在不湏更張以失人心上曰更張法制於士大夫誠多不恱然於百姓何所不便彦博曰為與士大夫治天下非與百姓治天下也並長編哲宗御邇英閣召講讀官講三朝寳訓終侍讀蘇頌等奏曰陛下勤求治道仰法祖宗臣等每愧荒踈不能發明上宣答曰祖宗治道兹有本原迨此終篇悉資開發髙宗曰王居正進仁祖十事參以今日所宜言極可採祖宗以来率用故事為法昔宣仁聖烈皇后嘗以祖宗故事繪畫為圗以授哲宗皇帝時以哲廟幼冲欲使便於觀省也紹興五年因張戒上書朕見仁祖在位四十二年德洽民心至今天下誦之朕心仰慕如堯舜文武故當時立政用人之事朕常置之左右朝夕以為法紹興十二年上曰詩書所載五帝三王之治皆有其意而不見其施設之詳太祖以英武定天下之亂仁宗以惠愛結天下之心此朕家法其設施之詳可見於世者也朕當持守家法而求二帝三王之意於詩書則治道成矣孝宗詔太上臨御三紀法令典章燦然備具其議設官裒集建炎紹興以来所下詔㫖條例以聞朕當與卿恪意奉承以對揚慈訓聖政乾道三年上曰朕欲依祖宗故事先令有司具囚情欵前數日進入朕親閱之可釋者釋之可罪者罪之庶幾不為虚文可降指揮今後並依祖宗典故㑹要侍講張拭論奏本朝制體以忠厚仁信為本因及熈豐元符用事大臣上曰祖宗法度乃是家法熈豐之後不可改耳淳熈二年上因論國家承平三百餘年法令明備若畫一倘能守之自足為治盖天下本無事庸人擾之耳七年史浩奏讀三朝寳訓上曰朕樂聞祖宗謨訓日盡一卷亦未為多雖雙日及休暇亦當特坐並聖政寧宗紹興五年改元慶元詔朕以渺躬托兆人之上惟日兢懼無以紹列聖之休而對揚上皇之慈訓也嘉定元年施行講和詔朕獲以𦕈身仰承洪業念列聖忠厚之德度越漢唐而三朝揖遜之光庶幾虞夏每嚴持守曷敢荒寧並本紀偶句仁祖當培植國本之時而能以仁治故凡所以立太平之基而泰山其安者無非仁德之所積孝宗任振起國勢之責而能以孝治故凡所以厚中興之業而金城其崇者無非孝德之所充熈寧間王呂倡為變法之說而祖宗之法始異紹聖間章蔡倡為紹述之論而祖宗之法益廢奉行成規不敢改易非太宗之聖訓乎遵守制度何敢失墜非真宗之聖語乎髙宗論兵制則曰祖宗制度是朕家法敢不遵承孝宗論治體則曰祖宗法度乃是家法不合變更法仁宗五事者有之哲宗進仁宗十事者有之髙宗類三朝典故以為模範仁宗繼述之善也進累朝實錄盡見規模髙宗欽承之意也祖宗謨訓朕所樂聞見於孝宗之讀寳訓也仰遵鴻烈次第施行見於寧宗之讀聖政也更變歴代事實黄帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久易漢武帝詔曰天地不變不成施化隂陽不變物不暢茂朕據舊監新其教天下與民更始本紀仲舒對䇿曰譬之琴瑟不調甚者必解而更張之乃可鼓也為政不行甚者必變而更化之乃可理也故漢得天下以来常欲善治而至今不可善治者失之當更化而不更化也張湯以更定律令為廷尉汲黯責張湯於上前曰公不能褒先帝之功業安國富民使囹圄空虚空取髙皇約束紛更之本傳唐𤣥宗自天寳以来大盜屢起方鎮數叛兵革之興累世不息而用度之數不能節加以驕君昏主奸吏邪臣取濟一時屢更其制而經常之法蕩然盡矣世業口分之田壊而為兼并租調之法壊而為兩稅至於塩鐵轉運屯田和糴銅錢括苗㩁利借商進奉貢獻無所不為食貨志元帝即位之初更制七十餘事其心甚誠其稱甚美然紀綱日紊由不能擇賢明而任之劉蕡䇿德宗相楊炎遂作兩稅法議者以租調髙祖太宗之法也不可輕改而德宗方信用炎不疑也食貨志德宗隨時立制遇弊則變何必因循憚改作耶杜祐議皇朝事實熙寧更張翰林學士王安石越次入對上問安石方今治當何先對曰以擇術為始又曰當以堯舜為法上曰卿可謂責難於君安石參政與陳升之同制置三司條例司上問何以得陜西錢重可積邊穀安石對欲錢重當修開闔歛散之法因言泉府一官昔先王所以摧兼并均濟貧弱交通天下之財而使利出於一者也升之深狡多數善傅㑹以取富貴既登相位於條例司事遂不肯預安石大怒青苗熈寧二年條例司言今欲将見在斗斛遇貴量減初價糶遇賤量増市價糴仍以見錢依陜西青苗錢法於夏秋未熟已前預支召民􅂅請以半為夏科半為秋科隨稅納從之邵氏聞見錄荆公知明州鄞縣貨穀於民立息以償邑人便之熈寧所行之法皆本乎此然荆公知行於一邑則可不知行於天下不可也十一月司馬光曰朝廷散青苗錢非便後翰林學士范鎮判大名府韓琦蘇軾轍孫覺呂公著程顥皆奏䟽論列元豐八年哲宗即位詔給散青苗元祐元年用司馬光言詔諸路提舉並罷司馬光劄子勘㑹青苗錢更不支俵均輸熈寧二年條例司言發運使實総六路之賦入而其職以制置茶塩礬酒稅為事若假以錢貨繼其不給使知六路財賦之有無而用之則糴買稅斂上供之物皆得徙貴就賤用近易逺從之九年判司農寺熊本奏罷之差役治平四年韓絳乞委侍從官集議裁定其使當力役無偏重之害熈寧二年條例司上言使民出粟雇役者人以為便於是提㸃趙子幾以其法奏免役法盖始於此三年曾布判司農寺改助役為免役元祐元年司馬光奏免役之法其害有五為今之計莫若直降勅命應天下免役錢一切並罷其諸色役人並依紹聖元年上曰止用元豐法而減去寛剰錢何有不便范純仁曰四方各不同湏因民立法上曰令戸部議之邵氏聞見録差募二事俱有弊吴蜀之民以雇役為便秦晉之民以差役為便荆公司馬公皆早貴少歴知縣不能周知四方風俗故荆公主雇役温公主差役蘇内翰范忠宣温公門下士復以雇役為未便章子厚荆公門下士復以差役為未盡紹聖初子厚再入復議以雇役改差役置司講論久不決京白子厚曰取熈寧元豐役法施行耳尚何講焉子厚信之雇役遂定保甲熈寧三年中書言司農專定畿縣保甲條例四年上批保甲湏要弓箭又築射垜自辦錢粮如此搔擾可速指揮令止八年司馬光乞盡罷諸處保甲保馬熈寧六年翰林學士曾布等修成義勇保甲及養馬條三卷市易熈寧五年詔於京師置市易務六年文彦博言市易司遣官監賣菓實有損國體歛民怨王安石曰上非規利直欲便細民遂寢不報元祐修復神宗崩司馬光入臨太皇太后問光所當先者光上䟽言新法之弊有如保甲免役錢將官三者皆當釐革議者必曰三年無改於父之道可謂孝況今軍國大事太皇太后權同處分是乃母改子之政非子改父之道何憚而不為哉始光當國悉改熈寧元豐之舊事或謂光曰舊臣章子厚呂惠卿軰皆小人他日有以父子之義間上則朋黨之禍作矣光正色曰天若祚宋必無此事遂改之不疑紹聖紹述元祐八年先是楊畏為諫議大夫上䟽言神宗更制立法以垂萬世乞賜講求以成繼述之道上因詢畏以先朝故臣孰可調用乞召章子厚為宰相上皆嘉納紹聖元年二月李清臣守中書侍郎鄧温伯守尚書左丞清臣首倡紹述温伯和之靖康元年御史中丞呂好問言自章子厚蔡卞首建紹述之說後蔡京得志專用此術以濟其奸並長編經𫝊格言作者之謂聖述者之謂明明聖者述作之謂也樂記君子創業垂統為可繼也梁惠王下若考作室厥子乃弗肯堂矧肯構厥父菑厥子乃弗肯播矧肯穫大誥其父析薪其子弗克負荷左昭五為髙必因丘陵為下必因川澤為政不因先王之道可謂知乎孟離婁繼治世者其道同董仲舒傳化而裁之存乎變推而行之存乎通易通其變天下無弊法執其方天下無善教故曰存乎其人文中子繼治世者其道同繼亂世者其道變董策名臣奏議法仁祖五事范祖禹上哲宗臣掌國史伏覩仁宗在位四十二年豐功盛德固不可得名言所可見者其事有五畏天愛民奉宗廟好學納諫仁宗能行此五者於天下所以為仁也􅂅陛下深留聖思法象祖宗日新輝光昭示所好以慰答羣生之望當專法仁祖范祖禹上哲宗修德之實惟法祖宗洪惟一祖五宗畏天愛民後嗣子孫皆當取法惟是仁祖在位最久德澤深厚結於天下陛下誠能上順天意下順民心專法仁宗則垂拱無為海内宴安成康之隆不難致也臣嘗採集仁宗聖政三百二十七事編錄成書名曰仁皇訓典凡六卷上之自紹聖以後章蔡倡為紹述之說而祖宗之法盡廢更改之多陳瓘上哲宗自熈寧至今二十餘年天下之事已經四更改熈寧改治平元豐改熙寧元祐改神考紹聖改宣仁凡所行之事各有先後乞講故事丁隲上哲宗本朝祖宗之德具在方䇿威明仁厚不惟有益於當時尚可為法於後世臣愚欲乞曉諭侍講臣僚預先編叙六聖典故可以取法於後来者以備講筵聽納庶幾前聖後聖所行所為如合符節當改則改朱文公上孝宗曰且舜承堯禪二十有八年之間其餘禮樂刑政更張多矣其大者舉十六相皆堯之所未舉去四凶皆堯之所未去然而舜不以為嫌堯不以為罪孔子錄之以為大典況臣非欲盡取太上約束分更之賤其所貴貴其所賤也因革損益顧義如何耳陛下何嫌之有哉諸儒至論熈寧變法之弊陛下求治太切用意過當奸臣縁隙得進邪說始議開邊以中上心於是延安有横山之謀保安有招誘之計西鄙騷然而不寧而陛下始一悔矣置制條例司以講求天下之遺利一出而為常平青苗再出而為料兵練營三出而為出錢雇役四出而為保甲教閱四者並行於世官吏疑惑兵民憤怨而陛下既再悔矣出兵無人之境築城不守之地困弊腹心以求無益之功已築之城隨即傾覆救援之兵相繼潰叛四方震動君臣宵旰而後下罪已之詔而陛下既三悔矣蘇頴濱代孫安道言熈寧變法之弊盖自青苗之議起而天下始有聚斂之疑青苗之議未允而均輸之法行均輸之法方擾而邊部之謀動邊部之禍未艾而漳河之役作漳河之害未平而助役之事興其間又求水利也則民勞而無功又淤田也則費大而不效又省併州縣也則諸路莫不強民以應令又起東西府也則大困財力禁門之側斧斤不絶者將一年而未已其議財也則市井屠販之人皆召而登政事堂其征利也則下至於日官之賤皆得與搢紳齒忠厚老成者擯之為無能俠少儇薄者取之為可用守道憂國者謂之流俗敗常擾民者謂之通變能附者不次而進之曰吾方擢才不可招者為名而斥之曰吾方用法故盡變舊法先者後之上者下之右者左之成者毁之棄者取之劉摰熈寧變法之弊輕改舊章謂之新法其人意所欲為人主莫能奪天下莫能移與之同者援引登青雲與之異者擯斥流溝壑專欲遂其狠心不顧國家大體設官則以冗增冗立法則以苛益苛祖宗之法惠民也熙寧之法惠國也紹聖之法惠奸也温公崇寧變法之弊為國者必師上古必法祖宗必戒後世危亡之漸按春秋稅畝丘甲田賦書初書作書用者譏變古也崇寧以来變銓法而官制紊變軍法而兵政弛變泉貨法而輕重不平變學校法而風俗衰薄變㩁茶法而刑獄滋熾變塩鈔法而征賦倍増變漕運法而倉廩虚竭法既屢變吏得為奸民受其弊胡文定主意法祖宗之心有帝王之政有帝王之心帝王之政載於一書之中帝王之心超乎一書之表載於書者其經畫設施也超於書者其精神心術也臨以君德肅以朝綱維以人才緝以吏治内而錢帛之通融外而將士之奮勵凡若是者皆記載之所可模寫也故曰載於一書之中思付託之惟艱念輿圗之未復一念之烈雷厲風飛一念之運乾旋坤轉蚤作夜思晝懼夕惕凡若是者非記載之所可形容也故曰超乎一書之表氣象氣脉有氣象有氣脉觀前朝之氣象不若觀前朝之氣脉夫氣象人才所為也而氣脉非人才所得為也徒知盛治氣象自人才出不知正人氣脉自君心出則今日之所以取法仁祖者抑末矣何者治在天下非更新振起之為難而維持保養之為不易詩非蔡襄固不足為明時賀然手舞足蹈襄能之也而異日之或有轉移襄之詩其能制乎頌非石介固不足為聖德賛然濃墨大字介能之也而異日之或有雜揉介之頌其能保乎是則成襄之詩全介之頌以至八年醲郁之盛衍為皇祐以来之慶者皆仁祖之心實為之也然則以今淳祐法古慶厯其將觀盛治之氣象乎抑當觀正人之氣脉乎如知氣脉之所在則氣象不難至矣家法心法有家法有心法聖謨洋洋嘉言孔彰此家法也沈潛剛克髙明柔克此心法也祖宗家法之所傳無非心法之所寓後之守其家法者容可不體其心法乎洪惟我朝列聖相承宏謨懿範可效可師若正說若寳訓若通略皆舊章成憲之寓也而炳然二帝之典謨則有仁皇訓典在粹然一王之政事則有孝宗聖政在金匱玉冊光彩賁如嗚呼盛哉肆我皇上不自神聖緝熈光明日御旃厦雖祈寒隆暑之不輟若稽古之編錄若資治之綱目若大學之衍義皆進德修業之助也而講臣入侍首以仁皇訓典為進讀之請邇日建言又以孝宗之聖政為㕘觀之要監於成憲其永無愆猗歟休哉固家法也亦心法也偶句述祖宗之事易為天下守家法易繼祖宗之志難以家法用天下難欲以古法用天下不若家法用天下貽孫謀以燕翼子祖宗善後之逺圗也酌祖道以養天下人主法祖之實學也警段以實德用家法必有大易體天行健之德而後家法為能用必有大學明德新民之功而後家法為能用必有中庸純亦不已之誠而後家法為能用否則議論詳而功實少條目備而綱領踈是皆虚文故事之為而未見其有益於法祖也君臣相與守法嘗謂人主為祖宗守法大臣為人主守法羣工百執事上以扶持道揆下以遵奉法守尤當悉心盡瘁以興舊典以革宿弊可也必以公滅私則弊可革否則以私意而壞法矣必循名責實則弊可革否則以虚文而壊法矣必賞信罰當必權衡素定則弊可革否則旁蹊曲逕㨗出而乗之則法易壊矣家法貴善用盖祖宗之法祖宗之所以用天下者在是也祖宗既能以是而用天下則後世繼治者必得其所以用者而用之則家法日新治道修舉固無一弊之可言矣不然徒知一話一言罔敢失墜曰此祖宗之訓也一政一事不敢更易曰此祖宗之法也精神風采之不加而規模制度之日陋吾見家法固自若也而事功日蠧於㝠㝠之中將求以革弊而弊愈滋矣豈祖宗所望於後人哉持守貴乎久故始初未嘗不純於用賢也事變所怵初心轉移遂疑君子之無用幾至於雜進小人矣始初未嘗不樂夫忠諫也事變所惕初心轉移遂疑忠諫之好名幾至於不絶佞諛矣始初未嘗不憤權貪之汚濁思所以一斷之也事變所怵初心轉移遂疑更改之為非幾至於拳拳故轍之思矣法祖宗立志大孝宗之所以為孝宗者亦惟能先立其志而已何則國家自紹興講解以来軍政以和議而偷財用以和議而窘吏習以和議而汚紀綱以和議而廢賢人君子以和議而一去不返天怒神怨以和議而挽莫能回朝廷上下習見以為常兒童走卒諱言以為恥天下事不可人意者幾八九矣我孝宗起自宗藩受禪於堯思欲洗三京之黄塵撫九廟之故楸興一念必以恢復為心處一事必以恢復為主用一人必以恢復為期寢不安枕食不下咽惟欲渡江而北耳是以用之於練兵則兵強用之於理財則財裕用之於御史則舊習革用之於守法則公道行雖符離一衂未能大快此心之所欲為而閱天下之義理為愈深厯天下之變故為愈熟胷中所主終無一毫之少變也嗚呼此非所謂志者乎此志也有堅定而無轉移有剛明而無巽懦有奮發果敢而無牽製依違閹寺小臣不得而揺撥也後宮嬪御不得而迎合也戚畹裏言不得而沮撓也奸人小夫不得而窺伺也乾淳之治有自来矣然則今日之事亦惟當志孝宗之志耳夫孝宗猶志於恢復今日獨不能志於持守乎孝宗猶志於太平今日獨不能志於革弊乎孝宗猶志於再還國初之盛今日獨不能志於乾淳之盛乎茍能矣天下尚可為也聖訓有云朕心未嘗放下一日之間天下湏行一兩遭此志之說也偶句宏綱懿範炳燿日星經營締創之甚難顯謨丕烈輝映天地變亂紛更之甚易牙籖玉軸雲漢昭回人主以先正望其臣寳訓金科日月輝映大臣以先王望其君不愆不忘率由舊章祖功宗德萬世源流一舉一動罔越成憲聖子神孫一意潤色天下者祖宗之天下不可一日而忘人民者祖宗之人民不可一日而忽必有精明之實德而後能以家法新天下必有真積之實功而後能以家法用天下崇尚之意多而推行之實寡敬信之不足而觀美之有餘事證古人法祖自皇祖有訓之言見於夏書而後知大禹之道存自先王成憲之言載於說命而後知成湯之道著自覲光揚烈之戒見於周書而後知文武之道布在方䇿漢唐諸君得失炎漢之有天下也以寛厚為習以恭儉為務後之繼體守文者所宜遵守而勿失也若武帝好大喜功窮奢極欲獄刑之濫至有腹誹沈􅒛之法賦斂之重乃及舟車鹽鐵之筭果無負於髙惠文景之初心乎若宣帝雜霸自甘德教不任常幸宣室齋居決事則下侵有司之職趙盖韓楊皆以寃死則不免刑名之尚又果無失於髙惠文景之善謀乎彼其視祖宗家法不暇㕘稽以為驗而躬行踐履往往齟齬而不合是雖近述時事為戒懇切於東方朔故事便宜之奏勤拳於魏弱翁而武宣二君之意向吾知其終有不可回者矣唐憲宗企二祖之盛庶幾道德風烈文宗觀太宗政要慨慕貞觀之隆又若有意於述事者然貞觀之隆二祖之盛盖唐家三百年所以繫天命結人心端在於此吾將以二祖為法則黄裳之言可用也而吐突承璀之言豈當用裴度之功可相也而皇甫鎛程异之徒豈所當相元和之政不克有終回視李絳所謂正身勵已遵道德逺佞邪者果與祖宗合德否耶吾將以貞觀為法則勵精為治竟日視朝固為美也而何朝中朋黨之難去中外相賀債帥合鮮固為得也而何事決北司之下移太和之間不滿人意如僧孺所謂四夷不至交侵百姓不至流散又果可與貞觀比隆也耶漢唐諸君之公利漢髙祖以馬上得天下艱難倥偬其經營一代之法度公平大略近古者天資暗合也自是以来清淨飲醇之宰相惟守漢之三章奉法除奸之太守每奉漢之三尺不敢以私見撓公法也彼鍜鍊舞文紛更約束雖法吏揺動之病寧非武帝好大喜功之私心有以召之耶太宗興自民間頓八紘而澄清之其兵農官民之制挽回太平六典氣象亦上契乎帝王之公心也自時厥後風采醖藉之直臣議及封功必曰唐法之當遵百奏丹青之内相論及制軍則懼唐法之輕變不敢以私論揺公法也彼七再變之後斜封墨勅射騎兩稅紛紛而起雖羣臣逢迎之過豈非𤣥宗窮奢縱慾之私心有以来之矣列聖守家法藝祖立極寛仁結人心剛毅馭臣下菑而播焉播而穫焉家法一定世守不易太宗嗣位之詔曰謹當遵守不敢踰越真宗嗣位之詔曰務在遵行不敢失墜至於仁宗奉守惟謹既曰遵祖宗之訓矣又曰奉真考之業既曰念祖宗之艱難矣又曰思真宗之養民逺而祖訓近而父政一意遵守不敢有失焉其在當時或進三朝政要或上三朝聖政君臣上下皆以舊典從事其法祖何如也髙宗中興一則曰祖宗法度墜者欲舉二則曰仁宗家法理當舉行論兵制則曰祖宗制度敢不遵承進累朝實錄則曰欲盡則祖宗規模孝宗之出令修政一則曰奉承紹興詔㫖以對揚慈訓二則曰祖宗法令不合變更論小官差除則曰不敢壊祖宗成法論中宮節約則曰本朝家法逺過漢唐其守家法又何如也祖宗變於熈豐熙豐間王呂用事王則有祖宗不足法之語呂則有一月一變法之說㨿經以為髙援古以為證而大體則不問青苗之法未允而均輸之法行均輸之法方擾而邊鄙之謀動邊鄙之事未艾而助役之法興其間又求水利也游田也併省州縣也二三年間闔闢動揺天下皆不得其寧矣元祐初政因神考末年之志而奉行之且天下方有更生之幸而二三小人以紹述之說進復王呂之弊政而廢祖宗之良法循致中原之禍豈非小人之罪乎時政今日同符仁祖皇上臨御初元慈闈擁䕶其與天聖明道同一時也權奸當國其與景祐寳元康定同一時也暨於淳祐以来則一邪一正更進迭入不知其幾局面則又與慶厯初年同一氣象今而為淳祐年則與慶厯以後又同一景候是以臺綱之論奏經筵之啟沃與夫廷紳之奏對一則曰法仁祖二則曰法仁祖其亦以仁祖之任賢去邪者望皇上以慶厯之轉否為泰者望淳祐矣不知今日所用之人何如也惟見舊學儒臣坐秉國鈞即彦博之平章事也前日權奸一去不返即夷簡之不復来也邇者攻擊奸邪凡幾章奏即十八䟽之去竦也累年昏濁之氣象一旦而清明平日雜處之薰蕕一朝而别白皇上開泰之機信乎無愧於仁祖矣今事勢如慶厯且今之事勢猶慶厯也今之革弊如慶厯否今之積習猶慶歴也今之責治如慶厯否規模甫定風采未揚氣象方回血脉未壯或者猶以前日之縱弛為寛厚而以今日之收斂為鍥薄如此則當緩之乎抑當急之乎法其一心之天夫有陽而有隂有中國而有夷狄有君子而有小人此天之所以為天也内陽而外隂内中國而外夷狄内君子而外小人此仁祖之所以為天也故論仁祖者當論其一心之天而法仁祖者亦當法其一心之天天之在仁祖其定也久矣定吾之天以應天之天隂陽之未調夷狄之未服是天之未應也而吾之天固定也隂陽之已調夷狄之已服是天之已應也而吾之天亦定矣法其心於書之外且孝宗之可得而模寫者何如也講學以勤君德彰矣恩不廢法朝綱肅矣即位未幾首召二十八年淪棄之忠鯁而舉當世之英豪津津皆生意矣人才之翕集為何如宰執不視事則慮其積壓給舎不封駁則導以聽從其吏治之興起為何如記之實錄載之寳訓侈盛德之形容彰累朝之盛事儒紳因之以勸講九重藉之以憲章是則帝王之政非載於一書之中乎若夫孝宗之不可得而形容者何也我朝巍巍配天之鉅業金甌無闕之天下運厄中天王綱板蕩遂使一家文軌中隔華夷萬里江山半分南北痛心疾首奚啻齊城之未復枕戈待旦不止越讐之未報機㑹未至隱忍待時故聖訓有曰朕心一日常行天下一遭推此念也其奮發激烈之志當何如哉此帝王之心非超於一書之外者乎結尾法仁祖保泰雖然開天下之泰在人才保天下之泰在人主仁祖之治前有慶厯後有嘉祐慶厯之泰韓范諸公為之也嘉祐之泰韓琦諸公為之也故社稷大計至嘉祐益以定中書大政至嘉祐益以凝四十二年之間公道之砥柱矻如君子之氣脉不絶正人雖暫去而復来小人雖暫得志而終必斥此不惟天之所相亦我仁祖容受直言涵養人才之力也保泰之功不其偉歟正人用則天下泰國本定則天下泰朝廷尊則天下泰吾君誠能以仁祖為法則淳祐不止於慶厯將進而為嘉祐之泰矣詩云維其有之是以似之臣不勝拳拳法孝宗之心雖然患無孝宗之心耳上有孝宗之心必有孝宗之德有孝宗之德必有孝宗之政孝宗之心何心也未嘗放下一日間天下定行一兩遭之心也其心如此故其德如此孝宗有圗畫莫就之孝德上祀寧考以配天孝則似之􅂅王心益加焉孝宗有不敢怠荒之敬德上亦圗敬天以繼志敬則似之􅂅王心益加焉仁同萬里孝宗之仁德也上之矜惻已似其仁願王心益加焉明見萬里孝宗之明德也上之聽斷已似其明願王心益加焉孝宗行此四德者使顧成之廟稱為孝宗上繼太祖與宋無極心者德之本也德者政之本也明主可為忠言執事盍為我言之羣書㑹元截江網卷四
