body:
  text: 羣書㑹元截江網卷三敬天附弭灾歴代事實堯乃命羲和欽若昊天敬授人時堯典舜逹於上下敬哉有土臯陶謨禹有夏籲俊尊上帝立政舜歌曰勅天之命惟時惟幾禹謨天明畏自我民明威臯陶謨舜畏天而愛民家語禹天迪從子保面稽天若召誥先王克謹天戒嗣祖湯予畏上帝不敢不正湯誥爾有善朕不敢蔽罪在朕躬不敢自赦惟簡在上帝之心同上欽崇天道永保天命仲虺之誥先王顧諟天之明命以承上下神祗社稷宗廟罔不祗肅奉若天命太甲迪畏天顯小民酒誥成湯遭旱以六事自責答天戒鍾離意傳先王懋敬厥德克配上帝書湯降不遲聖敬日躋昭假遲遲上帝是祗詩長發中宗嚴恭寅畏天命自度無逸髙宗惟天聰明惟聖時憲惟臣欽若惟民從乂說進于王曰黷于祭祀時為弗欽禮煩則亂事神則難說命文王命我文考肅將天威太誓今我周文王丕靈承帝事多方亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立政文王陟降在帝左右詩小心翼翼昭事上帝詩武王予弗順天厥罪惟均太誓爾其孜孜奉予一人恭行天罰同上成王我其夙夜畏天之威我將敬之敬之天維顯思命不易哉敬之爾克敬天惟畀矜爾多士公其以予萬億年敬天之休同上公不敢不敬天之休洛誥天大雷電以風王與大夫盡弁以啟金縢之書金縢康王太保暨芮伯咸進曰敢敬告天子皇天改大邦殷之命惟周文武誕受羑若今王敬之哉康誥宣王遇災以懼側身修行詩雲漢序漢文帝思至德以承天心路温舒傳元帝陛下上畏天戒大有減損匡衡䟽章帝詔曰朕夙夜祗畏上天本紀唐太宗貞觀二年上謂侍臣曰人言天子至尊無所畏憚朕則不然上畏皇天之鑒臨兢兢業業猶恐不合天意文武官復請封禪上曰事天掃地而祭何必登太山之巔封數尺之土然後可以展其誠敬乎並通鑑𤣥宗將幸東都太廟四室壞上避正殿姚崇乃曰嵗久朽腐而壊適與行期相㑹何足異也唐史偶句舜以勅天之命為言臯陶則以欽乃之辭而勉舜伯禹以天其申命告舜舜復以臣鄰之言而戒禹誇鳯儀獸舞之盛治不若賡􅃯天之歌詠鳬鷖既醉之太平不若詠敬天之頌有成湯伊尹之一德而後有享天之功有文王虢叔之迪教而後有知天之戒甲兵風雨適以開黄龍之治平景星甘露反以啟天寳之稅駕動天以誠毋事虚文者宋景之言也應天以實不以文者王嘉之言也皇朝事實太祖嘗盛暑露卧或請避星月下太祖曰凡人之情觀星月爛然則生畏竦至於暗室得欺之乎要覽開寳五年河大決濮陽命曹翰往塞之上謂霖雨不止焚香上禱於天若天災流行願在朕躬勿施於民太宗雍熙元年上謂宰臣曰今嵗西成四方大稔皆上天垂佑所致當與卿等力行好事以答天意二年彗星出東井上避正殿減常膳謂宰相曰長星竟天責在朕躬敢不敬畏貶損以答天譴淳化二年上以嵗旱蝗詔呂蒙正卿等當於文德殿前築臺朕當暴露其上三日不雨卿等共焚朕以答天譴翌日而雨蝗盡死真宗咸平五年唐州地再震司天奏熒惑犯輿鬼陳堯叟曰天文謫見實欲昭示時君今陛下克己愛民河防十餘溢而不決歲復大稔此聖德格天所致也上曰天不欲困生靈耳豈朕德能感之六年有星孛於井鬼上謂宰相曰朕薄德致兹謫見大懼災及吾民宻爾誕辰宜罷稱觴之㑹以答天譴仁宗天聖四年大雨震雷平地水數尺壞京城民舎上避正殿減常膳五年王曾等言夏秋大旱皆臣等輔政無狀以致厥咎上曰當與卿等共修政事以答天戒慶歴三年上曰天久不雨將害民田比欲下詔罪已徹樂減膳又恐近於崇飾虚名不若夙夜精心宻禱為佳爾六年帝曰比有上言星變者且國家雖無大異亦當修警況因謫見乎七年詔曰自冬訖春旱暵未已五種弗入農夫作業咎自朕致民實何愆與其降疾於人不若移災於朕英宗治平三年正月彗出胡宿請備邊呂公弼曰彗非小變不可不懼陛下宜側身修德臣恐患不在邊也神宗熈寧二年上憂旱甚言當避正殿富弼曰此但係陛下至誠亦不湏避殿三年上諭王安䂖曰聞有三不足之說否安石曰不聞上曰陳薦言外人云今朝廷以為天變不足懼人言不足恤祖宗之法不足守七年上以久旱憂見容色欲盡罷保甲方田等事王安石曰水旱常數堯湯所不免今旱暵雖逺但當益修人事以應天災不足貽聖慮耳並長編髙宗建炎三年霖雨不止可召郎官以上赴都堂各言朕過失庶可收人心召和氣銷天變三年初日蝕僅四分未幾退呂頥浩曰陛下嚴恭寅畏天鑒精誠宜感格如此上曰朕常夜觀天象見熒惑躔次稍差食素已二十餘日湏俟復行軌道當復常膳四年上曰昨雷聲頗厲朕與卿等宜共修德以實應天十一年上曰朕在宮中聲色未嘗經心只是靜坐内省求所以答天意者並聖政二十六年上曰太史奏彗出井宿間合行寛恤事務盡應天之實以答天戒㑹要孝宗乾道七年上曰無逸一篇享國長久皆本於寅畏朕近日取尚書中所載天事編為兩圗朝夕觀覽名曰敬天圖七年張權劄奏淮西秋成可望虞允文奏聖德無闕動合天心上曰君臣之間正要更相警戒以答天貺九年曽懷等奏郊祀禮成普天同慶自宗廟行禮隂雲閣雨既謁清廟瑞雪應期未明而霽以至青城宿齋圎丘蕆事天氣澄爽此皆聖德昭著故髙穹降格靈貺如此上曰君臣之間正當修飭以答天貺淳熈二年上曰朕以久隂祈求未應獨未曾決獄昨日欲批出方下筆而風急起雲隂吹散至晩開晴一念之誠隨即感應七年上曰近頗乏雨昨晩方欲禱祈半夜遂得雨笑曰此雨從何處来趙雄奏從陛下方寸中来人主一念克誠天實臨之並聖政寧宗嘉泰四年臣僚言願陛下持心以誠盡此之敬惟天是懼夙悟晨興以思治日就月將以務學謂法天行健當不息也開禧三年御筆冬春以来雨澤尚闕深惟其故實軫朕心備殫寅畏之誠斯答昊穹之戒慶元中臣僚言今年正月朔太陽交食是日雲雨隂晦不見虧分陛下修德敬天誠意昭格變災為祥嘉泰初臣僚言比者陛下親郊隂雨即止前三日移御齊殿則天宇開豁二日而享宗廟則星位熣燦玉趾登壇神光屬天陛下上當天心應效如響並本紀偶句真宗欲修德以答天譴李沆則曰咎屬臣等賈昌朝願悉心以弭天變仁宗則曰罪歸朕躬當年穀登豐之時太祖曰宜振舉闕政以答天祐當嵗事大稔之日太宗曰當力行好事以答天意髙宗與近臣論中興有靜坐内省以答天意之言孝宗因淮西奏秋成有君臣交修以答天貺之語仁宗修奉天之德而有不俟譴告之言孝宗因靈貺之格而有正當修飭之語仁宗嘗築欽天壇於禁中孝宗嘗編敬天圗於座側一遇霖雨則訪大臣出嬪御非太祖之敬天乎一遇大旱則遣常參決刑獄非太宗之敬天乎真宗以熒惑為災而有天戒可懼之言英宗以彗星謫見而有天變可畏之語一地震之變則慮命令之枉橈此我真宗之敬天也一滛雨之災則憂時政之闕失此我仁宗之敬天也風而罷宴若敬天矣而曰不足以塞天變旱而損膳若敬天矣而曰不足以憂天變經傳格言雖有惡人齋戒沐浴則可以事上帝孟離婁下天人相與之際甚可畏也國家將有失道之敗迺先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至以此見天心仁愛人君若此其至也自非大無道之世者天甚欲扶持而全安之事在強勉而已董䇿名臣奏議聖人無時不事天范祖禹上哲宗曰聖人之事天也非在於七日戒三日齋執圭幣以享圎丘之時也天之佑聖人也亦非在於祭則降福之時也聖人無一日之不事天天無一日而不佑聖人昔堯授舜舜授禹曰天之厯數在爾躬夫帝王之興受天眷命豈一朝一夕哉由其積行累功素合於天也應天當有其實韓琦上仁宗臣聞應天以實不以文故宋景公以熒惑守心不移臣庶之咎子韋稱君有至德之言熒惑必徙三舎此則以實應天之效也唐明皇以太陽虧蝕悉令赦徒𨽻之人宋景謂至誠可以動天不在德音頻降此則以文應天之弊也陛下欽順皇天之誠可謂至矣其餘銷伏災𤯝之道則猶未焉臣茍不能獻忠盡言使陛下常以禮緇黄薦牲幣為修德除患之本則臣豈不上負懼災思政之意哉羣臣當導以畏天司馬光奏臣伏見陛下踐位以来災異尤甚彗星彰見飛蝗害稼當此之際羣臣宜勸導陛下以祗畏天命勤恤民隱克己謙約博求至言以消伏變咎乃致善祥而朝廷宴然曾不為意或以為自有常數非干人事或以為景星嘉瑞更當有禍此皆羣臣謟諛之罪陛下豈得不省寤而深思哉長編非但致敬於祈禱喬行簡奏寧宗在位三十餘年寅畏天命始終不渝一旱蝗之災一星象之變輙齋戒露禱不以為勞非但致敬於祈禳禱祀而已慈仁之念上通帝心恭儉之德邃古莫及可謂有敬天之實偶句仁宗嘗語輔臣曰國家雖無災異亦當常自修警則非但因異而見也孝宗嘗語近臣曰朕與卿等尤當上下交修以答天貺則非但有變而警也諸儒至論人君所畏惟天富弼曰人君若不畏天何事不可為者去亂亡無幾矣此必姦臣欲進邪說故先導上以無所畏使輔弼諫諍之臣無所復施言行錄畏天習天之異李太白曰畏天者昌習天者亡何謂畏天髙宗成王是也何謂習天元成是也人之情非有常見而見之必懼懼必畏之情同而所畏不同明王思之以為在德德修而災異銷然後愈知天之明而德之盛也闇主思之以為在數故任數而不修德德不修而禍未至然後愈知天無心而數有定也惟天之仁又出災異以申勅之彼必曰前既無定此奚為哉亦數而已矣災異愈多不懼愈甚目習於見心習於思習之久則不聞不見不思焉耳然則上帝之怒不足獨當下延衆庶上累廟社甚可痛也嗚呼人不可玩況天乎存心莫大乎敬劉子翬萬慮俱亡一敬而已視如對日星聞如警雷霆食如誦盤銘寐如宣几箴坐如立記過之史行如隨糾非之吏中存是心發無不應也夫恭於昭昭者敬之銘也應於昏昏者敬之實也偶句自鄭子産有天道逺之言而後人主無敬心自王安石有三不足之說而後人主無畏心主意定我之天應其幾有天下之時有天下之幾時可以治而未治焉幾也時未可以治而治焉亦幾也幾者天之所示也天示君以此幾正觀君之勅此幾者何如焉陛下臨政二十有七載適合乎三登九變之數人皆以為可治之時矣臣獨以為未者以其數攷之則可以其理逆之則未也自昔帝王之治天下不信其或然之數而信其必然之理理盡矣而數逆焉非所懼也理未必盡而數順焉此其幾必有大可察者陛下前此二十餘年其間大震恐大拂亂所以奪其一枕之安示之三峽之險者非可一二計雖陛下之堅一凝定足以壓萬變之紛紜鎮羣疑之洶湧然前乎此時履危涉變常有焦然可畏之虞未見有猝然可喜之幸出吾意料不及之外者臣切惟今春以来氣象頓改二十五六年之艱危一旦而帖泰二十五六年之杌隉一旦而安平陛下亦常端居靜念天下大勢一轉而平復者何修何飾以臻此入䇿問通國皆曰已安已治矣臣私憂過計獨有出於衆人之外者夫我之天定而天之天亦定者理也我之天未必定而天之天自定者理有是哉求諸理而不得則亦歸之三登九變之數而已矣數之適然者非幸也幾也幾者何治亂安危之所伏而天之以微意示我者也天之愛人君之深者或逆以儆之或順以試之方其時出災異所以儆之者觀其能知懼與否也幸而知懼矣又時出治平以試之試之者觀其能勤與否也邇日秋寳方揫而滛澇物華已實而巨颺則試之者又將轉而儆之矣吾君其可因目前之順境忽意外之大幾而不以天敬天乎天者何君心之無逸是也惟天為剛惟天為健惟天為不息故不言心而言天茍無逸此心不以天幸之方来者自喜則一時之儆我者安知其不終福我乎茍自逸此心不以天幸之難必者為懼則一時之試我者安知其不終怒我乎方夢魁懼天幸以勅天命時幾不可失幾者動之微惟其不可失故不容恃天幸以自玩惟其動之微故當盡人事之自修乗時之暇見幾而作古先帝王所以維持憑藉之計如斯而已今日之時何如哉夫以連年之旱蝗相仍木饑水毁忽焉而風調雨順農扈有薦豐之慶累嵗之干戈不息東侵西擾忽焉而烽沉旂冷胡羯無秋哨之虞年穀粗登邊境庶定信如聖諭之所及追思向者之擾攘幾有不可為之勢幸遇今焉之平定豈非大有為之機時乎時不再来何可失也天與陛下以時幾陛下能勅天之命則不負於天之所予天之眷陛下者方新而未艾也探花倪普在已之天難必有在天之天有在已之天在天之天顯然而易見在已之天隱然而難知其變顯於威此其所以易見也其變隱於心此其所以難知也何謂在天之天人主嚴恭寅畏一念惻然祝幣史詞則曰吾將以謹天戒也減膳徹樂則曰吾將以回天怒也搜訪真才則曰吾將求賢以代天工也詔求直言則曰吾將樂聞缺失推原所以致變之由也謂宜六事自責桑林之禱可應一言既善而熒惑之證可移烈風雷雨易而景星慶雲之祥可也旱乾水溢轉而膏露醴泉之瑞可也冦攘兵火之地新而嘉禾朱草之境可也然而東敗西喪日蹙百里而旂盖之天運未回也城池岌岌僅存孤注而波濤之天限未嚴也季龍雖死晉憂方大而好還之天道未卜也嗚呼豈天之怒不可回而天之心果何測耶毋亦知有在天之天而不知有在已之天耳何謂在已之天齊莊神明一心湛若方其陽明勝而德性開則此心之清明澄徹為日月之光華為煙雲之紛郁為星辰之叶順而宇宙常霽也及其隂濁勝而物慾行則此心之忿戾肆怠為孛彗之流見為雷雹之震駭為雲霧之隂晦而氣候常怪也既以此感則亦以此應必也清天君以絶女寵之私厚天倫以明綱常之理守天位以塞權倖之門謹天戒以杜閹寺之釁霽天顔以容切直之諫公天聽以去讒謟之言出而接見羣臣此一天也入而環對嬪御亦同此一天也外而大昕視朝此一天也内而日宴便殿亦同此一天也盖在天之天其粗也在已之天其精也夫惟在已之天定則在天之天亦定耳偶句有變通之變人定能勝天有變異之變天定能勝人有畏天之常心體易之全德者固可以合天道有回天之實政體易之常德者斯可以凝天眷玩變異而不為變通之謀則其變為愈甚因變異而能悟變通之理則其變為可回雲漢懼災側身修行持懼心以答天戒易盤銘又新謹終如始續敬心以凝天命難警段迎天之機天以機示之而已迎其機則可為泰拂其機則為泰者未保其不為否也迎其機則為休證拂其機則休證者未保其不為咎證也迎其機則可為長治拂其機則長治者不過茍然之治而已常人處此則即以為泰即以為休證即以為長治以陛下聖德日新直欲措斯世於隆平之地則有其機而自舎之臣知其決不出此也榜眼黄大任回此心之畏人主居天下之上不可一日無畏心也其先自畏其次畏天其次畏民其次畏相其次畏人言人其次畏敵國外患吾心不知自畏而是數者或有一焉皆足以回人主之畏心而天下事尚可為也然民微者也或不足以回此心之畏相事我者也或不足以回此心之畏人言敵國踈者逺者也亦或不足以回此心之畏於此而無天變之可畏焉則是天心懃然於君而非所以仁愛之也是以天心仁愛人君而欲興其國者譴之以災害警之以怪異使之惕然悟翻然悔兢兢業業如蹈虎尾如涉春氷然後墜者可舉廢者可興顛危者可扶持然則今日災異之来是乃天所以回皇上之畏心也皇上前此虚已降心不自神聖庶幾此理小心翼翼克自抑畏臨御漸久世故漸熟中間一二事變凡所以大警懼大拂亂於皇上之心者卒皆旋踵消弭風休氷釋夫危機以幸而定則謂繼此皆不必慮其危變証以幸而消則謂繼此皆不必慮其變而天下之事吾辦之有餘於是未免有泰然享天下之心於是未免有偃然髙天下之志謂羣臣舉莫有能望清光者夫以皇上有彌天之福則泰然享天下若不為過皇上有如天之志則偃然髙天下若不為異然人主之心患其無所畏而不患其有所畏也大抵天下之事畏則立不畏則弛畏則修不畏則壞畏則事事振刷物物精明不畏則事事頽靡物物晦蝕一念之分治亂安危存亡之判也今皇上畏心少弛矣天其可不思所以回皇上之畏乎皇上而自回其餘則必剛健必憂勤必屛嗜慾必絶玩好必戒奢侈必親君子必受直言必排宦官必建世子畏之一念上通於天皇上之畏心既回則天之愛心亦回矣持此心之敬盖常論之天下以君心為主君心以敬為主敬不持於常定治未見其能定者況人之常情久其道而不享其成則此敬分習其言而不收其效則此敬息非特好惡義利之取舎常決於此而天下國家之安危每繫於此人主亦嘗興念否乎繼自今必齊莊中正以立此敬剛健篤實以行此敬日就月將以維持此敬知之至也如朱氏所謂衆物之表裏精粗無不到吾心之全體大用無不明則一敬之通必好民之所好惡民之所惡矣意之實也如朱氏所謂實其心之所發一於善而無自欺則一敬之復必不以利為利以義為利也勿謂暗室之可欺此敬必有作無輟勿幸時事之僅安此敬必有常無變始見明通而公溥上行而下效矣周應鼇庚戌省當定在我之天故嘗以為霓裳嫚舞羽衣簧皷昏吾天也燕遊侈麗黛白淋漓荒吾天也北司弄柄南陽怙恩蔽吾天也在我之天未定故在天之天不定固無足怪是必戒燕飲之無度而後天者定去便嬖之側媚而後天者定斥左道之蔽惑絶小人之迎合而後天者定然則在我之天既定則在天之天庸有未定乎敬心當存殿御臨政天威咫尺嚮晦宴息鬼神森列十手十目雷霆若震不睹不聞日星昭垂清臺告變凛乎此心内廷遊逸心一心也羽檄交馳惕然此心邊塵暫息心一心也吾見愆陽苦雨之沴轉為五風十雨之祥木饑水毁之災轉為金穰多黍之慶瓜分輻裂之變轉為車書文軌之同銀濤雪浪之禍轉為河清海晏之寧鴟張虎視之韃轉為幕南隂山之竄離居告病之民轉為奠枕安堵之樂一敬之推功用詎易量哉懼心易怠臨外朝南面若懼也入深宫邃宇則弛矣對經帷講席若懼也見歌板舞袖則弛矣聞天變真可畏之言若懼也信天數不足慮之解釋則又弛矣可必者在敬視聽言動無一而非正盖曰吾求無缺於吾身而已而非必曰以冀雨𤾉之時若也嚴恭寅畏無時而不存盖曰吾求無二於吾心而已而非必曰以冀休祥之吾格也故祗事之誠常若降鑒之臨於側則内庭宴安皆修德之地奉順之念常若譴告之參於前則暗室屋漏皆持心之所卑宮菲食懼侈泰也夙興夜寐憂怠荒也法家拂士慮放肆也左繩右矩防過愆也盤銘几杖懼僣差也舉天下物慾之事一毫不以入於心而每懐危懼之意特有加於上帝對越之時耳當順天意無使女寵僣宮闈則天意順無使戚里干朝政則天意順無使宦官侵主柄則天意順無使小人間君子則天意順無使夷狄侵中國則天意順若夫不御正殿減膳徹樂此特應天之末耳偶句上帝臨汝毋貳爾心景星慶雲適所為妖一陟一降在帝左右烈風迅雷未必非福嚴恭寅畏無念而不存不曰災異之来而後冇畏天之心也發政施仁無時而不順不曰譴告已形而後有召和之政也祗事之誠常若降鑒之在於側則内庭燕安皆修德之地奉順之念常若譴告之參於前則暗室屋漏皆持心之所勅天之命惟時惟幾雖日賡此歌未足也敬天之渝無敢馳驅雖日講此詩未足也潛雖伏矣亦孔之昭一陟一降在帝左右上帝臨汝無貳爾心相在爾室不愧屋漏事證帝王以德回天洚水嘗儆堯矣堯有勞来之德則洚水不能為害烈風嘗儆舜矣舜有弗迷之德則烈風適以為祥桑穀在朝非銅駞荆棘之漸乎惟中宗德稱迪哲則中興之治為有開飛雉鳴鼎非野鳥入室之證乎惟髙宗德由明哲則憲天之功為有光然則天災流行國家代有禍變隨弭帝王獨能不然則福善禍滛之公胡為有其兆而無其應耶虞周清明之德人徒見齊七政類上帝大舜之克當天心也豈知昭受弗迷之誠而其一念清明者有以格之又徒見其反風禾盡起成王之能祈永命也豈知緝熈光明之學而其一德清明者有以致之㑹朝清明如武王則天休震動乃所以興周維清緝熈如文王則迪知天威乃所以受命否則昏德若夏帝用不臧矣穢德若商上帝弗順矣舜湯以實應天上帝之類六宗之禋舜非不事乎文也而昭事之實則不專在於此桑林之禱六事之責湯非不事乎文也而消變之實則不專在於此盖天命之時勅聖敬之日躋意者舜湯之所謂實若乃在此而不在彼歟漢唐隂陽感應五星連珠兩曜合璧非天數之偶符也三皇治古德邁道醇以陽召隂之應也日月薄蝕星隕如雨非天數之適變也春秋世降君弱臣彊以隂感隂之證也渭上朝漢鐘鼓喧轟非夷運百年之當弱也厲精之主大化神明陽足以勝隂也漁陽亂唐干戈觸擾非夷運一旦之驟强也溺愛之君宴於鴆毒陽不能以制隂也信矣乎宇宙之間通一氣耳其端芒萌於人主之心其證應著於天地之表陽亨而復則隂盛而剥矣陽長而泰則隂消而否矣其或隂蒙而翳者是吾洞洞之陽未逹也隂凝而殺者是吾生生之陽未暢也漢唐玩天之心人主畏天之心漢儒之論啟之也人主玩天之心亦漢儒之論啟之也盖自漢以来諸儒發明此理實天人為一致使時君有所警此啟人主畏天之心然謂某事必有某證某證必應某事求之而不合焉則玩心不能不生此啟人主玩天之心大抵天之於君父之於子也父有震怒為人子者事事當修省不可以為某事當修省而某事不必修省天有譴告為人君者事事當修飭不可以為某事當修飭而某事不必修飭也今焉漢儒之論乃以貌作恭主於時雨言不從主於常𤾉然則雨暘之愆捨貌言之外皆可以不敬乎又以田獵不宿出入無節則致常雨棄法律逐功臣則致常𤾉然則雨𤾉之愆捨田獵出入法律功臣之外皆可以自縱乎祖宗以實應天太祖憂勤庶政斥逺聲色其敬天之意已見於平時而一遇霖雨則訪大臣出嬪御躬行之實著矣太宗躬親萬機勤恤民隱其敬天之意常存於平日而一遇旱蝗則察不平之刑遣踈決之使躬行之實彰矣故霖雨未幾而雨止河塞旱蝗未幾而雨作蝗死亦可以觀天人相與之機乎祖宗敬天有圗故勒碑孝經我太宗豈具文哉儲經史八千卷我真宗豈事美觀哉大書無逸之圗仁宗非勞於暫而逸於後也書寫要義之篇􅈒宗非勤於始而怠於終也手書石刻中興之功卒能扶天地於不壊不冺之域者豈非我髙宗純誠之推歟圗掲敬天太平之運卒能儕唐虞商周之盛者豈非我孝宗亹亹不倦之用歟信知裒集格言以掲敬天之圗不若日就月將以堅敬天之念撮取遺訓以寫畏天之戒不若體乾行健以凝畏天之心也明矣時政皇上敬天有圗聖天子取成經以禆代天之治掲成圗以寫敬天之心宸章奎畫左右彪分雲漢之昭回也天葩睿藻倫序森列春陽之敷布也猗歟休哉真天下千載之遇歟愚嘗拜手稽首而為之言曰轉肆為敬回天意於一時易謹終如始凝天眷於後日難夫皇天本無親也而享道可必帝命本難諶也而福善昭昭金縢之書一啟反風之祥如谷答響雲漢之行方修中興之烈若皷應桴㝠㝠之中應感何神是之謂回天意於一時易雖然常厥德於不變然後保厥命於無窮貳吾誠於旦暮必速天怒於俄頃内殿無逸之圗代以山水則變故層出太液尚書之圗退而醇酒而實異數見彼天命之去留實係乎吾心之敬忽是之謂凝天眷於後日者難天開平治之機陛下即位以来某年蝗某年旱某年星變某年明堂雨雹某年誕節雷某年三朝日食極而至丁未之旱人不聊生陛下身親目擊非臣之虚言也陛下於丁未之旱大儆懼大修省而丁未之旱雖甚丁未之讖則虚戊申有年己酉大有年今嵗旱稲已成更數日無風雨則稉􅐕亦可無慮陛下於此而以憂勤為心則何歲不如今嵗陛下於此而以逸樂為心則今時安保其不如曩時臣竊以為平治之機此其一也黄大任結尾人定能勝天竊謂天定勝人人定亦勝天今日之事不當畏天之未定當思天之一定屏絶物欲嚴拒聲色則我之天定力窒悻門痛懲旁曲則我之天定登崇忠鯁罷黜姦邪則我之天定削去侈靡斷自宮闈則我之天定戒斥營求先自藩邸則我之天定減膳徹樂虚儀也下詔求言虚文也䇿免公相歸過也件件靠實事事不欺我之天定而天之天亦定矣不然季龍雖死晉憂方大好還之天道未卜也東敗西喪日蹙百里旂盖之天運未回也兩淮孤城勢漸岌岌波濤之天限未嚴也其謹之哉其慮之哉以敬為主嗚呼敬天之有十二圗固以敬為主也無不敬之書更化之初嘗與思無邪對掲矣欽天臺之作邇年以来嘗於内庭規創矣使聖天子真見夫毋不敬之一言所當服膺則斯圗不作可也真見夫欽天命臺之訓所當踐言則斯圗無有亦可也敬即欽也欽即敬也一敬之外無復餘說方寸清明運量六合為天地立心為生民立命為去聖繼絶學為萬世開太平無可無不可尚何八事之凜凜有如執事所言者哉惟論思及之君當抑隂助陽曩者丁未陽復六花呈瑞百辟稱慶豐穰有期二三年来民猶歉告胡為瑞於雪而不瑞為嵗耶敢端拜而為之說曰隂陽凝而為雪天之瑞也抑隂助陽以為心君之所以符此瑞也君子為陽小人為隂進君子退小人則邪正之隂陽定中國為陽夷狄為隂强中國弱四夷則夷夏之隂陽定德澤為陽刑罰為隂暢德澤而省刑罰則政治之隂陽定我之隂陽既定則天之隂陽亦莫不定不然則邪干正夷謀夏刑勝德隂邪用事陽明退舎雖膏露於天醴泉於地不可以瑞言也而雪乎哉又況氷山雖頹而毒死泉下者猶抱未雪之寃痛霜刄既接而䧟身胡沙者尚多囓雪之凄凉龍翔興役千室露處獨不念其風雪之飄颻乎鴈影流離萬間失庇獨不念其雨雪之凍裂乎常陽為沴隱雷比屋憂未歇也抑昔人之詩有曰長安有貧者宜瑞不宜多毋謂曩年之瑞雪可喜當思曩年之瑞雪未驗風簷迫晷慚不盡述惟執事恕其略羣書㑹元截江􅃠卷三
