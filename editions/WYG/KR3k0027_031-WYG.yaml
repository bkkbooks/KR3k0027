body:
  text: 羣書㑹元截江網卷三十一伊洛傳授吕正字名大臨字與叔學於横渠横渠卒乃東見二先生而卒業焉著克己銘見仁門克己詩見學門孟子序舉世多智則雖不言而道已眀雖不辨而事已白君子奚事乎言辨哉舉世多愚則雖欲不言不辨不可得也故孔子曰予欲無言而未嘗不言孟子曰予豈好辨而未嘗不辨夫不得不辨者以其世之愚而已矣諸儒至論伊川曰呂與叔守横渠學甚固横渠無說處皆相從纔有説便不回朱子曰呂與叔惜乎夀不永天假之年必所見又别程子稱其深潛縝密語録偶句復禮有録所以見師法之源流克己有銘所以見仁道之廣大范内翰名祖禹字淳夫蜀人嘗與伊川論唐事及作唐鑑盡用其言伊川曰淳夫相信如此淵源録諸儒至論客有見伊川先生几案惟唐鑑一部先生曰三代以来無此議論伊川曰講筵須得淳夫来色温而氣和尤可以開陳是非導人主之意同上朱子曰范淳夫資質極平正㸃化得是甚次第范淳夫純粹精神雖知尊敬程子而講學處欠闕偶句色温氣和伊川以此稱之純粹精神晦庵以此譽之謝上蔡名良佐字顯道上蔡人學於河南程夫子兄弟之門初頗以該洽自多講貫之間旁引傳記至或終篇成誦夫子笑曰可謂玩物䘮志矣先生爽然自失面熱汗下若無所容乃盡棄其所學而學論語序邈乎希聲一唱而三嘆誰其聽之淡乎無味酒元而爼腥誰其嗜之以謂無隠乎爾則天何言哉夫子之言性與天道不可得而聞也以謂有隠乎爾則四時行焉百物生焉夫子之文章可得而聞也是豈真不可得而聞哉詩云鳶飛戾天魚躍于淵此天下之至顯聖人惡得而隠哉所謂吾無行而不與二三子者也上天之載無聲無臭此天下之至􅄨聖人亦惡得而顯哉宜其二三子以為有隠乎我者也語録伊川曰相别一年做得甚工夫曰也只去箇矜字伊川因語同志者曰此人為學切問近思或問謝子於勢利如何曰打透此闗十餘年矣朱子發見謝子曰何以見教曰聽説論語夫聖人之道無㣲顯無内外由洒掃應對進退而上達天道本未一以貫之一部論語只恁看呂晉伯甚好但處事太煩碎如召賔客食亦須臨時改换食次吾嘗語之曰每日早晩衙纔覆便令放者只為定故也凡事皆有恁地簡易不易底道理看得分明何勞之有易曰易簡而天下之理得晉伯甚好學初理㑹仁字不透吾因曰世人說仁只管着愛上怎生見得仁只是力行近乎仁力行闗愛甚事何故知近乎仁推此類而言之晉伯因悟曰公說仁字正如尊宿門說禪一般晉伯兄弟中皆有見處一人作詩説曽㸃事曰凾丈従容問且酧展才無不志諸侯可憐曽㸃惟鳴瑟獨對春風詠不休一人有詩曰學如元凱方成癖文到相如反類俳獨立孔門無一伎只傳顔子得心齋天理也人亦理也循理則與天為一與天為一我非我也理非理也天也惟文王有純徳故曰在帝左右帝謂文王帝是天之作用處或曰意必固我有一焉則與天地不相似矣鳶飛戾天魚躍于淵無此私意上下察以明道體無所不在非指鳶魚而言也若指鳶魚為言則上面更有天下面更有地在知勿忘勿助長則知此知此則知夫子與㸃之意一敬是常惺惺法心齋是事事放下其理不同荅胡康侯簡云承諭進學加功處甚善甚善若欲少立得住做自家物須著如此邇来學者何足道能言真如鸚鵡也富貴利達今人少見出脱得者所以全看不得難以好事期待他非是小事切須勉之透得名利關便是小歇處然須藉窮理工夫至此方可望有入聖域之理不然休說一心者何也仁是已活者為仁死者為不仁今人身體麻痺不知痛痒謂之不仁桃杏之核可種而生者謂之桃仁杏仁言有生之意推此仁可見矣學佛者知此謂之見性遂以為了故終歸妄誕聖門學者見此消息必加功焉或問横渠教人以禮為先與明道使學者從敬入何故不同荅曰既有知識窮得物理却從敬上㴠養出来自然是别正容謹節外面威儀非禮之本一學者且須是窮理物物皆有理窮理則知天之所為則與天為一與天為一無往而非理也窮理則是尋箇是處有我不能窮理人誰識真我何者為我理便是我窮理之至自然不勉而中不思而得從容中道曰理必物物而窮之乎曰必窮其大者理一而已一處理窮觸處皆通恕其窮理之本歟諸儒至論朱子曰上蔡為人英果眀決强力不倦克己復禮有程二夫子盖嘗許其有切問近思之功所著論語説及門人所記遺語皆行于世如以生意論仁實理論誠以常惺惺論敬以求是論窮理皆精當而直指窮理居敬為入徳之門則於夫子教人之法又最為得其綱領文公語録㳺御史名酢字定夫建州建陽人自幼不羣讀書一過目輒成誦壯益自力心傳目到不為世儒之習誠於中形於外儀容辭令燦然有文望之知其為成徳君子也論語序立不教坐不議黙而該之者道也此聖人所以嘗欲無言也學不厭教不倦揮而散之者人也此聖人所以不免於有言也盖無言者道之全有言者道之散聖人之於人以謂無待而興者常少有待而興者常多則散道而明教有教而立道且得無言乎諸儒至論伊川一見謂其賢可與適道謂楊龜山曰㳺君徳器粹然問學日進政事亦絶人逺甚㳺酢於西銘讀之已能不逆於心言語外立得箇意思便道中庸矣遺書朱子曰定夫夾雜王氏學當時王氏學甚行薰炙得其廣南軒曰二程先生兄弟倡明道學於河南東南之士受業於門見推髙弟有三人焉曰上蔡謝公龜山楊公而㳺公其一也楊公謂公心傳目到誠於中形於外儀容辭令燦然有文望而知其為成徳君子矣楊龜山名時字中立家於南劒之將樂縣諡文靖公天資夷廣濟以學問充養有道徳器早成積於中者純粹而宏深見於外者簡易而平淡閑居和樂色笑可親臨事裁處不動聲氣與之㳺者雖羣居終日澹然不語接物以和而鄙薄之態自不形也擢諫議大夫兼祭酒言蔡京以繼述神宗皇帝為名實挾王安石以圖身利故推尊安石加以王爵配享孔子廟廷謹按安石為邪説以塗學者耳目敗壊其心術者不可縷數乞追奪安石王爵毀去配享之像遂降安石從祀之列諫官馮解上䟽詆公遂罷上即位除工部侍郎論自古聖賢之君未有不以典學為務後以老疾乞出告老從之胡文定公作墓誌或説當世貴人以為事至此必敗宜力引耆徳老成置上左右開導上意度今猶可及也遂以秘書郎語録六經不言無心惟佛氏言之亦不言脩性惟楊雄言之心不可無性不可脩故易止言洗心盡性記言正心尊徳性孟子言存心養性佛氏和順於道徳之意葢有之理於義則未也聖人以為尋常事者莊周則誇言之莊周之傳召禪家呵佛罵祖之類是也如逍遙逰養生主廣譬曲喻張大其說論其要則逍遙逰一篇子思所謂無入而不自得而養生主一篇乃孟子所謂行其所無事而已諸儒至論明道在穎昌時先生尋醫調官京師因往頴昌從學明道甚喜每言曰楊君最㑹得容易及歸送之出門謂坐客曰吾道南矣語録朱子曰龜山只要閑散然却讀書尹和靖便不讀書龜山雜傳是讀多少文字將樂人性急粗率龜山却寛平此是間出然相率處依前有風土在龜山天資髙朴實簡易然所見一定更不復窮究某嘗謂這般人皆是天資出人非假學力語録偶句㑹得容易吾道南矣明道以此稱之天資出人不假學力晦菴以此稱之尹和靖諱焞字彦明洛陽人年二十師伊川程子舉闈策士議誅元祐黨人不荅遂棄舉子業靖康初以布衣召不至詔褒為和靖處士洛陽陷家殱焉先生死復甦竄長安山谷中逆豫以禮聘溺水逃去展轉蜀道紹興五年以崇政説書召凡二十辭八年冬始入見除秘書郎明年遷少監太常少卿權禮部侍郎毎遷輒力辭其冬除徽猷閣侍制提舉萬夀觀辭不已遂奉外祠即虎丘以居年已七十矣貧無以歸也後二年沒於㑹􅄞之寓舍祠堂記語録近有人説吾伊川學乃聞而知之者某曰不知聞箇甚底孟子所謂聞而知之不知聞何事見何物和靖言初見伊川時教某看敬字某請益伊川曰主一則是敬當時雖領此語然不若近時看得親切寛問如何是主一曰敬有甚形影只收斂身心且如人到神祠中其心收斂更着不得毫髪事非主一而何一日看大學有所得問伊川曰心廣體胖只有自樂伊川曰到這裏和樂字着也不得昔嘗請益於伊川曰某謂動静一理伊川曰試喻之適聞鐘聲某曰譬如鐘未撞時聲固在也伊川喜曰且更㴠養並語録先生之學學聖人者也聖人所言吾當言也聖人所為吾當為也詞章云乎哉其要有三一曰玩味諷詠言詞研索指歸以求聖賢用心之精微二曰㴠養㴠泳自得藴蓄不撓存養氣質成就充實至於剛大然後為得也三曰踐履不徒誦其空言要須見之行事窮行之實施於日用形於動静語黙開物成務之際不離此道所謂脩學如此而已所謂讀書如此而已涪陵記善録序諸儒至論朱子曰尹和靖從伊川半年方得見西銘大學不知那半年是在做甚麽想見只是且教聽他説話尹和靖主一之功多窮理之功少和靖不觀書只是持守得好語録黄勉齋曰盖嘗考先生之所學篤於踐行不為虛語未嘗求人之知人亦莫能窺其所藴也今其可見者經帷進講門人記録耳性即其所遇於世者觀其所處然後知先生之於道卓乎不可及矣利害者人心之私義理者道心之公公私之間迭為勝負一取一舍而賢不肖可知也至於歴險難之極而不變處貴顯之驟而不動抱仁戴義終其身而不悔非盛徳能若是乎理義充於中則禍福成敗榮辱得失膠轕萬變日陳乎前而此心自若也程子之門從逰之士皆宏博俊偉極天下之選而於先生亟稱之其察之審矣祠堂記偶句持敬在乎主一聞於伊川者如此學聖之要有三記於涪陵者如此胡文定諱安國字康侯建之崇安人不及登二程之門謝上蔡為應城宰公以典學使者過之不敢問以職事以弟子禮入門遂禀學焉公語五峯曰吾於謝㳺楊三公皆義兼師友實尊信之若論傳授吾所聞在春秋自伊川所發紹興間有毀程氏學者公入劄力明二程邵張之學乞加封號載之祀典程門髙弟皆以斯文之任期公中興以来傳伊洛之學者惟公得其正紹聖中廷試䇿問主紹述公推大學格物平天下之道考官定為第一宰執以不詆元祐將降哲宗再讀親擢為第三髙宗即位召為中書舍人兼侍講專以春秋進講公乞在外編集書成奏御上屢稱善春秋傳序古者列國各有史官掌記時事春秋魯史爾仲尼就加筆削乃史外傳心之要典也而孟氏發明宗㫖可為天子之事者周道衰微乾綱解紐亂臣賊子接迹當世人欲肆而天理滅矣仲尼天理之所在不以為己任而誰可故曰我欲載之空言不如見之行事之深切著明也空言獨能載其理行事然後見其用是故假魯史以寓王法撥亂世反之正又曰知我者其惟春秋乎罪我者亦惟春秋乎知孔子者謂此書遏人欲横流存天理既滅為後世慮至深逺也罪孔子者無其位而託二百四十二年南面之權使亂臣賊子禁其欲而不得肆其戚矣近世推隆王氏新説按為國是獨於春秋貢舉不以取士庠序不以設官經筵不以進讀斷國論者無所折􅇆天下不知所適人欲日長天理日消其效致亂臣賊子莫之遏也吁至此極矣仲尼親手筆削撥亂反正之書亦可以行矣天縦聖學崇信是經乃欲斯時奉承詔㫖輒不自揆謹述所聞以為之説以獻雖㣲辭奥義或未嘗貫通然尊君父討亂賊闢邪説正人心春秋大經大法畧具庻幾聖王經世之志小有補云諸儒至論上蔡曰胡康侯如大冬嚴雪百草萎死松栢挺然獨秀尹子曰康侯可謂聞而知之者侯師聖曰視不義富貴如浮雲者惟康侯一人朱子曰文定從龜山求書見上蔡畢竟文定之學後来得於上蔡者為多文定五峯之學只有太過無不及語録自伊洛之教被於東南胡氏之學本於上蔡而騐於春秋故其於事物尤親切不徒為空言偶句所聞在春秋盖發於伊川也對䇿惟大學不詆夫元祐也胡五峯名宏字仁仲文定公季子自幼志於大道嘗見楊中立先生於京師又從侯師聖先生於荆門而卒傳文定公學優㳺南山之下餘二十年玩心神明不舍晝夜力行所知親切至到析太極精微之藴窮皇王制作之端綜事物於一源貫古今於一息指人欲之偏以見天理之全即形而下而發無聲無臭之妙使學者驗端倪之不逺而造髙深之無極體用該備可舉而行晚嵗嘗被召不幸寢疾不克造朝而卒胡子知言静觀萬物之理得吾心之恱也易動處萬物之分得吾心之樂也難是故智仁合一然後君子之學成義者權之行也仁其審權者乎道充乎身塞乎天地而拘於軀者不見其大存乎飲食男女之事而溺於流者不知其精誠者命之道乎中者性之道乎仁者心之道乎惟仁者為能盡性至命萬物生於天萬事宰於心性天命也命人心也而氣經緯乎其間萬變著見而不可掩莫或使之非鬼神而何天理人欲同體而異用同行而異情進修君子宜探别焉有其徳無其位君子安之有其位無其徳君子恥之君子有宰天下之心裁之自親始君子有善萬世之心行之自身始探視聽言動無息之本可以知性察視聽言動不息之際可以㑹情視聽言動道義明著孰知其為此心視聽言動物欲引取孰知其為人欲是故誠成天下之性性立天下之有情效天下之動心妙情性之徳庸人與聖人同聖人妙而庸人之所以不妙者拘滯於有形而不能通矣今欲通之非致一何適哉一日之早暮天地之始終具焉一事之始終鬼神之變化具焉天下有三大大本也大幾也大法也大本一心也大幾萬變也大法三綱也有大本然後可以有天下見大幾然後可以取天下行大法然後可以理天下皇王大紀序三皇五帝三王五伯者人之英傑為君為長率其陪二應時成物如春生夏長秋之利冬之正也自堯而上六閼逢無紀堯之初載甲辰迄于周赧乙巳三千有三十年天運之一周人事之治亂備矣萬世不能易其道者也後人欲稽養生理性之法則舍皇帝王伯之事何適哉愚嘗研精經典泛觀史籍致大荒于兩離齊萬古于一息諸家所載所謂史也史之有經猶身之支體有脉絡也易詩書春秋所謂經也經之有史猶身之脉絡有支體也支體具脉絡存孰能得其生乎夫生之者人也人仁則生矣生則天坤交泰乾坤正禮樂作而萬物俱生矣是故萬物成於性者也萬事貫於理者也萬化者一體之所變也萬世者一息之所累也若太極不立則三才不備人情横故事不貫物不成變化不興而天命不幾於息乎此皇王大紀之所以書也又云天下之無仁政也久矣立宗廟井田封建學校軍制宮室車騎冠服聘射燕飲養老䘮𦵏服制祭祀皆仁政之大者也集五十有三篇以見帝王之法制大畧具存若能引而伸之觸類而長之亦可以大治諸儒至論朱子曰五峰善思然過處亦有之語録南軒知言序曰是書乃平日之所自著其言約其義微誠道學之樞要制治之蓍龜也或問於栻曰先生是書論性特詳無乃與聖賢之意異乎栻應之曰今之異端直自以為識心見性譸張雄誕髙眀之士樂聞一喜趋之先生烏得而忘言哉其言曰誠成天下之性性立天下之有情効天下之動而必繼之曰心妙性情之徳有曰誠者命之道乎中者性之道乎而必繼之曰惟仁者為能盡性至命夫學者誠能因其言而精察於視聽言動之間卓然知夫心之所以為妙則性命之理葢可黙識偶句析太極精微之藴五峰之理學也窮皇王制作之端五峰之道學也胡致堂名寅字眀仲文定公長子也朱文公曰胡致堂議論英發人物偉然向嘗侍之坐見其數盃後歌孔眀出師表誦張才叔自靖人自獻于先王義陳了翁奏狀等可謂豪傑之士也讀史管見乃嶺表所作當時並無一册文字随行只是記憶所以其間有牴牾處語録吕東莱名祖謙字伯恭六世祖申國文靖公公之問學術業本於天資習於家庭稽諸中原文獻之所傳􅀶諸四方師友之所講融液無所偏滯晩雖卧疾其任重道逺之意達於家政纎悉委曲皆可為後世法吕祖儉撰墓誌諸儒至論朱子曰東莱聰明看義理却不仔細縁他先讀史多所以看粗着眼伯恭於史却分外去子細看於經却不甚去理㑹或問東莱之學如何曰合陳君舉陳同父二人之學問而一之伯恭門徒氣宇厭厭四分五裂各自為説久之必至消歇子静則不然精神𦂳峭其説分眀能變化他人使旦異而歳不同其流害未艾也並語録以一身而備四氣之和以一心而㴠千古之祕推其有足以尊主而庇民出其餘足以立教而垂世然而狀貌不踰於中人衣冠不詭於流俗近之而不見其来随之而莫規其躅矧是丹青孰形心曲惟觀之者有以得其大焉則庻或遺編之可續文公賛偶句胡眀仲議論英發可謂豪傑之士也吕祖謙天資髙眀可謂博雅之士也張南軒名栻字敬夫謚宣公自幼而觀於先正忠獻公之左右則所見聞固已莫非仁義忠孝之實既長又以公命學於五峯胡公仲仁之門一見契合遂得其傳然猶不以自足益務取友四方以力求其所未至葢又十有餘年然後所造愈深逺公為人坦蕩明白表裏洞然講理既精信道又篤其樂於聞道而勇於徙義則又奮厲明決無一毫滯吝意固其徳新業廣日進無疆而其承家之學許國之忠判決之明計憲之審葢舉一世而不兩人也朱文公作墓銘洙泗言仁昔者夫子講道洙泗示人以求仁之方葢仁者天地之心天地之心而存乎人所謂仁也人惟蔽於有已而不能以推失其所以為人之道故學必貴於求仁也自孟子沒寥寥千有餘載間論語一書家蔵人誦而真知其指歸者何人哉其讀程子之書其間教門人取聖賢言仁處類聚以観而體認之因裒魯論所載疏程子之説于下而推己見題曰洙泗言仁與同心者共講焉諸儒至論朱子曰敬夫太聰明看道理不仔細敬夫聴人説話便肯改南軒見識純粹踐行誠實使人望而敬畏之敬夫髙明他將讀人都似他纔一說時便更不問曉㑹與否且要説盡他箇某則性鈍讀書極辛苦故與人言多不敢為髙逺之論南軒疾革定叟求教南軒曰朝廷官爵莫愛他底一朋友求教力疾謂之曰蟬脫人欲之私春融天理之妙語訖而逝敬夫見識極髙都不耐事並語録廣仁義之端至於可以彌六合謹義利之判至於可以析秋毫拳拳乎其致主之切伋伋乎其幹父之勞仡仡乎其任道之勇卓卓乎其立心之髙知之者識其春風沂水之樂不知者以為湖海一世之豪彼其揚休山立之既與其不可傳者死矣觀於此者尚有卜其見伊呂而失蕭曹也耶文公賛主意朱子發眀程氏之言理學至伊洛而大明理學至考亭而愈著一門伯仲自相發明其同也不為茍同其異也亦非立異至朱子而其論始備學者以朱子之言求二程先生之說可以旁通而曲暢矣性出於天固程子之言也以朱子所論天地之性專指理而言氣質之性則以理與氣言之則性之出於天也審矣才出於氣固程子之言也以朱子所謂氣清則才亦清氣濁則才亦濁觀之則才之出於氣也明矣生之謂性性即氣氣即性亦程子之言也今以朱子性氣二字兼言方備而論之則性即氣也氣即性也確矣一隂一陽謂之道此朱子之言也通乎此則程子隂陽形而下者非道之語豈不信乎天地之間隂陽交錯實理流行與道為體此朱子之論也知乎此則程子離了隂陽更無道之語豈不的乎考論至此豈非理學至伊洛而大明至考亭而愈著歟諸儒繼紹程氏之學發揮正學啟迪後人在二程既有以紹百聖不傳之統源流正學繼續前人在諸儒亦能以紹二程可傳之統夫斯道之大有所絶而後續有所繼而益眀非人則不傳繼往聖開来哲者不在二程乎非人則不行守正理光前業者不在諸儒乎是故軻死不傳道非不傳也傳之者無其人也荀揚大醇小疵道無醇疵也所以醇疵者其人之罪也天地自我位人極自我立彰眀三五聖人之㫖發揮千古道源之大得濓溪之真傳一話一言無非至理一步一履無非妙道紹已絶之統繼未墜之業夫是之謂有所絶而必續然而淵源所漸豈惟游夏從游速肖豈惟顔閔繼前聖絶學為萬世開太平皆我責也吾師曽行之吾惟步趋乎吾師可也吾師曽言之吾惟謦欬乎吾師可也紹伊洛之正傳升堂入室環珮鏘如難疑荅問流風藹如發揮已眀之理闡揚無窮之妙肆之使愈大推之使愈宏夫是之謂有所闡而益明警段諸賢按二程之派太極一圖周子葢以傳之二程其意銘之疏殆如日星之炳煥然融而㑹之則大哉乾元萬物資始原於造化之初者無二極也通書一編㑹陰陽動静於一心合天地萬物於一體猶根荄之始露發而為剛柔善惡之性演而為仁義中正之理猶枝幹之條暢至程子謂中重於正正而必中至朱子謂仁義中正皆有體用殆如枝葉之敷發然貫而通之則乾道變化各正性命得於禀賦之初者無二理也論太極一圖之用太極一圖體用精粗羲畫文爻訓明㫖敷仁義中正意㑹心孚抽闗啟鑰道學範模吁嗟乎惟濓溪之易乎民胞物與西銘次序伊川得之怡然理悟傳銘遺圖發明有緒同耶異耶歸於理越吁嗟乎奚張程之殊於周乎伊洛之清粹毓二程愈傳愈大文公其人誠實禮敬更相辨眀惟恐後學莫曉逕庭吁嗟乎是豈一賢四君子之矛盾乎若夫挹風月之光霽想西銘之仁意吾願景周張之髙致春風滿襟雪立於門亷退樂道吾師朱程觀黨禍方知守道之篤嗚呼不觀宋衛之辱無以知孔門諸子從道之堅不觀齊梁之沮無以知孟氏諸弟尊師之篤不觀黨禍之惨無以知伊川門人特立之操方黨事之起也根連株繫禍發如矢而張繹屹然砥柱甘心溝壑之不變方率禁之嚴也逺遯深逝不敢親承而馬時中歲寒不改至執贄十反而不已吾道可守而夷狄之法不可徇則謝顯道其人也進士可棄而元祐之學不可議則尹彦明其人也嗚呼風雨如晦雞鳴不已諸君子有焉吾道㡬墜而復續性學已晦而復明至今談伊川之學者斂袵起誦伊川之誨者書紳自守是雖先生善淑之教亦諸君子固守之誠也觀我宋乃知人才之盛我宋受命五星聚奎宗工鉅儒與時疊出建圖属書根極領要畫隂陽動静而不入於迂誕談仁義中正而不淪於卑賤則周元公其人也二程之學得之濓溪温然春風使人愛慕肅然秋霜使人敬畏君子有取於二程一張之學㕘之二程氣質變遷動與理合徳性混成言與道俱君子有取於二張大學之教既絶而復續中庸之道愈抑而愈明是故飲於河南者各充其量不特如揚如㳺而止而闗中之士躬行者為多如吕如蘇者又不一人也明道之功大矣哉道學自天之所相國朝尊崇儒術文治昌明天相昭代篤生先覺不由師傳黙契道體泄造化之機發太極之妙則有若濓溪之周闡乾坤之秘掲東西之銘則有若闗中之張髙極於太極之妙而下及於仁義禮樂剛柔善惡之際推本於乾父坤母之初而廣及於宇宙民物昆蟲草木之衆畫圖著書與世立極俾秦漢以来之墜緒一旦晦而復明豈非天之所以夀斯道之脉淑斯人於無窮者歟道學何代以無人我宋受命五星聚奎休運文明開先於此明清之氣全付於人名世大儒相望挺出不由師傳黙契道體太極有圖所以發是理之幽秘易通有書所以闡是圖之精微吾幸有濓溪焉負特立之才知太學之要博聞强識明物察倫辨異端似是之非開百世未眀之惑材賞經正有中立不倚之風識慮詳明造知㡬其神之妙悼斯文之湮晦而傳周易慮聖人之志不明而傳春秋吾得明道伊川焉且先後數十年間得春秋之本義見王道之治亂則有孫太山掲東西之銘明體用之學則有張興胡斯文有傳學者有師雄視百代自作一家則有歐與蘇此數公者或以經術理致鳴當時或以古文之學唱天下無非接伊洛之正𣲖為後人之師模推原其由則二程學於濓溪諸儒學於二程者也道學㡬廢而復盛惟我國朝星奎水洛言其風俗何其粹也言其人才何其盛也是豈山川風氣之㑹天地氣數之旺至是而一值哉今觀其時大者光明而俊偉小者靖共而豈弟以敢言為忠以緘黙為耻世道清明葱舊一時中更介甫諸人以私意而斷喪之黨以銷天下之氣偽以排天下之學生意㡬一髪矣然湖之南洛之北西而闗輔大儒輩出教道復行精而窮性命之原微而析義理之辨盖至於南渡以後其流𣲖逺其餘波衍斯道一脉愈盛焉故朱子鳴於建張子鳴於湘吕東莱鳴於浙又相與紬闗洛已著之書紹聖賢不傳之秘羽振宫沉金相玉潤一時之風俗人才又足以追還祖宗之舊是何教道獨盛於我朝也結尾耕道而得道嗟夫木鐸音微杏壇迹滅聖人吾不得而見矣猶幸其有孔氏之六經乎北睇黄陂西望舂陵先賢不可作已猶幸其有濓洛之遺編乎吾於六經之中師孔氏遺編之内師周程則洙泗之問答即我之問答濓洛之請承即我之請承鑚堅仰髙何必曰顔舞雩詠歸何必曰㸃對榻夜談吾其為侯師聖乎春風中坐吾其為朱光庭乎雪深侍立吾其為㳺楊二賢乎室一千古潛㑹方寸吾胸中之靈觸之則發道學正傳顧不在我耶非我能之願學焉見賢思齊賢然則泛伊洛之航問洙泗之津脫落佔畢融㑹太真所謂文字口耳抵贅耳胸中洒落光風霽月嘗以是想像濓溪立侍坐之雪吟詠歸之風嘗以是歩趋二程終日危坐俯詠仰思嘗以是斂袵横渠虚心㴠泳切已省察嘗以是景慕晦翁諸生志此乆矣執事許之進否羣書㑹元截江網卷三十一
