body:
  text: 羣書會元截江網卷三十四異端附楊墨佛老事實源流孔子曰攻乎異端斯害也已語先王大道陵遲隳廢異端並起若楊朱墨翟放蕩之言以干時惑衆者非一孟序今師異道人異論百家殊方臣以為不在六藝之科孔子之説者勿使其進然後統紀可一法度可明董仲舒䇿莊楊蕩而不法墨晏儉而廢禮申韓險而無化鄒衍迂而不信揚五百周罔君臣之義衍無知於天地之間雖鄰不覿也問道周道衰孔子沒火于秦黃老于漢佛于晉宋齊梁魏隋之間韓原道韓愈詆排異端攘斥佛老進學解楊墨墨者夷之因徐辟而求見孟子孟子曰吾聞夷子墨者墨之治喪也以薄為其道也然而夷子葬其親厚則是以所賤事親也徐子以告夷子夷子曰之則以為愛無差等施由親始孟子曰天之生物也使之一本而夷子二本故也孟滕文上楊朱墨翟之言盈天下楊氏為我是無君也墨氏兼愛是無父也無父無君是禽獸也楊墨之道不息孔子之道不著是邪説誣民充塞仁義也吾為此懼間先聖之道距楊墨放淫辭以承三聖者能言距楊墨者聖人之徒也滕文下楊子取為我拔一毛而利天下不為也墨子兼愛摩頂放踵利天下為之盡心上墨家者流貴儉兼愛上賢右鬼非命上同前藝文志墨者儉而難遵是以其事不可偏循太史公六家要旨楊墨塞路孟子辭而闢之廓如也揚子佛老道家使人專一動合無形淡定萬物與時遷徙應時變化太史公六家要旨道家無為又曰無不為其實易行其辭難知其術以虛無為本以因循為用同上老子之言道德吾有取焉及捶提仁義絶滅禮學吾無取焉耳揚子老子之小仁義非毁之也其見者小也坐井而觀天曰天小者非天小也彼以煦煦為仁孑孑為義其小之也則宜其所謂道道其所道而非吾所謂道也其所謂德德其所德而非吾所謂德也凡吾所謂道德云者合仁與義言之也老子之所謂道德云者去仁與義言之也古之為民者四今之為民者六古之教者處其一今之教者處其三今其言曰聖人不死大盜不止剖斗折衡而民不爭嗚呼其亦不思而已矣如古之無聖人人之類滅久矣今其法曰必棄而君臣去而父子禁而相生養之道以求其所謂清淨寂滅者嗚呼其亦幸而出於三代之後不見黜於周公孔子者也其亦不幸而不出於三代之前不見正於周公孔子者也今其言曰曷不為太古之無事是亦責冬之裘者曰曷不為葛之易也責飢之食者曰曷不為飲之易也欲治其心而外天下國家滅其天常子焉而不父其父臣焉而不君其君民焉而不事其事舉夷狄之法而加之先王之教之上幾何其不胥為夷也不塞不流不止不行人其人火其書廬其居庶乎其可也韓愈原道今夫二氏行乎中土也蓋六百餘年矣其植根固流波漫非所以朝令而夕禁也韓答張籍書且彼佛者果何人哉其行事類君子耶小人耶若君子也必不妄加禍於有道之人如小人也其身已死其鬼不靈天地神祗昭布森列非可誣也韓與孟簡書有周孔必有楊墨要在有孟子而已今西域之教嶽其基溟其源亂於楊墨者甚矣獨昌黎先生露臂瞋視詬之於千百人內其言雖行其道不熾皮日休夫釋氏以清淨恬虛為禪定以柔謙退遜為忍辱故怨爭可得而息也以菲薄節苦為修行以窮達壽夭為因果故賤陋可得而安也故其喻云必煩惱乃見佛性則其本衰代之風激之也李節偶句夷子竊仁貽禍萬世老氏道德流為少恩孟子本仁義而楊墨亦出入於仁義韓愈言道德而佛老亦出入於道德儒者之道先於明理而老氏之學亦明理然其流有絶滅理學之弊儒者之道本於六藝而莊周之論亦得於六藝然其流有焚滅六籍之禍自孔孟不傳之後而黃老之學唱於蓋公和於賈誼大熾於司馬談之父子而吾道一厄矣自董仲舒既沒之後而釋氏之學漢明帝無故開其端梁武帝無識宗其教唐憲又從而實其怪異之迹吾道又再厄矣皇朝事實太宗太平興國八年上謂宰相曰凡為君治人即是修行之地行一好事天下獲利即釋氏所謂利也為君者撫育萬類皆如赤子無偏無黨各得其所豈非修行之道乎淳化四年詔近臣曰虛靜致治黃老之深旨也夫萬務自有為以至無為無為之道朕當力行之長編高宗紹興十年上宣諭曰朕於釋老之書未嘗留意蓋無益於治道也聖政十一年上曰三代之世士大夫盡心禮法鮮有異端之惑自漢明帝金人之夢佛法流入中國士大夫靡然從之其上者惑於清淨之説而下者惑於禍福之報殊不知六經廣大靡不周盡如易無思無為寂然不動感而遂通天下之故與禮正心誠意者佛氏清淨之説果有以勝之乎至若積善之家必有餘慶積不善之家必有餘殃與夫作善降之百祥作不善降之百殃者即佛氏禍福之報也士大夫不師六經而盡心佛法殊為可笑同上十二年上曰朕觀人主欲消除釋老二教或毁其像或廢其徒皆不適中往往而熾今不放度牒可以漸消而吾道勝矣二十六年上謂執政曰朕謂人主但當事合天心而仁及生民自然享國久長如高齊蕭梁奉佛皆無益僧徒不耕而食不蠶而衣無父子君臣之禮以死生禍福恐無知之民竭民財以興建塔廟蠧民傷教莫此為甚繫年録關洛發明明道曰楊墨之害甚於申韓佛老之害甚於楊墨楊氏為我疑於仁墨氏兼愛疑於義申韓則淺陋易見故孟子只闢楊墨為其惑世之甚也佛老其言近理又非楊墨之比此所以為害尤甚楊墨之害亦經孟子闢之所以廓如也遺書彼釋氏之學於敬以直內則有之矣義以方外則未之有也故滯固者入於枯稿疏通者歸於恣肆此佛之教所以為隘也吾道則不然率性而已斯理也聖人於易備言之釋氏本怖死生為説豈是公道唯務上達而無下學然則其上達處豈有是也夫不相連屬但有間斷非道也孟子曰盡其心者知其性也彼所謂識心見性是也若存心養性一段事則無矣彼固曰出家獨善便於道體自不足或曰釋氏地獄之類皆是為下根之人設此怖令為善先生曰至誠貫天地人尚不化豈有立偽教而人可化乎學者於釋氏之説直須如淫聲美色以逺之不爾則駸駸然入其中矣顔淵問為邦孔子既告之以二帝三王之事而復戒以放鄭聲逺佞人曰鄭聲淫佞人殆彼佞人者是他一邊佞耳然而於己則危只是能使人移故危也至於禹之言曰何畏乎巧言令色直消言畏只是須著如此戒慎猶恐不免釋氏之學更不消言常戒到自家自信後便不能亂得釋氏以不知離去他身上起意思奈何那身不得故却厭惡要得去盡根塵為心源不定故要得如枯木死灰然沒此理要有此理除是死也釋氏其實是愛身放不得故説許多譬如蝜蝂之蟲已載不起猶自更取物在身又如抱石投河以其重愈沈終不道放下石頭惟嫌重也佛氏不識陰陽晝夜死生古今安得謂形而上者與聖人同乎並遺書道之不明異端害之古之害近而易知今之害深而難辨昔之惑人也承其迷暗今之惑人也因其高明自謂窮神知化而不足以開物成務名為無不周遍其實乖於倫理雖云窮深極微而不可以入堯舜之道天下之學非淺陋固滯則必入於此詳見二程門伊川曰儒者潛心正道不容有差其始甚微其終則不可救如師也過商也不及於聖人中道師只是過於厚些商只是不及些然而厚則漸至於兼愛不及則便至於為我其過不及同出於儒者其末遂至於楊墨至於楊墨亦未至於無父無君孟子推之便至於此蓋其差必至於是也釋氏之説若欲窮其説而去取之則其説未能窮固已化而為佛矣只且於迹上考之其設教如是則其心果如何固難為取其心不取其迹有是心則有是迹王通言心迹之判便是亂説故不若且於迹上看斷定不與聖人合其言有合處則吾道固已有不合者謝顯道厯舉佛説與吾儒同處問伊川先生先生曰恁地同處雖多只是本領不是一齊差却並遺書張子曰釋氏妄意天性而不知範圍大用反以六根之微因緣天地明不能盡則誣天地日月為幻妄蔽其用於一身之小溺其志於虛空之大此所以語大語小流遁失中其過於大也塵芥六合其蔽於小也夢幻人世謂之窮理可乎不知窮理而謂之盡性可乎謂之無不知可乎塵芥六合謂天地為有窮也夢幻人世明不能究其所從也浮屠明鬼謂有識之死受生循環遂厭苦求免可謂知鬼乎以人生為妄幻可謂知人乎天人一物輒生取舍可謂知天乎孔孟所謂天彼所謂道感者指遊魂為變為輪回未之思也大學當先知天德知天德則知聖人知鬼神今浮屠劇論要歸必謂死生流轉非得道不免謂之悟道可乎並正蒙朱子曰邪説橫流壞人心術甚於洪水猛獸之災慘於夷狄篡弒之禍故孟子深懼而力救之孟子苦死與楊朱墨翟辨是如何與他有甚寃惡所以闢之渾如不共戴天之讐能言距楊墨者聖人之徒也才説道要距楊墨也便是聖人之徒孟子不闢老莊而闢楊墨楊墨即老莊也儒釋之異正為吾心與理為一而彼以心與理為二耳彼見得心空而無理此見得心雖空而萬物咸備釋氏虛吾儒實釋氏二吾儒一釋氏以事理為不緊要而不理問遺書云釋氏於敬以直內則有之義以方外則無也道夫於此未安先生曰前日童蜚卿正論此以為釋氏大本與吾儒同只是其末異熹與之言正是大本不同某氏云釋氏所謂性猶吾儒所謂心釋氏所謂心猶吾儒所謂意此説好釋氏便不理會理吾儒必要理會理吾儒見得箇道理如此了又要事事都如此佛氏則説便如此作也不妨其失正在此佛説萬理俱空吾儒説萬理俱實聖賢論道理句句是實事直是攧撲不破如禪和子談玄説妙總是脫空如琉璃瓶非不好看但觸便破釋氏只見箇鶻淪底性自家這裏靣却有仁義禮智信釋氏空底却做得實自家實底却做得空緊要處只爭這些子佛氏要空此心道家要守此氣皆是安排子思作中庸只是戒謹恐懼便自然常存不用安排老子之術沖嗇不肯役精神老子之學欲保養其物以不死釋氏之學欲此心不生不滅二者皆是逆天道屈伸消長之變若吾儒則順之而已歐公嘗言老氏貪生釋氏畏死其説亦好氣聚則生氣散則滅順之則已釋氏則皆悖之也天下只是這道理終是去不得如佛老雖滅人倫然自是逃不得如無父子他却拜師為父以其弟子為子長者謂之師兄少者謂之師弟但是他只護得箇假底聖賢便是存得箇真底佛家説要廢君臣父子他依舊廢不得且如今一寺依舊有長老之類其分亦甚嚴如何廢得但皆是偽佛初入中國止是説修行未有許多禪底説話今學佛者云識心見性不知識是何心見是何性胡明仲侍郎自説得好人生物也佛不言生而言死人事可見也佛不言顯而言幽釋氏稱其有見只是見得箇空虛寂滅不知他所謂見者見箇甚底莫親於父子他却棄了父子莫重於君臣他却絶了君臣以至民生彝倫之間不可闕者他一皆去之所謂見者見甚箇物聖門只説為仁不曾説知仁上蔡一變而為張子韶上蔡所不敢衝突者張子韶出來盡衝突了近年陸子靜又衝突出張子韶之上遊楊謝三君子初皆學禪後來餘習猶在故學之者多流於禪遊先生大是禪學老子忍心無情其流多入於變詐刑名太史公特地與申韓同傳其源流實是如此佛氏之學自達摩西來之後只説人心至善其徒又取莊老之説附益之其説愈精然終不是正理耳佛氏之原出於楊氏而不愛己身以濟衆生又入於墨氏後漢明帝時佛始入中國當時楚王英最好之然都不曉其説直至晉宋間其教漸盛然當時文字亦只是將老莊之説來鋪張直至梁會通間達摩西來然後一切被他掃蕩不立文字直指人心人才聰明便被他引誘將去問佛與莊老之不同處曰莊老絶滅義理未盡至佛則人倫滅盡至禪則義理滅盡以其有空寂之説而不纍於物欲也則世之所謂賢者好之矣以其有玄妙之説而不滯於形器也則世之所謂智者恱之矣以其有死生輪回之説而自謂可以不淪於罪苦也則天下之奴𨽻爨婢髠黥盜賊亦匍匐而歸之矣語録偶句世無吕大臨則富弼輕禮義之教矣時無周端頤則程氏惑怪誕之説矣仁義之説勝則楊墨之學廢歐陽公之本論然也本論一出而天下始知勝之之道遷四民之常居毁中國之衣冠石徂徠之怪説然也怪説一出而天下又知可怪之論明道極推其教之失則曰滯固者入於枯稿疏通者歸於恣肆是説也其中異端之膏肓歟伊川推其難辨之弊則曰楊墨之禍慘於申韓釋老之禍慘於楊墨是説也其為吾道之大間歟諸儒至論武宗去佛而愈熾石氏曰唐佞佛者三帝代宗憲宗懿宗是也獨武宗奮然不顧不恤怨誹器其像宅其廬盡髮天下髠革千歲之弊於崇朝可謂不世偉績矣雖平藩鎮破朋黨未足比其功也然未幾而愈熾者抑其入于人心者甚固人見佛之廢如焚書坑儒然共思復之則武宗又安能攖人心於長久耶當修本以勝佛廬陵曰佛法為中國患千餘歲世之卓然不惑而有力者莫不欲去之已嘗去矣而復大集攻之暫破而愈堅撲之未滅而愈熾遂至於無可奈何是果不可去耶蓋亦未知其方也救天下之患者亦必推其患之所自來而治其受患之處佛為夷狄去中國最逺而有佛固已久矣堯舜三代之際王政修明禮義之教充於天下當此之時雖有佛無由而入及三代衰王政闕禮義廢後二百餘年而佛至于中國由是言之佛所以為吾患者乘其闕廢之時而來此其受患之本也補其闕修其廢使王政明而禮義充則雖有佛無所施於吾民矣此亦自然之勢也養生報死有據則可制潁濱曰四夷之教交於中國縱橫放肆其尊貴富盛比於王者而其徒黨遍於天下宫室屋宇衣服飲食常侈於天下之民而中國之民明哲禮義之士亦未嘗以為怪幸而其間有疑怪不信之心則又安視而不能去此其故何也彼能執天下養生報死之權而吾無以當之是以若此不可制也蓋其教之入於民者甚深而道之恱於民者甚佞世之君子未有以解其所以入易其所以恱是以終不能服天下之民民以為養生報死皆於此吾未有以易之而遂絶其教欲納之正而傷其心欲去其邪僻而絶其不忍之意故民之從之也甚難臣愚以為嚴賞罰敕官吏明好惡謹取豫不赦有罪使佛老之福不得茍且以惑其生因天下之爵秩建宗廟嚴祭祀立尸祝有以大塞人子之望使佛老之報不得乘隙而制其死使天下無憾於見奪而日安其新此聖人所以變天下之術歟主意差毫釐繆千里吾儒之學與異端異惟當力辨於毫釐之間也毫釐之差千里繆焉昔者孔門之諸子師也過商也不及而夫子力救之自常情觀之子張之過近於智子夏之不及近於愚而自其有毫釐之差以要其終則或流於為我或流於兼愛皆其初之過與不及也則夫楊氏為我而推其末至於無君墨氏兼愛而推其末至於無父孟子之衛道其嚴矣哉且楊墨之害甚於申韓佛老之害甚於楊墨孟子之闢楊墨韓愈之闢佛老同也然蓋公言黃老賈誼言申韓錯不足道也誼亦為之乃知邪説之移人如淫聲美色不辨則駸駸焉入之矣然則異端似是之非獨非吾儒乎老子欲以無法治天下而申韓卒以苛法毒天下荀卿以先生之道授李斯而李斯以荀卿之學殺天下士毫釐一差而為禍甚烈則孟氏之功不在禹下者信非虛語也警段衛道之力孟子論鄉原之賊而切切然有似是而非之辨韓愈闢異端而斷斷然有孔墨相為用之説孟子之説固明白易信而韓愈若混然而無辨何耶吁愚然後知二君子衛道之意為至切也孟子之明白易見者所以昭示異端之害而韓子之混然無别者蓋原其似是而非之底藴使夫人知墨氏之似孔子者如此其難辨則其他之難辨者可以類而推矣此則楊墨之本仁義申韓之原道德其初似正其名似美而所以差殊者可不論而自見矣申韓之術後世固有習之而不察其非故其為文駁而不純猶幸不流於慘刻之歸也其後儒者至於體認一差為害滋甚兹固不忍言也學術之際君子其亦明辨之歟認理之差異端之説其殆起於何時乎嗚呼王教廢缺諸子各以其意而求道皆以善為之而不知至於此也老者曰吾為黃帝氏之學也佛者曰吾為盡性之學也為楊氏者自以為義為墨氏者自以為仁彼豈自為異端哉惟其不得聖人者而正之毫釐之差遂至於此而其初亦未至若是也蓋自是説之蔓延日浸月長其徒相與守之吾道之統無所宗主是以紛紛至于今也孔子不拒老氏孟子力排楊墨其以是之故乎且夫兼愛者固無害於仁為我者似亦道之所不廢搏之無名也執之無端也而孟氏若此力言者何哉誠以纖微之地有不辨焉天地將易位而名物將失其歸故自其兼愛推之而至於無父自其為我推之而至於無君嗚呼天不生孟氏於周衰人之類幾何其不胥而為禽獸也流弊之失自孔孟之傳失其宗諸子百家紛紛籍籍何可縷數莊老以虛無之學亂天下申商韓非以刑名慘刻之學亂天下佛氏以識心見性之學亂天下蓋不知其幾百年於此矣然其講學議論之際其初未嘗不本於善自其精微之不及也躬行之不及也老莊守無為之見其弊也絶滅理法申韓守名官繩墨之見其弊也流毒天下佛氏守空寂之見其弊也夢幻人世此皆見之差而理之必致也實理之昧自堯舜孔孟之道不明而佛老乘其虛而入之君臣之義如之何其廢之彼佛老則出無君臣之分父子夫婦人之大倫也彼佛老則入無父子夫婦之親毁天常滅人道莫甚於此以天下之實理為空虛無用之物以君子之實學為淺近庸常之習塵芥六合不知其為小也夢幻一世不知其為大也捨實地而不由外實心而不悟嗟夫特未知聖人之所謂實理者耳知堯舜道心人心之分則佛氏之言無心非實也知孔氏之言仁則老氏之言芻狗萬物非實也知孟子盡心知性之旨則佛氏之言識心見性非實也在天有實理在人有實心一溺於清淨寂滅之境自謂窮神知化而實不足以開物成務自謂無不周遍而實則外於倫理自謂窮深極微而實不可以入堯舜之道蓋其視有為無指實為空者之過也偶句人非歐陽子安知有本論人非石安道安知有怪説欲治其徒惟一李方叔耳欲窮其説惟一李泰伯耳趙中令賢相也而以佛語論奏劉元城正人也而以佛心語人縱橫恣肆而以四端五常為障礙棄離超脫而以眼耳鼻舌為塵根人惟無得於大學則必樂聞其荒唐謬悠之説人惟無得於中庸則必流入於虛無曠蕩之見時政決教所當絶明夷左腹大易所戒左道亂政王制必誅古人所以斥異端者所以正人心也陛下聰明睿智崇信異教之事謂宜無之然聞諸道路猶曰金碧翬飛昔不能已於感生崇奉之祠雘丹輪奐今不能已於妃謁奉先之宇陛下豈不謂國計雖狹豈計此錙銖乎然纍百巨萬不可謂錙銖也陛下又豈不謂感生之祠吾為宗廟社稷祈福也妃謁之宇吾為閨門袵席報本也然天有顯道厥類惟彰帝王為社稷神明之主自應聖子神孫於千萬年豈待祈而後福哉先王春秋祭祀所以報其先祖之恩具有典法豈有奉夷狄教而可以為天下之達孝者哉淫祀無福經有明文非固設為此辭以禁人抑亦理之所以自無有也今四夷之教交於中國耗天下之土木以營宫剎則曰行好事竭天下金寶以緣異像則曰崇功德捐天下膏腴以奉其徒則曰求福田利益民窮政散莫之省憂六朝之事可寒心也臣願陛下明義理以息淫祠抑私恩以絶異教使無君無父之教不橫行於中國天下幸甚庚戌狀元策佛教方盛行今者虞庠夏校之制未備而塔廟叢于海內緣南畝操機杼之民寡而斷髮毁服之類肩相摩踵相交也綴學立制補禮改樂之道未極而蠻貊之書昡中國者方駕聯駟不足載邃宇高棟不足容也聲名文物之具未全而洪鐘疊鼓之聲鏗鏘於閭閻也崇奉之侈古之未極者今復盡行之矣結尾不可流於異端雖然小道之中或有可觀依約之言間亦近理為吾儒者聞其説而惑焉始而疑終而與之俱化矣甚者至曰吾儒亦嘗師之矣故闢佛老未有如韓子也而於墨氏之説尚或取焉近者蘇子由亦為老子注解其有不合於吾道者亦遷就而為之辭黃山谷晚年亦浸淫於釋氏播之聲詩可考也夫彼皆大賢也世之師表也而猶若是何責其餘哉嗚呼吾儒猶主人也異端猶盜也盜憎主人顧恱其辭乃曰盜亦有術於是引而置之門牆之內可乎墨氏以死守之吾儒以生失之可勝歎哉老莊之説非無足取也然其言近理者吾儒皆有之烏用求其説之善與否哉故必闢楊墨如孟子闢佛老如韓昌黎歐陽子而後足以言儒者矣若曰參其同異而究其心迹深恐易以溺人也羣書會元截江網卷三十四
