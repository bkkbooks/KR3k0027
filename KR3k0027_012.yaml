body:
  text: 羣書會元截江網卷十二楮幣厯代事實周小宰以官府之八成經邦治四曰聽稱責以傅别鄭司農云稱責謂貸豫也傳别謂劵書也武帝與公卿議更錢幣以贍用乃以白鹿皮方尺緣以繢為皮幣直四十萬食貨志詳見財用門憲宗時商賈至京師委錢諸道進奏院使富家以輕裝趨四方合劵乃取號飛錢唐志偶句漢之皮幣可佐軍需唐之飛錢亦為民便圜法立於太公而國用以足傅别聽於小宰而民生以利有周官之泉府則可與職幣相流通無御府之禁錢則雖更皮幣為無益皇朝事實真宗張詠鎮蜀患蜀人鐵錢之重不可貿易於是設質劑之法一交一緡以三年為一界而換之寶訓仁宗天聖元年初蜀民以鐵錢重私為劵謂之交子以便貿易富民十六戶主之其後富者稍衰不能償所負爭訟數起太中祥符末薛田為轉運使請官置交子務以權其出入久不報寇瑊守蜀遂乞廢交子不復用會瑊去而田代之詔田與張若谷度其利害田若谷議廢交子不復用則貿遷非便但請官為置務禁民私造又詔梓州路提點刑獄官與田若谷議田等議如前詔從其請始置益州交子務長編孫輔常知益州轉運使以偽造多欲廢不用輔曰交子可以偽造鐵錢可以私鑄有犯私鑄鑄可廢乎但嚴治之不當以小害廢大利交子則不廢言行録神宗熙寧二年條例司言交子之法用於成都人以為便今河東公私苦運鐵錢勞費宜如髙遵裕等議行交子之法仍令運司舉官置務從之長編四年文彥博奏行交子之法上曰行交子誠非得已若素有定制財用既足則自不須此八年富公弼言交子之法以方寸之紙飛錢致逺然不積錢為本亦不能以空文行今鐵冶所收極廣更鑄折二錢可得百萬緡為交子本辨上可行十二事上委公弼營辦哲宗紹聖二年上問曽布欲行交子法如何布曰須有見錢相當乃可行熙寧四年韓絳作相兩欲施行皆議論不成而罷同上髙宗紹興元年尚書省言契勘便錢之法自祖宗以來行於諸路公私為便有司奉行不務經久致失信於民當别行措畫詔戶部印押見錢關子降付婺州召人入中執關子赴杭越權貨務請錢東南會子蓋張本於此六年置行在交子務先是張澄請造交子與見緡並行仍造三十萬用於江淮矣至是中書言交子錢引并沿邊糴買文鈔皆係祖宗舊法便於民間已效舊法先樁一色見緡印造交子錢給諸路令公私並同見緡行使逐造百五十萬充糴本將悉行之東南焉初用張澄議置交子務於行在而未有所樁見錢於是言者極論其害由是遂復用關子焉二十六年上曰四川交子亦有弊如沈該稱提之説但官中常有百萬緡遇交子減價自買之即無弊矣三十二年置行在會子務後𨽻都本場悉視川錢入法行之東南諸路上供軍須並同見錢仍分一千二千三千凡三等仍賜左帑錢十萬緡為本三十二年詔新造會子許於淮浙湖北京西路州軍行使降亭戶鹽本錢並支見錢外其不通水路州軍上供等錢許盡用會子解發沿流諸州軍錢會各半其諸軍起發等錢並以會子品搭支給用戶部請也並係年録淳熙三年進呈淮東西兩總領乞以金銀兊換會子支遣上曰綱運既以會子中半入納何故乃爾闕少葉衡龔茂良奏緣朝廷以金銀換會子此不過散在民間三日復宣問衡奏戶部嵗入一千二百萬其半為會子而南庫以金銀換收者四百餘萬流行於外者才二百萬安得不少上曰此是戶部之數不知兩總領所分數入納如何恐久有弊須究見其源兩處具各以二十萬與之兊換金銀及錢茂良奏聞得商旅往來貿易兢用會子一為免稅二為省腳乘三為不復折閲以此觀之大假流通上因曰卿等子細講究本末思所以為善後之計聖政東南舊無會子大觀中蔡京嘗為錢鈔所出猥多官司不以出納旋即廢紹興元年張俊屯婺州始置見錢關子六年置行在務將行之東南趙時霈言官無本錢懼民不信其不便者五朝廷遂改為關子臨安民復私置便錢會子錢處和為守奪其利歸於官既而遷戶部乃於户部為之三十一年遂置行在會子務後𨽻多茶場自會子初創逮今四十年遂與見緡並行不可復廢矣凡會子兩界並行總三千六百萬朝野雜記湖北會子隆興元年總領王班始創謂之直便會子淳熙十一年始通行於京西路紹興初亦造兩界同上兩淮會子乾道二年初令戶部印三百萬緡謂之交子八年始出行在會子收兊之紹興三年議者以淮上鐵錢多欲革其弊乞印造兩淮會子付兩路依湖北路三年一兊許流轉至江池太平建寧鎮江興國江隂界內四川錢引者舊成都十六户主之建炎初增印六十三萬自後率增印焉鐵錢會子者興元府金洋州用之創自隆興元年朝野雜記偶句紹興上供則有盡用會子之令淳熙上供則有三分會子之説熙寧中用之陜西未幾輒罷錢不足耳紹興中用之閩浙疑沮不行錢不足耳神宗欲廣交子之法必更鑄鐵錢而後行髙宗欲造糴本之會以未樁見錢而遂止髙道裕請行之河東行之凡九閲月而罷沈起嘗請行之陜西行之凡四閲月而罷以新交一而易舊交之四則行於大觀之時出御府金而收空劵之數則見于淳熙之際孝宗令州縣入納必用會則朝廷輕用之患無有趙開出官錢以貴價收楮則州郡輕視之患無有名臣奏議請以積錢為本神宗朝富公弼奏交子之法以方寸之紙飛錢致逺然不積錢為本亦不能以空用文行以商虢鄜耀紸崖清逺鐵冶所收極廣茍積冶更鑄折二錢嵗除工費外可得百萬緡為交子本謹并上可行十二事云入納不受會子孝宗朝臣寮奏伏覩去嵗指揮許人戶以會子入納官物及今年正月內令諸州軍起發上供諸色窠名錢許用三分會子比見浙中州縣交納稅物全不交曽子只收一色見錢却將見錢於所在兌買會子以分數解發其所得贏餘皆不入官唯以資給私費而已夫公家既不用會子民間何緣流通欲乞州縣入納官物許民戶鈔上分明聲説官會若干如官司不受許民戶經戶部御史臺越訴忠厚謹審之意寧宗朝真德秀奏自楮幣之更州縣奉行失當于是估籍徒流所在相踵而重刑始用矣科敷折配逺近騷然而厚斂始及民矣告訐公行根連株逮而苛政始四出矣假稱提之説逞朘削之私者唾掌四起而酷吏始得志矣夫是數者豈朝廷本指哉方其弊壞既極不得已而變通之出御府之金捐祠曹之牒展期以收換多方以優恤惟恐其病民也法行之初雖有情重估籍之文未幾又為之令曰當估籍者毋得専行必聞於朝以俟報可忠厚謹審之意寓於不言又若是其至也偶句偽造交子但當禁治慶厯廷臣之奏也偽造有禁行之有嚴嘉定臣僚之奏也皮公弼言交子不能空行必先積錢為本曽布言交子不可遽行必有見錢以相當諸儒至論錢貴而後楮貴葉正則曰古今之變世數之易物之輕重貨之貴賤其間迭往迭來不可逆知然錢貨至神之物無留藏積蓄之道惟通融流轉方見其功用今世富人既務藏錢而朝廷以盡征天下錢入于王府其入者不可使之出又立楮於外以代之不知錢以通行天下為利錢雖積之甚多與他物何異人不究其本源但以錢為少只當用楮楮行而錢益少故不惟物不可得而見而錢亦不可得而見然自古今之弊相續而至於今日事極則變變極則反必須有作新之道但未知其法當如何變其決不可易者廢交子然後可以使所藏之錢復出若夫冨強之道在於物多物多則賤賤則錢貴錢貴而後輕重可權交易可通今世錢至賤賤出乎物少其變易之道非聖人不能也當明斂散之術張文伯曰今交子之行通流於江淮閩浙一夫可𢃄千萬緡無關津譏征之患無變易賫持之勞尤便於民今民間往往重錢而輕楮劵者何耶蓋由失斂散之術也在昔楮劵之行于蜀賤則官出錢以斂之貴則官出楮以散之使居者以藏鏹為得行者以挾劵為便是故州縣之折納四方之征商坊場河渡之課息不責其錢不拘其楮故錢重而楮亦重今則不然官之豫民者則以楮而其取於民者則必曰見錢焉朝廷散于郡邑者則以楮而其索於郡邑者則必曰見錢焉若是則錢安得不重楮安得不輕為今之計莫若權其利在民握其利在我斂散周流使錢楮為一則無輕重之不等矣楮幣興而錢益少葉正則曰三錢並行而相制之術盡矣而猶不足至於造楮以權之凡今之所謂錢者反聽命於楮之行而錢益少此今之所患而不能救之也夫率意而戲造猥以輔一時之缺而遂貽後日之憂大都市肆四方所集不復有金錢之用盡以楮相貿易括囊而趨勝一夫之力輒為錢數百萬行旅之至於都者皆輕出他貨以售楮天下隂相折閲不可勝計凡今之弊豈惟使錢益少而他貨亦棄之矣主意以錢權楮以楮救楮不若以錢權楮以楮救楮是以火而燎火也以錢權楮是以水而沃火也今廟堂之所講明者曰楮廷紳之所議論者亦曰楮但知以楮救楮之策吁楮如之何而可救也國家所待以為國脈者一折閲之楮耳內而朝廷百辟外而監司郡守莫不以楮介意愚獨惜其不知以錢留意也以楮介意但知楮價之折閲所當稱提不知官司之所以稱提之者不専在楮在於以錢救楮也以錢救楮則楮日重以楮救楮則楮日輕何者子母相權之法也己酉國子解魁以信用法用楮之策莫如信重楮之計莫如法信以行之而法以守之楮之為用庶乎其可重矣何謂行之以信發號施令當無反汗今也永逺之説既須收換之文復出是自為不信矣可以令天下乎何謂守之以法信賞必罰當無如息今也偽造之禁虛設減伯之戒徒多是自弛其法矣可以令天下乎難者曰國家以仁厚立國豈務行操切迫急之政則將應之曰信國之寶也民之庇也言之而民莫不從特患乎吾之信不能自執耳法國之繩也民之防也令之而民莫不畏特患乎吾之法不能自守耳以信而用法則法因信而可施立法以維信則信因法而可久由是推之執事明問之及可以條陳矣以古言今古者以錢重而製楮故楮輕而便民後世以錢乏而製楮故楮多而病民夫合數千緡之楮雖一夫可以將之雖萬里足以致之是誠輕且便也然彼此可以通融逺近不至折閲則可以經久而無弊奈何印造無已出數無窮積年之鼓鑄不足以抵一日之功纍月之儲蓄不足以救頃刻之費錢日以耗楮日以繁母不足以權子實不足以制虛宜其愈稱提而愈折閲也偶句當楮幣積輕之時權之者必有道當楮幣可變之日斂之者必有謀警段行楮貴乎信重楮之令茍以信行之於民奚傷不以信行之於民奚益今之議重楮者率曰印造之不可不正是楮之輕固病於數之多也愚則曰楮不病於多而病於虛多則止于不勝用虛則鄰于無所用自以五準一之令失信于天下雖多方稱提百計營救祗見其愈出而愈虛然則重楮之令可不以信行之乎庚戌省元陳應雷用楮病乎輕楮果可重乎稱提之術已窮而誕謾之説適足以惑民聽輦轂之下粘綴磨補不可辨識民之有楮者惟恐其用之不亟而欲用者惟恐其持去之不速也昔也用便於天下則關子亦足以便天下之用今之楮滯矣昔也利通於天下則公據之足以通天下之利今之楮壅矣守拘攣之説而不思交通之術紙錢使不行之慮可不畏也哉庚戌省經魁黎定虛實權御之道楮幣寢輕利不在國意者未得御楮之道耶蓋有以實御虛之術有以虛御虛之術子母相權此以實御虛也新舊並用此以虛御虛也今卧鏹不藏于富室新鑄不美於冶司海舶運艫漏泄外界錢既不足以權楮亦有以御虛之而已然今之兩界坐受其窮而莫之救愚謂於此冝有變通之道神化之方而議論之徒繁施行之不密則不足以有成也是必有熟慮乎效尤於正元之張􅀈于是𣙜茗之利為國常經然征及草木至纎悉也至暴斂也而二人者其初亦自覺其非遂皆以什稅其一為法猶不失於少寬奈何日趨日下愈繁愈碎至王播則增天下茶稅率百鈛而增五十至王涯則徙民間茶種植之於官場則其瑣屑貪鄙又有愧於趙張多矣吁急迫之政皆戕國之斧斤操切之用皆殘民之鴆毒所得者毫末所喪者邱山所取者涓滳而所失者河海謀國者蓋亦存正大之意向而行精密之法乎本朝𣙜茶之法嘗以國朝𣙜茶之法而觀之曰𣙜務曰貼射曰交引曰三分曰三説曰茶賦紛紜不一然論其大要不過有三鬻之在官一也通之商賈二也賦之茶戶三也乾德之𣙜務淳化之交引咸平之三分景德之三説此鬻之在官者淳化二年貼射置法此通之商賈者嘉祐三年均賦於民此賦之茶戶者愚嘗推原其法自乾德置𣙜茶之務定私買之禁然利額未甚多場務未甚衆而民之有茶猶得以自折其稅是官鬻猶有遺利也至淳化許商賈置鬻茶之場而行貼射之法然大商之利多而國家之課減未幾復罷其制是通商猶有遺法也商納芻粟於邉郡官給文劵於茶務此交引之法爾然鬻引之具一興而所給之茶不充此利復在商而不在官也始以茶錢與香藥犀象為三分之法邉糴未充而商人為便後以轉糴便糴直便為三説之法邉粟雖足而商人折閲此利徒在官而不在商也此二法者官無全利亦無全害商無全得亦無全失蓋彼此迭相救矣夫何韓絳以三司所得之息而均于茶戶之民舊納茶稅今變租錢民甚困之甚者稅多不登而官有侵虧之課販者日寡而商有不通之患此官之與商商之與民交受其弊噫此猶未至極病者茶戶均賦固也異日均賦之外復有𣙜之之法民堪之乎茶地出租可也異日無茶之所亦例有租錢之輸民堪之乎噫民病矣其可不為之慮耶祖宗𣙜茶之寬祖宗節用愛民有司以湖南茶軍請髙其價太宗喻之曰茶則善矣無乃重困民乎真宗嘗謂王旦曰茶之為利要使國用贍足民心和悅可與三司詳議可否於戲祖宗一念在民拳拳不忘若此是以中興之後我髙宗之語王師心曰若財用有餘則摘山之利當與民共之我孝宗委胡元質同茶馬措置悉行除放逺民交慶是皆有德于家法之源流也愚願廟堂之間寬其禁令蠲其逋欠使吾民生理少有蘇息庶可以補兵荒之重困而為培植根本之計執事其主之偶句自陸羽著論而茶之用始顯自玉川賦影而茶之名愈彰自趙贊置稅而茶之利始滋時政茶鹽平亭物價邇者廷紳有請欲議乎廷玉音曰俞將期平售惠至渥也于是而創茶制置之使則兼足國用期殷民也殷民所以平物也于是而效平準兼濟之法則通制國用期裕民也裕民所以平物也于是而修士安取豫之法期無擾于民也無擾于民亦所以平物也抑不知行之以公而不以私否也均其利于下而不敢専其利于上否也若猶未也民猶病而物價未可平也結尾以茶救楮雖然之今日之至嚴密者茶法也至折閲者楮幣也以茶法而救楮幣夫亦稱提者之一節目歟側聞髙宗問輔臣曰今天下一嵗茶利所入幾何秦檜對曰都茶場等等處一嵗所入二百七十餘萬貫于時玉音喻之曰比承平時少以此推之則今日之數又不知其幾倍于中興之初矣朝廷倘能損此以為權楮之用雖未能使之價值立昂亦或可以維持于綿綿延延之地未至如目今之將廢也惟執事以是而復于上請法開寶景德昔開寶中有司請增茶價我太祖曰茶則善矣無乃困吾民詔勿增價噫是言也將天地鬼神實聞之豈惟斯民感之哉愚願今之聖天子法之景德中茶商俱條三等利害宋太祖曰上等利取太深惟從中等公私皆濟噫是言也將民生日用實賴之豈惟國用利之哉愚願今之賢士夫法之羣書會元截江網卷十二
