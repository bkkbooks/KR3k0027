body:
  text: 羣書會元截江網卷十四民兵歷代事實司徒之屬旅師以邦比之法五家為比十家為聯五人為伍十人為聯四閭為旅八閭為聯若作民而師田行役則合其卒伍簡其兵器以鼓鐸旗物帥而至小司徒乃會萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅周禮齊管子作內政制五家為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人以為軍令是故五家為軌故五人為伍軌長率之十軌為里故五十人為小戎里有司率之四里為連二百人為卒連長率之十連為鄉故二千人為旅鄉良人率之五鄉一帥故萬人為軍五鄉之帥率之國語秦郡國有材官漢高祖為沛公於是少年豪吏如蕭曹樊噲等皆收沛子弟得三千人本紀馮唐對文帝曰士卒皆人家子弟起田中從軍馮唐傳秦苻堅遣圍襄陽玄發三州人丁以為刑援唐府兵見兵制門蕭銑據江陵孝恭數進䇿圖銑帝嘉納李靖使江陵孝恭倚其謀遂圖江陵盡召巴蜀子弟收用之代宗時李抱真為懷澤潞觀察留後凡八年抱真䇿山東有變澤潞兵所走集乘戰伐後賦重人困軍伍雕刓乃籍户三丁擇一蠲其徭租給弓矢令間月得曹偶習射嵗終大較閲按籍第能否賞責比三年皆為精兵舉所部得戍卒二萬既不廪於官而府庫實乃曰軍可用矣繕甲淬兵遂雄山東天下稱昭義步兵為諸軍冠李德裕為鄭滑節度徒劍南西川德裕至則率户二百取一人使習戰貸弗事緩則農急則戰謂之雄邊子弟五代天祐三年燕帥劉仁恭下令境內男子勝執兵者盡行文其面曰定霸都通鑑偶句周宣王平淮則用江淮之夫商髙宗伐楚則以裒荆之旅詰戎兵於牧夫立政之所以訓民兵也合卒伍於牧師周官之所以閲民兵也周宣王之料民所以括隱户是擾民也秦始皇之抽丁將以戍邊鄙是擾民也晉文公教其民則示以大搜之禮武靈王教百姓則從於騎射之習漢置材官於郡國八月則嚴都試之法周寓軍制於井田仲春則教振旅之陳周之兵法起於井田則有伍兩卒旅之民齊之兵法起於民居則有軌里連鄉之政不教民戰謂之棄民夫子之言也我善為戰謂之殃民孟子之言也田中起卒衛士農桑漢兵皆出於民馮唐間歲力穡有警荷戈唐兵本出於農劉蕡謝玄發三州之民破苻堅則因人心之已離李孝恭用巴蜀子弟破蕭銑則因救兵之未至隴西之卒皆常居之民雲中之卒亦人家之子塞下居民可以備邊田中吏卒可以勝敵雄邊子弟壯劍南之屯李德裕招義步兵控山東之厄李抱真皇朝事實太祖乾德元年遣使九人選關西鄉兵赴慶州開寶七年十二月益募民為兵民以財及粟獻者官爵之長編太宗雍熙三年上因邊民驍勇者競團結鄉勇上聞而嘉之曰此等生長邊郵間習戰鬭若明立賞格必有大應募者乃下詔募民有能糾合應援王師者資以糧食假以兵甲擒契丹酋豪者隨職名髙下補書聖政四年上以契丹頻冦將大發兵討之遣使往河南北諸州募丁壯為義軍真宗咸平始詔籍河北民為強壯四年詔陜西家出一丁號保毅軍至景德元年於保毅軍內簡集成四十指揮三年河北河東強壯自五伐時瀛霸諸州已有之是嵗始詔河北民家二丁三丁籍一四丁五丁籍二六丁七丁籍三八丁以上籍四為強壯五百人為指揮置指揮使百人為都置正副都頭二人節級四人所在在置籍擇善射者弟補校長聽自置馮勝甲者蠲其户役尋募其勇敢團結附大軍為柵官給鎧甲四年詔陕西民家出一丁號保毅軍給資糧與正兵分戍守城壘遣御史吳膺與轉運使同主其事凡得六萬八千七百九十五人其緣邉軍士先選中者並升為禁軍號保捷祥符間詔河北強壯自今每嵗十月至正月召集教閲習以為常仁宗康定元年吳遵路嘗建議復民兵於是詔遵路籍河東鄉丁為備邉仍下法於諸路聖政康定詔河北河西強壯陜西京東西路新置弓手皆以二十五人為團四團為都五都為指揮置使民年二十係籍六十免每嵗十月後正月前分畨上州教閲半月范仲淹知延州元昊叛時議點鄉兵仲淹上刺其手及兵罷環慶皆復為農种世衡在青澗城請民習兵以銀為的射中與之後人無不然者言行録康定間知制誥王拱辰使契丹還言見河北父老云契丹不畏官軍而畏土丁蓋天資勇悍鄉關之地人自為戰不費糧草坐得徑兵宜速加招募而訓練之慶歷二年知秦州韓琦請益本路兵於是揀陜西弓手悉刺面充保捷指揮英宗詔治平元年命徐億李師錫等刺陜西諸州軍百姓為義勇時韓琦建議刺陜西義勇十五萬六千餘人司馬光極言其不可琦曰君但見慶歷間陜西鄉兵初刺手背後皆刺面充正軍憂今復然耳今已降敕榜與民約永不充軍戍邊矣光曰相公長在此可也異時他人在此因相公見戍之兵遣使運糧戍邊反掌間爾琦默然竟刺之得二十餘萬其後十年運糧戍邊率以為常同上神宗熙寧二年上問府兵之制曰府兵與租調法相須安石曰今上畨者即以米糧給之則無貧富皆可入衛出戍雖未有租調法亦可為也但義勇不須刺手背刺何補於府衛之實今既良民為之當以禮義奬養刺手背但使其不樂而實無補也又擇其鄉閭豪傑為之將校量加奬拔則人自悅服上論民兵雖善止是妨農王安石曰先王以農為兵因鄉遂寓軍旅今邊郵農人則無什伍不知戰守之法然欲可以戰守顧所將帥何如耳有將帥則不患民兵不為用長編王安石創為保甲之法令民自置弓箭及每小保用民力築射垜又自辦錢糧起鋪屋三兩區每保置鼓遇賊聲擊開封府酸棗等縣民千餘人赴寺訴其不便是時五路義勇皆改為保甲至元祐罷之哲宗元祐二年詔諸路巡檢土兵額半差禁軍以樞密院言土兵本以諳習山川地理易於捕冦今嵗久以親戚鄉里之故或庇其為姦請以禁軍相兼故有是命紹聖三年樞密院言廣東西南路搶手土丁熙寧舊法一年縣教一年上州昨自元祐以來罷上州只今縣教慮因此漸成廢惰詔依熙寧舊法並長編高宗建炎二年時諸路方行巡社之法權邦彥奏河東縣民自相糾集為巡社冦不敢犯而言者謂其法利於西北不利於東南乞罷之聖政五年上曰昨范溫帶來京東民兵效用請給春秋特支衣絹一匹昨日令軍中引見頗有藍縷者朕出內帑絹二千匹賜之紹興初王庶知興元兼利路安撫籍諸縣良家子弟號曰義士每兩丁取一三丁取二與免户下物力錢每三千為一隊以知縣為軍正尉為軍副日閲於縣月閲於州不半年有兵二十萬其後紹興二十二年張輔世言利路義士就令土豪領之多率斂邀求役無虛月望放歸農紹興四年承楚秦州水寨民兵邀擊賊馬上曰淮甸遺民乃能力奮忠義不忘國家凡水寨民兵並與放十年租稅及科敷差役仍支撥錢米以助之三十一年詔籍鄉兵知荆南府續減乃請籍民為義勇其法取於人户之雙丁十户為一甲五甲為一團皆有長擇一邑之豪為總首歲於農隙教閲官給其糧其後籍者至七八千人聖政孝宗淳熙三年上御便殿閲兩浙福建土兵上曰軍士皆好身守教閲甫三數月事藝已精熟弓帑手自可比殿前司之數因諭輔臣曰向來烏珠入冦陳思恭邀截於平江官兵乃用長搶不能及金烏珠遂以輕舸遁韓世忠江上之戰亦然若用弓弩烏珠必能擒矣十一年上曰議者多言邊郡太守須是久任今邊郡無兵雖久任何益大軍皆在江南若是創置又費衣糧却是弓弩手民兵無養兵之費有養兵之實緩急亦可用聖政寧宗開禧元年七月壬午詔諸路提刑提舉司措置保甲續長編開禧元年簡荆襄兩淮田卒以備戰兵同上偶句得一曹寶臣則陜西之民皆良民用一种世衡則青澗之民皆善射鄉兵作兩畨教閲者慶歷之制也民兵令一月教閲者淳熙之令也河北強壯真宗以之捍契丹陜西義勇英宗以之備西夏兩淮水寨邀擊賊馬髙宗湖南義丁糾滅郴冦孝宗資以糧食假以兵甲雍熙募民兵之指揮也給以間田護其耕斂景德募民兵之制度也河北強壯之兵始者不過鳩集鄉閭後至抽赴京師久後混為正軍而團集強壯之意失矣陜西保毅之兵始者無異邊氓後至刺手黥面又後運糧戍邊而揀刺保毅之害甚矣三路弓手之兵始者不過守葺城池其後刺充保毅或揀充保捷而弓手復為禁軍矣經傳格言子曰善人教民七年亦可以即戎矣以不教民戰是謂棄之論語募役石壕村有吏夜捉人老翁踰牆走老婦出門看吏呼一何怒婦呼一何苦聽婦前致辭三男鄴城戍一男附書至二男新戰死存者且偷生死者長已矣室中更無人所有乳下孫孫有母未去出更無全裙老嫗力雖衰請從吏夜歸急應河陽役獨得備晨炊夜久語聲絶如聞泣幽咽天明登前途獨與老翁别杜甫石壕吏詩名臣奏議當優土兵請給田况上仁宗曰蕃落廣鋭振武保捷皆是土兵才力伉健武藝精強戰鬭常為士卒先自昊賊擾邊以來惟土兵踴躍志在爭功其如請給甚微不及東軍之下者請遇特攴比常優加其數或别定南郊賞例以激其心則其立功不在東軍之後矣勸用弓箭社神宗朝滕甫言河北州縣近山谷處民間各有弓箭社及獵射手等户習慣便利與夷人無異乞下本道州縣令募諸色公人及城郭鄉村百姓有武勇願舉弓箭者為社每年春長吏就其射處勸誘閲之緩急雖不可調發亦足以為捍禦從之民兵所不可廢韓琦奏英宗曰三代漢唐以來皆籍民為兵故其數雖多而瞻養至簿唐置府兵最為近古今之義勇幾十五萬河東幾八萬勇捍純實生於天性而有物力産資父母妻子之所繫若稍加簡練亦唐之府兵也陜西當西事之初亦嘗三丁選一丁為弓手其後刺為保捷正軍河北河東陕西三路當西北控禦之地事當一體不當刺充正軍司馬光奏英宗曰昔康定慶歷之間籍陜西之民為鄉弓手始者明出敕榜云使之守護鄉里必不刺充正軍屯戍邊邊境榜猶未收而朝廷盡刺充保捷指揮令於邊州屯戍乞早降指揮罷刺陜西義勇冬教有便不便蘇轍上哲宗曰切見仁宗朝河北河東初置義勇至英宗朝推行其法漸及陕西皆以地接胡冦有守禦之備每嵗冬教一月及熙寧中更置保甲使京畿三路之民日夜教習二聖臨御知其不便率皆罷去惟有冬教一月之法三路以備邊之故民習為常不敢辭訴至於京畿諸縣乃與三路邊郡為比一例冬教情所未安伏乞聖慈深念根本之地所宜寬恤特與蠲免郡兵亦當激勸徐端禮上髙宗曰自軍興以來東南州縣糾率鄉兵悍禦盜賊官司無一毫之費若非激賞難以勸功欲將應鄉社守隘防托去處每鄉首領限以名數從州縣出給文慿與免身役候有勞效之人次苐保明申朝廷量加爵賞偶句錢若水言備邊五事募鄉民居其一咸平賈昌朝言備邊六事復土兵居其次慶歷不畏官軍而畏土兵王拱辰之言也土兵伉健常為士卒先田况之言也諸儒至論古今強壯老弱之殊三代之兵不待擇而精其故何也兵出於農有常事而無常人國有事要以一家而備一正卒如斯而已矣及至後世兵民既分兵不得復而為民於是始有老弱之卒夫既為募民而為兵其妻子屋廬既以托於營伍之中而其姓名既以書於官府之籍行不得為商居不得為農仰食於官至於衰老而無歸則其道誠不可棄去是故無用之卒雖薄其資糧而皆廪之終身凡民之生自二十以上至於衰老不過四十餘年之間勇鋭強力之氣足以犯堅冒刃者不過二十餘年今廪之終身則是一卒凡二十年無用而食於官也自此而推之養兵十萬則是五萬人可去也屯兵十年則是五年無益之費也民者天下之本而財者民之所以生也有兵而不可使戰是謂棄財不可使戰而驅之戰是謂棄民秦漢之後天下何其殘敗之多耶其弊悉皆起於分民而為兵兵不得休使老弱不堪之卒拱手而就戮故有以百萬之衆而見屠於數千之兵者其良將善用不過以為餌委之啖賊嗟夫三代之衰民之無罪而死者不可勝數矣東坡民兵即古人遺意議者多稱鄉軍何如曰周禮小司徒會萬民之卒伍而用之家出一人比為伍閭為兩族為卒黨為旅州為師鄉為軍此先王之法也管子作寓令之政卒伍定乎里而軍政成乎郊連其什伍居處同樂死生同憂禍福共之故夜戰則其聲相聞晝戰則其目相見緩急足以相死故能外攘夷狄內尊天子以安諸夏也夫設鄉軍以自衛前哲之意深矣竊觀近世鄉無軍自人不知武事家不藏兵器冦賊之來則以袒禓之軀投餌於虎口故鄉軍之名不可不察也李泰伯府兵乃兵農之分前輩論府兵皆以為兵農之合府兵之立乃是兵農之分而儒者但説先王寓兵於農先王何曽寓兵於農治天下之道分田使之耕築室使之居既有以衣食之則不可無以自衛故教之為兵西魏蘇綽輩欲休息其民遂募人為兵蠲除徭科不復他役國家既可以長享為兵之利而民得家出一人之外亦且可以自安至於太宗府衛既成農遂不復為兵兵亦不復為農兵農之分所以終不復古葉適山水寨按六安故步二山中原壑深逺動數百里姦民逃匿之藪也比年以來稚埋之盜頗出其中劫殺之風浸長不禁此在山之桀黠者也故謂之山寨臨淮之桀黠者謂之水寨水寨之數少於山寨多至數千人而已謂之水寨忠勇名籍於官而身處於家有統領主辨以彈壓之山寨少不下萬人此二寨之人有人以按總之則無事可以勉其安業有事可以勵其立功無人以按總之安寧則為盜賊緩急則擇向背矣陳亮籍邊民為兵欲富國者常患財少欲強兵者常患兵少豐財在於省兵而國勢不立增兵在於募卒而廩給不充二者立國之通患也今欲卒不增而廩不加而獲益兵之利其集沿邊之民而勉以爵賞歟夫塞下之民非他比也耳熟鉦鼓目稔金革男子操刃女子彎弧三尺之童以介胄為樂是非其性異人也習俗使然也昔漢用兵於羌胡矣乃以金城隴西天水安定上郡北地六郡良家子為騎士以其俗迫西羌故髙尚勇力而戰備為習也唐嘗用兵於淮蔡矣議者欲以陳許安康汝夀六郡之民充召募以其居接賊境故習於戰鬭識冦之淺深也是則邊民之可用與內地不侔自古而然矣今塞下之民非怯於古也鄉者敵人殘其桑梓而不敢爭係纍其父母而不敢救人子之情豈恝然至此哉以為出力以禦冦則籍名於官而不得脫否則慮公家之繩而黥面涅手之法行焉甚者緩急赴敵而官軍侵辱媟嫚之故寧竄山林捐妻子棄墳墓而不暇恤也今也使之之術莫若因其有營護廬屋之心而導之以爵賞之以利而使五家為伍五伍為長五長為團五團為部擇其豪民假以爵級如隅官之制而使主之隅官之能否則郡刺史督之課其兵仗而不置於府庫也籍其藝能而不拘於營壘也肄習有時而不妨農事也屯戍有所而不離廛舍也間暇則遣親勸之使分諸民保以奬勸其能慰勞垂老以竦動其心秋冬則命所部之長吏課習器械以考其精粗閲視藝能以較其勇怯驍雄者蠲復其身謀略者官豫之爵使之閭里相勸族黨相保疾病相問有緩急則赴死以相救是則沿邊諸郡皆良民也皆精兵也烏乎而不可用陳傳良民兵止可行於邊夫鄉兵者行於邊地則可行於內地則不可荆襄淮甸之民皆韓信背水之兵也故田單掘塜墓以激齊人而破強燕周德威以土兵據險而制契丹祖宗以河北鄉兵而制北敵周世宗之侵唐也淮之民聚山澤立保壁以農器為兵以禇為甲而周師屢為所敗唐地多為所復當時謂之白甲軍者是也楊誠齋主意古今兵農之異古者寓兵於農後世寓農於兵又其後也籍農以為兵夫同此民兵也而有三者異焉亦足觀世變之激耳成周盛時比閭族黨皆伍兩軍旅之師搜苗獮狩皆征伐擊刺之制凡賦之車馬賦之卒乘民知所以自衛而已不知有所謂兵也故曰寓兵於農漢氏兵志起田中者為吏卒為衛士者業農桑唐之府兵無事則執耒而耕有警則荷戈以戰凡其為兵者皆兵也非所以自衛也乃所以自養也故曰寓農於兵及其後則兵民一裂不可復合矯而正之不過籍民為兵而已淝水之捷本於三州人丁山東之雄本於澤潞義兵而請甲人於安定弓人於河東弩人於浙西則南詔吐蕃駢首俟命此籍農於兵之效也然其弊也則曰吾自蠶而衣自農而食彼之衣食於官為正兵者而與吾均其勞未免有愁恨歎息者固不若寓農於兵之為愈也然其弊也又曰彼為民我為兵凡為是攻守之具皆所以衛民也彼不衣我食我而使躬執其勞必有悍然不用命者矣又不若寓兵於農之為無後悔也嗚呼安得有周官麟趾之意而行周官之法度者哉古今兵民分合自周公畫井田而兵民之制始立自管仲作內政而兵民之制始詳後之言兵民者無出於此矣蓋古者兵民不分而寓其兵於農無事則執耒以耕有急則操戈以戰公家無供給之費私居無盜賊之警以捍鄉井以衛國家其為策莫善於此者自秦人開阡陌以來而兵民之制始分既而為兵矣則室廬居於營伍之中姓名書於官府之籍而耕稼織絍未嘗過而問焉而為之民者迫於仰事俯育之勞奪於耕田鑿井之事責之以征伐教之以守禦則初不之知也兵自為兵民自為民蓋不能無偏勝之患則以農而養兵者其勢不得不然耳警段古者兵出於農古之先王所用之兵皆出於六鄉之民所任之將皆出於六鄉之吏當其優遊無事則為比足以相保為閭足以相愛推而上之為州足以相賙為鄉足以相賔若然者皆可耕之民也及倉卒應變則為伍者左右前後足以相及為卒者衣服旗幟足所識别推而上之為師足以圍敵為軍足以包敵若然者皆可教之兵也其教之已久其講之有素目熟於旌旗之色耳熟於金鼓之聲故夜戰則其聲足以相聞晝戰則其目足以相辨其坐作有節其進退有時故教治兵者其貴殺故其時不在於春教大閲者以其無事故其時不在於秋其上足以善將將其將足以善將兵敵戰起於一方則以一方之方伯連帥者舉兵而伐之方伯連帥之有所不能充然後有六鄉之兵出而平之六鄉之兵有所不出出則無所不勝矣民兵不可驅迫邊戍未可遽撤惟團結民兵或可為撤戍之漸然團結之法尤不可有一毫驅迫之意也蓋藉民力兵本以衛鄉邑耳或驅之征行或強以役𨽻則非團結之本意矣如聞往年禦冦為將者略無愛惜之心既驅之先登復委以當敵戰敗則官軍莫之救戰勝則官軍冒夫賞向也非秋成教閲未嘗入州今乃用之屯戍幾同禁旅向也非春搜未嘗執兵今乃非時點集奪其農務貪吏黠胥既加侵削涅兵悍卒復合欺凌此其患非但不安南畝而已彼其生長邊方具知險要若使之自守其地平居統以郡將而不令役於官府有急俾為聲援而不使出於他境庶幾人人效力保障之勢成則屯戍可漸撤而兵國無虛弱之形矣古今兵農合分三代盛時民兵合而為一一家之強推而為兵無事則耕有事則戰惟兵興而後動則有仰於國家兵休而事已則各歸乎田里平時之執耒以耕者緩急則荷戈而戰若是則國用安得而不豐民力安得而不裕軍政安得而不強自兵農之既分為農者知有耕人而不知有征伐為兵者知有干戈而不知有耒耜仁人君子將厚其自養之資而使之為自衛之計故其安於為農而又樂於為兵非纎悉委曲為之謀毫釐杪忽為之具使之欣然而不憚安然而不疑未見其能享民兵之利也棄之則為患棄於山林草澤則為強盜而不逞用於部迪行陳則為壯士為徑卒棄之則為郡縣之蠧平民之擾用之則有摧堅之利陷陳之功今日不加優恤嘗謂中興以來兩淮荆襄專倚民兵為用今顧不收其效者用之非其道也蓋𨽻於總管者總管不之顧領於郡守者郡守不之恤賦役蠲免為惠幾何旌旗器械悉令自辦今果何時而不之顧耶偶句屯戍有所不離廛舍𨽻習有時不妨農事迫近邊庭風土素諳慣習戰馬騎射最便山川險阻吾所熟也風土乖異吾所諳也無事而耕民皆良民有事而戰民皆精兵什伍寓於鄉井之中干戈習於耒耜之暇身習乎卒伍行陳之門春夏冬搜狩家習乎屯營城兵之居比閭無間民課其兵仗而下置之於府衛也籍而為保甲籍其藝能而下拘之於營屯也統之以首領荷鋤如雲揮汗如雨民之所以為農也斬木為兵揭竿為旗民之所以為兵也三時務農一時講武則民兵為前世之良法一男偷生二男戰死則民兵為後世之弊法事證歷代民兵之用夫寓兵於農耕稼而為兵也寓農於兵耕屯而為農也若稽二代軍賦起於井疆下逮春秋軍令寄於內政起田中者為吏卒敵不大入則皆耕作而食者耳業農桑者為衛士年匪及格則皆父子而處者耳雖拔擊鋭士之名有專事戰陳之卒而年髙力疲復歸民伍猶非終身營壘之間也然則以耕稼為常而暫於為兵其兩漢以上之事乎至於耕襄中者非襄中之民耕振武者止振武之卒立府制兵一夫百畞服弓力稼矣而非𨽻諸衛者田不井授也分兵屯田將校有差促耕數耘矣而非傅於籍者地不家給也雖咸陽有頓足之夫石壕有逺戍之旅而頭白從戎生死長别悉皆沒齒介胄之役然則以耕屯為務而兼於為農其晉魏以下之事乎唐之民兵可用鄉兵之制雖古今行之者鮮然其利不可以不考也昔者李抱真當唐德宗之時為澤潞留後抱真䇿山東有變而澤潞兵所走集也乘戰伐之後賦重人困軍伍雕刻於是籍二丁擇一蠲其徭租給以弓矢俾間月而習射焉舉所部之民得成卒二萬既不廩於官而士卒精聞天下稱昭義步兵為諸軍冠此其教習鄉兵卒獲其用者也李德裕當文宗之時為劍南節度劍南逼近南詔嵗為邊患而蜀兵困弊常不能支德裕既至就選巴蜀之民率户三百取二人使習兵焉貸而弗事緩則治農急則荷戈號為雄邊子弟當時南詔吐蕃皆不敢犯塞而邊患為之少息此亦教習鄉兵卒獲其用者也是二人者皆能不費糧廩寓兵於農而卒獲強兵之用此則鄉兵之法其利顯然易見者也國朝取民為兵國初京師之兵強州縣之兵弱一有警急悉調京師京師不足以民兵足之振武保捷宣毅義勇皆兵出於民而𨽻之州縣者也是故軍旅不若士人陳實言之東兵不及土兵田况言之彼其習於風土長於戰鬭故能動有成功慶厯初詔刺四路弓手張公方平曰不可韓公曰可卒刺之治平初詔刺陕西義勇溫公曰不可韓公曰可卒刺之夫以祖宗之至仁人臣之至忠而籍民為兵猶莫之克良以費省而足用也循至熙寧因趙子幾之言行保甲之法夫保甲亦民兵也而為法既密為教益酷鞭笞之苦誅求之害不得免焉民不堪命則有執指使逐巡檢攻提舉官以紓其忿而已安得人人如黃亷之在河東也哉噫是無以議為也有如弓箭手之刺率皆市人不可用而宣毅驕甚所至為寇何韓公之慮不及張公耶義勇之刺其後運糧戍邊卒以為常何韓公之慮又不及司馬公耶國朝民兵弓手夫河梁河北強壯之名自五代時沿邊諸州恃以雄壯國勢至景德間以其明效於前代遂以籍民而為之人以五百而為指揮射極至精而為校長此強壯之集本民兵也陕西保毅之名自咸平間詔陜西家出一丁號為保毅官給資糧戍同禁旅既生之以轉運遂撫之以六萬八千之衆簡閲既精義勇可用此保毅之集亦民兵也至後元昊陸梁禁兵皆西州郡單弱莫備不如強壯保毅之外復簡弓手之兵亦一時不得已之計此弓手亦皆民兵也時政民兵今非昔比祖宗朝河北有義勇陜西有弩弓箭手鄜延有保毅合而言之凡四十餘萬韓范所謂勇悍出於天性而又有資産父母妻子可以係纍其心蓋為處置之有方也寬其征賦所以裕其力安其室廬所以固其心因其事而調發不勞嚴其保伍而間謀不入其經畫亦有年然無事則具其名有事則不收其用執事者今始知之識者固已深病之矣領於總管者總管不之恤領於郡守者郡守不之念賦役蠲免為惠幾何旗鼓器械悉令自辦况中間牧守不擇邊寄浸輕潰師公行專事掊克其日朘月削悽悽無聊久矣曩時山巔水涯無土不耕視江浙無大異今則雞犬蕭條茅草彌望矣曩時經界號於樂土而賦稅視江浙不及十一今則富者轉而為中户中户轉而為遊手矣頻年之戰生理一空而又大軍不為之援而責之深入大將不恤其死而驅之前行彼其生生之具既蕩析流亡矣而為兵之害復如此奈何復望其死力哉今日當賦稅役邇來王師驕惰官兵奴視民兵有敵則驅土兵以先登而衝冒鋒刃有功則攘為己有而自謂其勞主戎者又不能明其賞罰以勸之又何以作其趨事赴功之心而淮民之氣自此喪矣誠能寬其征賦以優其家訓以紀律而齊其志助以官軍而壯其氣遇敵犯難而官軍不至於坐視有功必賞而主帥不至於沮抑則彼於守望桑梓保護室家故人各自為戰耳吁雄邊子弟可以敵南詔之師陜西義勇足以平西賊之梗豈今民兵不足以制強敵哉惟説以使之義以激之可矣不然驅邊民而為兵是敵戍之調保甲之謀耳以不教民戰是謂棄之仁人君子動心焉今日民兵貧困愚嘗登峴山之巔過濡須之埠盤旋乎合肥安豐之郊户口蕭疏茅葦相望民不聊生甚矣加以年來楮幣貴而鐵錢輕米價翔踊而死者枕籍所存市井率為瓦礫之場民兵萬弩手方日虞強敵之控弦而飛挽之勞科配之多乂重困之縱有長技餓莩之餘亦無所試矣結尾平時保其心昔者嘗觀朝錯言徙民實邊之策於漢文帝之世有曰塞下之民祿利不厚不可使久居危難之地則知今日之民兵其所以侍之者不可不厚也是必室廬以奠其居衣廪以饒其用官兵以為其援彼其田畞之愛護妻子之保恤有警力爭效死勿去者非以德上欲全骨肉而利其財也使其回視却顧室如垂罄野無青草妻孥無所憂廪窖無所蓄一身萍梗何恤而不棄甲何欲而冒白刃哉然則平時必有以保其心而後緩急可以賴其用執事以為何如本朝民兵之利側聞真宗咸平間張齊賢請募江淮荆湖丁壯八萬以益戍兵而真宗以為使南方之人逺戍西邊甚為非便至景德中土兵之法行於河東河北而康定慶厯因之故土兵之號義勇者凡三十萬人最為驍鋭祖宗之深謀逺慮所以為萬世之長策者殆不外此蓋沿邊之民保其室家愛其妻子護其鄉閭此其心之所甚欲也地接敵境則熟其情偽身臨行陳則諳於戰鬭此其技之所甚長也以其心之所甚欲濟其技之所甚長有所不戰戰斯勝矣自古民兵之利昔李抱真之昭義步兵雄於山東李德裕之雄邉子弟振於劍南則亦處之有其道爾載諸史册遺規舊書皆可尋也善乎蘇公轍之言曰往者西邉用兵羌人每聞多出禁軍輒舉手相賀聞多出土兵輒相戒不敢犯此已然之明驗愚請援是説以為今日獻羣書會元截江網卷十四
