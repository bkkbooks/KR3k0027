body:
  text: 羣書會元截江網卷三十國史事實源流粵昔三代之時國各有史而當世之史多世其家往往以身死職不負其意是固非後世所能及降及後世紀漢代之史炳炳而可觀者以其有班馬任之唐之韓愈嘗欲作唐一經而卒不果此唐史之所憾也肆我國家列聖相承治功赫奕而紀載之詳視典謨有光焉自今觀之我朝之制有紀載之史有修撰之史曰時政曰起居注紀載之史也宰臣為監修從官為修撰餘官為檢討監修維持大綱檢討惟事檢閲所以專史職者修撰而已而修撰之名目不一合記注而係之以年月者日厯也合奏報門而分之者會要也採紀録之所及備記載之所不及者實録也而國史則旁搜博取較定是非列為帝紀志傳者也有玉牒以紀其大事有聖政以書其盛美有寶訓以珍其可行其書詳矣其事重矣瑶編寶帙燦如日星大簡小牘等諸天地切嘗缺容正襟拜手而觀之俯伏而誦之不惟列聖之盛德抑又纍朝作史之實真足為萬世法也乘快旨揮事一偶有誤失我太祖必疑史官書之孰謂其隱惡乎李宗諤以丞相沆之子疑其子為父隱不使之修史孰謂其史有所避忌乎隆興中胡銓且有人主不觀史之請孰謂其不直筆乎盛典具存輝煌今古作史之實班班可考顧不偉歟蓋自置院於淳化立殿於崇寧補官於紹興而史之書益崇自纂集屬之學士提領委之宰臣或𨽻之祕書省而吏之職益繁自殿之並立有制事之直奏許前或立西南隅或留身奏事而史之筆益重瑶編寶帙崇藻飾也耆儒學士假以歲月重成書也編摩告成假以優寵示尊敬也祖宗之隆重者如彼今日之隆重者又如此則居是職者毋雜於文字之間可也秉是筆者當公於是非之書可也茍過於雜則時政有至纍年而不修遺逸有百四人而不録於搜訪書猶假於重修者是也茍溺於私則薄神宗而厚安石者有之矣謗宣仁而黜司馬者有之矣毀譽徇情褒貶失實者是也玉牒玉牒之制何始乎自漢重名籍之掌未聞玉牒之名也其玉牒之號肇於唐之開成為書一百一十卷李衢林寶所撰也其制玉牒圖譜皆别置院𨽻宗正寺有修圖譜官掌於宗正所載止於宗屬昭穆而不書大事開元以來世逺親盡者疏戚混淆而譜系之外惟敘混元皇帝一事而他闕不録本朝玉牒之修其初則為宗正屬籍至其後義增其目曰仙源積慶圖曰宗藩慶系巨曰宗支屬籍爰及紹興乃合三書而一之錫名仙源慶系屬籍總要其所修之日在咸平中新修皇屬籍三十三卷逮至大中祥符始命名曰皇宋玉牒遂以御製聖祖降臨記冠諸列聖玉牒之首至熙元間上皇帝玉牒凡二卷康定間上列聖玉牒凡一十二策熙寧間上仁宗英宗兩朝玉牒各四卷至政和宣和間其書大備中興以後又嘗再修矣其玉牒舊例所書之條凡十有一其在紹興以來臣寮所定例凡皇子出閣公主下降封建皇子册拜妃王天地宗廟之祠祀天子之巡幸宰相之除罷藩國之入貢凡大刑罰大慶賞之事係朝廷大節者皆書之至於署局藏籍之所咸平時始纂於祕閣祥符建殿於新寺又修於編修院之西閣嘉祐則修於宗正寺廨熙寧則以𨽻宗寺紹興中間始特建纂修之所既而用元豐之舊制併於宗市屬籍之接建於咸平慶籍之堂創於景德此其大略也寶訓寶訓之書其在少昊顓帝髙辛唐虞之書言常道也是故歷代寶之以為大訓本朝仁宗時王曽監修國史請采太祖太宗真宗事迹别為一書如唐貞觀政要凡三十卷號為三廟寶訓類苑眀道元年監修國史呂夷簡上三朝寶訓自論政體至撫夷狄凡三十卷神宗元豐五年宰臣王圭言天聖中修真宗正史成别録三朝寶訓以備省覽今當修仁宗英宗兩朝寶訓詔祕書省著作局依例修進差林希及曽肇自孝德至治夷凡二十卷哲宗元符三年詔史院同修六朝寶訓會要又合為七廟寶訓至紹興間神宗以後寶訓之書始成嘉定六年進呈髙宗寶訓有合行申請事件欲乞依嘉泰二年進呈髙宗實録等前後已得旨揮體例施行會要會要者志之所祖也所以原典故之本末志書之所未盡者莫不悉其源而書之唐德宗時蘇冕始撰會要四十卷武宗時崔鉉又續四十卷太祖建炎二年王博等采宣宗以降故事共勒成一百卷詔藏史館賜物有差長編本朝倣唐會要之作始於仁宗朝有帝系之篇后妃之衣五禮則記之食貨則記之方域則記之儀制輿衛則又記之以至兵刑之異其目崇儒選舉之殊其科運厯瑞應之二其序其體制然也其凡二十有二門而分之其别八百五十有五自建隆而至慶厯凡百五十卷則進於章得象由慶厯至熙寧凡三百卷則成於王圭至崇寧政和置局條纂宣和初已進一百一十卷餘四百卷已就緒第覬賞者始欲以次第來上一旦罷修書五十八所識者為之歎息其本末源流備見於此實録實録者以其不虛美不隱惡故揚子雲稱馬遷曰實録自唐以來紀述詳備二十七部之所藏者三百四十五卷知幾知録所不著者四百五十七卷梁之三卷謝昊五卷大清十卷唐髙祖十卷撰於敬播條於房玄齡刪夷於許敬宗太宗既有敬播顔嗣玄齡所修二十卷而與長孫無忌之四十卷並行髙宗已有許敬宗之三十卷而與令狐德􅀢之所撰吳兢知幾之所續韋述之所作皆有三十卷並録開元已有四十七卷人以張説二十卷玄宗之百卷並藏下至肅代敬穆之君或三十卷或四十卷或出於令狐德􅀢或撰於蘇景嗣陳商建中之十卷憲宗之四十卷潤色於既濟父子之手德宗之五十卷順宗之五十卷則粉飾於蔣又韓愈之筆下而文宗武宗之世盧耽之四十卷韋衡之三十卷紀述之備如此本朝太平興國命學士李昉等修太祖實録五年史館上太祖録五十卷真宗時若水等上太宗實録咸平二年李沆等上重修太祖實録仁宗初命李繼等修真宗實録仍諭以一朝大典當謹筆削之意雍熙元年錢若水所上十八卷天聖二年三月癸卯李維晏殊所上一百五十卷熙寧二年冬王圭所修二百卷哲宗元祐五年命修神宗實録六年吕大防等進神宗實録紹聖三年重修神宗實録書成髙宗實録起紹興十七年之正月迄紹興三十二年之六月三十六年之事二百二十卷之書炳若丹青此祖宗紀録之數也實録辨誣本朝髙宗紹興六年史館修撰范沖奏近重修神祖朝實録於朱墨二本中有所刋定依凖聖旨别為故異一書眀著是非去取之意以垂天下後世今來重修哲宗皇帝實録若其議論多有訕謗以當日時政及諸處文字照據甚眀亦乞别為一書志其事實欲以辨誣為名從之日厯日厯亦編年之體也本朝太祖開寶七年知制誥史館修撰扈蒙上言昔唐文宗每開延英召大臣論事必命起居郎舍人執筆螭坳以紀時政至後唐明宗亦命端明殿學士及樞密直學士輪修日厯旋送史館近世以來此事都廢每季雖有內庭日厯樞密院抄録送史館所記者不過對見辭謝而已望自今凡有可留簡册者並季宰相及參知政事每月輪之抄録以備史官撰集詔從之命盧多遜專其職長編太宗興國八年直館胡旦復言周顯德中宰相李穀乂奏樞密院置內庭日厯自後因循廢缺史臣無憑撰集望令樞密院依舊置內庭日厯委文臣任副使者與學士轉次記録送史館上采其言長編淳化五年史館修撰張佖言伏覩聖朝編年謂之日厯惟紀報狀略敘敕文至於聖政嘉言皇猷美事羣臣之忠邪善惡庶務之弛張汗簡無聞國經何紀臣欲請置起居院左右史職以紀録為起居注與時政記逐月終送史館以修日厯上覽而嘉之乃置起居院於禁中時政記本朝太宗太平興國中右補闕直史館胡旦上言五代自唐以來中書樞密皆置時政記憲宗嘗御延英問時政記記何事時李吉甫監修國史對曰是宰相記天子事以授史官之實録也古者右史記言今起居舍人是左史記事今起居郎是永徽中宰相姚璹監修國史慮造膝之言或不下聞因請隨奏對而託於仗下以授于史官今時政記是也上曰聞或不修何也曰臣觀時政記者姚璹修之於長夀及璹罷而事寢賈耽齊抗修之於正元及耽抗罷而事廢然則觀時政化者不虛美不隱惡謂之良史太平興國間雖有時政記之名但題云送史館事件端拱元年詔中書時政記差樞密二人同共抄録自後樞密院事皆送中書同修為一書而授史官樞密時政記始此景德元年始以云時政記太宗太平興國八年李昉奏請以修時政記每月先奏御後付所司從之時政記奏御自時始聖政真宗天禧四年宰臣等言陛下臨御以來功蒙隆盛望令中書樞密院取時政記中盛美之事别為聖政録從之令錢惟演王曽編次丁謂等參詳孝宗序光堯聖政曰進而得之諄諄之訓退而求之渾渾之書率而行之庶幾於治稽古偉議古者以史傳後古者一代之興必有一代之史夫子定定書斷自唐虞以下前此豈無載事之史而其後因之者謂其世逺而難信也揚子雲曰虞夏之書渾渾爾商書灝灝爾周書噩噩爾書即史文之訂定於夫子者也一經夫子之手而當代之史遂為萬世不刋之典史之有足據也如此哉兹夫子述而不作信而好古嘗慨念典禮廢墜欲從而正之把宋者夏商之後也意其文獻之有足據也及其後代不振而無足稽據故嘆惜之曰夏禮吾能言之把不足證也殷禮吾能言之宋不足證也非不足證也文獻不足故也惟魯秉周禮既稱宗國夫子拳拳望魯有一變至道之言是知備文獻於史策則後來者猶有所稽考茍以史策為不必録則自三代而至春秋何為國各有史二世其官編輯以成而語後世哉春秋因乎魯史春秋經吾夫子因魯史舊文而筆削之也雖云筆所當筆削所當削皆有義存乎其間然惟其有魯史之舊文也是以夫子得從而筆削之也大凡國之有史所以紀一國之事晉之乘楚之檮杌魯之春秋皆其本國之史也春秋魯史也備載二百四十二年之事其會盟征伐朝聘燕享與夫政事之設施必有秉史筆者以紀録之是何其纎悉之必録耶蓋有登載足者斯有潤色足者有纂輯足者斯有修飾足者魯史猶律之有案也是非已具春秋猶律之斷也從而是非之而微魯史夫子雖欲修春秋何所據而筆削之乎以是知董狐南史之輩直晦明之日月有益於後世者也法祖嘉猷祖宗崇重國史國朝因仍彛憲崇重史職有日厯有時政記有起居注而又有所謂會要玉牒非為書之繁也有國史有實録院有敕令所而又有會要玉牒所非建曹之多也提舉以大臣監修以輔臣而編修檢討又以侍從臣非分職之廣也大抵為書繁則史事備建曹多則史筆公茍深得夫祖宗深長之思則昔人所謂日厯時政僅同供報亦無害也熙寧增損而慶厯之書備乾道刋正而熙豐之史成存諸典册以俟後人直未晚耳特患典史非才秉筆失實紀載雖詳而無補於傳逺垂後耳國朝信史明備我國家盛德茂功上配天地下追帝王模寫繪畫蓋難其人乾德中始命趙韓王監修國史修撰之外復有編修校勘之屬不過抄録報狀以論次之而已及五季之弊文風萎苶如謂鍧鏗炳耀之作猶未大振也而我藝祖旋乾轉坤之盛烈磊落軒天地豐隆冠古今亦不待雕刻藻繪而後彰也謹書其實以俟後聖人固以焕然矣其後命中書樞密院皆書時政記以授史官則有開寶之訓别記言動為起居則有淳化之制其他如實録會要有書至於刪革大事則專為玉牒一書以總其元蓋國家之巨典也祖功宗德煌乎休哉主意有史才有史職裒集一代之大典制作一家之成書論實有體則斷宜獨而不宜衆筆削有權則事宜專而不宜分茍非其人未易屬筆此史才也若遷固書志之作昌黎實録之修是已記載一時之典禮策書當代之政事君舉必書則有言有動非一職所能備事存諸簡則或大或小非一局所能兼廣記備言人舉其業此史職也若我朝國史實録之分院王牒會要之列司是已夫史才之得誠有待於後而史職之建不可闕於今何則行一禮典而書者數四則禮典不可以輕行矣舉一政事而紀事再三則政事不敢以輕舉矣於分曹列屬之間有隱然警敕之意此其感悟君心關係治體皆祖宗深長思慮之所寓而豈茍為是贅尤也哉國史具存典法司馬文正之進讀而以不變法為守成之要蘇文忠之上疏而以行其實為取法之原二公者先朝偉人意其竭誠圖事開口進規必有非常可喜之説驚人駭俗之論顧惟在於杜紛更之法行祖宗之實何為然哉蓋天下之治有本末於其本者失之末者後焉則道揆明於人主之心法守付於有司之職而天下之利病不難見矣否則隨時而為之設謀因事而為之畫策內而政事何者不當圖外而攻守何者不當謀弊弊於事為而力己勞矣是以商邦之未靖鬼方之未庭傅説所以未暇及而三篇之作拳拳於監成憲之言淮夷之未寧戎兵之未詰周公非不之慮也無逸之陳必以我周先王抑畏者言之蓋使髙宗惟成憲是監成王惟先王是法則伐鬼方治戎兵特餘事耳兹傅説周公所以善言治而司馬公蘇公即是意而獻言先朝也史昭帝王功德大哉帝王之功其猶天地之造化乎昭哉史牒之鋪陳其猶假象緯以觀天即山川草木以觀地乎天文不著則天道不眀地理不詳則地道不察帝王之史不實則煌煌盛德巍巍大功何以昭無窮而示岡極哉典謨之書二帝之史也上協天時下襲水土內睦九族外協萬邦無一言之非實也於是可以見堯舜之盛訓誥誓命之書三代之史也君臣上下之議論古今前後之因革無一事之非實也於是可以見商周之烈當時為史者皆聖賢之流不惟其事惟其心不惟其粗惟其精揚休厲美爛如日星賁若草木渾灝噩噩猶濯江漢而暴秋暘也此豈後世所能倣佛者哉史法史意之别且不虛美不隱惡朴而不華質而不俚非子長之史乎而後生擢居首選先輩抑歸末章未足以為子長病不詭激不抑抗贍而不穢詳而有體非孟堅之史乎而褒貶既言剽而申之未足為孟堅疵此二人者有史之才而得史之法者也若夫敘事立言勸善隱惡此溫公之史也而屈乎四皓之事所以不取之者固自有所權衡耳上系左氏下該衆史此溫公之史也而子雲文若之事所以亦録者固自有以斟酌耳此文公之通鑑有史之識而得史之意者也史筆以公自見且夫乾淳之問學熙元之議論或合堂而異席或各轍而同歸固然遺言逸事流落人間故老尚存僂指可辨以公而紀之奚其難野史雜記多恩怨好惡之言佞述諛碑多故吏門生之筆固也然事迹具陳耳目相接真者實偽者可刋以公可而斷之奚其難泰禧則已近嘉定則尤近得失或關於時諱臧否多礙於世家固也然酌公論以抑揚則婉而成章盡而不汗可也何難於直遂乎故簡散龎史文猥併有十數語而昭彰有千萬言而黯黯固也然揆公道以折衷則豐而不餘一言約而不失一辭可也何難於取辨乎偶句裒祖宗已成之書不若法祖宗已行之事集祖宗未備之典不若伸祖宗未遂之心紀載不備常起於顧忌之太深議論失真常生於回護之過甚發揮雅文以闡金匱石室之藏編摩舊章以備廣厦細旃之講鋪張洪休揚厲偉績祇具文也講明舊典禆益新政乃良圖也有直述而無依違有實録而無顧忌年月日時寄諸翰墨起居言動載諸簡編挽回公論直筆不阿闡明公道大書不忘討論故典親擢儒臣訂證成書尊禮名德權衡一定毫髮不差簡册一書丹青益炳紬金匱石室之藏續蘭臺東觀之筆以之述既往詔方來可也以之誅姦諛發潛德可也時政作史當勉其難甚矣秉史筆者之難其人也方今鴻儒碩生緝成巨典鋪張先朝之舊章纘述聖皇之善政甚盛舉也重矩疊規日星耀燦錦纒金軸丹青炳煥或合堂而異席或各轍而同歸講聞有限則弗遍意見先入則多偏野史雜記多恩怨好惡之口濫述諛碑多故吏門生之筆若是者固難也抑不止是好惡或關於時諱否臧多礙於世家疑能召私婉必損實此其難於直遂者也故簡散龎史文猥併心胸之隱微易掩事緒之糾結難疏此又難於獨辨者也向非知道守節有才之士則是數者未易任也蓋古者天子有二史左史記言右史記事成王剪桐之戲周公曰天子無戲言言則史書之此記言之史也隱公如棠觀魚臧僖伯諫曰君舉必書書而不法後嗣何觀此記事之史也愚又以知秉史筆者不可一日而忘警戒君心之道也作史當法其難大抵史筆之髙下當以心術論而不當以世變論子長論術髙文景武之治而史館諸公揚厲光寧兩朝之美則其時之久近與子長同子長編摩三千年之事而史館諸公撰述數十載之書則時之久近與子長異然指世代之近者以為難於措辭之微婉嘆世代之逺者以為難於登載之詳盡則君子以為未然也何者作史之難易不在於世代之久近而在於心術之公私子長紀髙惠文景之朝其心出於公則折衷無不得其當寫建元以來之事其心出於怨則譏議未免失於過此已然之驗也今日之紀功述德者果能見子長之失而持之以公則泰僖之盛典平心以敘述嘉定之近事公心以鋪張果何患於講聞之弗遍意見之多偏乎子長於禮書樂書之作其心出于公則辭雖略而事不遺於平凖貨殖之筆其心出於激則事雖詳而辭頗費此巳事之證也今之濡毫吮墨者果能去子長之短而束之以公心則淳乾之問學大書而屢書熙元之議論特筆而屢筆果何病於時諱之難觸事緒之難信哉領史當盡其職恭惟皇上不自神聖篤意史牒聿求多聞往者而州宿學賁然來思爰命參領東觀著作翩然求去俾之自隨大典有屬汗青有期甚盛舉也然愚謂擢史職易持公心難以曽公鞏之文學見稱士類猶謂議論不及文章以蘇公軾之才何施不可而一時朝廷猶不以之修起居注今之寵任可謂極矣其可循一時之好惡而不直筆乎其可顧一身之利害而不實録乎是必持金石之信心而後史可作眀君臣之大義而後史可作是是非非以示萬世之勸懲而後史可作不然筆而不直録而不實豈惟上負天子抑且下負所學矣結尾史才互相詆訾嗚呼自獲麟以來僅有遷固之實録耳自遷固而下幸有文正之編年也文正之史當與春秋同科豈止遷固之史云乎哉雖然文人相輕自古固然此皆弊帚千金不自鏡之患耳班固以遷之史是非頗謬於聖人而後人又以固之史不敘殺身成仁之美至於通鑑編年之書乃有患其敘述太詳汨沒義理者何工於議人而拙於議已耶上方以纂修之責屬於才識之彥作宋一經垂之無窮誅已往之姦諛發幽祕之潛德愚也且欲秉筆以踵執事後無曰遊夏不能措一辭史筆直道難伸雖然人主無私心則史臣得以伸其學大臣無偏心則史臣得以盡其心順宗實録成於昌黎庶幾行其學矣而竄定迄無全書則雖有此學如不用何宋璟激義吳競直書可謂極其公矣而張説怨之為甚則雖有此心如不遂何厥今眀良相逢萬無此弊區區之私深感史筆之難而天籟之鳴有不能自己惟執事幸恕其狂斐羣書會元截江網卷三十
