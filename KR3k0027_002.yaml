body:
  text: 羣書㑹元截江網卷二聖翰厯代事實伏羲始畫八卦造書契由是文籍生焉書序庖羲獲景龍之瑞始作龍書神農因嘉禾八穗乃作穗書黃帝史蒼頡變古文寫鳥跡爲文字作鳥跡篆少昊取鸞鳳之書以作古文顓帝作科斗之書亦曰科斗篆帝堯因靈龜有圖作龜書唐賢事始文王時赤雀銜書丹鳥入室故作鳥書同上後漢光武以手迹賜萬國一札十行細書成文後循吏序章帝好杜度草書因名章草魏文帝以素書所著典論及詩賦餉孫權又以紙寫一通與張昭本紀註唐太宗以飛白賜羣臣散騎常侍劉洎登御榻爭取太宗笑曰昔聞婕妤辭輦今見常侍登牀本史帝嘗以飛白書賜馬周曰鸞鳳冲霄必假羽翼股肱之寄要在忠力馬周傳家故藏賜靖詔書數函上之一曰兵事節度皆付公吾不從中治也李靖傳高宗嘗爲飛白賜侍臣至德曰汎洪源俟舟楫郝處俊曰飛九霄假六翮李敬元曰資啓沃罄丹誠崔知悌曰竭忠節贊皇猷戴至德傳𤣥宗開元二十四年帝西還次陜嘉盧奐美政題贊於㕔事曰專城之重分陜之雄亦既利物内存匪躬斯爲國寶不墜家風盧奐傳德宗史臣曰天才秀茂文思雕華灑翰金鸞無愧淮南之作屬辭鈆槧何慙隴底之書文雅中興夐高前代舊史憲宗特紆睿眷親洒仙毫初附麗天之象逺燭輝光旋驚垂露之蹤曲霑覃澤鸞鳳鶱翔而變態煙雲舒卷以呈姿劉禹錫謝表穆宗問柳公權筆法對曰心正則筆正筆正乃可法帝改容悟其以筆諫也柳公權傳偶句景龍呈瑞龍書作焉嘉禾效祥穗書作焉一札十行光武之賜萬國也九霄六翮唐宗之勸近臣也神農養民之功著於穗書宣王中興之功形於石鼔冲霄假羽翼太宗所以賜馬周泛源俟舟楫高宗所以奬至德心獨師於羲之則太宗之體制備矣心一正於公權則穆宗之筆法得矣皇朝事實太祖命李符知京西轉運書李符到處似朕親行賜之太宗謂近臣曰朕嘗寄懷翰墨以滌煩念遂飛白四字廣盈尺當示卿等吕端以下競前求觀上曰昔唐太宗以飛白賜羣臣劉洎登御榻爭取今覩卿等與古何異太宗出御書扇賜近臣謂宋琪曰朕聽政之外未嘗晝寢讀書寫字自得其趣太宗嘗草書經史三十紙刻石模印詣名山藏之或丘園養素好古博雅之士亦賜之祥符五年内出太宗御書法帖示輔臣曰太宗嗜學實由天縱屬思授翰必極精妙王旦曰以文章化人成俗者自太宗始也自五代以來筆札無體鍾王之法幾乎絶矣太宗在南宫留意翰墨斷行片簡得之於外則爭求之寶爲楷法自是學者書體丕變實聖教所至眞宗出飛白書賜宰相曰朕讀書外嘗留意真草飛白不猶愈於遊畋聲色乎淳化三年李至言願以上草書千文勒石上曰千文無可取孝經百行之本朕當自爲書之勒於碑陰四年御書飛白書向敏中張詠姓名付宰相曰此二人名臣也朕將用之五年上書二幅曰公務刑政惠愛臨民奉法除姦方可書爲勞績又别書三十餘幅賜尹玘等淳化二年蘇易簡願以所賜詩刻石上復爲真草行三體書其詩又飛白書玉堂之省四字召易簡付之並長編祕閣成李至乞賜新額乃飛白二字賜之淳化五年出御草書飛白賜近臣曰學書當與澄神靜慮興在筆端朕聽政之暇以此自娱耳寶訓眞宗幸澶淵有御製親書囘鑾詩天禧中上在東宫賜張士遜十二字曰寅亮天地弼予一人又曰日新其德蘇軾爲之贊云仁宗宸翰遒逸筆勢有法飛白書尤爲精妙命工模刻以賜宰輔會要上嘗飛白書四民安樂之字題其傍曰化成殿醉書邵博釋之曰帝雖酒所嬪御在列尚不忘四民焉故自帝王以來天下獨以仁謚之也慶厯四年上於邇英閣出御書十三軸凡三十五事曰朕觀書之暇取臣僚上言及進對事目可施於治者書以分賜丁度曾公亮王洙等固請釋其義許之皇祐元年張錫嘗講書禁中飛白書博學字賜之慶厯間學士張方平上奏上異之書文儒二字以賜並長編哲宗御書唐人詩賜范祖禹等各一首范祖禹家傳高宗建炎二年上親寫旅獒大有大畜二卦與孟子之言於坐右素屏宣示宰執黃潛善曰陛下於書取謹德昭德之義於易取尚賢養賢之道蓋正心誠意以齊家治國者在德立政造士以致君澤民者在賢與孟軻之格言皆今日急務因知心術之妙不以字書爲工也中興小厯三年宰臣謝賜御書資治通鑑第四册上因曰朕退朝省覽四方章奏多游意於翰墨不以爲倦四年寫郭子儀傳呼諸將示之紹興三年詔以恤刑手詔刻石頒諸郡縣奉使魏良臣言北人得御筆恤刑詔書墨本曰恤民如此民心安得不歸五年書無逸爲圖設于講殿之壁趙鼎謝御書車攻詩曰陛下游戯翰墨之間亦不忘恢復六年上曰昨在會稽嘗寫趙充國傳以賜諸將七年秦檜乞以御書羊祜傳刋石頒諸宰執大將侍從從之九年秦檜乞以御書真草孝經刻之金石以傳示後世並聖政紹興五年上將親書儒行中庸賜進士高閎言儒行出於漢儒雜記上乃賜中庸中興本末上曰朕無事惟靜坐觀書所得甚多時上所寫六經與孟子論語之書皆畢因刋石於國子監仍頒墨本賜諸路州學二十九年御書戒驕惰厲廉節詔於尚書省立石以墨本頒之中外孝宗曰朕無他嗜好或得暇惟書字爲娛因取郭熈秋山平逺詩以賜焉聖政淳熈七年御筆侍從之臣當以論思獻納爲任自今政事有關卿等宜盡忠極言㑹要御書賜殿閣将帥以下曰朕惟將帥之弊每在蔽功而忌能尊已而自用又御書明良慶會之間字賜史浩聖政寧宗嘉泰初御書尚書説命毛詩天保周易泰卦唐七德舞以賜臣下時報嘉定十五年宸翰書車攻烝民南山有臺緇衣詩賜大臣偶句書千文不若書孝經真宗所以垂世立教書儒行不若書中庸高宗所以正士心術書益稷以示宰臣則裕民之意彰書緇衣以賜大臣則好賢之心著太宗之學書也每於澄神靜慮得之高宗之寫書也亦於清心寡慾得之觀寜宗之書車攻則知聖心以外攘而爲急觀寜宗之書天保則知聖心以内治而爲先玉堂四字錫之翰林寵詞臣也祕閣二字錫之祕府崇清選也觀端敏二字則知聖心之妙惟在於褒嘉也觀寅畏數語則知聖心之運務存於勸奬也賜張方平曰文儒凡今之爲文者知所慕矣賜張公錫曰博學凡今之爲學者知所勉矣聖經格言聖人以矢口而成言肆筆而成書言可聞而不可殫書可觀而不可盡又曰言心聲也書心畫也聲畫形君子小人見矣又曰孰有書不由筆吾見天常為帝王之筆舌也揚子奎星文章蒼頡效象洛龜曜書丹青垂萌孝經援神契奎星屈曲相鈎似文章之畫上註末代舒牋㸃翰争相誇尚伯英臨池之妙無復餘蹤師宜懸帳之竒罕有遺迹鍾雖擅美一時或有所疑至於布列纖濃霞舒雲捲無所間然子雲擅名江表行行若縈春蚓字字如綰秋蛇卧王蒙於紙中坐徐偃於筆下詳研古今盡善盡美其惟王逸少乎烟霏霧結状若斷而還連鳯翥龍蟠勢如斜而反直心慕手追斯人而已唐太宗作王羲之書讃名臣奏議節要語備御書范祖禹上哲宗陛下纂承累聖日勤學問臣謹節畧尚書論語孝經要切之語訓戒之言以備聖札所冀陛下手書之目覩之心存之庶幾可以少助進德萬一乞寫無逸為圖晁冲上高宗陛下書法之妙願因勤政之餘親灑宸翰以無逸一篇分爲二圖設於殿壁諸儒至論寶御書以求其意熈寜六年冬以事至姑蘇安簡王公諱舉正出慶厯中所賜端敏二字飛白筆一以示臣且臣官在太常職在太史於法得書臣以爲抱烏號之弓不若藏此筆保曲阜之履不若傳此書考追蠡以論聲音不若推㸃畫以究觀其所用之意存昌歜以追嗜好不若因褒貶以想像其所與之人或藏於名山或流於四方凡所見者皆當聳然而作如望旄頭之塵而聽屬車之音相與勉爲忠厚而恥爲浮薄或由此也夫蘓軾飛白書記形容飛白之體霏霏乎其若輕雲之蔽月也翻翻乎其若長風之卷浪也飄飄乎其若遊絲之縈柳絮也裊裊乎其若流水之舞荇帶也離離乎其逺而相屬縮縮乎其近而不隘也東坡飛白讃形容體製之妙蔡邕飛而不白羲之白而不飛貞觀咸亨有唐最盛二帝篤信好書故二帝蠲鸞龍之貺伏羲少昊時事侍臣象舟楫之利高宗時事然稽當時復無留蹟上古時書有鳳龜蟲鳥之象今兹睿制寔緫前躅摛染所及洪纎畢該宇宙入於胷懷風雲出於掌握造化叶其隱顯陰陽順其卷舒發虚無之藴而森爲衆形收雷霆之動而歸于精象非元聖之獨智孰預於此乎晏元獻文祖宗聖翰根於學祖宗寄懷翰墨以滌煩念雖斷行片簡天下寶以爲法飛白之書篆籀之式行草之學蓋自太宗鋭意筆札列聖相承俱造神妙真宗發揚懿翰出示廷臣或閲於内閣而命宗諤爲序或問於太清而與王旦賦詩仁宗端拱無爲筆勢皆有法度寶文延和之所觀崇政邇英之宣示飛白琳宫之榜篆額勲戚之碑至寶元之賜宰臣奏稱神筆竒奥非凡可及良有以也東坡嘗贊慶厯賜王舉正端敏二字之書仰詫妙畫如天漢如雲物非茍然高宗字畫之工同符先聖親洒宸翰播之寰宇書趙充國一傳則有屯田積穀之謀書羊祜一傳則有睦鄰講好之意以至孝經之頒六經之賜固不容以筆畫字法之微而盡其形容也竊觀范祖禹在元祐中哲宗嘗賜御書唐詩而公上疏陳謝且曰願篤志學問亦如好書益進道德皆若遊藝又節略諸經要切之語訓誡之書名曰三經要語進之請萬幾之暇凡有筆札悉取諸此以代詩篇之無用使人君而充其所學非唯翰墨之功卓絶天下而學問道德之粹亦夐乎莫之能及也吕祖謙文主意人君待臣異恩游神聖翰以昭寵榮之典人君待臣之異恩也叶心國事以濟艱難之運人臣報君之大義也恭惟聖天子萬幾之暇垂意藝文乃者經帷徹編麟臺錫宴爰采五事之切於今者大書特書分賜邇列宸章奎畫雲漢昭囘天葩睿藻春陽布敷猗歟休哉被片言之衮而攜滿袖之珠者一何榮遇之至歟然嘗聞之下下以成其政者所以爲恩之至歸美以報其上者所以爲義之進爲上者寓責望之意於篇章翰墨之中爲下者當求責實之政於言語文字之外若曰進而膺寵數之便蕃矣盍退而思職業之當舉入而稱天光之晉接矣盍出而思時政之靡愆天命祈於有永我當何以奉幣而供民箴貴於罔伏我當何以持美而効視四郊之多壘我當何以扞大患按職方之非舊我當何以勵羣策國計屈矣民力殫矣我當何以救公私之急玩心畫之璀璨而期對休命於無彊味古誼之發揮而警荅隆貺於罔極如是則人臣所以盡報君之義庶無負矣倘曰但爲子孫不朽之藏而不問所采擇者何誼姑侈一時傳觀之榮而不念所期待者何意政事坐視其茍且而無以固難諶之天命謀猷不聞於入告而無以通久鬱之下情備禦惟見其多疎而無以制方来之外患境土之蹙視爲墮甑而不顧財計之匱諉以築底而無策謝表累牘文貌非不恭也而靡形憂國愛君之意獻詩聯篇詞采非不麗也而莫效戮力救時之功如是則吾君所以隆侍臣之恩果何望耶聖君責望人臣講帷徹編宸章流渥聖君所以責望其臣者有深意政府同寅忠誠體國大臣所以報稱其君者無異心夫當邊塵甫清民痛未定之時上之人發揮聖翰寵賁邇臣者非徒侈心畫之功也大臣拜龍騰鸞翥之賜獨能無鳶飛魚躍之心乎蓋今日多故之天下非前日承平之天下則今日務實之聖學亦非前日具文之學也賡歌氣象緬思古人聽納規模有懷前代所寶惟賢歟有容乃大歟富民足國歟凡其有德於經筵者必形之筆舌雲章奎翰炳若河漢銀鈎鐵畫昭如日星豈徒曰備故事云乎哉所以責望其臣者政欲共濟艱難之㑹也大臣必當思今日所得之聖翰非平日泛然之聖翰則今日圖報之盛心不當如平日茍玩之心也股肱或惰必隳王治論諫未達必壅下情薦賢助國歟容民蓄衆歟均財節用歟凡可以上當君心者必施諸政治廟堂規畫開誠布公竹帛勲名光前振後豈徒曰拜異渥云乎哉所以報稱其君者政欲上寛宵旰之憂也偶句有帝王之心畫有帝王之心學日星輝煥雲漢昭囘聖人之書法也造化渾涵乾坤旋轉聖人之心法也警段書法當求以意帝王書法與天地並天地一元之氣運於杳㝠亭毒之表而散爲昭囘經緯之文奎星之屈曲焉雲容之舒曳焉春陽沛膏其葩爛焉秋霜斂實其幹森焉凡形於造化之文聳於心目之觀皆其妙化之所寓非可以迹窺也帝王書法亦若是而已矣茍不以天地觀之而區區於㸃畫屑屑於體勢是特翰墨小技鈆槧書生非所謂聖人肆筆之妙化成天下之機也翰墨自有深意夫翰墨固有體也而妙意存焉茍以體求之自象形至于諧聲則六體也自虫刻至于殳𨽻則八體也篆有十二凡所謂捲雲薤葉飛白囘鸞皆體也𨽻有十二凡所謂芝草鍾鼎龍魚龜蛇亦體也以至演爲真楷行草則銀鈎鐵畫體之動也龍翔鳳翥體之旋也雲飛霧捲體之肆也橫風疾雨體之馳也是特求於㸃畫姿態之間而已若必求其深意則一字之形一義之託也一言之出一機之感也書必有意是故書天命之當敬必真有一體相資時憲欽若之誠書下情之當通必真有四闢無壅明白洞達之公書國勢之當重必真有自許驅馳誠死封疆之勇書衆善之當容必真有所謂謀合智倂之益書財計之當裕必真有所謂生疾用舒之方眷遇之榮鸞鳳冲霄飛白增重十行細札珍襲秘藏得之則寶踰鑄金榮甚華袞臣之拜君非徒被異恩而誇眷遇也然眷遇之榮乃報稱之篤歟偶句宸章奎文炳煥一時㸃畫之功煙霏霧結銀鈎鐵畫昭映千古裁成之妙鳳翥鸞飛聖謨睿訓炳若日星䕶以乾龍左縈右繞宸章奎畫爛如河漢飾以寶玉輕刻細礱玩宸札之法度知仁義之法度對宸翰之繩尺悟道德之繩尺斛海薦泉濡兹毫矣錦機絢采洒兹墨矣事證字書所以載道八卦九章之妙既陳然後河洛之圖書始得而呈瑞二帝三王之道欲冺然後科斗之文字始有所不能闕然則宸章奎畫非聖人求工於天下蓋以是而載道之真不深探其意而徒形迹之是拘殆非所以知聖人也古人不以書而以意炎黃少昊其見於穗書雲書鸞鳳之書民淳事簡之意象也唐虞夏禹其形於典謨字迹者衣裳玉帛之影響也周宣王隳嵯峨鐫功德至于石鼓者彷彿乎斾旌之悠悠車馬之粼粼也是雖法帖之闕所載籀書之疑所祖則不必拘矣漢之一札十行可以見聖主唐之飛白賜書可以厲忠臣收復人心之意扶持國家之心亦未嘗不於鈎勒縈綰之迹見之也書以明道與治且河圖之書以道所寄也不得不形於畫盤銘之字以德之所寓也不得不託於字石鼔之文以功之所形也不得不寓於文萬世以下盪人耳目與天地同其久與日月爭其光者豈非道必待書以著耶故曰有心於道而無心於書也一札之書頒及萬國儆吏治也飛白之字賜及近弼禮大臣也帝範之書貽示後嗣重國本也刑政教化之旨在是法度典刑之意亦在是眞情實意之拳拳懇懇者莫不在是故曰有心於治而亦無心於書也氣龎道駁文存意冺臣下筆法君上相忌君得戈畫臣皆稱慶龍翔鳳翥體非不精也霧捲霞舒筆非不壯也然殫精竭誠於毫釐之巧而絶無正大之學寫情陶意於㸃畫之粗而類無高明之見故曰於書加詳而道與治無與焉者此也光武太宗所書一札十行建武之所以賜萬國者飛白爲書貞觀所以賜輔臣者史氏追載或以爲細書成文或以爲酷得二王筆法其天機獨運固巳超詣於塵俗之表矣然愚以爲一札之書固英偉矣而其廣求民瘼觀納風謡所以披露心腹於四方萬里之逺者凡皆爲吾民書也飛白之書固遒勁矣而其所謂股肱之寄要在忠力其所以責望於臣鄰之助者凡皆爲臣子書也祖宗宸翰祖宗盛時以玉堂四字賜之翰林祕閣二字賜之秘府書扇賜近臣雖正書而忘寢書厯賜長吏雖盛暑而不辭吾重寇凖雖多草書而不恤吾愛吕端雖競觀飛白而不問吾知張詠向敏中乃預記其名不已太祖之書法有如此者賜張方平曰文儒非以其長於問荅乎賜張錫曰博學非以其長於記誦乎賜張士遜以十二字士遜吾師友也賜王舉正以端敏字二飛白筆一舉正吾直臣也其御邇英也取羣臣奏對而書之其御成化也以四民安樂而書之此仁宗之書法有如此者書裴度傳則有心於任將書趙充國傳則有心於營田書羊祜傳則有心於睦隣志在興復則書車攻志在勤政則書無逸志在崇儒則書中庸此高宗之書法有如此者前朝御書賜輔臣書宋玉大言之賦賜蘇易簡人知我太宗之御筆煌煌雄辭洋洋也豈知太宗責望易簡之意於此乎寓異時進日中則昃月滿則虧之戒囘視龍鳳之章琬琰之賜真無愧也元祐間嘗於講論語終篇之後書紫微一紙以賜蘇軾固盛事也然吾求之蘇軾文章則羽翼元化政事則銷沮金石忠於報主者其心無以異於易簡也淳熈中嘗於讀三朝寶訓終篇之後書七德舞樂章賜周必大固美意也然吾求之必大經筵則熟究治體易象則有取謙德切於致君者其心無以異於蘇軾也時政御書無不敬思無邪恭惟皇上闡繹聖言發揮心學曩者金書洒翰玉牒垂文常以思無邪毋不敬爲龜鑑乃出以賜大臣卓乎懿哉敢因明問而爲之説曰元亨誠之通即詩之所謂思無邪利貞誠之復即禮之所謂毋不敬敬其定而無邪其應也敬其寂而無邪其感也敬其靜虚而無邪其動直也始於誠之復如中庸戒謹不覩恐懼不聞而誠之通者此其根源終於誠之通如關睢樂而不淫哀而不傷而誠之復者此其發見或謂毋不敬是正心誠意思無邪是心正意誠其由思誠而純誠者乎御書分賜近臣厥今經筵徹編宸章渙渥龍騰鳳翥榮光溢河布之則雲漢交輝日月爭耀上下非徒侈美觀以示褒寵也然褒寵之優乃責望之深歟至端揆乃宗子之家相也寅亮天地責實主之比年以來譴告頻仍雨𤾉之僭忒雷雹之沍凝星文之變異歲無虚日史不絶書誰之咎也今聖翰可不以勅天之命惟時惟幾之歌而警勵之乎樞廷乃謀畫所出之地也運籌帷幄汝實司之比年以來公道湮鬱鯁諤之論不聞於臺諫抑鬱之氣深伏於草茅音啞者爲寒蟬緘黙者爲仗馬言路荆榛誰之責也今聖翰可不以太山河海不卻衆庶之議而宣諭之乎樞廷亦推轂人才之所也登明選公職實重之比年以來善類擯弃或陽遷職位而實逺之嶺表或謾頒召命而趍行之不力或久勞外服而遄召之不聞落落相望殆如晨星誰之過也今聖翰可不以照乘之寶不如四臣之對而勸勉之乎防民之口甚於防川此古人監謗之説矣今閭閻疾苦在在愁歎君門萬里若罔聞知工箴瞽詩敢議而不敢怨莫此爲甚則聖翰書此以付之本兵者豈無意歟倉廪實而知禮節衣食足而知榮辱此古人富國之術也今大農赤立倉廪告虚國計築底束手無䇿楮價折閲可輕而不可重至此云極則聖翰書此以責之樞副者豈無見歟愚故曰分寵錫之章以勉其臣是也御書考亭扁額吳祕監甲謝表臣䝉聖恩賜以御書考亭書院四大字者陛下爰頒鳳翥之新庸賁鱣堂之舊茂昭文教配嵩廬維岳之名遂使武夷永濓溪關洛之𣲖淳祐四年九月御書白鹿洞規恭惟皇上聰明天錫學問日新時幾餘閒心畫親洒取白鹿之十規頒虞庠之多士發文公潛德之幽光壽乾淳文獻之正脈惠至渥也鯫生端拜宸翰竊窺聖意乃知揭爲教之五人主將以正人心綱常之大别爲學之五人主將以陶士心禮義之大御書箴銘我皇嗣守燕謀龍翔鳳翥之書毋不敬思無邪於選德殿楹之間何異雲漢之昭天奎星之應瑞乎宰臣演之以爲銘樞臣合之以爲箴明良相逢虞廷賡歌曷以過是前此聖天子嘗書二十八條以自警矣未如書此六字之切於心學也前此經筵諸生嘗贊二十八條以上聞矣未如此箴此銘之切於格心也敬由心生思隨心起正心誠意者之事也箴以致規銘以致警皆所以發揚聖心之萬一也結尾當先留意經學切觀内翰范祖禹在元祐中哲宗嘗賜御書唐人詩一首而公上疏陳謝且曰願篤志學問亦如好書益進道德皆若游藝又節畧諸經要切之語訓誡之言名曰三經要語進之請萬幾之暇凡有筆札當取諸此以代詩篇之無用深哉范公之意乎蓋人主留意經學而必廣之以學問道德之説又易之以諸經要語之文使人君充其所學非惟翰墨之工卓絶天下而學問道德之粹亦夐乎莫之能及也將見風雲出於掌握宇宙入於胷懷發靈光之藴而森爲衆形收雷霆之動而歸於精象是説也儒生皆能鋪張而揚厲之何獨一晏元獻當知君臣相與雖然聖翰頒賜邇臣者其目凡五而最切於今日之事體者一而已矣一者何君臣相與之情也方今三邊之疆土日蹙内郡之策力日困民日以瘁財日以殫所恃以無恐者雲龍之㑹方新魚水之歡已得有大臣任責則天下治勢悉歸掌握中矣是故去副封以防壅閉者大臣責也開東閤以延賢人者亦大臣責也容衆雅量富民長策獨非大臣責乎所慮者權歸近習政出多門斜封之梯徑尚廣而中書不能以盡違冗蠧之根穴滋多而冢宰不容於通制如是則雖有忠言之可囘九天賢臣之可照千里且不能一朝安矣而况於容衆之量乎而况於富民之術乎故曰權當出於人主政當出於中書羣書㑹元截江網卷二
