body:
  text: 羣書㑹元截江網卷十八詔令歷代事實堯言布天下至今誦之西漢夏勝傳舜命龍作納言夙夜出納朕命惟允舜典大禹文命敷于四海禹謨夏每歲孟春遒人以木鐸循於路𦙍征湯格爾衆庶悉聽朕言爾無不信朕不食言湯誓盤庚格汝衆豫告汝訓王播告之修不匿厥㫖王用丕欽罔有逸言盤庚上今豫其敷心腹腎腸歷告爾百姓于朕志下高宗亮隂三祀其惟弗言羣臣咸諫于王曰王言惟作命不言臣下罔攸禀令王庸作書以誥說命文武發號施令罔有不臧冏命武王皇極之敷言是彛是訓于帝其訓凡厥庶民極之敷言是訓是行洪範成王王曰凡我有官君子欽乃攸司謹乃出令令出惟行弗惟反周官秩秩德音詩假樂太宰正月之吉始和布治于邦國都鄙乃垂治象之法于象魏使萬民觀治象挾日而斂之禮天官卿師凡四時之令有常者以木鐸循于市朝地官宣王王命仲山甫式是百辟出納王命王之喉舌蒸民幽王褒姒不好笑幽王欲其笑萬方故不笑幽王為烽燧大鼓有寇至則舉烽火諸侯悉至而無寇褒姒乃大笑幽王欲悅之數舉烽火其後益不信本紀秦廷尉李斯等議命為制令為詔制曰可史始皇紀衛鞅說秦孝公變法令令既具恐民之不信已乃立三丈之木於國都市都南門募民有能徙置北門者豫十金民怪之莫敢徙復曰能徙者豫五十金有一人徙之即豫五十金以明不欺卒下令本傳漢制志詔冊幾乎典誥矣文中述史立春之日下詔勑多違舛百司不知所承蕭瑀云唐高祖蕭瑀遷內史令詔嘗下中書未即行帝責其稽留瑀曰今朝廷初基所以安危者繫號令也承一詔必審覆使先後不謬始得下此所以稽留也本傳太宗上謂王圭曰國家本置中書門下以相撿察中書詔勑或有差失則門下當行駁正通鑑李彥芳家藏太宗賜李靖詔書數函上之一曰兵事節度皆付公吾不從中治也一曰吾欲熟知起居狀皆太宗手墨權德輿讀之至流涕曰君臣之際乃爾耶彥芳傳元宗詔天下家藏孝經開元初詔求直言本紀宇文融所過見高年宣天子詔旨百姓至有感泣者本傳德宗陸贄言今盜賊遍天下宜痛自咎悔以感人心帝從之奉天所下制書雖武人悍卒無不感動流涕後李抱真入朝為言陛下在奉天山南時赦令至山東士卒聞者皆感泣思奮是時知賊不足平也贄傳民趙光奇曰詔令不信前去兩稅之外更無他繇今非稅而誅求過於稅每詔書憂怛徒空文耳恐聖主深居九重而未之知舊史憲宗王承宗請割德捸憲宗選堪使者以命崔從疾趍鎮宣詔為陳逆順大節音辭暢厲士卒感動承宗即按二州户口符印上之崔從傳田𢎞正圖魏博之地以獻帝遣裴度宣慰度明辨具陳朝廷厚意𢎞正請度遍行其部宣示天子恩詔武宗㑹昌初封敖為翰林學士使作詔書慰邊將傷夷者曰傷居爾體痛在朕躬如出帝意賜以宮錦劉積平德裕以定策功進太尉封敖草制曰謀皆豫同言不他感德裕解所賜玉帶與之並本傳仁宗天聖元年帝曰或謂先朝詔令不可輕改王曽曰咸平中刪太宗朝詔令十存一二蓋去其繁密之文以便於民何如不可英宗治平三年上於制誥多親閲有不中理必使改之嘗曰此人君謨訓豈可褒貶失實也神宗熙寧元年詔自今日內批指揮並作奉聖㫖施行二年富弼曰臣聞內外之事多出陛下親批臣謂事事皆中亦不是為君之道況事有不中則將誰執並長編高宗紹興二年上曰今日凡批降御筆處分雖出朕意必經由三省密院與已前不同若或未當許卿等奏禀給舍繳駁有司申察朱勝非對曰不由鳯閣鸞臺不謂之詔令四年上曰諸將奉命恪恭固是美事然朝廷出號令亦不可以不審重使其得之若降自雲霄之上其誰敢慢易乎並聖政三十三年鄭康佐言陛下詔令為民而下者十常八九申飭攸司自中興以來凡恤民寬厚之詔令編類成書以賜守令詔令勑令所編類係年録孝宗乾道五年給事中胡沂論朝廷命令當謹於造命之初上曰卿職當繳駁事有當言勿謂拂主上拂宰相而不言淳熙五年上曰出令不可不審立談之間豈能周盡事情前此正緣不審故出令多反汗無以取信於天下聖政寧宗嘉定間臣僚上言政以令而行亦以令而不行令焉而人不行非天下敢慢天子之令或者天子有令自慢之爾夫固有以召之也偶句下平蜀寇詔恐引咎未切則御筆親竄覽賜保忠詔見道者本意則天顔大喜在祥符則有朝令夕改之戒在淳熙則有再三詳慮之請盤庚之誥不在於三篇而在於敷心腹尚書光武詔書不在於十行而在於推赤心漢史山東布令雖老􅂒亦忍死於須臾賈山傳奉天下制雖悍卒亦感泣而流涕陸贄秦人立信於從木令在必行通鑑武帝追悔於窮兵詔亦何及漢史輪臺一詔漢脉復春興元一詔士卒感激德宗下制陸贄切戒於非誠唐史元帝出令劉向深譏於反汗漢史孝武之號令文章焕焉可述元帝之號令溫雅有古風烈皇朝事實太祖建隆二年上命高保勉為荆南節度使其性淫恣孫光憲諫曰宋有天下凡下詔令皆合仁義此湯武之君也太宗淳化五年上聞蜀寇漸平下詔罪己因命筆親竄數字皆引咎深責尤為切當景德元年上曰朝廷命令尤宜謹重每出一令輿人不免謗議或少抑之又塞言路三年朱巽言朝廷命令不可屢改自今有陳述利害更張法制者請先付有司議其可否如經久可行者行之不可者止之茍罔辨是非一切頒布恐失謹重之道上曰此甚識治體祥符四年上曰命令之出不可不謹今言某事有利輕為釐革始則皆以為當久乃類成有害洎加裁正偶句神宗內降更令有司看詳高宗御批亦許給舍繳駁仁宗因灾降詔則曰不敏于德不明于政天下之人皆知仁宗之心出於誠高宗下詔寬恤則曰務修德惠幸勿空文當世之人皆知高宗之言出於實經傳格言王言如絲其出如綸王言如綸其出如綍緇衣注言彌出彌大也涣汗其大號涣卦隨風巽君子以申命行事九五正吉悔亡無不利無初有終先庚三日後庚三日吉巽卦先甲三日後甲三日終則有始天行也蠱卦管仲曰下令如流水之有原令順民心故論平而易行本傳易涣汗其大號言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也劉向上言尺一詔書魏明紀程元問叔恬曰續書之有志有詔何謂也文中子曰志以成道言以宣志詔其見王者之志乎其恤人也周其致用也悉一言而天下應一令而不可易非仁智博達則天明命其孰能詔天下乎問易欲將弭多難而收羣心惟在赦令誠信而已安危所屬其可忽諸動人以言所感已淺言又不切人誰肯懷昔成湯遇灾禱于桑野躬自髠剔以為犧牲古人所謂割髮宜及膚剪爪宜侵體良以誠不至者物不感損不極者益不臻令兹德音亦類於是悔過之意不得不深引咎之辭不得不盡招延不可以不廣潤澤不可以不洪宣暢堙鬱不可不洞開襟抱洗刷疵垢不可不蕩去瘢㾗使天下聞之曠然一變若披重昏而覩明耀人人得其所欲則何有不從者乎陸贄奏議古之詔令主於文章明如星斗之光動若風雷之震於周則召公呂侯之制作繼有訓言在商則仲虺傳說之謀謨並為雅誥辭將事稱名與實存故讀湯誓則赫然見神武之奇勳讀洛誥則昭然識太平之偉績鼓舞四方幹旋萬類以至羸老扶杖而往聽蓋思美化之將成悍卒揮涕而竦聞即知大道之易破片言足以參造化之機折簡足以馳夷狄之命文粹陛下布德澤下詔書必待刺史縣令謹宣而奉行之不得其人掛墻壁耳百姓安得知之陳子昻後趙置戲馬觀上安詔書銜于木鳯之口事始云石季龍君者出令者也臣者行君之令而致之民者也韓原道忽聞哀痛詔又下聖明朝杜牧京詩紫誥鸞回紙杜賀王丈人詩謂紙上之字有回鸞之勢名臣奏議令出而人不信歐陽修上仁宗言多變則不信令頻改則難從今出令之初不加詳審行之未久又欲更張以不信之言行難從之令故每有處置之事州縣知朝廷未是一定之令則或相謂曰且未要行必須更改或曰備禮行下略與應破指揮旦夕之間果然又變慮未熟則令頻改劉安世上哲宗朝廷命令變易頻數逺不過一二歲近或期月而已甚者朝行而夕改亦有前詔未頒而復令蠲除者蓋由謀議未精思慮未熟遽為之紛更也望舉封駁之職庶詔令清簡吏民信服不致反汗王言不可自輕蘇軾上哲宗法令有不能盡則天子乃言在三代為訓誥誓命自漢以下為制詔皆所以鼓舞天下不輕用也若每行事立法之外必以王言隨而叮嚀則是朝廷自輕其法也願重借王言以待大事而發則天下聳然莫不響應號令當如風雷章誼上高宗切見朝廷建一事行一令曽未閲月旋即更改人主出號布令猶天之冇風雷也故曰鼓舞萬物者風雷也鼓舞萬民者號令也雷不一風不再令政事號令出而復反行中輟豈尊主威而隆國勢哉諸儒至論號令如巽之風故曰重巽以申命言天子之號令如此而後可也天地之化育有不可求而得者今夫日皆知其所以為暖雨皆知其所以為潤雷霆皆知其所以為震霜雪皆知其所以為殺至於風悠然布於天地之間來不知其所自去不知其所入噓而炎吹而肅大而鼓乎泰山喬嶽之上細而入乎竅窒蔀屋之下發達萬物而天下不以為德摧拔草木而天下之所法以令天下之術也蘇東坡擇庚甲之義巽之彖曰先庚三日後庚三日蠱之辭曰先甲三日後甲三日說者謂甲庚皆所以申命而後先者叮嚀重復之意也聖人不忍使之遽陷乎罪戾也故先三日而令之後三日而申之不從而後誅蓋其用心如此之謹也以至神之化令天下使天下不測其端以至詳之法曉天下使天下明知其所避天下不測其端而明知其所避故靡然向風而不敢議也同上命令先無定見觀國之興衰者不視其君之仁暴而察其令之繁簡而已觀國之治亂者不視其民之良窳而察其令之弛張而已今國家律令之事一刻法之臣請之變舊防矣選舉之事一矜名之臣言之亂舊章矣財貨之事一興利之臣欲之革舊法矣於是有日下之詔月易之令其規為建議初若百世可行也功未半而復還之變未久而輕廢之故詔令未有循行至十年者也逺者五六年近者三四年或嵗終而易也甚者朝定而夕除之矣夕定而朝改之矣孫洙擇先甲後甲之義甲日之始事之端也先甲三日辛也後甲三日丁也前事過中而將壞則可自新而為後事之端後事方始而尚新然使當致其叮嚀之意以監其前事之失而不使至於速壞也朱主意詔令以感人心山東之詔布足以起老癃德化之思長安之詔下足以發聖主一見之嘆噫此豈空言感人如是耶嘗迹賈山之言以遡漢文之德化而班氏之史寂不聞因第五倫之言以求光武之所以聖而范氏之史不及載不無疑焉及觀元年一詔拳拳乎務本之語一札十行昭昭乎儉約之風此山東之老得其所以思而長安之吏得其所以見邪詔誥以廣人心睿㫖敷宣日星明炳以新一時之仁政者易聖恩覆載天地莫量以廣一人之仁心難未有不忍人之心則有不忍人之政君以是而出之令臣以是而致之民詔誥之頒行無掛壁之虛文州縣之奉行有愛民之實德則仁政豈不易行矣乎然朝令者每患於夕改始勤者常至於終怠其初也鋭意以圖治則發號施令固有仁民愛物之意其後也怠心之易啓則仁民愛物常無行健不息之誠仁心豈不難持矣乎警假虛言不如實德夫人主之所謂愛民者非特謂夫心腹腎腸之必敷於下也德意志慮之必達於民也言語由衷而懇惻辭令示人而相夷以是為愛民也蓋必形於言而見於事因其文而責其實一詔之下使人必䝉其休一令之行使人必便其安或以之勸農桑也則必求其無惰於田畝或以之恤刑獄也則必求其無寃於囹圄或以之振貧乏也則必求其無流離於溝壑如是而後實德孚於下其仁於愛民斯可無愧王言不可輕出王言如絲其出如綸聖哲之治其應如響命令者人君奔走鼓舞天下之具也鼓舞之機至速而不留而鼓舞之具亦不容輕動而茍發是故涣汗之號聖人必著於涣之九五而先庚後庚復於巽之九五而致意焉蓋五者君位之尊而命令所由出之地也此之不謹則朝而九重夕而四海復可得而圖之乎嗟夫言莫豫違夫子有喪邦之憂出言自是子思有國事日非之慮是以聖王之出令也必致嚴中書之取旨門下之審駁尚書之奉行其豈非治世之良法歟命令不常之弊法令所不可則以特旨行之議論所當執則以宣諭止之既曰自後不為例矣未幾而復有援例之言既曰永不放還未幾而復有放還之命今日曰永為定制明日曰更不施行其始也議論不審規摹不立則不免循人言以輕發及其後也事情乖戾法意愆違則必任私意以驟更人無適從事有牽制國家之爵賞有限所以勸人者既易窮其所恃以奔走天下者徒以刑威之僅可畏耳今也有必罰無赦之言無必罰無赦之事使玩狎上恩之寬大習見墻屋之虛文固已相與切笑曰吾君必不忍行此法也有司必不能奉此法也行之未幾已而果然峻厲嚴切之言徒若慈父母之恐童稚而非有鞭朴之實也視命令為具文廟堂出此命者也固不敢保其不變亦曰吾姑言之耳命間後省給舍姑以常事而奉行命出六部有司姑以常程而應責命下監司郡守姑以常調而遵禀雖九重出哀痛之詔上下視之如無也偶句告諭數言吏民安堵言傳號涣萬里奔走德化一意老癃傾心意諭色授六合震動動人以言已非其至綸綍所出有秩其音言又不切人誰肯從郵驛所傳其應如響一變而為人主之空言再變而為有司之翰墨命令方出或以言之胥動而遽止法制方行或以事之不便而可改君心既誠於愛民則言辭之末皆實意君心不誠於為民則播告之修皆虛文惟行弗反者非劫以留令稽令之威而自爾從闕其大者非給以徙木弃灰之詐而自爾信事證帝王播告之旨自帝而王君民一體播告昭明上之待下也無隱辭心誠感激下之親上也無異意一則曰言布天下也二則曰朕命惟允也為堯舜者何嘗更一政易一令乎一則曰文命敷四海也二則曰朕不食言也為禹湯者何嘗匿其㫖而隱其辭乎至於言惟作命不言罔攸禀令也謹乃出令令出惟行弗惟反也商周之君又何嘗反其行而飾其文乎一話一言昭如星日一號一令質諸鬼神載之萬世傳之百王不可誣也漢詔為恤民而下文帝之時頒詔者二十有一而為農而下者居其四為寬田租而下者居其二為賜布帛而下者居其二大率歸於恤民而已然其間又有責吏不奉詔之詔焉十二年詔曰吾詔書數下勸農種植而未興是吏奉吾詔不勤而勸民不明也其何勸焉明帝之時頒詔十有二而為農而下居其二為恤刑而下居其二為恤困窮而下居其二大率亦歸於恤民然其間又有責吏不奉詔之詔焉其詔有曰吾詔書數下冠蓋接道而吏不加治民或失職其咎安在勉思舊令稱朕意焉孝宣帝在位二十有五年凡三十九詔為恤民而下者大半今年詔書有曰二千石謹牧養民以風德化明年詔書有曰今歲不登其遣使賑貸困乏今年詔書有曰其令有可蠲除以安百姓者條之明年詔書有曰池館未御者假與貧民或詔賜鰥寡高年者帛或詔郡國被灾者免今年租賦若此之類不一而足當時郡國間又得人如黃霸之徒類能宣布詔條使人人咸知上意故王吉稱之曰詔書每下民欣若更生是宣帝所以恤民者非徒為文具也光武在位三十二年凡三十有五詔為恤民而下者亦大半今年詔書有曰用刑深刻朕甚愍之明年詔書有曰久旱傷麥朕甚憂之今年詔書有曰二千石不加循恤無使失職明年詔書有曰名修職任惠兹元元或詔賜天下為父後者爵或詔復三十稅一以寬民賦若此之類不一而足當時郡國間又皆得人如杜詩之徒類能宣上之德澤使人人咸被其惠故第五倫嘗讀詔書每嘆曰此聖主也一見決矣是光武所以恤民者亦非徒為文具也祖宗審造命之地藝祖皇帝常乘快指揮一事則終日為之不樂趙忠獻在政府有所獻必待餘音允從而後退則當此之時明良㑹遇道揆交修而君相造命之地知謹政令於密庸之中矣仁宗皇帝欲榷河北蓋中書方欲施行而張方平入覲一言寤意卒以手詔罷則當時失於正本之地救於獻納之臣而幃幄謀謨之士知審詔令於將發之初矣我朝詔誥得人國朝詔誥最得大體亦由祖宗以來所以待詞臣之不薄也前代有以親王視草而國朝之制詔必出於外制前代或有以宮人視草而國朝之詔令必出於內翰詼諧如方朔浮靡如相如皆得以視草而神宗擢用詞臣必擇直諒忠誠如司馬公者雖其辭以不能為四六不改命也翰苑之職任於五人而同拜服饌之寵至於重金以加命夫待之重則必得其人既得其人則其言必信此我朝之詔令所以度越於前代蓋由此也列聖務行實惠以詔令一書觀之天聖慶歷嘉祐熙寧之編修元符之勑令格式建炎熙寧之裒集詔㫖乾道之刋修新書此固同於愛民也然仁宗能見之於實德故休養生息措一世於春風和氣之中而使田夫野叟吟咏於山林隴畝之間蓋不徒刪定去其繁密之語而空見之天聖之詔勑也高宗孝宗亦能見之於實德故紹興淳熙之間而東南之齒寖盛吏稱民安熙熙然有慶厯嘉熙之風蓋不徒實惠及民之語而空見之明堂赦恩與夫降興詔書也若夫熙寧元符之際新法既行神器幾搖紹述繼興新法復用當時之實德安在是雖元豐勑令之修有議變通之言元符之詔有罷失出之罰亦不及事矣時政今詔令皆實德今之所謂愛民者非特謂夫心腹腎腸之必敷於下也德意志慮之必達於民也言語由衷而懇惻辭令示人而坦夷以是為愛民也蓋必形於言而見於事因其文而責其實一詔之下使人必䝉其體一令之行使人必便其安或以之勸農桑也則必求其無惰於田畝或以之恤刑獄也則必求其無寃於囹圄或以之賑貧乏也則必求其無流離於溝壑如是而后實德孚於下其仁於愛民斯可無愧兵民之詔皆實意今九重出綍萬里傳郵百姓之見朕志萬方之聽朕言無非念民生之困憫士卒之勞詔語溫純情辭惜怛舉天下已極之弊而皆以為自豫一人致之此時此意凛然于辭聽之者暖於挾纊聞之者欣若更生矣然人困於流離而以為豫之辜吾君固知所自責而脫流離之餓莩使之適稻梁之飽者非守令之責乎兵死於戰鬬而以為豫之過吾君固知所自責矣而推戰鬬之賞賫使之忘行陳之勞者獨非將帥責乎結尾誠意可以見實德愚聞言語未足見聖人之至情誠意可以觀人君之實德孝文天性恭儉愛民之心至於誠故詔下山東而癃老願觀漢武好大多欲之心不本於誠故詔下輪臺而海內虛耗王澤之流皆自於吾君心之發而詔誥之敷烏可自欺其心哉主上歷載于兹詔令之頒於天下者無非誠意實德而今日慮集登進猶慮仁愛之未有至必欲其愈久而愈加其誠於愛民可知矣則夫大哉王言一哉王心固有揄揚而頌美之者鯫生無所容喙出於誠而行以人愚於此有獻焉其一曰本至誠其一曰擇守令嘗聞大學致知之說必先正其心誠其意而後家齊國治天下平故金石之堅豚魚之細猶以誠而動何獨於民而疑之愚願廟堂之上凡所云為一出於誠俾萬姓咸曰大哉王言一哉王心然而不動者未之有也兹謂本至誠守令承流宣化民之師帥者也故師帥不賢則王德不宣恩澤不流愚願廟堂之上博選良吏列置郡縣宣布德音使天下曉然知之故感之則易茲謂擇守令愚之淺識切謂是說果不謬則詔令之頒將見狗偷聞之必有舍刀劍而市牛犢棄兵弩而持鈎巨如渤海之民矣是弄兵潢池者不足慮也悍卒聞之必有投兵相顧嘆明主之方興悔吾屬之猶反如淄青軍士矣是黔卒驕恣者不足慮也夷狄聞之必有使者告其主謂天子威德英武洽于中國遂修貢職如吐蕃之君矣是勍敵憑陵者不足慮也執事許之否羣書會元截江網卷十八
