body:
  text: 羣書會元截江網類書類提要臣等謹案羣書會元截江網三十五卷不著撰人名氏首題太學增修中有淳祐端平年號蓋理宗時程試䇿論之本也元時麻沙刻本前有至正七年東陽胡助序黃虞稷千頃堂書目遂指為助撰誤矣其書凡分六十五門每門間附子目各類之中以厯代事實宋朝事實經傳格言名臣奏議諸儒至論分段標識又有所謂主意事證時政警段結尾諸目至于排偶成句亦備載焉考宋禮部條式元祐舊制第一場以經義詩賦分兩科第二場則均試論一道限五百字以上第三場則均試䇿三道御試亦均用䇿三道限一千字以上紹興六年改制四場試士其第三場仍試論一道第四場減䇿二道御試亦仍用䇿一道故講科舉之學者率輯舊文以備用其出白士大夫者則為永嘉八面鋒東萊制度詳説其出自坊本者則為是書之類大抵意求廣絡故叢冗日增然其間每事皆具首尾頗便省覽于宋代典故引用尤詳間可以裨史闕蓋在當日為俗書在後世則為古籍此亦言不一端各有當矣乾隆四十四年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀羣書會元截江網原序昔人嘗曰文以載道書以紀文夫道之廣大非文無以載文之浩瀚非書無以紀故必載之文則廣大者有所寓紀之書則浩瀚者有所歸矣於戲自羲皇迄於有宋厯數千百世紀事之書汗牛充棟欲遍觀厯覽將不勝檢閲之勞況窮陬僻壤求之不得見之不廣者乎幸有志道者出托拾古今分類纂集名曰羣書會元截江網謂之會元者以見其有會歸之地也謂之截江網者以見其無遺漏之虞也嘻所謂廣大而浩瀚者一展卷舉在目前其惠後學不淺淺矣惜乎成是書君子不著其名愚不敢沒其善故引於端云胡助識
