body:
  text: 羣書㑹元截江網卷十九法度歷代事實伏羲氏始王天下未有前聖法度故仰則觀象于天俯則察法于地白虎通黃帝始制法度得道之本萬世不易同上堯虞舜行堯之道法度彰揚問道舜叶時月正日同律度量衡舜典警戒無虞罔失法度大禹謨舜為法於天下可傳於後世孟謹乃憲欽哉益稷禹聲為律身為度本紀有典有則貽厥子孫五子之歌三代稽古法度彰前律厯志太甲曰豫小子不明于德欲敗度縱敗禮盤庚教于民由乃在位以常舊服正法度書文王倬彼雲漢為章于天注雲漢其為文章譬猶天子為法度於天下棫朴武王不役耳目百度惟正旅獒謹權量審法度修廢官四方之政行焉語二十成王六年五服一朝又六年正乃時巡考制度於方嶽周官秦孝公內立法度賈誼論漢之初興法度草創略依秦制後百官志蕭何治未央宮上見其壯麗曰何治宮室過度也本紀文帝賈誼以漢興天下和洽宜改正朔易服色制度定官名興禮樂乃草具其儀法奏之帝謙遜未遑也本傳武帝外攘四夷內改法度前紀史傳宣帝元帝見帝所用多文法吏以刑名繩下嘗言陛下持刑太深宣帝作色曰漢家自有制度本以霸王道雜之本紀唐興治荒剔蠧討究儒術以興典憲韓愈傳太宗魏徵曰若擇前代憲章發明王道則臣請以周典惟所施行文中子天下新定臺閣制度憲物容典率房杜二人討裁杜傳太宗之治制度紀綱之法後世有以憑藉扶持而能永其天命歟憲宗元和之間百度修舉裴垍傳偶句虞夏法度彰於襲爵之時殷周法度彰於稽古之際舜聖人也不嫌乎失法度之戒晉侯國也猶謹乎守法度之敘舜法可傳每權輿於通變宜民之時禹度已彰亦胚胎於隨時制宜之無為垂拱之時伯益猶進問失之戒既醉太平之世周公亦作六典之書誦臯陶之歌則知乃憲之所當謹讀蔡仲之命則知厥度之不可改請改制度不廢於後元富庶之日詔頒憲度無重於永平熙洽之秋皇朝事實太宗至道中謂侍臣曰漢晉以來紀綱大壞朕革故鼎新别作朝廷法度見紀綱門真宗語張齊賢曰先朝皆有成憲但與卿遵守致中和耳劉承規使人求節度上諭王旦旦曰陛下所守者祖宗典故典故所無不可聽也仁宗令范仲淹等奏當世務仲淹上奏曰國家革五代之亂垂八十年紀綱制度日銷月損不可不更張以救之然欲正其本必揣其末顧陛下行之庶幾法度有立紀綱再振矣慶厯中命天章閣侍講王洙集賢校理余靖祕閣校理孫甫知諫院歐陽修同編修祖宗故事初樞密副使富弼上言自古帝王理天下未有不以法制為守法制既立然後萬事有經而治道可必也請選官編三朝典故置兩府以為模範嘉祐中樞密副使胡宿顧惜大體羣臣言及利害多更張庶事以革宿弊宿厭之曰變法古人所難不務守祖宗成法而徒紛紛無益於治神宗朝樞密院言凡關祖宗以來法制所宜施於逺並刪取大㫖著為書二不幸金陵用事盡取祖宗一切法度而更張之陳瑩中言熙寧以來三十年間天下法度凡四更改熙寧改治平元豐改熙寧元祐改熙豐紹聖改元祐上問方今治道何先安石對以擇術先又問施之設以何為要而安石以變風俗立法度為急哲宗初范純仁謂司馬光曰法固有不便然亦不可暴革蓋為治惟去太甚爾又況法乃有司之事宰相當為天下搜人才布列位則法度雖有不便於民者亦無所患不得人雖良法亦足為民病高宗嘗曰朕思創業固難中興亦不易中興又須顧祖宗已行法度如何壞者欲振墜者欲舉此實艱難孝宗丁亥詔曰朕惟太上臨御三紀法令典章燦然備具嗣位之初深懼墜失其議設官裒集紹興以來詔㫖以聞偶句太宗非别作法度何以革五代廢弛之風仁宗非張更制度不能振歷載因循之弊仁宗至治或者猶悼法制之不立高宗中興聖意且慮法度之未舉熙寧治道何先之問王安石以立法度為奏慶厯當世何務之問范仲淹以更法制為言經傳格言制而用之謂之法推而行之存乎人節以制度不傷財害民君子以制度數議德行魚麗慶則法度缺矣詩六月上有制度則民知止國語君子作法於凉其弊猶貪作法於貪弊將若之何左昭四思我王度式如玉式如金左昭十二今民賣僮者為之繡衣絲履偏諸緣內之間中是古天子后服所以廟而不宴者也而庶人得以衣婢妾白縠之表薄繒之裏縺以偏美者黼繡是古天子之服今富人大賈嘉㑹召客者以被墻古者以奉一帝一后而節適今庶人屋壁得為帝服倡優下賤得為后飾然而天下不屈者殆未有也且帝之身自衣皂綈而富民墻屋被文繡天子之后以緣其領庶人嬖妾緣其復此臣所謂舛也賈誼策秦之有司負秦之法度秦之法度負聖人之法度楊先見太上無法而治法非所以為治也楊子制度文采所以明尊卑異貴賤而勸有德也董子宜民通變天下無弊法文中子名臣奏議乞編典故為模範富弼上仁宗近年綱紀甚紊隨事變更至使民力殫竭國用空虛吏員冗而卒未得人政道缺而將變於亂賞罰無準邪正未分夷狄交侵寇盜充斥師出無律而戰必敗令下無信而民不從如此百端不可悉數臣今欲選官置局將三朝典故及討尋向來諸司可用文字分門類聚編成一書置在兩府俾為模範庶幾弊法漸除此救禍亂之本也諸儒至論法立而人心定聖人為之法使天下強弱小大貴賤逺近莫敢不一於法焉由法者安不由法者危如是故法立法立而天下之心定而治道畢矣法為貴君位次之法壞則民亡民亡則君如之何其尊且安也故人主尊法懼法之不立也故以身先之懼天下之慢法而法壞也故一舉事而不敢忘法賞罰以法號令以法取豫以法廢置以法殺生以法動靜以見法如神物而不敢侮如天墜地設不敢輒破壞改易也不以一事小害而損法不以一時茍利而增法使天下無有不由法而自為者故智者不得越法而謀辨者不得越法而言士不得背法而有名臣不得背法而有功李邦真法原修吾身以行古制或問明道曰必有關雎麟趾之意然後可以行周官之法度何也曰須是閨門袵席之微積纍薰蒸洋溢天下無一事一物不被其化然後可以行周官之法度不然則為王莾矣朱氏主意有躬行有法制有躬行有法制躬行所以風天下法制所以服人心二者並行而不相悖則民志定風俗同而天下之治舉矣昔嘗觀成周之時上自公卿之尊下自庶民之卑其等級次第尺寸不敢易纎毫不敢踰舉一世之人皆安於法度分守之內志意精專視聽純一易直渾厚以上令而莫肯有僣差無度以干王政之誅者意必有殊尤卓絶以轉移於觀感之下及觀太宰之職則知大臣之所以格君心者雖微必謹有如次舍幕帟之事醯醢酒醬之微灑掃使令之役凡關於人主之身者莫不兼司並掌而辨方正位體國經野設官分職以為民極使朝不混市野不同國人不侵官諸侯不敢僭天子之制公卿不敢謀啇賈之利而後知古人之所以變風俗者固在躬行以為之本而又以法度為之輔也有弊俗無弊法有弊俗無弊法法之弊以人權法可矣俗之弊舍法而任人未可也禮義昭明習俗醇厚時則上下之間知有公而不知有私是雖不待立法而人亦不至於循情而況可任法不任人乎禮義浸微習俗漸變時則上下之間狥公狥私者不一是雖法不專用而人心尚或有守而況可不以人法並行乎禮義益蝕習俗盡壞時則上下之間知有私而不知有公是雖有法具存方以人而壞法而況可任人而不任法乎警假子孫不可變祖法人君創一代之法必有賢子孫然後能守之其君臣相與維持其法度有損益無變更自一家推之其祖宗創業之勤所以立為一家之法者其伏臘之用若何當如何其侈儉也其設施之制若何當如何其廣狹也外而有王祖之輸內而有私室之奉又當如何其支吾也一旦非人而繼之奢儉廣狹悉從巳欲而又疏逖老成之訓無與救藥其不隳祖宗之積纍者幾希天下何以異是哉天下值多事則可變法大抵久安之世無事之時人心樂因循而憚改作風俗喜安靜而惡紛擾加以弊根盤固者未易以遽搖法制已墜者不能以卒復故其為之也常難多故之後無聊之時人心望拯救而思更革風俗厭湮鬱而待更變加以紀綱久玩者可乘此以更新舊典久廢者可因是而修復故其革之也常易偶句朝廷所以定此法也官吏所以行此法也法制既定則天下有常心經制不立則天下無善治事證周公經制大略周家之制上自朝廷之紀綱下至井里之經畫文之以禮樂施之以刑政其為條目無一不備舉矣屬之於三百六十官周公所以遺周家子孫世世憑籍之業者在是矣嘗考六官之所掌切有怪於周公立法之意冢宰之職六卿之最尊者也所率之屬有君嬪婦閹寺之類等而上之莫尊於三公乃無嘗職亦無定員豈周公固詳於小而略於大耶蓋周公以一人內之治責之輔佐以䙝近之微臣亦統之大臣此皆後世公卿宰相之不得預者周公深意之所寓獨可不密耶漢不能法古制井田古制也秦為阡陌而漢因之封建古制也秦為郡縣而漢因之黃屋左纛秦之儀而漢不可更制乎丞相太尉秦官漢獨不可正名乎藏於理官寢以不著則漢之理何觀焉施於朝廷皆以鄭聲則漢之樂何尚焉議郊祀則斷以䜟緯制三公而事歸臺閣古制固如是乎漢子孫能守其法高帝得天下與其子孫立一代之法不過曰蕭何之律令孫蒼之章程叔孫之禮儀韓信之軍法與夫丹書鐵券之盟金匱石室之藏耳子孫終漢之世不敢經意於法度之外君臣上下惟曰是高帝之天下是高帝之約束是以文帝遵之六十餘年海內殷富黎民醇厚一旦好大喜功之武帝輔之以深文巧詆之臣盡取約束紛更之海內虛耗不旋踵而見于時直臣為之力爭寧負武帝而不忍負高帝之法度也既而宣帝中興一切振刷武昭之餘蠧總核信必以嚴其始制度自有之言至作色為太子言之又有賢宰相數陳便宜拳拳以奉行故事以正輔其不及至於劉氏不王之一語終漢世守之當時有欲變更大臣為之犯色廷爭漢之子孫大臣可謂賢哉東業唐法不能無弊有太宗之制寖隳於中睿而蕩然大壞於開元天寶之間至肅代以來遂不可以復返夫使兵衛之法存則本強支弱蕃鎮何由不陸梁自府兵變為長從之騎而重兵偏聚於二邊於是兵強則有內患兵弱則有外患而藩鎮夷狄不可支矣夫使省府之制存則近習不預政事何由有怙權之宦官用舍參之公論何有植私之朋黨故自省府之制壞於權臣移於嬖幸於是宦官干政機外庭立黨論而宦官朋黨不可支矣是故以德宗之強明本非姑息之主惟其四體不能伸縮故紛然於初勃然於後奮然而怒修然而為藩鎮夷狄之強亦末如之何也已以文宗之英武本非懦弱之主惟其太阿倒持而膏澤之不下流也故信用非人適足以取辱忿嫉無謀適足以益禍宦官朋黨之盛亦末如之何也唐法度粗立嗚呼李唐三百年之變亦多矣藩鎮起釁於專兵夷狄起患於借寇宦官之禍生於國本之不立朋黨之禍生於國論之不定唐君臣之所共知也明知之而不能去盍亦反思其改乎唐興之初天下分為十道而邊鄙常有重兵非無方鎮也征伐四夷更無虛歲非無夷狄也宮禁掃除之役非無閹人也君子在朝而小人或相參焉又非無邪正之雜處也為天下國家者豈必盡去夷狄除小人削藩屏而後能立家國者耶使吾紀綱尚存法度未壞則在彼雖存不足為吾患也豈惟不足為吾患皆吾之臂指惟命是聽而已先正重於變更我祖宗之有天下也事為之制曲為之防二三大臣相與世守之人曰更制度呂䝉正曰不可更也人曰改命令朱巽曰不可改也為王文正則曰祖宗之法具在吾不敢有所改作為李文靖則曰朝廷之制具在吾不敢有所更張此先正之重於變更也仁宗變通景祐天子取曩時之紀綱而振肅之國事舉矣慶厯大臣取積世之宿弊而革去之國論定矣取而裁之謂之變推而行之謂之通蓋同此道也嘉祐以來失因循嘉祐治平以來積寬之弊轉為舒緩積弱之弊流為安靡天下之務幾於柔軟而不振朝廷之制幾於廢弛而不舉皆因循之過也神宗熙寧變法道必有偏吾舉其偏可也盡變其道不可也法必有廢吾起其廢可也盡廢其法不可也革而當其悔乃亡荆公何如不慮及此哉嗟夫常平良法也變而為青苖馬鹽良法也變而為保馬差役之法誠不能無弊矣變而免役而免役之害有甚於差募兵之法亦不能無弊矣變為民兵而民兵之害有甚於募市易之法行而民無餘財科舉之法行而士無素學以至水利也淤田也省州縣也皆私意之創為也中更元祐正道復伸又復轉為紹聖矣崇觀姦臣祖述紹聖宣政姦臣祖述崇觀紛更之禍延及叔世又重為之扼腕也高宗復法議熙豐之法度則曰神宗之意初實不然言紹聖之繼述則曰帝王之孝豈在於是大哉高宗之言乎明哉高宗之見乎高宗語范宗尹時政今日任例不任法二曰守法革例以正朝綱蓋為治者任人其次任法任人則法在其中任法則徒法而已至於任例則人與法俱廢矣純於任法且不可況純於任例乎純於任例今日之謂也邊聞奏辟惟意所擇雖礙法而不顧選人改秩惟私是行雖冒法而不問銓選注擬惟聞某人相與人例為銓法為之破壞舍選推遷惟聞其人用禀人例而舉法為之掃蕩以至於贓貪狼籍彈墨未乾屈國法而校拭之日暮途逺冒增年甲私王爵而寵秩之朝綱之紊甚矣邇者諫坡被㫖裁正弊例而舊染汙俗為之一新然而人心積習之久終未開丕應傒志精白以承休德豈非今日內治之一弊歟晉結尾先謹吾身之法度雖然人主一身萬事之綱領係焉必吾身有法度然後能定天下之法度是又不可不知也故中庸言為天下國家有九經必自於修身太學之治天下之道必本於正心身修而心正則天下國家之法度整整乎有條理矣故大綱小紀詳法略則此法度也而非法度之本也檢柅其身心規矩其踐履言思為法行思為則而遵守於宮庭屋漏之際此非為法度設也而實法度之所自出也故昔之論禹者曰身為法度聲為律吁此法度禮樂之所由以出歟愚故並及之不識執事以為容否法度行之在天雖然制而用之謂之法神而明之存乎人井田封建三代良法也行於三代而不能行于後世漢唐之紀綱制度壞於中世以後之君是非法之不同也而所以行之者異也我朝祖宗立法爍如日星昭若雲漢守而勿失萬世無弊詩不云乎不愆不忘率由舊章敢以是為今日獻羣書㑹元截江網卷十九
