body:
  text: 羣書㑹元截江網卷三十三晦庵附四書事實源流先生諱熹字仲晦居建陽之考亭師李延平精思實體所造益深先生之於道建諸天地而不悖質諸聖賢而無疑故其得於巳而為德也以一心而窮造化之原盡性情之妙達聖賢之藴以一身而體天地之運備事物之理任綱常之責明足以察其微剛足以任其重𢎞足以致其廣敬足以極其常其色莊其言厲其行舒而恭其坐端而直雖達而行道不能施之一時然退而明道足以傳之萬代於是大學中庸則補其闕遺語孟則深原問答之意易與詩則求其本義攻其末失於書則疑今文之艱澀反不若古文之平易於春秋則疑聖心之正大決不類傳註之穿鑿於禮則病王安石廢儀禮而傳記獨存於樂則憫後世律尺旣亡而清濁無據取司馬編年之書繩以春秋之法周程張邵之書為之裒集發明太極先天三圖為之解剝條畫程張門人為之區别其所長剖析其所短由孔子而後曾子子思繼其微至孟子而始著由孟子而後周程張子繼其統至先生而始著南軒張公東萊吕公同出其時先生以其志同道合樂與之友或識見少異亦必講磨辨難以一其歸先生教人以大學語孟中庸為入道之序而後及諸經以為不先乎大學則無以提綱振領而盡語孟之精微不參之語孟則無以融㑹貫通而極中庸之旨趣然不㑹其極於中庸則又何以建立大本經綸大經而讀天下之書論天下之事哉其於讀書也又必使之辨其音釋正其章句玩其辭求其義研精覃思以究其所難知平心易氣以聽其所自得從遊之士迭誦所有以質其疑講論經典率至夜半雖疾病支離至諸生問辨則脫然沈疴之去體一日不講學則惕然以為憂摳衣而來逺自蜀川文詞之傳流及海内先生所著書有易本義啓䝉蓍卦攷誤詩集傳大學中庸章句或問論語孟子集註或問太極圖通書西銘解楚辭集註辨證韓文攷異所編次有語孟集義孟子指要中庸集畧孝經刋誤小學書通鑑綱目本朝名臣言行錄古今家祭禮近思錄河南程氏遺書伊洛淵源皆行于世著述雖多於語孟中庸大學尤所加意若大學論語則更定數四以至垂没大學誠意一章乃其絶筆也楚辭集註亦晩年所作其愛君憂國雖老不忘通鑑綱目僅能成編每以未及修補為恨又嘗編次禮書用工尤苦竞以未能脫藁孝宗卽位詔求直言先生上封事其畧言聖躬雖未有闕失而帝王之學不可以不熟講朝政雖未有闕遺而修攘之計不可以不早定利害休戚雖不可徧以疏舉然本原之地不可以不加意陛下毓德之初親御簡䇿不過諷誦文辭吟咏情性比年以來欲求大道之要又頗畱意於老子釋氏之書記誦詞藻非所以探淵源而出治道虚無寂滅非所以貫本末而立大中帝王之學必先格物致知以極夫事物之變使義理所存纖悉畢昭則自然意誠心正而可以應天下之務明年改元隆興復召辭不許即入對其一言大學之道在乎格物以致其知又言制治之原莫急於講學經世之務莫大於復讎至於德業成敗則決於君子小人之用舍除提㸃江西刑獄事奏事是行也有要之於路以正心誠意為上所厭聞戒以勿言者先生曰吾平生所學只有此四字豈可回互以欺吾君乎孝宗朝陛對者三上封事者三其初固以講學窮理為出治之大原其後則以直指天理人欲之分精一克復之義其初固以當世急務一二為言其後封事之上則心術宫禁時政風俗光宗即位召除侍講辭且言陛下嗣位之初方將一新庶政所宜愽延儒臣專意講學蓋將求所以深得親懽者為建極導民之本思所以大振朝綱為防微慮逺之圖及入對言為學莫先於窮理窮理必在於讀書讀書之法莫貴於循序而致精致精之本則又在於居敬而持志詔進諸大學先生以平日論著敷陳開析務積誠意以感上心行狀偶句窮理以致其知反躬以踐其實存此心於端莊静一之中窮此理於學聚問辨之際精志實體所造益深其務學者如此玩辭求義究所難知其教人者如此著書立言論語孟子某所解語孟和訓詁註在下靣要人精粗本末字字咀嚼過此書某自三十歳便下工到而今改猶未了不是草草看或問論語諸說子程子則不容議矣敢問餘說之大體得失如何曰是亦豈區區之所敢議然嘗竊論之則其寛平正大者或失於未精整峻嚴恪者或苦於未暢通達竒偉者或有過高之病藴藉風流者或有柔緩之失而清和靡密者又未免牽合支離之患也惟周氏端厚謹直雖言不皆中而頗有釀郁之風尹氏平淡簡約雖意有不同而其精實之味為不可及耳若張子之學雖原於程氏然其博學詳說精思力行而自得之功多矣故凡其說皆深約嚴重意味淵永自成一家之言雖或有賢智之過如程子之所譏者然其大體非諸人所能及也語錄學者讀夫二書於其訓釋之詳且明也日講焉則無不通矣義理之精且約也日誦焉則無不識矣時習識者未解而勿忘予之始學亦若斯而已矣嗚呼小子其懋戒之哉汲汲焉而無欲速也循循焉而無敢惰也毋牽於俗學而絶之以為迂且緩也毋惑於異端而躐之以為近且卑也聖人之書大中至正之極而萬世之標凖也古之學者其始即此以為學其卒非離此以為道窮理盡性修身齊家推以及人内外一致蓋取諸此而無所不備亦修吾身而已矣語孟語孟集義語孟之書學者所以求道之至要古今為之說者蓋已百餘家然自秦漢以來儒者類皆不足以與聞斯道之傳其溺於卑近者旣得其言而不得其意其騖於高逺者則又支離蹖駁或乃并其言而失之學者益以病焉宋興百年河洛之間有二程先生者出然後斯道之傳有繼其於孔孟之心蓋異世而同符也故其所以發明二書之說言雖近而索之無窮指雖逺而操之有要使夫讀者非徒可以得其言而乂可以得其意非徒可以得其意而又可以并其所以進於此者而得之其所以興起斯文開悟后學可謂至矣間嘗蒐輯條流以附本章之次旣又取大學之有同於先生者與其有得於先生者若横渠張公若范氏二吕氏謝氏游氏楊氏侯氏尹氏凡九家之說以附益之名曰語孟精義以備觀省而同志之士有欲從事於此者亦不隱焉抑嘗論之論語之言無所不包而其所以示人者莫非操存涵養之要七篇之㫖無所不究而其所以示人者類多體驗充廣之端夫聖賢之分其不同固如此然而體用一源也顯微無間也是則非夫先生之學之至其孰能知之嗚呼兹其所以奮乎百世絶學之後而獨得夫千載不傳之傳也歟集義序中庸章句中庸何為而作也子思子憂道學之失其傳而作也推本堯舜以來相傳之意質以平日所聞父師之言更互演繹作為此書以詔後之學者蓋其憂之也深故其言之也切其慮之也逺故其說之也詳其曰天命率性則道心之謂也其曰擇善固執則精一之謂也其曰君子時中則執中之謂也故程夫子兄弟者出得有所考以續千載不傳之緒得有所據以斥夫二家似是之非蓋子思之功於是為大而微程夫子則亦莫能因其語而得其心也惜夫其所以為說者不傳而凡石氏之所輯錄僅出於其門人之所記是以微言未析至其門人所自為說則雖頗詳盡而多所發明然倍其師說而淫於老佛者亦有之矣熹自蚤歳嘗受讀而竊疑之沈潛反覆蓋亦有年一旦恍然似有得其要領者然後乃敢㑹衆說而折其衷旣為定著章句一篇以俟後之君子而一二同志復取石氏書刪其煩亂名以輯畧且記所嘗論辨取舍之意别為或問以附其後然後此書之㫖支分節解脈絡貫通詳略相因巨細畢舉而凡諸說之同異得失亦得以曲暢旁通而各極其趣雖於道統之傳不敢妄議然初學之士或有取焉則亦庶乎行逺升高之一助云爾中庸序餘見傳道門此篇乃孔門傳授心法子思恐其久而差也故筆之於書以授孟子其書始言一理中散於萬事末復合為一理放之則彌六合卷之則退藏於密其味無窮皆實學也善讀者玩索而有得焉則終身用之有不能盡者矣中庸大學章句大學之書古之大學教人之法周衰賢聖之君不作學校之政不修教化陵夷風俗頽敗時則有若孔子之聖而不得君師之位以行其政教於是獨取先王之法誦而傳之以詔後世若曲禮少儀内則弟子職諸篇固小學之支流餘裔而此篇者則因小學之成功以著大學之明法外有以極其規模之大而内有以盡其節目之詳者也三千之徒蓋莫不聞其說而曾子之傳獨得其宗於是作為傳義以發其意及孟子没而其傳泯焉則其書雖存而知者鮮矣宋德隆盛治教休明於是河南程夫子實始尊信顧其為書猶頗放失是以忘其固陋采而輯之間亦竊附己意補其闕畧以俟後之君子大學序餘見學門大學一篇傳文頗失其次子程子蓋嘗正之某竊因其說復定此本序次有倫義理通貫似得其真語錄學問須以大學為先次孟子次論語次中庸又曰大學中庸語孟四書道理粲然若理㑹得四書何書不可讀何理不可究何事不可處又曰大學一書如行程相似識得行程須更行始得大學是修身治人底規模大學有正經有解有或問看來看去不用或問只看經解便了久之又只看正經便了又久之自有一部大學在胷中而正經又不用矣同上小學古者小學教人以灑掃應對進退之節愛親敬長隆師親友之道皆所以為修身治國平天下之本而必使其講而習之於幼稚之時欲其習與智長化與心成而無扞格不勝之患也今其全書雖不可見而雜出於傳記者亦多讀者往往直以古今異宜而莫之行殊不知其無古今之異者固未始不可行也今頗蒐輯以為此書受之童䝉資其講習庶幾有補於風化之萬一云有内篇外篇易本義周代名也易書名也其卦本伏羲所畫有交易變易之義故謂之易其辭則文王周公所繫故繫之周以其簡帙重大故分為上下兩篇經則伏羲之畫文王周公之辭也并孔子所作之傳十篇凡十二篇中間頗為諸儒所亂近世晁氏始正其失而未能盡合古文吕氏又更定著為經二卷傳十卷乃復孔氏之舊云易學啓䝉聖人觀象以畫卦揲蓍以命爻使天下後世之人皆有以決嫌疑定猶豫而不迷於吉凶悔吝之塗其功可謂盛矣然其為卦也自本而榦自榦而支其勢若有所迫而自不能已其為蓍也分合進退縱横逆順亦無往而不相值焉是豈聖人心思智慮之所得為哉特氣數之自然形於法象見於圖書者有以啓於心而假手耳世之學者類喜談易而不察乎此其篤於名義者旣支離散漫而無所根著其深於象數者又皆牽合傅㑹而或以為出於聖人心思智慮之所為也若是者予竊病焉因輯舊聞為書四篇以示初學使無疑於其說云近思錄淳熙乙未之夏東萊吕伯恭來自東陽過予寒泉精舍留止旬日相與讀周子程子張子之書歎其廣大宏博若無津涯而懼夫初學者不知所入也因共掇取其關於大體而切於日用者以為此編總六百一十二條分十四卷凢學者所以求端用力處已治人之要與夫辨異端觀聖賢之大畧皆粗見其梗槩儀禮臣聞六經之道同歸禮樂之用為急遭秦滅學禮樂廢壞自漢以來諸儒補葺竟無全書其所存者儀禮而已周官一書固為禮之綱領至其儀法度數儀禮乃其本也而禮記郊特牲冠義等篇乃其義說耳臣頃在山林嘗與二三學者考訂其說欲以儀禮為經而取禮記及諸經史書所載有及於禮者皆以附於本經之下具列註疏諸儒之說畧有端緒乞條三禮劄子先君所著家禮三卷鄉禮三卷學禮十一卷邦國禮四卷王朝禮十四卷其曰經傳通解者凢二十三卷蓋先君晩歲之所親定是為絶筆之書次第具見於目錄惟書數二篇缺而未備而大射禮聘禮公卿大夫禮諸侯相朝禮八篇則猶未脫藁也其曰經傳集註者此書之舊名也凢十四卷為王朝禮而卜筮篇亦缺餘則先君所草定而未暇刪次者今皆不敢有所增益悉從其藁欽念先君早歲即嘗有志於是書昨在經筵嘗欲奏請于朝乞招致生徒置局編次而不果上然其著述之㫖意具存此篇朱在儀禮跋古今家祭禮右古今家祭禮之所纂次凢十有六篇蓋人之生無不本乎祖者故報本反始之心凢有血氣之所不能無也古之聖王因其所不能無者制為典禮所以致其精誠篤其恩愛有義有數本末詳焉遭秦滅學禮最先壞由漢以來諸儒繼出稍稍綴緝僅存一二家禮夫禮有本有文自其施於家者言之則名分之守愛敬之實者本也冠婚喪祭儀章度數者文也其本乃有家日用之常體固不可一日而不修其文又皆以綱紀人道之終始雖其行之有時施之有所然非講之素明行之素熟則其臨事之際亦無以合宜而應節世之君子雖或酌以古今之變更為一時之法然亦或詳或畧而無所折衷至或遺其本而務其末緩其實而急其文嘗獨稽古今之籍因其大體之不可變者而少加增損於其間以為一家之書大扺謹名分盡愛敬以為之本至其施行之際則又畧浮文端本實以竊自附於孔子從先進之遺意韓文考異南安韓文出莆田方氏近世號為佳本予讀之信然猶恨其不盡載諸本異同而多折衷於三本也原三本之見信杭蜀以舊閩以官其信之也則宜然如歐公之言韓文印本初未必誤多校讎者妄改亦謂如羅池碑改步為涉田氏廟改天明為王明之類耳觀其自言兒童時得蜀本韓文於隨州李氏計其歲月當在天禧中年且其書已故弊脫畧則其摹印之日與祥符杭本蓋未知孰先孰後而嘉祐蜀本又其子發明矣然而猶曰三十年聞人有善本者必求而改正之蓋未嘗必以舊本為是而悉從之也至於袐閣官書則亦民間所獻掌故今史抄而當時館職所校耳其所傳者豈真作者之手藁而是正之者豈盡劉向揚雄之倫哉讀者正當擇其文理意義之善者而從之不當但以地望形勢為輕重也抑韓子之為文雖以力去陳言為務而又必以文從理順各得其職為貴讀者或未得此權度則其文理意義正自有未易言者是以予於此書姑考諸本之同異而兼存之以待覽者之自擇區區妄意雖或竊有所疑而不敢偏有所廢也通鑑綱目司馬温公編集通鑑旣成又撮其精要為目錄晩病本書太詳目錄太簡更著舉要厯以適厥中而未成胡文定公因公遺藁修成舉要補遺其文愈約而事愈備矣嘗不自料因兩公四書别為義例增損櫽括以就此編表歲以首年而因年以著統大書以提要而分註以備言名曰資治通鑑綱目歲周於上而天道明矣統正於下而人道定矣大綱旣舉而鑑戒昭矣衆目畢張而幾微著矣通鑑綱目楚辭原之為人其志行雖或過於中庸而不可以為法然皆出於忠君愛國之誠心原之為書其辭旨雖或流於跌宕怪神怨懟激發而不可以為訓然皆生於繾綣惻怛不能自己之意雖其不知學於北方以求周公仲尼之道而獨馳騁於變風變雅之末流以故醇儒莊士或羞稱之然使世之放臣屛子怨妻去婦抆淚謳吟於下而所天者幸而聽之則於彼此之間天性民彝之善豈不足以交有所發而增夫三綱五典之重此余所以每有味於其言而不敢直以詞人之賦視之也然自原著此詞至漢未久而說者已失其趣如太史公蓋未能免而劉安班固賈逵之書世復不傳及隋唐間為訓解者尚五六家又有僧道騫者能為楚聲之讀今亦不存無以考其得失而獨東京王逸章句與近世洪興祖補註並行於世其於訓詁名物之間則已詳矣顧王書之所取舍與其題號離合之間多可議者而洪皆不能有所是正至其大義則又皆未嘗沈潛反覆嗟嘆詠歌以尋其文詞指意之所出而遽欲取喻立說旁引曲證以强附於其事之已然是以或以迂滯而逺於性情或以迫切而害於義理使原之所為抑鬱而不得伸於當年者又晦昧而不見白於後世予於是亦有感焉疾病之暇聊據舊編粗加櫽括定為集註八卷序文丹陽洪興祖曰揚雄所以議屈原者如此而班固亦譏其露才揚已顔之推又病其顯暴君過愚嘗折衷而論之曰或問古人有言殺其身有益於君則為之屈原雖死何益於懷襄曰忠臣之用心自盡其愛君之誠耳死生毁譽所不顧也故比干以諫見戮屈原以放自沈比干紂諸父屈原楚同姓也為人臣者三諫不從則去之同姓無可去之義有死而已離騷曰阽余身而危死兮覽余初其猶未悔則原之自處審矣或又曰寗武子邦無道則愚而仲山甫明哲以保其身今原乃用智於無道之邦以虧明哲保身之義亦何足為賢乎曰愚如武子全身逺害可也有官守言責斯用智矣山甫明哲固保身之道然不曰夙夜匪懈以事一人乎士見危致命况所處兼恩與義而可以不死乎且比干之死微子之去皆是也屈原其不可去乎有比干以任責微子去之可也楚無人焉原去則國從而亡故雖身被放逐猶徘徊而不忍去生不得力爭而强諫死猶冀其感發而改行使百世之下聞其風者雖流放廢斥猶知愛其君眷眷而不忘臣子之義盡矣非死為難處死為難屈原雖死猶不死也離騷二十五篇多憂世之語獨逺遊曰道可受兮不可傳其小無内兮其大無垠無滑而魂兮彼將自然壹氣孔神兮於中夜存虚以待之兮無為之先此老莊孟子所以大過人者而原獨知之太史公作傳以為其文約而辭微其志潔而行㢘其稱文小而其指極大舉類邇而見義逺其志潔故其稱物芳其行㢘故死而不容自疎濯淖汚泥之中以浮游塵埃之外推此志也雖與日月爭光可也斯可謂深知己者揚子雲作反離騷以為君子得時則盛行不得時則龍蛇遇不遇命也夫何必沈身哉屈子之事蓋聖賢之變者使遇孔子當與三仁同稱雄不足以與此班孟堅顔之推所云無異妾婦兒童之見余故具論之又曰夫屈原之忠忠而過者也屈原之過過於忠者也故論原者論其大節則其他可以一切置之而不問論其細行而必其合乎聖賢之矩度則吾固已言其不能皆合於中庸矣反騷后跋右以晁氏之集錄續變二書刋補著定凢五十二篇蓋屈子者窮而呼天疾痛而呼父母之辭也故今所欲取而繼之者必其出於幽憂窮蹙怨慕凄涼之意乃為得其餘韻而宏衍鉅麗之觀歡忻快適之語宜不得而與焉若其義則首篇荀卿之言指意深切君人者誠能使人朝夕諷誦不離於其側則入耳而著心豈但明師勸講之益而已哉若高唐神女湘妃洛神之屬其辭若不可廢而皆棄不錄則以義裁之而斷其為禮法之罪人也息夫躬栁宗元之不棄則晁氏已言之矣至於揚雄則未有議其罪者而予獨以為是其失節亦蔡琰之流耳然琰猶知愧而自訟若雄則反詘前哲以自文又不得與琰比矣今皆取之明天下之大戒也陶翁之辭其自謂晉臣恥事二姓則其意亦不為悲矣終篇特著張夫子吕與叔之言又以告游藝之及此者使知學之有本而反求之則文章有不足為者矣楚辭后語跋王逸所傳楚辭篇次本出劉向其七諫以下無足觀者而王褒為最下余己論於前矣近世晁無咎以其所載不盡古人詞賦之美因别錄續楚辭變離騷為兩書則凢辭之為騷者已畧備矣自原之後作者繼起而宋玉賈生相如揚雄為之冠然較其實則宋馬詞有餘而理不足而長於頌美短於規過雄則專為偷生茍免之計與原異趣矣獨賈太傅以卓然命世英傑之才俯就騷律所出三篇皆非一時諸人所及而惜誓所謂黄鵠之一舉兮見山川之迂曲再舉兮覩天地之方員者又其間超然拔出言意之表未易以筆墨蹊逕論其高下淺深也此外晁氏所取如荀卿子諸賦皆高古而成相之篇本擬工誦箴諫之詞其言奸臣蔽主擅權馴致移國之禍千古一轍可為流涕其他如易少越人大風秋風天馬下及烏孫公主諸王妃妾息夫躬晉陶潛韓栁本朝王介甫之山谷建業黄魯直之毁璧隕珠邢端夫之秋風三疊其古今大小俗雅之變雖或有同而晁氏亦不能無所遺脫然皆為近楚語者其次則如班姬蔡琰唐元結王維顧况亦差有味又此之外晁氏所謂過騷之言者非予之所敢知矣楚辭下證跋孝經刋誤仲尼閒居止未之有也此一節夫子曾子問答之言而曾氏門人之所記也疑所謂孝經者其本文止如此其下則或者雜引傳記以釋經文乃孝經之傳也經一章傳十四章三十三家語錄並散見性理諸門敬齋箴見誠門齋居感興詩崑崙大無外旁薄下深廣陰陽無停機寒暑互來往皇兮古神聖妙契一俯仰不待窺馬圖人文已宣朗渾然一理貫昭晰非象罔珍重無極翁為我重指掌吾觀陰陽化升降八紘中前瞻旣無始後際那有終至理諒斯存萬世與今同誰言混沌死幻語驚盲聾人心妙不測出入乘氣機凝冰亦焦火淵淪復天飛至人秉元化動靜體無違珠藏澤自媚玉韞山自輝神光燭九垓𤣥思徹萬微塵編今寥落歎息將安歸微月墮西嶺爛然衆星光明河斜未落斗柄低復昂感此南北極樞軸遥相當太乙有常居仰瞻獨煌煌中天照四國三辰環侍旁人心要如此寂感無邊方哀哉牛山木斧斤日相尋豈無萌蘖在牛羊復來侵恭惟皇上帝降此仁義心物欲互攻奪孤根孰能任反躬艮其背肅容正冠襟保養方自此何年秀穹林仁說見仁門皇極辨見中門諸儒至論東萊曰近思錄旣成或疑首卷陰陽變化性命之說大扺非始學者之事某後嘗與聞次輯之意後出晩進於義理之本原雖未容驟語苟茫然不識其梗概則亦何所底止列之篇端特使之知其名義有所向望而已至於餘卷所載講學之方日用躬行之實具有科級循是而進自卑升高自近及逺庶幾不失纂集之指若乃厭卑近而騖高逺躐等陵節流於空虚迄無所依據則豈所謂近思者耶劉𢎞正曰公中科第時猶少也薄遊筮隱閉門潛思朝廷每以好官召莫能屈不得已而出惟恐去之不早官簿書考未乆而閑居者四十餘年山林之日長學問之功深也嗚呼師友道喪人各自是公力扶聖緒本末宏濶而弄筆墨小技者以為誕癯於山澤與世無競而汨没朝市者以為矯自童至耄動以禮法而自怠於繩墨者嗤笑以為迂世嘗以是病孔孟矣公何恨焉諡議主意文公有傳授之由博學以文約之以禮人謂夫子之學然也而不知所以抽其緒者實得於問對之時吐辭為經舉足為法人謂孟子之學然也而不知所以啓其鑰者實本於受業之日嗟夫一鬨之市必立其平一卷之書必立其師道之所存師之所存也古之聖賢猶且從師而問焉人非生而知之者詎容恥學於師乎晦庵先生之學問凡平時著書立言彬彬乎有鄒魯之餘風未必無自來也夙負奇才長游太學喧騰聲譽超邁等倫此則屏山先生之學也悟頴絶人力行可畏安貧樂道恬退可嘉此則晦庵先生之德也博義親師古人所貴傳道受業君子重焉今日之師友淵源即前日聖賢之講貫也晦庵先生不求此而師焉則孔孟遺響誰其嗣之今也屏山為之師晦庵為之友可以接洙泗之派可以揚伊洛之波以道淑人以學傳世千載之下被沾丐者多矣文公用行知之功窮性學之實理易用知行之實功難茍不以朱文公講貫知行之訓書紳而佩服之則不惟負夫子抑亦負所學大扺聖賢論學惟知與行學問思辨所以知也篤行所以行也三知雖殊而均之為知三行雖異而均之為行我文公或分而言之或合而言之或㕘錯而言之要之用知行之實功則一而已是故以擇善為知以固執為行執事不必疑其異蓋知之精則擇行之力則固一以明善一以誠身此分而言知行也援程子之言而不可廢一復門人之書而無所不通執事亦不必疑其混蓋不知則行為冥行不行則知為茍知引不見前隨不見後此合而言知行也或以生知安行為知或以學知利行為仁或以博學審問為學或以思辨篤行為習執事又不必疑其雜蓋所行即所知所知即所行循環無端交勉互進此㕘錯而言知行也宗師君師講明正學維續道統以開人心之迷者宗師之道也尊崇正理表章賢儒使天下知所趨者君師之道也任宗師之責者講明斯道於人心晦蝕之時任君師之責者彰明斯道於人心䝉昧之日道非宗師不能以明於人道非君師亦不能以信於人世衰道微皇極不建大道不行言治者汨於管晏功利之習言道者淪於老莊空虚之說所謂開物成務之功發政施仁之實誰其知之時則有若不世之資命世之賢更相發明更相問難闡先聖不傳之祕發古人不言之妙而斯道不晦是固不可無宗師之功聖賢不作大道不明諸子之說乖離而横議異端之言紛紜而雜陳所謂道德性命之蘊仁義禮智之端誰其識之時則有若聰明之君睿智之主罷黜百家貶抑申韓援賢哲講明之素開愚䝉趨向之方而斯道以行是尤不可無君師之功警段文公力主道學天祚皇宋代生鴻儒乾淳間則有朱夫子出焉開示蘊奥提挈綱維砥柱吾道之天地開揭吾道之日月其論性也則有氣質美惡之别見於孟子之集註其言道也則有人外無道道外無人之說見於論語之解說其胷中自得也則沈潛反覆恍然有得冩於中庸章句之序文性中之天至文公而徹道中之天至文公而㑹胷中之天至文公而融文公學傳屛山夫愚夫昧易才士口易賢人玩易聖人忘易大易之旨貴乎無思無慮然感心不滅也此非屛山之論易乎自晦庵得其傳指乾之易以為致知之功論坤之簡以為力行之事此豈晦庵自為之子思之學見於中庸發明後進其心甚勤大學之道貴乎能定能靜然應心常存也此非屛山之論中庸大學乎自晦庵得其宗則或問有書發明性學論性數語不出至誠此豈晦庵自為之自屛山有曰書非得於精微則政事之偏乎詩非止於禮義則葩藻之亂乎而晦庵則首持大序推作本原旁援他經用為證據急於誨人則曰凢詩之善者可以感發人之善心詩之惡者可以懲創人之逸志是晦庵師授屛山者此也自屛山有言禮樂不知治躬則事外而不事内觀聽之易也而晦庵則於儀禮之書以講求夫冠婚喪祭顛末畢陳始終具舉以儀禮為經辨冠儀冠義之辭以禮記為解推婚禮婚義之旨若是者無非祖述屛山之宏模懿範也文公心傳程氏紫陽翁之所傳必有宗程河南之所授必有派由是而立教推是而淑艾其融貫非附㑹也其明辨非支離也其充拓開廣非徑直無等級也其細密平實非瑣碎無體統也蓋得師也有宗故立言也有法自程子推以敬直内之言為有意而我於是有以心察心為煩擾之訓自程子言明得盡淨則渣滓渾化而我於是有問辨可化氣質之說程子嘗曰把捉不定皆是不仁而朱子於是以篤行固執為仁程子嘗曰學之蔽固須是致知而朱子於是以審思明辨為知程子嘗曰學如登峻處要剛決果敢以進而朱子於是以勉而行之為勇人有同仁程子告之以將聖賢言仁處體認出是體仁必假於聖賢言論之已嘗講明者則朱子又認學知為仁非與固執為仁之說相戾也昔人嘗稱舜為大智至程子直謂舜是生而知之是舜之大智得於生知則朱子又認生知為知非與擇善為知之說相反也直而言之得其統旁而暢之得其歸蓋其得之師說者有本也一言立而衆理㑹大綱舉而萬目分其立言也可謂不畔師傳矣文公訓釋四書中興以來羣儒輩出道學益明至朱文公又有以集諸儒之大成今觀論孟之集解中庸大學之章句則所以深造斯道者大扺自吾心發用始非區區立言之學也其論中庸則曰誠為中庸一篇之樞紐其論大學則曰明德乃大學一篇之綱領解魯論之忠恕則有萬殊一本之說釋孟子之仁義則有天理人欲之辨文公之訓釋未著則四書之道幾晦文公之訓釋旣成則四書之道始彰豈惟四書而已哉至其序中庸章句必首辨乎道心人心之異且曰使道心常為一身之主而人心每聽命焉則典謨傳授之㫖亦自是而昭明此猶潛陽動於風霜剥落之餘雖和氣未遽充溢而發生之意已具則斯道之元氣已復者不在兹乎大學在先致知朱子大學一書于以補前聖所未備之㫖開後人所未達之見其有功於六經也大矣且朱子嘗為我言曰大學是為學綱目先通大學立定綱領其他經書皆在裏又曰致知一章此是大學最初下手處蓋大學乃孔氏之遺書曾子傳之朱子訓釋之其精意至義無非六經之緒論讀書而不以六經為凖的則無以知衆理之具在讀六經而不以大學為門户則無以知一貫之無遺此朱子於大學一書所以有立定綱領他書皆在之說也然大學乃六經之綱領而致知又大學之綱領欲泝六經之津涯必自大學入欲詣大學之閫奥必自致知入此子朱子於大學致知一章又冇最初下手之說也語孟精義或問集註竊嘗繹思其故其於精義也吾得伊洛之正傳焉其於集註也吾得古今之通說焉其於或問也吾得去取之深意議論之奥㫖焉大扺世之說二書者多矣溺於卑近者得其言而不得其所以言騖於高逺者自謂得其所以言乃并與其言而失之是以學者病焉宋興二程夫子者出而後孔孟之教坦然明白於天下其言雖近而索之也無窮其㫖雖逺而操之也有要此精義之所由作也雖然揀金於沙沙豈無金裘不聚毛何有於裘是故前乎伊洛一言之有據吾取之後乎伊洛一義之可考吾取之理有未安雖學正學者必去言有不可去雖不與吾好者必錄此又集註之所由作也雖然左氏一傳必託之君子而後褒貶之義明法言一書所以問答必託之或人而後顯今吾㑹衆說而中持衡焉吾有所去所以去者何由吾有所取所以取者何意自非審問而明辨之後世未有能知也此或問之作所以又不能自己歟抑是書之意又不止傳註而已也愚於篇首見之矣愚於或問見之矣精義所列尊聖賢也集註所述謹科級也學者誠以是法求之思吾夫子所以至於聖人者何如孟子之幾於聖人者何如吾之所以未至所以未得者何如其問也猶吾所問也其答也猶吾所聞也循序而漸進熟讀而精思則知夫子之言其自然如此也孟子之言其事實如此也孔孟之言如此而為涵蓄如此而為光輝也反而求之氣質成矣推而用之事物審矣又等而上之則夫子之所以明快孟子之所以雄辨夫子所以無迹孟子所以著其迹莫不端拜而深識之元氣之渾如太山之岩如又在吾目中矣中庸旨要大學議論中庸之學孟軻氏獨推其說而著之於七篇而軻之没無傳焉濓溪周子始繼絶學通書言誠始發其藴然猶未詳說而備論也蓋至於朱文公而後益明大學之旨韓愈氏嘗推明其說而著之原道而愈之說未盡焉二程夫子實表章之論其次序正其訛舛然猶未章分而句析也蓋至朱子文公而後大備文公其集道之大全而後學之蓍龜歟其論中庸也皆所以該體用其論大學也皆所以辨等級通之三書皆然請因明問而詳及之如戒謹不覩恐懼不聞若無以異於隱㣲謹獨之意而文公乃析而二之蓋一以存天理之本然而一以遏人欲之將萌先言其體而後言其用也夫子與㸃孟子養氣若異乎鳶飛魚躍之旨而文公乃兼而取之蓋皆以發明天理流行之妙兼體用而言之也以至論鬼神之德必有取於程張之言而力排乎侯氏之說者蓋侯氏析鬼神與其德為二物則是析體用而二之非若程張合體用而一之也其說若同而實異不可以不辨文公所以發中庸之旨豈不混融而畢備也哉至善所止其次第之先者莫大於人倫君臣父子旣舉其綱則其餘可以類推五者之目豈必縷及而不遺此文公所以無疑乎此也致知之學其次序之急者莫先於格物物物而格久則自明將豁然而貫通豈為泥迹而不求諸心騖外而不求諸内此文公所以有取於此也以至絜矩之道即推己之恕也茍能充之則天地變化草木蕃茍不充之則天地閉賢人隱此其次序亦在於人己物我之間非可以躐致也其機括之所從出或者在是文公於大學之旨豈不條析而甚明哉文公以平生自得之學發於二書備極淵微該貫本末上以發前聖不傳之奥下以開後學入德之門其惠天下後世深矣性命義理為大本愚嘗屨紫陽之堂撰雲谷之室則知後學之窮理致知者以性命義理為大本而先儒教之窮理盡性者以體認講貫為大要蓋自洙泗絶響而伊洛之學得其正自伊洛不傳而文公之學得其真是故四書之討論紬繹反覆訂正前乎性命之學其說未有所統宗也至於我文公而始定前乎義理之學未有所㑹元也至於我文公而始一抑我文公之教後學豈曰遽以此性命之學而使人有高談𤣥妙之慮耶亦豈曰遽以此義理之學而使人有一超頓悟之方耶雖喻人以致精之妙實未嘗不嚴其居敬持志之本雖示人以一貫之理實未嘗不誘其下學上逹之功故居敬持志雖簡淡而實切近使學者不以居敬為實地烏知五常百行四端萬善太極體用人物同一原也文公傳道淑人蓋自伊洛之後南渡中興以來乾淳之間道統方開理學有屬當是時江之西非無象山之學也浙之左非無慈湖之學也然象山之學專主乎頓悟皆自得其得而非與人同其得慈湖之學雖主乎巳一皆自傳其傳而非與人同其傳惟我文公不徒以一身傳道而必欲以此道傳諸人不徒以一時明道而必欲以此道淑諸後加以是時有東萊以濬其流有南軒以暢其支曰氣曰性曰體曰用互為之廣其性善之學自卑升高自近及逺力為之明其近思之端雖偽學之煽不免力排於小人然正理冇歸可以不墜於百世是以更化以來三四十年人無異端家無異說士無異學體認之學雖難仰止於前修而敬齋一箴乃後學操守之箴規而講貫之學未易遽希於遐躅而四書之旨乃後學深造之門户然則今之學者惟患其無得於此也茍其有得於此則以此為知道而知道必冇其要以此為入德而入德必有其序得於心而忘於耳何遜乎一唯之曾安於貧而樂於道何憚乎一瓢之顔參前倚衡鳶飛魚躍必自見於森列之天朝聞夕死川流不舍必有得於依據之地至是則何性命之學不講何義理之學不熟乎文公正統正論正統一書此千百年間一段大議論也其他政不必道未有如魏蜀之事者通鑑一書文正公鎔意注辭胷臆過古遷固所見處一籌掲魏為正統將置先漢之胄於何地使文正生在當時仕蜀乎仕魏乎文正政自無他然亂臣賊子得以容喙未必不自斯言發之獨不思所謂正統者朝諸侯一天下而謳歌獄訟皆歸之者乃所謂正也操何人斯可以當此迨至近世大儒作為綱目去魏書蜀春秋之筆削乃定先主孔明之心事千載乃明嗚呼以文正之大賢猶且意見若是斯文無近世先儒之正論則紛紛之說當何時而定乎嗟夫所貴乎君子之學凡夫六合之内羣經之中百代之上下其於大本大原大綱目要當羅列於胷中而區區陳迹末事不足論也偶句訓釋未著則四書之道或晦訓釋旣成則四書之道始彰其論中庸則曰至誠為中庸之樞紐其論大學則曰明德乃大學之綱領解魯論之忠恕則有萬殊一本之說解孟子之仁義則有天理人欲之辨時政主上崇獎四書肆我皇上聰明天縱輝光日新遜志經筵研精道閫邇者親灑宸翰崇獎文公以其所著四書有羽翼斯文之功有扶持治道之益寵以師垣封以上公蓋以示人心趨向之端解天下䝉昧之見是豈特為文公計哉直將為四書計也豈特為四書計之抑將為吾道計也大哉王言一哉王心愚知其為天地立極為生民立心為天下萬世開太平也御筆褒贈每觀朱熹所著論語孟子中庸大學等書經解發揮聖賢之藴羽翼斯文有補治道朕方勵志講學緬懷典刑深用褒嘉可特贈太師追封信國公朝報結尾當先示於四書雖然紫陽教人之法皆以大學語孟中庸為入道之序而後及於諸經不先以大學則無以提綱振領而盡語孟之精不參之以語孟則無以融㑹貫通而極中庸之旨趣不㑹其極於中庸則又何以建立大本經綸大經而讀天下之書論天下之事哉吾是以知易之本義詩之集解禮之通釋與夫通鑑之綱目語錄文集諸書雖其著述不一未有不本於四書也學者茍能講明四書之旨於其先則其他諸書端可以類學矣不然聖天子天語褒崇宸章炳煥何以獨致意於四書乎當無愧於四書雖然文公之學非特寓於著書立言之間而尤達乎修身養性之妙故所以嗣伊洛之淵源開百世之統緒者雖見於論孟中庸大學之四書至於尊德性而道問學致廣大而盡精微則又有無愧於是書之所發明者世所謂通經之士博學之流為不少矣然敝精疲神窮年皓首所得者章句訓詁之美所安者吟詠誦讀之勤求其本㫖則顛迷惑亂曠蕩忘返上不足以事君親下不足以撫民物若幾於玩物而喪志者其亦何取於窮經學古之為哉故愛慕文公之書而能玩味不忘者雖取於好之之篤景仰文公之行而能佩服不忘者尤貴於得之之深不然則四書之具存義理之昭著不過為當世之士追逐時好充箱盈篋快場屋拾青紫之計耳其於斯道之大果何益哉聖天子風化天下敢以是為獻當有得於二書雖然中庸之道雖難能而其妙亦可徐造大學之說雖易知而其理則無終窮學者如之何而可以進此曰窮理以致其知反躬以踐其實持敬一說所以成始而成終也茍能用力於此而真積力久以至貫通則大學非淺近也等級秩然如規斯員矩斯方凖斯平繩斯直雖一毫不可越而極其至焉則一貫矣中庸非深奥也精粗一貫則與天地同其大日月同其明四時同其變化而道果不逺人矣嗚呼非知道者其孰識此羣書㑹元截江網卷三十三
