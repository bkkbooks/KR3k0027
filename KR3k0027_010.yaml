body:
  text: 羣書會元截江網卷十府庫厯代事實禹關石和鈞王府則有太公為周立九府圜法前志太府王府內府外府職內職幣泉府天府職金並周禮魯人為長府論語滕有倉廪府庫孟子漢武帝初府庫餘財京師之錢貫朽而不可校東置滄海郡又興十萬餘人築衛朔方費數十百巨萬府庫並虛天子與公卿議更錢幣是時少府多銀錫大農言山海天地之藏宜屬少府楊可告緍上林財物甚衆乃令水衡主上林並前志靈帝於西園造萬金堂以為私藏隋十二年有司言庫藏皆滿於是闢左藏之院以受之下詔曰寧積於人無藏府庫隋食貨志天寶時非租庸正額者積百寶大盈庫以供天子燕私安祿山反楊國忠以為正庫物不可給士故事天下財賦歸左藏而大府以時上其數京師豪將假取不能禁第五琦請皆歸大盈庫主以中宫自是天下之財為人君私藏並唐志詳見財用門德宗時楊炎請出之以歸有司乃詔嵗中裁取以入大盈度支具所以聞德宗於奉天行宫立二庫陸宣公曰瓊林大盈古無其制創自開元今逆冦亂常鑾輿臨幸忽覩二廊之下榜列二庫之名萬目所覩孰能忍懷並本傳德宗時裴延齡言左藏天下穀入不資於是以天下宿負八百萬緡折為府庫抽資三百萬緡為羡庫樣物三百萬緡為季庫帛以素出以色入者為月庫憲宗曰宫中用物極節儉故當時內庫甚充實元和末田洪正入朝李絳請發內庫錢百萬緡賜之自會昌來置偹邉庫收度支戶部鹽鐵錢物宣宗更號延資庫唐志偶句必析正庫而立四庫則延齡為欺君不移東庫而實四庫則李絳為盡職桑洪羊以山海屬大農而財之私者猶公第五琦以財計歸大盈而利之公者反私皇朝事實左藏庫太祖乾德三年國初貢賦悉入左藏及取荆湖西蜀儲積充羡乃於講武殿後别為內庫以貯金帛號曰封庫椿太宗興國二年命賈黃中程能馮贊分掌左藏三庫先是貨泉與金帛通堂及儲蓄盈美始命分之謂侍臣曰朕奉行先帝成規不敢有改易然財貨充溢藝須别置官吏使各専其職爾並長編左藏庫者國家經賦所貯也淳熙申請給金銀錢帛共約計三千萬緡而宗廟宫禁非泛之費不與焉雜記寧宗嘉定十六年臣僚上言左帑一職限以重門分以東西統之以提轄然庫官之權不容太重門宫之任不容不謹𣙜官之分不容不遵臣望聖慈察邦計之司存豈容玩視慢令如此嘉定元年置拘𣙜安邊錢物所並長編內藏庫真宗景德四年出內藏庫錢五十萬貫付三司市菽麥長編出陳彭年所撰內藏庫記示王旦等曰太祖以來有景福內庫先帝改為此名所著金帛備軍國之用非自奉也顧外庭不知耳二聖之平荆湖西蜀嶺表江左河東親祠郊丘所費巨萬皆出於是不取於民三司所假凡六千萬自淳化迄景德每嵗多至三百萬少亦不下百萬纍年不能償即命除之又曰此庫乃為計司備經費爾且計司有缺必取于民茍非節用何以獲濟寶訓祥符九年三司言諸州欠商賈飛錢詔發內藏錢二十萬緡以給其費天禧元年上出嵗入財用數曰今當出金帛數百萬借三司李迪曰天子於財無內外願下詔賜三司仁宗明道二年三司言用度不足請假於內藏庫出緡錢百萬賜之因曰國家錢本無內外蓋以助經費康定元年出左藏內藏庫緡各十萬下陕西給軍需出內藏庫絹一百萬下三司助邊費神宗熙寧元年詔出奉宸珠付河北四𣙜場鬻之别封樁以偹買馬二年上謂輔臣曰近年內藏庫籍文具而已財貨出入略無關防嘗聞太宗時內藏財貨每千計用一牙錢計之名物不同所用錢名色亦異他人莫能曉也嘗匣而置之御閣以參驗帳籍中定數晚年嘗出其錢示真宗曰善保此足矣今守藏內臣皆不曉帳籍關防之法當更擇人領之元豐元年十二月上每憤北虜倔強慨然有復幽燕之志即景福殿庫聚金帛為金費是年始更庫名製詩以揭之曰五季失圖玁狁孔熾藝祖造邦思有懲艾爰設內府期以募士曽孫保之敢忘厥志凡二十二庫後積羡嬴又揭以詩曰每虔夕惕心妄意遵遺業顧豫不武姿何以成戎捷元豐初蓄積嬴溢司農請發坊場百萬緡輸忠都三年遂於寺南作元豐庫貯之哲宗元祐三年三月乙丑詔改元豐元祐庫為元豐南北庫增置南庫監官一員並長編髙宗紹興五年川陕宣撫將上供錢帛依舊留充贍軍上曰祖宗蓄積內帑本以偹邊陲緩急之用遂捐內帑以贍軍聖政二十七年九月詔淮南荆西湖北路內藏紬絹錢帛並與蠲免上曰朕約於奉已內帑未嘗妄費一金邊郡所欠固多然戶口未復責輸實難可悉與蠲免係年録二十八年九月三省言平江紹興府湖秀州被水上曰朕平時無妄費內庫所積正欲偹水旱爾本是民間錢却與民間用復何所惜耶同上二十九年上曰比緣河流淺澀綱運稽緩已令內帑支降錢五百萬貫以供調度朕自息兵講好二十年間所積錢物豈以自奉哉蓋欲偹不時之須免臨時科取重擾民爾聖政三十一年十月上謂大臣曰朕曩於內帑儲錢偹邊士大夫不喻朕意甚者至指為瓊林大盈之比係年録孝宗淳熙七年上曰朕為內帑無毫髮妄用茍利百姓則不惜也聖政內藏庫者始因藝祖收諸國帑藏貯於講武殿太宗興國三年因分左藏北庫為內藏庫亦謂之景福內庫三司所假多至三百萬不能償即蠲之神宗用王荆公計凡山海坑治𣙜貨絶沒常平免役坊場河渡悉歸朝廷元豐元年凡三十二庫五年又取苖役羡財為元豐庫在內藏之外元祐初又建元祐庫以偹封樁皆歸朝廷庫務崇觀後則大觀東西庫皆天子私藏而版曹告竭矣髙宗渡江但有內藏及激賞二庫秦丞相用事皆獻金幣由是內帑山積雜記封樁庫太祖乾德三年國初貢賦悉入左藏庫及取荆湖下西蜀儲積充羡上曰軍旅飢饉當預為之偹不可臨事厚斂於民乃於講武殿後别為內庫以貯金帛號曰封樁庫凡嵗終用度贏餘之數皆入焉太祖嘗曰石晉割幽薊以賂契丹朕欲俟此庫所蓄滿三五千萬即遣使與契丹約茍能歸我土地民庶則當盡此金帛以充其贖直如不能朕將散滯財募勇士俾圖攻取爾太宗興國三年上幸左藏庫視其儲積語宰相曰此金帛如山用何能盡於是分左藏北庫為內藏庫并以講武殿後封樁庫屬正改封樁庫為景福內庫同上左藏南庫者本御前樁管激賞庫也孝宗即位改之然南庫移用皆自朝廷非若內帑直𨽻版曹而為經費也淳熙十年始歸戶部而戶部總二百九萬緡皆奉親及內教所須是南庫歸版曹者益也十二年以左藏西庫名之紹興元年改稱封樁下庫焉左藏封樁庫者孝宗所創也其法非奉親非軍需不支至淳煕末往往以犒軍或造軍器為名撥入內庫或修內司有司不敢執並雜記激賞庫髙宗時有激賞庫孝宗改為南庫又有三省樞密院激賞庫者渡江後所創也自建炎龍興堂膳始減紹興四年趙鼎為都督不行遂以都督金錢入激賞庫十年秦檜以兀术叛盟需犒賜之物乃計畝率錢遍天下民無得免者然兵未嘗舉而錢歸激賞庫其後嵗支堂厨犒設議者指為冗費孝宗減嵗用為十萬緡雜記瞻軍庫東南酒課自祖宗時悉以留州建炎四年每井驟增二十四謂之軍期錢行在戶部膳軍南中東三庫并殿司所獻酒坊七十五錢收息錢亦為一百三十萬諸路酒課約五百餘萬蓋自軍興諸帥擅𣙜酷之利朝廷所仰者茶鹽耳雜記安邊庫安邊所者嘉定元年置時廢國用司而㑆胄及諸閹省吏之家資財皆以簿録黃伯庸請創此名遂與沈信同領其事即御史臺置局卿監一員提領朝士二員為拘𣙜官其後會其入嵗得七十萬緡専充北虜所增嵗幣其田宅契劵皆藏之御史臺庫雜記諸州軍諸州軍資庫者嵗用省計也近嵗添差俸入大為郡郡之害民力安得不困公使庫者祖宗以前代牧伯皆斂民以做厨傳故制公使錢以給之省其民也雜記偶句貨泉金帛分命有司専職掌也牙錢匣藏參驗定數防滲漏也出內帑以偹水旱紹興之二十八年也出內帑以佐調度紹興之二十九年也陜西賞軍此公費也而亦出內庫之帛皇祐河北買馬此外事也而亦賜奉宸之珠熙寧講武殿立內庫貯金帛而太祖則心乎飢饉景福殿設內庫聚金帛而神宗則心乎恢復經傳格言未有府庫財非其財者也大學百姓虛而府庫滿是謂國蹙荀子魯人為長府閔子騫曰仍舊貫如之何何必改作論語名臣奏議楊炎請以內庫歸左藏哲宗朝范祖禹奏唐制天下財賦皆納左藏庫太府四時以數聞尚書北部覆其出入至代宗時租賦悉進入大盈內庫以中人主之有司不能窺其多少國用不能計其贏縮及德宗即位宰相楊炎頓首於上前曰夫財賦邦國之大本是以前代歷選近臣主之猶懼不集往往覆敗大計一失則天下搖動先朝擢以中人領其職豐儉盈虛雖大臣不得知則無以計天下利害請出之以歸有司如此然後可以議政德宗乃詔凡財賦皆歸左藏庫炎以片言移人主之意議者美之以炎知為相之體德宗知為國之務也元祐四年內藏以私蓄財仁宗慶厯三年韓琦言祖宗置內藏庫蓋偹水旱兵革之用非私蓄財而充已欲也自用兵以來財用匱竭宜稍出金帛以佐邊用民力寬而衆心安矣內藏非供奉養賜豫嘉祐七年司馬光言祖宗置內藏以偹飢饉兵革非常之費非以供陛下奉養賜豫之具也今內庫専以內臣掌之不領於三司其出納之多少積蓄之虛實簿書之是非有司莫得而知也患在天下空虛范祖禹奏當今之患在於天下空虛朝廷不可不為之計封樁之與經費均出於民皆陛下一家之財也茍可以利國何所愛焉譬如移之於東而還之於西出之於內而歸之於外也上供多入內帑光宗朝朱熹奏建炎以來地削兵多而權宜科斂又復數倍供輸日久民力以殫而間者諸路上供內入內帑是置戶部經費不足遂廢祖宗破分之法而上供嵗額必取十分登足而後已期限迫促科責嚴峻監司州縣更相督迫惟務自寬已責何暇更察民情而州縣嵗入多作上供起發則又於額外巧作名色夤緣刻剝此民力之所以大窮也偶句韓公琦謂祖宗置內藏蓋偹水旱兵革之用非畜私財而充已欲司馬光曰祖宗置內藏以偹飢饉兵革之費非以供奉養偹賜豫諸儒至論周三府今為四鄭郎卿曰以周官之制參國朝之制玉府即今之奉宸庫也內府即今之內藏庫也外府即今之左藏庫也中興以後又别置激賞庫今之南庫是也周之三府今分為四凡天下金玉之物皆歸於奉宸庫山澤鹽鐵之賦皆歸於內藏庫以為天子之私藏其他泛常所入一歸於南庫謂之宰相制國用至於天下戶口租入則歸之戶部所以版曹都做不行正由權不歸一也內庫失周人之意余亮曰國朝之左藏即周之外府也國朝之內藏即周之內府也然宰相不得而與知則去周人太宰兼統之意逺矣故當太祖時立為內庫實欲俘取契丹削平幽壤故為此以偹一旦之用自中世以後內庭之支數日多而韓琦孫沔諸臣亦皆欲約女御之費以省國計嚴宣取之弊以防吏姦是其弊之積亦非一日矣渡江以來國用未裕惟以南庫屬宰相其果周人之意否乎主意古人皆公用古者藏富於民後世藏富於國又其後藏富于府庫世儒皆有是言矣嘻亦嘗觀其用之之意乎夫內庭之費外朝之所不知宫掖之藏有司之所不敢間固也然使其均節之有人出入之有度則雖籍而在內內猶外也名而為私私猶公也何慊乎嘗觀古今公私之意矣周人制於冡宰冡宰大臣也故不敢有侈用之心漢初屬於少府少府外朝也故亦無滲漏之弊至東漢歷唐率以閹人主之則財用始専為私用爾我朝舉內帑之財而屬於三司之使其亦成周之意歟後世為私藏古人以財為天下用故有公帑而無私藏後世以財為一已用故有私藏而無公帑愚未嘗不三歎後世之不古也蓋人主之用財由一身而逹之天下孰非國家之常用何以私為哉乃若宫庭玩好之常人君賜與之費在內所不能免古人立為法度以樽節之不敢以一已之私而害天下之公也自人主求便于已而後公私之藏始分自設官不屬其聯而後內外之職始異費皆異供財皆異掌內而侈用有非外庭之所知外而費用有非內庭之所預不能以天下之財為天下用而且分其出入便為已私則人主示人之意已不廣矣然公私雖易藏而所謂私者猶不得以亂乎公也設官雖典屬而此猶不得以侵乎彼也是則古意雖已壞猶未至於已甚也奈何人主侈心一萌費用亡度財之有無不問也國之費用不恤也嗚乎古人所謂公用者一變而至於為私矣警段財貴均於下財用非人君之所私也而有志之君每至於私藏者則亦以其有公天下之心也夫惟人君有公天下之心則藏之府庫與藏之四海均也而且有內庫之積抑何耶蓋有志之君慮邊患之不可不偹也民飢之不可不賑也軍旅之不可不充也而財之在外庫者則有司掌焉而有司之所掌特欲紓目前之急耳何暇為邊患軍民計哉則內庫之積所以為邊患軍民偹也烏得不謂之公天下之心耶而或不為濟軍民之計則未免於私耳財物富於上古人藏富于民後世藏富于國又其甚者藏富於君藏富於民則民之富即國與君之富也自其藏富於國則民始貧矣自其藏富於君則國與民俱貧矣民貧則國之富也不足恃國與民俱貧則人君之富果足恃哉三代取民之法無過什一故上用足而下不匱後世人君不知出此惟知聚財於其上而不知藏富於其下嗟夫彼亦孰知夫百姓足君孰與不足百姓不足君孰與足之説乎彼又孰知夫財聚則人散財散則人聚之説乎偶句天子無私藏內庭無濫費今之左藏即外府也今之內藏即內府也帑藏調於屢空之餘泉府竭於積涸之後粟帛之有餘民命之有餘也府藏之增衍國用之增衍也事證周人掌財異其職周有太府玉府天府外府內府皆王之府藏也凡領其貨於受藏之府頒其賄于受用之府則太府掌之凡良賄之藏以共王之珠玉則玉府掌之凡藏國之寶鎮寶器則天府掌之而外府之職則掌布之出入以供百物之用內府之藏則受九貢九賦之貨賄以待邦之大用别而言之府庫之名不同合而言之皆聖人之所藏然而內府之藏所以待邦之大用者尤異他府而受九貢貨賄又出於太宰之手以此知周人之積所用者又安有一己之私哉漢人蓄財殊其制漢有治粟內史實掌榖貨而又少府實掌鹽鐵以給私養其初皆本秦官列於九卿而其後景帝始致治粟內使為大農武帝始改為大司農説者為大司農供軍國之用少府以養天子之私財財始分為二矣武帝元鼎之初又復置水衡郡尉實掌地苑之入財又始分為三矣故大農聚財少府水衡又各聚財他時有都內錢四十萬萬水衡錢二十萬萬少府錢十八萬萬則財分而為三而其權蓋始不能一矣其後大農錢盡乃以少府禁錢續之而宣帝出水衡錢以給縣官之用説者以為當仰給司農而宣帝令出水衡實為異政則少府水衡之錢往往皆為人主私藏而國家自經用之外一或無所取辨則大農之錢蓋始不能給矣自光武以山海鹽鐵而歸之郡縣出少府禁錢而屬之司農使官中私用一切皆於司農取之而司農又不盡應其求章和以來不能堪此於是别自立監而用閹人以領之而威靈之君故每歎天子無私財而開洪都賣爵後園自為私藏矣唐人主財非其人唐始以財賦所入皆在左藏盈虛之數太府上之出納之數北部覆之非不可也及第五琦不能禁豪將之求取乃悉納之內帑天子以給取為便而天下公賦皆為天子私藏有司不敢計而弊端舞弄於孺宦之手至楊炎請出內帑以歸有司當時方喜有貞觀之風未幾盧杞一用而炎率貶死前日之法盡變異時瓊林大盈第為已蓄而無補邦國之虛盈矣夫唐人之大盈是亦周漢內府少府之制然不歸於大臣而歸于孺宦不屬於外朝而屬於內庭帳籍無考姦弊肆出以啓異時宦官之恣此其所以為失也祖宗所藏者為公藝祖皇帝手提干將汛掃宇宙梯來索引之國奉琛相望嶺表海嶠之邦入貢不絶府庫充盈林積山峙遂别建內帑以藏之時乾德之初年也夫上不歸於有司下不散於小民而第藏於府庫之私我祖果何意哉嘻孰知聖人深長慮歟太祖常語左右曰軍興飢饉須預為備臨事厚斂非長計也遂别於內庫以貯金帛我祖之意為民計也則內帑之立私耶公耶又嘗語近臣曰朕閔八州之民久陷夷虜俟蓄滿五百萬緡以贖山後諸郡我祖之意為國慮也則內帑之立私耶公耶聖人用心與天地同其公與臣民同其情於此可見矣祖宗所蓄者非私祖宗朝嵗斤緡錢六十萬以助三司德至渥也天禧三年嘗詔毋得復有假貸矣而後四年之間所借錢帛凡九百七十餘萬景祐四年又嘗以天禧詔書從事矣而康定之元年九月出納庫錢絹百萬十二月又出內庫絹百萬一年之間所出若此他可知已貨之錢不償則遂除之借之名立異則遂賜之祖宗之不為私奉蓋如此非時取索必經三司天子無泛費牙錢匣藏參驗定數有司無侵用而宫中私費孫奭有諫近幸侵漁吕誨有諫當時羣臣上下更相飭戒如此此祖宗之治所以逺過漢唐也歟祖宗所給者皆當列聖相承銖積寸纍異時三十庫之羡修為歌詩皆列聖積纍儉約之所致至有軍國經常之費又皆取而為吾國吾民之用非徒為是蓄積也明道出禁錢以賜三司慶歷罷月進錢以賜縣官此則為經費之助也皇祐出內藏庫絹以糴軍糧至和又出內藏庫錢以糴軍儲此則為軍食之費也陕西博糴以濟民飢取賚奉宸銀三萬河西河北水災欲行賑貸則出內藏絹三十萬匹非為民用乎河北軍賞此公費也而亦出內庫之帛河北買馬此外帑也而亦賚奉宸之珠此非兵用乎以至平荆湖則用之祠郊丘則用之皆非為一已私奉爾時政所蓄當明所察共惟主上天性儉約嗜好不聞是宜府庫充斥阜若丘山可也然內帑纍年之積枵然無餘封樁左藏之儲常慮空匱其豈非出納不齊於有司會計不當於委吏姦欺百出源流莫考乎其豈非禁中呼索輒稱上旨應奉無度莫得檢核乎為今之計亦宜付之外庭窒其滲漏察其欺蠧文書有所稽考出入有所會計則內帑財用立見其有餘矣不然內外扞格各分畦畛制用者假周官不會之意主藏者便外庭不預之文則吏姦滲漏又何自而足哉結尾所取不如所豫人皆曰斂民可以富國愚則曰與民所以富國夫百物生於民者也生於民而積於民則百姓足而君足矣斂於民而積於國國則富矣民竭而物窮吾恐一旦有所求於民而不能繼也是故謂將以取之必有以與之人君之儲蓄何以異於是哉若然則鬻爵度僧不必也頭會箕斂之政亦無所施矣將見君有餘財民有餘力粟之倉腐錢之貫朽民猶君也君猶民也噫此不儲蓄之儲蓄也此亦萬世長久通行之大計也為國者無以熟復而厭聞也執事其然之乎羣書會元截江網卷十
