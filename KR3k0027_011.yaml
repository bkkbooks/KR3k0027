body:
  text: 羣書會元截江網卷十一錢帛歷代事實虞夏之幣金為三品或黃或白或赤或錢史平凖書湯七年早禹五年水湯以莊山之金鑄幣管子禹以歷山之金鑄幣管子太公為周立九府圜法錢圜函方輕重以銖流於泉布於布太公又行之於齊景王錢輕將鑄大錢單穆公曰古者量資幣以救民患輕則作重幣以行之於是有母權子而行若不堪重則當作輕而行之於是有子權母而行今王廢輕而作重民失其資能無匱乎弗聽卒鑄大錢文曰寶貨內外皆有周郭百姓蒙利焉秦兼天下幣為二等銅錢質如周錢文曰半兩重如其文漢興更鑄莢錢髙后二年行八銖又行五銖錢孝文鑄四銖文為半兩除盜鑄令使民放鑄是時吳以諸侯即山鑄銅富埒天子鄧通以鑄錢財過王者故吳鄧之錢布天下武帝造銀鍚為白金三品重八兩圜之其文龍直三千其文馬直五百其文龜直三百令銷半兩錢更作三銖錢盜鑄諸金錢罪皆死其后又改五銖民盜鑄白金二錢死者數十萬人公卿請令京師鑄官赤仄一當五賦官用非赤仄不得行白金稍賤嵗餘終廢不行后二嵗赤仄錢財又廢於是悉禁郡國無鑄専令上林三官鑄錢今天下非三官錢不得行自元狩五年三官初鑄五銖至平帝元始中成錢二百八十億萬云王莽又造契錢錯錢與五銖錢凡四品前食貨志詳見財用門後漢光武中興復用五銖錢和帝時有言改鑄大錢者劉陶議曰民可百年無貨不可一朝有飢遂不鑄文帝罷五銖錢明帝更立五銖孫權赤烏元年鑄當千重十二銖晉元帝用孫氏錢雜行沈充鑄小錢謂沈郎錢宋文帝時行四銖錢江夏王義恭議以大錢一當兩武帝孝建初鑄四銖文曰孝建廢帝時為二銖錢又有菜子荇葉之名滿一千長不盈三寸謂之蝸眼劣於此者謂之綖環入水不沈十萬不盈一掬斗米一萬商賈不行晉志梁武帝乃鑄錢肉好周郭文曰五銖重如其文而又别鑄除其肉郭謂之女錢自破顔以東八十為百名曰東錢江郢已上七十為百名曰西錢京師以九十為百名曰長錢至末年以三十五為百云梁末又有兩柱錢及鵝眼錢北齊文襄王以錢文五銖隋髙祖更鑄新錢背面肉好皆有周郭隋食貨志唐髙祖武德四年鑄開元通錢積十錢重一兩得輕重大小之中乾封元年改鑄乾封泉寶開元初宰相宋璟請禁惡錢行一銖四參錢毁舊錢三十二年宰相張九齡建議宜縱民鑄公卿皆以為不便二十六年盜鑄益起江淮偏爐錢雜以鐵鍚輕漫無復錢形兩京錢有鵝眼古文線環之别每貫重不過三四斤肅宗乾元元年經費不給鑄錢使第五琦鑄乾元重寶錢與開元通寶參用以一當十亦號乾元十當錢復命絳州諸爐鑄重輪乾元錢是時民間行三錢大而重稜者亦號重稜錢法既屢易物價騰踴米斗錢七千上元元年減重輪錢以一當三十開元舊錢與乾元十當錢皆以一當十代宗即位乾元重寶錢以一當一德宗正元初駱谷散關禁行人以一錢出者憲宗時商賈至京師委錢諸道進奏院及諸軍諸使富家以輕裝趨四方合劵乃取之號飛錢武宗廢浮屠法永平監官李郁彥謂以銅像鐘磬爐鐸皆歸巡院州縣銅益多矣唐食貨志坑冶禹任土作貢荆揚貢金三品梁州貢鏐鐵銀鏤禹貢草人掌金玉錫石之地而為之厲禁以守之若以時取之則竭其地圖而受之巡其禁令周禮齊威公鑄莊山之金以為幣管子漢吳有章山之銅丹陽郡有銅官蜀有嚴道卭都益郡皆産銅之地地理志武帝時孔僅言山海天地之藏宜屬少府陛下弗私以屬大農募民自給費敢私鑄鐵器者斷右趾漢志詳見財用門唐太宗時權萬紀奏宣繞部中鑿山冶銀嵗可得數百萬上曰以利規我耶本傳元宗時李適之言華山生金采之可以富國李林甫曰華山陛下本命上怒罷適之本傳德宗時户部韓潤建議山澤之利宜歸主者自是皆𨽻鹽鐵使憲宗元和中天下銀冶廢者四十處宣宗增銀冶二鐵山二十一銅冶二十七鉛山二千斤唐志銅禁賈誼曰今采銅者日蕃釋其耒耨冶鎔吹炭銅布於天下其為禍博矣何謂七福上收銅勿令布銅畢歸於上則官富實武帝悉禁郡國無鑄錢輸入其銅三官漢志唐德宗張滂奏禁江淮鑄銅為器惟金鑑而已十年銷錢者以盜鑄論文宗時禁銅為器唐志偶句漢鑄五銖人以為便周鑄大錢民失其資賈誼謂取銅則七福可致劉秩言禁銅則四美可兼堯鑄錢於歷山以造洪水而鑄也湯鑄錢於莊山以造大旱而鑄也周景王大錢之鑄所以權錢之輕漢武帝白金之造所以救物之重黃牛五銖之謡足以開光武中天之基赤鳥比輪之行足以啓元帝江左之業官鑄赤仄人肆其姦無益於漢俗之虛耗寶鑄開元輕重得中可以壯唐室之精神皇朝事實太祖開寶九年升州言所鑄銅錢一年共鑄三十萬貫乃命江南運司應采銅處經度採取以給其用會要太宗太平興國二年初李煜舊用鐵錢於民不便二月樊若水請置監於升鄂饒等州大鑄銅錢銅流既不得渡江益以新錢民間錢愈多鐵錢自當不用悉鑄為農器且除銅錢渡江之禁詔從其請民甚便之長編二年九月詔所在悉用七十七為陌每千錢必及四斤半以上四年詔兩川民許雜用銅鐵錢即不得出他境邊郡戒疆吏謹視之八年張齊賢鑄錢於江南饒信等州淳化元年國初錢文曰宋元通寶又改鑄淳化元寶錢上親書其文作真草行三體自後每改元必更鑄以年號云真宗至道三年屯駐兵士所請銅錢一文與拆支鐵錢五文並長編咸平二年初鑄錢但用饒州永平池州永豐二監至是宰臣張齊賢言今錢貨未多望擇使臣按行出銅易得薪炭之處增監鑄錢乃命虞部員外郎馮亮等至建州置豐國監江州置廣寧監明年凡鐵錢一百二十五萬通略景德二年二月知益州張詠於嘉卭州鑄大鐵錢與銅錢相兼用之天禧五年錢幣之制有銅錢二等凡鑄銅錢有四監饒州永平池州永豐江州廣寧建寧府豐國至道中嵗鑄八十萬貫景德末至一百八十三萬貫大中祥符後銅坑多不發天禧末鑄二百五萬貫鑄鐵錢有三監卭州惠民嘉州豐逺興州濟衆益州雅州舊有監役廢之銅錢行乎天下鐵錢止乎川陕仁宗慶厯元年知永興軍范雍請下三司舉官於河東産鐵州軍鑄大錢以助陜西軍費仍罷興元等處輦置小鐵錢從之初陕西軍興移用不足皮仲容始獻議置阜民朱陽二監以鑄錢既而范雍請鑄大錢與小錢兼行大錢一當小錢十並同上神宗熙寧四年皮公弼在陕西嘗建言陕西見行當二大銅錢頃嵗西邊用兵始鑄當十錢後兵罷多盜鑄乃此當三猶私鑄乃減當二行之至今銅費相當民無冒利盜鑄衰息請以舊銅鉛盡鑄當二錢從之其後折二錢遂行長編紹聖三年七月三省言陕西路比年鐵錢益輕鈔價益重公私受弊詔相度措置講究利害曾布曰鈔價減則鐵錢重鹽課增商旅行人不食貴鹽未見其不可同上徽宗崇寧元年遊經奏自興鉛山場膽銅已收九十萬斤緣左坑有膽水膽土膽水侵銅工少利多其水有限膽土煎銅工多利少其土無窮通略五年中書省言諸路十監嵗鑄錢額以緡計者江州廣寧二十四萬池州永豐三十四萬饒州永平四十六萬建州豐國四十四萬凡一百三十萬皆以上供衡州熙寧二十萬舒州安國十萬陸州神泉十五萬鄂州寶泉十萬韶州永通八十三萬梧州元豐十八萬同上祖宗時內帑雖嵗收錢一百五萬而每年退却六十萬三年一郊又支一百萬赴三月是內帑每年才得十一萬六千餘緡而左帑約九十三萬三千餘緡也今嵗額止十五萬而𨽻封樁庫者半內帑者半左帑咸無焉是宜版曹之日困也朝野雜記坑冶太祖開寶三年上覽桂陽監嵗入白金數曰山澤之利雖多頗聞採納不易詔減舊額三分之一長編太宗至道二年有司言鳯州出銅扉定州出銀扉請置官掌其事上曰地不愛寶當與衆庶共之不許陜西轉運使奏成州金坑嵗不登望遣使按行更立新製詔曰捐金於山前聖之盛德惟寶惟榖舊史之格言朕緬慕太古之風不貴難得之貨何必言利徒以勦民其金坑並廢真宗祥符九年李傳言信州鉛山等處銅坑自咸平初興發商旅兢集官場嵗買五六萬斤採取既多其後止及二三百萬斤望酌中定額上曰嘗記咸平中陳恕以江南銅多請官少市未幾銅礦漸少迄今常不豐天地所欲皆貴濟用豈人心可料其增損耶國家産金之所六産銀之所四十有七産銅之所三十有六産鐵之所四十有七産鉛之所七産錫之所一水銀朱硃之所一此舊制為然後增罷不止此仁宗慶厯三年詔曰議者多言天下茶鹽礬銀坑冶之有遺利朕懼開掊克之政常抑而弗宣然尚慮有過取而傷民者轉運司其諭所部官吏條上利害以聞並長編髙宗紹興十四年戶部奏禁止妄告坑冶之法上曰寧於國計有損不可有害於民若富藏於民猶外府也聖政孝宗以饒州貢金千兩民力不支遂減十分之七以蘇一部之民饒州貢金記乾道六年劉焞奏蜀中毁錢以為銅而乃欲𣙜其銅以鑄錢上曰如此豈可聖政銅禁太祖開寶元年詔曰舊禁銅錢無出化外乃聞沿邊縱弛不復檢察自今五貫以下其罪死五年禁民鑄錢為佛像浮屠及人物之無用者上慮愚民多毁農器以徼福故禁之並聖政神宗時王安石用政始罷銅禁姦民日銷錢為器邊防海舶不復討錢之出故中國錢日耗而西北邊皆山積文定墓志髙宗紹興四年十二月王僎言江浙之間巧偽有素銷毁錢寶一兩所費不過十數錢器成之日即市百金姦民兢利靡所不鑄乞申嚴銅禁長編二十八年上曰前日共遵論鑄錢頗有可採於是有旨出御府銅器千餘件付外銷毁聖政孝宗乾道六年詔淮安使人來往並令篙稍結罪船載錢寶一文以上過界流配聖政孝宗曰朕以禁銅器事刻之記事版每京尹上任則示之同上寧宗慶元三年復禁銅器民間舊有者限兩月赴官投賣以錢酬之再限不復酬錢違許人告湖州舊鬻鏡至是官自鑄之雜記偶句滲漏之法罪及主史紹興之制也銅器之禁刻之事版淳熙之制也禁將見錢入化外則行於開寶之六年禁載見錢出外國則見於淳化之元年限民間銅器一月送官給價者興國之詔也出御府銅器千餘付外銷毁者紹興之詔也名臣奏議除錢禁之弊神宗熙寧八年張方平論錢禁曰錢者國之重利用之所給生民衣食之所資有天下者以此制人應變立萬資之本故錢者人君之大權御世之神物也自熙寧七年頒行新敕刪去舊條例除錢禁以此邊關重車而出海舶飽載而回錢本中國寶貨今乃與四夷共用又自廢罷銅禁民間銷毁無復可辨銷鎔十錢得精銅一兩造作器物獲利五倍如此遂州置爐每爐增課是猶畎澮之益供尾閭之泄也錢不宣泄哲宗元祐三年蘇轍言自熙寧以前民間兩稅皆用米麥布帛雖有沿納諸色雜錢然皆以榖帛拆納蓋未常納錢也錢之入官者惟有茶酒稅雜料而已自熙寧以來民間出錢免役又出長平役錢官庫之錢貫朽而不可校民間官錢搜索殆盡朝廷近日雖已減損常平放免役錢使民休息然而錢積於官無宣泄之道民無見錢百物益賤併三監髙宗紹興元年李擢言國初得唐乾元中所置饒州永平監鑄錢舊基因之嵗鑄錢四十六萬餘緡逮至道咸平間又置池州永豐江州廣寧建州豐國三監計所鑄又總八十六萬緡計一嵗上供京師者三百十餘萬緡艱難以來侵成廢壞紹興元年遂以廣寧永豐并歸虔饒提點兩司使之分認嵗額之數二年又罷豐國今虔司與福建運司各立嵗額臣嘗取虔饒兩司嵗供之數考之兩司所報元年嵗額鼓鑄至少方國家多事之時用度不資鼓鑄之利曽不及往時十之二三而差官置吏尚仍前日徒費廪祿甚可惜也産銅莫盛於東南寧宗嘉定十四年臣僚奏産銅之地莫盛於東南如括蒼之銅廊南弄直潢澳九峰長技殿山爐頭小莊等處諸暨之天富永嘉之湖溪信上之羅銅浦城之因漿尤溪之安仁社唐江南子坑五十餘所多係銀銅共産悉皆坑源興盛昔年充礦出坑動是為斤數萬大場月解淨銅萬計小場不下數千銀各不下千兩為利甚博至若雙瑞西瑞十二岩之坑每月出銀繁浣大定永興等場銀鉛並産興盛日見又信之鉛山與處之銅廊皆有膽水春夏以釘投之銅色立變偶句當三鑄於崇寧鄭戬實啓之折二行於熙寧皮弼曽言之置監鑄錢樊若水興國之奏也曾監鑄錢張齊賢咸平之請也錢禁之除錢出界外張方平言之銅禁既開錢多為器沈存忠言之諸儒至論古今用錢不同葉正則曰古者因物權之以錢三代之世用錢至少民有常業一家之用皆因其力以自致其待錢而具者無幾如李悝平糴法計名一嵗用錢只一千以上已為多矣後世百物皆由錢起銖兩多少貴賤輕重皆由錢而制上自朝廷之運用下至民間輸貢州縣委藏商賈貿易皆主於錢故用錢百倍于前三代各斷其國以自治故書曰惟土物愛其用錢安得不少後世天下為一商賈往來南北互致錢安得不多古者以玉為服飾以龜為寶以金銀為幣錢只處其一漢宣元以後金幣始盡王莽欲復古制分三等幣後不復行東漢以後佛老之教盛行故金銀不復為幣反以為器用服玩之具故幣始専用錢今世富人既務藏錢而朝廷亦盡征天下錢入于王府已入者不使之出乃立楮於外以代之楮行而錢益少廢交子然後可使所藏之錢復出偶句單穆公言權之之術在乎有子而權母韓文公論救之之法貴乎重榖而輕錢章帝榖貴而賤錢張林有封錢勿出之言穆公錢重而貨輕於陵有以粟上供之論主意用實以用虛以實權虛易以虛用虛難幣虛物也錢則其實令其虛乎國家以東南半壁之天下依造幣以立國所恃已行於經久者以錢權之而以令行之也令不以實而以虛則民不我信不我從雖有泉流山積之錢且日滲日漏於冥冥之中實者已虛矣况欲權三尺之虛幣其何以行之哉今者國家之重實也當信之如四時不可朝更而暮改當執之如金石不可年行而復輟稱提兊使非無定䇿也漏泄坯銷非無明禁也然可以行于暫而不可以行于久可以行于賤而不可行于貴則牆壁之文特虛令耳以實權虛行之且不可况以虛用虛行之其可乎不貪則不神嘗謂頌魯褒錢神之論不若誦子罕不貪為寶之言褒之論役於彼之神也子罕之言守其在我之神也錢果非神乎無德而尊無勢而熱錢亦非不神也錢果神乎弗貪其利視如臭腐錢亦非果神乎錢之所以神者吾心之神汨矣彼之神行焉錢之所以不神者吾心之神淡矣彼之神窮焉神乎神乎當守吾心之神乎神亦於彼之神乎自其以錢為神也則囊金匱帛可以啓媚竈之私門賄賂苞苴可以開筮士之捷徑廉可使之而貪貧可使之而富賤可使之而貴榮可使之而辱貪濁鬼蜮流於世禍謂非錢之神可乎自其以此心為神也則金磈珠礫去其迷心之魑魅而義道德守其養心之靈龜富貴不能撓其清貧賤不能移其志貪叨不能易其亷珍竒不能奪其好名節與璧可質神明謂非此心之神可乎權重而權輕錢重則散之使輕錢輕則斂之使重此非陸贄之言乎民患輕則作重幣以行若不堪重則作輕以行之此非卓穆公之言乎愚嘗因二公之言而觀之則知錢之為用不能無輕重之異而所以制其輕重之宜者當有權以行乎其間也蓋物重錢輕則民用常見其不足物輕錢重則民用常見其有餘古人所以分為三品而有珠玉黃金白金之等别為九府而有金刀泉布之名而又為之立一市之平收滯貨之精惟欲均調裁一以歸之適中而已偶句變錢幣易重錢幣難錢者所以權物之輕重也幣者所以權錢之輕重也古者視錢為輕故錢雖少而用有餘後世倚錢太重故錢雖多而用不足警假當究耗財之端貴戚豪家竒玩珍器鑄就蟲魚之狀治成鳥獸之形威殺而無不至如之何而不坯銷也富商大賈巨艦長艘去資惟楫之功歸有金珠之利睨視而不敢呵如之何而不漏泄也且坯漏之禁特可行於下而不可行於上也毋怪夫坑冶一嵗之所輸不足以敵茶場一日之所造也內帑金銀出收舊楮特以權一時之宜今都城金銀又難其貨輦轂之下泉壅竟流如之何而兊便也二浙輔郡猶且折閲逺方外郡從可知之監司郡守強民而從一不從令籍沒其家是又無䇿之甚者如之何而稱提也是折閲之令徒知問之逺方而不知問之近地也毋怪夫操之而入一關之市曾不足少制百貨之低昻也毋啓貪財之念錢乎錢乎何足謂之神乎錢非不神也然能神於受賂之張武不能神於隂山之太守能神於銅山之鄧氏不能神於關西之夫子能神於金塢之董卓不能神於酌貪泉之刺史孰謂孔方子能移伯夷之清能動伊尹之一介不取乎至是則錢之神亦窮矣用權理財之宜以錢則廣鼓鑄也禁坯銷也嚴界外之漏泄而戢富民之窖藏也否則坑冶嵗額當權子母之勢更鑄大錢以助經費也以楮則嚴偽造也省兩界也入納純楮之令當信必也大軍純新之支當謹審也否則鬻爵有令姑為權宜之舉籍其進納以廣收楮也哉事證言輕重之由鼓鑄之事始於堯之歷山定於周之圜法漢初懲秦而鑄策錢及策錢輕而鑄八銖八銖重而鑄四銖或輕而三銖或重而半兩要皆不若武帝五銖之得中也故變於新室而光武復之罷於魏文而明帝復之其他若吳之十六銖既失之太重宋之荇葉又失之太輕皆不足言矣此非銖兩輕重之不同乎梁之四柱唐之乾封皆嘗以一當十吳之千錢隋之永通皆嘗以一當十成都嘗鑄直百乾元嘗當五十要皆不若元嘉當二之得中也故唐自肅代以後皆嘗以一而當二或以一而當三大抵經費不給則議鑄兵役不反則議鑄而非得已也古者以重錢為母輕錢為子故但以輕錢重錢而相權今日以實錢為母虛券為子故當以實錢虛劵而相濟虛之與實權然後知言治鑄之咎景王欲鑄大錢穆公謂絶民用而實王府猶塞川源為潢汚於是有母權子子權母之説文帝令民放鑄誼則謂事有召禍而法有起姦於是有行七福退博禍之説東都患貨輕錢薄陶則謂良苗盡杼抽空就使隂陽為炭萬物為銅砂礫化南金瓦石變和玉亦不能用於是有後治鑄之説三子之論不同其識太公圜法之意一也鑄錢不若昔我朝國初嵗鑄僅七萬緡而國用不匱元豐嵗至六百萬增二使領之則置景福殿庫以圖幽燕置元豐庫以偹非常非以奉己私也中興而後泉府之入侵減於舊永平一監嵗鑄十五萬爾近稍增至十六萬而鉛銅鐵炭之所入官吏兵工雜費之所出率以本錢三百餘萬而得十六萬比比年淮之鐵蜀之銅湖襄之若錫若鉛皆不復至地寶既愛膽力亦簿三百萬之本其半已無從出矣則十六萬之入安保其不虧哉收鐵錢可釋疑仁宗朝呂湜言陜西鐵錢不便百姓疑不肯用市多閉肆文彥博出其家縑帛數百匹納其直盡以鐵錢衆知鐵錢不廢市肆復安今獨不可祖故置耶時政錢少而楮多今日之財也夫農無數月之儲京師無百萬之積倍數之印造不足以供一嵗經費之需一嵗之鼓鑄不足以當一日印造之直楮之多日以輕錢之少日以耗嚴銅禁而禁私藏戢輕銷而防滲漏豈無明文竟成虛語通都大邑氣象蕭條貫陌之低昻不定物價之騰踴安窮空劵交馳一孔莫售則夫飛錢之令本以便民者今則反以病民矣徐貴午錢貴而楮賤愚願皇上寡欲清心以道御物不作無益而害有益不以可樂而忘可憂嬖幸錫豫之費一切省之神仙祠觀之請一切斥之上有好者下有甚焉儉朴之風行奢靡之習銷然後錢之為用也逸矣夫錢之為用也勞則耗而少錢之為用也逸則積而多錢少則錢貴而楮賤錢多則錢不貴而楮不賤此錢楮之説也姦臣顧乃內奉宫掖奢麗之欲以蠱人君之心外矜理財富裕之名以釋人君之憂奢而能富天下豈有是理哉心為錢所奪今日士大夫以吾心之所可貴者反自賤之是雖輦載之厚稇積之多謂之錢愚可也神惡乎在吾心之所可重者忍自輕之是雖銅山之積地土之流謂之錢虜可也神惡乎有此心之所可珍者甘自棄之是雖有通神之靈役鬼之物謂之錢僻可也神其果若是哉吁錢不自神人自愚爾法因錢而厲端平易楮幣空如枵不可復行矣端平履畝人怨入骨不可復議矣執事者思通變之䇿而歸咎於銅鏹之耗夫鏹耗誠當慮也販一錢可得數千百錢之貨海舶烏乎而不泄化一鏹可牟數十百鏹之嬴銷毁烏乎而不衆今法錢姦錢殽於閩之南江之西而京畿之內覿楮而不覿錢則耗之故也是可不為厲禁哉然羡魚而結網七年病而求三年艾則非救急之著也結尾防禁不可不嚴雖然今日生財之道不必求多於鼓鑄之利可也亦惟禁戢其銷耗疏剔其壅滯而已風帆浪舶錢虧於漏泄者多矣藝祖出界之禁當嚴也竒玩珍器錢壞於銷毁者多矣孝宗記事之版可刻也則消耗者有所禁矣山積於大官之家者非錢乎諭之以子文毁家紓國可也窖藏於富民之室者非錢乎諭之以卜式輸財佐邊可也則壅滯者有所疏剔矣何至創法新竒人皆皇惑至有如先正之所言者哉噫得一劉晏錢流地上則用江淮以濟中興將日月可兾矣執事毋以為迂用度不可不節雖然節用之説又今日第一議也先正有言節用非偶節一事便能有濟須事事裁節國家取財至今日極矣其用財至今日亦極矣無從泛用以傷財無務美觀以蠧財無圖竒功以竭財庶使其錢並行無偏壅之病則可保其往矣不然好大喜功雖鼓鑄告緡無益於虛耗之幣世德不繼雖改鑄大錢無補於西周之弱是不可不深長思也幸執事以復於上羣書會元截江網卷十一
