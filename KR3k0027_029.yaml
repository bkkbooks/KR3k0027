body:
  text: 羣書㑹元截江網卷二十九諸史事實源流太史公司馬談史記父作而子遷述之紬金匱石室之書上自唐虞下迄於漢軼材博識為史臣首勒成一家世號實錄武帝惡其直筆刋落其書嗚呼亦甚矣公議之在天下抑則揚塞則决窮則通縱則削一史官之書安能盡捉天下之筆乎班固東漢人承父班彪家學作漢實錄成一代之良史然排死節否正直而不叙殺身成仁之美則輕仁義賤死節人以此少之陳壽字承祚任蜀為令史蜀亡晉武帝除著作郎撰三國志皆依違其事反抑先主之長而言武侯之短人以是薄之貞觀中太宗敕房𤣥齡禇遂良重加脩撰東西二史又奏取許敬宗來濟上官儀等八人分叙至於宣武王陸四賛獨稱制蓋太宗親撰也蓋晉書多採語林世說幽明搜神之言詼諧鬼怪之事終見嗤於君子矣李延壽唐人貞觀中直國史先是宋齊梁陳魏齊周隋各有國史南北異方互相詆毁延壽父太師思所以改正事未成而卒延壽乃續成父業為南北二史南起宋終陳北起魏迄隋合一百八十篇其君臣統例紀傳群分皆以類植亦近代之佳史也唐魏徴奉勅脩隋史八十五卷初開皇時王邵為八十卷編年紀傳並闕太宗勅顔師古孔頴達等共傳隋書五十五卷梁齊周隋並未有書仍命學士分脩使魏徴總之又詔于志寧李延壽等同撰志書合為五代史志云唐史記志表本朝歐陽脩所作其傳宋祁所作也通二百二十五卷歐公自成一代典則國朝太祖開寶中盧多遜扈蒙等脩五代史史成而褒貶失實仁宗命歐公脩之其立例皆褒貶之意其紀傳年表志考凢七十四卷國朝司馬光文章雄贍學力老成集衆史而為資治通鑑斷自威烈迄於五代紀例考㨿褒貶之意治亂存亡得失之由暸然明白豈區區者所可及哉文公朱熹謂通鑑編年之體近古因就䋲以䇿牘之法以綱提其要以目紀其詳綱倣春秋而兼採羣史之長目倣左氏而稽合諸儒之粹褒貶大義凛乎烈日秋霜而繁簡相發乂足為史家之矩範也主意作史所貴者三秉史筆其難事乎君子不患無其才患無其節不患無其節患無其道夫竒瑰宏博之士挺挺出頭角易氛掀天地學諳識通古今斯人也使之執簡濡毫汗青揮墨則品章條貫分有倫類編摩極品藻之功毁譽明是非之鑒若是者可謂有良史之才矣抑尤末矣吾將觀節焉每飾主缺多為時諱吾不與也持公議之權衡無私意之牽掣非為請米而作好傳非為受金而諛盛徳慷慨立意操志不回正色直書寧得罪於一時而無寧得罪於萬世之清議若然者可謂有良史之節矣抑尤末也吾將觀道焉惟精惟一堯舜之心傳也非知道者其誰錄建中建極湯武之心學也非知道者其誰紀向非百篇之議裁之以道則堯帥諸侯朝舜瞽瞍亦北面而朝之之事將不為齊東野人之所誣乎啟與益之始終將不為小說異書之所誣乎伊尹與太甲之顛末得不為汲冢竹書之所誣乎是以作史貴知道知道則不好同不喜異而能知聖君賢臣之用心矣叅究諸史有二以世變之升降而較史筆之髙下不若以學力之淺深而論史筆之髙下以世代之久近而較史筆之難易不若以心術之公私而論史筆之難易自道而節自節而才時有隆汚而史亦與之隆汚治有粹駁則史亦隨之而粹駁此以世變而論史也君子則曰隻字權衡萬世標的秉史筆者當以學之淺深論不可以世之升降論使其學而果造之深歟則寫聖賢之心以其道快世敎之立以其節紀事物之繁以其才顧所失何如爾否則望道未見何以載道寸節未臣何以達節小才不能以大受又何足以言才以若人而任紀述之責吾未見其能傳逺垂後也史云世變云乎哉久近世殊繁簡事異世逺而事繁則直致其辭者雖易而旁括其事者實難世近而事簡則婉寓其意者雖難而盡紀其詳者實易此易世代而論史也君子則曰一編紀錄千載雌黄任史責者當以心之公私論不當以世之久近論使其心而果純乎公歟則有書時事而人不以為嫌微褒貶而已不以為怍繁者不見其為冗而簡者不病其為畧顧所用何若爾否則惴惴於恩怨則閣筆不敢書凛凛於禍福則歛手不敢措利害未免怵於巳而榮辱豈能加諸人以若人而膺記載之任未見其能發㣲闡幽也史云史云世代云乎哉稽古偉議孔子直筆明道時至衰周董狐不作南史寂寥直筆之不見於世久矣畏天刑歟怵人禍歟為利回而為義疚歟曰可嘆也愚聞之曰公者道之衡作史而出於公則述其所難者終必易私者疑之府作史而出於私則述其所易者終必難春秋夫子作也夫子非春秋人乎趙孟之强也而書之以及陽虎之暴也而斥之以盗列國之君大夫之貴也而或黜其爵或貶其族或削其氏魑魅神奸昭昭神禹之鼎而不得遁其形夫子亦立招禍之的矣然而趙孟不能加陽虎不能害列國之君大夫不能屈夫子何以得此於人哉公也說者謂其危行言孫以避當時之害非也孫則不公矣而何以為春秋韓愈不任史責昌黎韓愈唐文傑也史筆之任在愈可以無愧河東柳子厚中山劉夢得作書勉之愈乃牢辭固避謂不有人禍必有天刑其意以為在左氏有失明之報子長有蚕室之寃孟堅瘦死范曄族誅陳壽廢卒鑿齒虧體人禍天刑職此之由愚度其意正不為此愈自為唐朝第一等人危言鯁論頗為當時取信一經筆削片言隻字少有疵纇則受金乞米之誣從此而得而百世之誚不可逃矣若欲以文取名耶雖不作文公議猶不我揜也若欲公褒貶申直道耶郡國所上起居所記已失於顧望十羊九牧甲可乙否復病於監臨雖欲公褒貶申直道有不可得也愈之牢辭固避意或在此如其人禍天刑是謂愈必不然矣偶句知我罪我付之萬世之公人禍天刑忘其一身之計不敢以情蔽法不敢以恩揜義不敢以好惡亂是非不敢以愛憎紊曲直誰毁誰譽直道而行峩冠蘭臺或筆或削㨿理而定紬書金匱受名者以史筆為榮知道者以史筆為權誅奸諛於旣往瑶編汗簡萃聚儒臣發潜徳之幽光璧府珠凾搜輯鉅典警段世降而乏史才帝王盛典為史者非無節也特不以節著耳非無才也特不以才顯耳渾渾然相忘於道術之中而節與才何事焉春秋以來世變下矣南史之書崔子董狐之書趙盾萬世以下猶有生氣直哉史魚夫子且喜稱而樂道之嗚呼此豈士君子之所願哉長江東流日夜無聲忽過瞿塘􅗷澦乃始大鳴以泄其怒故君子願史筆渾渾如帝王之世不願史筆諤諤如春秋之世也道徳薄風俗漓守節之士又不見得見有才者斯可矣司馬遷易編年為紀傳左丘明之後魁然史臣亦巨擘也上自黄帝迨於漢武上下數千百載聞斯亦已勤矣然先黄老而後六經則非道也退處士而進奸雄則非節也探其辨而不華削而不卑其文直其事核不虗美不隱惡謂非有史才則不可然甚為踈畧或相牴牾所以並史遷之才者有三焉意氣憤欝之餘故其文多悲怨登覧遊觀所至故其文多豪放多愛不忍之習故其文多好竒至若其踈畧牴牾之細者非可以一二枚舉也豈容採星宿而遺羲娥哉擅火長者在學切嘗觀之二典並陳三謨品列危微精一發揮堯舜之精神都俞吁咈模冩禹臯之氣象非史之純於道者乎史魚秉直董孤竭忠如矢之稱不以道之有無易其守執簡而筆不以身之生死異其心非史之出於節者乎太史公父子網羅故聞收拾舊典紀傳所載歴叙古今之詳八書所包典盡三才之奥非史之出於才者乎然道也節也才也要自學中來也虞廷史臣親見聖人而師之學足以造道故其書亦純乎道史董二子習聞君子之遺論學足以守節故其書亦狥乎節太史公紬繹石室金匱之藏所學雖博而未能造其深故其書止於才嗚呼使史董而獲立於虞廷得聖人之要上則典謨亦豈多遜使太史公而尚生於春秋揖故家之遺風則死節何敢力排生乎秦漢之後而欲效顰於典謨之書道與節不足而僅局於才果世變之使然乎抑學力之不足乎史筆所患凢四秉史筆者其患有四拘於時則有所諱而不得騁拘於才則有所窮而不得騁拘於私則有所蔽而不得騁拘於衆則有所制而不得騁此四患也何謂拘於時且君非勛華臣非稷契賞刑垢玩事業堙蕪上下顧惜觀察意㫖深言之訕上淺言之誣下當此之時不能直筆猶曰史焉故班固漢史每飾主闕華嶠晉書多為時諱若是則有所諱而不騁也何謂拘其才且學昧衆流識蔽小道文不逮意意不逮理淺則入俚簡則近陋偏見僻説不足以發吾惡奚可云史故魏室之書紀事囘流唐世之史猥釀不網若是則有所窮而不得逞也下是則愈不足矣拘於私者死黨背公挾忮怨上没美任怨隱惡而恩得米則為好傳受金則比伊周借一時之史筆逞平昔之私志故陳壽蜀志深誚諸葛李漢順錄力抵吉甫兹非有所蔽而不得騁乎拘於衆言上下牽制權不在巳持見疑異閣筆相視甲可乙否含毫不斷事蹟所陳往往湮没故知㡬憤於十羊九牧韓愈卒於竄定不全兹非有所牽而不得騁乎掃去四惡而史臣之直筆見矣時政講筵留神史學國家列聖相承講學是務惟經與史究心不忘聖天子仰尊家法俯逮講筵凢前代治亂興亡之迹史編之具陳者旣已講貫而無遺矣嘗觀唐穆宗一旦經史何先之問薛放區别而為之對且云史以見古今成敗之迹誠學之亦當有補於理故我祖宗以来講求史學尤不敢倦藝祖皇帝讀漢書見張釋之于定國治獄遂激勵其臣以金紫之服髙宗皇帝讀漢武紀以為有益中興之治因書不若思之為愈藝祖肇造髙宗中興之業厥今國歩漸平世運將㤗是可不留意於學乎抑是可不資史學以濟其功業乎惟史足以見古今成敗惟史足以究政事是非亦惟史足以驗君相得失留神玩閱刻意講求参已往設施之方圖方來經濟之業是職有資於史也士子請明史學我宋文治興隆人才軰出皆由潛心玩學而得之而學之稱為該博者必於史學而無遺也况是歴代以來史編浩瀚雖汗牛充棟不足以盡其篇也雖焚膏繼晷不足以窮其指要也父兄之訓誨師友之漸磨亦惟曰稽古獲印綬耳亦惟曰業精於勤荒於嬉耳方今槐黄之期又廹汗青之史難精有司校文論則取其理致䇿則取其器識茍史籍之徒富而史學之未充則所謂理致器識者于何而出之聖天子嘉與多士成其才大比賔興群才鏖戰預期真實以副選論為多士者誠能富文史之學以應文衡之選不事虚文惟求實用則維今已往必有能讀三墳五典八索九邱者以偹時才之需雖以史學而任史職可也以史學養史才方今史館儲英儒紳進用編摩國家之鉅典敡勵祖宗之偉績將以傳之無窮垂之罔極且與天地相為長久也惟兹職任之重必非謭才所能堪事業之宏必非淺學所能稱才學如司馬子長而後以史顯名才學如班孟堅而後以史得譽家傳其學也脩其業父作而子述以談為父而遷為之子彪為父而固為之子富於見聞熟於講究而後史筆有足觀者是以古人稱作史之難上焉者取其道中焉者取其節下焉者取其才而是三者又皆根原於學之之素充則一旦進列史筆之任以道以節以才而自見作史之長不在班馬之下矣史官之難其人如此哉法祖嘉猷國家崇尚史學國朝文明開運學校養才羣經諸史朝吟暮誦至於明習國典通達世務則於史學尤重焉先正司馬温公文行俱美史學尤當嘗奉英宗皇帝之命㑹粹千有餘年之事名曰資治通鑑一書始於威烈王終於五代綱舉條載詳而不繁簡而不遺真史學之指南也進開睿覧寵錫序文宸章耀日月之輝史筆冠古今之藉夫何中更章蔡之黨倡為詆毁之議史學㡬廢也邪説得行尚賴道由天錫書以序存殆猶六經厄於秦火而易以卜筮僅存也自時厥後學經者取其理致學者取其器識至慶元間經學固盛史學亦崇不事浮虚惟取練達學有體用非崇體而廢用也道有本末非舉本而遺末也作成俊秀之才皆為帝碩之彦仰視唐人以三史取士漢史並列於六經而傳習之儒見稱為九經庫者無以異為也史學之不可廢也如是夫文公通鑑綱目自麟經絶筆史法之褒貶不明久矣至紫陽朱犬子出始取温公之通鑑而為綱目一書則規圓矩方䋲直凖正始一倣乎春秋自今觀之原廟以立書五帝以始郊書無他故焉春秋嘗書立賜宫矣嘗書辛丑用郊矣皆所以譏其失禮也原廟之立文過不經五帝之祠矯誣瀆禮我是用㡬以立焬宫辛丑用郊之書法有年之書於蕭梁後唐大有年之書於永平貞觀開元是無他故焉春秋嘗書有年於威公矣嘗書大有年於宣公矣皆所以著歡欣生於不足矣蕭梁後唐先此之無年也永平貞觀開元後此之無年多矣我用是紀成宣之有年大有年之書法凡若此類悉法春秋吾知綱目一書皆文公史筆之追聖經者也偶句欲心一動直道難行懽心一萌曲筆㨗出毁譽任情而是非瞀亂褒貶狥世而曲直混殽知富貴之可慕而不知名檢之當畏知權勢之可恐而不知鬼神之難欺知一時褒貶之用情而不知天下萬世清議之不我恕論史貴乎㑹意善作史者必妙其意善論史者不拘其例不以例拘之而以意㑹之不失古人述作之㫖矣夫史之例固不一而其例之大者有二曰編年也紀傳也麟經絶筆遷固易編年而紀不虚美不隱惡不詭激不抑抗二子誠有良史之才而勢利之崇貧賤之羞輕仁義賤守節或出於有激而言或出於有為而發識者當以意觀而文中子乃以陳壽紀傳之失自遷固始是特以編年之例拘之而不以意㑹也伯夷之首於列傳韓非之同於老莊褒所當褒貶所當貶公是公非同乎古人是正得聖人之意而綴是道之綱豈容徒以例拘之而不以意求之乎觀史當識聖人之筆事記於史官之筆者可以史言事出於聖人之手者不可以史論合古今之史而論之温純如左氏簡㓗如子長雄徤如孟堅是固作史之巨擘也然其才氣之所充規模之所就特未離乎史筆也至於正軌範以立百王之經示褒貶以代一王之法筆削之妙如化工焉其可以作史者例論耶書者古史也帝王之軌範政事之權輿所從出也聖人又從而定之芟繁亂剪浮辭斷自唐虞而訖於周然後大經大法曉然而易遵坦然而易行然則書也者非聖人莫能定也春秋者魯史記之名也君臣父子之大經禮樂征伐之事所由記也聖人從而脩之抑諸侯而尊王室即十二公之行事見於二百四十二年之間而後善人勸焉滛人懼焉然則春秋也者非聖人莫能偹也是故不觀諸史無以見聖人之言如夭之不可階而升也不質諸聖無以見作史者各隨其量而有得獨至於春秋一經刋定於聖人之手萬世而下不能加毫末於斯矣談經不可不知史學者談經術之用不可不知史自春秋而下以史才名者莫善遷固遷之得也辨而不華質而不俚固之得也贍而不蔚詳而有體雖其能純可取尚有瑕疵於其間然良史之稱春秋以來屈指於二子矣愚嘗差次諸史而為評曰春秋之經其文則史其義則丘取矣夫子未易及也遷自知其才不逮聖人易編年而為紀傳固因之是二子初不敢以春秋自擬也吾固不敢䋲以春秋下乎春秋凡皆史也然則何敢望遷固愚從而評之曰遷固之史可與左邱明鴈行可使范曄北面可使陳壽作衙官晉史而下又可以奴僕命之也蓋左氏之傳其文緩其㫖逺炳然有三代之風而班馬二史之雄深雅徤似亦少减然猶可與之鴈行范曄述東漢標格於卑陋文采不足以動嘗自謂其博贍不及班固則於遷可知矣以是知其可使之北面陳壽志三國義例舛駁挍其書而譏之者十居八九以是知其可使之作衙官下至於二晉所紀南北所載則又皆誕謾詭恠其言有類滛巫瞽史自遷固視之雖以奴僕焉可知矣嗚呼作史之難一至於此如遷之書正未可以多得凢愚之所取者非愚之私言也前人之公言也遷固僅得作史之法六經之外則有史焉史之作則有法焉何以言之虞夏之書渾渾爾商書灝灝爾周書噩噩爾此典謨訓誥誓命之法也其書也為經微而顯熹而晦婉而成章盡而不汚懲惡而勸善此春秋之法也其書也亦為經變為春秋編年而為紀傳遷固之史法也辨而不華質而不俚贍而不蔚詳而有體亦莫有一家之法焉遷固而不足論矣欲論前史之優劣必與遷固而有取要之作史者必世其家然後義例有㨿故遷史之書實終父功班史之書亦繼彪之業不無所自來也結尾史亦難於求全雖然六經者先王陳迹而史籍又六經陳迹也誠以成敗大計褒貶大法姑存此以為後世龜鑑耳片言隻字寧免無疵以孟子之於經冝其深信之也然而詩則曰不以文害辭而已其於武成取其二三䇿而已又曰盡信書不如無書誠以六經者先王之陳迹學者當即以求意可也况於史籍又可吹毛求疵乎後世有紏繆之過苛者如王道謂史之失自遷固始而不知奴婢之譏正自不免宜古人發嘆於典論史筆惟公則信嗚呼蓬萊道山地之清也册府芸香職至華也搜閱金匱石室之珍儲討論鸞臺鳯閣之故實儒生之至榮遇也夫茍一私纒縳百事顧畏閤筆含毫不斷頭白有期汗青無日居是職者亦有靦面目矣愚嘗愛孫盛作晉春秋質以大司馬之威而不變吳競撰唐史勒以宰相之私而不改禇遂良之是非必紀魏謩之善惡必錄雖以天子臨之而不失其職古人與稽若此數子者可矣不然為爾寂寂鄧禹笑人而奚暇於訾遷羣書㑹元截江網卷二十九
