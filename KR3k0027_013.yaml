body:
  text: 羣書㑹元截江網卷十三郡國兵禁軍土軍廂軍附東南兵邉兵厯代事實秦始皇分天下為三十六郡郡置守尉監掌佐守典武職甲卒即材官之屬漢興髙祖踵秦而置材官於郡國漢刑法志髙祖命天下選能引關蹶張材力武猛者以為輕車騎士材官樓船以秋後講𨽻課試各有員數平地用車騎山阻用材官水泉用樓船漢官儀十一年淮南王布反發上郡北地隴西車騎巴蜀材官及中尉卒三萬人軍霸上本紀漢初則以羽檄召兵于郡國至於孝文則以銅虎符羽檄者以木簡為書長尺二寸以召其有急則以鳥羽插之以示疾速髙祖十年注武帝元鼎六年發隴西天水安定騎士及中尉河內率十萬人征西羌平之本紀許嘉反卜式曰臣願與子男及臨黃習弩博昌習船者請行死之以盡臣節本傳時東越數反覆朱買臣因言故越王居保泉山一人守險千人不得上今聞東越王更涉處南行去泉山五百里居大澤中今發兵浮海直指泉山陳舟列兵席捲南行可破滅也上拜買臣㑹稽守詔今到郡治樓船備邉糧食水戰具本傳昭帝元鳯五年發三輔及郡國惡少年吏有吉劾亡者屯遼東本紀宣帝本始二年大發興調關東輕車鋭卒選郡國吏三百石伉健習騎射者皆從軍本紀光武以幽冀兵定天下始于黎陽兵營領兵騎常千人以謁者監之號黎陽兵建武六年欲罷郡國都尉并職太守無都試之役本紀唐髙祖武德初始置軍府折關中為十二道以驃騎車騎兩將軍領之太宗貞觀十年更號統軍為折衝都尉列將果毅都尉諸府總曰折衝府凡天下十道關中道置府一百七十三河南道置府凡六十二河東道置府百三十九河北道置府十四山南道置府凡十隴右道置府二十九淮南道置府凡六江南道置府凡一劔南道置府凡十嶺南道置府凡二右十道凡置府五百六十四皆有名號而關中府皆以𨽻諸衛凡府三等兵千二百人為上千人為中八百人為下府置折衝都尉又左右果毅都尉各一人長吏兵馬列將各一人校尉六人士以三百人為團團有校尉五十人為隊隊有正十人為火火有長唐凡發兵皆下符契州刺史與折衝勘契乃發若泉府發則折衝都尉皆行不盡則果毅行少則列將行兵制偶句材官騎士布滿郡國漢之制也折衝諸府散列諸道唐之制也漢光武罷郡國材官故郡邑有變至發禁兵晉武帝悉去州郡兵故羣盜並起州郡無偹漢之初有都尉以處郡國都尉廢則倚京師之兵京師又不振而州牧之兵盛矣唐之初有府衛以控諸道府衛廢則立射騎之制射騎又復變而籓鎮之勢强矣漢置州牧外郡之兵及其盛也而漢室以衰唐以方鎮諸道之兵及其强也而唐室以弱漢髙之興則使韓信以發燕趙之徑兵光武之興則使吳漢以起漁陽之突騎備胡則上郡隴西事越則㑹稽豫章擊朝鮮則齊遼東開西南夷則巴蜀頴川諸郡多材官隴西諸郡多騎士西北之地多輕車東南之地多樓船調兵郡國虎符召遣所以防奸也調兵府衛魚書契合所以示信也真卿為平原太守而增陴浚隍寇恂為河內太守而講兵肆射募教騎士數月咸精器用全鋭威振北土而太原之兵非復前日之衰單此馬燧之功也籍丁習射親按能否繕甲淬兵遂雄山東而澤潞之兵非復前日之雕刓此李抱真之計也料澤州兵廢遣猛耄築城奪險逺民乃安而川蜀之兵非復前日之怯弱此李德裕之能也皇朝事實國朝以備戰衛為禁衛軍以給徒役為廂軍各𨽻其州之本城內總于侍衛司而尚書兵部掌其政令因事立名者各𨽻於其部又以廂軍教閲者號為廂禁軍後皆以為下禁軍其給使于諸司者亦各以其事役寓焉王銍兵制叙逐州置軍招營兵大郡有十數指揮中郡有五七指揮小郡不下三五指揮每指揮率以四五百人為額其軍儲餉給悉在運司其統制軍馬乃𨽻守倅一方有盜寇不虞州郡有兵有財足以聚人牽衆屏翰王室平時除戎器備城隍講武事皆有其資此乃祖宗待州郡深意蔡氏官制逐縣置尉専捕盜賊濟以縣巡檢之兵不足則㑹數州巡檢使之兵又不足則資之守臣兼提舉兵甲賊盜公事與一路帥臣兼兵馬鈐轄者故兵威强盛鼠偷草竊尋即除蕩蓋內外相維上下相制若臂運指如尾應中靡不相資也同上仁宗康定元年㨂諸路罕城及强盜惡賊配軍年未四十壯健者𨽻禁軍長編神宗熙寧間西北各分路置將有正副將兵有係將有不係將以五千一百人為一將元豐四年東南置十二將團結諸州軍馬熙寧四年提㸃開封府界提㸃諸縣鎮司言諸縣兵級弓手有武藝積者遇按月請如保甲量給賞從之四年下諸路轉運司以州大小髙下為序始自某州為第一指揮差次至某州凡為若干指揮每指揮毋過五百人河北曰崇勝河東曰雄猛陜西曰保寧京東曰奉化京西曰徑武淮南曰寧淮兩浙曰崇節江南曰效勇荆湖曰宣節福建曰保節廣南曰清化州陜西路曰克寧總天下廂兵馬步指揮凡八百四十其為兵凡二十二萬七千六百二十七人而府界及諸司或因事兵之額不與焉長編孝宗淳熙二年江西安撫司檢凖指揮將諸路州軍係將不係將禁軍十分為率取五分専一教習將官㸃檢上曰諸路㨂中禁軍土軍之手須常令教閲責在守臣如有違戾當坐其罪聖政偶句太祖朝諸州兵赴賀州必遣使臣而從發真宗朝諸州兵赴秦州必詔密院而後發定州之兵嘗橫矣至韓琦而後精延州之兵嘗弱矣至趙卨而後練馬知節監博州而繕城治械范仲淹知延州而選將閲兵諸州長吏閲所部兵此建隆二年之令也諸路教閲責在守臣此淳熙二年之法也東南兵厯代事實殷髙宗撻彼殷武奮伐荆楚罙入其阻裒荆之旅殷武周宣王命召公平淮夷江漢浮浮武夫滔滔江漢詩越王勾踐發習流二千教士四萬人君子六千人諸御千人伐吳吳師敗當是越兵橫行江漢東諸侯畢賀號稱霸王史本傳秦二世元年陳勝起項梁曰方今天亡秦時吳有竒士元楚獨籍知之遂舉吳中兵范增說梁曰秦滅六國楚最無罪自懷王入秦不返楚人憐之今君起江東楚蜂起之將皆爭附君者以君世世楚將為能復立楚後也於是立楚懷王孫心從民望也本傳粵王無諸以閩中兵共滅秦漢廬江郡有樓船官南郡有發弩官並地理志番君吳芮以百粵之兵佐諸侯李陵武帝召見武臺陵自請曰臣所將屯邉者皆荆楚勇士竒才劍客也力扼虎射命中願得自當一隊到蘭千山南以分單于兵本傳建元三年遣嚴助發㑹稽兵擊南越救東本傳宣帝神爵元年發越騎淮揚材官詣金城本紀三國孫策說袁術曰家有舊恩在江東願因投本土召募可得兵以佐定天下術乃許之策將兵千餘人行收兵比至厯陽衆五六千進攻橫江當利皆拔之策渡江轉鬪所向皆破莫敢當其鋒者旬日之間四靣雲集得見兵二萬威震江東通鑑魏曹操自江陵將順流東下時周瑜至番陽魯肅勸權召瑜還瑜至謂權曰將軍割據江東兵精足用當橫行天下為漢家除殘去穢况操自送死而可迎之耶請將軍籌之瑜得精兵數萬人進往夏口保為將軍破之通鑑謝𤣥鎮廣陵募驍勇士戰無不捷號曰北府兵敵人畏之祖逖屯淮隂起冶鑄兵得二千餘人而後進元溫統步騎四萬發江陵水軍自襄陽入均口至南鄉步兵自浙川以征關中宋魏人南冦所遇郡縣赤地無餘江南白丁輕進易退所以敗也通鑑唐憲宗討劉闢未决李吉甫因言宣洪鄿鄂彊弩號天下精兵爭險地兵家所長請起其兵搗三峽之虛則賊勢必分首尾不救帝從之李吉甫傳李德裕請弩人浙西使習戰本傳吳元濟叛柳公綽遣鄂之兵付李訴莫不死戰所遇輒克本傳五代梁兵强于天下而吳人號為輕弱然師再舉擊吳輒再敗以死兵法固有以弱而勝强者顧吳豈足以知之哉豈非適當其機㑹耶五代梁臣傳楊行密起兵廬州號黑雲都其兵皆江淮人輕弱五代吳世家皇朝事實紹興五年祕書省正字李彌正言見存西北之兵嵗久銷减乞令州郡募東南民兵教習以壯國威萬一朝廷有警亦可募以調發上曰朕知南兵可用向有五百人皆平府人在張俊軍中往往率先犯陳其不可用者但未教習耳會要紹興七年趙鼎等因論南兵可教張守曰止是格尺不及耳上曰人猶馬也人之有力馬之能行者皆不在軀體之大小故兵無南北顧所以用之為如何耳申公巫臣通吳于上國遂伯諸侯項羽以江東弟子八千人橫行天下以至周瑜之敗曹操謝𤣥之破符堅皆南兵也聖政十年因論南方士馬可用後數日陳公輔奏對以南兵不可用為疑上慨然曰赤壁之捷曹操敗於周瑜淝水之戰苻堅敗於謝𤣥北人豈常勝哉越王勾踐卒敗吳王兵强諸國亦豈北方士馬耶同上孝宗淳熙十一年新均州葛祺論恢復及論東南兵可用上曰㑹稽八千人破秦在用之如何聖政偶句戴明寶募江南之快手李德裕請浙西之弩人李吉甫議討劉闢則發宣洪之兵以搗其虛栁公綽欲平元濟則遣鄂州之兵以挫其鋭南兵怯弱戰必不勝富公弼建言於慶厯浙民脆弱不間軍旅吕公祉獻議於紹興兵無南北顧所用之宋髙宗之訓也人無南北皆有可使陳公輔之言也論南兵可教者趙鼎之言也謂南兵可用者葛祺之議也謂南兵皆可用因李彌正而請也謂北兵豈常勝因陳公輔而發也邉兵厯代事實趙李牧選車得千三百乘選騎得萬三千匹百金之士五萬人射者十萬人多為竒陳破胸奴單于十餘年不敢近趙邉城史本傳秦欲攻胸奴斯諫不聽使蒙恬將兵攻胡却地千里以河為境暴兵露師十有餘年終不能踰河而北主父偃書始皇內興工作外攘夷狄收半千之賦發閭左之戍前食貨志漢更有三品有卒更有錢更有過更古者正卒無常人皆當迭為之一月一更是為卒更也貧者欲得顧更錢者次直者出錢顧之月二千是為錢更也天下人皆直戌邉三日亦名為更律所謂繇戍也雖丞相子亦在戌邉之調不可人人自行三日戍又行者當自戍三日不可往便還因便往一嵗一更諸不行者出錢三百入官官次給戍者是為過更也律說錢更者居也居更縣中五月乃更也後從衛尉律卒錢更一可休十一月也後遂改易有謫乃戍邉一嵗耳昭帝元鳯四年注文帝十四年丐奴入朝那蕭關殺北地都尉以周舍張武為將軍發車千乘十萬騎軍長安旁以備胡而拜盧卿寧遫周竈張相如董赤為將軍大發車騎往擊胡逐出塞後四年單于大入上郡雲中於是漢使三將軍軍屯北地代屯句注趙屯飛狐口緣邉亦各堅守以備胡胡騎入代句注邉𤇺火通於甘泉長安數月漢兵至邉胸奴亦逺塞漢兵亦罷胸奴傳武帝選將練兵約賫輕糧深入逺戍雖有克獲之功胡輒報之兵連禍結三十餘年中國罷耗西域傳嚴尢論宣帝地節三年詔曰朕既不德不能附逺是以邉境屯戍未息今復飾兵重屯久勞百姓非所以綏天下也其罷衛將軍左將軍屯兵本紀五鳳四年胸奴稱臣遣弟谷蠡王入侍以邉境亡冦减戍卒什三大司農中丞耿夀昌奏設常平倉以給北邉省轉漕本紀光武建武十二年遣杜茂將衆郡弛刑屯北邉築亭堠修烽燧本紀唐文宗李德裕徙劍南西川節度使自南詔入冦民無聊生德裕乃建籌邉樓按南道山川險要與蠻相入者圖之率户三百取一人使習戰貸物事緩則農急則戰謂之雄邉子弟其精兵曰南燕保義保惠兩河慕義左右連弩騎士曰飛皇鷙擊竒鋒流電霆聲突騎總十一軍於是二邉寢懼南詔請還所俘掠四千人本傳皇朝事實真宗景德元年陜西轉運使言簡集振武軍上曰當時河東兵不可减乃議立此軍尚慮簡閲未精朕詢于知兵及詳練邉事者皆云自立此軍邉聲頗振戎人畏憚不敢侵寇矣二年知鎮戎軍曹偉言邉民應募為弓箭手者皆習障塞蹊隧解羌胡語能寒苦有警可參互正兵為前鋒而官未嘗與器械資糧難責其死力請給以境內間田永蠲其租春秋耕斂出兵而護作之詔人給田二頃出甲士一人及三頃者出戰馬一匹設堡戍列部伍補指揮使以下校長有功勞者亦補軍都指揮使置巡檢以統之其後鄜延環慶徑原并河東州軍亦各募置並長編仁宗慶厯五年樞密韓琦言西路所駐兵十分中宜留六分在邉二分令東還二分徙近裏州軍逐路鈐轄一員駐泊都監二員與逐處知州同行訓練而本路仍領之非有事宜不得輒動其徙屯軍馬處知州才望輕者請選人代之又逐路所抽就糧上兵請委逐路帥臣相度嵗分兩畨留一畨在邉一畨放歸本處不唯减節邉上糧草兼使無久戍之勞同上神宗熙寧元年詔京東武衛四十二指揮並分𨽻河北都總管司六指揮𨽻大名府路三十六指揮分𨽻定州髙陽關兩路分畨往戍先是屯軍本備河北戍卒近嵗分屯諸路朝廷將减沿邉土兵以行三司餽餉故有是詔長編孝宗隆興二年興元統制彭果申大散關一𢃄邉靣係對境要衝止慮鳳州附近别無監司所管軍馬若不測敵人窺伺闕人應援利害非輕制置范成大言相度乞興州下都統司如鳳州不測緩急所有應援一節一靣將附近軍馬遣發却申制司照㑹聖政經傳格言道旁過者問行人行人但云㸃行頻或從十五北防河便至四十西營田去時里正與褁頭歸來頭白還戍邉杜甫兵車行名臣奏議東南郡募兵富弼上仁宗曰朝廷獨京東鄰河朔京西次關陜遂閲鄉民俾習武以代軍東南九道則不之有略引隋唐以來東南為寇者以明之隋劉元進起餘杭朱燮管崇起吳朱粲起譙郡寇宏起鄱陽肖鋭起羅縣唐桂林戍卒以龎勛為都頭掠湘潭海賊王郢江賊桞彥章各數萬魯景起連州黃岫起桂陽沈行收起邵陽其甚者則江西鍾傳廣南劉𨼆湖南馬裔福建王潮皆割據焉東南九道自古為冦淵藪王者能鎮撫之則寇不能生於其間不然則亂必矣臣欲乞九道擇要害十餘郡於本處募兵大郡五千小郡二三千每道置一都護經略之九道置一總管者居中以節制之如此則欲寇者知朝廷有備豈不憚耶東南有可用之兵陳公輔上髙宗兵政三說曰東南軍兵孱弱不可用然鎗杖手弓手之强勇者相得心力善用鎗牌利於步鬬今欲急令東南諸州起發見在鎗杖手等以備防秋之用韓世忠討湖南之寇選福建上四川之兵及諸營塞弓級以為用欲將禁兵更戍劉翬奏南人素號剽悍春秋吳楚之霸六朝晉宋之捷不聞資兵於他境取才於異代也今猶古也豈獨不可用哉特用之不得其術耳目今諸將之兵雖足戰守然國家飬兵額衆費大不應艱難之際使之坐食比年以來訓練不精士氣思奮臣欲望將諸路禁兵自逺及近更畨出役别立統帥不𨽻他營分屯險隘不當虜衝連營締壘張大形勢使之耳聞目見漸熟征戰秋出春歸不戀鄉土嵗月積久習以為常緩急調遣人情不震可以集事諸儒至論郡兵皆充厮役有禁軍有廂軍有土軍飽食於營狂逰於市老與壯相半也勇與怯相半也名𨽻尺籍身處㕓肆者十之三也公府之為從隊厮役者十之五也卒之堂然而陳填然而鼓奔則蹶負則喘迎刃而噎逢敵而走皆兵也蘇洵禁兵不如土兵今世之强兵莫如沿邉之土人而今世之惰兵莫如內郡之禁旅其名愈多其廪愈厚其才愈薄以實較之土兵一人其才力足以當禁軍三人禁軍一人其廪給足以贍土兵三人使禁兵萬人在邉其用不能當三千人而常耗三萬人之蓄以此推之則土兵可益而禁軍可損雖三尺童子知其無疑也頴濵文郡兵冗而無用州縣之兵重於招填利于虛劵而額缺不復問廂禁軍盡人家子弟執業市㕓名𨽻軍伍並以供厮役居官者利於目前之用而不復問老弱者厚賂管軍增减年甲有司憚於生事而不復問春秋教閲僅同兒戲辰入教場頃刻而退或夤緣而幸免或嬉笑以旁觀而技藝之能否不復問一軍之制費計幾千或以應副人情或因垂滿納賂各有孩兒軍工匠營之目獨不思兵備而不閲謂之廢既閲而賞罰不明謂之戲乎吕祖謙南北各有所長平沙淺草千里在目土不成邱水不成谷馬肥人輕來往電駭雙𢃄雙鞬左右馳射此非南軍之所長也山林險厄草木蓊鬱江流吞天巨浪時啓行人疑惑飛鳥不渡走步相搏短兵相擊此非北軍之所長也李太白文東南之兵可用項籍八千子弟橫行天下乃吳中人也李陵步卒力扼虎射命中當單于數十萬乃荆楚人也宋髙祖西取秦東取燕所向無敵皆江南人也胡致堂東南古有精兵項籍以㑹稽兵八千而角巨鹿之戰今吳楚之兵是也番君吳芮以百越之兵佐諸侯今江湖之兵是也粵王無諸以閩中兵共滅楚今福建之兵是也東甌王與無諸同率兵以佐漢今永嘉之兵是也此則東南之兵自古而精也然則今果不如西北也哉陳亮主意郡守當總兵權有兵制有兵權隨方建置因事分合此統兵之制也然統兵雖有其制而制有不必拘者則以郡守兼之教閲有時殿最有課此練兵之權也然練兵雖有其權而權有所當臨者則以郡守總之考論漢人都尉都試之法無越於此矣夫總兵之職𨽻于都尉練兵之職課於都試若於郡守乎何預今乃舉而屬之郡守何耶蓋郡守乃都尉之長都尉乃郡守之二以制而言則職守不同名號亦異都尉非郡守之所得兼也然干戈之地不可與禮樂之區槩論桑麻之境豈可與烽燧之地例言郡有內外事有緩急故都尉之職或有不當置者則郡守得而兼之况漢之將本無常而有事則置事已則罷公卿可將大夫可將則以郡守員兼都尉其制不必拘也都試乃掌兵之官郡守乃掌民之職以權而論則文武殊尚軍國異容都試若非郡守之所得専也然貔貅百萬不可無體統之相維介胄武夫不可無名分之相屬職有大小事有輕重故都試之法其有所當總者郡守得以専之况漢初京師之兵未嘗逺去設有緩急郡國取焉或發雲中或發蜀郡則以郡守而統都試之法其權所發總也當得相維之意制兵當明內外相維之意外重之弊深故必資內為之制內重之弊極故必資外為之防內外之兵未嘗不迭相維也漢人京師有南北軍郡國亦未嘗無備其兵散于郡國者有材官有樓船有車騎使京師之兵足以制郡國郡國之兵亦足以衛京師是以終漢之世上無叛將下無驕兵者以制御得其宜也秦人銷郡縣之兵器漢髙得以掉臂而入關唐人弛郡縣之武勇祿山得以折箠而破河北是皆郡縣之無備不足以鎮壓盜賊之憑陵震懾奸雄之窺伺也雖然此特論其守備耳若夫睢陽得一張公足以為江淮保障河北得一顔真卿足以為河朔全城又在夫得人而守之也善論兵者盍於斯考之警段教閲不可具文今夫州郡之謂禁兵者非廂兵弓兵巡兵比也給之優而用之靳也而技巧工匠者若人也差借占留者若人也又或時執法物備呵導以為衛也若是而謂之禁兵其不習於驕且惰乎求其所以教之則有兒戲而無法制有賞賚而無黜責當教之日長吏晨起而閲兵堂然而陳填然而鼓荷戈被甲者有數也至其所則升其堂供張既具幕官兵佐環而居也兵卒旁午紛而列也器械之相角不能無精而不能皆精弓弩之發不能無中而不能皆中膂力無急戰之苦而賞賚已有必得之例日未及昃而官吏歸兵卒休矣獲賞者如戰勝解甲者如釋負賞固所貪而被甲喘汗者所不樂也如是而責其精欲其强彼亦曰春秋之閲者嵗之常旬月之教者又特為具名也以郡之教兵者若此則小而邑者可知州郡之為兵者若此則下而廂兵弓兵巡兵又可知矣不可勞竭其力是故天下之力可役而不可竭勞而竭之則將耗散而不舉不可與之犯大難而涉大勞東野子窮其馬力顔子知其必敗庖丁善刀而藏是以十九牛而不鈍古者宿兵京師而士無所憚其後用師千里而士無所憾其逺屯兵厯年而士無所怨其方以守則固以戰則克亦必有其道矣邉兵習於戰夫塞下之民非他軍比也耳熟鉦鼓目稔金革男子操刀女子彎弧三尺之童以介胄為樂非其性異人也習俗使然也偶句春秋教閲有同兒戲身居市㕓名占尺籍市逐負販不異乎民廪食公家私為厮役春搜秋獮把兵刃而手繭生鮮衣美食負斗石而背汗下擊刺挑摶趨走跳躍以鼓其氣坐作進退驅馳控射以慣其習名曰招刺而夤緣陳乞者相望聲言簡汰而侏儒脆弱者自如武藝不間而類為逰食之人强壯不簡而半是老癃之輩分屯易處更置不常以轉移其怠惰之心擊刺挑摶趨走跳躍以鼓動其敢戰之氣事證周調諸侯之兵先王之制畿內之兵不出所以重內也卒有四方之役即有諸侯兵耳或遣王師出征亦不過元戎十乘以先啓行而已而調兵諸侯又各從其方之便髙宗伐楚蓋裒荆旅武王克商實用西土至於征徐以魯追貊以韓平淮夷以江漢略見于經可考也平王出戍逺以見刺當是時周都洛矣由洛戍申許無乃未甚逺而周人已不能堪况夫後世有勞師萬里者哉齊威東討陳濤惟及江黃北伐山戎亦因燕衆蓋由有節制者自晉文城濮之戰以秦師從諸侯之後蓋惟黨是與無復先王之舊矣漢調近郡之兵漢懲秦調民逺方征戍之弊其偹禦四夷之計凡一方有警即調近地兵以討之是以有雁門雲中諸郡兵以専備西域有巴蜀等郡兵以専備西南夷有㑹稽豫章等郡兵以専備兩粵南越有渤海遼東等郡燕齊等國兵以専備朝鮮邉境無事則嵗戌於中都與中都之民同制而逺近優異則有别矣如虜入雲中東甌告急則發㑹稽兵西南夷反則發犍為蜀郡之兵是時一方受敵止一方興發賈誼所謂一靣病一方痛是也漢郡兵始末且漢列諸郡有都尉佐太守典武職甲卒王國則以內史比郡守中尉比都尉侯國則亦有相比天下令長每嵗八月㑹太守都尉令長相承咸預各以其方之所習課殿最焉巴蜀三河頴川之材官上郡北地天水安定之騎士廬江㑹稽之樓船是也然齊王發兵并琅琊兵而西以赴諸吕之難則外兵足以制內亞夫將三十六將軍往擊吳楚則內兵足以制外漢初相制之意非不善也夫何都試一罷外備單弱于是北胡有變始置度遼官南蠻或叛則置象林兵羌犯三輔則置長安雍二尉鮮卑冦居庸則置漁陽營然戰不素練每出輒北外兵終失于弱耳逮至盜賊競起外兵始盛立為積射募為陷陳邉置義從州為牧鎮外兵既重內兵復弱盜賊雖衰牧鎮已盛是以京師有變則邉郡長驅而至董卓曹操之徒相繼而入漢祚遂以鼎立此又矯重外兵之失也唐郡兵始末唐之府兵折衝都尉雖遙𨽻於諸衛軍城守戌實散在於諸道每嵗季冬折衝將率兵馬之在府者置左右校習戰陳之儀步隊騎隊之有其制擊鉦伐鼓之有其節國無不習之兵然府兵六百三十四所以三百六十有一在關中固為重本計而諸道二百有餘分布錯置亦為防外設唐初相制之意非不善也夫何更代法廢諸府之籍不補折衝之將不遷及范陽之變所過州縣望風瓦解如入無人之境外兵蓋失于不補耳逮至諸鎮之兵共起討賊其後安史繼亂中國雲擾肅宗命李光弼等討之號九節度之師大盜既除而武夫戰卒以功起行陳者皆除節度由是方鎮相望于內地朝廷不能制而甘為姑息之政是以京師有變藩鎮亦驅兵而至朱李之徒相繼犯京唐祚遂以瓜裂此亦矯重外兵之失也東南精兵可用自古吳粵之俗最號剽悍能鬭敢死若夫差悉精兵伐越於夫椒敗齊於艾陵勾踐收㑹稽餘卒以滅吳復北渡淮以伐齊晉項羽拔起隴畝將江東子弟而西滅秦司馬氏遭五胡之亂南渡金陵以恢六代之業而宣潤洪鄂弩手為晉精兵屢抗北賊兹所用之兵又悉東南之人也豈古盡驍鋭而今盡軟怯耶國朝用兵之制有禁軍有廂軍有禁廂軍國初以天下精兵萃之京師而其餘者分布於諸郡以備戰衛此謂之禁軍宋有天下以來凡役使營繕不調於民皆兵役之此謂之廂軍熙寧取廂軍之壯者而教之留之在城免其難役此謂之禁廂軍然州郡所恃以為屏翰王室者惟禁軍而已其始末可不論歟蓋太祖懲前代之弊收藩鎮之兵連營畿甸守衛皇居而州郡之兵不免有疲弱之弊至咸平以後循習日久諸郡撤備後恐太弱乃募陜西之强壯為保毅簡保毅之精卒為振武于是有保􅐧振武之禁軍康定以來元昊陸梁禁衛皆西乃籍民兵以補軍籍升廂軍以充禁旅於是有保捷武衛宣􅐧之禁軍慶厯間修武備增指揮于是復有保􅐧之禁軍自是而後或刺義勇或教廂軍而兵始克大備在慶厯已有八九十萬治平復增十五餘萬至于熙寧又不知其幾矣祖宗所以權衡內外之勢何其審耶時政郡兵徒給使令今太守謂之郡將何嘗以兵為意哉居則給使令而已出則備導從而已春秋大閲姑奉故事物色人馬指為具文軍匠固有禁矣今禁軍之差出如故也祖宗時文武臣寮或奉使逺官或受代歸覲無得取借官軍部送及仁宗朝行人使副罷政者始差十五人其次或十人或五七人以津送行李而已今日巨藩崇節一易帥守則將迎率以官兵多者七八百人少者四五百人不惟帥守爾凡幕府州縣官與夫罷政而家居奉祠而坐祿受代而待闕者又凡幾人若是則日召募之召募以充役而已月教閲之教閲以效役而已終身廩給之廪給以贍役而已又何望其執干戈而衛社稷乎結尾其責在郡守抑有獻焉郡兵不患不勇郡守患不勇郡兵不患不忠郡守患不忠蓋兵統於郡郡統於守郡守為勵兵衛國計雖畫地而守植表而限愚知效死者莫能去冒死者莫肯入郡守為擁兵衛已計雖崇城到天洪流浸地愚恐兵強者志于叛兵弱者志于潰是以持堅壁之師者河南守也立破羌之功者酒泉守也捍江准之勢者睢陽守也障漁陽之亂者平原守也否則為山東之郡賣降而已矣又否則為河北之郡奔潰而已矣如兵何如郡何愚碩今日謹之哉重之哉郡守之才必擇為國家萬里長城者可也用兵在得民心雖然以州郡之兵為籓籬不若以州郡之民為保障層魚唱禍之變或者以為祖龍氏銷天下之兵以至于此而不知民心瓦解雖有熊羆之旅愚知其無取用矣范文正公言于慶厯有曰欲備契丹莫若寬河北之民欲備靈夏莫若寬關陜之民欲備雲南莫若寬湖嶺之民至哉斯言誠後世之龜鑑也愚敢不以為今日獻羣書㑹元截江網卷十三
