body:
  text: 羣書會元截江網卷十七紀綱歷代事實堯有天下舉大綱命舜禹不膠者卓矣揚先知夏殷周之衰也特數十王而不傾者紀綱存焉耳韓文禹亹亹穆穆為紀為綱本紀太康五子之歌其三曰惟彼陶唐有此兾方今失厥道亂其紀綱乃始滅亡書湯先王肇修人紀伊訓文王勉勉我王紀綱四方棫朴成王受福無強四方之綱之綱之紀燕及朋友假樂蕩凡伯刺厲王大壞也厲王無道天下蕩蕩無綱紀文章詩序秦人不綱網漏於吞舟髙祖贊漢興綱紀大基前漢律厯志漢之紀綱日紊者由其不能擇賢明任之失其操柄也劉蕡策光武明政體總攬權綱本紀唐之官制其名號祿秩雖因時增損大抵皆沿隋之故然由職有常守位有常員方唐之盛時其制如此蓋其治未嘗不欲明制度紀綱為萬世法而常至於交侵紛亂者由其時君不能謹守而徇一時茍且故其事繁而官益冗至失其職業而不能復初百官志上謂尉遲敬德曰國家紀綱惟賞與罰非分之恩不可數得通鑑玄宗天寶之季嬖幸傾國爵因情授賞以寵加紀綱始壞矣陸贄奏議憲宗杜黃裳曰陛下必欲振舉紀綱宜稍以法度裁制藩鎮通鑑杜黃裳知帝鋭於治恐不得其要因推言王者之道在修己任賢操執綱領要得其大者文宗狄兼謨遷御史中丞帝曰御史臺朝廷紀綱紀綱正則朝廷治朝廷正則天下治並本傳偶句堯之治不在於協和而在於大綱之既舉湯之治不在於輯寧而在於人紀之肇修夏之天下禹之綱紀實為之禹為是綱紀也傳不云乎亹亹穆穆為紀為綱未幾太康失道而亂之禹之紀綱無有也少康以一成一旅之衆復禹之績以中興有夏而禹之紀綱不以是而滅周之天下文武之紀綱實為之文武為是紀綱也詩不云乎勉勉我王綱紀四方未幾厲王無道而蕩蕩文武之紀綱無有也及宣王興衰撥亂明其功業周道粲然復興而昔之紀綱不以是而絶權綱總攬政事畢張故漢已微而中興紀綱寖張威令一振故唐雖衰而復盛漢不紀綱大基則庶事將至倥傯矣唐非紀綱可憑則後世無所維持矣皇朝事實興國八年太宗曰朕撫御萬方固不能家至户曉但持其綱領行其正道以齊一之端拱元年上謂宰相曰國之興衰視其威柄可知矣朕思與卿等謹守法度務振紀綱以致太平至道元年上曰漢晉紀綱大壞朕革故鼎新别立為一朝之法雖二三大臣猶有異論朕執心堅固勤行不怠修明憲度興利除害亦無慙於古矣真宗咸平四年曹彬曰北鄙終成和好上曰此事當屈節為天下蒼生然須執紀綱存大體即久逺之利也上謂輔臣曰諌官御史論事若指斥姦邪維持綱紀固當極言朕亦虛心聽納焉仁宗天聖四年楊崇勳嘗詣中書白事雨新霽穿泥靴登階王曽劾奏其失上詔釋其罪太后問其故曽曰崇勳不知朝廷之儀舉劾者相臣所以振綱紀寬釋者人君所以示恩德如此則仁愛歸於上而威令肅於下矣並長編神宗朝韓公琦既罷相當時新法方熾或聞更祖宗之法度壞朝廷之紀綱則終日鬱鬱行狀高宗紹興十六年上曰監司郡守須修舉職事若不恤民不奉行法令郡守令監司按劾監司令御史臺按劾然後上下有紀綱髙宗詔臺諌風憲之地振舉紀綱糾劾姦邪密贊治道朕今親除公正之士以革前弊乾道七年上曰昔人以嚴致平非謂深文峻法也紀綱嚴整使人不敢犯耳譬如人家父子兄弟森然法度之中不必須用鞭撲然後謂之嚴也淳熙十三年上曰今之要務不過擇人才正紀綱明賞罰而已並聖政髙宗紹興四年臣僚上言陛下承祖宗付託之重正宜使上下內外共為一心以扶持而安全之奈何命之出於上者下不得矯其非政之行於下者上無以稽其惑夫所謂命出於上而下不能矯其非者蓋人主之行事豈能一一其盡善也今陛下必欲杜私謁而存公道舉朝廷之紀綱法度以與臣下共守之是誠國之福也本紀偶句務振紀綱以致太平者太宗之聖訓也紀綱嚴整人不敢犯者孝宗之聖訓也經傳格言聖人作為紀綱紀綱既正天下大定表記若網在綱有條而不紊書盤庚干國之紀不聽政也左昭元年三綱之首王政之端君為臣綱父為子綱夫為婦綱論語周南召南注君子為國張其綱紀楊先知大作綱小作紀同上綱者張也紀者理也大者為綱小者為紀所以張理上下整齊人道若羅網之有綱紀而萬目張也白虎通立綱陳紀後可以為萬世法程國制搶攘非甚有紀賈誼策仁者君之綱司馬談論六家善為政者綱舉而目張前漢書自古受命之君非有德不王自夏后氏以來始傳以世而有賢不肖故其為世數亦或短或長論者乃謂周自后稷至於文武積功纍仁其來也逺故其為世尤長然考於世本夏商周皆出於黃帝夏自鯀以前商自契至於成湯其間寂寥而無聞與周之興異矣而漢亦起於亭長叛亡之徒及其興也有天下皆數百年而後已由是言之天命豈易知哉然考其終始治亂顧其德功有厚薄與其制度紀綱所以維持者如何而其後世或浸以隆昌或遽以壞亂或漸以陵遲或能振而復起或遂至於不可支持雖各因其勢然有德則興無德則絶豈非所謂天命者常不顯其符而俾有國者兢兢以自勉耶唐在周隋之際世雖貴矣然焉有所謂積功纍仁之漸而髙祖之興亦何異因時而特起者歟雖其有治有亂或絶或微然其有天下年幾三百可謂盛矣豈非人厭隋亂而蒙德澤繼以太宗之治制度綱紀之法後世有以憑藉扶持而能永其天命歟唐髙祖贊善計天下者其視天下猶人也安危者肥瘠也紀綱者脈也脈不病雖瘠不害脈病而肥者死矣韓雜説偶句杜黃裳論王道必貴乎綱領之操執劉頌言為政惟在乎綱舉而目陳名臣奏議以臺諌為紀綱蘇軾上神宗書願陛下存紀綱大略曰國家租賦籍於計省重兵聚於京師以古揆今則似內重又云祖宗所以委任臺諌之一端則是聖人預防之至計建隆以來未嘗罪一言者言及乘輿則天子改容事關廊廟則宰相待罪朝廷紀綱孰大於此臺諌持紀綱沈與求上髙宗書曰臺諌與朝廷分持紀綱要須得沉厚練達之人則論事不茍上曰極是攬威柄以立紀綱明道二年宋綬言帝王臨御天下在總攬權柄陛下念王業艱難整齊紀綱正在今日以威斷立紀綱慶厯二年何剡奏今之政令紀綱多所不舉蓋失於寬之漸也陛下但當總攬威權以奮乾剛之斷俾政令紀綱粲然復興則寬之失可救也舉其綱在擇人司馬光奏政有本末事有細火舉其綱則萬目張挈其領則衆毛理先其本後其末急其大緩其細擇人而任政之本也立紀綱在刑賞龐籍言國家之重係乎紀綱紀綱之要實在刑賞二者或失紀綱必隳立紀綱在賞罰慶元臣僚奏聖王御下務先紀綱紀綱之立無踰賞罰正心術以立紀綱朱文公熹上孝宗封事曰治天下莫先於正心術以立紀綱夫所謂綱者猶網之有綱也所謂紀者猶絲之有紀也網無綱則不能以自張絲無紀則不能以自理故一家則有一家之綱紀一國則有一國之綱紀乃若鄉總於縣縣總於州州總於諸路諸路總於臺省臺省總於宰相而宰相兼總衆職以與天子相可否而出政令此天下之綱紀也然而綱紀不能自立必人主之心術公平正大無偏黨反側之私然後紀綱有所繫而立君心不能以自正必親賢臣逺小人講明義理之歸閉塞私邪之路然後可得而正也今日紀綱不正於上是以風俗頽靡於下蓋其為患久矣諸儒至論漢唐本朝之綱目唐有天下雖號治平然亦有夷狄之風三綱不正無君臣父子夫婦其原始於太宗也故其後世子弟皆不可使君不君臣不臣故藩鎮不賔權臣跋扈陵夷有五代之亂漢之治過於唐漢大綱正唐萬目舉本朝大綱正萬目亦未盡舉先王之世以道治天下後世只是以法把持天下明道遺書以五事為紀綱嘗觀自三代而後本朝有超越古今者五事如百年無內亂四聖百年受命之日市不易肆百年未嘗誅大臣至誠以待夷狄此皆大抵以忠厚廉恥為之紀綱蓋藝祖開基規模自别伊川入關語録為政有紀綱文章為政者必要有綱紀文章先有司鄉飲讀法平價謹權量皆不可闕也明道語録當先正大綱欲興治撥亂者當正大綱知大綱然後本可正而末可定大綱不知雖或善於條目有一時之功終必於大綱不正之處而生大亂理明則紀綱正為天下者必本於義理理也者天下之大體也義也者天下之大用也理不可以不明義不可以不精理明而後紀綱可正義精而後權衡可平紀綱正權衡平則萬事治百姓服四海同並胡子知書主意扶植在君心善用天下者必有一定之規模善扶天下者必有先定之綱紀曷謂規模治是也曷謂紀綱心是也厥今夀俊在位端人聚朝必有一定之規模矣而識者則以為紀綱之未立也夫立規模者在紀綱立紀綱者在君心朱文公有云紀綱不能以自立必人主之心公平廣大無一毫偏黨反側之私然後紀綱有所係而立必人主之心真靜純一無一毫聲色貨利之惑然後紀綱有所係而立故心溺於聲色則紀綱壞心惑於近習則紀綱壞其端甚微其禍甚烈世之議者徒見廟堂者百揆之紀綱也間者措置大事不由中書廢置罷行或從內降則曰廟堂之紀綱壞徒見給舍者封駁之紀綱也間者事無巨細動輒掣肘調停不可宣諭再三則曰給舍之紀綱壞又徒見臺諫者糾彈之紀綱也間者發而不中觸犯天威電掣雹碎一斥不復則曰臺諌之紀綱壞殊不知綱者猶網之有綱也紀者猶絲之有紀也紀綱不自立必主上無偏黨無反側則紀綱有所係而立君心不自正必主上親賢臣逺小人則此心有所主而定推是以往何紀綱之不正規模之不立乎己酉解振舉在君相君相精勤振厲志向則紀綱正而國事無一之不舉上下茍安玩愒歲月則紀綱紊而國事無一之可為人君所以植立此紀綱者也宰相所以維持此紀綱者也不有聖君紀綱何所賴以植立不有賢相紀綱何所賴以維持方其聖賢相逢植一時之慶會明良相遇同一念之作興君必厲精而正心誠意於宫閫之間臣必羽翼而叶謀并智於廟堂之上精神以壯圯壞可使之修明風采以新紊亂可使之條理典章文物之細莫不井然而可觀禮樂刑政之繁莫不燦然而可觀矣愚故曰君相精勤則紀綱正而國事無一之不舉者此也否則聖賢不作而彼此之弗相助上下不交而意向之不相合君或飬恬而玩愒於歲月之久臣或飬諛而偷安於祿位之髙視萬事之自為修廢邈焉無係於休戚聽天下之自為安危恝然無關於懷抱大綱且不正矣况節目乎體統且不明矣况纎悉乎愚故曰上下茍安則紀綱紊而國事無一之可為者此也過於懲過於遜權雖人主之所獨專也而不可過於有所懲而事事攬權權非大臣之所敢專也而不可過於有所遜而事事避權過於懲則其弊必有甚於前過於遜則其患又將起於後矣執事策諸生以今日之飭紀綱為第一義且謂大權歸於人主大政歸於中書欲並行而不悖顧草茅何敢為專攻上身之説亦不敢妄為執政然否之議區區恤緯之誠竊謂今日大權已歸於人主則不可因前日之失權而過於懲惟當以成周之信任其臣者為法則振飭紀綱可以申明責實之一詔也大政已歸於中書則不可因前日之竊權而過於遜惟當以周公之敬事其君者為法則維持紀綱可以責成務實之庶政也偶句振一國之衆目易舉一國之大綱難人主知所以任大臣者重大臣知所以任天下者重警段君相不可玩弛愚謂紀綱之大固非君相之聖賢不足以植立而維持亦非君相之玩弛所能以把握而運量為之君者必主之以剛果守之以堅凝勿移心於晏安勿溺志於聲色勿以仁義之未效而遽損其始初之精勤而後紀綱之可以植立為之相者必行之以公正持之以廉平勿徇私以變更勿偷安於暇逸勿以持祿固位之可樂而不為扶顛持危之謀而後紀綱之可以維持矣紀綱不立之弊自古為天下者必振厲紀綱以為整齊嚴肅之地今也幸門大開蠧宄難窒御筆多而帝制輕內降煩而睿旨輕不惟諸司升補仰瀆選舉也而統帥躐級閣職超榮非望恩渥亦可夤緣而執劵矣不惟姦贓湔洗上褻渙汗也而府胥逃刑巨室免糶蕞爾狠戾亦可梯媒而探囊矣金穴錢神塞破憸士之屋而璧瑕圭玷疵纇寒素之身如此而欲紀綱不紊得乎定紀綱自規模始今日規模之所以不定者寧不以主上尚懷盧把之小心疑儒效之迂闊不肯定此規模歟二三大臣憂章蔡之後入懼後禍之立至不敢定此規模歟如其定也有堅凝之定志而不為事物之所怵迫有把握之定力而不為是非之所轉遷有精審之定向而不為成敗之所計較其或權相謀復吾其屛之竒民肆妖吾其絶之規模定則朝廷宫闈之紀綱有不定乎兵財脈絡爾其通之乘輿缺失爾其補之規模定則宰執臺諌之紀綱有不定乎鰌鱔晝舞汝其逐之狐狸夜嘯汝其遏之規模定則給舍外臺之紀綱有不定乎紀綱次第而舉夫所謂紀綱者非但制度法令而已也品式條目而已也自其身而形於家閨門肅肅無以異於宗廟之間袵席雍雍無以異於朝廷之上內外有章宫庭有度此一家之紀綱也自其家而推其君臣相正有同德叶心之和官帥相規無分朋植黨之私宫府一體上下一心此一國之紀綱也舉而措之天下則尊君卑臣內夏外夷截然有分而不相悖井田溝洫貢賦車乘繩然有法而不可越此天下之紀綱也宫閫朝廷為紀綱蓋宫閫者天下國家之儀刑人君誠以植立紀綱為心則戰兢夕惕無敢荒寧動靜語默不容輕易宫庭密勿常若祖宗之臨其上暗室屋漏常若神明之在其前提挈精神收存念慮事無精粗悉合理道言無大小必由典常如此則宫閫之紀綱其有不正者乎朝廷廟堂者政事教化之根本大臣誠以扶持紀綱為念則為國惜法不徇私情為官擇人必從公命愛君乃所以愛身則不敢先身而後君保國乃所以保家則不敢先家而遺國存心正大為謀深長事無可否惟理之循言無同異惟是之聽如是則朝廷廟堂之紀綱其有不正乎偶句紀綱振起四海聳聞條目森嚴萬物改觀大綱既舉井若有條一目不正紛若難理大綱小紀繩乎有條本度末數秩乎有序紀綱既立朝廷清明法制既備蠧弊盡飭紀綱不飭取辨彌縫事權散出積成扞格醇化懿綱儀刑四海洪模碩畫標準百王權綱賞罰支泒於宫庭政事號令旁落於幽隱權綱雖總而旁蹊之未窒治具雖舉而根本之未修謂之綱則所執者要而不繁劇紛擾也謂之紀則所舉者詳而不踈漏蹙狹也宰相不平章執政不參預則無以維持是綱臺諌不論列給舍不繳駁則無以振舉是綱事證古者紀綱修廢唐虞三代之所以治其紀綱法度何為而修也以堯舜禹湯文武為之君以臯夔伊傅周召為之相同寅協恭勤恤罔間烏乎而不修春秋戰國之所以亂其紀綱法度何為而廢也以齊宣梁惠之徒為之君以景子沈同等輩為之臣縱橫詭譎務相權謀烏乎而不廢逮于漢唐之或興或衰紀綱法度之或修或廢則聖君賢相之不時出故耳觀乎唐虞三代者若此驗之春秋戰國者如彼質之漢唐又昭昭焉不可誣也漢唐本朝綱目漢以規模為紀綱故大綱正而衆目未張唐以法令為紀綱故衆目張而大綱未正我朝以禮樂為紀綱紀綱既正而衆目復張此古今治亂之所由分也漢初大綱正方漢之始興也非劉不王約在盟府親踈有别也興朝將佐擢在大臣內外無間也列置郡縣分設刺史尊卑相臨也漢以規模為紀綱亦善矣然吕氏之勢益橫而事皆關於房闈家之紀綱安在哉恭顯之寵益甚而事皆由於閹宦國之紀綱安在哉邉陲之釁既開而夷狄幾擾中國天下之紀綱又安在哉然幾危而安幾仆而興者規模宏逺而尚有大綱之舉是故諸吕之變一日掃除而無遺孽之尚存恭顯之專一日失勢而至祈死之不暇夷狄之強一日爭立而甘心來朝之恐後此漢大綱舉而衆目未張之驗也漢大綱亦未正所謂大綱何在哉創業之主莫如髙帝然五日之朝有擁篲之嫌上夀之始悻悻然較兄仲之功而驕氣德色之未去則父子兄弟之綱紊溺戚姬之愛幾搖國本鴻鵠之歌悲傷而不能自克其欲則夫婦之綱紊械繫相國之辱葅醢功臣之禍則君臣之綱又紊矣唐初萬目舉方唐之始興也凌煙起舞春風和氣宫庭和穆也周典建官星羅棊布而朝廷整肅也府衛置兵首重尾輕而郡國聯屬也唐以法令為紀綱亦具矣然宫闈夫婦之間民無則焉一傳而殱之武氏而諸李幾無遺育家之紀綱何如哉開元以後權在輔相姦臣擅國蒙蔽中外而安史之禍成矣國之紀綱何如哉引戎亂華民不聊生冠履倒置而中國之禍慘矣天下之紀綱又何如哉漢唐紀綱未正漢髙帝能知軍法之常伸而不能救白登之困能知章程之當定而不能忍葅醢之慘能知禮儀之當制而不能不安於度吾能行之語百度草創而纎悉有遺慮萬目脫略而罅漏有未至唐太宗晉陽之私侍巢刺之啓封其紀綱不正甚矣再傳之後蕭墻之憂無時無之川蜀之幸而唐幾危奉天之幸而唐幾亡關陜之幸唐又幾於不振三百年間治日常少亂日常多是豈可盡歸咎於後世繼守之君哉皆其紀綱紊亂無以為子孫憑藉扶持之計耳本朝綱舉目張恭惟藝祖仁義立國土地不如漢戶口不如唐紀綱修明與周比隆齊家治國平天下之道千載一日也慈闈一言載在金匱而社稷蒙福焉戚里有過例繩國法而私謁不行焉內言不及於外私恩不及於公則一家之紀綱何如也官莫重於三省而置給舍使小大之相制柄莫尊於樞府而統閹宦俾內外之相通財用布中外而總三司吏治在州縣而置監司則一國之紀綱何如也若夫天下之勢雖無周之封建而朝廷郡縣合為一體初無彼重此輕之患雖無周之井田而賦入有經賑恤有廪民生盛時未嘗見暴兵虐刑之慘則天下之紀綱何如也時政今日紀綱非昔朝廷者紀綱之原宫闈者紀綱之則也祖宗朝不以女謁進人不以戚里廢法貂璫不以典機密輿臺不得加節鉞此良法也側聞近日貴遊充塞於要津竒民出入於清禁恬不問也何其輕歟宰執者紀綱之總臺諌者紀綱之糾也祖宗政歸中書分以參二事關廊廟臺諌極言此定制也側聞時事中書多矛盾之私抨彈皆調護而止甚不滿也何其廢歟給舍者紀綱賴之以糾正監司者紀綱賴之以奮揚也祖宗命出三省給舍可繳駁之官分州縣監司得按察之此明訓也側聞近日左右潛制其威福囊槖公行於畿甸略不顧也何其玩歟今日紀綱屢變端平則更寶紹之越僭者也又一紀綱也嘉熙則改端平之輕躁者也又一紀綱也今日淳祐之作新則又更淳祐初年之專制矣抑不知紀綱將出於正邪猶有撓亂其中也上過於懲下過於遜曩權姦當國臣下知有穰苴侯而不知有王左右知畏石顯不知有帝獨不曰威福惟辟不可使之移也今乾剛夬夬威柄復收固可以鑒前日之失也初是以失權為戒而因有所懲然懲之深則必欲事事而攬權官無緊慢動煩親擢有不由中書進擬者也事無巨細多出聖裁有不容外庭與聞者矣此其弊必至於躬親雖得賢相而不知所以任也不思膳庖酒醢宰屬猶得掌於王官陳殷置輔冡宰亦以施於邦國人主而欲攬權是可以親細務為攬權乎天下事恐不可過於懲也曩政柄下移鹿馬趙髙而心術隂險劍腹林甫而黨與姦深獨不曰權者人主之操柄非臣下所可干也今革故鼎新正人柄用固可以鑒前日之專也於是以專權為戒而因有所遜然遜之甚則必欲事事而避權官府不合為一體政本不重於中書將順之情多而無可否獻替之直奉行之意恪而無執奏封還之嚴此其弊則牽於形迹色有憂勤而終不敢以天下為己任也不思按劍不校霍光得以擅增秩之賞留屯金城魏相得以主伐叛之謀大臣而欲避權是可以失體統為避權乎天下事恐不可過於遜也嗚呼紀綱所立不以細微而忽不以內外而紊不以茍且為玩大姦距脫紀綱似飭矣或者旁蹊曲徑果不為紀綱纍乎衆垢盡除紀綱似振矣或者乘間伺隙果不為紀綱病乎把握堅而政柄無僣移之虞防間密而幸門無雜出之患豈非所當加意乎結尾君心正則紀綱正然則正紀綱者將何如曰正一人之心而已皇上經天下之變故已多閲天下之義理已熟其於正心誠意之學講明之素矣而奈何其未之正心寶紹之心似有所恐懼而不得其正也端平之心似有所忿懥而不得其正也嘉熙之心似有所憂患而不得其正也淳祐之心似有所好樂而不得其正也以一人之心而二三十年之間凡幾更易凡幾變遷吾心既無所主規模何自而定紀綱何自而正事功何自而成乎昔新安夫子有曰紀綱不能自正必人主之心公平廣大而後紀綱有所係而立至哉斯言萬世之藥石也倘能行則今日之紀綱祖宗之紀綱也惟朝夕論思者有以推廣上心幸甚臺諫扶持紀綱故嘗因是為之説曰正此紀綱人主之責也翼此紀綱大臣之責也扶持此紀綱臺諌之責也人主有公心而後可以正此紀綱大臣有公道而後可以翼此紀綱臺諌有公論而後可以維持此紀綱然人主之公心大臣之公道一有所未至而臺諌之公論皆得以救其源而正其失也蓋祖宗之重臺諌正以為振紀綱之地也如范仲淹之議時政公也髙若訥毁之仁祖終以為直所以成慶歷之治司馬之議新法公也王安石之黨誹之神宗獨諒其賢所以回元豐之脈然則人主有公心大臣有公道所以振紀綱以植公法者又自重臺諌之公論始羣書會元截江網卷十七
