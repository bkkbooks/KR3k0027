body:
  text: 羣書㑹元截江網卷二十國論歴代事實盤庚遷于殷民不適有居王命衆悉至于庭曰予告汝訓汝曷弗告朕而胥動以浮言恐泥于衆書鄭人游于鄉校以論執政然明謂子産曰毁鄉校何如子産曰何為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之齊景公謂梁丘據曰惟據與我和晏子對曰據亦同也焉得和和如羮焉水火醯醢鹽梅以烹魚肉宰夫和之齊之以味亦曰亦君所謂否據亦曰否若以水濟水誰能食之左傳楚莊王問於孫叔敖曰寡人未知所以為國是也孫叔敖曰臣恐王之不能定也夏商之季不定國是而以合其取舍為是不合其取舍為非故致亡而不知莊王曰善哉願相國諸卿共定國是國語元譚曰國之有是衆之所惡恐王不能定也王曰不定獨在君亦在臣乎對曰君驕士曰士非我無從富貴士驕君曰君非士無從安存人君或至失國而不悟士或至飢寒而不進君臣不合則國是無從定矣衞侯言計非是而之羣臣和者如出一口子思曰人主自臧則衆謀不進説人讃已闇莫甚焉子思言於衞侯曰君之國事将日非矣君出言自以為是而卿大夫莫敢矯其非卿大夫出言自以為是而士庶人莫敢矯其非如此善安從生並通鑑漢武帝匈奴請和親上下其議王恢曰不如勿許舉兵擊之韓安國曰不如和親羣臣多附安國於是上許和親明年鴈門馬邑豪聶壹言匈奴可誘以利致伏兵襲擊必破之道上乃召問公卿恢對曰擊之便乃從恢議韓傳漢文帝張釋之前言便宜事文帝曰卑之毌甚高論令今可行也於是釋之言秦所以失漢所以興者文帝稱美張傳昭帝詔郡國舉賢良文學之士問民所疾苦於是鹽鐵之議起焉車千秋傳所謂鹽鐵者起始元中召文學賢良問以治安皆對須罷所謂鹽鐵酒㩁均輸務本抑末毌與天下争利然後教化可興御史大夫𢎞羊以為此乃所以安邊境制四夷狄國家大業不可廢也當時相詰難頗有其議公孫賀等贊宣帝時初酒泉太守辛武賢奏言擊罕开天子下其書公卿議者也咸以為不先破罕开先零未可圖上乃拜武賢為破羌将軍以書勅責充國充國上書謝罪請先誅先零六月戊申奏七月甲寅璽書報從充國計焉趙充國擊先零條留屯田得十二便出兵失十二利充國奏毎上輒下公卿議臣先是充國計者什三中什五最後什八有詔誥前言不便者皆頓首服丞相魏相曰臣愚不習兵事利害後将軍數畫軍策其言常是臣任其計必可用也上報曰善本傳元帝珠崖山南縣反上傳謀羣臣待詔賈捐之曰臣願遂棄珠崖專用恤闗東為憂上以問御史陳方年以為當擊丞相于定國以為捐之議是上從之通鑑晉武帝時王濬請伐吳帝決意更議明年出師杜預上表曰羊祐不先博謀於朝臣而密與陛下共施此計故益今朝臣多異同之議自秋以來討賊之形已露今若中止孫皓或怖而生計無所及矣帝方與張華圍棋預表適至業推枰歛手曰陛下聖武國富兵強當今討之可不勞而定願勿以為疑帝乃許之同上曹操入荆州将士皆恐咸曰不如迎之周瑜曰操托名漢相其實漢賊也瑜請得精兵三萬進夏口保為将軍破之權拔刀斫前奏案曰諸将吏敢復言迎操者與此案同周瑜傳唐太宗房杜王魏議可監於前四方言得失於外不數年大治元稹傳馬周岑文本曰馬周論事㑹文切理無一言可損益聆之纚纚令人忘倦本傳崔植論當世事數十條名曰政論本傳武宗澤潞留植擅節度始議用兵中外交章固爭德裕獨曰聖策先定不以小利鈍為浮議所揺則有功矣帝曰為我語於朝有阻吾軍議者先誅之羣論遂息李德裕傳肅宗欲制定禮樂班固以為宜廣集諸儒共議得失帝曰諺言作舍道邊三年不成㑹禮之家名為聚訟互生疑異筆不得下昔堯作大章一䕫足矣曹褒傳偶句遷毫之舉遷之可也拳拳於告百姓之辭三監之叛伐之可也切切於誥庶邦之語秦之入滑先軫當國力主擊秦之議而晉卒獲勝楚之伐鄭子駟當國力主從楚之議而鄭遂不寧朱崖之議有丞相定國以主之則棄之而不顧屯田之議有丞相魏相以主之則行之而不疑卿士大同周人必謀于乃心書傳丞相議是漢君必加之親決漢史秦堂上之謀甘龍之言其於得失非不明也而商鞅以私説勝漢匈奴之議安國之言其於利害非不明也而王恢以私説勝劒閣鳥道非不險阻而不足以沮憲宗平蜀之謀者有杜黄裳以任其責有高崇文以尸其事也淮蔡用兵非不勞弊而不足以奪憲宗平淮之役者有裴度以主其事有光顔李愬以成其功也皇朝事實侯莫陳利用以左道得幸趙普發其奸欲寘諸死太宗曰豈有人主而不能庇一人死普曰法可惜此子何足惜卒賜死仁宗朝初羣盗剽掠淮南将過高郵知軍晁仲約度不能禦諭富民出金帛具牛酒迎勞之盗悦徑去不為暴事聞朝廷大怒富弼欲誅仲約以正法范仲淹欲宥之弼曰方今患法不舉舉法而多方沮之何以整衆仲淹曰祖宗以來未嘗輕殺臣下此盛德事奈何欲輕壞之而輕導人主以戮臣下他日手滑雖吾輩亦未敢自保也范仲淹宣撫陜西河東仲淹疑契丹入寇欲大發兵為備杜衍謂契丹必不來兵不可妄出仲淹争議帝前詆衍語甚切仲淹嘗以父行事衍衍不以為恨既退仲淹猶力爭韓琦曰若爾則琦當請行不須朝廷一人一騎仲淹怒再求入對首奏琦語坐兵卒不發仲淹亦不為忤也長編仁宗曰今天下洶洶者孫叔敖所謂國之有是衆之所惡也司馬光曰陛下當審察是非然後可令條例司所為獨安石韓絳惠卿以為是天下皆以為非也長編邊将劉滬城水洛于渭州尹洙以滬違節度将誅之大臣稍主洙議孫甫謂水洛通秦渭於國家利滬不可罪由是罷洙而釋滬洙公平生所善者也言行錄熙寧元豐間士大夫論辨賢者必曰君實景仁二公蓋相得歡甚君實嘗語人曰吾與景仁兄弟也但姓不同耳至於論鍾律則反復相非終身不能相一君子是以知二公非茍同者言行錄熙寧二年富弼言大臣須和乃能成務若人懷私意各執己見互相疑間則無由濟事上曰朕夙夜焦勞正欲大臣一心共成國家之務執政誠當不執己見惟求是而已長編保安軍獲李繼遷母是時寇準為樞副呂端為宰相準欲斬之端不與知呂端請對且曰謂宜置於延州使善養之以招徠繼遷則母死生之命在我矣上曰微卿幾誤我事記聞哲宗宣仁太后其政司馬光入相首改差役法純仁力言曰事當熟講而緩行不然滋為民病於是人服純仁平直知前於安石非茍為異也荆公主雇役温公主差役蘇軾范純仁温公門下士復以差役為未便章子厚荆公門下士復以顧役為未盡蘇軾純仁子厚雖賢否不同其所論甚公各不私其所主言行錄孝宗乾道元年王弗進楚莊王足國是故事上曰王弗進議誠有國之大戒今日之先務也朕當與執政大臣九百官僚思其未至以歸於是期共守之聖政偶句端拱之備北虜趙普主之而議之者温仲舒也時則主者與議者無異辭咸平之棄靈夏楊億議之而主之者李公沆也時則議者與主者無異意雍熙幽燕之役任之者張齊賢也始雖惑賀令圖之説而定於賈趙昌言之所陳是論事者足以救任事者之偏也景德澶淵之役任之者寇準也既不從王欽若之議而又復采畢士安之所對是任事者又足以擇論事者之中也景德和戰此大議也一準決策則熱血相㰱之議不足以撓澶淵之行紹興和戰亦大議也一鼎居中則有進無退之議終足以成諸鎮之㨗公言廷争歐公謂四賢皆歸於盡忠此慶厯之臣主乎公者也獨銜公議王綯謂數十年無此氣象此建炎之臣主乎公者也澶淵之後王欽若言之陳堯叟又言之而寇萊公獨立赤幟確然不揺也濮師之議范純仁争之司馬光又爭之而韓魏公壁立萬仭屹然不變也永樂之舉惠卿主之而舉朝無敢言其非燕雲之役王輔主之而舉朝不敢諫其失經傳格言公事不私議禮記汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庻民從是之謂大同書洪範如彼築室於道謀是用不潰於成謀夫孔多是用不集發言盈庭誰敢執其咎詩孟子曰國君進賢如不得已将使卑踰尊疏踰戚可不謹與左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢焉然後用之梁惠下天下有道則庶人不議文中子議其盡天下之心乎黄帝有合宮之聽堯有衢室之問舜有總章之訪皆議之謂也大哉乎并天下之謀兼天下之智而理得矣同上名臣奏議盛時諸臣不茍同歐陽修上仁宗杜衍則清正謹守仲淹則恢廣自信韓琦則純正而真直富弼則明敏而果鋭四人為性既各不同雖皆歸於盡忠而其所見各異故於議事多不相從至如杜衍左東請急修邊備富弼料九事力言契丹必不來至如尹右欲深罪滕宗諒仲淹力爭而寛之仲淹謂契丹必攻河洙亦號仲淹之黨及爭水洛城事韓琦則是尹洙非劉滬仲淹則是劉滬非尹洙此四人者可謂公正之賢也平日閒居則相稱美之不暇為事則公言廷争而無私以此而言臣見杜衍等直得漢史所謂忠臣有不和之議而小人讒為朋黨可謂誣矣天子當決羣議司馬光上神宗古人有言曰謀之在多斷之在獨謀之多故可以觀利害之極致斷之獨故可以定天下之是非漢世國家大典禮大政令大刑獄大征伐必下公卿大夫博士議郎議其議者固不能一心有參差不齊者矣於是天子稱制決之曰丞相議是或曰廷尉議是而羣下厭然無有不服者矣議論不可茍同蘇軾上神宗君子和而不同小人同而不和和如和羮同如濟水故孫寳有言周公上聖召公大賢猶不相悦著於經典兩不相損晉之王導可謂元臣每與客言舉坐稱善而王述不悦以為人非堯舜安得每事盡善導亦歛袵謝之若使言無不同意無不合更唱迭和和何者非賢萬一有小人居其間則人主何緣知覺聖人常以天下為心劉述上神宗聖人無常心以百姓心為心言從衆也仁宗皇帝未嘗私意喜怒天下之人謂之善則用之天下之人謂之惡則棄之是以天下稱其聖當觀公議所在劉述上徽宗人主之勢能生殺禍福人而不能變天下之公議堯舜三代之時則公議用於朝廷之上以賞功罰罪進賢退不肖而行於天下至其亂則不發於朝廷之上切切然發於閭閻之間又其甚也誹謗之法以杜天下之口則又不發於閭閻而鬱於人心最甚者莫若秦也立為腹誹心謗之誅則併取其在人心者而去之也然且獨能禁之於一時而卒大肆於後世何則所謂公議者其本與天地並立而是非出於人心之同然不可得而變者也知其不可得變而使或發於閭閻或鬱於人心或肆於後世孰若舉而用於朝廷之上行之天下乎國是出於後世陳權上徽宗是非之心人皆有之古之聖王以百姓心為心故朝廷之所謂是非者乃天下之是非也是以國是之説其文不載於二典其事不出於三代唯楚莊王之間孫叔敖者乃戰國一時之事非堯舜之法也又云蔡卞託經義唱為國是以行其私卞之所是謂之國是卞之所非謂之流俗尊安石而薄神考不可為國乎人主當獨斷張致逺上高宗自昔為天下國家者建功立事未嘗不謀於衆亦未嘗必從於衆然有成有敗有得有失顧從與違能斷與不斷耳故曰謀貴衆斷貴獨謀不衆則利害不盡斷不獨則臧否不決諸儒至論公論行則治世之治也君子在上位而其説行世之不治也君子在下位而其説隱夫説非隱也上之人不能顯其言而用之也雖然君子為是説非一人之私言也天下之公論也天下之公論不能盡隱不行於上必傳於鄉黨閭里而世之好事者常必相與珍貴而扶持之及世之有為則必質前日不用之説以為治取鄉黨閭里之所珎貴而扶持者達之於朝廷施之於四海其効可覩也當漢之治其用人必先曰長者其舉事必先曰大體此固漢之所以為治而非漢之君臣建為此言也因奏之世其説不行而況鄉黨閭里珎貴而扶持之者漢取而用之耳呂本中公論在上則治天下以為當然者謂之公論公論非強名乃天道也此道未嘗廢顧所在如何耳唐虞三代與吾祖宗之時公論在上君臣主之晚周東漢上之人不能主公論所用非其人於是清議在下然在上則治在下則亂可以卜之也元城語君子和而不同君子之道出處語黙安可同也然其志則皆欲立身行道輔世養民此其所以同也光今所言正逆介甫之意明知其不合然光與介甫趣向雖殊大歸則同介甫方欲得位以行其道澤天下之民光方欲辭位以行其志救天下之民此其所謂和而不同司馬温公與王荆公書章蔡倡為國是昔者初立國是使章子厚行之子厚在卞之術内而不知日錄之本謀也子厚既竄黙移是於曽布布亦在卞之術内而不知日錄之本謀也布既竄黙移是於蔡京京於事君之義取諸日錄者十得七八然而鄧洵武薛昻之所講者京不得而預聞也子厚布可謂有才矣皆由其術而不知蔡京謂可奸黠矣尚知其術而未盡卞等國是之謀以鄧綰為忠以呂喜問為且而常立所言為是以薛昻之所學為正以此誣宗廟以此欺聖主以此誑學者以此誤蒼生安石唱於前蔡卞應於後其唱如呼其應如響威之以國是汨之以新經幼之以字説罔之以日錄陳子齊文國是不一變自王荆公變法而患舉朝議者之異已也於是取孫叔敖國是之言以塞一時之議而國是至今不廢矣在熙寧則主變更在元豐則主責實元祐之變熙寧則以復古名而其欲兼用熙豐之舊人者則其號之謂調亭紹聖之變元祐則以紹述名而欲盡空元祐之舊人者則其號謂之朋黨元符末兼收彼此之黨則其號復謂之建中靖國崇寧以來有豐亨豫大之論有遵君享上之論此國是更改之大畧林進漢集議公天下漢置大夫專掌議論茍其事疑似而未決則合中朝之士雜議之自兩府大臣以下至博士議郎皆得以信其己見而不嫌於以卑抗尊也故罷昌陵有議罷郡國廟有議擊珠厓有議賞邊功有議入糓贖罪有議賈誼為博士毎詔令下諸老先生未能言誼盡為之對未嘗以公卿之言廢誼之對也呼韓邪單于願欵塞朝臣集議卒用郎中侯應之䇿朱博得罪議其獄者五十八人而諫大夫龔勝等敢於異将軍二千石之議也王嘉得罪議其獄者六十人而少府猛等敢於抗驃騎将軍御史之議也不緘黙以因人不雷同以附勢不合黨以濟奸不托公以行私惟盡其己之所以言而付之人主之獨斷此漢之集議所以有公天下之意然至屯田之功既成有詔誥前言不便者馬邑之舉既則獨罪首謀以謝天下此又足以警謀議之不謹而無有妄議者矣錢文子制度編主意公意向以決議論一縉紳之議論易一廟堂之意向難公廟堂之意向以平決縉紳之議論也則議論雖異而必歸於同私廟堂之意向以偏主縉紳之議論則議論雖同而亦祗以異甚矣廟堂意向之不可輕也而況四郊警嚴百度垢玩之時乎然理之所在貫古今徹上下合人已惟一公耳公則一私則二理也亦勢也議論之在天下同不必是異不必非特觀主議論者意向之公私何如耳自其廟堂之意向舉出於公也道曰公道王路平平也法曰公法金科炳炳也器曰公器截然冠屨之不踰也心曰公心凛乎神明之可質也公則一矣以此之公一吾之意向以吾之意向揆縉紳之議論則是者公是不以合於我而私其所是非者公非不以違於我而私其所非公則可之其否於公者不以私而可也不公則否之其可於公不以私而否也執此之公以平決縉紳之議論如鑑鑑形如權權物同於公而已矣故曰雖異而必歸於同自其廟堂之意向舉出於私也見曰私見町畦横生也黨曰私黨藩籬角立也情曰私情浩乎在瀾之不可障也心曰私心森乎叢棘之不可芟也私則二矣以此之私一吾之意向以吾之意向揆縉紳之議論則甲之所是公也或以乙之私而非之乙之所非公也或以甲之私而是之便於吾私者可之不便者雖公而亦否也不便於吾私者否之其便者雖私而亦可也行此之私以偏主縉紳之議論如表曲則影曲源濁則流濁同於私而已矣故曰雖同而亦祗以異安正人以抑邪説天下未嘗一日無公論也朝廷不可一日廢公論也而正人者公論之根邪説者公論之蠧今日而欲昌正氣植公論也其在於保護正人而窒絶邪説平化絃新更人心思舊簮纓抗對率苦口利病之言韋布獻忠多痛哭流涕之䇿玉階借地鯾論囘天矣此慶厯間所謂言者紛紛乃朝廷好事時也此建炎間所謂不意數十年復見此氣象時也然愚之所喜者是今日也而愚之所慮者亦是今日也蓋古今之天下不難於籌公論之脉而難於固君子之脉不難於開公論之途而難於塞私眤之途萌孽未滋尋斧已斷曲江之眷方密而鵩羽之歌遽聞宣室之席未温而湘鵩之賦已作甚矣正人之難安也久矣然則可不愛護此善類以愛護此公論歟芟夷雖工惡草易生戚姬之寵既深未必不遲疑於商皓之羽翼弄臣之惑滋甚未必能舉正夫申屠之典刑甚矣邪説之難去也久矣然則抑近倖絶女謁戢私恩者豈非慮公論之易抑易絶易戢歟激隨皆貴乎真讀論語有三畏之章則發為議論者皆真激佩軻書皆曰賢之訓則見於議論者皆真隨激固不患其激也隨亦不患其隨今日之激直言以時病非激乎君子亦何喜其有今日之激也所蹙額者椐牽之踵雖步武能繼於昔人而其心則未嘗有牽椐之真意也檻折之憤雖壯直不減於前輩而其心則未嘗有折檻之真意也如是則激非真激激過於詭矣柔言以和國是非隨乎君子亦何嘗全惡其有今日之隨也所顰顔者心叶之論雖塤箎迭奏於衆口而其心則未嘗有叶心之真誠也朝和之象雖項背相望於盈庭而其心則未嘗有和朝之真誠也如是則隨非真隨隨過於詭矣蓋詭者不正之謂也甚而不顧理之是非以詭激為相尚不顧事之曲直以詭隨而同宜其負聖經三畏皆曰可之戒罪莫大矣尚忍言哉治亂惟公議所在天下有道則公議在廟堂朝廷清明則公議在臺諫君子小人相參而不相能則公議在縉紳上無道揆下無法守天下名節慷慨之氣日趍於委靡頽敗之域則公議在草茅公議天下之元氣也周流乎宇宙之間不在此而在彼治亂存亡安危得失顧其所在如何耳公議在廟堂則天下享公議之實而公議之名常隱於文學法理各稱其職百工技巧咸精其能之問公議在臺諫則有濫觴而無波蕩廟堂畏之言如聞父母名則夫毫釐之失皆思慮有所不及而非直情也公議在縉紳則天下之勢有勝負然君子任道小人任術道終不足以勝術也故勝亦負負亦負所幸者雖不能伸公議之快於一時而所以壽國家之脉於異日皆今日不勝之功也故君子最重焉亦最畏焉若夫公議在草茅則天下之元氣去矣攅眉於閭閻之間抵掌於江湖之上果何益於人之國哉設監謗之官嚴偶語之禁天下公議之口雖不嗚而天下公議之心固已勃勃而不可遏矣故夫公議在縉紳則雖縉紳不幸而天下之幸猶自若公議之在草茅則縉紳之幸而天下之大不幸也偶句立議論貴正正則不激不隨足以立天下之事功主議論貴定定則不撓不囘足以用天下之議論君子之脉既固則公論之脉愈固邪説之途不開則公論之塗益開警叚國是定則論定向以境上當復而議用兵今以師徒沮衂而復議和矣向以楮弊不行而議换易今以兩界沓出而又議收矣向以老弱占額而議揀汰今以訛言胥動而復上向以武備不精而議教閲今以犒費不貲而復輟鼓鑄有議隨廢羣置有論且罷且行夫言之必可行也行之必可續也而朝出暮入乍作乍輟迄無定論有同兒戯昔之舉事有以謀及卿士為未足而謀及庶人者昔之用賢有以問之左右為未足而問之大夫國人者一鹽鐵之罷公卿有議賢良文學亦有議一號令之出討論有人修飾潤色又有人一罷兵屯田之請初是什三十是什五最後什八古人主張國是謹重若此今胡不然國亂不定則是非交至無恠矣公議有三逸惟是廟堂不肯任公議之責故公議逸而奔臺諫臺諫不受則又逸而奔縉紳縉紳或受或不受則雌雄之勢吾又未可知也嗟夫道學能使人重而不能使人愛功利能使人嫌而不能使人忘自功利之根盤結夫人之心則不受者乃其常而受之者非其真情也向為身死而不敢敗公議今以其宮室之美妻妾之奉左公議之祖者過半矣向為身死今不敢敗公議今以其權勢之臨刑戮之威倒公議之戈者過半矣向為身死而不敢敗公議今以其世塗之險巇人生之萍梗則其悔者又過半矣三敗之餘公議之存甚能有幾哉是則公議至此則縉紳又有所不受也莫尊廟堂莫切於臺諫莫博於縉紳而皆無所容則夫逸而草茅乃其勢然也君子同心定國論變國論易定國論難非國論之難定也人心之難一也何謂一君子同心而為小人之所撓是也不外附於君子之列而内附於小人之儕是也言一矣國論具有不定乎嗚呼今日之公論明矣然吾謂必先有一一人心而後可以定國論蓋君子之心未同則不可謂之一小人之去未盡則不可謂之一中亡於兩可之間而且喜且懼則不可謂之一且元日一詔聖心已白矣向猶曰小人未必不復合而能擠䧟我也今無之矣向猶曰大奸未必不再入而能禍福我也今無之矣夫如是則以韓范諸公上殿如争下殿不失和氣之事為法以司馬公夫若作宋決無是事之言為的以歐尹諸公一士去則合疏必爭之舉為准國論其有不一守局面其有不定乎上下以道自任所言公公言之所言私則無私宋昌之決大議可法也今日私恩明日公法蘇章之曲盡人情可師也不可干以私吾何可不為于定國至公無私吾何可不如第五倫講明及此公道其冇不著乎無偏無黨皇極有明訓也以公滅私周官有格言也任官惟其賢可也毌專及於私昵行法均於衆可也毌獨不問於南陽惟行及此公道其有不興乎偶句天下有公是非左劒而右佩隂主而陽諱人心有公議論此枘而彼鑿名是而實非借一是之名藥石時難之沉痼箝百家之口鍼砭國體之膏盲雷同一説隨聲遷流知求己勝而不求理勝首䑕兩端順意逢迎知為身計而不為國計指鹿為馬非是也用事者以為是䑕竊狗偷非是也獻諛者以為是唯唯以為同則其同也不幾於詭隨嘵嘵以為異則其異也不幾於求勝可謂不和而未必皆君子之不同可謂為黨而未必皆君子之為朋事勢固有成敗矣而理之是非不可誣也衆説固有異同矣而心之可否不可亂也隠之於心而安雖循衆人之論而不為茍同揆之於理而愧雖咈衆人之論而不為茍且事證帝王國論之公徂征之師禹以為泰命益以為招損東征之舉周公以為圖功而邦君御事以為艱大卒之有苖來格見於七旬禹曽不以益之言為戾已我有大事體周公亦不以邦君御事之説為敗謀商周能酌人言遷臺之役而險虜之説行東征之舉而艱大之言起王曰可遷而民曰不可遷王曰可征而民曰不可征其可否若難叶也聖人方且含容隠忍綢繆委曲告之以話言遲之以日思不惟不怒其謀之不叶亦不敢過其言之非是各宣乃心之語無怒于恤之論亹亹然不絶諸口疑若優游姑息者之所為不顧也漢唐能主國論北主燕趙東擊齊南絶楚之糧道而西㑹于滎陽非信之定計乎然非高祖聽其計則雖信不能成其勲先定漁陽取逐郡收富平而東下齊非弇之本志乎然非光武遂其志則雖弇不能底其績以至和戰之議王恢韓安國之枘鑿武帝舍安國而信恢其後反以誤國屯田之議充國朝臣之氷炭宣帝從充國而詰朝臣其後果以平戎漢國論有是非高祖興削平煩苛專務簡易傾心以聽惟将相一二功臣耳末年太子之廢雖出於四老人定之向非張良主於内周昌諸臣主於外則一介疎逺必不能一言為帝輕重也曹參畧猜忌而遵蕭何之約束則卿大夫以下欲言而不敢言陳平許其請以封諸呂之爵則大臣有口欲爭而不容爭以至大臣絳灌力斥少年紛更之請丞相衞綰請罷申韓蘇張亂政之學此見漢初功臣主張國論之力自新進用事大臣見絀朔方之議屈於侍中流民之議屈於九卿尊號之議屈於外威矯制之議屈於谷永卒養成天下謟佞之俗東漢雖有公議之名無預君相之事李膺范滂之徒一戰不勝公議敗績而漢鼎亦不復支然則公議在下而不在上豈天下之福哉從違不可輕漢朱崖之議不從衞忠大夫陳萬年而從待詔賈捐之請罷邊備之議不從羣有司而從郎中侯應之言受降之議不從卿議者而從光祿大夫谷永單于朝請之議不從公卿而從黄門楊雄棄凉州之議不從大将軍鄧隲而從郎中虞詡閉玉闗之議不從公卿而從司馬班勇交阯蠻之議不從公卿百官四府掾屬而從議即李固涼州亂兵之議不從司徒崔烈而從議即傅爕決擇在乎審觀古昔故訂國論切有得於人言從違之故奉春君言匈奴不可擊也而高帝違之卒有平城之敗是人言不可不信也温彦博言處突厥於塞下而太宗從之卒有番戎之釁人言其可以輕信乎王恢言馬邑之事而武帝聽之至於兆三十年之禍是人言不可輕信也柳渾料平涼之盟必敗而德宗咈之不能不失聲於夜半之飛奏人言其可以不信乎本朝大臣主國論國朝公論之權不在縉紳不在草茅凛凛然廟堂之上繁星麗天斗杓芒寒江漢滔滔朝宗于海噫可敬也利害文字焚之通衢則太平興國之國論在趙中令更張議論一切不行則天禧祥符之國論在李文靖借契丹其朝廷許之卒奪於呂夷簡之一言殺繼遷毌福府行之而終屈於呂端之一奏澶淵之役王欽若言之陳堯叟又言之而寇莱公獨力赤幟確然不揺奉濮園之議臺諌争之列曹又争之韓琦壁立萬仭屹然不變也元祐革弊之議朝論洶洶或説以異日朋黨之禍或告以不可為暴革之患温公拯溺救焚不暇他恤蓋中流砥柱萬折必東也本朝集議之公在真宗時棄靈州之議楊億以為存之無益左右輔臣以為靈州乃必争之地城綏州之議正公旦呂公䝉王以為修之不便向敏中揚公拯陳公堯叟以為修之便三司判官與大臣辨論不嫌於論抗尊下由吳幸蜀之議特屈於寇公準一人耳上嘗謂旦曰朕每與臣議事但務從長雖言不盡理亦優容之所冀盡其情也則真宗優容輔臣之意可見矣在慶厯中元昊未臣遣使多所要請兩府厭兵欲姑從之獨韓公琦以為不可知高郵沈仲約出金帛迎富公弼欲誅以正法范仲淹欲宥之杜衍欲罪滕宗諒范仲淹則争之仲淹請備邊富弼則以謂契丹必不至尹洙號韓范之黨及爭水洛城事洙則以為不便歐陽修言有三利琦則條十三事以為不可各執所見不務雷同其後至和黄河之議貫昌朝欲開故道文彦博欲修六塔歐陽公欲疏其下流浚以入海治平濮園之議司馬公光奮筆立議宜稱皇伯而不名中書韓公琦等議稱皇考臺諫紛然以為不可迨熙寧初安石改立新法上而顧命大臣如韓富歐陽之徒下而賢士大夫如呂范二蘇之屬皆毅然力排其非而安石一切詆為流俗援國服為息之説以駁韓公之議而司馬光欲除樞副則又以有除拜衆言紛紛為害政之事而公以如此乃朝廷好名為異論立赤幟之説拒之神宗之初司馬公朝廷毎事又謂今天下洶洶者孫叔敖所謂國之有是衆之所惡公以為黨察其是非然後守之既哲宗之初司馬公當國欲復祖宗之法一時議者紛然以三年無改於父之道為言而公以救焚拯溺之心謂宣仁聖烈以毌改子非子改父於是衆議乃定厥後差役之議温公主之而蘇軾條陳其不可韓公維亦以六條駁之開河之議也文彦博主故道范純仁主新道而蘇公軾亦以道之東流為非郊祀合祭之議蘇公轍援昊天有成命以為宣而劉公安世復以為非是蔡確以語言文字得罪於呂大防文彦博皆謂當然而范公純仁王公存反覆開陳深以後事為憂范公純仁嘗議改畿内保甲王公存獨以為無故而廢之不可則知二公非茍相比者前輩不茍同司馬論張公方平不同於方平者也公事公言之奚害於可馬方平之和劉元城疏范忠宣不同於忠宣者也公過公論之奚害於元城忠宣之和徂徠先生作怪説以闢楊文公徂徠非如丁謂之忌文公也正所以愛文公也唐質肅公以專權斥文潞公質肅非如劉沆之譖潞公也正所以愛潞公也迺若朱光庭為師報復而謂蘇公軾不識大體孔文仲為浮薄輩所使而謂伊川汙下險巧則萬世而下自有公論奚庸以口舌為爭哉又奚庸以茍同為同哉時政今日國是屢變昔者事在權臣以主和為國是國勢趍弱以恢復為國是自恢復之名立大言無突於是乎以責實為國是責實之名出又恐不能成功也於是乎以守法為國是守法之名出實行其私於是乎君子以嫉邪更化為國是又恐小人擯棄之甚也於是乎又復以皇極為國是而翕受君子小人矣公論未定今之公論所以未定乎蓋自權臣陵滅天性民彜之正一時廷臣趍勢附和倡為邪論使君君臣臣父父子子之義不明於天下幾欲胥吾國而陵夷吁可畏哉所幸天日清明魑魅鬼蜮不容呈露然而雖以公論抑之而隂覆曲護未能免柔道之牽雖以大義折之而毁廢正罪未能明楊庭之決羣疑衆憂皆有謀猶囬遹何日斯沮之嗟然則是是非非涇渭别白焉可疎畧蓋邪之與正其不相入如氷炭其不相入如薫蕕未見可以兼容並蓄而不為害者也議論沮玩轉為隨且天下但見今日某臣上一章曰言正國本其議論激矣然而其激本自激也明日某臣上一章曰言固君子其議論激矣然而其激自激也又明日某臣上一章曰言絶小人其議論激矣然而其激自激也未聞斷以不疑即令降詔而曰此事豈可使婦人知之者也未聞召用純良奸臣揺撼也上疏而不報者也未聞魁奸逺竄私表陳請南郊肆赦獨不原其罪者也時方建明雲披風靡還踵施行水止風休彼方疾聲而大呼我且緩應而降詔彼方抵掌而扼腕我且拱揖而步趨嗚呼一激之氣不知堪幾玩而幾沮邪多慾之言汲黯之議論激矣黯能一發於建元之初而不能再發於建元之後奏鳯一疏王章之議論激矣章能一陳於建始之際而不能再陳於建始之餘非不能也天下之有所激者畏有所玩也天下之有所玩者必有所沮也玩沮之餘隂喪其節隂鑠其氣隂挫其剛由是而為衞侯言計和於一口矣由是而為王導一言舉坐稱善矣由是而為淮蔡有議暗決唱聲矣由是而為公孫𢎞之阿旨矣由是而為蘇味道之模稜矣國論不同今日朝廷一議論百官一議論州邑一議論學校一議論田野又一議論愚謂事變日改上下異議不足駭耳可否殿陛之上者自有一議論則可駭也且揮天戈而長驅援義旗而比指謂河洛指日可清此前日議論也今則曰豺狼遁矣巴蜀尚可理乎敵騎退矣䕫子尚可戍乎萬馬奔湍固可恃也絶河源之故智尚可慮乎此則今日議論也且草青哨遁棗紅哨來惟清野可以杜其驅此前日議論也今則曰議屯田矣淮堙尚可理乎議畫江矣江北尚可葺乎强敵不侮邊塵尚可安也議光黄之經理尚可緩乎此則今日議論也一議論不能決裂矧觀今日之證則厲聲疾呼排雲呌日又豈止痛哭流涕長太息而已哉是故與其箝口縮舌孰若明目張膽與其隨聲毁譽孰若肆言無忌與其為立仗之馬孰若為殿上之虎與其噤聲之鳥孰若為獨擊之鶻寧牽裾折檻以觸雷霆之威不可阿諛希旨逢君之惡寧碎首玉階以批逆鱗之怒不可軟美迎合以固已之位是非喜於激也亦非專於訐也譬之精神不振痼疾纏身茍不藥之以孟浪之劑則氣脉之衰者将無自而盛矣此今日言論之氣脉士君子所當自立不可以難堪之聽已甚之言而遽從中輟也挾私者恐其公是垂涎於夾袋中之物色者則不欲夫人之為是言朶頤於中書堂之札筆者則不願夫人之為是言至於頂踵恩造之賜而預名於私門桃李之數者則又疾夫人之為是言噫嘻涓涓之溜瀦而為澎湃之聲熒熒之熖嘘而為焚燎之禍結尾主議論者當有人嗚呼趙營平留屯之奏正論也而初是什三中是什五且不能不揺於盈庭之言自非有居中主其議者是亦築室耳夫晉公平蔡之謀正論也而或幸其則或沮其成且不能不奪於左右之口目非出居中撓其計者是亦棄井耳愚不知今日主議論者果有弱翁否果有吉甫否茍有弱翁奚患留屯之不成茍有吉甫則平蔡之功不患其不立也惟顧廟堂如何耳當如先王之和愚願今日有先正諸公之和而不願今日有荆公諸人之同如為先正諸公之和則争可也不爭亦可也如為荆公諸人之同則争固非福也不争亦非福也大抵如先王之和者落落晨星如荆公諸人之同者十之五六吁城狐社䑕依憑風雨予猶於此輩凛凛議論皆出君子雖然亦在諸君子自勉力耳劉公摯冇言前者二三大臣之朋黨皆失意怏怏睥睨正人隂幸朝廷之失欲追還前日之人王岩叟之為僉書也拜命之始面陳用人之説謂邪正難辨固有外與衆同而中之懷異趣不以今日之事為然者諸君子曽為此慮否乎詆前日之非不若求今日之是責小人之過不若求君子之功機㑹幸已鼎逄好事莫教蹉過堅定以疑國是慷慨以結主知上前議論各别下殿不失和氣期於日改日化剗舊觀而一新之公論之明直與日星争光何寂鄧禹笑人於地下乎大臣持綱以去蠧且言論國家之元氣也内無蠧心之言則可以植公論之根外有格心之言則可以壽公論之脉如使血脉壅塞於廟堂而格心正大之訓不明則根本蝕於佞倖而蠧心纎簧之巧滋甚此愚所以重嘆今日為公論之蠧者在貴近女寵而所望以持公論之綱者有二三大臣蓋宰輔者公論之綱未有綱散而目張佞倖者公論之蠧未有蠧生而本植芳秀蔓草難圖萌甲方芽螟螣頓長愚恐彘姬之寵艶方深則周昌之七劑難投力士之固蔕愈滋則長庚之翰墨莫寫今日而欲植公論之根可不抑近倖絶女謁戢私思先有以去公論之蠧歟玩萎方甦神觀未復股肱瑟縮浮脉昏沉思意孔明未殁則黄皓何至於亡人之家九齡猶在則貴妃何至於擅國之寵今日而欲壽公論之脉可不責宰輔而先有以持公論之綱歟有以持公論之綱則可以去公論之蠧惟廟堂力主之言論不可太激且天下固有全當適平之理過於懦與畏不可也過於激與訐亦不可也國論未定正邪用事君子亟於拯溺切於濟時則亢言直論寧過於激與訐未害也國論既定衆芳交集士君子能以至當適平為心毋沾名每求勝毌力競而私争則雖激猶平也雖訐猶和也元祐諸賢非不欲扶持公議然攻擊之過排軋之深適足以稔小人反覆之過雖異時調亭之説似可消弭競心而氣脉之所傷多矣愚願今日諸賢持議論之正去意見之偏適義理之平以慶厯諸賢為法以元祐諸賢為鍳使元祐之後為皇祐毌使元祐一變為紹聖則天下幸甚羣書㑹元截江網卷二十
