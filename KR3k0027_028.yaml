body:
  text: 羣書㑹元截江網卷二十八役法附軍役雇役丁役免役保役義役差役歷代事實齊大公曰帝堯王天下不以役作害民耕種之時六韜三王人情莫不欲逸三王節其力而不盡也朝錯策周用民之力嵗不過三日君有餘財民有餘力而頌聲作賈山至言文王大夫逺行從役不遑寧處其室家能閔其勤勞勸以義之詩殷其雷成王大宰以八則治都鄙八曰田役以馭其衆小司徒掌凡征役之施舍乃均土地以稽其人民而周知其教上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羡惟田與追胥竭作鄉師以國比之法以時稽其夫家之衆寡辨其可任者大役則帥民徒而至致其政令既役則受田里之役要以考司空之辟以逆其役事大軍旅㑹同正治其徒役戮其犯命者鄉大夫以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍州長若國作民而師田行役之事則帥而置之族師各掌其族之戒令政事校登其族之夫家衆寡辨其貴賤老幼廢疾可任者五家為比十家為聯五人為伍十人為聨四閭為族八閭為聨使之相保相受刑罰慶賞相及相共以受邦職以役國事若作民而師田行役則合其卒伍簡其兵器以鼓鐸旗物帥而至均人掌均地政均地守均地職均人民牛馬車輦之力政凡均力政以嵗上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉凶禮則無力政無財賦不收地守地職不均地政遂人掌邦之野以嵗時登其夫家之衆寡辨其老幼廢疾以頒職作事以起政役禮地官胥徒注此民給繇役者若今衛士矣天官注北山刺幽王也役使不均君子于役刺平王也君子行役無期度秦始皇以千八百國之民自養力罷不能勝其役勞苦者不得休息饑寒者不得衣食賈山至言秦用商鞅之法又月為更卒以復為正一嵗屯戍一嵗力役三十倍於古前食貨志至於始皇內思動作外攘夷狄發閭左之戍海內愁怨同上漢律升二十三傳之疇官漢儀注曰民年二十三為正一嵗為衛士一嵗為材官騎士年五十六乃免為庶民前髙祖紀注髙帝二年舉民年五十以上有修行能率衆為善置以為三老復勿徭戍本紀景帝二年令天下男子年二十始傳注傳著也著名藉以給公家徭役本紀武帝天漢四年發天下七科謫注吏有罪一亡命二贅壻三賈人四故有市藉五父母有市藉六大父母有市藉七本紀昭帝元鳯三年以前通更賦未入者皆勿收注如淳曰更有三品有卒更有踐更有過更古者正卒無常人皆當迭為之一月更是為卒更貧者欲得顧更錢者以直者出錢顧之一月二千是謂殘更天下之入皆直戍邊三日亦名為更律所謂徭戍也諸不行者出錢三百入官官以給戍者是為過更也此漢初因秦法行之後遂改易有謫乃戍邊本紀孝宣甘露二年减民算三十孝成建始二年减天下賦錢算四十本紀後周太祖創制六官司徒掌力役之政令凡人自十八以至五十有九皆任以役豐年不過三旬魏初不立戶長故民多䕃附者皆無官役豪强誅斂倍於公賦李冲上言冝凖古法五家立一鄰五鄰立一里長五里立一黨長長取鄉人强謹者於是遣使者行其事海內安之隋文帝嵗役不過二十日不役者取其資末世賦役重故人往往自折肢體謂之福手福足煬帝建洛邑每月役丁二萬人道路至河及淮又引泌水達河北通涿郡築長城皆召百餘人丁男不充以婦人兼役而死者大半隋志唐租庸調法男女始生為黃四嵗為小十六為中二十為丁六十為老用人之力嵗不過二十日閏加兩日不役者日為絹三尺謂之庸有事而加役十五日免調三十日租調俱免通正役不過五十日水旱霜蝗田耗十六者諸役皆免凡新附之戶春以三月免役唐志太宗言及閭閻疾苦則君臣同慮議息徭役陸贄奏議貞觀初護民之勞育之如子不輕營為頃既奢肆思用人力乃曰百姓亡事則易驕勞役則易使魏徴十漸疏偶句宋城之役春秋所怨酈山之戍秦民不堪周之役無過家一人唐之役不過二十日漢景帝令男子二十始傳晉武帝令男子十六為丁巧於使民則有大舜之法在焉說於使民則有夫子之訓在焉觀伯兮之詩則民之弗安於室者役害之也觀鴇羽之詩則民之弗克致孝者役困之也軍役秦禍北結於胡南連於粵行者莫旋往者莫反因以謫發之名曰謫戍漢書蕭何發關中老弱未傳者悉詣軍髙紀隋煬帝發天下兵以征遼東百姓怨叛通鑑或從十五北防河便至四十西營田去時里正與裹頭歸來頭白還戍邊杜兵車行吏呼一何怒婦呼一何苦聽婦前致辭三男鄴城戍一男附書至二男新戰死存者且偷生死者長已矣老嫗力雖衰請從吏夜歸急應河陽役猶得偹晨炊杜石壕吏詩丁役漢孝景二年今天下男子二十始傳晉武帝平吳後有司奏男子年十六以上至六十為正丁十五以下至十三六十以上至六十有五為次丁十二以下六十六以上為老小不事宋孝武王敬宏言舊制人年十二半役十六全役北齊清河三年令男子十八以上六十五以下為丁十六以上七十以下為中六十六以上為老十五以下為小隋文帝令男子三嵗以下為黃十嵗以下為小十七以下為中十八以上為丁以從課役開皇三年乃令以二十一成丁焬帝以二十二成丁唐武德七年定令十六為中二十一為丁六十為老神龍元年元宗天寶制十八以上為中男二十以上成丁廣德元年制男子二十五成丁五十五入老並通典雇役孝昭元鳳三年以前通更賦未入者皆勿收詳見前北齊文宣始立九等之戶富者稅其錢貧者役其力通鑑唐不役者日為絹三尺謂之庸唐志偶句唐之戌邊月顧三千唐之不役日絹一尺出錢三百官以給戌西漢之雇役也富者稅錢貧者役力北齊之雇役也差役唐武德中令天下戶量其資産定為三等九年詔天下户三等未宜升降宜為九等天寶中敕定戶籍宜委縣令與鄉村對定審於衆議察於資財不得容以愛憎以為高下太守詳履不平者明立簿書每差科先從高等開元復戶籍久不更造丁口轉死田野賣易天寶中制聞百姓或為稽避父母見在别籍異居令州縣勘㑹其家有十丁以上放兩丁征行賦役五丁以上者放一丁即令同居以厚風俗德宗時楊炎為兩稅法戶無主客以居者為簿人無中下以貧富為差商賈稅二十之一與居者均役宣宗時詔每縣據人貧富及役輕重作差役簿送刺史按驗記鎖於㕔每有役事委令據簿輪差偶句元宗敕定戶籍委縣令察其資財先差髙等宣宗詔作差簿送刺史鎖㕔按驗據簿輪差保役大司徒令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賓周禮齊桓公用管仲乃作內政而寓軍令焉故卒伍定乎里而軍政成乎郊連其什五居處同樂死生同憂前志子産使田有封洫廬井有伍左傳朝厝言古之制邊縣以備敵也使五家為伍伍有長十長一里四里一連十連一邑故卒成伍於內軍政定於外同上後周始立保正之法頒新令制五家為保保有長保五為閭閭四為族皆有正畿外置里正比閭正黨正比族正以相檢察焉有品爵免課役隋志皇朝事實太祖乾德四年詔曰五代以來兵亂相繼國用不足庸調繁興朕歷試艱難周知疾苦優恤灾殄率從蠲復事略太宗至道三年上曰治邑之才但公清不撓即為良吏今之縣政鮮不徇情失正每均徭役上戶每以勢免貧弱獨受其弊長編興國五年程能言諸道州府民事徭役未嘗分等慮有不均望下諸路運司差官定為九等上四等免役下五等並免真宗咸平五年詔有司力役之無名營繕之不急者悉罷之同上祥符中上曰朕每念民人困匱思有以救之必欲惠及農民在寬其徭役而已寶訓高宗紹興四年上曰役法推行浸久失其本意富者益富貧者益貧民力愈困此宜講究聖政軍役仁宗時有司議發民伐濱河榆柳以塞决河上以妨農命調兵以伐之又泰州築捍海堰以障民田初興役雪寒民兵多死比再興役止命發卒興治毋得調民寶訓丁役太祖建隆三年發曹單丁夫數萬後五丈河上謂侍臣曰勞民奉己之事朕必不為今後河蓋不獲已也通鑑太宗興國赦曰江南西浙荆湖南北人戶見有身丁錢今後並以年二十成丁六十入老未成丁巳入老者並與蠲免長編保役神宗熙寧二年司農寺定畿縣保甲條制選官於開封祥符兩縣團成保甲俟成次序以漸及他縣上曰用募兵與民兵亦無異安石曰役之過苦則變成然募兵多浮浪非良農之比文彥博曰五家為保猶云可也今乃五百家為一大保則其勞擾可知八年司農寺言保甲之法客戶五家相近者為小保五小保為大保十大保為都保元豐二年詔廣東保中𨽻以武事司馬光言保甲畎畝白徒教閲雖熟未嘗見敵與戎狄戰鬪必望風奔潰伏乞並罷使歸農元豐末他路保甲擁兵入縣鎮賊殺官吏冦盜通行數州獨河東保甲不為犬吠之盜哲宗元祐元年三路保甲罷團教其器械赴官送納並統類吳育知蔡州蔡故多盜公按令為民立五保而簡其法民便安之盜賊為息言行録差役顧役免役大祖建隆詔縣令佐檢察差役務底均平長編英宗治平四年詔中外臣庶限一月條陳差役利害實封以聞趙抃陳薦同詳定所差役利害神宗時祖宗之法既變獨役法新舊差募二議俱有一吳蜀之民以顧役為便秦晉之民以差役為便荆公與司馬溫公皆早貴少歷州縣不能周知四方風俗故荆公主顧役溫公主差役蘇內翰范忠宣溫公門下士復以差役為未便章子厚荆公門下士復以顧役為未盡三人雖賢否不同皆聰曉吏治兼知南北風俗其所論甚公各不私於所主元祐中溫公復差役改顧役名臣傳神宗初韓綘言害農之弊無甚於差役之法重者衙門多致破差次則州役亦須厚費又有鬻田産於官戶田歸不役之家而役并歸於本等其他戕賊農民未易悉數望令中外臣庶悉具差役利害以聞詔從之役法之議自此而始王安石當國遂罷差役之法使民出錢募役而中丞楊繪言難行之說有五而劉摯亦陳十害當時縣令有以議役法而相率去官者浙西之民有上善户出六百貫省廣西一路之民出役錢至十九萬緡募役錢實用十四萬緡餘五萬緡謂之寬剩者神宗嘗謂呂公著曰民間不知有役者公著對曰然上戶坐以役多破家今則飽食安居誠幸矣下户者無役今出錢則苦矣上曰然則法亦當更也哲宗初司馬光以為使民出錢顧役何異割鼻飼口遂言免役之害有五而請罷其法是時御史孫括言宜斟酌施行務在合宜范純仁言法固有不便然亦有不可暴革蘇軾亦言衙前一役只當招募不當定差其意以謂差役者弊當改但不當於顧役實賣之錢多取於民若量出為入無多取民錢則亦足以利民司馬光不然其說遂復差役之法亦有不便於民者至紹聖初則復改而為顧役矣哲宗嘗言止用元豐法而减去寬剩錢百姓何有不便耶紹興元年曽布言自元祐初更張役法以來間知免役為便不可改並長編高宗紹興因奏保正耆戶長元立法止合管煙火橋道今承領文書市物顧夫以至縣官私用之物種種責辨病民莫大於此上曰朕頃在河朔親見其弊知縣不得其人一充役次即便破家寶訓乾道六年敕文保正之役為良民之害致破産者十常八九今擬㑹元豐八年詔耆長壯丁之役皆募充保正甲頭承帖人並罷孝宗淳熙十一年御筆差役之法為日益久近年以來又創限田之令然則州縣行之不公豪貴兼并之太甚宵旰以思莫若不計官民一例輪差並聖政自髙宗紹興中始修常平免役之令其後嵗月侵久論建滋多視舊法或㫝牾吏緣為奸淳熙末陳居仁因諸下敕令所取祖宗免役舊法及紹興後續降指揮精加參考萃為一書名曰役法撮要布之天下雜記寧宗嘉定十二年臣僚言欲明示中外郡縣之臣自今以往差役從公而毋使豪民右室享安逸之便而差役之勞反及於田氓稍有不公之患許從監司以聞官吏盡置於典十四年臣僚言凡今後官品之家若限田之數未滿則以限法免役若限田之數已滿當以踰限均役並續長編義役孝宗乾道十年范成大奏處州松陽縣有一兩都憚充役破産之苦議各出田業以助役户大槩隨役戶之多寡量家力之厚薄輸金買田永為衆産遇當役者以田助之又自詳議比排役法以名聞官蓋有排至一二十年者既免爭端又無破家竭産之患田里雍和幾有古風名曰義役聖政八年處州布衣上書申言義役詔知州李翔條具翔請民田百畝無問官民僧道皆出三畝以助保正長然官民僧道既出丁役焉又取其田以助役者是再役也蔣繼周因論其擾民云雜記偶句差役之法罷於熙寧至元祐而復未幾而再罷雇役之法罷於元祐至紹聖而復逮今而不罷上户每以勢免貧弱獨受其弊太宗之言也必欲惠及農民在寬徭役而已真宗之言也知縣不得其人免役即便破家髙宗之聖訓也州縣行之不公豪貴兼并太甚孝宗之御筆也名臣奏議役法不過差免二者泰少游奏曰夫所謂役法者其科條品目雖曲折不同大抵不過差免二法而已差役之法雖曰迭任府史胥徒之士率數年而一更然而捕盜者奔命不遑主藏者備償無算困倉竭於飛挽資産破於厨傳執事者患其弊也於是變而為免役之法雖曰嵗使中外之民悉輸獻直以免其身然而平估至於室廬檢括及於車馬裒多以為寬剩厚積以為封樁則其弊有甚於差役者矣蓋差役之法不弊則免役之法不作免役之法不弊則今日之議不興然而士大夫進用於嘉祐之前者則以差為是而免為非進用於熙寧之後者則以免為得而差為失私意既搖於中公議遂移於外矣行義役有四弊朱熹奏曰本州自今奉行却有未盡善者如今上户官戶寺觀出田以充義田此誠善矣而本州却令下戶只有田一二畝者亦皆出田或令出錢買田入官而上戶田多之人或却計㑹减縮所出殊少其下戶今既披科出田將未却不免役無緣復收此田之租乃是困貧民以資上户此一未盡善也如逐都各立投首管收租排定役次此其出納先後之間亦未免却有不公之弊將來雖施刑罰轉添詞訴此二未盡善也又以逐都所排役次今日已多有不公而况三五年後貧者或富富者或貧臨事未免却致爭訟此三未盡善也所排役次以上户輪充都副保正中下戶輪充夏秋户長上户安逸而下户倍費此四未盡善也凡此四事是其大槩目下詞訟紛然何况其問更有隱微曲折未可猝見官吏以役為市寧宗嘉定六年臣僚論成周㑹民卒伍以比逮胥使之相保相受合衆力而共為之非獨役也辨其可任以役國事歲不過三日非常役也後世以一都一保之役而萃於家仍歲而不得免故雖大家巨室有所不堪於獨役而後相率為鳩役若保正之義倉保長之總頭皆良法也然則州縣之吏以役為市利於官之差役不利於民之鳩役於是義倉之敗壞總頭之紛擾官不能主之而使吏得甘心焉民間之苦特未知其所終也偶句言差役輕重相等者東坡也言差顧利害相半者潁濱也楊繪言助役之法則謂其說有五劉摰言助役之法則謂其患有十民苦於役則有願置私田以供給者官重於役則有欲給官田以募役者以差顧二法付之有司者李常言也以差免二法别為一書者秦觀言也熙寧大臣言衙門既罷减舊費者十有四五乾道臣僚論保正之役致破産者十常八九溫公門人蘇子瞻則議溫公差役之不便荆公門人章子厚則議荆公顧役之不便諸儒至論漢役法與今異錢文子曰漢十里一亭亭有長十亭一鄉鄉有三老嗇夫游徼三老掌教化嗇夫聼訟收稅游徼循禁盜賊在今為都正長是也然漢之役於鄉亭者率有祿秩積其功勞而推遷雖上至二千石無限也張敞以鄉有秩而補太守卒吏朱邑以鄉嗇夫而補太守卒吏游徼主鄉捕盜有績而府已著其閥閲故一鄉之中各有攸司職教化者無與於獄訟收租稅者無與於盜賊各出其力以盡其職而縣令丞得以拱手而仰成今一切役以民户而祿秩不加焉一人之身責之警捕責之催斂責之橋梁道路之繕修而縣有雜須則又從而科索之其為役也擾矣免役保甲所起臨川曰免役之法出於周官所謂府史胥徒王制所謂庶人在官者也保甲之法起於三代兵甲管仲用之齊子産用之鄭商君用之秦仲長統言之漢而非今日之立異也然而天下之人鳬居鴈聚聚散由之四方而無禁也者數千百年矣今一旦變之使行什五相繼鄰里相屬察好而顯諸仁宿兵而藏諸用茍不得其人而行之則搔之以追呼駭之以調發而民心搖矣有募法而强差水心曰蓋昔保吾其民而有保正副將以兵法部勒其下而其法曰募其材勇及物力最髙者户長則以催科耆長則以追胥而皆有顧熙豐之法其分畫詳明如此然猶紛紛而不能定其後艱難用度日缺講利源者無所取材以為戶耆長者亦不願請故取其窠名以起發立供而耆戶長之役盡以歸於保正副然則今之保正副募法未嘗不存而未嘗不强差也偶句論無為之役法龜山則有天下不同之嘆論湖北之役法南軒則有修正其害之事溫公欲變新法伊川且有未可輕動役法之言子瞻更定役法伊川復有無以杜絶人議之慮世祿之家若可以舍役矣橫渠不與其怙勢而茍免鄉鄰之近若難以平一矣明道必為之按藉以定差主意民心恱於從役出力以供君命者天下之所當然立法以任民力者君命之不得已蓋為民者固不可無樂於奉上之義為君者亦不可無說以使民之心夫如是則役法可得而論矣昔者觀之五兩軍師之法具而兵役在民社田追胥之法具而徒役在民均田均役有其政而工役又在民府史胥徒有其人而胥徒又在民若夫比閭族黨鄰里都鄙莫不有法以使之相保相愛則鄉役又在民夫此五役悉萃於斯民之身其法亦幾於勞民矣然當時之民非惟不以為勞且欣然相與從事於其間公田之先治而雨我之願不能忘入執於宫功同稼之歡不容釋是果何術以使之也推原其故亦其仁厚之澤愛敬之風所以浹洽人心而鼓舞斯民者固超軼乎是法之外有非徒法者所可例言役法貴乎公有公法有公道揭之象魏正大無私著之令典明白可據此役法之所謂公法也州縣奉行無所觀望强弱相安不容請托此役法之所謂公道也惟其立是法於朝廷者既出於公而用是法於州縣者亦出於公則有産有役孰得而辭之當為而為孰得而却之則戶之出等者一倍再倍可也力之不及者或充而或歇可也持守是意金石不移保守此公毫髮不爽則雖有挾勢以規避者烏得而幸免雖無夤緣以請托者不至於受困則人心惟公法之信公道之畏也在朝廷在州縣立役法之公者在朝廷行役法之公者在州縣夫役之為法所以均天下之力也役使不均則有從事獨賢之嘆烏可以一毫私意用乎其間是以賢人君子相與講明是法於朝也則必得其大公至正之體經久常行之道以為天下利而若守若令誠能恪謹而奉行之一意而遵承之則豪民各安其分富室不越其規而善者良者皆得以自立於其間矣否則蟻冗一開潰裂四出幸門一啓夤緣揵至始紛紛擾擾而牒訟山積矣偶句有議役之公法有差役之公道論役之法固有以勞乎民用役之法當有以便乎民古者民養於官故役法皆利民後世民皆自養故役法皆害民役法不必多議也能立至公之意足矣役法不患難行也能存至公之道足矣警段毋以私意害公甚矣役之為法至不可以不公也而所以行其法者尤不可以或私也茍州縣之間一失於觀望一溺於苞苴一惑於吏奸則不得行其所謂公者矣利害霄壤髙下易位而富家大室日娛宴遊中産下户日困奔走彼則志得而意滿此則破産而鬻業吁一念之私貽毒若是哉偶句法無新舊便民者良論無彼此適時者至古者役民之法簡而不窮其力後世役民之法詳而皆竭其力事證古今繁簡利害古之役繁乎後之役繁乎曰亦古之役繁爾周人五兩軍師之法具則在民者有兵役社田追胥之法具則在民者有徒役均田均役之法具則在民者有工役有府史胥徒而胥役在民矣有比閭族黨而鄉役在民矣此五役悉萃於吾民之身其法亦幾於繁矣然當時之民非惟不以為勞而且以為樂雨我公田遂及我私之詩皆出於誠心而于貉獻􅜏宫功入執之詠欣然於閭巷是孰使之然哉自周以降役未必重於古也而斯民往往有不堪之嘆借曰南門之役春秋所怨閭左之戍秦民苦之固不足議矣有如漢唐盛時不知幾倍之省於周也自今觀之漢亭有長鄉有三老嗇夫游徼職教化者不責以獄訟收賦稅者不責以警捕事簡而易辨而且有祿秩之榮或自鄉有秩而補太守卒吏或自鄉嗇夫而補太守卒吏其為役亦便矣雖力役之法未改秦舊大臣之子亦均其勞然隨方調兵無逺出也出錢代更無自行也非便乎唐役九嵗不過二旬加役則免租調坊正之屬往往有朱衣象簡之榮或授以下州刺史或授以司馬令承其為役亦便矣雖右豪之詩悍吏追呼古體之用白頭戍邊然為里正者得免徭役之煩𨽻龍武者皆蠲出戍之調非便乎夫古之役繁而民宜病後之役簡而民宜便今繁者反以為便而簡者反以病告何耶大扺古者之民官所養也故役法皆民之樂趍後世之民自為養也故役法非民之所便此利病之所以不同也歷代保伍之制保伍之法肇於黃帝備於成周破於齊而大壞於秦自九夫為井十都為州所以同風俗齊巧拙通有無情性由之而親生産由之而均歷唐虞夏商以迄於周井田鄉遂之制尤為大偹司徒所掌在國中則有比閭族黨之法在郊野則有里正鄼鄙之制其紏合斯民使之相保相受相葬相救相賙相賔正其相反之罪辨其遷徙之宜而已他無責焉自周東遷此意浸失齊有什伍之法管仲以是寓軍政國有十五鄉郊內郊外皆置官必使奔亡者無所昵遷徙者無所容而法意與成周大異矣至商鞅相秦開阡陌破井田民始困於役故董仲舒曰月為更卒縣吏已復為正一嵗屯戍力役三十倍於古自是役法遂為擾民矣唐太宗立口分業田置里正坊正材正責之按比户口課殖農桑檢責非違催驅賦役自授田之法既壞民之救死猶恐不贍一不勝任罪戾加之其擾民為如何耶役法是非不同今觀有周因夫而授田因田而定賦因賦而起役至不茍也故八家皆私百畝而天下無甚富甚貧之民使民不過三十而天下有餘財餘力之頌法意便民有如此者乃若漢人卒守踐更之制不敢於輕用其民似矣然去秦未逺阡陌既開限田之制不行而兼并之弊莫禁豈非徒善不足以為政乎唐人口分世業之制使民各有常産得矣然其後代十五防河四十營田民苦重役至有終其身者豈非徒法不能以自行乎祖宗差役顧役差役顧役二說相為變更也久矣其原委可致而知也國初里正主督租稅役滿更入衙門或典府庫或運官物行之浸久弊端百出故生民之苦無重於里正衙前韓公琦言之里正衙前有五七年一次者有十貫入重難者蔡公襄言之然此特言其害爾未有顧募之說也蓋自蜀士有民苦重役不苦重稅之說而韓綘得之治平之詔謂差役仍重勞逸不均實絳有以啓之也役法之議昉乎此矣熙寧初吳充極言衙前之患於是絳以顧役之策言之正金陵而差役始罷是顧役之說始於李戒主於韓絳而行之者荆公也免役之法自古無之荆公謂其法出於周官蓋熙寧新法例以周官文其法也然平估至於室廬檢括及於車馬裒多以為寬剩厚積以為封樁故楊繪謂顧役難行其說有五劉摯謂助役之法其害有十當時湖陽之令有以不便而去官者東明之民有以科率不當遮宰相而自言者鎮定之民有拆賣屋木以納免役之錢者其人情不樂可知也典故里正保長病民方今里有正以除盜詰奸為事保有長專任催科之責則有名猶古也其役之者視資産之崇卑以為先後之次則其均猶古也然而為長吏者不能體朝廷優恤民隱之意而責任於猾胥不論貧富不均勞役富而賂厚者則歇久而不差貧而賂薄者則歇暫而復役租賦使之督而其間有亡者則代其輸冦盜使之捕而其間有不獲者則如其罪大抵百金之産盡於一役千金之産盡於再役編民嗷嗷資業破壞至於逃亡趣辨迫急而加之箠辱民以良家充役而官以賤𨽻視之一議差役百端規避無以利之而反以害之則其憚為也何怪哉當恤中産之家夫豪貴之家占田踰制也蓄財過厚也凡受其頥指氣使無一不滿其意而其貧者又耕其田而受其役則豪貴者固不憚差役而貧者又差之所不及也所最可憫者其惟中産之家乎以中産之家而克重役則有破家而蕩業者矣欲其法之盡善莫若倍其差役於豪貴而於中産則寬之則是法也何其不可行於久逺哉若夫催科之有逃亡而抑之備償此無不近於人情非所謂恤民之政也古者荒政十有二以聚方民而有薄征弛力之說而况貧而逃亡又使執役之人為之代償乎民困役為義役說以使民民忘其勞巧以使民不窮其力義役一事見之矣人之以義相率而竭力奉上固前代之所未有謂其弊者何哉蓋今之役法非獨一催科而已官府不時之需胥徒額外之取中産之家困於一役上産之家困於再役民不堪其役乃私相告語曰與其蕩析以應官府之命孰若不愛其力以求一旦之安也與其重賄賂以厭胥徒之欲孰若同出其力以自保於一鄉也故淅之義役人皆以其意為可喜吾獨以其意為可悲何則使公家無重役民間素不罹其害則民其相率為是乎今之法莫若責縣令以寬民之力昔劉平為全椒令而人至减年以就役其必有道矣使天下之役法皆如是又奚義役為哉鄉司乞取之弊鄉司雖至微至賤而其關乎民事有最切故九鄉司知廣狹之地人戶之虛實賦役之重輕皆所以熟講而精究往往民間之事官司所不能知者惟以所供為是官司之事人戶所不能名者惟以鄉司所陳為實差役有定叙鄉司取乞之厚則降甲為乙而可以幸免鄉司有求不獲則升貧而為富而不容陳欣於是産去而稅存田多而役少富室之家常逸樂而貧薄之家常困苦因之破産蕩業不能聊生偶句賄賂交輸於吏舍而富者卒免差役總歸於弱戶而充者立貧自官之征擾於役者日苛而後民不堪於從役自民之求免於役者日衆而後吏始利於差役結尾定役貴於嚴禁今日能重兼并之禁嚴詭計之令則田制可得而推考公推排之典重囑托之罪則役法可得而均平然則嚴是禁也當自貴顯始不當責之下户當自豪富始不當責之貧民或者猶曰安富恤貧法當並舉要之㷀獨之哀尤急於富人之哿計國者當知先定其役毋使汚吏並立為奸則仁政庶乎其可行經制庶乎其可守而平民之病於賦役者庶乎其有瘳矣傳曰屋漏在上知之在下惟為民父母者亟圖之當求加惠之實為今之計誠不必求法之變求法之弊而去之足矣誠不必貽咎於民自反乎上之未至足矣茍惟自反其未至則凡前日習而不察之政當一掃而空之使忠厚之意既孚則為法之地益立役以義名者始聽其自為與否惟求吾所以加惠之實有以勝法可也誠如是常田官田可不必籍而斯民之力無一日而不歸於官舉民田百之二以為公田可不必取而斯民之心無一日而不在於公逺近一心上下同力則民之愛戴其上而樂為之用者不特一鄉役而已執事於論思之際誠以此請有以去其弊則經久可行之利得矣在郡縣得人今日言差役之弊者則曰保正任煙火盜賊之重難而加以雜色之科故保長任催科之煩難而重以逃絶畸零之代細故向之充役費以百今之充役費以千推原其弊皆由丞簿失職合是二職而論之則賦役之為弊其責固有在矣誠使簿之與丞各得其人皆任其責則産薄必詳於勾稽朱鈔必勤於銷注使物力有考賦役無差可以厚民生以固國本實昔有任臨淄簿者不以里正督迫而催科可為天下法是豈今日居哦松之任處栖棘之寄者獨無若人而出乎昔范公純仁諫溫公變差役之法曰宰相當求賢才布列庶位則法度雖有不便亦無所害茍不得人雖付以良法若失先後之次亦足以病民然則欲寬鄉役之法當自郡縣得人始也羣書㑹元截江網卷二十八
