body:
  text: 羣書會元截江網卷二十七風俗厯代事實鴻荒之世禮義哨哨揚問道其風朴略孝經唐虞之際比屋可封後漢楊修傳老人擊壤曰吾日出而作日入而息鑿井而飲耕田而食帝力何有于我哉通厯童謠云立我蒸民莫匪爾極不識不知順帝之則康衢謡教化盛行萬民皆安仁樂義各得其宜董策三代風俗淳一唐選舉志三代所以直道而行也論語鄉田同井出入相友守望相助則百姓親睦孟子晉地本其風俗憂深思逺儉而用禮有堯之遺風焉詩蟋蟀商君遺禮義棄仁恩行之三嵗秦俗日敗故秦人家富子壯則出分家貧子壯則出贅借父耰耝慮有德色毌取箕帚立而誶語抱哺其子與公併踞婦姑不相説則反唇而相稽其慈子嗜利不同于禽獸者亡幾耳天下大敗衆掩寡知欺愚勇威怯壯陵衰其亂至矣轉而為漢俗尚未改今日以侈靡相競而上亡制度棄禮義捐廉恥日甚可謂月異而嵗不同矣盜者剟寢户之簾搴兩廟之器白晝大都之中剽吏而奪之金而大臣特以簿書不報以為大故至于俗流失世壞敗因恬而不知怪賈誼疏文帝躬行元默示淳朴為天下先故五六十載之間至于移風易俗黎民醇厚本紀漢文景時人給家足人人自愛而重犯法先行義而後絀辱焉前志景帝百姓昌盛風移俗易齊美成康本紀武帝使犯法者贖罪入榖者補吏是以天下奢侈官亂民貧盜賊並起貢禹傳永平之際命有司班憲度昭節儉示太素遂令海內棄末而反本背偽而歸真百姓滌瑕蕩穢而鏡至清莫不優遊而自得玉潤而金聲下舞上歌蹈德詠仁東都賦東漢章帝時馬廖上疏曰百姓從行不從言也夫改移風俗必有其本長安語曰城中好廣眉四方髙半額城中好大袖四方全匹帛斯言如戲有切事實晉之興也朝寡純德之臣鄉乏不二之老風俗淫僻恥尚所是學者以莊老為宗而黜六經談者以虛蕩為辨而賤名檢其婦女不知女工任情而動有逆于姑舅殺戮妾媵父兄莫之罪也天下莫之非也禮法刑政于此大壞于寶論唐太宗曰今承大亂之後恐斯民未易化也封德彛曰三代以還人漸澆訛秦任法律漢雜霸道皆欲治而不能豈能治而不欲魏徴曰湯武身致太平豈非承大亂之後邪若謂古人淳朴漸致澆訛則至于今日當悉化為鬼魅矣上從徴言至四年天下大稔流民散失咸歸嵗終斷死刑才二十九人通鑑文宗言百工在乎按度而淫巧或未衰俗恬風靡情訛成蠧唐史元宗之時與民休息比屋可封于時垂髫之兒皆知禮遜戴白之老不識干戈舊史贊偶句借鉏取帚一變而孝弟之立興揭竿弄梃一變而刑罰之或措茅茨流化則比屋有可封之人綈革示儉則黎民皆醇厚之俗馬廖之論移風謂從行而不從言五倫之論教俗當以身而不以言弋綈示儉而牆屋之被繡者自如籍田勸農而冶鎔之採銅者益盛唐堯之流化茅茨而堯之率正者身也夏禹之惡衣菲食而禹之為度者身也禁奢曺蜉蝣刺奢也詩漢髙帝令賈人無得衣錦繡綺縠絺綌罽操兵乘騎馬本紀文帝時賈誼言庶人屋壁得為帝服倡優下賤得為后飾且帝之身自衣皂綈而富民牆屋被文繡后以緣領庶人孽妾緣其履賈誼疏景帝以雕文刻鏤傷農事錦繡纂組害女工特詔除之本紀武帝時朝錯言商賈以利相傾千里遨遊冠蓋相望乘堅策肥履絲曳縞前志成帝詔方今公卿列侯奢侈逸豫嫁娶葬埋過制吏民慕效浸以成俗本紀哀帝亦詔諸侯王多蓄奴婢田宅無限其議限例本紀魏毛玠居顯位布衣蔬食以儉率人由是天下之士莫不亷節自礪雖貴寵之人輿服不敢過度本傳唐髙祖武德中著車輿服衣之令上得以兼下下不得以擬上本紀太宗時馬周言京師營造供奉器物并諸王妃主服飾皆過侈靡文宗策劉蕡言百工在乎按度而淫巧或未衰俗恬風靡積訛成蠧以謂由制度不立請以官法祿秩制其器用車服禁用金銀珠玉錦繡雕鏤不蓄于私家則無蕩心之巧矣終以不行本傳楊綰性儉約未嘗問生事祿廪分姻舊及除拜之日崔寬為之毁别業黎幹為之損騎從郭子儀方會而除書至樂音省五之四其他聞風靡然自化者不可勝紀世以比楊震謝安山濤本傳偶句富民墻屋被文繡賈少年憂之商賈富者乘輕肥朝家令憂之毛玠為相而人不鮮衣楊綰在位而人皆減騶抑末司市以政令禁物靡而均市以賈民禁偽而除詐周禮載師凡漆林之征二十而五凡宅不毛者有里布田不耕者出粟屋凡民無職事者出夫家之征並禮漢髙帝八年禁賈人不得衣絲乘車重租稅以困辱之髙后時復弛商賈之律朝錯曰今法律賤商人商人已富貴矣尊農夫農夫已貧賤矣文帝即位時民背本趨末賈誼説上曰今驅民而歸之農皆著于本並前志偶句無職事者周官有夫家之征作竒技者王制有疑衆之殺為末衆而農民寡景帝所以禁採珠玉務本少而趨末衆元帝所以勉勸農桑商賈弛律朝錯所以論農夫之已貧驅民歸農賈誼所以慮當時之趨末皇朝事實太祖開寶元年辛仲甫知彭州上曰蜀土始平輕侈之俗未革爾有文武才幹是用命爾長編太宗興國八年詔曰能以禮遜為國乎何有故班白不逰于市井負販相避于道途耕厯山者有遜畔之風入周境者有息訟之美浩穰之地民庶實繁冝申明于舊章用激清于薄俗事實真宗咸平元年上曰節用愛人民俗自化祥符元年上曰古今風俗悉從上之所好國家法令不可不謹並長編仁宗嘉祐五年詔曰朕嘗患民之好事而風俗漸靡于薄也思有以格正之非吾士大夫躬率以義而導之于善則何以哉長編髙宗紹興二十八年上曰朕惟崇尚儉素比年以來中外服飾過為侈靡雖纍行禁止然末俗猶未盡革大抵行法當自近始聖政孝宗乾道三年御批朕念治功之未起思風俗之尚澆方欲力救弊源追還淳古典章寧宗慶元二年詔曰朕惟風俗者治忽之樞機士大夫者風俗之權輿今懷背公死黨之恩蔑尊君親上之義使毁譽是非混然淆亂自今至于後日洗灌厥𠂻存公去私可否從違各當于理則豫汝嘉其有不吉不迪習非怗終邦有常刑嘉泰元年臣􅒼上言本朝列聖以節儉為家法以􅌋風俗其所以躬行而自率者惟恐天下趨于薄至于習俗相靡浸以奢淫法禁雖立而法不行終不能拯時而救弊偶句真宗之論風俗則曰從上所好髙宗之革末俗則曰自近者始行孝義者當議明舉乾德之詔也愆孝弟者務申戒飭興國之詔也太宗之革薄俗則欲使知禮遜之美孝宗之革澆風則欲追還淳古之舊禁奢太祖乾德四年收偽蜀圖書法物皆不中度悉命焚毁孟昶服用奢僭至于溺器亦裝以七寶上命碎之曰自奉如此欲無亡得乎開寶五年永慶公主嘗衣貼繡鋪翠襦入宫中上曰自今勿復為此飾王家服此宫闈戚里皆相效京城翠羽價髙小民逐利傷生浸廣實汝之由並長編真宗咸平二年上曰近覽上封所述頗言風俗侈靡有傷淳儉公卿士庶服用踰制至有鎔金飾衣或以珠翠者令有司禁臣庶泥金鋪翠之飾祥符元年上曰京師漸事奢侈衣服器玩多鎔金為飾雖纍加條約終未禁止工人錬金為箔其徒日繁募告者賞之仁宗景祐三年扈稱言京師天下之本而士民奢侈無法室居服玩競為華靡珠璣金翠照耀路衢請條約之詔兩制與禮院同詳定制度以聞同前仁宗始専萬幾富于春秋左右欲以竒巧自媚後苑珠玉之工頗盛于前日龐藉言今螽螟為災民憂轉死北有耶律西有拓拔陛下安得不以儉約為師奢靡為戒重惜國用有徇名之急是嵗大旱蝗范仲淹安撫江淮還以貧民所食烏昧草進呈乞宣示六宫戚里用抑奢侈並言行録英宗治平三年捕銷金衣有以內庭為言者上疑之竇卞曰真宗禁銷金自掖庭始今不正以法無以示天下長編民間復作銷金服玩韓琦請以先朝舊制禁絶乃下詔申諭未幾有犯者琦奏祥符八年敕犯銷金者斬請復用之言行録髙宗紹興七年上曰銷金鋪翠禁中無敢犯者士民之家尚有服用行下廣南禁採捕者聖政十年上曰朕性淡薄服用朴素宫中無敢踰者富家大室猶有以金翠為飾亦非所以厚風俗乃詔臨安府榜諭限三日毁棄係年録二十七年上曰奢侈之服如銷金之類不可不禁近時金絶少由小人貪利銷而為泥須申嚴行下聖政孝宗乾道八年上曰近時民俗多尚奢侈才遇豐年稍遂從容則華飾門戶鮮麗衣服促婚嫁􅌋裝奩惟恐奢華之不至甚非所宜今年逺近豐稔稱此秋成欲使民間各務儲積以為悠久之計宜降詔戒諭淳熙三年上曰今日習為奢侈者在民間絶少多是戚里中官之家須重作施行八年上曰朕以金翠等事刻之記事板每京尹初上取示之寧宗嘉泰元年詔禁止銷金鋪翠日來行市公然造置官司全不禁戢今後如有因事敗獲守臣及地方官吏並重作施行元年詔曰風俗侈靡日甚一日其令官民營造室屋務從簡朴銷金鋪翠無得服用今以宫中所有焚之通衢令有司嚴立禁防貴近之家尤當遵奉並聖政偶句糾舉奢侈庶革澆俗端拱之詔也嚴禁奢侈庶復淳風咸平之詔也士庶奢侈成風則詔三司申明條制士民僣侈無法則令兩制詳定制度髙宗嚴金翠之禁則曰恐長奢靡之風孝宗戒門户之飾則曰欲為悠久之計抑末太宗詔曰國家算及商賈以抑末遊率循舊章以助經費仁宗慶厯三年議弛茶鹽之禁范仲淹以為與其害農孰若取之商賈髙宗紹興二十六年上曰關市之征本以抑商賈如米麵豈可一概收稅偶句開寶詔禁採珠欲息遊惰以復農桑淳化詔算商賈欲抑末遊以助經費算商賈所以抑末遊者淳化之聖詔也定市𣙜毌使趨末業者祥符之聖訓也農為衣食之原而遊惰者多此非太祖之詔乎君子觀是詔則知末作之不可不禁農為天下之本而事末者衆此非孝宗之詔乎君子讀是詔則知遊手之不可不戒經傳格言詩美教化移風俗詩大序樂移風易俗樂記教訓正俗非禮不偹曲禮司徒一道德以同俗廣谷大川異制民生其間者異俗王制君子欲化民成俗必由學乎學記儒者在位則美俗荀子凡民函五常之性而其剛柔緩急音聲不同係水土之風氣故謂之風好惡取捨動靜無常隨君上之所欲故謂之俗前地理志移風易俗使天下同心而向道非俗吏所能為也賈誼策春秋大一統者六合同風王者以教化為大務漸民以仁摩民以義節民以禮故刑罰甚輕而民不犯者教化行而習俗美也並董策風行俗美萬世之基定賈山傳長安天子之都親承聖化此教化之本原風俗之樞機宜先正者也康行傳百姓從令不從言也改移風俗必有其本烏廖傳舉仁賢而俗自化以身教者從以言教者訟第五倫青齊人情變詐好行機術鄒魯漢興猶有儒風揚州人性輕揚而尚鬼好祀荆楚率多徑悍稱兵跋扈無代不有通典以五術省風俗曰聼謡誦審其哀樂納市賈觀其好惡訊簿書考其爭訟覽車服等其奢儉省作樂察其趨舍陸贄云偶句躬行以移風俗漢史之言也彰好以示民俗緇衣之旨也美化移俗則莫近于詩移風易俗則莫善于樂名臣奏議京師風俗之本彭汝礪上神宗曰古人修身以正天下而其俗既成之後雖江漢之匹夫皆知無思犯禮而非止于京師臣觀四方之人其語言態度短長巧拙必視京師如何不同則以為鄙焉凡京師之物其衣服器用淺深濶狹必問宫中如何不同則以為野焉以此知能以質厚示之則無不從質厚也設科條絶僣侈治平四年劉述言百姓習于久安競以侈靡相尚居處服用率多僣差婚姻喪葬不計其費欲望陛下躬行節儉以化天下然後勑下有司設為科條以絶僣侈之弊務崇約素以厚風俗厚風俗為國本嘉泰元年臣寮言臣聞俗貴近厚法貴必行恭惟本朝列聖相承以節儉為家法以厚俗為國本其所以躬行而身率者惟恐天下趨于薄至于習俗相靡以奢淫法令所防嚴于禁戢則亦有所不容偏廢也由是上有定制下無玩心今自侈靡之文視先朝極矣銷毁金玉視為故常豪貴之家固已慣習下至閭巷傾資效尤被之于身履之于足無非銷金至于裝飾神佛之相且遍膚而無遺矣輦轂之下四方取則奉行法令固當自近然逺方之貴族大姓而以豪侈相奉抑又甚焉僣禮傷財可為太息當抑商而利農司馬光上仁宗曰農夫日寡遊手日繁豈非為利害所驅耶今農夫苦身勞力惡衣糲食以殖百榖賦斂萃焉徭役出焉嵗豐則賤糶以應公上之須給債家之求嵗凶則流離異鄉轉死溝壑如是而欲使夫商賈末作之人坐漁厚利鮮衣美食轉而服南畝斯亦難矣然則勸農者言也害農者政也偶句先定紀綱以還淳美之俗司馬光言之嚴立制度以絶僣奢之原李之純言之諸儒至論存亡係于風俗東坡曰國家之所以存亡者在道德之淺深而不在乎強與弱厯數之所以長短者在風俗之厚薄而不在乎富與貧道德誠深風俗誠厚不害于長而存道德誠淺風俗誠薄雖強且富不害于短而亡人主知此則知所輕重矣是以古之賢君不以弱而亡道德不以貧而傷風俗即智者觀人之國亦必以察之風俗無古今東萊曰昔之隆儒以為風俗自厚而之薄猶人自少而之老古人俗厚猶人之方少也今之俗薄猶人之已老者也薄者之不可復厚亦猶老者之不可復少也嗚呼何其不思之甚耶將以三皇之俗為厚乎則黃帝之末胡為有蚩尤之亂將以五帝之俗為厚乎則帝舜之時胡為有三苗之亂將以三王之俗為厚乎則夏商之季胡為有桀紂之亂蚩尤之亂無以異于項羽之亂也亂既除而俗有厚薄之異者非秦民之不如古特髙帝不為黃帝耳三苖之亂無以異于七國之亂也亂既除而俗有厚薄之異者非漢民之不如古也特武帝之不如大舜耳桀紂之亂無以異于煬帝之亂也亂既除而俗有厚薄之異者非隋民之不如古特太宗之不如湯武耳厯代習尚司馬公曰商之政尚猛故其俗激昂而奮勵周之政尚寬故其俗和柔而寬緩太公治齊舉賢尚功周公知其後必以強亡周公治魯尊尊而親親太公知其後必以弱喪風俗可知三代吕東萊曰三代雖逺其理常存茍能盡其理夫何逺之有故萬石君處家而子孫燕居申申此一家之三代也王烈居鄉而訟者望塵而返此一鄉之三代也魯恭治中牟而童子不取乳雉此一邑之三代也延夀之治頴川庸非一郡之三代乎以是而論之則風俗古不必厚今不必薄古不必易今不必難惟其人而已安可是古而非今哉崇本王道之治鄭節卿曰古人教民意深矣康王命畢公以康四海不出于表宅里殊井疆畫郊圻之間周公陳先王風化之由惟在乎舉趾條桑載績播種稱觴之事孟子以五穀魚鱉不可勝食與使民養生送死無憾為王道之始韓退之以士農工賈之民君臣父子之位推而至于宫室桑麻蔬果魚肉之物而歸之道化也今日遊民之多林執善曰今之所謂遊民者何其多也髙宫大室撞鐘伐鼓談無演空眩誘廢畎謂之緇黃之遊懷黃挾彈玩養鳥獸六博鬬鞠歌舞是則謂之市井之遊冒名守關充墀溢廄交相贊助招權為姦謂之官府之遊若此之類不可殫言賈生所謂殘公賊行莫之或止者也昔勾踐還越令壯無娶老老無娶壯女十七男二十不嫁不娶罪父母蓋欲人民繁息為國之用今有民而委之無用亦可惜哉今之四民亦非古之四民也士學無用之文以媒利祿而立身事君何嘗在是則士亦遊矣工作無用之器以競竒巧而食用所須苦窳不堪則工亦遊矣商通無用之貨以煽侈美而費用所資往來不通商賈亦遊矣嗚呼民相為遊而人之類未相食者幸吾農民尚守耒耜而已然而解凍而耕暴背而耘櫛風沐雨沾手塗足戴星而出戴星而入其勤極矣而又有水旱霜雹蝗蟲間為之災幸而收成則公私之債交相爭奪榖未離場已非已有羣遊之徒聚而用之又從而嗤鄙之良可哀也故其子弟時出關市日觀盛麗歸視其粳粃不飽短褐不蔽其心搖搖已不安于畎畝矣不急救之是農又將為遊矣為末者常有餘李清臣曰今之天下為本者常不足為末者常有餘遊民貴而農民賤家于田畝者不若居市里以耒耜為業者不若操貨財遊民自以為材智之當然而朴力勤苦之民盻盻焉不足于衣食而常有賦徭之憂飢寒之患良可嘆哉主意風俗係乎表倡教化風俗之樞機法令風俗之隄防樞機不謹無以化民隄防不立無以率下二者兼施而迭舉然後足以轉移風俗而歸之正也自昔聖人在上綱紀人心維持世道闔闢變作唯吾意耳而四海之廣萬姓之衆無不靡然而聽從後世法令非不嚴禁防非不切然欲其朴厚而侈靡之習猶多欲其質實而浮偽之風愈盛意者法令之徒嚴而教化之實猶有未至也且夫今之天下亦古之天下昔何為而醇今何為而弊昔何為而朴厚今何為而澆薄昔何為導之而輒從今何為禁之而不止君天下者正當詳究其本源考論其得失以疏通而轉移之則人心以正風俗以淳一時之治自可以無愧于古不然樞機之或失而乃隄防于一二檢制之間雖詔令之日頒法令之日詳亦恐徒勞無益于治也朝廷為風俗之本朝廷先天下為風俗天下視朝廷為趨向考古驗今未有不由此者昔唐虞流化茅茨而堯舜之帥正者躬也夏禹之菲食惡衣而禹之為度者身也文王德廣之所及所以為麟趾鵲巢之應使天下純被其化推而至于衰世猶有仁厚之風者非他術也關睢騶虞之化有以為之地也古之聖人常以恭儉修身正家之道在上而天下之民莫不目擊而心化則躬行俗移心正國治誠有自然之應且太王小國之君也躬行而民日富庶晉侯亦小國之君也好儉而猶多積聚下民之移風易俗者莫不自其上之人有以先之在上人防間禁制荀卿氏論兼足天下之理必在于明分而揚雄論列侯田宅之弊必在于迪法至于賈誼長太息之書極論夫亡等冒上之俗亦汲汲于經制之定而已夫三子之論豈不能推本夫人主之躬行而惟以明分迪法與定經制為説者蓋深知夫天下之移于侈靡而不能自克流于浮靡而不能自返非上之人防間而禁制之其何以革其目前之習而納之朴素淳厚之域乎偶句正天下之風俗易正人心之風俗難警段君身為風俗之本人君者風俗之機教化之本一有所尚天下之所觀望而風俗之所由以成也周民之質非周民之自質文王之化有以使之也蓋文王以一家治天下康功田功卑服于一身之間憂勤節儉靡所不至家邦之御蓋自邇以及逺由外以及內浣濯之衣形于詩人之歌詠而節儉正直見于當時在位之君子教化之基風俗之本實在乎此故質美之民歌于天保之章豈淺近致也後世奢侈無禁禮制之隳壞久矣丹楹刻桷則諸侯僭天子矣瓊辨玉纓則大夫僣諸侯矣連騎而遊擊鐘而食廬室無制器服無度嫁娶以窮侈相誇喪祭以多財相衒則庶人之僣侈不可勝矣以儀辨等以度教節于刑名致詳于分守致嚴者聖人所以辨上下而定民志也而後世之奢侈之禁乃至于此故倡優為后飾土木被文繡在漢常患其然矣然當時為之沮抑者不過禁賈人錦縞乘駿之飾耳不過席莞履草以為天下先耳不過裁定禮制以為天下文具耳禁行于賈人則非賈人而僣侈者猶衆也身約于在上則庶人之僣侈自若也曺褒之制度不能勝大臣之茍簡王涯之條約不能勝當塗之毀訾此其弊所以循襲至今而未有改也偶句仰事俯育之外非心無自而起也服田力穡之餘異習無自而萌也耕鑿之業定而天下皆淳朴之風井田之制立而天下無奢侈之俗事證漢初浮耗之習難革漢文帝躬行節儉志移風俗弋綈革履惜金罷臺亦太朴矣然能檢束于一己之微不能繩約于士夫之僣能行于內廷之間不能痛抑于近戚之私則墻屋被繡倡優后飾之風猶未能革而尚拳拳于少年太息之書至于吳王濞以骨肉之恩而専豫章之銅鄧通以幸臣之寵而私鄧氏之錢銅之利亦其縱矣况放鑄之令一行而天下悉得以攻壞陶之利家自為爐人自為冶竊國家之經用銷地産之至寶其弛縱之弊孰甚于此者故五禍七福之論痛言于通逹大體之臣而棄本逐末為斯民慮者至矣列聖禁奢之意祖宗盛時孝于其親者必加旌異睦于其族者時有褒嘉唐鄧之俗薄于事親嶺南之俗習于異乖或立法而為之禁止或責吏而加之化導至若踰侈之禁不責于貴近則責于大臣猶以是為未足也內而掖庭之衣錦上而乘輿之服御莫不示以朴素故以公主而衣翠繻未為過也且奪其所服而戒諭之以皇族之家而服鋪金之飾亦未為過也且嚴為之禁而覺察之嬪御之衣銷金者必峻其罰掖庭之服銷金者必正其法以一人之貴備四海之奉不必過為儉約可也而且不憚于儉約者可以見其正身率下之意矣時政當責奉行之吏以愚觀之今日之患莫大乎人主有躬行之德而臣下無輔德之誠人主有禁奢之法而臣下無奉法之意化行于九重之上而逹官貴戚之家其侈猶故也奉行之吏未嘗過而問焉何以責其下之不犯禁嚴于宫掖矣而京城之民其侈猶故也奉行之吏未嘗過而問焉何以責其逺之俱化知責之自上始而不自下始則風俗可革知自貴者始不自賤者始則風俗可革知自近始不自逺始則風俗可革奢僣自士大夫始爰自羔羊廢而人無素絲五紽之德白駒亡而人無生芻一束之行薇不採葵不拔方且爭探牛心直碎珊瑚撞鐘舞女流蕩忘歸夫以髙冠大輅蒞民行化者既已爾耳則蠢蠢之民隨風而靡幾何不相胥而為浮詭之習哉偶句金翠既塗復用珠玉以為飾錦繡既厭復誇組縠以為竒墻屋被文繡而席門有不庇之家奴婢棄梁肉而糟粳有不充之腹向之借耰鋤德色者今則以孝悌舉矣向之赭衣半道者今則以善良著矣以編户庶民之微而僣王侯之奉以文物衣冠之地而肆夷貊之習結尾當以正本為先古人有言曰上有好者下必有甚焉又曰示之以好惡而民知禁欲今日風化之厚當自朝廷始欲法制之行當自貴近始不然徒恃其令可以強天下不恃其行可以化天下則風俗而欲轉薄趨厚者未之有也昔者漢髙皇帝時有賈人無得衣繡之令而漢官舊儀亦載庶人無得乘車此其質朴法制亦非不合然商賈髙車大馬其視前日衣繡之禁無忌也長安少年鬪雞走狗奢豪自恣其視前日乘車之禁無畏也昔唐之相楊綰也而或者為之捐騶從減音樂當時風俗聞風而化者不可勝數蓋民從行而不從令人主者風化之原而貴近者風俗之所則效也董仲舒有言人君正心以正朝廷正朝廷以正百官正百官以正萬民萬民正逺近四方莫不一于正愚請以是復明問羣書會元截江網卷二十七
