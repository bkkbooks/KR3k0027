body:
  text: 羣書㑹元截江網卷二十四戰守和歴代事實戰堯舜不戰屈人兵湯與桀戰於鳴條之野書湯誓武王戎車三百兩虎賁三千人與戰於牧野牧誓髙祖至藍田又戰其北秦師大敗本紀擊韓王信于銅鞮乗勝逐北至樓煩本紀武帝匈奴請和詔上下其議王恢曰擊之便單于可禽百全必取韓安國傳單于能戰天子自將待邊本紀竇憲與北單于戰於稽落山大破之遂登燕然山勒石紀功而還本傳唐太宗七年李靖與吐谷渾戰破之李世勣及薛延陀戰敗之本紀帝謂左右曰今惟遼東未賓朕自取之帝使李勣當賊以騎四千趨虜北山虜視勣軍少即合戰帝自山馳下合圍之延壽等降因號山為駐蹕山圖破陣狀勒石紀功髙麗傳偶句彼竭我盈魯以克齊怒我怠冦随以謀楚陳無鬭心鄭師敗之鄖無鬭志楚師克之李晟孤軍以抗强虜張許百戰以全江淮寜郤安國之言而不回馬邑之師漢武帝寜抵狄山之語而不阻沙漠之行伐蜀之謀非之者譁然而不能阻黄裳指授之畧唐德宗擒蔡之舉排之者紛然而不能止裴度督戰之行唐憲宗漢髙之於匈奴其始主於戰一阻於平城之衂而遽與之和唐太之於突厥其始主於和一阻於渭橋之辱則又與之戰窮兵而絶大漠不足以服匈奴受朝於渭上者非兵之力也親征而出遼東不足以平韎鞨拓地於安東者非戰之力也守匈奴入冦邊陲充國則屯縁邊九郡此以兵勢規畫為守也李龍媒出海道蔡謨則立鎮守八所此以形勝規畫為守也六國既滅始皇北築長城為籓籬此以形勢規模為守也和齊宣王問曰交鄰國有道乎孟子曰惟仁者為能以大事小是故湯事葛文王事昆夷惟智者為能以小事大故太王事獯鬻句踐事吳孟梁惠王晉戎子因魏莊子納虎豹之皮以請和諸戎魏絳曰和戎有五利焉鄭人賂晉侯樂晉侯以樂之半賜魏絳曰子教寡人和諸戎曰夫和戎國之福也君之靈也左襄十二年髙祖冒頓冦邊使婁敬往結和親婁敬傳文帝後元二年詔單于新棄細過和親已定始于今年本紀與匈奴結和親後而背約令邊備守本賛武帝即位匈奴來請和親上下其議韓安國曰勿擊便韓安國傳單于怖駭交臂受事屈膝請和司馬相如傳宣帝神爵二年匈奴遣名王賀正月始和親本紀光武二十二年匈奴遣使請和親同上唐髙祖遣劉文静使突厥連和同上太宗突厥遣使和親羣臣咸請許之封倫曰彼謂我不能戰乗其怠擊之必勝勝而後和威德兩全矣封德彜傳德宗詔大臣以和戎息師之便馬燧曰可百年無虜患栁渾曰突厥狡變無常易以兵制難以信結栁渾傳偶句鴻溝之約方成而固陵之師已㑹渭橋之盟方結而定襄之捷已馳和戎之説始于魏絳而晉人收五利之全和親之謀始於奉春而漢邊有屢警之患自李唐而有稱臣之和而心益横自石晉而有割地之和而勢益強髙澄無故而請和所以激侯景之變吐蕃未困而請和所以罷馬燧之權後元之世匈奴嘗和親矣而跳梁乎蕭闗之强建元之初匈奴嘗和親矣而覬倖乎馬邑之利東晉焚幣之舉意若壯矣莫能終淮陰之業太宗便橋之盟意若怯矣竟能奏定襄之功自漢而有結婚之和若得勾踐事吳之遺意而莫能息邊民之肩自漢而有遣幣之和若得太王事狄之遺法而徒以失國家之體匈奴和親王恢以為擊之便韓安國以為勿擊便自擊之之説勝而馬邑之詐結禍者愈深吐蕃和親李晟以為勿許便張延賞以為許之便自許之之説勝而平凉之衂遺笑於千古皇朝事實戰太祖乾德二年親征太原北漢人突犯西塞趙賛與戰上親至戰所長編太宗太平興國四年契丹入冦劉延翰等分為二陣士衆皆喜三戰大破之雍熙二年潘美與契丹戰勝之曹彬復與敵戰乗勝攻其北門克之取涿州端拱元年敵將入冦李繼隆與戰敵大潰景德元年契丹南侵上幸澶淵射中撻覽契丹請和中興十三戰功並詳見平戎門偶句契丹南侵冦準决親征之議西夏不臣范雍破借助之謀韓世忠戮力國難金人走遁足以奏金山之㨗吳玠死戰酣鬭金人不支足以策仙人闗之勝闗南之戰趙延進以二陣破敵而斬獲數十萬代州之戰張齊賢以伏兵掩敵而斬獲者甚衆兵甲精鋭人心忻戴天子神武將相叶和太宗一戰而成太原之功真宗一戰而成澶淵之捷璘玠諸將在蜀漢必將逐之鳳翔破之饒風戰之黄牛可以金湯吾三邊之首岳飛諸將在荆襄必將既捷於絳再捷於鄭又捷於頴川可以長城吾三邊之脊韓劉諸將在淮甸則或勝於金山或勝於順昌或勝於柘臯可以太山磐石吾三邊之足守太祖命李漢守闗南馬仁瑀守瀛州韓令坤鎮常山賀惟忠守易州何繼筠守棣州以拒契丹郭進控西北武守琪戍晉州李謙溥守隰州李繼勲鎮昭義以禦北漢趙賛屯延州姚内斌守慶州董遵誨屯環州王彥升守原州馮繼業鎮靈武以備西戎真宗康定元年范仲淹知延州西賊相戒曰無以延州為意种世衡知延州開營田二千頃並長編戎門餘見平偶句郭進守西山則太祖無北顧憂小范守延州則西人無以為意有吳玠守仙人闗金人不敢窺蜀有宗澤守東京則金人不敢至汴畫攻守二策者韓琦所以稟算於朝廷論戰守二策者子羽所以挫敵於江北和太祖開寶七年涿州刺史耶律致書於知雄州孫全興其略曰兩朝初無纎隙若交馳一介之使顯布二君之心用息疲民永為鄰國全興以書來上上命全興答書許修好焉長編真宗咸平二年敵謀冦邊上以問曹彬對曰臣料北鄙終復成和好上曰此事朕當屈節為天下蒼生然須執紀綱存大體即久逺之利也景德元年曹利用再使北冦準語之曰雖有勑㫖所許不得過三十萬果成約而還上作迴鑾詩李繼隆等曰陛下復念其請盟許其修好安民息戰示以好生不令邀擊開其歸路上曰今得其畏威服義息戰安民甚慰朕懷亦卿等之力也二年李允則知瀛州允則言朝廷不欲困軍民故屈己議和但擇邊將謹守誓約有言和好非利者一切斥去仁宗慶厯二年富弼往報契丹曰朕念兩國生民不欲使之肝腦塗地不愛金帛以徇北朝之欲若北邊必欲得地是志在敗盟棄好朕獨能避用兵乎且澶淵之盟天地神祗實鑒之並同上髙宗建炎元年李綱上十議一曰議國是謂今日之事欲戰則不足欲和則不可莫若一切罷和議專務自守之策紹興三年常同言先振國威則和戰常在我若一意議和則戰常在彼四年魏矼言當罷講和二字以攻守代之並小厯八年上曰有備無患縱和議已成亦不可弛兵備劉大中曰和與戰守自不相妨若專事和好則墮敵計中爾聖政上諭輔臣曰近殿中侍御史張戒有䟽論備邊當以和為表以備為裏以戰為不得已此極致之論也同上九年上謂大臣曰乗此閒暇廣武備以戒不虞足以待强敵矣和議豈足深恃乎小厯十年進呈戰守之計上曰戰守本是一事可進則戰可退則守非謂戰則為强守則為弱但當臨機應變而已聖政孝宗隆興元年陳康伯湯思退周葵洪遵奏近因北副元帥書來有意求和陛下聞其言喜見顔色正欲休兵息民以答天戒因為自治之計羣臣紛紛乃謂臣等意欲講和以茍目前之安臣等自今以往尤當信賞必罰以作成人才選將勵兵以激昻士氣務農重穀均節財用以愛惜公私之力庶幾今日之和乃所以成他日之恢復聖政二年湯思退奏萬一不和當求機㑹於他日守禦之後不可尋機㑹於和議未分之前也寜宗嘉定十一年詔侍從臺諫兩省官集議平戎禦戎和戎三策開禧三年詔曰朕寅奉基圖遹駿祖武憂勤弗怠敢忘繼志之誠寡昧自量尤謹交鄰之道並長編偶句至和之和不及三年靖康之和不踰期嵗紹興癸丑之和旋有和尚原之役紹興壬午之和迄有瓜洲渡之師元昊約和韓琦慮其為欵兵之計金人請和吕誨料其有攻取之謀王倫之使未旋烏珠之師隨舉秦檜之約雖堅海陵之盟遽渝振紀網存大體則真宗議和之本心也以金帛代租賦則仁宗議和之本心也撻覽死而後有景德之和烏珠敗而後有紹興之和以和為名以戰為實則曹輔之言於髙宗者然也暫與之和亟為之備則黄中之言於孝宗者然也經傳格言戰王者之師有征無戰唐蘇題傳我能為君約與國戰必克孟子如以戰則玷項漸襟堯舜乎揚子守王公設險以守其國易坎大道既隠城郭溝池以為固記禮運固國不以山谿之險孟公孫丑和和戎息師國之大計唐栁渾傳和親非禦戎善經時事有不得已者陸贄傳名臣奏議可守未可戰紹興二年洪擬上髙宗曰國勢强則戰將士勇則戰財用足則戰我為主彼為客則戰陛下前年幸㑹稽今年幸臨安興王之居未定非如髙祖之在闗中光武之在河南也又邇者諸將雖有邀擊小勝未見雲合雷發以取大捷又江浙農耕未盡通平日廪給尚艱緩急將何以濟又千里餉糧士有飢色今使千里出戰則彼逸而我勞凡此皆可言守未可以言戰也能戰守而後能和紹興八年張戒上髙宗請外示通和之名目則不忘决戰之意而實則嚴兵據險以守自古能守能戰而能和者有矣未有不能守不能戰而能和者也使真宗無撻覽之捷仁宗非慶厯之盛雖百曹利用百富弼其能和哉不可輕許和紹興十年陳沙言急於遣使而不及其他則知虜不能無求然我有不可許者盖和戰兩途彼之意常欲戰不得已而後和我之意常欲和不得已而後戰或者必欲多與之幣以幸其乆而不變則無是理臣願陛下訓所遣之使俾無輕許以誤大計以和為戰守之權以戰為守和之備此至計也亟罷請和之議朱熹上孝宗曰臣切觀今日之論國計者大槩有三曰戰曰守曰和而已然天下之事利必有害得必有失是以三者之中又各有兩端焉蓋戰誠進取之勢而亦有輕舉之失守固自治之術而亦有持乆之難至於和之策斯下矣而主其計者亦以為屈己愛民蓄力觀釁疑敵緩師未為失計多事以來此三説六端者非是相攻可否相奪於冥冥之中談者各飾其私而聴者不勝其眩雖以陛下之明未能斷然無惑志於其間也云云臣願陛下詔任事之臣亟罷講和之議大明黜陟以示天下使知復讎雪耻之本意未嘗少衰雖使虜意效順無所邀索乃是深有包藏無足疑畏正宜引義拒絶以伐其謀然後表裏江淮合戰守之計以為一使守固而有以戰戰勝而有以守竒正相生如環之無端持以嵗月以必復中原必滅金人為期而後已能守而後可戰可和端平奏劄自古未有無邊患之中國而中國之所以待之者亦不過戰守和三説而已惟能守而後可以戰可以和權在我者也守且不固遂舍守而言戰戰既不勝故易戰而為和權在彼者也權在我者制人權在彼者制於人成敗安危之計實基於此戰守和説不一嘉熙奏劄夫戰固一説勢力相敵乃可言戰或者彼不足以當此則固不肯輕與此戰此不足以勝彼則又豈可輕與彼戰戰之為戰其説特不一也守固一説惟事力自壯乃可言守或者彼有以勝此則固不容遂此以守此無以勝彼則又豈能待彼以守則是守之為守其説亦不一也和固一説惟資力相稱乃可言和或者彼方欲逞於此則固不肯從此之和此方有虞於彼則又焉能致彼之和則和之為和其説又不一也諸儒至論國勢屈則士氣先䘮今天下之勢中國之民優㳺緩帶不識兵革之勞驕奢怠惰勇氣消耗而嵗幣之賂又以百萬為計轉輸天下甘言厚禮以滿其不足之意使天下之士耳熟所聞目習所見以為生民之命寄於其手故俯首帖服莫敢抗拒凡中國勇健豪壯之氣索然無復存者矣夫戰勝之民勇氣百倍敗兵之卒没世不復盖所以戰者氣也所以不戰者氣之蓄也戰而後守者氣之餘也古之不戰者養氣而不傷今之士不戰而氣已盡矣此天下之所大憂也昔者長平之敗趙卒死者四十萬人亷頗取合餘燼北摧栗腹西抗秦兵振刷磨淬不自屈服故其民觀其上之所為日進而不挫皆自奮怒以争死敵其後秦人圍邯鄲梁王使將軍新垣衍如趙欲遂帝秦而魯仲連慷慨發憤深以為不可盖天下之士所為奮不顧身以抗虎狼之秦者為非其君也而使諸侯從而帝之天下尚誰能出身以事非其君哉故魯仲連非徒惜帝秦之虚名而惜乎天下之勢有所不可也今尊奉敵人遣使通和交懽納幣以為弟兄之國奉之惟謹至不敢一觸其意此足以壞天下義士之氣而長敵人豪横之勢耳東坡能戰守而後可言和猶之訟焉己則欲止而人制其權則雖卑辭厚禮以求媚而彼未必許縱許而弗堅也故凡不能以戰守而為和者是終不克以成和也漢文帝有灌嬰張武欒布董赫之師以出征有雲中飛狐棘門細栁之屯以固圉而後能成俱棄細過之約唐太宗有行軍總管以奏涇陽之捷有渭橋軍陣以耀威武之盛而後能破强敵之膽以就白馬之盟此所以謂戰守而為和若夫六國之從既散乃争割其地以塞虎狼之欲項羽之勢既蹙始有折蓋世之氣請為鴻溝之約以是為和則不足以為和矣夫能戰能守而後和則和不和之權常在我未能戰未能守而遽求和焉則和不和之權常在人權在我則我制人權在人則我制於人我制人則其勢順而其為和也固我制於人則其勢逆而其為和也雖成而未可􅍖是則今之和議有所未暇聞也姑亦修我戈矛與子同仇赫赫然為必戰之計徹彼桑圡綢繆牖户孜孜焉為固圉之謀且戰且守盡其所以為我之道而和之一説姑亦聴其發於彼可矣陳同父文主意當權暇急之宜不以暇自安而知事功之當急則以之待敵雖戰而有餘不以急自處而付事功於茍暇則以之為國雖守而不足執事當端委弁冕之時為褰裳濡足之慮發策以戰守和之三策嗟夫夾攻餌和之舉久矣其誤國也執事謂和固不可是矣愚不復言請得以權暇急之宜明戰守之説夫暇者急之對也出於暇則入於急出於急則入於暇天下曷常有一定之勢哉人主撫内而圖外籌事而揆策必知綢繆牖户於未雨之先欹危枕於寢安之際謀之常密慮之常固而不以目前之暇為適兵吾爪牙也謂當强之財吾血脈也謂當裕之人才將帥吾精神心膂也必為之素儲邊陲郡邑吾髖髀襟帶也必為之兼拊孜孜嵗月凛若禍至之無日夫如是則事功所形件件切實敵去可備敵至可禦豈惟守哉戰有餘矣庚戌省試能戰則可守可和深溝髙壘限隔南北畫地而分其守可乎曰未也一矢相加必推鋒越河而與之戰而後可以守卑辭厚禮兼愛南北俯首而聴其和可乎曰未也一語不合必却使焚幣而與之戰而後可以和嗚呼今之敵人非他小國比也吾之所以禦敵者其當與之戰乎其不當與之戰乎反覆之性無常變詐之情莫測必能戰而後能守不能戰而不能守也必能戰而後能和不能戰則不能和也吾惟能戰則吾國之威震以之而守則敵不敢以相陵吾惟能戰則吾國之氣伸以之而和則敵不敢以相詒是故向者未嘗不守也守之而不固者以吾不能戰也向者未嘗不和也和之而不堅者以吾不能戰也在我必能戰則以戰而守則敵畏吾之威其為守也固在我必能戰則以戰而和敵感吾之恩其為和也堅講明今日之最急者其戰之謂乎知人心則一戰可守竊嘗謂今日事勢有不當言和者有當言和者不當言和者今日之敵人是也所當言和者今日之人心是也和敵人則以之戰守而不足和人心則以之戰守而有餘不和於外而當和於内不和於敵國而當和於吾國此今日之要務不可不力行而定守也夫抱虎而處安保其不噬囓也枕蛇而卧安保其不騰躍也朝玉帛而暮干戈口道和而心伺釁敵人不可以言和久矣和議倡則冠葢之使一騁其舌而被介胄者解體矣歃血之盟一聞於耳而鳴劍者扼腕矣其何以戰哉崇壁到天闗門莫限可梯而升矣巨浪駕屋控扼不嚴可葦而航矣其何以守哉是之謂和敵人則以之戰守而不足一家不和鄉鄰肆侮血氣不和外邪乗間子弟則必衛父兄手足則必衛頭目人心不可不和也久矣人心茍和則制梃强於兵甲仁義强於干櫓食馬報德推鋒越河雖戰可也家為樓櫓人為金湯沉竈産蛙民無叛志雖守可也是之謂和人心則以之戰守而有餘偶句當難而圗其暇則和戎固所以為福已暇而忘其難則和戎乃所以為憂事力未裕孟浪興師時則輕敵而失於戰敵勢方張相顧駭愕時則畏敵而失於和介使往來習熟見聞時則玩敵而失於守規模素審議論素定敵來則戰敵去則守則其權常在我規模不立議論不一敵强則和敵弱則戰則其權常在敵警段和戎後世下策和戎一説古者之人心而後世之下策也人之言曰和戎之説發於劉敬襲於仲舒而其原起於晉之魏絳噫漢之所謂和豈晉人之所謂和哉晉之和戎戎事晉也漢之和戎漢事戎也伐戎吾國之威和戎吾國之福可以威而福之和在是矣絳之意若是彼漢人者不吝金繒不愛子女茍為一時之安而已果可與晉人同日而語乎故凡後世之虧人國體誤人國事皆和戎之説壞之也尚守不尚和戰夫謀國者和無種蠡之智徒貪功以市恩戰無光弼之能反餧敵以媚冦有能堅細栁之屯如周亞夫嚴刁斗之衛如程不識則彼之欲戰歟吾將被以甲兵震吾威武以戰則必克矣彼之欲和歟吾將與以皮幣與以犬馬以和則必成矣否則車馬之不修器械之不備而欲北伐玁狁南征蠻荆是浪戰也是輕敵也烏足以言戰子女之既飾玉帛之既遣而曰俱棄細過偕之大道是求和也是欵師也烏足以言和輕畏玩敵之失方國勢粗安邊烽未聳我之釁隙猶未可尋也夫何寡謀不審輕試妄為直謂可以洗荆棘之銅駝直謂可以復禾黍之宗廟直謂可以謁苕蕘之陵寢於是興恢疆拓境之師於是失始盟初誓之信而彼得以有辭於我矣藩籬自開誘盜賊於堂奥之内闗防不密納蜂蠆於懷袖之中寜非謀動干戈之躁乎吾故曰時則吾國在輕敵而失於戰及外患方滋警報交至我之聲勢猶可少張也夫何蓄縮淺謀動容失色直謂其强悍如虎狼直謂其飄忽如風雨直謂其出入變化如鬼神於是倡撒花買静之説於是謂玉帛交通之好而敵得以不能師易我矣羽檄方馳手板已倒持於廟堂之上狼煙未起兵甲已先棄於邊鄙之間得非此心之不武乎吾故曰時則吾國在畏敵而失於和今秋風已凜河水將合我之規模正當大作措置也夫何上下安措耳目慣熟直謂向嘗震我邊鄙俄而漸定直謂向嘗蹂我州邑俄而漸平直謂向嘗擣我險要俄而漸退於是不為更新局面之圖於是不為綢繆牖户之計而敵將突如其來得以無備乗我矣强冦闖門方為坐視優㳺之樂寢薪及火猶痼沉酣髙卧之安此果何時而尚忽視乎吾故曰時則吾國在玩敵而又失於未能守嗟夫一失於輕噬臍無及再失於畏飲恨尚新命脉無多着數無幾豈堪復失於玩耶無戰守之實不然朝廷之意嚮雖新邊閫之事功甚邈欲語其戰吾見戰備之無其實惟思賣降而已武庫之戈矛劒㦸軍容之旗幟旌旄其有慙色者多矣語其戰必勝之事不其顏厚乎欲語其守吾見守備之無其實惟務清野而已疆埸之柞棫松栢闗險之津梁驛候其有愧容者多矣語其守必固之事不其汗下乎此朝廷責實之意所正有望於邊閫務實之事功者正以此也有定見定力夫敵人非可以信誓結也有備則去無備則來勢所必至茍惑於和之一字則將帥無死敵之心師戎無力戰之志城郭必不修甲兵必不偹教習必少弛儲積必少緩萬一突如其來何以待之彼之以和誤我不知其幾矣是必意向有定見規模有定力安集流移固守形勝濬築吾城池修備吾器械選擇吾將帥訓練吾卒徒充實糗糧飭諸閫以相援募舟師以衛江當守則守可戰則戰假以日力而區區小戎坐縳麾下矣偶句和戰有兩難之勢備守有一定之謀髙城深池吾固吾圉修車備器吾厲吾威為深局固鐍之謀嚴積粟褁粮之備山桑喪師覆轍可監奉春失策沸鼎可懲揚執訊獲醜之威篤講信修睦之好周師復境戎車啓行漢幣出疆使葢相望偉晉人之議者欲焚幣以斬使主奉春之説者欲屈已以安民非國勢尊强則不可以言和非兵力全盛則不可以言和和無種蠡之智徒委計以無成戰無郭李之忠徒餧食以無補智以和議而昏氣以和議而索才以和議而沮力以和議而屈戰與守相為表裏也守乃所以為戰也和與守不相為謀也和非所以為守也挽强蹶張半歸技巧則弱吾之兵者和議也營田之利悉歸囊槖則耗吾之財者和議也自其六師妄舉羽書狎至有以失馬邑之謀自其四牡輕遣盟血未乾有以稔平凉之釁自其推轂非才棘門兒戲有以來闖蜀之兵自其籌邊無策天塹風寒有以啓飲江之志必扞敵之臣誠死城郭誠死封疆然後可以為守之規畫必立萬死一生之地可戰不可犯然後可以為守之規畫事證帝王無和戰守之名帝王之制敵也有定論無和戰守之名而得常勝之道何以言之格苗主於修德征葛本以寛仁文王以明德服昆夷武王以慎德致西旅鬼方之克干戈省躬之效也淮浦之平車攻修政之功也帝王之弭外患大扺自内修中得之禦戎定論無踰於此故四夷之來王氐羌之來享夷蠻之通道肅慎之來賀不過因其慕義而撫之爾未嘗屈恥與之和也臯陶明奸宄之刑伯禹屏龍蛇之患玁狁蠻荆之地采芑六月之師不過因其犯義而驅之爾豈廹而與之戰也皮服卉服之異制析支西戎之即叙采薇之命南仲烝民之城東方亦不過嚴此疆彼界之閑爾豈如後世之憚於和戰而局束自守者乎彼其德修於上政舉於下静則懷其德動則畏其力故和戰守之説未嘗指是以為應敵之規而要服荒服自綏輯而來朝王㑹者非以其先内後外自有得於常勝之道故耶漢唐和戰守之失漢唐以來禦戎之策卑矣漢髙之於匈奴其始主於戰也一沮於平城之辱則遽與之和唐太宗之於突厥其始主於和一激於渭橋之侮則又與之戰其和也既非修德來逺之規其戰也有愧於修車備器之盛其所以備夷狄者大抵視外勢之强弱而謀之故戰和與守茫無定論如此故婁敬之和親文静之借助平凉之結好皆屈己以和之而失居中馭外之權矣武帝之於匈奴太宗之於遼東明皇之於雲南皆怙力以戰之而非取彼㓙殘之義矣棘門灞上之戲玉闗謝質之嚴亦徒為􅍖邊固圉之策而豈能如昔人之守在四夷者乎彼其諸君雖無修德明政之實而鼂錯杜牧之徒不過各執一時之説此漢唐之世四裔之叛服無常者非以其無内修之實而非常勝之策故耶古者言和所以為戰大抵和固所以息戰也而亦所以致戰自古英雄之君出而平定天下莫不豢於和而成於戰吾求之漢有髙帝焉其入秦也以和其下齊也以和其滅楚也亦以和其以利啗秦將一欲連和而嶢闗之戰已合酈生説齊一諧而韓信之師俄集於歴下項羽自申鴻溝之約束兵未返國而垓下之師曳踵而至以其舒遲容與不遽嬰其鋒而方且逡巡退避以托於和者將以有為也故不五年而帝業定豈恃於和而甘於辱者所能就大事哉歴代恃守不恃和戰周衛中國戍邊采薇漢備匈奴軍屯細栁古人守禦之良畫誠今日之所當講也雖然即守以遂其欲戰之圖則守之策為可行假守以盡其欲和之私則守之策不足恃何則守而志於戰則内修外攘之政無日不講而見可則進特不冒焉送衂而已豈不足以重國勢守而志於和則逺防險要之地不敢盡争而臨邊多防特塊然株守而已寜不足以啓戎心有如濡須築塢合治荆州此呉人之守也而出居巢向合淝者殆無虚嵗豈以戰為可忘乎畫江自固増重上流此晉人之守也而斬使焚幣未嘗通一介之行李豈以和為可安乎此無他蓋不如是則不足以為安也然則今日之守亦盍知所以為策矣焚幣者有生意愚嘗讀史至殷浩禇褎北伐為蔡謨王羲之沮止之事未嘗不扼腕太息青衣之辱雞犬憤激幸而竟自相屠内自相攻指義旗而長驅斯其時矣而度德量力之語以樸為忠竟沮成謀不知於晉為謨為羲之而遂忘平陽之事乎又至謝𤣥淝水一捷反以資慕容垂復祚之謀為之拊襟浩嘆苻秦之强豈易殄滅幸而指授有法風鶴彰靈扣函谷而封之斯其時矣而捧書折屐之喜志盈量滿卒無逺圖不知安石諸人亦嘗聞新亭涕泗之語乎蓋至於修幣之來詔焚不受然後為之洒然喜曰晉之猶有生意其在斯矣勒之幣不登則晉之義猶明和之計不行則晉之氣猶壯他日尚可係其頸以告宗廟之靈陳其尸以正稾街之罪奈何徘徊顧望姑息宴安不思掃蕩河嵩闗洛之餘氛以雪前恥反有運米於枋頭以濟仇之飢率軍於闗陕以資敵之助噫淮淝百萬之來志欲何為幸其天敗粮盡力困而遁晉之生氣亦在斯矣今乃舉國之大讎付之相忘之域豈不深可惜哉祖宗和戎難恃和議之不足恃也敵情之不足信也反覆性成陰謀叵測紹興初年契丹懾我氣燄遣使請和口血未乾而侵欲之心復萌盟言在耳而和議之計已渝越明年而又入冦蹂踐疆土屠毒生靈我髙宗皇帝肅將天威委命張韓劉岳呉虞諸將罷和議而修戰畧存紀綱以立國體而有順昌郾城襄陽柘臯大儀朱仙鎮和尚原之捷然而沿邊諸郡生民騒擾嵗無寜日金人復大舉南侵城邑之屠兵師之衂可不懲乎漢蜀淪失矣兩淮蹂踐矣一勝難恃後憂方深如必覬兄弟之分争望南北之猜懼是俟河之清也毋己則有一焉逺交近攻之遺智可為祖耳昔漢武帝欲伐滇池先遣使通道于西南將伐匈奴則結好烏孫以斷其右臂此前事之可師也愚嘗聞諸邉諜之言以為直宜限制近邉不使越唐鄧蔡息而北獨許之南面而責其子女玉帛之獻爾夫且既滅其國而俘其人驅之使戰安知不欲坐收卞莊子刺虎之功乎守戰之説以禦近攻而不至輕挑逺舉之怒用和之説以交逺之謀而必思力制近攻之患如紹興初年藕塘一捷殲偽齊數萬之師金人知懼而和議成矣當敵人方强之時此亦随宜應變之方也今日誤於和戰粤自金人既亡中原在望謀國之臣孰不曰百年祖宗社稷可復一家文軌舊物遄歸勒浯水之碑刻岐陽之鼔在此行矣奈何始欲揚旗復土而終也匹馬之莫收始欲推鋒越河而終也隻輪之不返於是痛心於遼水之行噬臍於白登之役而戰之議倐變而成和謀國之臣又孰不曰結好全民金繒奚愛締盟鄰國嵗幣寜輸賜南越之書受西域之質斷可信矣奈何琬圭方執而不知鳴鏑之俱來載書未還而不知警報之交至於是切齒於吐蕃之欺絶口於便橋之約而和之議忽轉而為守一誤於戰再誤於和所不誤者僅有守耳則夫蜀吾首也盍謹隄防襄吾脊也盍錮扄鐍淮吾足也盍杜藩垣江西孤立何以保吾江海道易窺何以防吾海無日不討國人而申儆之可也今也峨眉劔閣黯焉戰塵而蜀墮甑矣方城漢水莽焉盜區而淮瓦解矣險阻形勢難恃以守戰傳曰天時不如地利地利不如人和此可見形勢之不如德也呉起曰在德不在險此可見險阻不足恃也夫秦中天下之固也劍閣天下之險也長江天下之阻也秦蜀呉恃以為天固天險天塹也至於始皇之不道劉禪之庸懦孫皓之㓙殘非勢不足以戰而力不足以守良由德之不修也故陳涉得以斬揭而入殽函鄧艾得以魚貫而取益州王濬得以順流下趨建康迨乎後世冦斥中原闗中汴京鬱焉蒼莽而荆襄敝屣矣公山淝水蕩焉虚邑而淮為瓦礫之場矣曩時波濤洶湧千羣莫前今則共吾險而江可投鞭矣曩者蛟龍伏藏萬頃澄碧今則窺吾隙而海為捷徑矣然則戰誤矣而戰壞和誤矣而和壞至於守雖未誤而復以和戰之誤而亦壞謀國者其將信其誤而聴其壞乎抑將懲其誤而修其壞乎夫邊之禍極矣邊之議難矣涸水取魚披枝伐木此彼之狡計也今水果涸而枝果披矣全蜀失湖湘潰襄峴失長淮蕩輿圖山川不足以言形勢紙上孫吳不足以言兵法至哉斯言歟偶句信誓雖堅而陰險之詐不常玉帛雖富而溪壑之欲難盈金繒之好雖講而器械之備不敢忘玉帛之奉雖勤而兵卒之練不敢忘罅隙固塞不可謂守風寒未䕶不可謂守束手待敵不可謂守閉城危坐不可謂守羣書㑹元截江網卷二十四
