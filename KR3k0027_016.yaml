body:
  text: 羣書㑹元截江網卷十六兵法歷代事實神農兵法一篇黃帝十六篇圖三卷風后十三篇圖二卷力牧十二篇前漢藝文志趙括長平之敗見將帥門漢張良韓信序次兵法删取要用定著三十五家諸吕用事而盜取之武帝時軍政楊僕捃托遺逸紀奏兵録猶未能備至于孝成命任宏論兵書為四種前藝文志張良嘗逰下邳圯上夜半老父出書一編曰讀是可為王者師後十三年孺子見我濟北榖城山下黃石即我旦日視其書乃太公兵法本傳良數以太公兵法說沛公常用其策為他人言皆不省良曰沛公殆天授同上漢王遣韓信擊趙乃使萬人先行出背水陳大破趙軍諸將因問信曰兵法右背山林前左水澤今者將軍反之竟以此勝何也信曰此在兵法顧諸君勿察耳兵法不曰陷之死地而後生投之亡地而後存乎同上霍去病武帝嘗欲教以孫吳兵法對曰顧方略何如耳不至學古兵法同上李陵征胸奴戰敗班師為單于所逐及於大澤胸奴於上風縱火陵亦先放火燒斷葭葦用絶火勢通典趙充國少好將帥之節而學兵法通知四夷事本傳東漢光武吳漢討公孫述乃進軍攻廣都拔之漢乘利遂自將步騎二萬進逼成都阻江北為營作浮橋使副將劉尚將萬餘人屯於江南相去二十餘里帝聞大驚使責漢曰公既輕敵深入又與尚别營賊若出兵綴公而以大衆攻尚尚破公即敗矣急引兵還廣都後漢遂銜枚引兵與尚合軍遂大敗之本傳蜀先主東下伐吳魏文帝聞備栅連營七百餘里曰豈有七百里營可以拒敵者乎包原隰險阻而為軍者為敵所擒此兵忌緩急不相救一軍潰則衆必恐矣後數日果有備敗書至諸葛亮兵法曰山林之戰不仰其高水上之戰不逆其流草上之戰不涉其深平地之戰不逆其虛此兵之利也故戰鬪之利惟氣與形也通典亮至南中所在戰捷聞孟獲者為夷漢所服募生致之既而使觀於營陳之間問曰此軍何如獲曰向者不知虛實故敗今蒙賜顧看陳若祗如此即定易勝矣亮縱使更戰七縱七擒而亮猶遣獲獲止不去曰公天威也南人不復反矣本傳馬謖才器過人好論軍計諸葛亮深加器重先主臨斃謂亮曰馬謖言過其實不可重用亮猶不以為然以謖為參軍每引見談論自晝達夜亮討雍闓等馬謖迎之曰用兵之道攻心為上攻城為下心戰為上兵戰為下願公服其心而已亮納其言及出軍祁山亮不用舊將魏延吳懿等為先鋒而以謖督諸軍在前與張郃戰于街亭謖違亮莭度大敗亮還漢中收謖下獄殺之同上梁將王僧辨陳霸先之敗侯景也曜軍於張公洲髙旗巨艦遏江蔽日景登石頭城而觀之不悅曰彼軍士有如堤之氣不可易也因率鐵騎萬人聲鼓而進霸先曰善用兵者如常山之蛇首尾相應賊驚送死宜分其勢僧辨然之乃以强弩攻其前輕騎蹂其後大兵徑衝其中景遂大潰通典唐馬燧歎曰方天下有事大丈夫當以功濟四海更學兵書戰䇿本傳張巡守睢陽大小四百戰其用兵未嘗依古法勒大將教戰各出其意或問之答曰古者人情厚朴故軍有左右前後大將居中三軍望之以齊進退今胡人務馳突雲合鳥散變態百出故吾止使兵識將將識士情上下相習人自為戰耳本傳房琯河橋之敗見步騎門偶句學萬人敵遂雄諸侯授一編書克佐大業山濤論兵暗合孫吳畢誠言兵稱為頗牧張良運籌决勝而出於太公之遺書韓信戰勝攻取而出於孫吳之遺法至長平而後知兵書坐讀之兵書不足用至街亭而後知軍計坐論之軍計不足信投之死地而後生此兵法也惟韓淮隂能用之先為不可勝以待勝此兵法也惟趙充國能用之孫臏設伏以勝龎涓至王恢用之則罔功矣趙奢疾走以破秦軍至曹操用之則自斃矣充國之緩先零兵法所謂窮寇勿迫也而太宗之擒薛仁杲必有以乘其窮曹操之勝張繡兵法所謂歸師勿遏也而盛彥師之擒李密必有以遏其歸陶侃雖用兵而常得法外意去病不學法而顧方略如何皇朝事實太祖建隆元年上問趙普以揚州事宜普曰李重進無諸葛亮之恩信有袁本初之强梁計謀不用外絶援內乏資糧急攻亦取緩攻亦取兵法尚速不如速取之太宗至道二年夏州延州行營言兩路合勢破賊於烏白池賊首李繼遷遁去上初以方略授諸將先閲兵於崇攻殿列陳為攻擊之狀刺射之節且令多設强弩及遇賊布陳萬弩齊發賊無所施其技矢才一發賊皆散走仁宗嘉祐六年大理寺丞郭固編校御閣所藏兵書先是置官編校書籍而兵書與天文為祕書而不預大臣或言固知兵法即以命之然兵書殘缺者多不能遍補也英宗治平四年詔六宅副使郭固為內藏庫副使升一任固嘉祐六年四月奉詔遍修兵書於祕閣至是書成故有是命神宗熙寧三年上曰今兵無紀律有紀律則足以勝敵矣安石曰紀律所以自治算數所以勝敵故兵法曰多算勝少算不勝况於無算乎今非但無紀律尤患無算數五年詔賜王韶御制攻守圖行軍環珠武略總要神武祕略風角集占四路戰守約束各一部仍令秦鳳路經略使抄録六年上謂輔臣曰李靖團力之法以三人得意者為隊長已令李浩試之懿治二州疑亦可行王安石等曰三代至於漢魏皆以五人為伍至如三人若一人戰死押官執刀在後即斬二人恐不可七年上與輔臣論戰陳之法因曰兵凶事也主殺尚右而陽多者勝如髙者可以勝下長者可以勝短是也內出攻守圖二十五部賜河北又出敵樓樣送軍器監頒降修製並長編髙宗紹興二十六年吳璘領御前諸軍都統制判興州璘嘗著書號兵要大略謂金人有四長我有四短當反我之短以制彼之長至於陳法則有圖而無書焉聖政紹興九年胡世將嘗問吳玠所以勝者於其弟璘璘曰彼令酷而下必死先兄每與之戰非終日不决大抵舉中國所長而用之耳蓋中國弓矢徑利彼士卒堅耐吾嘗以長技洞重甲於數百步外又選據便利出鋭卒以更撓之使不得休彼雖堅耐亦不能無弛此待之之要也小厯璘嘗自著書曰兵要大略謂金人有四長我有四短當反我之短以制彼之長蓋彼之所長曰騎兵曰堅耐曰甲重曰弓矢吾嘗集漢畨所長而兼用之故制其騎則有分隊之法制其堅忍則有更休迭戰之法制其甲曰徑弩制其弓矢曰以逺尅近以强制弱其說甚備至於陳法有圖而無書焉同上偶句命郭固以編兵書者嘉祐之六年也召顧臨以問兵法者熙寧之四年也隂符之覽太宗雖言其詭詐之不可用祕略之賜神宗亦言其戰攻之不可無韓琦作陳效古兵法則契丹不能侵吳玠用兵皆本孫吳則强寇不能犯王德用長於兵而不學孫吳兵法范忠宣熟於兵而未嘗學古兵法以竒為正以正為竒神宗之言也多算者勝少算者敗安石之言也七書撮要孫子十三篇始計一作戰二謀攻三軍形四兵勢五虛實六軍爭七九變八行軍九地形十九地十一火攻十二用間十三孫子曰兵者國之大事死生之地存亡之道不可不察也故經之以五事校之以計而索其情一曰道二曰天三曰地四曰將五曰法道者令民與上同意可與之死可與之生而不畏危也天者隂陽寒暑時制也地者逺近險易廣狹死生也將者智信仁勇嚴也法者典制官道主用也凡此五者將莫不聞知之者必勝不知者不勝不知者不勝故校之以計而索其情兵者詭道也故能而示之不能用而示之不用近而示之逺逺而示之近利而誘之亂而取之實而備之强而避之怒而撓之卑而驕之佚而勞之親而離之攻其無備出其不意此兵家之勝不可先傳也夫未戰而廟算勝者得算多也未戰而廟算不勝者得算少也多算勝少算不勝而况於無算乎吾以此觀之勝負見矣始計篇凡用兵之法馳車千駟革車千乘帶甲十萬千里饋糧內外之費賔客之用膠漆之材車甲之奉日費千金然後十萬之師舉矣故兵聞拙速未覩巧之久也善用兵者役不再籍糧不三載取用於國因糧於敵故軍食可足也兵貴勝不貴久故知兵之將民之司命國家安危之主也作戰篇百戰百勝非善之善者也不戰而屈人之兵善之善者也故上兵伐謀其次伐交其次伐兵其下攻城用兵之法十則圍之五則攻之倍則分之敵則能戰之少則能逃之不若則能避之故曰知彼知己百戰不殆不知彼而知己一勝一負不知彼不知己每戰必敗謀攻篇孫子曰昔之善戰者先為不可勝以待敵之可勝不可勝在己可勝在敵故善戰者能為不可勝不能使敵之必可勝故曰勝可知見或形也而不可為敵有備故也善守者藏於九地之下善攻者動於九天之上軍形篇凡戰者以正合以竒勝故善出竒者無窮如天地不竭如江海終而復始日月是也死而更生四時是也兵勢篇孫子曰凡先處戰地而待敵者佚後處戰地而趨戰者勞故善戰者致人而不致於人能使敵人自至者利之也能使敵人不得至者害之也故我欲戰敵雖髙壘深溝不得不與我戰者攻其所必救也我不欲戰雖畫地而守之敵不得與我戰者乖其所之也虛實篇孫子曰軍無輜重則亡無糧食則亡無委積則亡故不知諸侯之謀者不能豫交不知山林險阻沮澤之形者不能行軍不用鄉𨗳者不能得地利故兵以詐立以利動以分合為變者也無邀正正之旗勿擊堂堂之陳此治變者也故用兵之法髙陵勿向背丘勿逆佯北勿從鋭卒勿攻餌兵勿食歸師勿遏圍師勿闕窮寇勿迫此用兵之法也軍爭篇用兵之法無恃其不來恃吾有以待之無恃其不攻恃吾有所不可攻也九變篇辭卑而益備者進也辭强而從驅者退也輕車先出居其側者陳也無約而請和者謀也奔走而陳兵者期也半進半退者誘也行軍篇孫子曰進不求名退不避罪惟民是保而利於主國之寶也視卒如嬰兒故可與之赴深溪視卒如愛子故可與之俱死愛而不能令厚而不能使亂而不能治譬如驕子不可用也地形篇孫子曰諸侯自戰其地者為散地入人之地而不深者為輕地我得亦利彼得亦利者為爭地我可以往彼可以來者為交地諸侯之地三屬先至而得天下之衆者為衢地入人之地深背城邑多者為重地山林險阻沮澤凡難行之道者為圯地所由入者隘所從歸者迂彼寡可以擊吾之衆者為危地疾戰則存不疾戰則亡者為死地故善用兵者譬如常山之蛇也卒然擊其首則尾至擊其尾則首至擊其中則首尾俱至是故始如處女敵人開戶後如脫兔敵不及拒九地篇孫子曰凡興師十萬出征千里百姓之費公家之奉日費千金內外騷動怠於道路不得操事者七十萬家相守數年以爭一日之勝而愛爵祿百金不知敵之情者不仁之至也用間篇吳子六篇吳子曰昔之圖國家者必先教百姓而親萬民有四不和不和於國不可以出軍不和於軍不可以出陳不和於陳不可以進戰不和於戰不可以决勝是以有道之主將用其民先和而造大事不敢信其私謀必告其祖廟啓於元龜參之天時吉乃後舉民知軍之愛其命惜其死若此之至而與之臨難則士以進死為榮退生為辱矣凡兵之所起者有五一曰爭名二曰爭利三曰積惡四曰內亂五曰因饑其名又有五一曰義兵二曰强兵三曰剛兵四曰暴兵五曰逆兵禁暴救亂曰義恃衆以伐曰强因怒興師曰剛棄禮貪利曰暴國亂人疲舉事動衆曰逆五者之數各有其道義必以禮服强必以謙服剛必以辭服暴必以詐服逆必以權服武侯嘗謀事羣臣莫能及罷朝而有喜色起進曰昔楚莊王嘗謀事羣臣莫能及罷朝而有憂色曰寡人聞之世不絶聖國不乏賢能得其師者王能得其友者霸今寡人不才而羣臣莫及者楚國其殆矣此楚王之所憂而君說之臣竊懼矣於是武侯有慙色圖國篇吳子曰凡兵戰之場丘尸之地必死則生幸生則死其善將者如坐漏船之中伏燒屋之下使智者不及謀勇者不及怒受敵可也故曰用兵之害猶豫最大三軍之灾生於狐疑治兵篇司馬法得百三十篇今所存者五篇一曰仁本二曰天子之義三曰定爵四曰嚴位五曰用衆前藝文志古者以仁為本以義治之之謂正正不獲已則權權出於戰不出於害人是故殺人安人殺之可也攻其國愛其民攻之可也以戰止戰雖戰可也故國雖大好戰必亡天下雖安忘戰必危天下既平天子大愷春搜秋獮諸侯春振旅秋治兵所以不忘戰也古者逐奔不過百步縱緩不過三舍是以明其禮也不窮不能而哀憐傷病是以明其仁也成列而鼓是以明其信也爭義不爭利是以明其義也仁本篇國客不入軍軍客不入國軍客入國則民德廢國客入軍則民德弱古者賢王明民之德盡民之善故無廢德無簡民賞無所生罰無所試有虞氏不賞不罰而民可用至德也夏賞而不罰至教也殷罰而不賞至威也周以賞罰德衰也賞不踰時欲民速得為善之利也罰不遷列欲民速覩為不善之害也天子之義篇唐太宗李衛公問對靖曰兵法自黃帝以來先正而後竒先仁義而後權譎周之始興太公實繕其法始於岐都以建井畝戎車三百輌虎賁三百人以立車制六步七步六伐七伐以教戰法陳師牧野太公以百夫致師以成武功周司馬法本太公者也太宗曰張良韓信之次兵法今失其傳何也靖曰張良學太公六韜三略是也韓信學穰苴孫武是也然大體不出三門四種而已太宗曰何謂三門靖曰按太公謀八十一篇所謂隂謀不可以言窮太公言七十一篇不可以兵窮太公兵八十五篇不可以財窮此三門也太宗曰何謂四種靖曰漢任宏所論是也兵家者流謀為一種形勢為一種及隂陽技巧為二種此四種也太宗曰蕃兵惟徑馬奔衝此竒兵歟漢兵惟强弩掎角此正兵歟靖曰蕃長於馬馬利乎速鬪漢長於弩弩利乎緩戰太宗曰以誘待昧以靜待躁以重待輕以嚴待懈以治待亂以守待攻反是則力有所不逮太宗曰朕觀千章萬句不出乎多方以誤之一句而已靖良久曰誠如聖語大凡用兵若敵人不誤則我師安能克哉譬如奕棋兩敵均焉一著或失竟莫能救是古今勝敗率由一誤而已况多失者乎太宗曰古者出師命將齊三日授之以鉞曰從此至天將軍制之又授之以斧曰從此至地將軍制之又推其轂曰進退惟時既行軍中但聞將軍之令不聞君命朕謂此禮久廢今欲與卿參定遣將之儀如何靖曰臣切謂聖人制作致齊於廟者所以假威於神也授斧鉞又推其轂者所以委寄以權也今陛下每有出師必與公卿議諭告廟而後遣此則邀以神至矣每有任將必使之便宜從事此則假以權重矣何異於致齊推轂邪盡合古禮其義同焉不須參定上曰善乃命近臣書此二事為後世法太宗曰卿嘗言天官時日明將不法暗者居之廢亦宜然靖曰昔紂以甲子日亡武王以甲子日興天官時日甲子一也殷亂周治興亡異焉又宋武帝以往亡日起兵軍吏以為不可帝曰我往彼亡果克之由此言之可廢明矣尉繚子二十四篇凡兵有以道勝有以威勝有以力勝講武料敵使敵之氣失而師散雖形全而不為之用此道勝也審法制明賞罰便器用使民有必戰之心此威勝也破軍殺將乘間發機潰衆奪地成功乃返此力勝也戰威篇將軍受君命必先謀於廟行令於廷君身以斧鉞授將曰左右中軍皆有分職若踰分而上請者死軍無二令二令者誅留令者誅失令者誅將軍乃告曰出國門之外期日中設營表置轅門期之如過時則坐法將軍入營即閉門清道有敢行者誅有敢髙言者誅有敢不從令者誅將令篇黃石公三略軍誡曰柔能制剛弱能制强柔者德也剛者賊也弱者德之所助强者怨之所攻能柔能剛其國彌光能弱能强其國彌彰純柔純弱其國必削純剛純强其國必亡夫所謂士者英雄也故曰羅其英雄則敵國窮英雄者國之幹庶民者國之本得其幹收其本則政行而無怨夫用兵之要在崇禮而重祿禮崇則智士至祿重則義士輕死故祿賢不愛財賞功不踰時則下力并而敵國削夫用人之道尊以爵贍以財則士自來接以禮勵以義則士死之軍誡曰軍井未達將不言渴軍幕未辦將不言倦軍竈未炊將不言飢冬不服裘夏不揮扇雨不張蓋是謂將禮與之安危故其衆可合而不可離可用而不可疲以其恩素蓄謀素和也故曰蓄恩不倦以一取萬夫將拒諌則英雄散策不從則謀士叛善惡同則功臣倦専卩則下歸咎自伐則下少功信讒則衆離心貪財則奸不禁內顧則士卒淫將無慮則謀士去將無勇則吏士恐將妄動則軍不重將遷怒則一軍懼軍誡曰軍無財士不來軍無賞士不往故曰香餌之下必有垂魚重賞之下必有死夫故禮者士之所歸賞者士之所死上略軍勢曰使智使勇使貪使愚智者樂立其功勇者好行其志貪者邀趍其利愚者不顧其死上略設禮賞别奸雄著成敗中略差德行審權變下略陳道德察安危明賊賢之咎太公六韜其篇六十文韜之目十有二曰文師曰盈虛曰國務曰大禮曰明傳曰六守曰守土曰守國曰上賢曰舉賢曰賞罰曰兵道謂文韜者文王之問太公居其九也武韜之目有五曰發啓曰文啓曰文伐曰順啓曰三疑謂武韜者武王之問太公居其末也龍韜之目十有三曰王翼曰論將曰選將曰立將曰將威曰勵軍曰隂符曰隂書曰軍勢曰竒兵曰五音曰兵徴曰農兵此皆言謀將之事謂龍韜者以龍而喻謀將虎韜之目十有二曰軍用曰三陳曰疾戰曰臨境曰壘虛曰必出曰軍略曰動靜曰金鼓曰絶道曰火戰曰陳略此皆言勇將之事謂虎韜者以虎而喻勇將也豹韜八篇曰林戰曰突戰曰敵强曰敵武曰鳥雲山兵曰鳥雲澤兵曰少衆曰分險以豹而命其韜者所以喻偏禆之分擊者也犬韜十篇曰分合曰武鋒曰練士曰教戰曰均兵曰武車士曰武騎士曰戰車曰戰騎曰戰步以犬而命其韜者所以喻士卒之宣力者也太公曰義勝欲則昌欲勝義則亡敬勝怠則吉怠勝敬則滅明傳篇太公曰將以誅大為威以賞小為明以罰審為禁止而命行故殺一人而三軍震者殺之賞一人而萬人說者賞之殺貴大賞貴小殺及當路貴重之臣是刑上極也賞及牛馬走厮養之徒是賞下通也刑上極賞下通是將威之所行也將威篇用兵之害猶豫最大三軍之灾莫過狐疑善者見利不失遇時不疑失利後時反受其殃故智者從之而不釋巧者一决而不猶豫是以疾雷不及掩耳其必出於法故人不可以不學然法之所得而傳者其粗也以其不盡出於其法故人不可以專守蓋法之無得而傳者其妙也法有定論而兵無常形一日之內一陳之間離合取舍其變無窮一移踵瞬目而兵形易矣守一定之書以應無窮之敵則勝敗之數戾矣是以古之善用兵者不以法為守而以法為用常能緣法而生法與離法而㑹法順求之於古逆施之於今仰取之以天而俯變之以巳人以之死我以之生人以之敗而我以之勝視之若拙而卒工察之若愚而適為智運竒合變既勝而不以語人則人亦莫知其所以然也何去非古人不拘兵法夫歸師勿遏曹公所以敗張繡也皇甫嵩犯之而破王國窮寇勿追趙充國所以緩先零也唐太宗犯之而降薛仁杲百里而爭利者蹶上將孫臏所以殺龎涓也趙奢犯之而破秦軍虞詡犯之而破叛羌强而避之周亞夫所以不擊吳軍之鋒也光武犯之而破尋邑石勒犯之而敗姬淡兵少而勢分者敗黥布所以覆楚軍也曹公用之拒袁紹而斬顔良臨敵而易將者危騎劫所以喪燕師也秦軍用之將白起而破趙括薛公策黥布以三計知其必棄上中而用其下賈詡策張繡以精兵追退軍而敗以敗軍敵勝卒者勝宋武先料譙縱備我之出其不意然後攻彼之不意李光弼暫出野次忽焉而歸即降思明之二將凡此者皆非法之所得膠而書之所能教也何去非韓信用兵以術韓信用兵在楚漢之間則為善矣方之五伯己自不及以無節制故也如信之軍修武髙祖即其卧內奪之印易諸將信尚未知此與棘門霸上之軍何異但信用兵能以術驅人使自戰當時亦無有以節制之兵當之者故信數得以取勝也王者之兵未嘗以術勝人然亦不可以計敗後世惟諸葛亮李靖為知兵如諸葛亮已死司馬仲達觀其行營軍壘不覺歎服而李靖惟以正出竒此為得法制之意而不務僥幸者也楊龜山遊騎不可太逺兵法須先立定家計然後以遊騎旋旋量力分外面與敵人合比便是合內外之道若遊騎太逺則却歸不得至聽金鼓聲亦且忘却自家如何如苻堅夀春一敗便不可支持無本故也主意竒正皆當有路熟路長驅獸奔豕突兵法曰正愚謂正有時而為竒間道捷出狙擊鼠窺兵法曰竒愚謂竒有時而為正何則竒正無常形亦無定所竒者我之所不備敵知我之有備未必不視之以為正正者敵之所必攻敵示我以不攻未必不因之以為竒黃虎之戰晉正道也外水之戰晉竒道也向使蜀人捨正而備竒則劉裕何以成尅取之功外水之襲彭門再襲也竒可暫出以見侵再用之則正陳倉之出蜀竒道也斜谷之出蜀正道也向使諸葛亮捨竒而出正則魏人安得遂成守之謀陳倉之出可以無出也正可不出以示疑忽用之則竒知此則可論今日之備邉矣論兵不若以義論兵以法不若論兵以義周戈一揮侯國效順漢旌一顧士卒歸心論兵以義者然也黃石一編帝者為師背水一陳三軍效力論兵以法者然也以法而言則衆寡異勢無敵强而我弱緩急異用無彼先而此後分合異尚無首觸而尾不應以義而論則寡足以制衆則前有倒戈之徒緩足以御急則動中投機之㑹分足以勝合則後無遺鏃之憂三者真論兵之要領不可盡泥於法自趙括徒守父書而有膠柱鼓瑟之譏然後知古之兵法不可盡用於今自霍去病不學兵書而成攘夷拓境之功然後知今之兵法不容以盡泥乎古嗟夫師分八陳列壘分屯星分霧散而敵人不得以嬰其鋒雲張蛇蟠而游兵無自以乘其間其或羽書交馳則率羣分之卒以張虎狼吞噬之鋒至於烽燧甫集則全在我之師以為飬威持重之計是固古人之良法也然世之不同勢亦隨異泥列屯為壘之地以應敵則今古之世殊而攻守之形異有不容以循途而索軌者也執衡抗軸布之法以言兵則强弱之勢昧而進取之策殊有不容以依規而為員者矣是知捨古人八陳之法而無隨時通變之道亦豈善於用兵者有胸中之兵書有紙上之兵書有胸中之兵書如太公隂謀光弼靈轄穰苴司焉法李靖六軍鏡吳孫子三十三壘經裴行儉回十六陳訣此則為紙上之兵書如淮隂之囊沙武侯之流馬風后八陳兵陳平六竒計孫臏之減竈疑晉宋武之糾敵入峴此則為胸中之兵書偶句有兵家之談兵有儒家之談兵傳兵法以書用兵法以時用兵無常勢視時以為之勢制陳無定法因人以為之法兵以勢合則知制兵不可無其法兵以機動則知用兵不可泥其法警假用兵有常有變夫用兵以機動以算勝不可以形勢求不可以故智論與神為謀而神不可以測吾之幽示敵以形而敵不可以得吾之實可以退可以無退可以進可以無進可以守可以無守呼吸變化雷霆不足以喻其速山嶽不足以喻其重無法之可待無圖之可援非至神不能知其變非深識不能燭其機非天下竒材不足以語其巧是非守筌可以得魚刻舟可以求劔也言兵易用兵難言兵者易用兵者難言兵者肆其說於己則曰勝曰敗無齟齬也用兵者角其智於人而謂坐談之兵書我獨得而用之乎故必有鳥雲之陳在吾方寸中則衝堅攻瑕敵莫敢當而何泥乎方策必有常山之勢在吾虛室中則邀前薄後敵莫能識而何學乎虛文其視守孫吳之遺法而僥幸於一勝者不亦大相逺乎用兵之道難言論兵之法可以有言論用兵之道不可以有言何謂可以有言兵法之載于書者方員曲直之有其形坐作進退之有其節稽韜略之所陳與孫吳之著述大勢瞭然如指諸掌故可以有言用兵之際呼吸俄頃千變萬態或備其東而出其西或制於彼而誘于此多方以誤之竒正以撓之使善用兵者卒然臨敵猶不能以豫定而况可以有言乎兵有竒正之理節制之兵其法繁其行密脈絡鈎援曲折相對進無策奔退無遽走前者鬬後者治力後者進前者更休一以當十十以當百詐者不能襲勇者不能突當之則破觸之則摧此所謂正兵而已挫堅敵也簡捷之兵其法略其行疏號令簡易表裏洞貫進如飇風退如疾電地險則魚貫而前道迂則鴈行而進以一擊百以百擊萬間者不及知勇者不及拒望之則恐遇之則潰此所謂竒兵而已掩脆敵也偶句有胸中之成算有紙上之陳言天行地軸之分布七八九六之經緯節制之兵其法繁簡捷之兵其法略地險則魚貫而前道迂則鴈行而進善奕者不以譜而天下之奕者不可以無譜善醫者不以方而天下之醫者不可以無方講六韜之遺書不若有征無戰之一言捨三略之緒論不若師直為壯之一語通變不窮者始可以言兵法膠固不通者不可以言兵法事證古人不專泥法嘗觀古人言兵法者衆矣竒正之相權利害之相傾戰守攻圍之法蓋以百數操其說者宜無敵於天下今觀張良之佐漢運籌幃幄决勝千里而其學實出於太公韓信之用兵戰勝攻取破趙魏下燕齊其鋒莫當而其法皆本於孫武是皆有得於兵法者也然霍去病之屢勝胸奴則謂何嘗學古兵法張巡守睢陽則謂未嘗依古法則又不專在於法也以至趙括好讀兵書而卒敗於長平馬謖善論兵法而卒敗于街亭是又法之不足恃也故愚為之論曰制而用之謂之法推而行之存乎人用兵者固不可不學兵法亦不可專泥於法名將不拘古法談兵法於平居無事之時者易識兵略於倉卒應變之頃者難夫右山左水兵家之常也韓信易背水之陳而破趙之功以成增竈示强兵家之要也孫臏陽為減竈之計而破魏之名以顯惟能不拘於一定之法而思有以乘其機不溺於己陳之迹而思有以通其變則進取之機可乘而備禦之方可得矣兵尚乎速兵尚神速如以三千兵而破突厥所謂震雷不及掩耳固也然堅壁以挫吳楚之鋒者果尚速乎兵尚安靖如耕者雜於渭濵而軍民無私固也然免胄前登卒收陜郡之勝果應之緩乎不學古法者或可奏一時之捷然揣摩事機無發不中者亦自圯上老人之所授者始也好讀左氏者或可應良將之稱然料敵制勝無語不酬即前日寄食漂母之人也當攻則攻必如望轍亂旗靡而后可哥舒翰之攻豈可效乎當守則守必如保盱眙以却魏而后可雍齒之守果可效耶擇可謀而謀之必如勝趙而訪李左車而后可謂之謀毋徒輕舉嘗試以取敗所當斷而斷之如孫權走曹操於赤壁而后可謂之斷毋徒輕任己見以沮衆謀凡此者皆用兵者之所當知也兵法之所謂神與深者又豈越是耶法貴善用兵之有法猶醫之有方至於用之則惟其人而已自今觀之雨水欲涉必待其定渡兵法也濤灘瀨急乘水傳壘李靖何為有肖鋭之擒風逆則堅陳以待審候法也逆風而戰出其不意張彥澤胡為而敗契丹之師韓信以背水陳而勝趙豈法之所謂前左水澤者乎太宗以右師小却而擒老生豈法之所謂利誘亂取者乎皇甫之攻王國乘其疲弊豈法之所謂窮寇勿迫乎國朝不專兵書國朝以仁立國列聖相承雖不敢去兵亦未嘗窮兵書之於冊無非精神心術之形見也故命左右取軍戒三篇以賜樞密使而又以賜王顯則太平興國八年也製平戎萬全以示宰相樞密院又以賜潘美則雍熙之四年也蓋自慶厯留意西事寶章奎畫昭出兵行師之要則又有神武祕略之書講畫籌策詳彚次兵書之舊則又有武略總要之書至於三邉經武聖略則編於王洙熙寧經武要略則類於王存此則要略之所由始也雖或自備觀覽或分賜諸臣或頒示諸將其刪次之不一始末之不同大要皆經武之實政豈徒設詐用竒如談兵者流哉以其心求之斯得之矣國朝無拘兵法國朝太宗嘗謂兵法詭詐不足以訓而王德用之長於兵亦不學古兵法若是則古之兵法果不可用耶然嘉祐中詔修兵書熙寧中詔試兵書又詔賜兵書何為惓惓於此也竊嘗思其故矣學醫以方學奕以譜捨方譜而學醫與奕固不可至於察病未形續脉將絶行義用智合謀適意則非方譜所能盡也善談兵者其無拘於兵法亦毋棄於兵法斯可以為善矣時政今日防邊竒正且梯山緣木薄我西廣竒矣而謂之正何耶蓋敵所不備謂之竒今調遣之慮已詳集結之援已密使躡踵而來竒者正矣然結筏順流窺我蜀口正矣反謂之竒何耶蓋敵所必攻謂之正今經理之任雖專侵軼之勢反緩或航葦而來正不竒乎由徑伐木窺我重湖竒矣而謂之正何耶蓋我所不備謂之竒今藩籬之備益周宿兵之計亦密使剪荆而來竒者正矣然控弦乘勢侵我荆襄正矣反謂之竒何耶蓋我所必備謂之正今城郭以為丘墟室廬以為塗徑使連騎而來正不竒乎掛帆遇順闖我海道竒矣而謂之正何耶蓋我所不備謂之竒今舟楫知非所長水路知非所熟使聯艦而來竒者正矣然哨騎長驅犯我淮甸正矣又謂之竒何耶蓋鎮守雖有其人中外習以為玩使擁戈而來正不竒乎知竒之為正則今之已備者不必憂知正之為竒則今之當備者益加意結尾將在得人抑聞之孫子兵法固不必泥禁中頗牧豈無其人分布江淮貔虎雲屯固至夥也然以寡擊衆豈無如昆陽之勝淝水之捷者乎以積年容飬之力而為一旦征誅之舉其謀固不輕用也然以速為神豈無如乘水傅壘以出其不意者乎列屯分戍軍卒相望其兵力固全矣然分其兵勢豈無延津之渡未幾而白馬之襲已捷者乎蓋兵無强弱將茍得其人則其臨機制勝如珠走盤未易以一偏一曲論也故有充國則圖上方略以制先零有李訴則雪夜入城以擒元濟有景弇則决策進攻以平齊地神而明之存乎其人執事以為如何羣書㑹元截江網卷十六
