body:
  text: 羣書㑹元截江網卷七和糴附平糴博糴便糴邉糴歷代事實魏李悝曰糴甚貴傷民甚賤傷農平糴者必視嵗有上中下熟大熟則糴三舍一中熟則糴二下熟則糴一漢宣帝耿夀昌曰令邉郡皆築倉以榖賤時增價而糴以利農前志詳見常平門趙充國擊先零羌曰金城湟中榖斛八錢吾謂景中丞糴三百萬斛羌人不敢動矣中丞請糴百萬斛乃得四十萬斛耳本傳北魏孝莊時李彪上疏曰立官司年豐糴積於倉時减私之十二糴之如此人必力田以賈官絹唐初置和糴開元後緣邉戍兵營田地課不足于是初有和糴有彭果者獻䇿廣關輔之糴京師糧益羡自是元宗不復幸東都天寶中嵗以六十萬緡賦諸道和糴每嵗輸京倉者百餘萬斛德宗正元初吐蕃劫盟召諸道兵戍邉諸道戍兵月給粟十七萬斛皆糴於關東宰相陸贄以關東榖賤請和糴帝乃命度支增和糴粟三十三萬斛然不能盡用贄議興元元年詔所在和糴是年上畋于新店入民趙光竒家問百姓樂乎對曰詔令不信前云兩稅之外無他徭今非稅而誅求者殆過於稅又名為和糴其實强取不識一錢每月詔書憂恤徒然空文恐聖主深居未之知也上命復光竒家憲宗即位有司以嵗豐熟請畿內和糴當時府縣配户督限有稽違則迫蹙鞭撻甚於稅賦號為和糴其實害民唐志偶句糴榖以省餽運夀昌獻謀於宣帝也糴粟以給屯戍李泌進策於德宗也糴湟中之粟三百萬則羌人不敢動糴關中之粟十七萬則戍兵為可安號和糴而實害民唐史志之言也名和糴而實强取趙光竒之言也李彪創於後魏而為邉備之儲陸贄行於李唐而為漕運之首皇朝事實太祖建隆元年以河北仍嵗豐稔榖價彌賤命髙價以糴長編太宗淳化三年京城大穰物價至賤分遣使臣於京城四門置增價以糴令場有司虛近倉以貯以常參官領之俟嵗飢則减價糶與貧民遂為永制真宗至道三年詔以國家大本足食為先今億兆至蕃未聞有九嵗之蓄令兩制議致豐盈之術以聞詔三司及兹嵗稔大為市糴以實倉廩祥符二年詔近臣曰聞江淮因和糴榖米增價今逐處米榖甚多宜權罷和糴如賤當復糴五年諸州言嵗豐榖賤咸請博糴上慮傷農詔丁謂規畫以聞謂言莫若和市而諸州積鏹數少出內藏錢百萬貫付三司以佐用度六年冬詔今嵗秋成始聞諸路和糴不均民户頗有煩優可令河北陜西京東西各蠲其半中等户以下免之並同上仁宗天聖二年淮南江浙制置司請所部三路計民稅米一石量糴四分之一上曰常賦之外復有量糴之名是重斂也不許寶訓四年出內藏庫緡錢二十萬下京西糴軍儲皇祐三年上曰江淮荒歉發運轉運司和糴抑配其减今年上供米百萬至和二年出內藏庫絹二十萬下辨州市糴軍儲初薛向言糴法之弊以為被邉十四州悉仰食度支嵗費五百萬緡入於商賈蓄販之家今既用見錢實價革去二說虛加之弊矣然必有以佐之則其法可行嘉祐元年出內藏庫銀十萬兩絹二十萬匹錢一十萬貫下河北市糴軍儲神宗熙寧二年上曰朝廷每更一事舉朝士大夫洶洶皆以為不可又不能指名其不便者果何事也光曰朝廷散青苖錢兹事非便吕惠卿曰彼富室為之則害民今縣官為之乃所以利民也光曰昔太宗平河東輕民租稅而戍兵甚衆命和糴糧草以給之當是時人稀物賤米一斗十餘錢草一圍八錢民皆樂與官為市不以為病其後人益衆物益貴而轉運司常守舊價不肯復增或更以折茶布或復移支折變嵗飢租稅皆免而和糴不免至今為膏肓之疾朝廷雖知其害民以用度之不能救也臣恐異日青苗之害亦如河東之為和糴也哲宗元祐四年司馬康劉安世范祖禹言今嵗秋成望增價收糴來春榖貴則减價出糶詔户部指揮諸路提刑司下豐熟州縣量添錢廣行收糴並長編髙宗建炎四年兩省奏今秋成可期宜及時儲蓄詔以所部年額上供為本錢非有制書而妄取者皆從軍法聖政紹興三年詔和糴法如有違戾去處當職官吏並從徒二年先是都省言和糴並係朝廷支降金銀錢帛免科敷之擾州縣多將糴本停留不即支還百端阻節尅减遂置糴賈數少故有是詔同上八年發運使程邁入見上諭以置場和糴毋甚賤傷農于是降本錢四百萬緡令於六路豐熟之地置場和糴焉係年録八年上曰昨浙東漕梁澤民奏今秋糴價事朕嘗諭以錢給之於民宜戒减尅榖輸之於倉毋取羡餘則公私兩便聖政十八年秦檜奏乞免和糴上大喜曰朕向在河朔見民以為苦朝廷所降本錢州縣往往移用不以時給又為吏多端乞取十不一二今幸時和嵗豐軍儲粗足朕豈得已而不已也係年録二十三年知靜江陳璹乞增和糴米價及折納適中以舒民力以足漕計上曰陳璹善治郡可與直祕閣聖政孝宗乾道三年劉琇言和糴之弊欲望降詔鐫和糴之數絶白著之害以裕民力上曰可於江西取十萬湖南取五萬以充和糴之數今兩路繳回元給絳關子庶幾不至科擾百姓為一方害也同上博糴便糴邉糴本朝三邉芻粟皆令商人入中舊傳有三說或謂見錢為一說香藥為一說此乃三分法耳沈括在三司求得舊案正三說法乃是博糴為一說便糴為一說直便為一說博糴者極邉糧草每嵗所入必欲足常額每嵗自三司拋數下庫務先封樁見錢緊便錢緊茶鈔商旅錢謂水路緊便所便處緊茶鈔謂上三山場𣙜務然後召人入中便糴者次邉糧草商人先入中糧草乃詣京師算請慢便錢慢茶鈔及雜貨慢便謂道路貨易非便處慢茶鈔謂下三場𣙜務直便者商人取便於緣邉入納見錢於京師請領三說三說乃見錢茶香藥象牙先傳茶數足然後聽便糴及直便以此商人爭先赴極邉博糴故邉粟常足偶句真宗以儲積多而罷和糴高宗以軍儲足而免和糴真宗慮煩擾而免下户之糴仁宗恐抑配而减上供之米給錢和糴不許减尅髙宗之德音置場和糴不得科擾孝宗之聖訓上供之錢糴於福建髙宗之初政也內庫之銀糴於兩浙孝宗之初政也祥符之和糴則出內藏錢以佐之五年淳熙之和糴則出封樁㑹以充之十二年建隆初河北頻稔太祖則命使添價以糴淳化中京畿大穰太宗則置場增價以糴或以民食之艱用申存恤而罷和糴之令祥符或以常賦之外不忍加斂而却量糴之請天聖制司請計稅量糴仁宗則曰賦外量糴是重斂也漕臣以敷額為能仁宗則曰名為和糴實抑配耳名臣奏議和糴四弊乾道元年臣僚言去嵗江西湖南和糴其弊非一不問家之有無例以稅錢均敷無異二稅此一弊也州縣各以水腳耗折為名收耗米十之二三此二弊也公吏並緣多方乞覔量米則有使用請錢則有縻費此三弊也官以㑹償價許之還以輸官然所在往往折閲至於輸官則不肯受此四弊也茍四弊不去欲民之不病其可得耶和糴深為民害趙汝愚言為民之害者固不一然其大者莫甚於和糴凡縣所以認於州州之認於漕漕之所認於户部其米皆有定數一或不足則譴罰隨之加之所給之直種種變折不逮民糴之半而所入之米吏緣為奸常多所糴之數邉糴借內庫錢包拯言河北麥熟價賤乞支借見錢及時收糴外可以實邉備內可以寬國用欲望權于內庫支借見錢或絹帛百餘萬廣謀收糴俾邉廩稍實有數年之蓄庶少寬恤民力偶句紹興中臣僚乞免和糴之事髙宗乾道間臣僚乞依市直之糴孝宗髙價以糴韓公琦言於天聖也增價以糴范祖禹請於元祐也諸儒至論平糴錢榖貴賤不等李泰伯曰古人有言曰榖甚賤則傷農貴則傷民謂農常糶而民常糴此一切之論也愚以為賤則傷農貴亦傷農腰鎌未解日輸於市焉糶者既多其價不得不賤賤則賈人乘時而罔之輕其幣而大其量不然則不售矣故曰斂時多賤賤則傷農而利末也土將生而或無種也耒將執而或無食也於是乎日取於市焉糴者既多其價不得不貴貴則賈人乘勢而閉之重其幣而小其量不然則不豫矣故曰種時多貴亦傷農而利末也此平糴之法有為而作也名殊而為法一曽子固曰使嵗穰榖不賤出嵗凶民不病食故平糴之令自此始李悝修之魏以富強漢興耿夀昌開常平之法而晉齊不能廢後魏定和糴之制北齊築富民之倉隋人置監唐人置東西市之糴雖號名殊其為法一也和糴博糴便糴陳君曰舉市糴之法又當立為三策曰和糴則以見緡給之曰博糴則以犀象寶貨易之曰便糴則募商人入粟以鹵茗償之此三者國家之故典也若夫出內府緡錢百萬付之三司以斂邉糴此則和糴之法而祥符之利也出內府綾羅錦綺直百八十萬付北河漕臣以市糴此博糴之法而咸平之制也募商人芻粟于極邉度地理逺近增其虛估給劵以茶償之此則便糴之法而景德之制也主意糴為民之慮有便國之策有便民之䇿知所以為國之計又思所以為民之慮則可以言今日和糴之法矣國計之仰於和糴舊矣趙充國備羌謂金城湟中糴榖三百萬斛虜不敢動矣以是知和糴為禦戎之急務然是法也行於無事之時則易行於多事之時則難厥今供上之粟不足贍於經常內郡之綱且侵虧於撥𨽻於是仰給於和糴者愈重糴場之置名色雜出有朝廷之和糴有制總之和糴又有監司州郡之和糴握粟之權不一而足知所以為國計之便矣然官價民價相去殊絶抑配從事官吏並緣變糴為科反和為怨閭里之民在在愁嘆亦思所以為民計乎糴者吏之商昔之糴也吏與民為商雖有吏商之實而猶諱吏商之名今之糴也吏與民為商甘受吏商之名以行吏商之實久矣吏商之病而斯民之膏血盡矣然而以廉吏而商則糴之弊猶輕以汚吏而商則糴之弊愈重幸而遇一廉吏不攘拏攫之臂不垂豪奪之涎通民有無視價軒輊則必有如范忠宣公藉客舟之轉糴如趙清獻公誘商販之輸運春風惠政玉雪清規惟恐毫髮以脧民膏庶乎可以避吏商之名矣不幸而遇一汚吏大開龍斷之門自張駔儈之網百計苛奪一槩取嬴則必有如趙光竒所謂不給一錢如趙公汝愚所謂吏緣為奸多其糴數秋霜捶楚星火文移惟求銖利以富歸囊於是始不得辭吏商之名矣吏為和糴之弊朝廷有不忍人之心士大夫行不得已之政今日國事大率如此而和糴為甚夫糴以和為名欲民之樂於為市而無損也不敢以虛政行之懼其有以戕其生不敢以多數取之懼其有以奪其食不敢以非時迫之懼其應之難而輸之不及也豈非朝廷不忍人之心乎自貪吏並緣以飽溪壑科以糴數之多而不得不嚴於取自庸吏巽懦以縱虎狼諉以任糴之難而不得不肆其威自猾吏沽名以釣爵祿託以援忍死之民而不得不以一切而從事豈非士大夫不得已之政乎偶句郡縣有愛民之吏則和糴之法雖弊而可行官吏無憂民之心則和糴之法雖善而難行和糴之法意在朝廷和糴之利害在郡縣警段和糴無策先支糴本使民應糴其䇿非不善也如國用告匱何務先减糴數以紓民力其說非不當也如軍食不足何將增减於浙右之民若少便矣或者又有涉逺之憂金刀布帛可以貼濟糴本而國帑又無郡縣之儲官告度牒可以折充糴價而民間又有折閲之病然則如之何而可曰貴家貸取內帑助糴此二說尚可行乎且貴近世臣休戚關係國之不立爾能獨存喻之以實意申之以命令夫區第之在京者必捐米以應濟糶之急雖近親之懿不可貸也凡田産之在畿者必捐廩以應敷糴之急雖權幸之家不容免也以至宫掖之費亦不可以承平全盛之時視之可節則節可省則省當思民患之未紓痛念邉戍之未撤勿扭於拘攣勿失之牽制主之以力行之以果則內帑有助糴之費是亦紓急之一畫也和糴循虛東南之民力竭矣而嵗有五六百萬之和糴則民於何而能寬然使糴實足以禦敵庶乎王師有休息之期赤子有生聚之望今也貔貅待哺嵗輒苦之計畝敷糴浸成常額甚至有並緣擾民以為巳利者矣多數科率以求羡餘者矣是民以虛病也當去和糴之弊今日和糴何如哉楮價折閲髙臺抑配狹鄉下户雷例科敷寬量而不得其平縮價而不償其直貪胥黠吏百種侵漁豪民狡儈多方招攬糴本東那而西兌支撥未免於後時生養日益以月增飛挽尚多於缺數民户既有不樂為市之心公家豈容峻行一切之法然則欲為兵食而和糴必痛去此弊而後可當察和糴之奸自招糴之壞於奸胥也和糴常數之外輒增數倍以敷糴户向之和糴猶云計産今則不復計産矣倒囷有限無粟可輸於是不得不飛錢神以賂刻輦然後始為之裁减此奸胥之為商者一也自招糴之壞於奸民也妄一男子操尺紙走公庭吏輒以數千斛糴價畀之不問其米之所從來也比及取償則東牽西惹有司雖眀知攤賴而為民蠧又恐失陷以為已責枝連蔓及十室九空此奸民之為商者二也夫以剜肉醫瘡之氓當此推肌剝髓之政有奸胥之商以助其暴有奸民之商以濟其凶吏商為虐至此極矣不便於民有三古之所謂和糴者糴其有餘者爾而今日悉以稅論固有稅髙産薄者例皆抑配而强糴此不便於民一也古者糴其所宜出爾而今則不問其地之有無而悉限之以本色既責之以所無則必增直以轉糴此不便於民二也如民之家有數百畝之田一嵗之收百費具在舉而歸諸官所得未必皆緡錢分以銀鋌雜以楮劵逮其出售則折閲尢甚此不便於民三也偶句和糴之法與民為市博糴之法與商為市其糴於民也既有抑配之患其積於官也亦有虛數之欺事證歷代糴法自李悝為魏作盡地力之法以畝之損益别民之勤惰大率為國與民設耳乃視嵗之熟有三而為收糴取舍之數使民無傷而農益勸雖其創法之初徒欲致一時之富强然而取義之善亦可夀有生之民命是立其名者猶可以存其意夀昌繼之三輔之榖一糴遂可省關中漕運之勞湟中之數雖减猶足制羌虜不敢動之勢蓋其增價而糴有以利農而人自安之是以能存其意以行其法由後魏而晉齊或以絹綿布帛為市而和平之意日漸斷散侵抑之弊日益繁滋矣唐因牛仙客之言而行糴法至德宗時已有強取之差車摧牛斃破産不能支雖復一趙光竒而亡補於萬姓之怨憲宗時和糴畿內督限稽違則迫蹙鞭撻復有府縣配户之擾是蓋失其意而反至於病其法祖宗善於和糴惟我祖宗盛時法存而意亦善行之以公處之以和耳著之令申和糴給以見錢其不給者置之辟藝祖則增價以惠貧民太宗則收糴以貯近倉先後相承不失初意祥符之詔慮煩擾而免下户之糴皇祐之詔恐抑配而减上供之半紹興則戒邀覓之吏乾道則依實糴之直凡所以憑藉美意維持公法因其名而存其實者又如此祖宗寬於和糴與民為市給以見錢此和糴良法也朝廷所降者十州縣所給者一時則有官吏移用之弊官之所給者十民之所得者一時則有胥吏侵漁之弊且其輸曰均輸不見其均凖曰平凖不得其平糴曰和糴不覩其和因名以求其實豈非君天下者之責哉思昔太宗之世河東物賤民樂為市而和糴之法立焉當是時民不以為病也自時厥後或以積蓄之多而罷和糴或以煩擾而免之或以重斂而却之使和糴而常如其初又何有不可者夫何循襲日久弊端百出官吏之移用不得免焉甚矣作法之難也時政我宋仁厚立國未嘗以政病民糴名以和深得古意至於荒政尤切究心今祖宗立法已數百年矣不幸比嵗關浙頻驚田萊不治是故邉無可糴之儲而和糴之當緩者不得已而急農扈不登貧富俱竭是以廩無可發之粟而荒政之當急者不得已而緩今之事亟矣君臣上下是將付之悠悠而止耶上之行和糴者必相體曰今之和糴幾類虐取然事勢有不得已非吾心也朝廷總制以是體州郡郡守縣令以是體富家則糴本可漸支糴數可量减浙右之價可增則增廣中之粟可運則運富家可貸取內帑可助糴金刀布帛可貼濟也官告度牒可折充也寬之一分民受一分之賜矣為編户者必相體曰此非國家仁厚之意頓渝也不得已也期限之迫促當亮事機之遑遽而不當以促迫為怨價直之折閲當亮財計之空匱而不當以折閲為議上下如是相體而後今日不得已之和糴可行矣徒負立法之名愚深歎夫用是法而有負於法之名也一壞於有司再壞於胥吏號為和糴實則擾民陽為輸官實則資吏垂涎於糴本之贏餘假威於文移之迫急是催科之擾有以傷其和不勸富室而多均敷於中産之家慿用駔儈而復賣弄於黠胥之手不蹙額於價直之虧則太息於給償之緩是侵刻之害有以戕其和倉囷空矣而陸負水運者幾於乾沒本數損矣而箕斂斛增者過於橫稅飛挽勞耗生聚困窮又幾類於和買之白著是愁嘆之苦又有以干其和民之疾吏如仇不欲為市括有為無茍圗避免豈民之情哉吏之罪也豈立名之過哉不實其名之過也民不樂於和糴廣糴一行有乘時以射利者有創例以侵蠧者糴名以平乃險之穽糴名以和乃怨之府糴名以便乃擾之階閭閻小民不以此望公家也然則孟子之論終墮迂闊而已乎抑先儒有言必有關雎麟趾之化而後可以行周公之法度民皆怨於和糴今日任和糴之責者則不然糴有常數量民之力可也計數供輸貧民下户不暇顧問之則曰吾以濟一時之急也勸民樂輸勿為已甚可也笞楚迫脅之非命不暇恤問之則曰吾以寬一時之責也富室民之根本勿戕賊之可也而破家折産號泣無訴不暇恤問之則又曰吾以應一時之需而濟一時之窘也託不得已之言而行不得已之政今日士大夫負國負民者多矣然吾以不得已而取于民而彼亦不得已而怨乎上頭㑹箕斂之法慘乃所以啓隴首言志之人間架除陌之令嚴亦所以召京畿嘯聚之卒此豈其情之得已哉蓋亦不得已之至者耳嗟夫吾之不得已尚可為也彼之不得已不可有也可畏也哉吏不恤民顧今和糴之數乃一嵗支用之不可省者盍亦申諭於吏曰天地生民同此一氣癢疴疾痛莫不相關今吾室廬已鬻矣則吏之第宅雕文而飾鏤也夫何安民之骨肉已離矣則吏之妻子衣錦而食肉也夫何忍朝廷日有皇皇不給之憂吾民日有流離死亡之歎而吏居其間乃欲享和糴之利其可乎無已則察民情之所苦量民力之所堪禁奸胥之虛而無額外之科擾急糴本之償而無酬直之稽緩吾庶幾其有瘳乎偶句垂涎於貨財之贏餘立威於期㑹之迫急耗蠧日多而糴本亦難辨矣和糴不繼而邉郡亦告乏矣不勸富室而均敷於中産之家移用糴本而取贏於斛面之利攫拏之禁非不嚴而攫拏者自若也减尅之戒非不至而减尅者如故也寬量有制而量未嘗寬也况於斛面之外又有加量焉平價有令而價未嘗平也况於阻抑之外又有乾沒焉結尾有和氣則用足嗚呼權平物也然有首重尾輕者持之者病之也琴瑟和聲也然有此宫彼商者調之者失之也和之者非在人乎班固曰吏民而令行愚願今日以朝廷之和召官吏之和感民心之和以是心而用是制區區糴法特其小者耳執事毋得以為常談有良吏則法善雖然有良法有良吏固也亦孰知因吏而良乎昔范忠宣公之在襄减常籍客舟諭以糴穀卒能蓄粟有餘而濟民飢富鄭公之在青州亦嘗擇所部豐稔者勸之出粟隨所出廩之而其後亦足賑民夫藉舟之舉出粟之勸若人情之所未易強者而當時皆以為便豈非二公求其愛民而非以擾民耶今日而欲立和糴之法其莫若擇和糴之吏云和糴不如屯田抑愚有獻焉和糴以足食不如屯田以積粟和糴之策有時而窮而屯田之利無時而已故也胡不取古人明效而觀之金城期年之役宜無事於屯田而將軍守其議今疆場駐師嵗復一嵗其視金城之役孰近而孰久強胡騁毒邉城屢警其視許下之屯孰急而孰暇况又近年清野茅葦相望是有可耕之地流民遷徙遊手無藝是有可耕之人茍給以資糧僦以農器則塞下之粟何以不如漢給其耕種時其調戍則府兵之法何以不如唐行之嵗月决可就緒又何憚而不為哉羣書㑹元截江網卷七
