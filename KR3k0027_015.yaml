body:
  text: 羣書會元截江網卷十五步騎附車戰歷代事實總步騎漢王以韓信曹參灌嬰俱擊魏酈食其還王問騎將誰也對曰馮敬曰雖賢不能當灌嬰步卒將誰也曰項它曰不能當曹參吾無患矣九月信等虜豹漢史武帝令大將軍衛青霍去病各將五萬騎步兵去病出代郡青出定襄擊敗胸奴霍去病傳光武與莽戰自將步騎千餘合戰斬首數十級諸將喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也本紀馬援為隴西太守發步騎三千人擊先零羌援潛行間道掩赴其營其後乘夜放火擊鼓呌譟虜遂大敗本傳三國曹操與袁紹戰操乃自將步騎五千人夜從間道出盡焚其糧榖殺士卒千餘人魏帝紀蜀丞相亮身率大軍攻祁山魏乃勒步騎五萬遣右將軍張郃督之西拒亮絶其糧道擊大破之蜀志唐王世充率衆臨榖水太宗命屈突通以步卒渡水擊之自以精兵直出其背通鑑李光弼與史思明戰因問賊陳何所最堅曰西北隅召郝廷玉曰為我以麾下破之曰廷玉所將步卒請騎五百與之三百復問其次曰東南隅召論惟正辭曰蕃將也不知步戰請鐵騎三百與之二百諸軍爭奮賊衆奔敗光弼傳步兵漢武帝擊單于李陵請曰無所事騎臣願以少擊衆步兵五千人涉單于庭上壯而許之李陵傳秦苻堅以百萬之衆伐晉謝玄以八千精卒渡淝水逼之苻融馳騎略陳馬倒被殺軍遂大敗通鑑魏明帝自征蜀遣張郃諸軍徑卒四十餘萬向劍閣諸葛亮有戰士萬二千更下者八千時魏軍始陳亮參佐咸以敵強衆多非力所制亮曰吾聞用武行師以大信為本去者束裝以待期妻子企踵而計日乃敕速遣於是去者感悅願留一戰往者憤踊咸思致命殺張郃却司馬宣王一戰大尅通鑑唐李嗣業應募安西軍中髙仙芝討勃律命嗣業為闕刀將提步士升山頺石四面以擊賊又立大旗先走險諸將從之虜不虞軍至因大潰號為神通大將李抱真䇿山東有變澤潞兵所走集乘戰伐後賦重人困軍伍雕刓籍户三丁擇一蠲其徭租給弓矢令間月得曹偶習射嵗終大校親按籍苐能否賞責比三年皆為精兵遂雄山東天下稱昭義步兵為諸軍冠本傳騎兵趙武靈王以中山在其腹心北有燕東有胡西有林胡樓煩秦韓之邊不可無強兵之助於是欲胡服騎射羣臣皆不欲王遂胡服明年略中山地西略胡地又數年遂滅中山史紀漢遣韓信擊趙信使間人窺之知其不用廣武君䇿乃引兵遂下選輕騎三千人人持一赤幟戒曰趙見我走必空壁逐我若疾入拔趙旗幟立漢幟趙軍歸見漢幟遂亂遁走本傳周亞夫東擊吳楚吳方攻梁梁急請救亞夫堅壁不出而使輕騎絶吳楚兵後食道吳楚兵乏糧亞夫破吳本傳臧宫以謹信見任胸奴分爭帝以問宫宫曰願得五千騎以立功帝曰常勝之家難與慮敵本傳陳俊為安集掾從擊銅馬與五校戰於安次俊言與光武曰宜令輕騎出賊前使百姓各自堅守城壁以絶其食可不戰而殄也光武然之賊遂散敗本傳唐李靖率驍騎三千自馬邑進屯惡陽嶺夜襲定襄破之本傳郭子儀屯涇陽軍才萬人比到虜騎圍已合乃使李國臣等各當一面身自率鎧騎二千出入陳中回紇怪問報曰郭令公驚曰令公我得見乎子儀將出左右請以五百騎從不聽即傳呼曰令公來虜皆持滿待子儀以數十騎出免胄見其大酋回紇舍兵下馬拜曰果吾父也本傳李訴討吳元濟吳秀琳為訴䇿曰必破賊非李祐無與成功者訴侯祐護穫於野遣史用誠以壯騎三百擒而還偶句馮敬為騎將則不足以當曹參之鋒項它為步將則不足以敵灌嬰之勇李陵以步卒五千不能成絶漠之功苻堅以鐵騎數萬不能取淮淝之捷有騎而無步所以致白登之圍有步而無騎所以致李陵之敗將步卒五千擊單于非李陵不足任其責率輕騎三千襲突厥非李靖不足成其功漁陽突騎佐漢中興昭義步兵為唐徑卒以五千兵而涉單于之庭則步兵為有功矣以三千騎而澡渭橋之恥則騎兵為有功矣張郃督步騎五萬足以拒諸葛之師元祐將步騎二千足以潰元魏之衆巴蜀甲卒恢漢之基荆楚勇士涉敵之庭則卒亦可用矣而何假乎馬政遊闕之車楚以敗晉偏兩之乘吳以斃楚則車亦可用矣而何資乎騎兵皇朝事實總步騎太祖建隆二年禁旅精鋭其後殿前司領騎兵之額三十七步兵之額二十六侍衛司領騎兵之額三十五步兵之額八十三通略乾德元年遣酒坊副使盧德忠等帥步騎數千人並赴襄州三年上御講武殿閲諸道兵得萬餘人以馬軍為驍雄步軍為雄武並屬侍衛開寶三年契丹六萬騎寇定州命判四方館事田欽祚領兵三千禦之欽祚馬中流矢而踣騎士王超以馬授欽祚軍復振北邊傳言三千打六萬太宗太平興國二年詔以美名易禁軍舊號鐵騎曰日騎控鶴曰天武龍騎曰龍衛虎捷曰神衛並長編雍熙四年以北敵未平方資戰騎分遣使臣收買京城及諸道私家所蓄之馬凡勝衣甲者三等定價頗優以市之次弱者不取有逸羣駔駿不拘常價厚給其直會要端拱元年李寬言冀北燕代馬之所生北戎之所恃也制敵之用資騎兵為急至道元年上閲武便殿令騎兵步兵數百東西列陳強弩視其進退發矢如一容止中節上曰此殿庭間數百人猶兵威可觀况堂堂之陳數萬成列乎聖政真宗景德二年省河北諸州戎兵十之五緣邊三之一令河東發并代廣鋭騎軍三十指揮歸本道代自京師遣禁卒萬七千餘人咸平六年內出陳圖示輔臣曰今敵勢未整尤須過防屯兵雖多必擇精鋭先據要害以制之凡鎮定髙陽正路兵悉會定州夾唐河為大陳以騎卒居中步卒環之短兵接戰勿離保伍仁宗康定元年鄜延鈴轄張元上疏請下韓琦范仲淹分按逐路以馬步軍八千以上至萬人擇才位兼髙者為總領其下分為三將一為前鋒一為䇿前鋒一為後陳每將以使臣忠佐三兩八分屯要害之地若敵小入則一將出大入則大將出量敵數多少又使鄰路出兵而應援之此所謂常山蛇勢也皇祐五年孫沔始受命數請騎兵又令軍中制長刀巨斧人謂南方地形不便騎兵而刀斧無所用狄青竟用騎兵破賊賊翳大盾翼兩傍置陳甚堅矢石不可動竟賴刀斧雜短兵摶戰陳乃破人皆謂不及也並長編高宗建炎二年廣西撫諭明槖言大理國欲進奉及置馬事上曰進奉勿許但令帥臣邊將償其馬直當價則馬當繼至庶可增諸將騎兵不為無益也紹興七年宰執言楊沂中乞綱馬上曰川廣馬到朕未嘗留盡以均給諸將若小不均則謂朕有所偏沂中馬少而張俊又以老馬數百匹納樞密院可以兩綱付沂中以一綱付浚十年上曰諸將奏捷皆在平原以步兵勝鐵騎方信朕前日之語並會要孝宗紹興三十二年張浚奏臣近招御前萬弩手多是莊農稍出衆者恥與為伍昨乞别置武毅騎士三百員以待謀慮過人勇敢絶衆者至今未蒙指揮契勘見招武勇教用每月食錢九百米九斗皆是旋刺南兵難於教習今欲將效用二人請愛給騎士一名從之聖政寧宗嘉泰元年詔樞密院核禁衛班士聖政三年增置襄陽騎軍長編偶句殿前司騎兵之額三十七步兵之額二十六侍衛司騎兵之額三十五步兵之額八十三步騎列陳進退如一此太宗之閲武也步騎交屬左右相向此真宗之閲武也太宗資戰騎以平邊而北土遂寧仁宗發騎兵以破賊而南方以定環慶山險非騎所宜則以騎兵之半而易河北之步兵江湖沮洳雖騎何用則以步兵之衆而勝金人之鐵騎騎卒居中步卒環之咸平御製之陳圖然也有馬無馬分而為隊熙寧新降之隊法然也馳控引滿綽有餘勇如王貴射自教閲騎悉精鋭如燕達步卒居前伏騎於後狄武襄所以平蠻儂也伏兵既發蹂以徑騎韓世忠所以破烏珠也儂冦恃步兵之強而狄青用蕃騎以破之金人恃鐵騎之鋭而諸將以步兵而勝之車戰歷代事實周巾車氏卒路即戎車供掌戎路之萃音倅通典文王出車勞還率也我出我車于彼牧矣詩西伯以天子之命出我戎車於我所牧之地將使戎征伐上注出車彭彭旗旐央央詩戎車既駕四牡業業豈敢定居一月三捷詩采薇武王戎車三百輛虎賁三千人與受戰于牧野注兵車百夫長所載車稱兩一車步卒七十二人凡二萬一千人舉全數書牧誓牧野洋洋檀車煌煌駟騵彭彭詩大明武王戎右掌戎車之兵革周禮夏官宣王元戎十乘以先啓行詩六月方叔涖止其車三千師干之試戎車嘽嘽嘽嘽焞焞如霆如雷采芑修車馬備器械因田獵而選車徒馬車攻魯僖公戎車孔博徒御無斁既克淮夷孔淑不逆泮水衛文公革車三十乘季年乃三百乘左閔二年北戎侵鄭鄭伯禦之患戎師曰彼徒我車懼其侵軼我也為三復以待之戎師大奔注三覆為三部伏兵隱九年晉中行穆子敗無終及羣狄于太原崇卒也將戰魏舒曰彼徒我車所遇又厄請皆卒乃毁車以為行伍乘為三伍為五陳以相離兩於前伍於後專為右角參為左角偏為前拒以誘之大敗之昭元年漢因周有輕車朱輪與不巾不蓋建茅戟幢麾以輟弩服藏在武庫大駕出次屬車在鹵簿車其式如耕車魏初改正朔戎事乘黑首白馬建大赤之旗大始中並建赤旗晉制輕車駕二馬宋輕車之制因漢不易齊梁以下及後周有隋並或用之通典衛青見凶奴以武剛車自環為營即兵車也前本傳馬隆討羌依八陳圖作偏箱車地廣為鹿角車營路狹則為木屋施於車上且戰且前弓矢所及應弦而倒晉本傳唐房琯持節招討西京防禦蒲潼兩關步馬節度使琯次便橋遇賊陳濤斜戰不利琯初用春秋時戰法以車二千乘繚營騎步夾之既戰賊乘風躁汗悉髀栗賊投芻而火之人畜焚燒殺卒四萬本傳馬燧為戰車冒以狻猊象列陳於後行以載兵止則為陳討田悅燧乃推大車焚悅將楊朝光柵破之本傳皇朝事實真宗咸平四年吳淑上疏云車戰之利自古有之故衛青李陵田豫馬隆及漢光武與虜戰皆用車而勝近事苻彥卿破虜陽城亦以拒馬為寨因大風出不意開拒馬出騎兵掩擊之夫胸奴所長者騎兵也茍非連車以制之則何以禦其奔突哉故用車戰為便其制取常用車接其衡軛駕以牛車上置槍以刃外向列士卒於車外賊至射之散去乃出騎兵擊之此控制之要術也故可以行止為營陳賊至則斂兵付車以拒之賊退則乘勝出兵以擊之出則藉此為所歸之地入則以此為所居之宅故人心有依不懼徑騎之陵突也至和二年以郭固為衛尉寺丞初韓琦言郭固嘗造車陳法今以固所説就民車約古制為之臨陳禦敵緩急易集其車前鋭後方上七鎗置以為前後二拒此馬燧戰車行載兵甲止為營陳也又以民車之集增為重廂髙四尺四寸以牛挽之吳起所謂革車掩户挽輪籠轂是也琦以為可用於平川之地臨陳以折奔衝下營以為寨腳今令固自賫車式進呈試之神宗熙寧七年先是遣內侍籍民車以備邊人未諭朝廷之意相搖大搔沈括修起居注上顧括曰卿知籍車之事乎括曰車戰之利見於歷世但古人所謂輕車者兵車也今之民車重大以牛挽日不能三十里少蒙雨雪則跬步不進故俗謂之太平車恐兵間不可用爾上喜曰人無如此曉朕明日事寢並長編高宗紹興元年進呈王大智造軍器上曰車戰可用否古法既廢不聞用車取勝莫若多造弩聖政二十九年宰執進呈陳敏戰車之議上曰戰車雖出於古然用各有宜兼一車所費浩大其間材有東南所産者姑令三帥臣議之會要三十年上宣諭宰執曰近有獻用車戰者朕以謂在人不在車至於南北異宜木性亦殊大舟以荔枝木為棹北方絶無而造車多用榆木南方亦不多得况江湖沮洳之地雖有車騎無所用之卿等更宜精思聖政東京留守宗澤募義士守京城且造決勝戰車千二百乘每乘用五十有五人運車者十有一執器械輔車者四十有四周旋曲折可以應用又據形勝立二十四壁於城外駐兵數萬繹往來按視之周而復始沿大河鱗次為壘小歷偶句城濮之役晉車七百乘乃能敗強楚僖公三十六年平邱之會晉車四千乘乃能服諸侯昭十三年巫臣教吳乘車吳始伐楚曹劌見齊轍亂魯遂逐齊子玉過三百乘敗於城濮剛者固不可用也李陵以車為營敗於胸奴勇者尤不可用也夏侯嬰以兵車而破李田公孫賀以輕車而出雲中經傳格言漢朝錯言兵事曰山林積右徑川丘阜此步兵之地車騎二不當一土山丘陵平川曠野此車騎之地步兵十不當一又曰胸奴地形技藝與中國異上下山阪出入溪澗中國之馬弗與也險道傾仄且馳且射中國之騎弗與也此胸奴長技也輕車突騎則胸奴之衆易撓亂也下馬地間去就相薄胸奴之足不能給也此中國之長技也今降胡數千宜益以邊郡之良騎有險阻以當之平地通道則以輕車材官制之兩用長技此萬全之術本傳衛公李靖曰危阪髙陵溪谷阻難則用步卒平原廣衍草淺草堅則用車追奔逐北乘虛獵散反覆百里則用騎故步為腹心車為羽翼騎為耳目三者相待參合乃行通典武王問太公曰騎戰奈何太公曰騎有十勝九敗武王曰十勝奈何太公曰敵人始至行陳未定前後不屬陷其前騎擊其左右敵人行陳整齊堅固士卒欲鬭吾騎翼而勿去或馳而往或馳而來其疾如風其暴如雷白晝而昏數更旌旗變易衣服其軍可克敵人行陳不固士卒欲鬭薄其前後獵其左右翼而擊之敵人必懼敵人暮欲歸會三軍恐駭翼其兩旁疾擊其後薄其壘口無使得入敵人必敗敵人無險阻保固深入長驅絶其糧路敵人必飢地平而易四面見敵車騎陷之敵人必亂敵人亡走士卒散亂或翼其兩旁或掩其前後其將可擒敵人暮返其兵甚衆其行陳或亂令我騎士而為隊百而為屯車五而為聚十而為羣多設旌旗雜以強弩或擊兩旁或絶其前後後敵將可虜此騎之十勝也武王曰九敗奈何太公曰凡以騎陷而不能破陳敵人保走以車騎返擊我後此騎之敗地也地踰險阻長驅不上敵人伐我兩旁又絶我後此騎之圍地也往而無以返入而無以出是謂陷於天井頓於地穴此騎之死地也所從入者隘所從出者逺彼弱可以擊我強彼寡可以擊我衆此騎之沒地大澗深谷翳茂林木此騎之竭地也左右有水前有大阜後有髙山三軍戰於兩水之間敵居表裏此騎之艱地也敵人絶我糧道往而無以返此騎之困地也汙下沮澤進退漸洳此騎之患地也左有深溝右有大阜髙下如平地進退誘敵此騎之陷地也此九者騎之死地明將之所以逺避暗將之所以陷敗六韜凡車之死地有十其勝地有八往而無還者車之死地也越絶險阻乘敵逺行者車之竭地也前易後險者車之困地也陷之險阻而難出者車之絶地也圯下漸澤黑土秥嵮者車之勞地也左險右易上陵仰阪者車之逆地也殷草橫畞犯歷深澤車之拂地也車少地易與步不敵者車之敗地也後有溝瀆左有深水右有峻阪者車之壞地也日夜霖雨旬日不止道路潰陷前不能進後不能解者車之陷地也此十者車之死地也敵之前後行陳未定即陷之旌旗擾亂人馬數動即陷之士卒或前或後或左或右即陷之陳不堅固士卒前後相顧即陷之前往而疑後恐而怯即陷之三軍卒驚皆薄而起即陷之戰於易地暮不能解即陷之逺行而暮舍三軍恐懼即陷之此八者車之勝地也六韜名臣奏議步兵可省費慶歷元年田况言沿邊屯戍騎兵車額髙者無如龍衛聞其有不能被甲上馬者馳走梚弓不過五六斗每教射騎望空發箭馬二十步即已墮地請密料邊兵益步卒而減騎軍但五分得一足矣以一騎軍之資可贍步軍二人而又寬市馬之煩擾違害就利莫善於此也用騎兵不在多馬知節上真宗今之將帥用騎兵以多為勝臣謂善用騎兵不以多為貴在能設伏觀戎寇之多少度地形之險易少則邀而擊之衆則聚而攻之常依城邑為旋師之所無不捷矣論造車之法李綱上高宗步不足以勝騎騎不足以勝車請以車制頒於京東西路使製造而教習之因繪圖進呈其法用靖康間統制官張行中所創兩竿雙輪上載弓弩又設皮䈑以捍矢石下設鐵裙以衛人足長兵禦人短兵禦馬傍施鐵索行則布以為陳止則聨以為營每車用卒二十有五人四人推竿以運車一人登車以發矢餘執軍器夾車之兩傍每軍二千五百人以五之一為輜重及衛兵餘常車八十乘即布方陳則四面各二十乘而輜重處其中諸將皆以為可用小歷諸儒至論善用兵者多用騎古之善用兵者於什圍五攻之道未嘗忽然漢武時胸奴承冒頓之後號為盛強控弦百萬與中國抗衡衛青霍去病之徒每出塞至少不下三萬騎其多至十萬騎又皆有諸將相爭為應援然後有功陵乃以步卒五千出居延北三十日至浚稽與單于七八萬騎接戰一日數十合安得不敗哉蘇文主意當善用其所長因時制變善用所長則以之制勝為有餘與勢背馳失所當用則以之自保為不足夫步之與騎騎之與車各有所宜昔人論之熟矣故平原曠野土山丘陵則宜車騎山林積石險阪髙岡則宜步兵貴乎用我之所長而不陷彼之所短斯可以求勝矣李少卿以步卒五千足以當胸奴吳漢以突騎五千足以擊王郎擊單于之兵衛青則用武剛車敗西羌之衆馬隆則用偏箱車此皆善用所長者也項它為步將不能當曹參苻堅之鐵騎不足敵謝玄房琯以牛車取敗於陳濤斜此皆不善用所長者也然則欲求制勝之道而不用所長吾未見其可也車戰用以取勝出車彭彭玁狁于襄文武之詩也我車既攻駕言徂東宣王之雅也革車掩户挽輪籠轂吾得諸吳起行載甲兵止為營陳吾聞諸馬燧自古用車戰以取勝者多矣獨曰房次律陳濤斜之一敗而後人懲創竟廢車而不可是豈前車既覆後車果不可尋邪嗚呼即嘗推原次律所以致敗之由乎天下之事習熟者易用而創見者難行新竒之説雖聽而平常之説多有益是故南人長於舟師故常以勝北北人利於騎戰故多以勝南無他習與不習故也然則次律之敗非不幸也毋乃泥於古而不通於今歟警段論車戰有三論車戰者大概有三一曰法二曰地三曰將法所以制車地所以用車將所以善夫車之用何謂法偏五相參傍拒相抵圓外而方內輕馳而重載角捍而固甲守而堅此則制車之法也何謂地平原曠野淺草疏蕭彌望千里戰場所在進退自如周旋不滯此則用車之地也有制車之法有用車之地無善用之將則法非其法則地非其地矣故必有智將以詳其制有重將以立其堅有勇將以果其進有忍將以安其守如此然後車可用矣南北各有所長沙平草淺土不成丘水不成谷馬肥人輕往來電駭雙𢃄不鞬左右馳射此非南軍之所長也山陵險阻草木蓊鬱江流吞天巨浪時起行人疑惑飛鳥不度徒涉相搏短兵相擊此非北軍之所長也偶句或馳而往其疾如風或馳而來其暴如雷曠野平原可馳可突駢鞍接轡載驟載奔出車彭彭旗旐央央玁狁于襄易事也我車既攻我馬既同夷狄之攘易事也北邊之士知有櫓車而不知戰車之利中原之士知有輜重而不知櫓車之利襄漢却政約不出於騎兵而出於步卒川蜀保境力不在於戰士而在於民丁山林積石車騎二不能當步兵之一平原曠野步兵十不能當車騎之一步卒精練而猛如虎狠如狼也騎士衝突而來如風去如電也率騎校獵殆類美觀分兵就屯豈皆徑卒專於用騎則利於平原曠野之間而不利於險道相扼之地專於用少則利於山林積石之處而不利於鐵馬蹂踐之場事證當因地而用車自車不得方軌之言不見用於成安君而後有泜水之敗自房琯以車二千乘夾步騎而有後陳濤斜之役不能以有成夫成安儒者兵也琯春秋法也而卒以是取敗何耶是豈古法不可用於後耶抑車戰之法終不可用耶嘗考之古矣文王之伐崇也曰臨衝間間其禦朔方也曰我出我車武王以戎車三百而戰牧野宣王以車三千而威蠻荆皆以車戰而勝也非惟三代之兵為然也雖春秋亦然戎車孔博遂克淮夷矜其車甲西戎就討紅之搜革車千乘平丘之會甲車數千乘而楚子之遊闕且四十乘齊之會諸侯有兵車有乘車鄭之賂晉侯有廣車有軘車是又以車戰而勝也非惟春秋為然雖漢唐以下亦然也夏侯嬰之破李田也以兵車馬燧之威震北方也以戰車而武剛車用之足以擊胸奴貟陳車用之足以平代郡偏箱車用之足以定梁州鹿角車用之足擒頡利是以車戰之勝也然則如之何曰平原曠野此車騎之地朝錯嘗言之矣平原曠野衍草淺地堅則用車李靖又言之矣不順地利而強為之者皆取敗之道者歟不然則彼徒我車鄭何以懼其侵軼而毁車為行晉何以遂敗羣狄也哉漢兵因地而用漢有材官有騎士有輕車三者之兵惟其地之險易而用之故能以我之所長不陷於其所短此所以多取勝也漢之初興多戰於兖豫徐宋之郊故夏侯嬰以兵車破李田於雍丘灌嬰以車騎破項籍於東城秦之騎將敗於東河者不能勝漢之車也楚之餘卒圍於垓下者不能勝漢之騎也則騎之與車步之與騎其所遇之地固有優劣也漢人用有優劣嘗考韓信之伐趙未至井陘而止舍選輕騎二千擊趙王於汦水誠以井陘之險非車騎之所便而彼則能權其地而用之歟伐胡之師大戰於幽并河朔之境故霍去病以萬騎出定襄公孫賀以輕車出雲中皆車騎雜用之地也然白登之圍漢步卒不能勝虜之騎李陵之敗漢車營不能禦虜之兵則騎之與步車之與騎其所遇之地故自有優劣也漢人獨利步卒自蕭何請用巴蜀以定三秦而漢始知步戰之為利故髙帝自南鄭引兵從故道出襲雍卒降秦將以有咸陽此豈非山阪之利於步乎大抵北地便於騎中原長於車而隴蜀宜步卒各隨其利而用之朝錯兵書亦幾乎是矣古之騎步有人步騎之軍為人主者茍能擇其人而用之何戰而不勝何攻而不克哉趙充國以輕騎而襲先零岑彭以精騎而拔城都吳漢以突騎五千而擊王郎之軍臨淮王以鐵騎三百而走臨清之卒是皆騎將之得人也曹參能將漢之步兵足以勝魏豹之師李抱真惟能用昭義步兵可以為天下冠是皆步將之得人也古之騎戰有人有其騎有其人斯足恃以取勝有其騎無其人騎亦不足恃也苻堅鐵騎數萬而謝玄以八千之卒勝之單于十萬騎李陵以步兵五千敵之魏文帝百萬騎吳以一徐盛之智而制之此皆有其騎而無其人也晉平公嘗言晉有三不殆也司馬侯以為恃險與馬而虞鄰國之難是三殆也其意亦無異於此古人車戰得人雄略如劉裕以兵過峴則兩翼並進可以蹙窮燕志略如馬隆阪敵於險則偏箱鹿角可以平西戎得其人而用勢其何往不克若乃陳濤險阪視車騎之地其勢已非矣而房琯復拘牽古制反用牛車宜其墮於敵人因風縱火之計於車乎何尤不論其勢而論技之長短不觀其人而觀其勢之強弱則或得或失其皆有定論乎車戰貴乎善用春秋以來鄭子封以車六百乘伐宋楚子元以車六百乘伐鄭用車戰之時也晉卻克以車八百乘而敗齊於鞍鄭子展以車六百乘而入陳境用車戰之效也鄭伯胡為乎乃有彼徒我車懼其侵軼之患卒為三覆以敗戎魏舒胡為乎禦狄之役乃有彼徒我車所遇又阪之憂卒毁車為行以敗狄豈車之不如徒哉蓋車戰者春秋之常徒戰者春秋之變雖然車固可用亦貴善用險野步為主易野車為主時則有用車之地矣闕亷之衝其師欒枝之曵柴偽遁時則有用車之將矣至唐房琯用於陳濤斜而敗既失古人用車之意且違古人制車之法古以馬而琯易以牛其敗固宜國朝善用步騎山林積石川徑丘阜所利在步兵土山陵谷平原曠野所利在騎兵是二者不可闕一也而益步減騎田公况有言釋騎就步富公弼有言損馬益步宋公祁有言夫步騎二兵均之而不可闕也而四君子於此有所輕重焉何也蓋步兵中國之所長騎兵胸奴之所長用其所長而不強其所短數君子之慮則然也然用中國之所長兼外國之所長獨非帝王萬全之䇿乎昔者竊聞之咸平之備禦也屯保州者騎五千屯北平者騎五千屯威逺軍者騎六千不曰捨騎而用步也慶歷之議攻也鄜延之騎兵三千涇源之騎兵一千環慶之馬步一萬不曰捨騎而用步也惟不量地形之寬險而徒務自便於是乎有省騎之説惟不料改國之多少而徒務騎多於是乎有省騎之説夫茍以騎卒居中步卒環之短兵接戰騎其有不勝乎連車以制禦其奔突出騎兵擊之騎其有勝乎國朝用車隨地國初能於西北制敵取勝車戰為利澶淵之戰李繼隆以大車環壘步騎處中戎馬因是而遁去陽城之勝苻彥師以拒馬為行寨敵騎因是而莫禦行載兵甲止為營陳郭固之式馬燧之舊制也駕以牛車上置鎗刀吳淑之法衛青之故智也此固國朝用騎之明驗也然亦不輕用也若山徑之蹊可用小車而不用大車其察形熟矣干戈之際宜用兵車而不藉民車其度用審矣時政今日在用所長地有險夷之不同兵有車徒之各異古者戰以車後世易之而用騎古者兵以徒後世更之而為步車騎利坦夷徒步利險阻是故平原曠野草淺土厚前無山林後無溝瀆此車騎之所利也林木隂翳澗谷交錯出沒不常踰越不一此徒步之所利也善用兵者視地形而用步騎即步騎而出竒正以吾所長擊彼所短何患其不勝哉今日車騎在人間之環車自營縱敵以衛此衛青之制也吳淑以屯兵出之法言之於咸平淑其今之衛青歟行載兵甲止於營陳此馬隆之制也郭固以抑衝寨柵之法用之於至和固今之馬隆歟有大車有小車山徑之蹊不可以用大車大車以施平原可也吾必如范希文然後可以辨其用有兵車有民車干戈之際不可以用民車民車以俟太平可也吾必如沈存忠而後可以明其制凡此皆祖宗之舊典先王之格言不務逺大之圖而守狹小之見其何以謀國哉結尾用兵貴乎出竒雖然用兵而無竒不可以必勝也狄武襄公戰於歸仁鋪令步卒居前騎兵居後蠻軍大潰此用步而出竒也烏珠入侵世忠至大儀設伏三十餘處縱敵騎過伏發世忠以徑騎蹂之大半乞降此以騎兵而出竒也今日得狄青世忠之將而用此竒計則戰勝攻取當復見之在賢得將子玉卻子均以車乘而戰者也子玉過三百乘而有城濮之敗卻子加八百乘而有鞍之捷是豈子玉所將之少而敗卻子所將之多而勝耶愚知夫剛而無禮者不若遜功者之為賢也衛青李陵均以車戰者也衛青作武剛車而胸奴為之削迹李陵以車為營而卒見衄於胸奴是何李陵以驍勇敗衛青以朴魯勝耶愚知夫輕而矜能不若持重者之為貴也步騎相為用雖然平原曠野馳逐奔驅騎之場也回山復道進退便利步之場也騎以乘其鋭步以伺其便未可取一而廢一也故數請騎兵長刀巨斧破其堅陳孫沔則以騎勝步師伍迭進各持長斧下矟馬足韓世忠則以步勝騎步者南方之所長吾不失其所長騎者北人之所習吾亦精其所習此所以能成功歟誠能鑒王權棄馬用步之失知紹興諸將以步兵勝鐵騎之得則今日應敵之計斯兩盡矣羣書會元截江網卷十五
