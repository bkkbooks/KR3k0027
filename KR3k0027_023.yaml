body:
  text: 羣書㑹元截江網卷二十三平戎歷代事實黃帝與蚩尤戰於阪泉之野史五帝紀舜帝曰臯陶蠻夷猾夏汝作士明于五刑書舜典帝曰禹惟時有苗弗率汝徂征大禹謨湯初征自葛東征西夷怨南征北狄怨仲虺之誥髙宗伐鬼方三年克之易既濟撻彼殷武奮伐荆楚冞入其阻裒荆之旅詩殷武周成王既伐東夷肅慎來賀書周官宣王六月宣王北伐也玁狁孔熾我是用急王于出征以正王國詩六月宣王南征也蠢爾蠻荆大邦為讎方叔元老克壯其猶征伐玁狁蠻荆來威詩秦乃使䝉恬北築長城卻胸奴七百餘里賈誼過秦論漢文帝十四年胸奴十四萬騎入朝那至彭城候騎至雍甘泉文帝於是大發車騎擊胡逐出塞即還胸奴傳武帝元光二年詔公卿曰朕飾子女以配單于金幣文繡賂之甚厚單于待命加嫚侵盜亡已今欲舉兵攻之何如王恢建議宜擊本紀使馬邑人聶一翁誘單于漢伏兵三十餘萬馬邑旁單于入塞大驚引兵還胸奴傳元光六年胸奴入上谷遣衛青出上谷公孫敖出代公孫賀出雲中李廣出鴈門青至龍城廣敖失師而還元朔二年胸奴入上谷遣衛青李恩出雲中至髙闕收河北地置朔方五原郡五年衛青將六將軍兵出朔方獲首虜六萬五千級六年青復將李將軍絶幕大剋獲元狩四年衛青至漠北圍單于斬首萬九千級至闐顏山而去斬獲首虜七萬餘級封狼居胥山元封元年詔曰南越東甌咸伏其辜西蠻北夷頗未輯睦朕將省邊陲躬秉武莭置十二部將軍親帥師馬行自雲陽北厯上郡西河五原出長城北登單于臺至朔方臨北河勒兵十八萬騎旌旗徑千餘里威震胸奴遣使告單于曰南越王頭已垂於漢北闕矣單于能戰天子自將待邊不能亟來臣服何但亡匿漠北苦寒之地為胸奴讋焉並夲紀宣帝本始二年胸奴數侵邊又伐烏孫烏孫上書願發兵擊胸奴惟天子哀憐田廣眀為祁連將軍趙充國為蒲類將軍田順為虎牙將軍及范明友韓增凡五將軍擊胸奴夲紀神爵四年胸奴遣弟來朝五鳳三年詔曰往者胸奴數為邊冦朕未能綏安胸奴死呼韓邪單于擊殺屠耆堂諸王並自立分為五單于更相攻擊單于閼氏子孫昆弟及名王以下將五萬人來降單于稱臣使弟奉珍朝賀北邊晏然靡有兵革之事四年胸奴單于稱臣遣弟入侍甘露元年呼韓邪單于遣子入侍二年胸奴呼韓邪單于欵五原塞願奉國珍朝三年正月詔曰胸奴單于稱北藩臣朝正月期以客禮待之三年胸奴呼韓邪單于來朝夲紀陳湯斬郅支見將帥門傅介子斬樓蘭見奉使門光武胸奴飢疫自相分爭臧宮曰願得五千騎以立功帝曰常勝之家難與慮敵吾方自思之臧宮傳光武審黃石存包桑閉玉關以謝西域之質卑辭厚幣以禮胸奴之使臧宫傳論明帝瞰四裔而抗稜西蕩河源東淡海漘北動幽崖南耀朱垠殊方别區界絶而不鄰自孝武所不能征孝宣所不能臣莫不陸讋水栗奔走而來賔東都賦唐太宗吐谷渾冦梁州李靖破之吐蕃冦徐州牛進達敗之侯君集伐髙昌俘髙昌王以獻夲紀頡利自將襲武功太宗與房元齡髙士廉等幸渭上與可汗隔水語責其負約羣酋皆驚下馬拜頡利請和貞觀三年六總管師皆十餘萬受靖莭度以討之捷書日夜至靖夜襲頡利張寶相擒之其國遂亡突厥傳唐北擒頡利西滅髙昌焉耆東破髙麗百濟威制夷狄古未有也南蠻傳帝從上皇置酒漢未央宮上皇命頡利可汗起舞南蠻酋長馮智戴詠詩既而笑曰胡越一家自古未有也通鑑上至靈州為詩曰雪恥酬百王除凶報千古同上偶句蠻夷未至猾夏而士師之命不可不謹越裳雖來譯貢而六典之政不可不修叔孫得臣獲長狄僑如而春秋不書其獲蓋謂獲夷狄之不足善也左文十一年唐郝靈佺得默啜之首而宋璟乃抑其賞蓋謂幸邊功之或生釁也唐宋璟傳二師逢君以伐宛而反召虛耗之釁營年違詔以留屯而卒收降羌之功五單于爭立陳湯因之以立郅支之功三胸奴不庭竇憲因之以紀燕然之績制之而得其道則如虞之頑苗周之玁狁雖強也而不足為吾之憂御之而失其道則如東晉之五部西周之犬戎雖弱也而亦足為吾之患皇朝事實平契丹太祖開寶二年親征太原韓重贇來朝上謂曰契丹知我來必率衆來援卿可為朕領兵倍道兼行出其不意破之契丹兵果入冦韓重贇大破其衆長編三年契丹六萬騎冦定州命田欽祚領兵三千禦之軍中不亡一矢北邊傳言三千打六萬捷奏至上喜謂左右曰契丹犯邊我以二十匹絹易一軍人首其精兵不過十萬人止費我二百萬匹絹則敵盡矣太宗太平興國二年上將伐契丹取幽薊六月車駕北征端拱元年契丹大至唐河北將入冦李繼隆與繼忠出兵距戰契丹大潰斬首萬五千級二年威敵軍糧餽不繼契丹欲窺取之詔李繼倫護送輜重敵將于越諜知之率精鋭萬騎來迎李繼倫領步騎千餘人按行塞上正當敵所入道繼倫因夜發躡其後出其不意急擊之殺其將一人號皮室者其相也衆遂驚亂于越先遁繼隆與范廷召追奔過徐河千餘里俘獲甚衆孔守正又與之戰曹河之斜村梟其帥大盈相公等三十餘級契丹遂不敢大入冦以繼倫面黑相戒曰當避黑面大王真宗咸平二年朱台符上言赦契丹之罪復尋舊盟又自請使敵五月幸曹彬第何承矩奏契丹謀冦邉土問彬對曰太祖英武定天下猶委孫全興經營和好陛下初登極時承矩常發書道意臣料北鄙終復成和好上曰此事朕當屈體為天下蒼生然須執紀綱存大體即久逺之利也七月王繼英以契丹入冦請車駕北巡詔以邊境繹騷取來月暫幸河北十一月甲寅車駕發京師甲子次大名府三年范廷召等引兵追契丹至莫州破之遣使奏捷上作喜捷詩四年七月邊臣言契丹謀入冦以王顯為鎮定髙陽關三路都部管王超副之十一月顯奏前事與契丹戰破之六年上訪禦戎之䇿命兩府㑹議景德元年上謂輔臣曰纍得邊奏契丹已謀南侵冦準曰大兵在外須勞聖駕暫幸澶淵閏九月契丹主與其母舉國入冦其統軍撻覽引兵掠威虜順安軍魏能敗其前鋒又攻北平寨田敏擊走之又東趣保川不利而北合攻定州王超陳於唐河執詔書按兵不出戰敵勢益熾初王繼忠戰敗為所獲契丹即授以官稍親信之繼忠乘間言和好之利時國母年老頗有厭兵意雖大舉深入然亦納繼忠說於是遣李興等四人持信箭以繼忠書至具言北朝願修舊好於契丹自定州抵瀛州城下勢甚盛知州李延渥拒守踰十數日弗能克乃遁去其衆猶二十萬游騎逼兾州城知州王嶼等擊走之敵既數失利復令王繼忠具奏求和好冦準曰今契丹迫近四方危心陛下惟可進尺不可退寸河北諸軍日夜望鑾輿至士氣當百倍若回輦數步則萬衆瓦解彼乘其勢金陵亦不可得而全矣髙瓊奏曰願亟幸澶州臣等效死力不難破上意遂決契丹衆抵澶州北直犯大陳李繼隆等整軍成列以禦之分伏勁弩控扼要害其統軍撻覽有機勇所將皆精鋭方為先鋒異其旗幟躬出督戰威逺軍頭張環守床子弩潜發撻覽中額死敵大挫䘐退却不敢動但時遣輕騎來覘王師撻覽死時上猶未至澶州上遂幸北城既至登城門樓張黃龍旗諸軍皆呼萬嵗聲聞數十里氣勢百倍皆相視益怖駭曹利用之再奉使也面議嵗賂金帛之數上曰必不得已雖百萬亦可利用辭去冦準召至幄次語之曰雖有勑旨所許不過三十萬過三十萬準將斬汝利用果以三十萬成約而還戊子上作回鑾詩仁宗慶厯二年契丹聚兵幽薊遣蕭英劉六符來致書邊吏言契丹泛使至朝廷選可出使者羣臣皆憚行吕夷簡薦富弼入對便殿叩頭曰主憂臣辱臣不敢愛其死弼往報契丹至沒打河六符館之弼曰北朝若欲割地此志在敗盟南朝决不從有橫戈相待爾及見其主弼曰北朝忘章聖皇帝之大德乎澶淵之役若從諸將言北兵無得脫者且北朝與中國通好則人主專其利而臣下無所獲若用兵則利歸臣下而人主任其禍其主曰微卿不聞其詳弼曰南朝皇帝使臣聞於陛下曰北朝欲得祖宗故地南朝亦豈肯失祖宗故地耶且北朝既以得地為榮則南朝以失地為辱矣兄弟之國豈可使一榮一辱哉退而六符謂弼曰皇帝聞公榮辱之言意甚感悟然金帛必不欲取惟結婚可議爾弼曰南朝嫁公主故事資送不下十萬緍爾由是欲結婚之意緩富弼以八月乙未至契丹翌日見其主主曰姻事使南朝骨肉暌離固不若嵗增金帛但無名耳須於誓書中加一獻字乃可弼曰獻字乃下奉上之辭非可施於敵國况南朝為兄豈有兄獻於弟乎其主曰誓書何在取二十萬者來弼既與之復遣耶律仁先劉六符賫其誓書以來仍求納字先是仲淹受命主西事弼主北事弼條上河北守禦十二䇿長編平西夏太宗雍熙元年九月初李繼捧入朝其弟繼遷留居銀州端拱元年朝廷數以敕書招諭繼遷繼遷終不肯降益侵盜邊境趙普建議欲復委李繼捧以夏臺故地令圗之召赴闕賜國姓改名保忠授定難莭度使保忠辭之鎮賚甚厚淳化二年李繼遷聞翟守素將兵來討恐懼奉表歸順賜以國姓名保吉至道二年李繼遷冦靈州夏州王超延州范廷召言兩路合勢破賊於烏白池繼遷遁去三年繼遷遣使修貢求偹藩任上雖察其變詐時方在諒暗姑務寧謐因從其請復賜姓名官爵真宗咸平五年李繼遷攻陷靈州復圍麟州知州衛居實屢出竒兵突戰繼遷遁去仁宗眀道元年趙德眀生元昊元昊性凶鷙數諫德眀無臣中國德眀戒曰吾久用兵終無益徒自疲爾吾族三十年衣錦綺衣此聖宋天子不可負也元昊曰衣皮毛事蓄牧蕃性所便英雄之主當王伯爾何錦綺為德眀死制授元昊西平王元昊既襲封即隂為叛計景祐元年元昊始冦府州保元元年時元昊自稱元卒已數年元卒者華言青天子也既殺山遇遂謀僣號甲戌元昊築壇受冊僣號大夏皇帝二年三月元昊反書聞壬午詔削元昊官爵除屬籍十一月西賊冦保安軍盧守勤等擊走之又圍承平寨許懷德突圍破賊乃解去十二月元昊遣賀九言賫嫚書納旌莭范雍乞早差選官兵共力禦賊劉平上攻守之䇿康定元年正月元昊盛兵攻保安軍奄至金眀寨李士彬父子俱被擒遂乘勝抵延州城下范雍以檄召劉平於慶州平素輕賊晝夜倍道兼行石元孫救延州鄜延都監黃德和巡檢萬俟政郭遵各將所部分屯戊寅旦五將合步騎萬餘至三川口遇賊官軍却引二十餘步黃德和居陳後見軍却率麾下軍走保西南山衆軍皆潰平與元孫皆被執賊圍延州凡七日及失二將城中憂沮不知所為㑹大雪賊解去八月范仲淹知延州賊相戒曰無以延州為意今小范老子腹中自有數萬甲兵不比大范老子可欺也大范蓋指雍也庚午种世衡知延州青澗城開營田二千頃壬申任福攻西賊白豹城克之丁卯狄青為涇州都監初議邊事或曰宜與講和田京曰賊兵未嘗破安肯和也慶厯元年仲淹又言鄜延入界比諸路最逺若先收復城寨却是逺圗卒城承平等十二寨是月元昊使人於涇原乞和又遣髙延德詣延州與范仲淹約仲淹察元昊未肯順事且無表章不敢聞於朝廷乃自為書喻以逆順二月西賊再冦劉璠堡劉政將鋭卒數千往援未至賊引去六月元昊冦麟府徙圍豐州陷之十月徙夏竦判河中府陳執中知陕州始分陜西為四路秦鳳路韓琦涇原路王㳂環慶路范仲淹鄜延路龐籍並兼㳂邊招討使二年正月范仲淹巡邊謂种世衡素得屬羌心而青澗城已堅固乃奏世衡知環州以鎮撫之詔從所請其後百餘帳皆自歸莫敢二因令諸堠置烽火有急舉燧介馬以待又課吏民財乃不敢復進環州九月葛懷敏與元昊戰沒於定川寨於是賊長驅直抵渭州三年延州言元昊遣賀從勉來納欵韓琦范仲淹等言元昊屢戰屢勝未有挫屈何故乞和有不可許者三亦有大可防者三伏望聖慈於納和禦侮之間審所處置為聖朝長久之慮余靖言挫北胡之氣折西羌之鋭不如不和最為得䇿四年五月元昊始稱臣自號夏國主復遣使議事己丑鄜延經略司言西賊冦青澗城劉嶽與戰敗之時西北邊事甫定吳育因上言今夏人納欵契丹講盟朝廷為息肩之計則未可恃以為安也六年詔西人雖納欵稱臣然元昊之心詭譎難信恐諸路乘罷兵之後漸弛邊備其益務練兵卒全城壁常若冦至有不如詔者亟以名聞八年夏國主曩霄卒諒祚立英宗治平元年諒祚數冦邊遣王無忌賫詔詰問三年諒祚舉兵冦大順城又冦柔逺寨環慶經略安撫使蔡挺知諒祚將入冦即遣諸將分屯要害以大順城堅不可破不益兵柔逺城急命張玉將重兵守之諒祚攻圍大順三日衷銀甲氈帽以督戰挺先選强弩分列於城濠外注矢下射重甲洞貫諒祚中流矢遁去四年閏三月諒祚遣使謝罪神宗元豐四年上決意西征孫固曰舉兵易解禍難竟命髙遵裕劉昌祚李憲种諤王中正諸路分道並進遵裕攻麟州十八日不能下遂班師上諭孫固曰若用卿言必不至此五年將圗再舉呂公著諫上不恱徐禧李舜舉沈括等發延州蕃漢軍十餘將凡八萬役夫荷糧者倍之既定議种諤還自京師極言城永豐非計禧怒謂諤曰君不畏死乎敢毁成事諤曰城之必敗敗必死死於此猶愈於喪國師淪絶域九月永豐城成丁卯賊三十萬衆攻城冦韋等八百餘人戰沒賊遂圍城戊戌永豐城陷奏至上涕泣悲憤為之不食早朝對羣臣慟哭莫敢仰視既而歎息曰永豐之舉無一人言其不可者蒲宗孟進曰臣嘗言之上正色曰何嘗有言在內惟呂公著在外惟趙卨言用兵不是好事耳自此之後上始知邊臣不可信已厭兵事無意西戎矣哲宗元祐七年西賊大舉攻圍環州凡七日乃解去初知慶州章楶數遣輕兵出討斬獲甚衆並邊部族不敢寧居楶䇿其必報乃料精兵萬餘統以二騎將使營絶塞而授之䇿曰賊進一舍彼必謂我怯為自衛計不復備吾邊壘乃銜枚由間道繞出其後伺間以擊其歸又以牛圈所瀦水足以飲人馬乃夜遣置毒賊圍環州數日無所獲而歸所使驍將折可適帥洪德城賊過識其母梁氏旌旗城中鼓譟而出馳突躪轢賊大敗而去過牛圈飲其水人馬被毒而死重傷而歸者不可勝計戎母幾不得脫諸儒至論強弱智愚不在敵君子憂我之弱而不憂敵之強憂我之愚而不憂敵之智國為敵所凌而不能勝者非敵之果強也罪在我之弱也國為敵所陷而不能知者非敵之果智也罪在我之愚也強者弱之對也我茍不弱則天下無強敵智者愚之對也我茍不愚則天下無智術吕東萊厯代開邊得失秦漢開萬里之封而川廣悉為郡縣隋唐闡海隅之化而閩浙盡為衣冠蠢爾蠻荒變於中華當時既赫厥靈後世亦䝉其利此則開邊之得者也至於晉招五部則變生劉石唐開四鎮則禍亟吐蕃漢將屯田於葱嶺困重華人唐宗列郡於隂山終為異域此則開邊之失者也吳獬待敵有三䇿一曰謀二曰備三曰應何謂謀晝不甘食夜不安寢君臣日夜蹙額相顧以敵仇未滅為大憂以天下未一為大恥以宗廟社稷未有萬世不可亡之實為大懼收召豪傑選馬厲兵深謀密計期於必取所謂卧榻之側豈容有鼻息雷鳴者太祖皇帝所以建混一之業也何謂備謀人而羽翼未成也機㑹未至也釁隙未生也則遂不謀人也耶我不彼謀彼必我謀是故防之也豫而備之也周修兵刑求人才深溝固壘積粟治兵恐懼警戒常若一日而敵之至也夫是以屹然有不可犯之堅動則可以制人靜則可以不制於人孫仲謀之所以走曹操也何謂慮欲謀人而不能舉欲備人而不能動政事綱紀守其常兵甲士馬因其舊不至於大治亦不至於大亂敵不至則憂其至敵至則徐應其至夫徐應其至者非有萬全之策也盡於一決以幸一勝耳故其勝者幸也非計也謝𤣥之所以破符堅也吁是可以勝也而不可以必勝也可以幸也而不可以數幸也楊誠齊警段制敵當審暇懼訏謨廟堂而謀敵於事機未動之先與其暇也寧懼指授將帥而應敵於事勢已動之後與其懼也寧暇宜懼而暇是以暇慆憂也宜暇而懼是以懼奪謀也蓋方事機之未動也吳師亟還而豫章之舟未見魏兵斂避而河南之戍皆歸柝聲暫寂於邊陲羽檄未騰於籌幄若可暇矣然而徹桑之謀不早何以為隂雨之防積薪之寢自安何以為火燃之備是故戎器之除必凜凜乎如大敵之在前軍實之討必兢兢乎如冦至之無日然後可以無愧於好謀之成不然浮梯不戒而倚天險以自寬更幟不驚而愒日月以自玩不幾於以暇慆憂乎故曰與其暇也寧懼及事勢之既動也胡騎扣關而甘泉之燧薦通操兵臨江而㑹獵之書倐至警箭屢傳於青海驛書旁午於通衢若可懼矣然而閫內之謀先撓何以示閫外之指縱在庭之氣先怯何以作在邊之大勇是故指授方略必泰然示之以從容部分將士必恬然處之以鎮靜然後可以無愧於衆整之好不然心怵於虛聲而遽為遷許之謀膽悸於警報而亟書請迎之議不幾於以懼奪謀乎故曰與其懼也寧暇事證古者人心齊一昔種蠡之在越人知其快報吳之忿雪山棲之辱不知其閫內閫外交任其責彼此叶力不少擕二而又有六千君子者佐其鋒而益其鋭則十年之後吳其為沼果如前日之言非心之齊乎李光弼之在河陽人知其守則隱如長城戰則有進無退不知其萬衆齊奮以身率先而置刀鞾中示以必死之意故士卒無不用命所向者摧而所敵者破卒能伸中國之威非心之齊乎田單之任齊人知其以即墨一邑創殘之餘盡還所失之境不知其身操版鍤為士卒先雖老弱女子攘臂揮泣靡不思奮故能復七十之城而報燕人之辱非其心之齊乎結尾當以急處暇竊嘗聞之慶厯中西夏歸命三邊息烽此正君臣上下歌詠太平之日也而韓公琦則曰當此之時便謂太平則後必有大憂若慮及經久則後必有大利大哉言乎其不以暇忘急而以急處暇者乎執事謂今之勢積薪未燃也卧虎未興也愚謂正當及其未燃而圗茍燃矣而欲自奮於烈熖難矣正當及其未興而慮其茍興矣而欲徒手以為搏益難矣惟執事以復於上庚戌省試君相盡人事應天時愚願自今以始通國上下更相警戒更相勉勵有一日之暇則圗一日之事功有一嵗之暇則辦一嵗之事功討軍實歟行屯田歟備舟師歟修馬政歟荆襄當理而蜀道當葺歟兩淮當保而海道當防歟無非事者無非可加意者惟吾君卧薪嘗膽必盡人事以應天時而勿為梁武之虛無吾相纘戎輔政必盡人事以立天功而勿為蔡謨之議論夫如是則成濮之榖可館豈特軍儲之不乏隂山之巢可覆豈特邊塵之不驚而已哉不然玩愒以為安偷惰以為習上下相䝉借天自諭幸其棗紅不來則曰天與我以暇豫之嵗月也幸其田宅粗樂則曰天豫我以植立之根夲也不思天之豫我者何如而我應天者安在愚恐年榖之和熟非子憂秦鄢陵告克士燮慮晉天下事固有可幸而不可恃者矣草茅過計憂同婺緯惟執事恕其僭羣書㑹元截江網卷二十三
