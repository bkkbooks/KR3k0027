body:
  text: 羣書會元截江網卷二十五馬政歷代事實周校人掌王馬之政辨六馬之屬趣馬掌贊正良馬而齊其飲食簡其六廏掌駕説之頒下四時之居治以聽馭夫巫馬掌養疾馬而乘治之牧師掌牧地皆有厲禁而頒之廋人掌十有二間之政令圉人掌教圉人養馬芻牧之事並周禮晉侯乘小駟鄭入也慶鄭曰古者大事必乘其産生其水土而知其人心安其教訓而服習其道惟所納之無不如志今乘異産以從戎事及懼而變將與人易進退不可周旋不能弗聽及戰于韓原晉戎馬還濘而止故及於敗左傳楚子使椒舉如晉求諸侯晉侯勿許曰晉有其三不殆國險而多馬齊楚多難何鄉而不濟司馬侯曰冀之北土馬之所生無興國焉恃馬與險不可以為固也昭四年衛文公秉心塞淵騋牝三千詩鄘風駉頌僖公也務農重穀牧於坰野駉駉牡馬在坰之野詩魯頌秦之先曰非子好馬及蓄善養息之周孝王使主馬於汧渭之間馬大蕃息史記漢太僕牧師諸苑三十六所分布西邊以郎為苑監官養馬三十萬擇取教習以給六廏漢儀注靈州有可竒苑號非苑顔曰苑謂馬牧也鴻門有天封苑襄平有牧師官太原有家馬官瓉曰漢有家廏一廏萬匹地理志家馬齊王供天子私用非大祀戎事軍國所須故謂之家馬百官表注髙文景循古節儉廏馬百餘匹貢禹疏景帝六年胸奴入上郡取苑馬本紀武帝以西河上郡為萬騎太守太初二年籍吏馬補車騎馬本紀兩將軍之出塞閲官及私馬凡十四萬匹而後入塞者不滿三萬匹乃置大司馬位大將軍驃騎皆為大司馬後竟不復伐胸奴以漢馬少故久不伐胡霍去病傳誅北地太守以下而令民得畜邊縣官假馬母三嵗而歸息什一以除告緍用充入新秦中車騎馬乏縣官錢少買馬難得乃著令令封君以下至三百石吏以上差出牡馬天下亭亭有畜字馬嵗課息食貨志武帝時擊大宛馬死略盡其令天下諸亭養母馬欲令其繁孳又作馬上弩機關令悉罷之昭帝元鳳元年詔頒省乘輿及苑馬以補邊郡三輔傳馬其令郡國毋斂今年馬口錢本紀東漢馬援好騎善别名馬於交趾得駱越銅鼓乃鑄為馬式還上之因表曰行天莫如龍行地莫如馬馬者甲兵之本國之大用安寧則别尊卑之序有變則濟逺近之難有詔致於宣政殿下以為馬式本紀唐馬者兵之用也監牧所以畜馬也其制起於近世唐之初起得突厥馬二千匹又得隋馬三千於赤岸澤徙之隴右監牧之制始於此其官領以太僕初用太僕少卿張萬嵗領羣牧至開元初國馬益耗太常少卿薑晦乃請以空名告身市馬於六胡州率三十匹與一遊擊將軍命王毛仲檢校內外間廏知監牧使官吏憚之無敢犯初監馬二十四萬後乃至四十三萬從元宗東封東取牧馬數萬匹每色一隊相間如錦繡天子才之其後突厥欵塞元宗厚撫之嵗許朔方軍西受降城為市以金帛市馬於河東朔方隴西牧之既雜以胡種馬乃益壯天寶後諸軍馬動以萬計皆謂秦漢以來唐為最盛天子又鋭志武事遂弱西北蕃德宗建中元年市關輔馬三萬以實內廏憲宗元和十一年伐蔡命中使以絹二萬市馬河曲唐制天子十二間為二廏曰鳳廏其後又增飛龍廏凡馬五千為上監餘為下監領之太僕其屬有牧監監有丞主簿直司團官牧尉等官其後又有監牧使間廏使唐兵志髙宗令天下自王公及齊人人稅百錢又弛天下馬禁不三年人間畜馬可五十萬即詔天下以所稅口錢市之若王師大舉一朝可用魏元忠封事王忠嗣在朔方主互市輒髙價馬直諸蕃爭來市故番馬寢少唐軍精及鎮河隴又請徙朔方凡千騎以實軍迄天寶末益孳息本傳五代唐明宗問范延光馬數對曰三萬五千帝嘆曰太祖在太原騎兵不過七千今有鐵馬如此而不能使九州混一是吾養士練將之不至也延光曰國家養馬太多一騎之費贍步兵五人騎無所施徒費國力五代史偶句丘甸之間各出戎馬則周之馬在民間者也阡陌之間有馬成羣則漢之馬在民間者也提封百萬井出馬四萬匹周之馬所以盛置苑三十六養馬三十萬漢之馬所以蕃漢馬既少不復征邉周馬既同遂可攘敵種戎齊道孰駑孰良晉分汧渭孰磽孰沃貞觀中馬蕃息至七十萬者張萬嵗之力也開元間馬增至四十三萬者王毛仲之力也武帝興絶漠之師卒至於籍吏民之馬以補車騎之乏德宗遣關外之戍遂至於籍將家之馬以增廏牧之騎汗馬之竒必在於宛城龍媒之種多出於西域六朝置區於閩越藏之內地是東南之牧地也錢氏置監於婺女號為馬海亦東南之牧地也市易之務未廣則王忠嗣之故智可用也牧養之方未盡則張萬嵗之遺法可舉也宣王修車馬之備故能復文武之境土武帝藉苑馬之用故能哭單于於陰山漁陽之徑馬不能拒子儀於長安唐祿山傳苻融之鐵騎不能蹙謝安於肥水晉載記非衛之河湄不足致騋牝之盛非魯之坰野不能産驪黃之美教吳以乘車吳豈無馬乎遊闕四十乘楚豈無馬乎皇朝事實太祖初五代募民盜戎人馬官給其直欲崇信保境敕沿邊諸民禁民毋得出塞侵盜前所盜馬盡令還之由是夷狄畏慕不敢內侮長編五代監牧多廢失其守國馬無復蕃息時但有左右飛龍院上始置養馬二務嵗遣中使詣邊州市馬自是間廏始充矣通略太宗既平太原遂觀兵范陽得汾晉燕薊之馬凡四萬二千餘匹國馬增多乃詔於景陽門外新作四監名曰天駟監左右各二內廏馬既充牣始分置諸州牧養詔中書趙守倫優給價和買在京及諸民間私馬於是得十七萬三千五百七十九匹長編又詔嵗於沿邊郡市馬償以善價內屬戎人驅馬詣闕下者悉令縣次續食以優之始聞富人皆私市之致戰騎多闕自今一切禁之雍熙二年幸天駟監閲馬詔宰相樞密三司節度使上將軍樞密直學士軍校自選名馬既而帝親賜勞之歷四監而還會要淳化二年上謂侍臣曰國家畜馬備邊最為急務而諸州牧監嵗多瘐死養餌失時枉致疾斃近令取數十槽致殿廷令圉人視其芻秣教以醫養之法庶革其弊寶訓內侍趙守倫請令諸州牧龍坊畜牝馬萬五十匹逐水草放牧不費芻秣所生駒子可資軍用詔從之自是牧馬頗蕃息長編真宗時改為監以地名之自河北至許州軍鎮凡一十八監始置羣牧司總內外馬政景德間真宗曰國馬戎事之本宜得大臣總領知樞密院事陳堯叟作羣牧議以獻勒石大名監命堯叟充羣牧制置使大中祥符四年知河南府馬極言官市芻粟望增給其直陳堯叟曰增直以市不若徙馬他所上曰馬及十萬當且止也王旦曰聽民間畜養官有緩急以本直市之猶外廏耳馬知節曰馬多不精多蕃駑弱其費愈甚上然之並同上仁宗時楊崇勳兼羣牧使屬天下久罷兵有言鬻廏馬者崇勳曰馬者兵之用而戰之備也雖無事其可去耶議遂格丁度為羣牧使請下令河東京東京西淮南籍丁壯為兵處有能畜一戰馬與免二丁仍不升户口戍備緩急如此則國馬蕃矣去薛向為陜西轉運副使兼制置解鹽又提舉買馬監牧向吏事鋭精市鹽于官為斤三千三百一十餘萬市馬於邊為匹四萬五千並同上英宗治平四年唐介知太原請於交城縣置馬監詔比部員外郎崔台符相視得汾州故牧地三千餘頃其千二百餘頃民以租佃者令入租以給寒月芻豆已從介請置監自沙苑發牝馬五百匹往交城上謂文彥博曰馬政未盡善繇羣牧判官非其人且不久任無以責成效令中書擇人充使卿舉判官冀國馬蕃息以給騎兵遂以台符權衡羣牧判官同上神宗熙寧八年察訪使曾孝寬言慶厯八年嘗詔河北州軍坊郭第三等鄉村第二等每户養被甲馬一匹以備非時官買乞檢會施行户馬法始於此同上孫永為河北陜西轉運使時以軍用不足以解鹽市馬别為一司外臺不得與永奏曰監馬國之大計使主者專其柄既無以統𨽻茍為非法孰從而制之同上徽宗元符二年初黎州嵗市馬於邊有司幸賞率以駑馬充數紹聖中秦州都大茶馬眉山程之邵始精揀汰仍以八月至四月為限而以羡餘茶轉入熙秦市戰騎由是馬多而茶息厚此法著為令至是之邵復領茶馬市既對上詢以馬政之邵曰戎俗食肉飲酪故貴茶而病於難得願禁沿邊鬻茶專以蜀産易上乘從之未幾獲良騎增茶課四百萬緡長編髙宗紹興二年上謂吕頤浩曰復孳蕃牧當就水草地是日條畫欲於饒州近四望山等處為牧地郡守帶提領選差使臣五員專管牧養事上曰兵以馬政為先開元間至四十萬匹當時用一縑易一馬亦要得人又曰如王毛仲陳馬若錦繡其盛如此聖政七年廣西進出格馬十匹御批留一匹餘付殿前司上曰朕所留一匹幾似代北所生廣西亦有此馬則馬之産者不必西北可知上因論春秋列國不相通所用之馬皆取於國中而已申公巫臣使於吳與其射御教吳乘車則是雖吳亦自有馬今必在於産馬之地求之則馬政不修故也同上十三年秦檜奏牧馬事上曰此事全在得人朕令楊忠憫管馬五十匹忠憫不理會得牧養一年之間死損俱盡後得張延壽付之更無死損以此知全在得人則事無不濟矣係年録十三年上宣諭曰自來人説南方不宜牧馬昨朕自措置令養馬今方二三年間已得駒數百匹如此數年之後不患馬不蕃上又曰國家自有故事京師只城門外便有孳牲監每年所得甚多祖宗用意可見也聖政十九年進呈牧馬賞罰格上曰牧馬孳生為利甚溥朕於近地親令牧養今已見效每嵗生駒皆是好馬若得牧馬萬匹分與諸軍牧養數年間便可濟用既免綱馬逺來所損且無官兵賞給之費二十九年户部申諸路州軍營田稻麥乞就便支充馬料免變糴見錢起發事上曰此事極省便馬料稻麥嵗計至多其他更有合節減處亦宜措置可散令諸軍牧養并罷其吏卒於此嵗計所省萬數似不為小補並同上范成大舊法馬以四尺三寸為限詔加至四寸已上公謂互市四十年不宜驟改論奏再三仍條馬政革弊事皆報可言行録孝宗淳熙三年五月進呈步軍司相度牧馬去處上曰前日牧馬官辭朕戒以愛護馬常如愛護己身飢飽勞佚各隨時調節龔戍良等奏云陛下留神馬政曲盡物情不惟戒飭主者使之用心如聖言及此其仁不可勝用矣聖政朝廷買馬橫山嵗久弊積邊民告病而馬不時至至者多道死張拭究其利病得六十餘條皆有以窮其根穴而事為之防由是諸蠻感悅爭以其善馬來嵗額率常先期以辦而馬無留滯人知愛惜遂無復死道路者同上寧宗開禧元年十月復置和州馬監會要偶句曹寶臣立馬社之制而後人以為法王安石創户馬之令而天下受其弊建隆市馬於邊州而足以充間廏之數嘉祐市馬於陜西而足以補京畿之闕稻麥充料有補嵗計髙宗之重馬政也茶貨博易甚為國利孝宗之重馬政也太宗謂畜馬備邊之急而芻秣於禁殿真宗謂國馬戎事之本而總領於大臣以汾州三千餘頃為牧地者英宗之重馬政也以河南三萬餘頃為牧地者神宗之重馬政也天聖間聽民間市易與外廏無以異康定間詔民間畜馬與漢令無以異經傳格言仲夏遊牝别羣則縶騰駒班馬政去季秋天子習五戎班馬政禮記月令有馬阡陌之間成羣乘牝牡者擯棄而不復會聚天子為伐胡故盛養馬馬之往來食長安者數萬匹卒掌者關中不足乃調旁郡漢食貨志名臣奏議當嚴牧馬之政李覺上太宗言曰夫冀北燕代馬之所生敵人之所恃也故制敵之用實資騎兵為急議者以為欲國之多馬在啖戎以利使重譯而至焉然市馬之費嵗益而廏牧之數不加者蓋失其生息之理也今軍伍中牝馬乘多而孳息之數尤鮮者何也皆云官給秣飼之費不充又馬多産則羸弱駒能食則侵其芻粟馬母愈瘠養馬之卒有罪無利是以駒子生乃令飲灰而死國家縱未暇别擇牝馬以分畜牧宜且減市馬之半直賜養駒之將卒增為月給俟其後納馬即上焉則是貨不出國而馬有滋也牧馬貴得人仁宗朝吳奎等上言自古國馬盛衰皆以所任得人失人而已汧渭之間未嘗無牧而非子獨能蕃息於周汧隴之間未嘗無牧而張萬嵗獨能蕃息於唐此前世得人之效也馬政不可廢文彥博上神宗曰國之大事在祀與戎戎事之中馬政為重馬之有牧其來尚矣禹貢云萊夷作牧周官云牧田在逺郊之地宣王中興之主則有考牧之詩禧公遵伯禽之法則有在坰之頌蓋日中而出所以遂物性而宜生息也漢唐之盛牧監實繁祖宗以來修舉甚至熙寧元年陛下特降詔旨創定南北監牧使設官振職其制益嚴若有未至當以時增修而近嵗議者乃欲賦牧地與農民斂其租課散國馬於編户責其孳息今取一時浮淺之議則廢之甚易他日却欲復祖宗之制則興之甚難當以茶博馬孝宗臣寮言祖宗馬政茶馬司並用茶錦銀絹博易番漢皆便近茶馬司不以茶錦專用銀幣甚非立法之意况茶為外界必用之物若不能依舊以茶貨及綵段博易則銀寶多出外界甚非中國之利詔四川宣撫司參舊法措置諸儒至論牧養貴得其宜詩美衛文公曰秉心塞淵騋􅀈三千夫塞故能誠淵故能通誠於己而通於人所以致物之多也唐之國馬惟得一能臣而掌之不數十年而其多過於二百倍由其職任之專也傳曰冀北土馬之所生夫馬必生於邊隅而食於苦寒之地稍遷之中國則莫能壯也三代諸侯之國雖能有馬以春秋之時考之未若晉之強也鄭之小駟出於河南不可乘唐養馬隴右非獨就水草之美蓋置之西戎之地以求其健也茍得其人而善其法豈有不蕃盛者乎唐監馬不貴多而貴良兵貴精不貴衆馬貴良不貴多晉有天下名馬之國也而昔之立國於晉者不以馬之衆為勝負而常以少制勝蓋擇其良馬而不在乎多也方戰國時羣雄相吞兵車之徜徉乎四海馬之用亦急矣蘇秦之説魏王曰魏之武卒二十萬厮徒十萬騎五千匹其説楚也乃曰楚帶甲百萬車千乘騎萬匹夫養兵二十萬而騎止五千帶甲百萬而騎止萬匹其為計亦踈矣而二國之騎兵卒強於天下何耶以馬之多不如良之為愈陳良傳主意市養馬並舉有權宜之用有經久之策當疆場多故之日而惟騎戰馬政之計則是二者之策不可不兼施而並舉也何謂權宜之用邊事方殷步騎兼整則今日戎事之要而所謂車馬之修者不可緩也而欲養馬以為用則所不逮故莫若市馬之為便昔天聖中固嘗市馬於民間而有以為外廏者康定間固嘗市馬於上户以為其説可行矣今獨不可以是為權宜之用乎何謂經久之策平原曠野便馳輕車則他日規恢之務而所謂中國長技者不可廢也茍不養之以待用則何以為繼故亦在於養馬之為急昔太平中嘗置飛龍以畜牧矣景德中嘗置羣牧使以領牧矣今獨不可由是而求經久之策乎在官在民不同古者之馬在民不在官後世之馬在官不在民在民者易蕃在官者易耗生於後世而欲復古誠不可以易論也古者畿方千里出戎馬四萬匹在諸侯則四千在卿大夫則四百取之田賦有餘用也阡陌開井田廢兵車不敢取田賦戎馬各從官給於是馬政日耗而外患生矣漢初稍復古制勸民養馬有一匹者復卒三人蓋居間則免三人之算有事則當三人之卒此內郡之制也至於邊塞則縱民畜牧而官不禁烏氏居塞則致馬數千羣橋桃居塞則致馬千匹于時內郡之盛則三十六苑分置西北自武帝征伐四夷馬大耗乏行一切之令自封君而下以次出馬則內郡庶民有馬者欲望復卒難矣令民得畜邊馬從官假馬母而歸其息十一則邊郡之欲廣畜牧者難矣故內郡不足則籍民馬以補車騎邊郡不足則發驢槖駝負食出玉關輪臺之悔始修馬令吁亦晚矣警段西北長於東南前代號蕃牧之盛非華山之陽則汧渭之間也非冀北之野則胡代之區也其原隰衍其水草美其地多風寒而馬力健其人習畜牧而馬性宜漢三十六苑唐四十八監後魏二百萬駟所以稱雄於當代者此其所長也國家職方所掌西不盡靈夏北不盡燕雲汗馬昆吾無從而至不過內取之中國外市之戎人而已况承平所謂監牧之地而南渡悉淪陷於敵人川廣置司道里遙逺責之程限而其力竭牧之沮洳而其性殊柴立而行載甲則汗其何以當北方之徑騎此其所短也馬之登耗係人蓋馬之生長雖有其地而馬之登耗實係乎人古之於馬政有校人以掌其屬又有牧人以掌其地又有廋人以掌其間者豈有他哉誠以飢渴不能以自濟寒暑不能以自護動靜出入不能自適茍不資人以均齊調一之鮮不戕賊其性夭閼其生者蓋凡為獸屬皆然而馬為尤甚土地有所不宜河南冀北之地水草豐而畜牧多故敵之馬常鋭宕昌橫昌之監道里隔而博易絶故吾之馬常弱況乎雜其羸瘠詭其名數而吾國之馬非如結駟連騎之馬矣行石則蹶行泥則陷而吾國之馬非如過都歷塊之馬矣遇午而飲遇晡而料而吾國之馬非如風雨不疲飢渴不困之馬矣物性不相得冀北之遊鬣非漢淮之騶駒朔漠之騎士非江浙之芻牧馬徠於西夷而軍招於江淮之間固已物性之不相諳芻秣於卑濕之墟而驅騁於跋履之險是又風土之不相得也偶句霜蹄逐電露鬣追風天廏天駟則皆養馬之所也河東陜西則皆市馬之地也六月出征四牡騤騤牧野誓師駟騵彭彭就水草以蕃其息謹出入以節其性養之寬間飼之水草時其燥濕謹其出入其地風寒而馬力徑其人習牧而馬性適鐵騎千羣四望如雲馳騁中原規恢舊物斯馬斯徂魯侯所用騋牝三千衛侯所蕃霜蹄霧鬣厯塊過都征行不可廢也追風逐電一日千里師旅不可闕也銀貨之低昻資直之減削所貿之馬未必皆騏驥道里之繚繞芻秣之貿易所選之馬未必無羸瘠冀北之馬號多於天下制其衝突者非可用馬也山東之馬日馳二百里遏其馳驅者不容以騎也事證古者馬出於西北古者之馬多出於西北而不在於東南冀之北土馬之所生非并代乎汧渭之間馬之所蕃非秦隴之界乎駉駉牡馬在坰之野蓋兖州也秉心塞淵騋牝三千蓋衛州也漢於苑馬分布西北二邊故北地西河遼東諸郡皆有牧師而太原亦有家馬官自天子六廏以供乘輿餘悉養之邊郡唐自太原破突厥誅髙昌繼又以髙宗破髙麗擒百濟而其地西至焉耆北至隂山故牧監分布隴右而馬為最盛然則西北之出馬亦誠然也成周調息得人嘗觀周典夏官之職如廋人掌其間之政圉師掌其牧之法既有牧師焉又有巫馬焉其建官如此之備也日中而出日昃而入其牧之也有時春祭執駒夏祭攻特其祀之也有禮飲食之齊居治之辨其為政如此之詳也夫是以生養蕃息而國賴其用漢馬政得失漢之苑馬分布於西北二邊牧養教習擇取其良以給天子之六廏故北地西河遼東諸郡皆有牧師以修戰備而太原亦有掌馬官自天子六廏以供乘輿餘悉養之邊郡武帝將有事於北伐益盛養馬以西河上郡為萬騎太守而馬政始兼掌於郡二千石矣當是時西京北秦並兼而有之馬非不足也自五將軍出塞之後竟以馬少久不伐胡於是令民得畜邊縣官假馬每限三嵗而歸息什一以除告緡之令然終不能補車騎之乏乃籍吏民馬而課息及天下矣夫漢之馬政自其分牧於邊苑而畜養之地得其宜寄牧於邊民而歸息之制為不迫至於籍取吏民之馬以補車騎則行此下策而計出無聊非惟民擾且不足以為軍用矣唐馬政修廢唐府兵之制當給馬者官與其直市之每匹錢二萬五千刺史折衝果毅嵗周不任戰者鬻之以其錢更市不足則府供之此給錢以市也至府兵漸壞兵貧難致乃給以監牧之馬此給馬以用也大抵唐之馬政皆偏於官民無與焉始唐接周秦亂離之後承天下征伐之弊搜括殘疆僅得牝牡三千匹於赤岸澤徙之隴右始命太僕張萬嵗葺其馬政自貞觀訖於麟德四十年間至七十餘萬匹於是天下以一縑易一馬秦漢之盛未始聞也垂拱以來馬耗大半開元始命王毛仲為內外間廏使牧養有法雲錦成羣復與麟德馬政數相等耳此唐牧於官而給於民也騎亦不足恃唐太宗嘗曰番兵惟徑馬奔衝漢兵惟強弩犄角信斯言也騎戰果利於番乎果利於漢乎李衛公亦曰番長於馬利於速鬭漢長於弩利於緩戰信斯言也騎戰果利於番乎果利於漢乎雖然騎亦有時而不足恃也苻堅鐵騎數萬而不能敵謝玄八千之衆單于十餘萬騎而不能禦李陵之步卒東南馬無益勝敗今之吳蜀自古未有用馬以興者孫權之在吳或得馬於交趾或得馬於髙麗而未聞以騎勝諸葛亮在蜀五出攻魏以八陳治軍旅而亦未聞於用馬宋文帝元嘉之薄伐髙麗奉詔獻馬八百沮渠蒙遜新羅百濟吐谷渾等皆受職以修貢取之不憚其險逺騎兵日以蕃息而段宏之虎牢之戰八千精騎一舉而淪喪劉恭之繼以千五百騎沒於汝陽陳髙祖之大建蕭摩訶亦以八千騎潰於吕梁則非無馬而豈救其潰沒淪喪哉其間獨陳慶之以五百騎破元韶以三千騎破元穆逐元皓於洛陽四十七戰平三十三城號用馬以克捷而河橋之敗不旋踵慶之僅以身免則馬誠無益於戰勝敗之數也南方不利騎戰自古南北戰爭南方未聞以騎勝者蕭何之在關中發巴蜀甲卒以爭衡于山東未聞巴蜀以馬勝也李陵之征胸奴舉荆楚勇士竒材劍客以深入單于未聞荆楚以馬勝也不特此爾楚莊居江陵而以左右遊闕四十乘敗晉師吳壽夢居姑蘇而以偏兩之乘撓荆楚則以車戰取勝矣未聞取馬於他國而以騎勝也諸葛亮在蜀以八陳出入隴表震蕩中原王鎮惡在宋以舟師自河泝渭蕩平關輔則用舟師陳法矣而非以騎勝也大概皆用我所長取我所有以制勝耳國朝馬政修廢國朝馬政畜於監牧者曰官馬散於編户者曰户馬市於邊郡者曰戎馬然與其畜之於民孰若市之於戎與其市之於戎孰若養之於官何者民間畜養指為外廏非不可也然馬多不精多蕃駑弱況民至受其害乎沿邊等郡估買番馬非不可也然加費益增牧數不加況戎反享其利乎此國朝所以重於監牧也騏驥有院天駟有監天廏有坊置羣牧司又置羣牧使此在內監牧之制自河北至許州已有十八監兩河陜西有都總管處復置一監太原交城又復置馬監既委羣牧司又委守倅兼領此在外監牧之制故陳堯叟作羣牧議勒石於監信知監牧馬便且急也熙寧大臣何人哉誤聽曽孝寬之説而棄文潞公之議舉祖宗七八十年營成之制一旦盡壞付農民以牧地散國馬於編户每一都限馬五十匹十五年而足謂之保馬而郡縣阿附不一二年而足之天下騷然不勝其擾至煩天子有安石相誤之嘆噫其忍負之乎夫養馬於兵在成周未嘗不行在祖宗未嘗不用聽民畜養市以本直祥符制也詔能畜馬與免二丁嘉祐令也如是民何憚而不牧之夫何熙寧大臣急於爭利一槩取民民始不堪爾逮至民馬已竭國用復闕於是求之外界而設茶馬之職焉市馬於戎雖不及牧之於官亦猶愈牧之於民此尚有可言也愚嘗考之國朝市馬戎馬之制始易以銅錢戎固獲其利次易以銀絹戎復獲其用今以摘山之利而市充廏之良戎人得茶不能以為我害中國得馬足以為我利亦濟用之良策初命李杞川蜀市茶蒲宗關茶鳳易馬始蓋分任其事至郭茂恂言茶司立法以害馬政後遂專任其事是職既設茶課百萬獲馬萬匹其效亦可見矣不然元祐變法更革殆盡獨茶不廢者亦有以夫損馬益步寶元康定間西鄙用兵馬益不至四嵗市馬終三萬而已於是丁度之奏將欲畜馬於鄉兵葉清臣之獻言欲付馬於上户以今觀之皆不若宋祁田況二公之策為盡善也祁之策曰天下久平馬益少遂請損馬而益步馬少則騎精步多則鬭健我能用步所長雖契丹多益馬無所用之況之策曰請料邊兵益步而減騎但五分得一足矣以一騎之費可贍步兵二人而又寬括馬之擾有能省牧馬之費益招步兵以我之長擊彼之短何患乎不能制勝哉時政今日馬政不嚴今日四川茶馬市易則有常矣而馬不蕃浙西牧馬分𨽻則有例矣而馬不阜昔為肥腯今為羸瘠不問也昔為精壯今為脆弱不顧也執事抑嘗思其原乎自殿最不嚴於主帥則牧養之綱領廢自優恤不加於士卒則牧養之節目廢悠悠嵗月誰核虛實僅僅目前誰問雕耗末流之事殆有不可追悔者今日招買廣馬之便承平之時或取之於北地或取之於西蜀今皆不可得而有矣為此之用獨廣馬之可置然商賈貿易而虛詐之不免卒伍牧養而蠧耗之已甚茍非詳為之區處嚴為之禁戢則馬何由而蕃衍故馬經于廣已非水草之所宜彼之未售雜鹽而和之以草則馬為之驟肥吾之既市舍鹽而強之以草則馬為之日瘠馬既啖鹽筋力遂弛是必當審察於貿易之初此招買之便也馬至於京厚俸以付卒伍之所養彼利於馬之在手而厚俸常存不利於將校之占破而厚俸隨去於是熏其目鑿其蹄羸其體馬雖常存竟亦何用是必當嚴戢於牧養之後此孳息之便也今日市易川馬之弊且以四川茶馬一司言之張官置吏已不勝其費及博之以東南之茗又不勝其費若綱官之往取及御前綱之軍人皆以口計以日計及其得馬而回也在道之糧草停泊之廏驛則又不勝其費大率一馬至御馬院其費二十緡錢矣以五千匹計之其費可勝計哉而道塗之先斃者吏卒之竊糧者官將之引帶販鬻者又所不計也綱官既有常格亦各自務保全最可恨者交卸之後而掌者不復愛惜死者至無虛日特以變易名色充市肆之烹宰而已以每年一綱五千之數等之未敢計渡江以來之嵗姑以三十年通之應有十五萬匹又有牧人牝牡生育幾無地以自容而今之所管者不過每年之數其無具甚矣朝臣占借之弊今日京城所畜之馬其數亦不為少矣奈何自執政侍從臺諫給舍而下以至省官環衛勳戚閹尹之屬占借之馬其數甚廣往往預指其姓名隂記其毛色如寄諸鄰而取之愛之以甚者既豢養之太過略不經意者又飢餓而不恤甚至馬斃於廷紳之櫪下而罪歸於本軍之馬主料減於庾官之斛面而責叢於本隊之豢卒如是則馬之登耗又安可專咎夫掌牧之任哉況其占借之騎皆西馬之駿而非廣馬之駑皆西馬之良而非廣馬之劣矧今西馬之來愈難而廣馬已非厚資不可多得盍亦思所以裁抑而區處之乎結尾監牧當得其人國家駐蹕吳會而以巴蜀之逺廣南之險嵗一市易加以置牧之非地掌牧之非人未充廏間而貴官之占借已過半其他如庾官之減料豢卒之偷怠又所不論焉若是而欲求其蕃息得乎蓋又有不可盡歸之時者矣況今戎馬方駕郊壘未徹胡可若是無具也昔真宗謂陳堯叟曰國以馬為戎事之本宜令大臣統領之遂以堯叟兼羣牧制使噫聖謨深且逺矣我皇以經武要略專倚大臣而馬之為政實預其一其可但曰馬出西北不産東南而用其所長取惟廟堂留意馬兵不若舟師愚請終言之蓋騎兵乃西北之所長而東南之所短南方之使船如北人之使馬則舟師者東南之長技而不必用馬也昔唐明宗問范延光馬數對曰三萬五千帝嘆曰太祖在太原騎兵不過七千先皇自始至終馬才及萬今有鐵馬如此而不能使九州混一是吾養士練將之不至也延光曰國家養馬太多計一騎之費贍步兵五人騎無所施虛耗國力夫以克用父子馬上立國所畜猶止於此而明宗都洛猶欲省騎則立國江左者茍能以講求馬政之法而講求舟師以激勵騎兵之法而訓勵步卒則以吾東南之所長而坐制西北之所短正其宜耳惟上之人亟圖之羣書會元截江網卷二十五
