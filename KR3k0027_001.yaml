body:
  text: 羣書㑹元截江網卷一聖製厯代事實伏羲造書契由是文籍生焉書序庖犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜於是始作八卦以通神明之德易繫辭舜帝庸作歌曰勑天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉益稷作五絃之琴以歌南風曰南風之薰兮可以解吾民之慍兮南風之時兮可以阜吾民之財兮史記時景星出房慶雲興焉百工相和而歌慶雲帝乃唱之曰慶雲爛兮糾縵縵兮日月光華旦復旦兮乃載歌曰日月有常星辰有行四時從經百姓允誠宋符瑞志湯之盤銘曰茍日新日日新又日新大學文王拘於羑里重易六爻作上下篇前藝文志武王因尚父教以仁守天下王惕然恐懼退而為戒書于席之四端為銘焉至於几鑑盥盤楹杖帶履觴豆戶牖劍弓矛皆銘大戴禮漢髙祖過沛宫酒酣擊筑歌曰大風起兮雲飛揚威加海內兮歸故鄉安得猛士兮守四方又作鴻鵠歌本紀武帝元狩元年獲白麟作白麟之歌元鼎四年得寶鼎后土祠旁秋馬生渥窪水中作寶鼎天馬之歌元封二年至瓠子臨決河命從臣以下負薪塞河隄作瓠子之歌六月詔曰甘泉宫産芝九莖作芝房之歌太初四年獲汗血馬作西極天馬之歌太始三年獲赤雁作朱雁之歌漢史上行幸河東祠后土乃作秋風辭曰秋風起兮白雲飛草木黃落兮雁南歸文選光武一札十行細書成文循吏序靈帝自造皇羲篇因引諸生能為文賦者並待制鴻都門下本紀魏武帝自作兵書十數萬言及造新詩皆成樂章三國志文帝嘗嘉漢文帝之為君由是著太宗論陳壽曰帝天姿文藻下筆成章同上宋簡文帝雅好賦詩傷於輕靡時號宫體南史梁元帝作文章援筆立就常言我韜於文士愧於武夫陳後主與江總等制五言詩荒飲隋伐之文帝曰此敗豈不由詩酒之功隋文帝紀隋煬帝善屬文不欲人出其右本紀唐太宗作宫體詩虞世南曰聖作誠工然體非醇正臣恐此詩一傳天下風靡本傳回紇各遣使入貢帝為詩曰雪恥酬百王除凶報千古回紇傳貞觀中作帝範十二篇以賜太子又帝制訓戒六篇以示諸王明君臣父子之義貞觀二年帝著金鑑述以示侍臣其略曰任賢享天下之福唐史又以飛白書賜馬周曰鸞鳳冲霄假羽翼股肱之寄在忠力又賜蕭瑀詩曰疾風知徑草板蕩識忠臣本傳宣宗出金鏡書曰太宗所著也令狐綯傳𤣥宗御製孝經序作三傑詩賜宋璟張說源乾曜本紀德宗賦中和節詩戴叔倫傳文帝與柳公權聯句帝曰人皆苦炎熱我愛夏日長唐史賜裴度詩曰注想待元老識君恨不早本傳偶句八卦不以文名崆峒一碑可想陶唐之盛德書契不以字顯岐陽石鼓可歌周宣之興運典謨之作堯舜自然之文也誓誥之書湯武自然之文也舜作五絃而歌南風之詩湯作盤銘而寓日新之戒羲卦一畫而文籍生伏羲何心於文也堯言一都而文章煥帝堯何心於文也不觀勑天之歌無以知帝舜欽哉之心不讀五子之歌無以知大禹凛乎之意庭草燕泥譏切臣下帝王之文恐不如是之侈也金花玉麟侈詠風物帝王之文亦不若是之巧也元首明良之歌帝舜所以勑羣臣也三風十愆之作成湯所以警有位也皇朝事實太祖帝微時自秦中歸道華山醉臥田間覺日出有句曰未離海底千山黑才到中天萬國明事要建隆三年上自贊孔顔命宰臣兩制以下分撰餘贊長編太宗太平興國二年覆試進士自為詩二章賜之八年上嘗作戒諭辭二付閣門一以戒京朝官受任於外者一以戒幕職州縣官端拱元年作東郊籍田詩賜近臣因曰國之上瑞惟豐年耳淳化二年蘇易簡續翰林志上嘉之賜詩二章紙尾批云詩意美卿居清華之地也時易簡居翰林真宗景德四年賜近臣飲于中書上作瑞雪詩令羣臣和祥符二年上嘗作文武七條曰朕念漢制刺史以六條察吏武臣有諸葛亮士戒朕令參求要道以警勵羣臣又思先朝以儒行篇賜近臣今可以并賜一軸三年上曰朕居安慮危罔敢暇逸嘗著文自警置之坐右乃出廣廪食珍田夫吟念農歌自戒針五年上作祥瑞論勤政論俗吏辨賜輔臣五年上作對照詩示輔臣有孜孜綏萬國不愧鬢邊絲之句五年上以崇儒術御製為君難為臣不易論二篇示王旦七年上作憫農歌又作十一經詩賜近臣和天禧元年上出正說十卷春秋要言三卷召輔臣至龍圖閣示之辛巳上出三惑歌并摹本以賜輔臣二年上作元良針賜皇太子作稼穡倍登詩欹器戒酒二論示羣臣冬雪上作瑞雪詩賜輔臣仁宗景祐四年六月以御製神武祕略賜邊臣凡三十篇分十卷仍自作序焉康定元年內出御撰洪範政監審樂要記風角集占以示輔臣並長編二年親製觀文鍳古圖記以示輔臣通略慶厯四年帝御邇英出危竿論述居高謹危之意頒示侍讀學士丁度等曰朕觀書之暇取臣僚上言及進對事目可施於政治者書以分賜卿等㑹要至和元年賜邊臣御製攻守圖長編神宗治平四年司馬光初讀資治通鑑上親製序面賜光令候書成日寫入熙寧五年詔賜王韶御製攻守圖行軍環珠總要神武祕略風角集占各一部元豐元年上每憤北敵倔强即景福殿庫取金帛為兵費是年始更庫名製詩以揭之曰五季失圖玁狁孔熾藝祖造邦思有懲艾爰設內府期以募士曾孫保之敢忘厥志凡三十二庫後積羡贏又揭以詩曰每䖍夕惕心妄意遵遺業顧豫不武姿何以成戎捷並長編高宗建炎二年五月上親書御製中和堂詩賜張浚曰願同越句踐焦思先吾身卒章曰髙風動君子屬意種蠡臣係年録紹興十四年上幸學謁先聖先師因御製文宣王贊曰大哉宣聖斯文在兹帝王之式古今之師志在春秋道由忠恕賢於堯舜日月其譽惟時載雍戢此武功肅昭威儀海宇聿崇其後又製七十二子贊並刋石置太學二十八年上曰朕中嘗闢一室名為損齊屏去聲色玩好置經史古書其中朝夕燕坐於此亦嘗作記自警不謂外間亦聞之並聖政孝宗乾道六年御製用人論其略云朕聞人君者以任使百官為事者也百官者分其職而治其事者也故設是官必有是事任是事必有是人任得其宜則百職舉而庶事成失其宜則百職廢而庶事隳何則人才有能有不能固不可一概論也嘗觀古先哲王命人之際未嘗不廣獨智以照臨稽衆論而遴選以謂不如是則或遺其所長取其所短譬如用直木以為輪曲木以為桷鮮有克當其任者矣上作春賦其末云吾將觀登臺之熙熙包八荒而為家穆然若東風之振槁灑然若膏雨之萌芽助生生之德無時不在又豈羡乎眩目之浮華已而舉觴襟懷照焉望飛雲之縹眇送歸鴻之蹁躚心遊乎造物之表寄妙用於無言作新春喜晴詩末聯云神京應未逺當繼沛中歌新秋雨過述懷詩末章云平生雄武心攬鏡朱顔在舉措常憂勤規模須廣大淳熙八年作原道辨其末云以佛修心以道養生以儒治世其惟聖人為能同之作高宗聖政序曰繼自今進而得之諄諄之訓退而求諸渾渾之書率而行之庶幾於治乎寧宗嘉泰三年光宗皇帝御集閣曰寶謨聖政慶元三年詔諸路搜訪高宗皇帝御製并御筆並長編偶句仁宗危竿之論述居高謹危之意高宗損齊之記述清心寡欲之說贊文宣贊兖國則有意於明道詩翰林詩祕閣則有意於崇儒登春臺之熙熙包八荒而為家此高宗春賦之詞實高宗中興之意也神京應不逺當繼沛中歌此孝宗新春喜晴之詩實孝宗規模之志也華山日出之詩太祖之聖製也識者占其有興王之象宫花臘雪之詩太宗之聖製也識者知其為太平之樂對照有詩勤政有論思致治也危竿有論欹器有論思保治也讀觀文鑒古圖時政著矣讀資治通鑑序治道彰矣憫農之歌庇民之述非欲裕民乎內藏之銘寬財之論非善節財乎崇儒有論尊儒術也心乎重農籍田有詩原道有辨崇道學也意在訓吏俗吏有辨真宗保治之心見於欹器之一論仁宗厲精之志形於對照之一詩作元良針作資善記帝範之賜有如此乎賜趙普詩賜楊億詩飛白之賜有如此乎經傳格言觀乎天文以察時變觀乎人文以化成天下象曰山下有火賁易賁大人虎變其文炳也易革風行水上渙易渙堯煥乎其有文章論語虞夏之書渾渾爾商書灝灝爾用書噩噩爾揚子倬彼雲漢為章于天追琢其章金玉其相詩棫朴倬彼雲漢昭回于天詩雲漢貞元中上方開文章昭回之光下飾萬物天下之士爭執所長與時而奮粲然如繁星麗天而芒寒色正人望而敬者五行而已劉禹錫序柳文聖人之言炳若丹青揚子聖人矢口而成言肆筆而成書揚子經天緯地曰文周書諡法解奎主文章唐天文志又乾德五年五星如連珠在降婁之次降婁即奎婁也名臣奏議人主不必工於文陳次升上徽宗曰略墳典之大道好雕蟲之小技競一韻之竒爭一字之巧者此腐儒之所為而藴德行志功名者鄙之况帝王日有萬幾而盡心於草卉之間極意於煙霞之表將焉用之隋煬帝尤善於文不欲人出已右薛道衡被誣而死則曰復能作空梁落燕泥否王胄之誅則曰復能作庭草無人隨意緑否又曰設令朕與士大夫高選亦當為天子梁武帝父子刻意於文學乃至隂陽卜筮騎射聲律草𨽻圍棋無不精妙又何補於治適足致亂耳何則既騁於此以為智能矣則必恃此以驕慢天下故賢者由是解體而小人競學是以資嫵媚則向之所謂智能者翻為亡身之具遺後世之憫笑者也諸儒至論聖人文與天地並聖人之文與天地並綜以元氣之機軸斫以陰陽之斧斤濯以江漢之濤瀾掞以雲漢之黼黻日月雷霆嵩衡岱華郊墟育秀來往筆端舜之賡歌載在虞書才數語耳太音希聲一唱三歎主上以文化天下其經天緯地固與造物者俱運於混茫之中吕東萊古者製作感人故崆峒之碑漫滅脫漏十不存一後世猶想陶唐氏之遺風則競傳而寶之岐陽石鼓之歌寂寥簡短至不可考後世或以為周宣王之作則形之歌詠極其揄揚豈不以聖人心聲之美或寓于此則人所歆羡不能自已陳止齊君臣不徒賡和唐文宗賦詩栁公權聯句云薰風自南來殿閣生微凉東坡以為有頌而無規遂再聯四句云一為居所移苦樂永相忘願言均此施清蔭滿四方東坡集高祖之歌壯麗文中子曰大風安不忘危其霸心之所存乎美哉乎其言也漢之所以有天下而不能為三代之王其以是夫然自千載以來人主之詞亦未有若是其壯麗而竒偉者矣朱文公主意聖人文同造化聖人之道與天地同其妙聖人之文與天地同其工方藴而為道也醖藉乎仁義道德之㫖涵蓄乎禮義綱常之端古今治亂得失之原有以博其見萬物變化生成之藴有以㑹其思此如天地斂為元氣渾淪磅礴而不可窺其祕也及發而為文也布造化於紙上散陽和於筆端嫓墳襲經戛韶竊濩滿心而溢不足以費其精神肆筆而成不足以役其念慮此如天地之散為風雲為雨露為日月河漢而不可掩也帝王無意於文天地斡造化之機緘故無意於文而文為天下之巨麗帝王有胸中之天地故無意於文而文極天下之偉觀二者天下之至文也夫惟天下之至文不可以人力至也故天地得之為天地之文帝王得之為帝王之文而非夫一草木之竒一華實之美一章句之出一比興之發所能及也是故鼓之以陰陽之爐而造化之機轉戢之以甄陶之工而造化之機發天地之妙有不可掩者而後文生焉則天地之文豈有意於文乎陰陽造化之妙醖釀乎胸次之間草木華實之麗馳騁乎翰墨之外帝王之妙有不可掩者而後文生焉則帝王之文豈有意於文乎世尊聖人之文有典有則貽厥子孫人皆知其為禹之典則也不知禹未嘗以典則名而後世稱為典則聖謨洋洋嘉言孔彰人皆知為湯之聖謨不知湯未嘗以聖謨名而後世稱為聖謨大抵帝王之聖德發著於天下昭垂於後世內而修身齊家外而治國平天下皆吾盛德之所充所謂文者特餘事也詔言之出敏於風雨筆舌之布滔於波瀾况於文乎然天下後世愛聖人也深是以尊之如天地敬之如神明愛之如珠玉而聖人豈求重於天下哉偶句觀帝王之文當以君師天下論不當以經生學士論讀帝王之文當以化成天下論不當以一能一技論詞章未興道術未裂而人君所以言者皆其心詩歌既作文辭益顯而人君存之心者異於言警段帝王與學士異觀聖人之文當以君師論不當以經生學士論當以化成天下論不當以文人才士論粵自伏羲氏畫八卦以推陰陽之變類事物之情造書契以代結繩之政革洪荒之俗文字蓋始於此而八卦不以文名書契不以字顯自是堯舜之所以帝禹湯文武之所以王其煥有之章載賡之歌文敷四海文治天下與夫渾渾之謨倬然之章無非經緯天地軌範帝王非徒為文而已也後世之君類無高明之見而競事乎翰墨之間工詩史工𨽻書彼其極模倣以求工嚴程度以求巧而正心誠意治國平天下之學也墜於文墨中矣不知所以作之君作之師與觀人文以化成天下者果安在哉觀天地則見聖人製作聖人能事也亦當自其本焉求之日星之煥爛雲漢之昭回天之文也即其高明者形見乎草木之敷茂山川之流峙地之文也即其博厚者發露乎天下自然之文孰有加於此哉欲觀聖人者觀諸天地可也因文以見心學論傳道之正統易得傳心之正學難皇墳帝典示為軌範聖經賢傳載在簡編達則功業見諸一時窮則言語垂於後世於是而頌述之焉於是而讚美之焉於是而為贊為序以發揮之焉此則人主論傳道之正統然也神交千載密勿宸衷寤寐古人研深睿哲以昔之事業為今之設施以昔之言語為今之教條由是而謹思之焉由是而篤行之焉由是而同條共貫焉此又得心傳之正學豈止為贊為序徒見諸文而已偶句簡易之訓範圍兩儀雲漢昭回皇文煥發昭回之光下飾萬物日星炳耀奎畫鼎新執中一語文簡意存賡歌數言辭嚴禮盡綜以元氣之機軸斫以陰陽之斧斤濯以江海之濤瀾掞以雲漢之黼黻仰觀之天星辰之璀璨河漢之彪炳也俯察之地草木之蒙茸江河之流折也事證古者文以載道夫伏羲之八卦非八卦也蓋天地之機緘陰陽之藴奧胥此焉出大禹之九疇非九疇也蓋彛倫之本原皇極之㫖要於此乎見湯武心學所形日日新又日新成湯盤銘之語也而湯之進德者不獨在銘盤之時敬勝怠義勝欲武王銘几之辭也而武王之飭躬者不獨在銘几之際蓋自古人君寓戒於心畫者非難而致謹於心學者為難盤銘在前澡滌必見湯固不敢玩視矣然湯之自警豈外是而少怠乎几銘在目坐作必觀武王固不敢忽視矣然武王之自戒豈外是而少弛乎故制心以禮湯有胸中之盤銘五事敬用武王有胸中之几銘此論古今帝王之學者所當深致辨也高帝太宗之文高帝崛起田間一劍入關顛嬴蹶項豈嘗玩文墨者一旦過故鄉而感慨撫風雲以興歌固皆由衷而出然以英雄之資而無道德涵養之素故形於文辭者止惟猛士之思太宗雖風灑露沐之際鋭情經史淵源所自若不止於未技者一旦為飛白之書取股肱忠烈之語此意猶近古然惜乎以彌綸經緯之學尚纍於毫楮之末而眷眷不忘者惟蘭亭之是慕歷代諸君之文漢自高帝大風之歌作已非古人氣象而武帝之文至使相如視草而始規規於文字間矣下至光武萬國之賜已求工於一札十行之間而曹孟德月明星稀烏鵲南飛之句雖琤琤掛牙頰而道益離矣逮江左之君爭以雕章繪句為一時夸至與臣下爭能而隋人空梁落燕泥之句已不能首肯於一文士則他可知矣降及唐太宗帝範之作宫體之詩語文則有餘於道未足也祖宗文本於學我國家奎星應治文風振古列聖相承文墨是娛天葩睿藻崢嶸於文府之祕瓊章寶字輝煌於傑閣之嚴猗歟休哉愚嘗拜觀真宗之聖製也進士有詩崇儒有論所以振文教之隆龍圖有贊太清有記所以示圖籍之尊歌寫念農吟咏貴食所以重邦本之貴然真宗之文非專於文也觀其與王元之論文而極論王者之文且謂雕纎之言豈足軫念則知我真宗之所製無非學之所充歟又嘗拜觀孝宗之聖製喜晴託詠秋雨述懷所以述規恢之志詩播冷泉吟寫郊禮所以述孝敬之念用人著論祕閣著詩所以表敬臣之心然孝宗之文非泥於文也觀其序高宗之聖政曰進而得之諄諄之訓退而求之渾渾之書則知孝宗之所製無非學之所積歟不特真宗孝宗為然也作文宣贊作兖國贊重聖道也賜趙普詩賜楊億詩眷大臣也非藝祖太宗之製乎著危竿論著監古記謹保治也草親征詔草討賊命志中興也非仁宗高宗之製乎儲之書林鬼神呵護布之天下臣民傳誦如圖書肇於河洛而疇卦演其奧也如雲漢麗於層霄而萬物覩其光也祖宗聖製所藏龍圖天章太宗真宗聖製之所藏也寶文顯謨仁宗英宗神宗聖製之所藏也徽猷敷文煥章華文則又哲宗徽宗髙宗孝宗聖製之所藏也祖宗重學以人國朝盛時作欹器論以示宰相者真宗也而决用寇凖之策力排陳王之議則所以保全君子者何如哉製鑒古圖以示輔臣者仁宗也而盡去夷簡之黨悉用韓范之徒則所以保全君子者何如哉太宗筆法諸生固未及拭目也然幸國學謁先聖何嘗有厭薄學校之心乎仁宗飛白六館固未及拜賜也然葺講殿益生員何嘗有厭薄學校之心乎時政皇上以心㑹道皇上聖學日新以心㑹道篤生令德玉裕川冲大寶親承將及三紀嗜欲寡而識度𢎞閲歷多而涵養熟悟先聖之格言褒先哲之遺訓㫖酒有針緝熙有記訓廉恤刑有詔沉潛理奧統一聖真親承精一之傳仰接帝王之軌道之元氣固已㑹於心矣訓廉恤刑之銘恤刑有詔炳于奎文我高宗欽恤之盛心也伏讀至此則知中興之氣象可覘厲廉有詔刻之都省我高宗戢貪之美意也莊誦至此則知中興之根本愈固執事鋪張高宗百年之盛典對揚主上往日之兩銘猗歟盛哉主上之心高廟之心也高廟以此心而感召中興之氣象培植中興之根本皇上推是心以往寧不再光中興之業乎曰訓廉曰恤刑我高宗迭施於三十年之中而根本氣象愈久而愈凝今欲使氣象如紹興根本如紹興則今日士大夫亦如紹興諸賢可也結尾觀天地見聖人聖人之文猶天地元氣渾淪磅礴於宇宙之間發而為文滿心而溢不足費其精神肆筆而成不足役其智慮呈露發越有不可得而遏者此猶元氣之散為風雲為日星為河漢之萬象也是故論聖人之文當以天地論而不當以經生學士論當以正學論不當以一藝一技論也故曰觀天地則見聖人君臣賡歌之盛皇上俯降奎文昭示雲漢敬天有圖則欽若寓焉㫖酒有針則檢制嚴焉自餘形於篇詠者未易殫述而侍臣賡和咸星拱以附斗極之光者而君臣同德乃能昭美意於篇章憂勤至深乃能寓警戒於歌詠故或者謂成王無唱雖愈於太宗而終不若帝庸作歌為能盡君道也漢臣無和雖愈於公權而終不若拜手而言為能盡臣道也今日上唱下和相得益彰而虞廷賡載之美何幸身親見之羣書會元截江網卷一
