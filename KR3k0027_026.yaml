body:
  text: 羣書㑹元截江網卷二十六户口厯代事實禹平水土為九州人口千三百五十五萬三千九百三十三周公相成王人戶千三百七十萬四千九百二十三此周之極盛也戰國互相傾奪伊闕之敗斬百二十四萬長平之戰血流漂鹵然考蘇張之說計秦及六國戎卒尚踰五百餘萬推人口數尚當千餘萬秦兼諸侯所殺三分居一猶以餘力北築長城四十餘萬南戍五嶺五十餘萬阿房驪山六十萬三十年間百姓死沒相踵于路陳項大肆其酷新安之坑二十餘萬彭城之戰睢水不流漢髙帝定天下死傷亦數百萬是以干城之卒不過三十萬方之六國十分無三文帝與民休息景帝賦役減省至武帝元狩中六十餘年人衆大增又髙祖初封功臣戶口裁什二三大侯不過萬家而小侯五六百户文景流民既歸大者至三四萬户武帝乘其資征伐四夷末年虛耗户口減半孝昭帝時百姓充實戶口漸益至孝平元始二年人户千二百二十三萬三千此西漢極盛之數也更始赤眉之亂十才二三光武中元二年户四百二十七萬明帝永夀三年户千六百七十萬此東漢極盛之數也董卓之亂至建安之際人戶所存十無一二魏平蜀得户二千八萬并魏見户通計九十四萬餘晉武平吳得戶二十三萬九州攸同通計户二百四十五萬此晉之極盛之數也通典秦苻堅滅前燕得户二百四十五萬餘又徙關東豪傑及諸夷十萬口于關中此秦代最盛之數也是時關隴清晏百姓豐樂宋武帝素節儉元嘉之政比漢文景元嘉二十七年後魏數十萬衆南破六州殺掠不可勝計自是里邑蕭條元嘉之政衰矣至武帝大明八年戶止九千萬餘齊梁世促戶口未聞陳武帝時京西既非我有淮淝之內力不能加宣帝勤恤民隱戶六十萬其後逺事經略吳明徹全軍隻輪不返至後主滅亡之時止戶五十萬隋受後周禪有戶三百九十九萬開皇九年得陳戶五十萬至煬帝大業二年才二十七年戶增至八百九十萬此隋極盛之數也唐貞觀初戶不及二百萬四年民物蕃息四夷降附者百二十萬人號稱太平此髙祖太宗致治之成效髙宗承之海內乂安數引刺史入閣問民疾苦即位之嵗增戶十五萬元宗開元九年用宇文融言遣攝御史二十九人分往天下招擕戶口其新附客户則充六年賦調又分寬鄉剩田給之二十年戶七百八十六萬餘至天寶十四載管戶總八百九十二萬餘不課者三百五十六萬此唐極盛之數也肅宗乾元末天下上計百六十九州戶百九十三萬通典憲宗元和中供賦者止于浙東西宣歙淮南江西鄂嶽福建湖南八道戶百四十四萬穆宗長慶中户三百二十五萬武宗即位戶二百一十萬餘㑹昌末戶增至四百九十五萬餘唐志唐自黃巢之亂遺民死傷無幾張全義為河南尹白骨蔽野居民不滿百户乃選十八人行十八縣招還流移無嚴刑無租稅民歸之者如市數年之後遂成富庶焉唐史版籍天官小宰八成三曰聽閭里以版圖司書掌三嵗大計郡吏之治以知田野夫家之數又掌邦中之版土地之圖地官大司徒掌建邦土地之圖與其人民之數小司徒掌四郊都鄙之夫家九比之數頒稽法于六鄉之大夫使各登其鄉之衆寡以嵗時入其數乃均土地以稽其人民而周知其數三年則大比大比則受邦國之比要鄉師以國比之法以時稽其夫家衆寡縣師掌邦國稍甸郊里之地域而辨其人民之數天府若祭天之司民而獻民數則受而藏之司民掌登萬民之數自生齒以上皆書于版嵗登下其死生及三年大比以萬民之數詔司寇司冦及孟冬祀司民之日獻其數于王王拜受之登于天府內史司㑹冢宰二之以贊王治並周禮漢髙祖入秦蕭何收秦律令圖書漢王具知天下厄塞戶口强弱處以何收圖書也本紀東晉哀帝隆和元年天下所在土斷以土著為實斷孝武帝時范寧嘗曰昔中原喪亂流寓江左庶有旋反之期故許挾注本郡令人安其業宜正其封疆故有此制至安帝時劉裕再申行庚戌土斷梁武帝時沈約上言晉咸和初蘇峻作亂版籍焚燒此後起咸和以至于宋每皆詳實宋元嘉二十七年始以七條調發既立此科于是茍有廽避奸僞並起以至于齊東堂校籍置郎令史以掌之而簿籍大壞矣凡有衣食者竟行奸賂落除卑注更書新通官榮爵隨意髙下不辨年號不識官階或注義熙在寧康之前或以崇安在元興之後此時無此府此年無此國詔書甲子與長厯不相應詭謬萬端宜選諳䆒流品者為左人郎左人尚書専共校勘以晉籍及宋永初景平籍對共讎校帝以是留意譜籍詔王僧儒改定百家譜北朝後魏民多隱冒五十三家始為一户謂之䕃附皆無官役李冲上言初立黨里鄰三長定民户籍民始皆愁苦既而課調省費十餘倍上下安之唐制天下戶為九等而三年一造戶籍凡三本一留縣一留州一送戶部並通典開元宇文融上言天下戶口逃移巧僞甚衆請加檢括于是使者競為刻意州縣承風勞擾百姓苦之又州縣希旨務于獲多虛張其數或以實戶為客凡得戶八十餘萬唐志偶句民數之獻王者拜之里邑蕭條而元嘉之政衰版圖之負聖人式之海內虛耗而元朔之治壞晉行土斷之法而民無僑寄之籍魏立鄰里之制而戶無䕃附之奸周人重民數之受所以知夫家之衆寡漢人謹圖籍之拜所以知户口之强弱皇朝事實太祖建隆元年凡望縣五十七緊縣六十七上縣八十九中縣一百一十五中下縣一百一十總九十六萬七千三百五十二户此國初版籍之數長編真宗祥符二年頒幕職州縣官招攜户口旌賞條例㑹要仁宗至道元年天下戶三百五十七萬四千二百五十七同上寶元二年三司上厯代天下戶口數前漢千二百二十三萬後漢千六百七萬魏三百三十七萬北齊三百三萬後周三百五十萬隋八百九十萬唐九百六萬太祖朝二百五十萬太宗朝三百五十七萬真宗朝八百六十六萬寶元元年一千一十一萬長編熙寧六年上論及天下户口之數王安石等奏曰戶口之盛無如今日本朝太平百年生民未嘗見兵革昨章子厚定湖南保甲䆒見戶口之衆數倍前日蓋天下舉皆類此上曰纍聖咸以愛民為心生齒蕃息蓋未足怪㑹要髙宗紹興十三年詔淮東京西監司嵗終取州縣增戶口數以聞同上寧宗開禧間是嵗諸州户一千二百六十六萬九千三百一十口偶句諸州版圖閏年貢之建隆初元戶不滿一百萬州縣丁數嵗終上之寶元之盛户三百五十萬諸縣貢户口之數則建隆也三司上户口之數則寶元也以太宗視藝祖加百餘萬以真宗視太宗加五百萬其在治平視國初凡十有五倍其在元豐視國初凡十有八倍減損户口申嚴殿罰者建隆制也招㩦户口議與旌賞者祥符制也宋太祖建隆元年有司請據諸道所具版籍之數升降天下縣以四千戶以上為望三千戶以上為緊二千戶以上為中不滿千戶為中下仍請三年一貢户口之籍别立升降從之先是按令州縣官撫育有方户口增益者各準見户每十分加一分刺史縣令各進考一等若撫養乖方户口耗减者各凖增戶法亦減一分降考一等乾德元年詔諸司版籍户帖抄委本州判官録事掌之舊無者創造始令諸州嵗所奏戶批其丁口男夫二十為丁六十為老太宗興國二年有司上諸州所貢閏年圖故事每三年一令天下貢地圖與版籍皆上尚書省所以周知山川之險易户口之衆寡也並長編至道元年詔重造州縣二稅版籍頒其式于天下上御邇英閣讀真宗所撰正說養民篇見厯代户口登耗之數顧謂侍臣曰今天下民籍幾何梅詢對曰先帝所作蓋述前代帝王恭儉有節則户口充羡賦斂多變則版圖衰減炳然在目作監後王自五代之季生齒消耗宋大祖受命而太宗真宗繼聖承謨休養百姓天下户口之數蓋倍于前矣因詔三司編修檢閲以聞至是上之長編偶句三年而貢版圖建隆之㫖也每嵗而登戶口乾德之令也户帖委州判官者乾德元年也閏圖上尚書省者興國二年也版籍來上嚴定陟降者太祖也户口登耗重為升黜者髙宗也據版籍升降縣望者建隆之令也造版籍批其丁口者乾德之詔也經傳格言式負版者子適衛冉有僕子曰庶矣哉冉有曰又何加焉曰富之論語徐偉長中論曰夫役事均在民數周及亂君為政戶口漏于圖版夫家脫于聨伍避役逋逃者有之于是姦心競生而僞端並作通典偶句慈幼養老周官重萬民之保息養生送死孟子使八口之無飢名臣奏議閏圗當在職方太宗咸平四年吳俶上言諸路所納閏年圗當職方收掌近者並納儀鸞司伏以天下山川險要皆王室之祕奧國家之急務故周禮職方氏掌天下圗籍又詔土訓以夾王車漢髙祖入關蕭何獨收秦圖籍由是周知險要請令以今閏所納圖並上職方又州郡地理犬牙相入向者獨畫一州地形則可以傳合他郡望令諸路令使每十年各畫本路圖一上職方所冀天下險要不窺牖而可知九州輪廣如指掌而斯在從之核丁帳文籍髙宗紹興七年比部員外郎薛徽言欲望明𠡠有司稽考州縣丁帳核正文籍死亡生長以時書落嵗終縣以丁之數上州州以縣之數上漕漕以郡之數上之戶部戶部合天下之數上之朝廷殘破之處計登耗而為之賞罰其重困之由願講明之其傷殘之法願申嚴之從之登耗責守令紹興十三年張子儀言親民之官莫先守令戶口登耗之責守令之先務也乞于未復舊州縣精選守令以户口復業登耗重為升黜之典仍委監司核實以嚴課最偶句今之戶數至倍于前梅詢為仁宗言之户口之盛無如今日安石為神宗言之寶元侍臣言戶口數倍以為祖宗休養之功淳熙臣􅒼論戶口滋實以為纍聖惻怛之效諸儒至論以多寡為貧富東坡曰古者以民之多寡為國之貧富故管仲以隂謀傾魯梁之民而商鞅亦招三晉之人以并諸侯當周之盛時其民物之數登于王府者蓋拜而受之自漢以來丁口之蕃息與倉庫之充盛莫若隋其貢賦輸籍之法必有可觀者然學者以其得天下不以道又不過再世而亡是以鄙之而無傳焉孔子曰不以人廢言而况可以廢一代之良法乎文帝之初有户三百六十餘萬平陳所得又五十萬至大業之始不及二十年而增至八百九十餘萬者何也方是時布帛之積至于無容資儲之在天下者至不可勝數及其敗亡塗地而洛口諸倉足以供數百萬之衆豈可少哉户口係乎君心陳季雅曰人主之心術民命之所係也為人主者茍知其為民命之所係也則必正吾心術而已矣衛文公收合散亡才二十六年而戶口十倍于其初詩人歌之曰秉心塞淵則曰自吾之秉心塞實而淵靜也則物有賴之以蕃而况於人乎夫天地之間生齒之衆蓋日趨於蕃庶而不息也自夫君人者秉心之不得其正則其號令之不常刑罰之數易蓋有困其力敗其業而墮其生者矣文景之間户口數倍自髙祖之悔心得之而其末年之減半自武帝之怒心失之武帝外怒四夷之不服而大兵興內怒吏民之不從而大獄興自其開兩粵事西南夷穿穢貊朝鮮天下已不勝困而又連兵胸奴通西域嵗所失亡不知其幾萬也盜鑄金錢之獄淮南衡山之獄巫蠱之獄其所殺戮又不知其幾千萬也心術之不正其流弊一至是哉然則人主之牧民亦自牧其心而已矣古今戶口之數李心傳曰西漢戶口至盛之時率以十户為四十八口有竒東漢户口率以十戶為五十二口可準周之下農夫唐人戶口至盛之時率以十户為五十八口有竒可準周之中次自本朝元豐至紹興率以十戶為二十五口以一家止于兩口則無是理蓋詭名于戶漏口者衆也然今浙中戶口率以十戶為十五口有竒蜀中户口率以十戶為三十口若蜀中生聚非盛于東南意者蜀中無丁賦故漏口少爾昔陸宣公稱租庸調之法田不閲而衆寡可知是故一丁授田决不可令輸二丁之賦自井田什一之後其惟租庸調之法乎偶句蘇東坡論秦人之霸原於商鞅招三晉之人王逢原論唐室之衰始於祿山陷五百萬戶主意豐耗係乎君上三代而上民之命係乎天三代而下民之命係乎君命係乎天則無時而不豐始者之十則後者之百矣命係乎君則有時而或耗今焉之百寧保他日之不十乎故天之於民養以菽粟衣以桑麻日增月羡未嘗或息自寡而多抑其勢耳君之於民育以仁則安􅊩以威則優施以恩則庶毒以兵則虛或多或寡初何常哉是知古者之民非無預乎君也君之仁與天一而惟見天者之勝人也後世之民非無預乎天也君之心與天違而惟見人者之勝天也然則民生而遇唐虞三代何其幸哉盛衰係乎天運三代以前天運主于西北故戶口之盛莫盛于西北三代以後天運主于東南故户口之盛莫過于東南何者天運所向雖荆榛而榖粟邱隴而桑麻被髮侏儒之俗可化為衣冠禮樂之地至于天運不留雖金湯而邱墟甍棟而瓦礫雞犬相聞之境變而為牛羊蓄牧之藪是則戶口之或登或耗民數之或多或寡莫不有天理存焉且舜分天下為十二州淮漢以北居其九淮漢以南止居其三周公分天下為九州淮漢以北居其七淮漢以南居其二此豈非三代以前西北戶口之盛者乎自漢至元始間東南户口止當天下十之一東漢建康當天下之二西晉太康當天下十之三李唐開元當天下十之四此豈非三代之後東南户口之盛者乎警段先王生息之政昔者先王出而經理天下所以為斯民至矣省其刑罰薄其賦斂簡其力役春省耕而不足者補焉秋省斂而不給者助焉莫不為是安養生聚以阜蕃其民然而所以維持經制之術雖未嘗一日廢要不深恃于此也人見夫田野其自耕而為之疆埸室廬其自居而為之分畫夫家其自處而為之稽多寡曰不如是則國無定制民無定居為遊手為末作終不足以豐王籍之書而衡版圖之數也又豈知有所謂休養生息之恩默寓于不言之表哉户口登耗之由為治有大本而末者不與焉世之論治者有是言也知其為本而不知本之中又有所謂本者則亦未足與論治駢肩而處比屋而居于天下者是固吾之所賴以守邦者也故善觀天下之治否者在觀夫斯民之多寡及觀夫戶口之登耗自夫户口之登也兵于是而可强自夫戶口之登也國于是而可富兵强國富天下之治舉矣此世儒之所謂本者然古今同是天下也則亦同是民也昔之戶口比之于後何為而獨登後之戶口比之于昔何為而獨耗可不深原其故耶偶句雞鳴犬吠聲相聞也粵之南燕之北同一家人父子魚鱗雲合勢無間也營之東豳之西同一春風和氣版籍可以稽其衆寡而無逰手之人譜系可以合其宗族而無乖爭之患事證漢隋休養之效漢文帝承秦項戰爭之餘户口至耗也而五六十載間卒至海內富庶煙火萬里漢文所以致此者何也兵革不用者數十年農桑之詔無嵗不下斷獄數百幾致刑措是漢文休養生息之恩也至武帝窮征極討神仙土木相繼逞欲末年輪臺之詔虛耗大半矣隋文帝值南北分爭之後户口益耗也而開皇之版籍繁夥五倍其初隋文所以致此者何也儉約之風行于下招徠于流離之後賑給于荒政之餘如將弗及是隋文休養生息之恩也至煬帝窮奢極欲殫民力于江都之幸而盡赤子于遼海之役則大業之季千里絶烟十室九空矣唐無生養之恩夫百戶為里每里有正以按戶口課農桑唐之制則善矣至天寶初戶髙丁多同籍共居家有五丁者放其一是無征役之勞而足以裕民力也然愚謂明皇休養生息之恩茍有以及民則蠲下之法不必行可也胡為乎侈心一啓生民塗炭雲南之師已喪而幽薊之業方興民之所免者幾何而斃于征賦者則不知其數矣居俠鄉者徒寬鄉逺者復一年將以誘之也唐之制則善矣至元和中比天寶供稅之户四分有一天下兵費仰給度支者率以二户資一兵而前日之制要不敢廢然愚謂憲宗休養生息之恩茍有及民則給復之令不必行可也胡為乎兵革不息淮西之冦方平而河北之難未已又且甘心于土木民之所補者幾何而困于征役者亦不知其數矣户口盛于祖宗之時祖宗深知國之所係故于版籍之登耗夫家之衆寡尤切加意故州縣官有戶口增減進考降考之令諸州有閏年圖之獻京師繁盛則動色稱慶户帳不增則由嚴殿最故自景德而視咸平户之增者已五十萬自祥符而視景德之户增者已百餘萬由寶元而視祥符又增三百餘萬至熙寧間王安石謂太平百年民未嘗見兵革户口蓋數倍于前元豐間乃至一千六百餘萬大觀初而又增二千九十余萬夫西漢盛時户口不過二千二百餘萬唐之盛時乃不及此惟後漢之盛至一千六百萬有竒本朝乃幾倍其數亦可謂蕃衍盛大而不可復加矣逮今休養生息民物蕃阜户口增數又幾倍于祖宗時矣時政東南户口日增愚嘗聞之天地之氣與時轉遷而日盛于東南校東南民籍以今准昔乃為特盛何以言之昔者户口之盛無如西北由漢以降則有不然者且漢元始間天下户千二百萬而東南户口止當天下十之一至東漢建康中乃當天下十之二又後而至唐之開元當天下十之四又後而至元豐間乃當天下十之五自南渡以來西北流離歸附之民勞來安集于鴻雁之餘而生齒之繁又非昔日比矣户口盛于東南熙豐盛時分天下二十三路而淮漢以北止居其八淮漢以南乃居十有五總天下餘千有六百萬户而淮漢以北乃當五百餘萬户漢淮以南乃當千有餘萬户大率當天下三之二是不出東晉南朝之地而增十五倍之人以十五倍之人而增三十倍之利舉天下之美盡萃東南考其古今相反若此之甚是豈非天運回旋物不兩大故輕重移一至此也地狹而户口多户版登耗時有不同漢元始一千二百二十三萬户唐開元八百四十一萬户我朝元豐一千四百八十萬户皆其極盛之時然也然唐疆域加西漢十二而户口减十之三國初疆域視西漢减三之一而户口加十之四視李唐减十之四而户口倍之唐疆域最廣而户口少本朝最狹而户口多蓋自藩鎮連衡諸道不申户版而列聖撫養元元德澤有加則盛衰之異固其宜也說者乃謂西北東南之户口以三國六朝之上下而分愚觀禹貢荆揚之州賦髙而田下釋者以為人功之修漢世江南之地土狹而人稠論者以為風俗之變則古今生聚南多而北寡乃天運之自然有不待三國六朝而後見于是可以知消長之數矣結尾兵與僧為户口之蠧雖然今日生聚保養固無容議也而所以消吾民之户口者抑有由也蓋不耕不蠶棄而為兵不農不工逸而為僧者皆户口之蠧也是故兵固未易去而老弱虛籍者可不以漸去之乎度牒未可罷鬻而緇黃之蠶食者可不以漸减之乎誠如是也户口吾見其日增版籍吾見其日盛矣故有土此有人有人此有用因吾之蕃阜殷盛而用之則三百戎車三千虎賁可以成牧野之捷指義旗而長驅可以慰中原之民矣惟上之人留意羣書㑹元截江網卷二十六
