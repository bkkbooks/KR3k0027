body:
  text: 羣書㑹元截江網卷六漕運厯代事實秦欲攻胸奴運糧使天下飛芻挽粟起於黃陲琅邪負海之郡轉輸北河率三十鍾而致一石通典漢髙祖與項羽相持於榮陽間蕭何鎮守關中計户轉餉給軍髙祖曰鎮國家撫百姓給餽餉不絶糧道不如蕭何本紀轉漕山東之粟以給中都官嵗不過數十萬石前志孝武建元中通西南夷作者數萬人千里負檐饋糧率十餘鍾致一石其後衛青擊胸奴取河南地復興十餘萬人築朔方轉漕甚逺自山東咸被其勞元光中發卒穿漕渠以漕大便利宣帝五鳯中耿壽昌奏言故事嵗漕關中粟四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原等郡榖足給京師可以省關東漕卒過半通典趙充國擊先零條便宜十二事其五曰至春省甲士卒循河湟漕穀至臨羌以視羌虜揚威武傳世折衝之具充國傳後漢光武命冦恂守河內轉運給足軍糧恂以輦車驪駕轉輸前後不絶本傳虞詡為武都太守先是運道艱險舟車不通僦五致一用五石貨致一石乃按行川谷自沮至下辨開漕船道於是水運通利嵗省四十餘萬本傳蜀諸葛亮出軍至祁山始以木牛運其後又出斜谷以流馬運魏正始四年鄧艾謂良田水少不足以盡地利宜開河渠可以大積軍糧又通運漕之道乃開廣漕渠通典隋文帝開皇三年以京師倉廩尚虛議為水旱之備詔於伊洛汴許等十三州置運米丁又於衛置黎陽倉於陜置常平倉於華置廣通倉轉相灌注漕關東及汾晉之粟以給京師又募人能於洛陽運米四十石經砥柱之險達于常平者免其征戍其後以渭水多沙流有深淺漕者苦之四年命宇文愷率水工鑿渠引渭水自大興城東至潼關三百餘里名曰廣通渠轉運通利關內賴之隋志唐都長安關中號稱沃野然其土地狹所出不足以給京師備水旱故常轉漕東南之粟髙祖太宗之時用物有節而易贍水陸漕運嵗不過二十萬石故漕事簡自髙宗已後嵗益增多而功役繁興民亦罹其弊矣初江淮漕租米至東都輸含嘉倉以車或䭾陸運至陜而水行來逺多風波覆溺之患其失十常七八其率一斛而得八斗為成勞而陸運至陜才三百里率兩斛計庸錢千緡送租者皆有水陸之直唐志開元十八年宣州刺史裴耀卿朝集京師元宗訪以漕事耀卿條上便宜元宗初不省二十一年耀卿為京兆尹京師雨水穀踊貴元宗復問耀卿漕事耀卿因請罷陜陸運而置倉河口使江南漕舟至河口者輸粟於倉而去縣官雇舟以分入河洛置倉三門東西漕舟輸其東倉而陸運以輸西倉復以舟漕以避三門之水險元宗以為然乃於河陰置河隂倉河西置拍崖倉三門東置集津倉西置鹽倉鑿山十八里以陸運自江淮漕者皆輸河陰倉自河西至太原倉謂之北運自太原倉浮渭以實關中元宗大恱拜耀卿為黃門侍郎同中書門下平章事兼江淮都運使凡三嵗漕七百萬石省陸運傭錢三十萬緡是時民久不罹兵革物力豐富朝廷用度亦廣不計道里之費而民之輸送所出水陸之直增以函腳營窖之名民間傳言用斗錢運斗米其縻耗如此及耀卿罷相北運頗艱米嵗至京師才百萬石二十五年遂罷北運二十九年韋堅兼水陸運使堅治漢隋運渠又鑿潭於望春樓下以聚漕舟堅因使諸州各揭其郡名陳其土地所産貨寶諸竒物於袱上先時民間唱俚歌曰得體紇那邪其後得寶符於桃林於是陜縣尉崔成甫更得體歌為得寶𢎞農野堅命舟人為吳楚服大笠廣袖芒屩以歌之成甫又廣之為歌辭十闋婦女百餘人鮮服靚粧鳴鼓吹笛以和之衆艘以次輳樓下天子望見大悅賜名曰廣運潭是嵗漕山東粟四百萬石自裴耀卿言漕事進用者常兼轉運之職而韋堅為最唐志肅宗寶應元年元載以淮河阻兵飛挽無路絶鹽鐵租賦皆泝漢而上會要末年史朝義兵分出宋州淮運阻絶劉晏運江淮粟帛由襄漢越商於以輸京師代宗廣德二年以劉晏顓領轉運租庸鑄錢鹽鐵轉輸至上都度支所領諸道租庸觀察使凡潭事亦皆決於晏晏為歇艎支江船二千艘人人習河險江船不入汴汴船不入河河船不入渭江南之運積揚州汴河之運積渭口河船之運積渭口渭船之運入太倉嵗運粟百一十萬石無升斗溺者唐志劉晏領轉運按行浮淮泗達于汴盡得利病乃移書元載以為運之利與害各有四載即盡以漕事委晏故晏得盡其才嵗輸始至天子大悅遣衛士以鼓吹迓東渭橋馳勞曰卿朕酇侯也凡嵗致四十萬自是關中雖水旱物不翔貴矣本傳初州縣取富人督漕挽謂之船頭稅外橫取謂之白著人不堪命晏始以官船漕罷無名之斂以禆用度本傳晏自天寶末掌出納監嵗運知左右藏主財穀三十餘年矣及楊炎為相以舊惡罷晏轉運使復歸度支李泌鑿集津倉山西徑為運道屬于三門又為入渭船輸米渭橋大倉米至凡百三十萬石遂罷南路陸運唐志德宗時江淮米不至六軍脫巾呼於道上憂之甚㑹韓滉運米至陜上喜謂太子曰米已至陜吾父子得生矣通鑑秦漢時故漕興成堰東達永豐倉韓遼請疏之自咸陽扺潼關三百里可以省車挽之勞宰相李周言以為非時文宗曰茍利於人陰陽拘忌非朕所顧也議遂決堰成罷挽車之牛以供農耕關中賴其利唐志偶句輦車驪駕而中天之基以成木牛流馬而峙鼎之勢以就有蕭何之轉餉則漢軍無乏食之憂有韓滉之運米則唐人免脫巾之變劉晏設舟載之策米斗减錢者九十耀卿得置倉之利陸運省緡三十萬三十鍾而致一石則秦人之耗不可支十萬斛而七十緡則唐人之費為甚省漢穿渭渠以通漕運故關東之粟為易達隋置洛倉以相灌注故汾陽之粟為易輸有蕭何以居關中則餽餉日給足以佐髙祖之創業有冦恂以守河內則軍食日裕足以成光武之中興皇朝事實太祖建隆元年汴都仰給漕運故河渠最為急務先是嵗調丁夫開浚糗糧皆民自備丁夫詔悉從官給二年命給事范陽劉載浚五丈渠以通東方之漕上因曰煩民奉己之事朕必不為也開導溝洫以濟京邑蓋不獲已初五丈河泥淤不利行舟詔陳承昭於京城之西夾汴河過斗門自榮陽鑿渠百餘里引京索二水通城壕入斗門架流于汴東滙于五丈河以便東北漕運開寶四年以王明為廣南諸州轉運使王師南伐嶺道險絶不通舟車但以丁夫負荷糗糧數萬衆仰給無闕五年三司言倉儲月給止及明年二月請分屯諸軍盡率民船以資江淮漕運上大怒召判三司楚昭輔切責之昭輔詣皇弟光義泣告曰舊定八十日一運一嵗三運今若去淹留之虛日則嵗可增一運矣光義以告上從之並長編八年范旻為淮南轉運使每嵗運米萬餘石以給京師時論許其有心計㑹要太宗太平興國八年初置水陸發運於京師以許田王賔許昌裔同知水路發運王繼升劉蟠同知陸路發運凡一綱計幾舟每舟計所給挽船之直悉以附主綱吏令自雇民勿復調發凡水陸舟車輦運官物及財貨之出納悉關報而催督之自是貢輸無滯矣雍熙元年以喬維嶽為淮南轉運使先是淮河西流三十里曰山陽灣水勢湍悍運舟所過多罹覆溺維嶽規度開故沙湖又創二斗門于西河第三堰設門蓄水俟故沙湖平乃泄之建橫橋於岸築土纍石以固其址自是盡革其弊而運舟往來無滯矣並長編淳化四年楊允恭盡籍三路舟與所運物數令諸州擇才吏悉集允恭乃辨數授之江浙所運止於淮泗由淮泗輸京師行之一嵗上供者六百萬焉通略至道元年先是汴河嵗運江淮米三百萬石菽一百萬石黃河粟五十萬石菽三十萬石惠民河粟四十萬石菽二十萬石廣濟河粟十二萬石凡五百五十萬石非水旱大蠲民租未嘗不及數是嵗汴河運米至五百八十萬石真宗景德元年宋雄監河隂屯兵雄習河渠利害因領護汴口均節水勢以濟江淮遭運四年先是江淮嵗運米輸京師未有定制是嵗始定六百萬石嵗額祥符二年江淮發運李傳言江淮廩粟除留州約支及三年外當上供者凡一千三百餘萬石每嵗水運止及五百萬今嵗當及七百萬望少損其數上曰足食養人之本豈患太多耶仁宗天聖四年定江淮制置發運司嵗漕米課六百萬石初景德中嵗不過四百五十萬石其後益至六百五十萬石故江淮之間穀常貴而民貧吳耀卿請約咸平景德嵗漕之數立為中制故裁減之慶厯三年江淮嵗漕不給京師乏軍儲大臣以為憂范仲淹言許元可獨辦擢元江淮兩浙荆湖制置發運判官元曰以六路七十二州之粟不能足京師吾不信也至則命瀕江州縣留三月糧餘悉發之逺近以次相補引千餘艘轉漕而西未幾京師足食嘉祐元年張方平為三司使畫漕運十四策宰相富弼讀方平奏上前晝漏盡十刻侍衛皆跛倚上太息稱善弼曰此國之大本非常奏也悉如所啓施行其後未朞年而京師有五年之蓄神宗元豐六年江淮等路發運使蔣之奇嵗漕穀六百二十萬石之奇入覲上勞問備至之奇因條利病三十餘事多見納用並長編髙宗紹興五年李光言陛下駐蹕東南江浙實為根本之地自兵興以來科須百出民力既殫理宜優恤今州縣綱運漕司既不任責轉輸之職趣辦州縣乞求舊例應州縣上供及軍糧錢帛並令漕司計置綱運專差使臣專綱起發其水腳糜費等錢乞依條將直達係省頭子錢樁充漕司不得互用詔諸處轉運司措置依此施行㑹要十一年初建康屯重兵嵗費錢八百萬緡米八十萬斛𣙜貨務所入不足以贍至是禁旅與諸道之師皆至葉夢得被命兼總四路漕計以給饋餉軍用不乏故諸將得悉力以戰朝廷益嘉之係年録二十年上曰比緣河流淺澀綱運遲緩已令內帑支降錢五百萬貫以佐調度聖政偶句陳恕同知利害而有真鹽鐵之號李溥盡知錢穀而有發運使之除江淮之間輦運相繼范旻之主漕計也瀕海之粟千艘而西許元之為判官也淳化上供六百萬以允武之為淮浙發運也祥符上供七百萬以李溥之為江淮發運也范旻嵗運倍於正元太宗曰實我倉廩卿之功也丁謂運米數倍唐朝真宗曰國儲有備卿等力也至道以前黃河五十萬惠民四十萬而汴河則三百萬熙寧以後廣濟六十萬惠民六十萬而汴河則六百萬經傳格言粟行三百里則國無一年之積粟行四百里則國無二年之積粟行五百里則衆有饑色管子千里饋糧士有饑色食敵一鍾當吾二十鍾􅠇秆一石當吾二十石並孫子偶句粟行五百里則衆有饑色此運糧之為害也食敵一鍾則當吾二十鍾此因糧之為利也名臣奏議漢隋唐漕運因革歐陽修上仁宗漢初嵗漕山東粟十數萬石是時運路未修其漕尚少其後武帝益修渭渠至漕百萬餘石隋文帝時㳂水為倉轉相運置而關東汾晉之粟皆至渭南運物最多其遺倉之迹往往皆在然尚有三門之險自唐裴耀卿又尋隋跡於三門東西置倉開山十八里為陸運以避其險率泝河而入渭當時嵗運不減二三百萬石其後劉晏遵耀卿之路悉漕江淮之米以實關西後世言能經財利而善漕運者耀卿與晏為首耀卿與晏初理漕時其所得少至其末年所入十倍是可久行之法明矣本朝漕運之費倍於古蘇轍上神宗曰漢唐以來重兵分於四方雖莫大之憂而饋運之勞不至於太甚祖宗受命懲其大患而略其細故斂重兵而聚之京師根本既強天下承命而服然而轉漕之費遂倍於古凡命東南之米每嵗遡汴而上以石計者至五六百萬山林之木盡於舟楫州縣之卒斃於道路月廩嵗給之奉不可勝計往返數千里饑寒困迫每每侵盜雜以他物米之至京師者率非全物矣由是觀之今世之糴法以其力致之而不計其患非法之良也漕運急則民困朱熹上光宗建炎以來指揮兵多權宜科次又復數倍供輸日久民力已殫而間者諸路上供多入內帑是致户部經費不足遂廢祖宗破分之法而上供嵗額必取十分登足而後已期限迫促科責嚴峻監司州縣更相督迫唯務自寬已責何暇更察民情捶撻號呼有使人不忍聞者而州縣嵗入多作上供起發則又於額外巧作名色夤緣刻剝此民力之所以大窮也偶句畫漕運十四䇿者張方平之在嘉祐也條利病三十事者蔣之奇之在元豐也張方平論漕運以河渠為主熙寧八年歐陽修論漕運以河渠為先康定元年賈宇請開揚州古河嵗省官費功利甚厚文彥博言自汴入河用力不多所費極少修勸農之法以省江淮漕運則陳濟之議也去兵吏之冗以減江淮漕運則仲淹之請也景德間定江淮運米六百萬石從李溥之請也天聖間減江淮運米五十萬石從吳耀卿之請也諸儒至論本朝漕運凡四東萊曰本朝定都於汴是時漕運之法分為四路東南之粟自淮入汴至京師陜西之粟自三門白波轉黃河入汴至京師陳蔡一路粟自惠民河至京師京西之粟自廣濟河至京師四方之粟有四路四條河至京師然而本朝所謂嵗漕六百萬石專倚辦江淮其所謂三門白波之類非大農仰給之所惟是江淮最重在祖宗時陸路之粟至真州入轉般倉自真方船即下貯發運司入汴方至京師諸州回船却自真州請鹽散於諸州雖有所費亦有鹽以償之此是本朝之良法漕運當各從其便張守曰祖宗以來每嵗上供六百餘萬斛悉出於東南而轉輸未嘗以為病也今宜以兩浙之粟專供行在而江東之粟以餉淮東江西之粟以餉淮西荆湖之粟以餉鄂嶽荆南量所用之數責漕臣將輸而歸其餘於行在錢帛亦然恐未至於不足也漕運必因水勢華子西曰蕭何發敖倉之粟以飽韓信之師皆得之於河渭之順流孔明下巴蜀之粟以餉荆州之卒皆藉夫嘉陵一江之力隋人開汴水而淮漕以通吳人堰京口而可以運江南之粟主意得人則漕辦論餽餉之計於今日者一曰因地勢二曰便民力而已要其所以致是者必得人任其責也夫興師十萬日費千金千里餽糧士有饑色民食之不可不講也尚矣三代而上兵農一致無事則出耕有事則習戰故餽餉自給糧道不絶未聞有餽兵之勞自兵民既分不能以自養雲屯萬竈日仰食於縣官而上之人始有廩給不繼之憂要之經理之有其人則雖當干戈擾攘之中而常見其有餘經理之無其人則雖當平居無事之際而亦見其不足方漢楚相距滎陽成臯間兵無見糧髙帝若難乎為力矣得一蕭何以任守關之責則餽餉日給而不聞其有匱乏之虞三國鼎峙蜀處偏方軍食之計先主方難乎為力矣得一諸葛亮以任其責則木牛流馬之運亦不見其漕運之苦兵食之餽必得人若此而後可以論餽餉之計矣省戍則漕減言省運之䇿易為省戍之䇿難蓋邊民之困起於餽運餽運之困起於戍兵兵精則戍可省戍省則餽運亦省餽運省則邊民之困可以少瘳矣昔在熙河之師並邊之民相從于役乘沙道河死者枕籍每讀國史至此未嘗不浩歎夫兵禍之酷也而孰知厥今淮襄千里之地均罹此毒而棗陽浮光之役有不可言者矣荷戈以戰民之死者半負檐而輸民之死者又半為民上者可不思所以處之乎昔之所急者屯田今屯田間興而不足仰給則充國之便不足施也昔之所務者和糴今和糴已行而不足取辦則壽昌之計不足用也昔之所病者道險今千里如掌以邊為囷諸葛亮木馬牛之法又無所取也不知兵戍之已多而唯曰餽餉之難省不已拘乎經久權宜之說有經久之宜有權時之宜經久之宜可講於暇豫平居之間權時之宜可施於倥􅘓多事之際何者天下之事公私雖不兩便然未有彼此之俱扞格者也利害雖不兩立然亦未必有利而無害者也抑亦視時宜之緩急利害之輕重於公私之間焉蓋今日漕運之說是也警段為國便為民病比年以來和糴之拋降夥矣疲氓剜肉勉強送輸積粟埋梁中外填溢散漫諸郡易有侵耗之憂揔括一司兼有漕運之利於是議者請置轉般一倉專為儲糴之地是知便國之良畫矣然曩時派數雖多倉庾未建而或者猶以糴艱為憂猶以取運為苦而其數或少殺今焉亦有髙廩萬億及秭既可無弊蠧之欺宜為折閲之慮何憚而不可為愚恐繼此糴事無窮已之時舊逋未償新數已拋矣巨室告匱下户重困矣其如民之不便何故曰法有便於國而不便於民者今之轉般倉是也有民害有官弊陸運何始乎始於秦之飛芻挽粟乎水運何始乎始於春秋泛舟之役乎嘗謂陸運之弊其弊在民水運之弊其弊在官蕭何計户轉輸以給軍食號稱良法然猶有老弱疲轉餉之語則陸運之弊民也明矣吾漕長安之粟風波覆溺十常七八率一斛而得八㪷為成勞則水運之弊官亦明矣夫軍民百萬之衆而仰給於漕計此事之不容廢者然省冗食之繁行屯田之䇿獨不可少減其半乎不然木牛流馬囊米載舟必有孔明劉晏之術而後可也偶句行齎居送而煩費億萬舟運陸輸而虧折過半事證唐魏漕運漕運之法古嘗行之矣置倉以貯江淮之粟凡三年運七百萬石者非裴耀卿不能也自陳項以至壽春之地開廣漕渠逮于江淮者非鄧艾不能也茍得其人則緣水置倉轉相受給豈不可為而奚有行齎居送之患哉漢唐漕運自秦罷侯置郡漕法始講致瀕海之粟輸北河之倉蓋以三十餘鍾而致一石而民始病矣然則秦為漕運之俑乎漢初京師之用止仰近郡諸侯之粟不歸天子當時關東之漕僅數十萬石而已其省何如也及武帝以後山東漕益而為百餘萬石既而縣官廩食者衆則河漕又益而為四百萬石繼而言利之臣愈請增益則山東之漕且至六百萬石焉逮至軍旅既息之後每嵗漕榖為石猶不下四百萬唐初府兵之法未壞平時無事身居田畝一有征行自為調度當時關中之漕不過十萬而已其省何如也及明皇天寶以後每嵗三百五十萬廣德嵗轉亦不下百一十萬甚至江淮之運少緩六軍脫巾於道韓滉之米一至君臣舉酒相慶則唐人所以倚辦於此可謂急矣噫引渭穿渠之謀不見於髙文之時而見於武帝之世泝河入渭之說不用於太宗之日而用代宗之後蓋漢唐中年以兵費之故所以屢講而屢詳其勢不得不然也噫漢以用兵而費財唐以養兵而蠧粟養兵者未可遽息用兵者朝罷而夕安此唐之漕運又加詳於漢也大抵漢漕皆仰於山東唐漕皆仰於江淮故武帝時潘系言漕者山東也𢎞羊益漕者亦山東也蓋江淮之漕未通而多仰於山東矣天寶以後劉晏所漕者江淮也韓滉所漕者亦江淮也蓋諸道之漕不通而皆仰於江淮矣此漢唐漕法之本末也厯代諸人通漕戰勝攻取則惟韓信漕給餉餽則惟蕭何而誅秦蹙項迄成帝業以裴度總淮西之役而財𨽻于皇甫鏄而奏伐蔡之捷以德裕總澤潞之師而財𨽻於杜悰而䇿討叛之勳吁韓信裴李所以成大功者皆諸人漕運之力也祖宗四河通漕國家都汴四方輻湊逺近俱便過於漢唐是時漕運之法分為四路東南之粟自汴河而至陜西之粟自黃河而入陳蔡之粟自惠民河通之京師之粟自廣濟河通之然論四河之利害汴河為重黃河次之而惠民廣濟又其次也何以言之視諸道所漕之數廣濟十二萬惠民四十萬黃河五十萬而汴河至三百萬於此可見矣故汴河以發運使副領之黃河以運使判官領之而惠民特命催綱廣濟特用使臣然本朝所謂嵗漕六百萬石專倚辦於江淮其他三河所入非大農仰給之所惟是江淮最重故獨於汴河漕法為詳也中興專侍江淮自翠華暫臨吳㑹前日漕運之計如置倉以轉輸散鹽以供費時異事殊皆可略矣獨以謂祖宗時養兵未必多於今日也京師嵗貢亦未必過於今日也而有四路轉運之供餽陜西之運陳蔡之運京西之運有所未至則所恃者江淮耳今夫民力困竭天時變易要不可專恃於此往者申請欲以兩浙近甸置場糴米以減東南之嵗入庶乎不虛此而盈彼亦一䇿也張文定畫漕運十四䇿宰相讀於上前漏盡十刻而仁宗深歎為國計大本非常奏也夫一漕運而講明之詳至有十四䇿以見足國裕民之計不容輕議時政今日當汰冗食今日㳂邊營屯星分棊布不知其幾非特浮光棗陽之戌未撤也其能果無老弱可汰者乎其果皆勇敢精鋭而無冗食者乎若猶未也則老師費財古人所戒冗兵之汰善將者每先焉是必汰其冗食以為省餽運之計餽運既省則邊民可轉而歸南畝轉餉之勞庶可少息廩給之費庶有所繼如是則舟運可也陸運亦可也又何有單寡隔絶之慮乎雖然是餽特運計爾若夫經久之謀則淮甸之地猶未盡墾使得如鄧艾羊祜之徒講行屯田之䇿是又有餽運之一端也若以為事難卒行則及今淮甸嵗豐舉行陸宣公和糴之議亦所不容緩權以和糴經以屯田豈獨可以濟餽運而已乎今日至勞逺餉自邊方驛騷以來廟堂以餽餉為重總司以給餉為難州郡以轉餉為苦邊閫以請餉為急上煎下迫至此靡底水載陸搬漕運不絶而邊人猶以乏用告日攢月計如恐不及而戎司猶以寡積言丁夫勞瘁僵仆枕藉而督部猶以後期斥何也蓋昔人之餉軍因地以為餉而今之餉軍則越境以致餉此千里饋糧士有饑色正兵法所謂師不宿飽者也向者京湖富實隨復諸州皆産米之鄉土地所有儘有餘力今産米之地莽為荆榛兵屯既增贅食又衆地之所産不足供億於是取辦於江西之糴頃又取辦於江東之糴今又轉其糴於吳門矣窮山倒海不足以應其需椎肌剝膚不能以充其數況吳門之米輦轂之重屯寄焉浙西之民食藉焉當此豐穰猶切凜凜脫有水旱胡以相恤謀國者詎可姑為支撑之計而不思變通之䇿乎清野為餽餉害今之所苦於餽餉者其禍皆始於清野蓋邊城之地有人民則有耕稼有耕稼則有糧穀官既可賴其賦入之輸而糴又可為就便之利今也邊之所存孤城巋然無人民無耕稼始不得不仰於內郡之餉餉之所仰者廣始不得不出一切不得已之政今欲通其變而紓其急則亦有反清野之說而已偶句慮循目前非漕計也剝下奉上非漕計也萬竈列屯率皆待哺千里餽運寧無煩擾自轉般之法行而君子以為便自直達之法用而識者以為憂蜀漢之粟順流而下以供荆襄之軍閩浙之舟水運而上以供中都之用結尾漕運要在得人竊謂強兵之道在食足食之政在人得其人以任饋餉之責則糧道不絶可以制強楚而有餘無其人以任和糴之寄則湟中虛數雖欲捍先零不足今日居四總之任者固皆漢之蕭何唐之劉晏矣惟上之人明詔申警俾之多方調度悉力經營如周申之峙糧金城之積穀則士飽而歌馬騰於槽之詩將復用於今日矣傳曰待其人而後行謀國者毋曰常談漕運不如屯田抑又論之輦粟以給一月是給一月而已也一月之外其能給之乎挽漕以餉一嵗是餉一嵗而已也一嵗之外其能餉之乎惟夫屯田之規烽燧不驚則執耒耜以耘耨羽檄一馳則被甲胄以征行髙宗皇帝書趙充國傳賜邊臣以講求營屯之政誠以不擾於民則民享安逸之利服勞於兵則兵無驕脆之憂得粟百斛愈於在外之千斛得藁一束愈於在外之十束見其利未見其害見其益未見其損愚又愛其法之可以經逺所惜者邊臣之鹵莽爾循是而行兵食其不足乎惟上之人留意言省漕之䇿難仰又有聞焉言通漕運之䇿易言省漕運之䇿難昔呂源嘗言於髙宗矣吉州起發金銀輦入京師朝廷頒收糴金銀降付江西吉州起發紬絹輦入京師朝廷給嶽飛軍糧搬赴吉州彼此勞費擾動一吉州且然他可知矣較移用之更互蠲出入之勞擾獨非省漕運之一䇿乎若夫修勸農之法以省江淮漕運如陳靖之議去冗兵冗吏以減江淮漕運如范仲淹之請此非根本說也而未可以易言也在今日而驟言之激長江之水以救涸轍之魚君子謂之不知務羣書㑹元截江網卷六
