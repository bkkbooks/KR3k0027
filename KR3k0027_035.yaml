body:
  text: 羣書㑹元截江網卷三十五諸子荀子董子揚子文中子韓子附事實源流荀子為蘭陵相其書立言指事根極理要敷陳往古掎絜當世撥亂興理易於反掌所以羽翼六經增光孔氏真名世之士非徒諸子之可比也及言桀紂性堯舜偽是其喜為異說而不讓敢為高論而不厭故流而至於李斯以其亂天下而不顧乃高談異論有以激之也揚子漢哀平時人文高而絶義祕而淵漢儒中之大賢也然於出處之際不能無過也光武中興使雄不死能無誅乎君子惜之文中子隋文帝時人獻太平十二䇿不用退隱山澤著書立言學頗近於正而粗有可用之實只是無本原工夫將秦漢以下却要文飾做三代作六經將前人腔子自做言語填放他腔中便說可比孔子乂做中說謬哉真可一噱也韓子名愈唐人也因學識為文章力求其所未至以至於有得也所謂德成而言則不期於文而自文矣著原道原性師說等篇皆奥衍閎深與孟子揚雄表裏而佐佑六經排斥二家撥衰反正功齊孟子逺過荀况楊雄矣董子漢之醇儒所言仁人正其誼不謀其利明其道不計其功度越諸子逺矣至於天下國家事業恐施展未必得也諸儒至論荀子極偏駁只一句性惡大本已失荀卿才高其過多荀子悖聖人者也故列孟子於十二子而謂人之性果惡耶聖人何能反其性以至斯耶遺書莊荀之徒失之辨皇極經世揚子之學實遺書揚雄才短其過少揚子無自得者也故其言蔓衍而不斷優柔而不決其說論性則曰人之性也善惡混修其善則為善人修其惡則為惡人世之議子雲者多疑其投閣之事子雲之罪特不在此免於莽賢之間畏死而不敢去是安得為大丈夫哉揚雄規模窄狹揚雄去就不足觀如言明哲煌煌旁燭無疆此甚恨不能先知遜於不虞以保天命則是只欲全身也並遺書王通隱德君子也當時有些言語後世被人傅㑹不可謂全書若論其粹處殆非荀揚所及也若續經之類皆非其所作遺書文中子書其間極有格言茍揚道不到處又有一件事半截好半截不好如魏證問聖人有憂乎曰天下皆憂吾獨得不憂聖人有疑乎曰天下皆疑吾獨得不疑證退謂董常曰樂天知命吾何憂窮理盡性吾何疑此言極好下却云證所問者迹也吾告汝者心也心迹之判久矣便亂文中子續經甚謬恐無此書如續書始於漢自漢以來制誥又何足記續詩之備六代如晉宋後魏北齊後周隋之書又何足采並同上朱子曰文中子雖是根脚淺然却是以天下為心分明是要見諸事業語錄問文中子曰其書多為後人添入真偽難見然好處甚多論世變因革處說得極好文中子論治本處高似仲舒而本領不及爽似仲舒而純不及並同上韓子之學華華則涉道淺遺書韓愈亦近世豪傑之士如原道中言語雖有病然自孟子而後能許大見識尋求者才見此人至如斷曰孟氏醇乎醇者也荀與揚擇焉而不精語焉而不詳若不是他豈得千餘年後便能斷得如此分明學本是修性有德然後有言退之却倒學了因學文日求所未至遂有所得如曰軻之死不得其傳是此言語非是蹈襲前人又非鑿空傳得出必有所見若無所見不知言傳者何事並同上韓公天資高但學識淺故只做到那田地然大綱皆正語錄栁子厚看得文字較精以其人刻深故如此韓愈較有些王道意思每事較含洪便不能如此問揚子與韓文公優劣曰各自有長處韓文公見得大義已分明但不曾去子細理㑹如原道之類不易得也揚子為深沈㑹去思索然而如太𤣥之類亦是拙的工夫考訂韓文公與大顛書曰真个是有崇信底意思在是貶從潮州去無聊後被他說轉了退之說性只將仁義禮智說便是見識高處並同上稽古偉議孔孟明道扶教三代而上有王者作而道行三代而下有孔孟繼出以道自任而異端得以不熾且時至春秋非無少正卯之徒也自孔子者作而教有所宗主當時及門之士如顔之服膺師之書紳信守不踰故孔子之教卒賴其徒羽翼之雖有少正卯之奸無能為也然教明於孔子而教不保其常明道行於孔子而道不保其常行時至戰國非無楊墨之徒也自孟子作而教有所宗主當時從遊之士如萬章舜不臣堯之問公孫丑氣何謂浩然之問辨難請益故孟子之教卒賴其徒扶植之而雖有楊墨無能勝也蓋聖賢達而在上則以身行道時不我逢君不我用窮而在下以言明道孔孟雖不及遭時遇主奮身行道而獨以其身處於邪說害正之時使其時學者宗之如泰山北斗而用以開後世立言垂訓羽翼斯文之統嗚呼盛哉漢儒董子明道孔孟不作後學聾瞶秦人憤處士之横議舉六籍而畀之烈焰其禍可謂酷矣然秦焰蔽天雖能毁棄其書不能滅其理猶未若異端肆起而吾道遂無休明之日矣秦漢以來諸子百家之書更見迭出其意皆欲自重其學也皆有疾視吾道之心也而仁義禮樂之理終不為是廢上之人有所執以為治下之人有所視以為學帝王之治雖不復見於天下帝王所以安民治國之本未遂湮没者是誰之功也吾觀武帝表章六經而董仲舒以醇儒對䇿有諸不在六經之科抑勿與進之說則知上有所執以為治武帝表章之力下有所視以為學亦董仲舒去異端之力武帝之功固大而仲舒之功不亦大乎法祖嘉猷國朝歐陽倡道本朝奎畫呈祥文風開治前乎此也承五代之餘波士習垢汙文氣萎薾藝祖皇帝肇造區夏再立人極崇重儒臣以風勵之褒贊先師以表章之逮至道學涵濡之久教化漸摩之極而歐陽子出焉反人心邪詖之溺而為正道之是學起文風彫鐫之弊而為古體之是崇吾道愈振而愈隆士習愈磨而愈銳於是南豐之曾睂山之蘇從而和之學不務於速成以渾涵氣質為工文不競於時好而以理致根源為尚扶植道義之正統講明理學之深趣發揮當代之盛治昭示後學之正塗皆數大儒之功也其為我宋儒之領袖疇曰非宜本朝朱熹夫子大扺治無常盛崇極而圯從古固然而道學之盛衰亦猶之天朝天聖嘉祐以來文化極矣道學盛矣未幾而王金陵以新經之似亂儒學之真人心失所師向道統無與維持上賴天相斯文碩果不食有若周濂溪者獨探無極太極之妙深得孔孟以來心傳之學倡道東南而二程横渠從而和之自是道統傳授文教興行雖厄於崇觀厄於宣靖而不能不復萌蘖於炎紹又不能不復枝榦華實於乾道淳熙吾觀乾淳之際異人輩出正學大明張之教行於荆吕之教行於浙朱之教行於閩如笙簧之並奏無非雅樂之正條也迄今朱子之學尤盛上之人表章而至再至三下之人崇信而且敬且慕者也朝廷節惠之典猶有所待近年曰宣曰成曰文之諡以周程張吕數先生皆以子見稱矣偶句荀也通故隣於輕揚也慕故失之淺作太𤣥以擬易此揚子雲之僭也著中說以續經此王仲淹之謬也正誼明道乃所以度越諸子端本澄源乃所以表正朝廷王仲淹曉作用而躐等之議未免韓退之議大原而密察之功未加體仁希聖抑伯尊王持挈當世者卿之本心也艱言苦志博洽多聞磅礴羣生者雄之所學也作𤣥經以擬春秋作中說以擬論語其失在於好同以仁義為定名以道德為虚位其失在於好異諸儒至論諸子皆有所取大扺論人物於孔孟而下者當以其長而揜其短毋寧以其短而棄其長當以其善而恕其失毋寧以其失而少其善吾觀荀與揚也大醇而小疵而通之明王道達禮樂而其失也特蔽於倣傚而失之拘愈之詆異端排佛老而其失也特蔽於崖畧而失之亢要之皆明道者也皆守正者也誠得孔子以為之依歸則其所就當不止此而世之好毁詆人物者或以一二未醇全處而併與其可稱者而没之亦已甚哉持論刻核則千古無全才制行巳備則百世無可取與人不求備自昔所尚而方人不暇夫子何嘗以巳而律人耶如况雄通愈之好學士之業儒者亦難及之矣而顧忍於議者何哉昔孟子待常人心近厚而獨於異端邪說則不貸嘗曰能言距楊墨者聖人之徒也君子亦無可議於四子矣崇正學以救俗方今治教休明表章正學朝廷之所去取學校之所趨舍皆關萬世之綱常皆繫後學之風俗自宜道德一而風俗同矣夫何邇日廷紳之奏猶有端士與小人角立邪說與正論並行必至瞀亂是非之慮而敷陳之目且别白以為之言有所謂樞屬中之立邪說者有所謂講習中之立邪說者有所謂三館中之立邪說者聖明當宇賢俊充庭豈宜有此毋亦是非邪正之際雖區别於前日而猶未大彰明於此日耶曩者文公四書之褒崇荆舒侑享之擯撒若嚴於勸善懲惡矣曾幾何時綱常之亂禮法之斁自忍負名教者而首犯之人心易移趨者瀾倒至於今日是無怪邪說之行有如廷紳之所慮者急宜挽回世道一正人心毋亦欲崇正學愈用正人以朂其興起風勵之機可乎學不必攻其異每觀儒者之學其入門也不同其行道也則一其發端開序也不類其成德達材也殆無間然英賢之生於天地間何可齊也其聰明皆足以入道其資稟皆足以成德有得崇儒以為之依歸由醇正而入醇正者有負資稟之絶人就其所得信以行之始異吾道而終以成德自名以不叛吾道者故以正入正由初曁終而純如者固正之正者也以矯正而入正始異吾道而終不戾吾道是可出此而入彼出彼而入此以後生晩學輙肆擬議於其間哉當知為吾道愛惜善類為吾黨封植正人謹守其學精習其書力踐其行合其異而歸之同約其離而返之合也主意諸子不可苛責人有常言論古者人物責以苛論後世人物待以恕吁是固然矣吾夫子當春秋之末以扶持正道為己任而至於仁管仲惠子産詩書錄秦春秋進楚學者惑焉夫管仲子産不過春秋人才秦楚雖大不過夷狄之國而聖人有取之者蓋議論渾厚亦聖人用心而况於學者乎夫在人則精别於錙銖之間在己則濶畧於繩墨之外恕己而責人此學者之通患非一日矣夫自孔孟而下大道不明有若豪傑之士雖無文王猶興知以尊聖人為心知守聖人為學知以羽翼聖道為文知以講聖道為教之人也必其表表者尚可以一二不淳全之處指摘其失而少之耶此論人物於孔孟不作之後而衞道之儒每於諸子之表表者屢指也諸子各有可取聖賢之名與日月並著學問之道如江漢朝宗尊向之篤者必忘鑽仰之勞希慕之切者必求見聞之益至於的而矢集焉指其軌而轍交焉尊向之篤而至之則未希慕雖切而及之實難君子當以恕論之可也蓋嘗觀諸昔人所以逓相慕向者矣陳良楚産也恱周公仲尼之道北學於中國北方之學未能或之先也彼所謂豪傑之士也不獨陳良也明經博覽以記問名關西夫子其人也經術精明以科目進當世仲尼其人也髫齓名稱以幼敏著吾家顔子衆論偉之議論應對以穎悟顯宗室顔淵時譽予之世非隆古人無全才隨其所就皆足自見彼有一善足稱者前世猶翕然推許矧如衞道尊師立言垂訓自孔顔而下惟孟子一人孟子以還未易多得有若希賢希聖之諸子焉如之何不恕其小疵而推許之哉警段四子未可苛責荀况之書明君臣之道論禮樂之本觀之解蔽而得聖人之所以治心修身觀之儒效而得聖人之所以治天下國家予三王而羞五霸其道可謂醇矣奈何性本善也而以為惡禮本性也而以為偽以堯舜為非辭禪是不知書以周公為非恭儉是不知禮孔子孟軻子思亦不容訾矣乃並與十二子而非之則其失在於好異故也揚雄之書尊大聖而黜諸子扶正道而排異端厭雕蟲篆刻之學麾鄭衞韓莊之流而適堯舜文王之道其論周秦以來君臣之事一槩諸聖宜議者謂其論不詭聖人可謂醇矣及其妄自尊大以法言比論語以訓纂比史篇以州箴比虞箴區區求合於前人遂使議者謂如吳楚僣王宜得誅絶之罪則其失豈非在於好同乎王通之書多至於三百七十有五篇而世泯絶不傳猶有中說為可考其大槩以明帝王之道達天人之分紹宣尼之業由周公之事觀其論天地必繼之以君臣論教化必終之以禮樂凡董常之徒答問之際未始不本於仁義忠信而折衷於孔子則其醇何可譏哉及其續詩而不足以導性情作元經以擬春秋而不足以導名分所謂中說者皆模寫剽竊老莊論語之文以助壯懐至使議者謂如太公家教則其失在於好同故也韓愈之書其五箴之所戒動無非法五原之所述言無非道當貞元元和間以六經之文為諸儒倡障隄末流反刓以樸剗僞以真排釋氏斥百家周情孔思千態萬狀卒澤於仁義道德炳如也其醇曷可訾哉然而是非頗謬於聖人故孔墨之道不同也彼乃以為相用性情之本無貳也彼乃列而三品而原道之作亦云善矣奈何以仁義為定名而道與德反為虚位是則不得謂之無牴牾聖人者矣豈非失於好異乎惟其失之於好同故揚王之書雖清㓗峻整嚴毅端莊而其蔽也未免有蹈襲之誚惟其失之於好異故荀韓之書雖汪洋汗漫淵源澄深而其弊也未免有駁雜之譏二者胥失矣故曰學聖人之道而未得其全者此也結尾四子更相詆訾雖然四子之初心皆欲自比於聖人也並荀况於孟子尚可非訾而王通以董常比顔子則其意蓋自任以孔子者歟揚雄竊自比孟子而史謂韓愈自比孟軻則其道自比於孟子者歟惟其師孔子之言而未得其所以言師孟子之書而未得其所以書故其終也不能無所失而至於互相詆訾荀况之書至揚雄之時則以為同門異户揚子之書至韓愈之時則以為大醇小疵而王通中說乃至斥為六籍之奴婢而韓愈之道雖籍湜輩亦不保其叛去嗚呼一何工於論古人而拙於用己歟雖然自周訖唐寥寥千載聖人之道所以暗而復明鬱而復發崇奬扶持至於今不泯者四子與有力焉殆未可以輕議當質關洛之言雖然尚論千古衆言殽亂吾以為不若折衷於關洛諸君子焉荀子才高過多揚雄才短過少程子之言可復也文中子好處甚多韓子大綱皆正朱子之言可證也偏駁不醇吾不為蘭陵去就不足觀吾不為子雲因中說之格言求原道之著作溯諸儒講明之大㫖則四子不待辨而明矣願從先生質之明道之有難易明道於去聖未逺之日者易為力明道於去聖愈逺之日者難為功夫道在天地間本無所謂甚明亦無所謂甚晦故亘古今窮宇宙天下有治亂而吾道不以治亂有間也天下有泰否而吾道不以泰否有異也同是古今則古今同是道同是宇宙則宇宙同是道特是道升降之迹若與世運相為推移而儒者之論又有道隆道汚之别於是遂執世道之升降謂吾道若與之升降去聖世之近者則以為明道之易去聖世之逺者則以為明道之難吁有是哉是殆非篤論也然亦未可盡非之也自孟子有見知聞知之目意謂見而知之者去聖人未逺也聞而知之者去聖人浸逺也未逺者得於見知其知也真己逺者得於聞知其知也畧如之何不謂明道於去聖未逺者易明道於去聖浸逺者難乎愚生何幸生逢盛世目覩聖人道德之光身沐聖人道德之化出入起居日與道俱又何但明道之易而已羣書㑹元截江網卷三十五
