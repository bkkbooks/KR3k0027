body:
  text: 羣書㑹元截江網卷二十二將帥經傳格言司馬掌邦政統六師平邦國王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫周禮夏官君子聽鼓鼙之聲則思將帥之臣禮樂記帥師者受命於廟受脤於社同上矯矯虎臣在泮獻馘詩泮水有必勝之將無必勝之民安邊境立功名在於良將朝錯言兵首戴武辨嫉文吏如仇讎足蹈軍門視農夫如草芥謀不足以剪除凶逆而詐足以抑揚威福勇不足以鎮衛社稷而暴足以侵軼里閭有藏奸觀釁之心無仗節死難之義劉蕡名臣奏議勝敗之機在將秦少游進䇿曰將帥之難其人久矣勢有強弱任有久近敵有堅脆地有逺邇時有治亂而勝敗之機不係焉惟其將而已矣昔智氏以韓魏三國之兵伐趙馬服君之子以四十萬之衆抗秦可謂強矣而栗腹以摧騎劫以走是不在乎勢之強弱也穰苴之用於齊投於閭伍之中一日斬莊賈晉師敗去燕師渡水而解韓信之擊趙非素拊循士大夫也背水一戰而擒趙王歇斬成安君是不在乎任之久近也以周瑜之望曹公不啻虎狼而吳兵捷於赤壁以元德之視陸遜甚於雛鶩而蜀師衄於白帝是不在乎敵之堅脆也東西異壤也而鄧艾以縋兵取成都南北異習也而王鎮惡以舟師平關中是不在乎地之逺邇也夫以東晉之衰而謝𤣥得志於淝水開元之盛而哥舒翰失利於潼關是不在乎時之治亂也故善將者勢無強弱任無久近敵無堅脆地無逺邇時無治亂不用則已用之無不勝焉故曰惟其將而已矣大將當用有道之士秦少游進䇿有一軍之將有一國之將有天下之將走及奔馬射中飛鳥攻堅城破強敵所向無前此有勇之士一軍之將也出竒制勝無窮如天地不竭如江河攻輒破擊輒服此有智之士一國之將也福於己而患於人則功有所不立利於今而害於後則事有所不為功成事畢自視缺然無矜大之色此有道之士天下之將也國家將帥可謂盛矣閲禮樂而習詩書者肩摩而轂擊縱橫剽悍稱智囊而號肉飛者至不可勝計而驛騎有赤白囊至則廟堂之上為之紛然進止賞罰皆從中决者何也豈以為將帥者皆智勇之人非有道之士不可獨任耶物望太輕之弊朱晦菴南康封事今日將帥率皆膏粱子弟厮役凡流徒以趨走應對為能苞苴結託為事物望素輕既不為軍士之所服而其所以得此差遣所費已是不資以故到軍之日惟務裒斂刻剝經營賈販百種搜羅以償債負債負既足則又别生希望愈肆誅求蓋上所以奉權貴而求升擢下所以飾子女以快己私皆於此乎取之軍中急務往往皆不暇及軍士平時既皆悍然有不服之心一旦緩急何由可恃諧價輸錢之弊朱晦菴赴召上言曰諸將之求進也必先掊克士卒以殖私財然後以自結於陛下之私人而祈以姓名逹於陛下之貴將貴將得其姓名即以付之軍中使自什伍以上莭次保眀稱其材武堪任將帥然後具奏薦牘而言之於陛下之前陛下但見其等級推先案牘具􅊀則誠以為公薦而可以得人矣而豈知其諧價輸錢已若晚唐之債帥哉夫將者三軍之司命而其選置之方乖刺如此則彼智勇材略之人孰肯抑心下首於宦官宮妾之門而陛下之所得以為將帥者皆庸夫走卒而猶望其修明軍政激勸士卒以強國勢豈不悮哉將帥掊刻之害真德秀奏劄諸道總戎之帥訓𨽻不勤而掊刻是務自偏禆以至士卒其家資稍厚者必使之治財貨非優之也蓋幸其負課而掩有也甚而廪給稍厚者必以之供役使非親之也蓋利其捐金以求免也軍中相語以酒壚藥局為藉資産之梯媒謂當其事者必不能以自免也回易房廊為陷子孫之坑穽其身雖死而監替至於無窮也主帥剝偏禆偏禆剝隊伍有日給千錢而不足衾絮者有月廩數斛而不飽糟糠者以此飾苞苴以此買歌舞於是乎兵貧至骨矣諸儒至論將才有大小將之才固有大小傑然於庸將之中者才小者也傑然於才將之中者才大者也才小志亦小才大志亦大而人君當觀其才之小大而為制御之術先賞之說可施之才大者不先賞之說可施之才小者兼而用之可也昔漢髙祖一見韓信而授以上將解衣衣之推食哺之一見黥布而以為淮南王供具飲食如王者一見彭越而以為相國當是時三人者未有功於漢也厥後追項籍垓下與信越期而不至捐數千里之地以畀之如棄敝屣項氏未滅天下未定而三人者已極富貴矣何則髙帝知三人者之志大不極於富貴則不為我用雖極於富貴而不滅項氏不定天下則其志不已也至樊噲滕公灌嬰之徒則不然拔一城陷一陳而後增數級之爵否則終嵗不遷也項氏已滅天下已定樊噲滕公灌嬰之徒計百戰之功而後爵之通侯夫豈髙帝至此而嗇哉知其才小而志小雖不先賞不怨而先賞之則彼將泰然自滿而不復以立功蘇老泉將不任責今國家有西北之憂重擇大臣付以專征大官以寵之富祿以厚之旌莭以榮之宜竭力盡謀以濟厥事乃偃蹇君命優游私家謂聞金鼓之震天不若聞絲竹之盈耳謂見羽毛翳目不若見趙衛之侍前謂若被甲胄不若服輕紈謂若冒矢石不若御重裘豈不負吾君之委寄哉石介將材不可過為將者不患其不及而患其過過勇則輕李陵是也過智則奸侯君集是也過威則離張飛是也過強則驕李光弼是也過專則僣晉王蘇是也然河曲之師趙盾為將而令出於趙穿邲之師荀林父為將而令出於先縠皆輿尸之師也楊誠齊亞夫不能見幾而作事修而謗興德髙而毁來韓信功成而見誅蕭何治定而見疑亞夫不能全身逺害景帝日疏於上梁王日譛於下可以見幾而作也然猶顧謂尚席而懷不平之心則景帝目送之際是亞夫基禍之時也昔醴酒不設而穆生退燔肉不至而孔子行禮貌之衰誠心之亡也亞夫豈明於此乎何去非有英才不得用一置身於縉紳則視天下有志之士喜功名之人為不足問一躋位卿相將臣守帥則視天下山林草萊之雄江湖英雄豪傑之士為不足恤一躡足於轅門則視天下之統制統領為不足觀一厠迹於幕府則視天下之軍營行伍為不足道惟是寒素之見王公大人士卒之見宣招制帥如天之髙星辰之逺如神明之幽如雷霆之震懾望塵雅拜摳衣蒲伏趦趄數嵗而竟莫見其面目鑽刺萬狀而竟莫得其門户材技之人武勇之士始相顧而飲氣荆楚劒客煙波釣徒始相視而搖手矣在外雖有科目選舉之法在內雖有都堂呈身之制而糊名較藝止得夫章句之儒循例到庭一喏之外無他事是宜今日􅀈岈桐柏無非髙舉逺引之流而軍門幕府皆泛濫闒冗之子華嶽為將智勇兼全有智將有勇將有智勇兼全之將張子房運籌帷幄决勝千里而其狀貌反若婦人女子曽無魁梧竒偉之容此智將也關羽張飛號稱虎臣為萬人之敵然驕於士夫不恤小人而終反不能自保此勇將也有智無勇尚能自全有勇無智其終必斃若檀道濟可謂智勇兼全之將矣宋武北征道濟獨為前驅王師所至望風降附徑進洛陽所獲俘囚築為京觀逮夫文帝西伐道濟又為前驅上問料敵之䇿而道濟力陳奉王命以征討必未陳而禽卒果如所料自非智勇之過人又孰能如此哉張鳳忌良將狎庸將將帥之乏材其患在於有所忌而戒於有所狎畏其驕也則置之散地以消其氣老其才於無用之域以求其無大功畏其逼也則排擯刻削以貶其權而示其不足為世之輕重兹二者忌之過也夫惟豪傑竒偉之士既以忌踈則其所用者必庸懦以聽其上者也知其不足以有為而幸其不至於生變於是舉重兵以付之而不計其勝任與否此狎之過也陳傳良為將保功之難為將而立功非難而保其功為難鄧艾鍾㑹之平蜀其功固立矣然終不能保其首領以沒李訴李光顏之平淮蔡其功亦立矣然終不免有忿爭之醜甚哉為將而保功之難也知將知兵之難索上農夫十戶之賦不足以給一兵悉關市一嵗之征不足以奉一將闊視哆言尚名不滿一旦走檄傳警投之敵前而用小出必小挫大舉必大北非天之灾非地之變非時之不幸國不知將將不知兵兵不知律之祻也嗟夫萬一者將也百萬者兵也有可用之將無可用之兵東南將有可用昔之始創國於東南而形勢為最強者曰孫氏之吳觀其上之任將與大臣之舉將意之所注亦已深矣孫權舉江東之兵罄手而付之周瑜瑜疾而舉魯肅再選而舉呂䝉呂䝉舉陸遜且北來諸將若黃蓋韓當之武勇徐盛朱然之膽略呂範程普之謀畫又皆孫討逆之舊人陸遜所謂或堪爪牙或任腹心或國家當與共大事者也權乃捨之而任新進之少年何哉徐考其故則周瑜家於合淝魯肅家於臨淮呂䝉長於吳下陸遜起於吳郡是皆東南之人能眀其形勢之強弱士卒之勇怯故是孟德蹙𤣥德擒雲長勦三勍敵兵威所至迎創而解若孫權者亦可謂善䇿勵東南之人而用之審矣陳傳良主意賢將才將勇將言將帥於今日者將論其賢乎抑將論其才與勇乎夫將之品有三曰賢曰才曰勇攄忠竭莭見逺識微有持重而無輕躁有詳審而無踈闊者此賢將也洞眀韜略熟究兵機呼吸而生風雲顧盼而搖山嶽此才將也御壘麾旌投石超距取蝥弧以登係桑夲以狥此勇將也有才而未聞道者則才非所擇有勇而無義者則勇非所擇擇而後用其惟賢乎昔蘇公軾進䇿於先朝有曰觀將帥之才否莫如治兵之不可欺方略以來之治兵以試之即顏色而觀其氣即約束而觀其威即坐作進退而觀其能其䇿亦若詳且盡矣而愚以為是特足以得才勇之將耳如必欲得賢將而用之盍亦逺使之而觀其敬繁使之而觀其斷猝焉問之而觀其智急與之期而觀其信委之以財而觀其廉告之以危而觀其莭有能全是數者其為賢矣儒將智將勇將制彼裳衣勿士行枚將東征之師者周公也將如周公非儒將乎陳師鞠旅克壯其猷將北伐之師者方叔也將如方叔非智將乎進厥虎臣闞如虓虎將平淮之師者皇父也將如皇父非勇將乎世患無真儒真智真勇爾誠得夫真儒如周公者焉則禮義以為威道德以成強固自有萬全之效矣奏淮淝之捷儒之似者也貽泜水之敗儒之腐者也何足以論儒將誠得夫真智如方叔者焉則主於至誠眀於體物固自有幾微之識矣運興劉之籌智之駁者也激七國之變智之鑿者也何足以論智將誠得夫真勇如皇父者焉則義以為主氣以為帥固自有無敵之理矣贊遼東之功勇之小者也稱萬人之敵勇之粗者也何足以論將哉知兵愛國之將求知兵之將易求愛國之將難指山畫谷出竒運計决兩軍勝負於指顧之間此知兵之將也全師制勝坐鎮邊方而國有泰山四維之勢此愛國之將也善用兵者知有恢疆拓土而已知有斬將搴旗而已謀不及國也往往邀功生事以求竒效而啓外釁連兵禍者必斯人為之也若夫愛國之將則不然利可乘也而先慮其害敵可取也而必舉其全則百戰百克而動有成勳自攻自守而不勞指授蓋其為國致慮者重故其為兵計甚審是非愛國者能乎萬全一得之將有萬全之將有一得之將求其萬全者而用之則不戰可以屈人兵談笑可以挫強敵充其智則見理明料事審而不為譎詐之智用其勇則內順治外無敵而不為爭鬭之勇儒將是也取其一得者而用之則出竒應變有時可以取勝摧鋒陷陳有時可以立功然其智非有道之智不能終保其無失其勇非仁者之勇不能終保其不敗勇將是也故用智勇之將不若儒將何也蓋謂之儒者必其智勇無不咸備而智勇之名不足以盡之道出於萬全而儒者事業固有千百世不可泯滅者也茍徒曰智勇則獻竒鼓力乘機僥幸而無仁義之實以扶持之則邀功於一得而暫得暫失其智勇亦有時乎不足恃也儒者知兵躬耕南陽笑吟梁父而善用巴蜀之衆髙卧東山風流儒雅而卒奏淮淝之功傳授雍容議論風生而能標銅柱之勳博覽書傳武庫森列而能贊混一之烈由古迄今儒者知兵代不乏人顧所用何如耳茍徒以讀父書而無救長平之敗不學古兵法而竟成封狼居胥之功遂槩謂天下為無人其可乎嗟夫白面書生固不足與闕介胄武夫若斯人豈皆可仗耶用長槍大劒安事毛錐子彼以偏見言之耳能挽一石弓不識一丁字謂是足與言方略愚不信也古人獻馘則臨泮水遣戍則御曲臺出竒制勝必祖孫吳雅歌投壺雍容視敵者其意微矣警段蓄將使將虎皮息戈狼烽息警時則可以言蓄將羽書急報戎堠驚塵時則可以言使將當使將之時猶倣徨求蓄將之術不惟不暇亦不及事矣夫將材未易遽擇也試之以藝觀其能較之以氣觀其勇投之以險觀其智嘗之以難觀其決此乃熟察於暇豫之時然後可以獲用於舒徐之後若夫羽檄四馳兩軍對壘一瞬無將成敗立決必曰待吾蓄之而後用之毋乃沍寒索裘危疾求艾將何以應猝耶則蓄將之說於斯時也可以為緩未可以為急雖然將不素蓄一旦臨機則輕授非人樂水一跌固不凜乎吁將固不可嘗試也亦在吾使之之道何如耳戰守持重古今論將多而所以為將未之及也夫所謂將者何如哉出兵而戰將也聚兵而守將也總天下之兵而居其中亦將也戰將在奮發守將在振勵居中之將在持重知斯三者可與論將矣司馬遷之表將也首之以太尉次之以隆慮而昌侯共侯又次之隆慮戰將也昌侯共侯守將也而太尉則其夲兵者矣揚子雲之論將也始之以條侯終之以博陸而長平冠軍居中焉條侯守將也長平冠軍戰將也而博陸大司馬則其夲兵者矣夫入而總兵出而固吾圉又出而敵王所愾合三者皆謂之將漢之人論將然耳將權以時輕重狼烽告警檄書交馳時則將權增九鼎之重承平無事甲兵久寢時則將權係一縷之輕嗟夫將無輕重國為之輕重也一跨下之匹夫足以壯關中之勢而登壇設拜聞者駭汗將權何其重也逮雌雄既決天下底定多多益善之哂胡為權之反輕耶一介胄之武夫可以嚴細栁之屯而壁門不開聽者毛竦將權何其重也逮和親議成邊鄙獲安鞅鞅不平之誚胡為權之遽輕耶大抵事變則豪傑足以得志時平則豪傑不獲設施此皆衰世之政而非隆古之樂易用人之道也儒者之兵異乎人陋哉今日之儒徒有醖藉俯仰之容束之髙閣乃可耳異哉今之兵矜勇於長鎗大劒一丁字未必識也儒既非古儒則兵宜非古兵矣口誦韜略手畫形勢論古人之得失夸胸中之計謀曰我善為陳我善為戰此豈古之儒者所謂兵呼吸變化莫可測識被堅甲蹶徑弩帶利劒曰彼烏敢當我哉此豈古之儒者所謂兵若夫儒者之兵則有道曰師直為壯曲為老衆固較強弱而我固較曲直也曰順德者昌逆德者亡衆人固論利害而我固論逆順也曰戰不必勝不苟接創攻不必取不苟勞衆衆人固欲必勝必取而我則有可以無勝可以無取者也故斂吾師也絀攻取之心肥仁義之地而豈行危以求安造禍以為福者比張吾師也伸威千里從抌席上過師而豈乍翕乍張代存代亡相為雌雄者比延則若莫邪之長創嬰之者斷鋭則若莫邪之利鋒當之者潰而豈誇一槊之功矜兜鍪之力者也偶句寄食跨下凡幾淮隂龍韜豹略坐運軍籌髙卧隆中不一諸葛燕頷虎頭威伸敵國郭子儀朝受詔而夕引道髙崇文卯受命而辰出師鷹揚而萬旅翹關山川險易盡在目中虎卧而三陲按堵兵勢戎情若指諸掌踞鞍矍鑠宿將稱雄髀肉復生志士興歎坐之廟堂則運幄中之籌䇿用之戰陳則運胸中之甲兵吒咤而風雲生呼吸而山嶽震將苟賢則一人不能當百萬之師將不賢則三軍不能當一旅之用邊之藩籬在守藩籬固則足以衛門户邊之爪牙在將爪牙強則足以衛頭目事證歷代將帥之置將帥之名古也然周官將與帥並置而將之職大於帥漢唐之初置將不置帥而帥之名泯國朝中葉以來置將統以帥而帥之權重愚嘗考其始末厯代之將帥可得而論矣周設六官而兵掌於司馬司馬之職其制軍有六曰軍曰師曰旅曰卒曰兩曰伍萬二千五百人為軍軍有將二千五百人為師師有帥五百人為旅旅亦有帥軍將皆命卿師帥皆中大夫旅帥皆下大夫即是而觀將之職重而帥之職輕將之所統者衆而帥之所統者寡下至春秋之世此制猶存秦之伐鄭有三帥之遺齊之內政亦有鄉帥縣帥焉故曰將帥並置而將之職大於帥也漢初有大將之拜而帥則未聞也唐興以府衛制兵析關中為十二道皆置府後更為軍置將則置帥之名亦未聞也故漢之名將前有韓彭後有衛霍至於唐也靖之與績功著於前光弼子儀名播於後不特此爾雲㙜圗畫榮耀一時帝室勒功垂傳萬世曽不見以帥而顯者雖唐之中世莭度使之置亦謂之帥然府兵壞而方鎮唐室以衰君子無取焉故曰置將不置帥而帥之名泯也厯代將帥之異自今觀之細栁堅壁天子為之改容六飛在門介胄至於不拜亞夫所以養心者為何如七國之叛吾知其制於亞夫矣隆中髙卧先主為之三駕出師一表識者為之寒心孔眀所以養心者為何如漢賊未滅吾又知必成擒於亮矣兵難預度馳至金城而後圗勢有可進力薦杜預之足用充國羊祜之養心者又何如哉則屯田之計伐吳之畫乃二子優為之事若此者皆以心御氣其制勝固宜袴下之辱韓信不為之恥傳堞之兵光弼不為之懼是豈區區武藝兵法所能為哉正以氣有所養矣六出之師去病不以為勞二問之設馬燧弗以為難生置之語李廣不以為懼西域之守班超不以為恐若此者又豈區區譽望世家之所能及哉亦以氣有所養矣故其夷楚項復兩京威田恱破胸奴服北虜降西域皆恃此者也若此者皆以氣應心其制勝者亦宜矣至於房琯趙括則不可以諸人論也以為將門有將則趙括固馬服之子矣為名下無虛人則房琯亦在王佐之才矣惟其心無能以御其氣則心無所守氣不能以養其心則氣有所蹶括之未用趙奢逆知其必敗琯之方相進明預識其無成則敗於長平喪於陳濤非戰之罪也明矣爵祿不可極夫一田單也向也以區區一市掾之微以坐織簣立仗鍤之賤則破強燕如破竹及其一旦黃金橫帶之侈而興大冠若箕之謡東有夜邑之奉西有淄上之娛則攻狄不下亦不能逃魯仲連之所料始勇終怯殆如二人人情所在大略亦可覩矣此燕吳未平戎車方駕始得二城即授三事之賞若殄二冦將何以加所以見於王猛拳拳之請若猛者亦可謂賢矣天下不能人人而王猛也則亦在夫上之人駕馭之者如何耳寵任不可過必如樂毅然後可以當築臺簡任之托必如韓信然後可以當設壇寵拜之榮今無毅信之才者乃有毅信之位設果有毅信之才者肯為今日出耶否也征蠻無功雖以馬援椒房之親不容不罰街亭違命雖以馬謖上客之貴不容不誅今有援謖之任者乃無援謖之責設未有援謖之任者肯為今日出耶否也太祖諸將夲末我太祖以仁義開國固不事乎兵也而未能忘兵當是時居樞衡之地任莭鉞之責者莫不各有其人趙則平之二樞府也石守信之典兵以計出之懼其不能制下也則平之長樞府也符彥卿之典兵以辭却之懼其不能衛上也總兵如此內患息矣吾求之守將關南有漢超瀛州有仁贍常山有令坤易州棣州有惟忠繼均之五人者可以拒北虜延州有趙贊慶州有內斌環州有遵誨原州靈武有彥升繼業之五人者可以備西戎蕞爾太原未入中國而在西山在昭義在晉州隰州者亦四人焉吾求之戰將荆南之役慕容釗不可以執弓逮李處耘之師一至而荆南平湖南之役丁德裕逡巡而反斾逮慕容釗之師一至而湖南平其平蜀也王全斌感裘帽之賜而尅敵其平嶺南也潘美乘席卷之勢而計功其平金陵也曹彬受匣劒之命而屈人兵治兵若此外侮去矣內患消而國夲益強外侮去而國勢愈壯國家所以建千萬年不拔之基諸將之力也祖宗中興戰功六飛南渡水濱肇基一時諸將虎勇熊威髙橋擊敵敵即拔寨其功偉矣而不滿其內臣之賀者臥薪嘗膽之志也設備儀真請當一面其辭偉矣而退為胥浦橋之保者匿形斂翼之圗也海道一炬樓櫓灰飛即赤壁之走老瞞李寶有之城壁摧闕殺敵枕野即昆陽之破尋邑劉錡有之旗鼓一馳烏珠鼠竄而走幸脫佛狸之死謂非俊功可乎水陸一進劉蕚狼狽而逃幾就鬼章之俘謂非俊功可乎鄭商犒師秦人喪氣饒風嶺之柑不減於此其魄烏得而不驚魏尚雲中敵至輒敗和尚原之據不怯於此則其膽烏得而不喪雲梯攻關可謂巧矣而我師一前隨手輒碎雖有魯般之智不得而施箭如撒電可謂危矣而揮刀擊鞭賊隊披靡雖有控弦之衆不得而用小鐵山之事雖急奮臂大呼而致姓名之問蓋與止啼之張遼同一威聲也招討使之疾雖急臨師指麾而收掩殺之績蓋與拔幟之韓信同一神竒也采石之師沼我江矣虞公慷慨不衰一戰報國死中求活竟以收除凶之功管仲一匡又豈足方其萬一哉國朝儒將我太祖之有天下也望武臣以文而不強武臣以文武臣盡使之讀書望之以文也與將士言未嘗文談不強之以文也儒臣如辛仲甫吾知其有武幹武臣如曹武惠吾知其鴻儒不能及然不多得也如必得若人而後用之則當時之削平僣僞備禦西北終無可用之人矣不然党進一戎虜耳上以兵籍問進以杖記對自他人處此斥而去之不暇顧乃擢之髙位而厚遇之此果何為也哉因是而推王顯之素寡學問而太宗用之不以文士責之也髙瓊之妄引書句而真宗用之不以文士薄之也其在當時亦豈遂無人哉文臣有武略吾有栁仲塗以儒臣知兵吾有錢若水特不可純以若人望之耳雖然武臣不知書不足責文臣不知兵為可責人必曹寶臣也而後能好書人必狄武襄也而後能喜書否則足知有軍門身知有武辨彼安知詩書為何物者而又何足多責若夫不以樽爼而折衝不以帷幄而決勝其習西事不如尹洙其料南事不如孫沔若斯人者其亦有靦面目多矣禮樂詩書中有元帥雅歌投壺名將事業寓焉不此之知而曰張橫渠談兵范文正恥之吾亦恥之蘇老泉談兵楊中立恥之吾亦恥之此工於自文者之說不可以訓國朝世將將之論其世也吾於詩書見之矣康王之新立也其將齊侯呂伋伋蓋太公之子也宣王之再造也其將太師皇父皇父蓋南仲之孫也天下之最難知者莫如兵竒正之相乘虛實之相傾不於將門而求將而欲諳練武事習熟軍情難矣哉我祖宗嘗致意於斯矣曹彬為太祖名將其子寶臣太宗復用之曰是其父嘗薦之也已而出鎮西鄙酷類其父楊業為太宗名將其子延明真宗復用之曰是有父之風也已而委之邊郡果類其父馬知莭以嚴見憚視之如老將非崛起也其父全義之遺訓也王德用出師以律望之者辟易非新進也其父武康之餘法李顯忠之果毅其父忠佐賴以有濟李寶之剛勇其子公佐因以奏凱而兄玠弟璘髙勳相望若此者又未可以悉數也昔者景德之元天雄有警諸將難其守也遂探符以分之孫全照奮然曰全照將家子請不探符諸將不肯當者全照當之已而某人門其東某人門其西某人門其南其北門人所不便者乃以命全照噫人皆探符已獨不探符赳赳武夫公侯干城將家子其可重哉雖趙奢之能兵不能傳其子括而李陵之失身所以為李廣羞者不少將而必求世將其不誤人家國事乎不然則張疑能將也而出之軍校狄青名將也而出之行伍凡天下之英雄果敢者皆可用也而又何拘於世將國朝平定興復之將亦嘗聞之太祖之世乎其平澤潞也時則有若石守信髙懷德其平湖湘也時則有若慕容釗李處耘其平西蜀也時則有王全斌崔彥進王仁瞻廣川之平有潘美焉江南之平有曹彬焉扼北虜者有人禦太原者有人備西戎者有人吁何其勝也又嘗聞之髙宗之世乎金山之捷大儀之捷主之者韓世忠也和尚原之捷仙人關之捷主之者吳玠也順昌之役敵騎喪魄非劉錡之功乎亳州之役棄甲驚遁非張俊之功乎其戰於郾城也有嶽飛以復諸郡其戰於柘臯也有王德以逞威略海陵之方熾也虎視青徐者有之鷹揚穎夀者有之搗殽函之險衝伊洛之郊者有之何其盛也時乎平定則有平定之將時乎興復則有興復之將晝烽不燔夜刁不擊則將臣之名泯然於承平之時矣國朝東南置帥國初僣國未下西北未賔服太祖命諸將出鎮邊地即帥之職而未有定名至神宗始置諸路將官陜西四十二將河北三十七將東南一十三將各有正副調發賞罰皆決於將副然未有以統其權也宣和間詔杭越等州守臣並帶安撫掌總護諸將統制軍而未有帥府也至建炎初李綱請於㳂河㳂江要郡置帥府其帥府文臣一員帶安撫使為都總管武臣一員為副總管遇朝廷起兵則副總管為帥至紹興二年諸路並置則是帥府統諸將矣故張公浚之帥興元得以莭制平江常秀兵馬吳公玠之帥涇原得以兼陜西諸路都統豈非帥之權重於將乎時政將帥無任事之心今日之邊帥何如哉髙牙大纛身計則榮而臨難未必果隆名美號爵位則崇而當敵未必進黃金橫帶志氣驕於豢養白創可蹈精力憚於驅馳姑以從事言之岷峨劒閣精骸未除瞿塘灔澦腥流未洗爰頒鳳詔制命虎臣旌麾分益州之鎮莭鉞耀梁域之封任至重也夫何遲疑不決趦趄不進遜避禮也而實辭難待時智也而實逗留祖尚受命不行不能不重人主之怒光弼懷疑不進不能不貽將士之悔愚恐此風一長更相效尤昔孝宗皇帝有曰士大夫皆諱言恢復不知其家有田為人強占亦投牒理索士大夫於家事則人皆能理至國事則諱之至哉聖謨誠今日之家法也愚願今日單于未臣責去病以絶漢元濟未馘促裴度以遄征庶幾英風感慨義氣激昂可以轉驕蹇之末習圗修復之雋功矣將帥有貪利之心何謂將帥壞於貪利之心夫其聚不義之徒授之不仁之器茍不素練不惟一卒之命係焉三軍之命係焉至可畏也而今也紀綱廢弛軍政莫修三司雖有月教旬教春秋大教之名然不過以是為官吏賞賜將校燕犒之具而何有於較藝諸郡雖有按教之文差斆之官而反以是為路分鈐轄弄權搔擾之具最其甚者翹關超乘者不多見而坐坊賣餅者誰實庇之蹲甲徹札者不多得而竒技淫巧者誰實驅之若此者雖諸大屯駐之兵亦未免乎是也又誰與革之耶掊克忌嫉之弊古之將帥與士卒同甘苦所得賞賜盡以給之故能得其死力今也不然軍中之支費率事於科抑當散之賞給多歸之私帑營繕之私末作之務既用其力無名之征非法之取又耗其財將日以富兵日以貧怨嗟滿路無所顧忌此將帥掊克之弊也古之將帥以簡拔人才為急以振作士氣為務今也不然士卒之有能者忌之偏禆之有才者嫉之惟恐一技一能之或出於其上凡所升差不以賄賂則以請托非凡庸平常之人則親舊狎昵之輩百計沮抑何望升進此將帥忌嫉之弊也嘗試姑息之患嘗試不足以圗事姑息不足以立功今日之患往往坐此愚觀將材之乏非今日患也患在嘗試患在姑息爾曩者洛帥之遣既嘗試矣洛覆而後姑息也曩者襄閫之畀既嘗試矣襄燬而後又姑息也失不可再再則玩敗不可常常則習夫何六合之援乃付之一庸懦之夫則又嘗試矣斥命未幾重閫深庇淮方之壘已缺而一麾之守甚間是亦可姑息乎䕫門之重乃委之輕易之士則又嘗試之一旦退屯縱敵入裏重湖之民尚驚而連帥之命猶故是亦可姑息乎甚非所以令將帥也邊庭乏人今日果何如時耶強敵匪茹屢軼三陲望烽者不獲安枕戈者不獲臥此頃刻不可無將之時也今乃棘門無死難之臣邊閫無折衝之勇圗之壘分弄印踰時用一將校進退兒戲方邊境慨人才之乏使必欲求擇帥之術焉噫資舟於旱資車於水先事求將將可得也然曩自故相怙權廟堂茍偷軟熟槖鞬之風脂韋介胄之氣主將能否一不暇問且科目之薦所知之薦堪充時將帥之薦綸音播告無時無之然縉紳有薦亟加甄拔者幾何人哉有司姑以文具應之朝廷姑以故事視之豢安養逸將無素備何以為應敵之規模哉征伐罔功往者曰將曰帥如虎如熊下有鳴鑾東岱之請上有封狼居胥之心天下固以為王狄之復見也然三京之役棄甲而行邳徐之師隻輪不返蜀閫遁而巴蜀蹂踐襄閫遁而樊襄淪亡未聞月收三捷之功徒增日蹙百里之證抵掌有負於初心噬臍無補於後悔前日之議與後日之議相伯仲今也齊壇授鉞牢辭曲諭執事以為誇愚以為公議之針炙其烈不可尚偶句籠街徼道呼唱揚揚將不和同惟務吞噬緩帶輕裘養安自得軍無紀律所至喧譁無橫草之功而位已極方面乏鷹揚之師無汗馬之勞而祿已崇軍國無虎視之政勞績者以小過而廢退朝馳壘而暮改轅奔敗者以夤緣而超遷前膺綸而繼寢命挽強引重類皆脆弱之夫聞敵而膽先寒棄甲曳兵惟有驚潰之意望風而魄以喪輕儇浮躁而少沉毅謹重之謀虛張誇誕而乏忠勤恪實之意自邊守忌心於功名而知有身不知有國自邊將貪心於富貴而知有已不知有彼驅之於兩陳相向之間豈可責其空拳而袒鬭處之於日費千金之地豈可使其唱籌而量沙望塵引退閉壘自全固有之矣賊未授首臣無還期其孰能厲必戰之志乎剋剝糧廩私市田宅固有之矣胸奴不滅無以家為其孰能忘徇私之情乎結尾擇將在先擇相雖然論將非難論相為難有相則有將矣故人主之職在論一相蓋有蕭何則不患無韓彭有鄧禹則不患無冦賈有狄仁傑姚崇張柬之則不患無婁師德郭元振李多祚輩我宋之創業也曹潘之南征北伐則趙韓王實主之逮其中興也張韓劉嶽之屢戰屢捷則趙公鼎張公浚實薦之將顧不係於相耶今日右揆久虛一木慮莫支於大厦長淮分閫孤墉恐難恃於長城是固皆可慮而愚則曰任相尤所當急蓋漢相孫洪卒啓淮南發䝉之誚晉資商浩遂生元溫跋扈之心相如賢焉則夾袋所儲拔十得五皆可以任兵寄相如非才今日易一將焉猶夫人也眀日易一將焉猶夫人也人皆曰天下危注意將吾則曰危而不持焉用彼相哉大臣當薦將帥今勸懲未至而貪縱者尚蕃刑賞未舉而驕惰者猶故必使馬如羊不以入廄使金如粟不以入懷而後可以為將今互市貨利以自豐殖剋剝士卒以資囊槖而貪者未戒也聞金則怒聞鼓則喜冬日不裘夏日不扇而後可以為將今聲色貨利日鴆其心羅綺膏梁日脆其體而懦者未誅也投醪挾纊均其甘苦解衣推食共其勞逸而後可以為將今行伍怨訕心志以離叛卒潰兵所至為亂而驕者未鋤也疾媢同列忌出已右虛張妄獲冒希賞功望風懷敗北之心臨敵蔑先登之勇此將帥之才當急也雖然將材不易得亦非難得任之在人主薦之在大臣若趙充國之立功於漢薦之者魏相也髙崇文之立功於唐薦之者杜黃裳也將為國之爪牙相為國之股肱人主立億兆之上內有股肱為之輔外有瓜牙宣其力中心無為則安靜和平之福不期而集敢以此為今日獻將帥貴和雖然主國家之兵者在乎將盡將帥之道者在乎和蓋三人為善晉師所以獲麻隧之功二卿相惡楚子所以貽敗績之辱今日將帥其知之乎外而分閫者恃手足之親內而制兵者甚矛盾之異諭之持重拜表而即行告以相睦佩劒而相創卒有緩急截地為守不啻如秦越之不加意將何以為謀哉吁宮廟黍離銅駝荆棘忠臣義士聞之悲酸此正相如避廉頗之時子翼迎賈復之日豈可為王濬王渾之爭功鍾㑹鄧艾之相忌耶嗚呼韓琦仲淹叶心國事可以成西賊膽寒之謡張韓劉嶽非不知兵特不相叶至失中興之大計愚願將帥以是為勉人主意氣感召雖然有逹武真人則恢復漢祚不患無雲臺依乘之士有晉陽天子則開闢唐基不患無煙閣䇿勳之流中興諸公得以忠義馳騁功業焜耀者亦我髙宗精神意氣有以感召之耳今考之國史駕御得宜懲勸有法一時之英雄豪傑頤指氣使殆如駕輕車於熟路鞭駿足於康莊或因其拒賊而許以事無遙制或因其入覲而責以汝獨無功順昌奏凱則由廉車而建莭不以為驟淮西怯敵則由都統而除名不以為慘今日誠能以髙宗馭諸將之法而馭諸閫則抗表北伐裹尸求戰必有能陸續中興十三戰之偉績毋謂秦無人噫嘻嵯峨蒼壁峻與天齊勒功紀德流芳異時俯軛燕然雄視浯溪景行先烈勉之勉之羣書㑹元截江網卷二十二
